고 듣고 느끼고 있느냐고. 아니라는 걸 안다. 그것들은 생각이다. 지금 보고 듣고 하는 이것과는 **단 1%도 관계가 없다.** 그러면 그것들은 나의 정체성이 아니다.\n\n---\n\n#### **생각을 나로 착각한다**\n\n보통 사람들은 정체성을 '내가 뭘 좋아하고 뭘 싫어하는가' 같은 것으로 생각한다. 블로그에 그렇게 쓰고, 자기소개서에 그렇게 적는다. 그리고 누가 다른 얘기", "source": "essay"}, {"id": "essay_617_2054460ffe", "text": "을 나로 착각한다**\n\n보통 사람들은 정체성을 '내가 뭘 좋아하고 뭘 싫어하는가' 같은 것으로 생각한다. 블로그에 그렇게 쓰고, 자기소개서에 그렇게 적는다. 그리고 누가 다른 얘기를 하면 내 정체성을 침해받는다고 느끼고 기분 나빠한다. 그런데 사실은 그게 내 정체성이 아니라는 거다. 그걸 우리가 내 정체성으로 생각하고 거기에 계속 매여 있다는 거다. **내 생각과 나를 동일시하는 것이 문제다.** 생각을 나로 착각하고 산다는 거다.\n\n'너무 힘들다', '피곤하다', '삶이 막막하다', '두렵다' — 이런 것들도 다 생각이다. 지금 여기에서 보고 듣고 느끼고 있는 이 정체성과는 관계가 없는 것을 붙들고 씨름하고 있는 거다. 나의 정체성을 아무리 좋게 생각하든 나쁘게 생각하든, 지금 느껴지고 보여지고 들려지고 하는 이 정체성하고는 전혀 관계가 없다. 그렇다면 내가 상황을 바라보는 것이나 내 안에서 떠도는 생각들이나, 이런 것들이 다 지금 여기에서는 아무 상관이 없는 걸 가지고 내가 붙들고 씨름을 하고 있다는 거다. 그것이 나의 정체성인 줄 알고, '나는 그동안 어떻게 어떻게 해서 힘들게 살아왔어' 같은 **서사를 엮어가면서** 사는 거다.\n\n---\n\n#### **점을 이어 선을 만들지만**\n\n수행할 때 과거심 불가득, 현재심 불가득, 미래심 불가득이라고 한다. 수학에서 점은 면적이 없는 것이다. **점을 찍고 이으면 선이 되고, 그것들이", "source": "essay"}, {"id": "essay_618_591f079b63", "text": "*점을 이어 선을 만들지만**\n\n수행할 때 과거심 불가득, 현재심 불가득, 미래심 불가득이라고 한다. 수학에서 점은 면적이 없는 것이다. **점을 찍고 이으면 선이 되고, 그것들이 얽히면 면이 되지만, 그 점들은 애초에 면적이 없다.** 우리 삶이 그렇다는 거다.\n\n우리가 붙잡을 수 없는 점점을 이으면서, 그것이 나라고, 나의 삶이라고 착각하며 고통받으면서 산다. 과거심도 미래심도 지금 이것과는 관계가 없는 것이다. 그렇다면 나라는 것은 무엇이냐. 지금 시장에 가 있으면 시장의 풍경, 상인들의 소리, 풀빵 냄새 같은 것들이 지금의 나를 이루는 것이다. 지금 이렇게 보이고 들리고 느껴지고 하는 것들이 다 지금 나를 증명하고 있다. **나는 하나의 흐름일 뿐이어서 잡을 수가 없다.** 강물을 손으로 뜨면 강물이 아니듯이. 이것이 나다 하고 딱 고정시킬 수가 없다.\n\n---\n\n#### **수행 밖의 사람들에게 이 말은**\n\n물론 사회나 문화가 유기적으로 돌아갈 때는 \"당신은 누구냐\" 하면 이름도 있어야 하고 직업도 있어야 한다. 그렇게 표현할 수 있다. 하지만 수행이나 불교적으로 접근하지 않은 사람한테 그런 식으로 얘기하면 \"뭔 소리야?\" 이러는 거다.\n\n그런데 가장 크게 삶에서 매이는 게 바로 그 정체성 문제다. 사회에서 살아가면서 젊은이, 중년, 말년, 어떤 생각으로 이 세상을 살아가야 하느냐는 거다. 가정과 사회와 문화 속에서 살아가", "source": "essay"}, {"id": "essay_619_8291db3983", "text": "가장 크게 삶에서 매이는 게 바로 그 정체성 문제다. 사회에서 살아가면서 젊은이, 중년, 말년, 어떤 생각으로 이 세상을 살아가야 하느냐는 거다. 가정과 사회와 문화 속에서 살아가는 대부분의 사람들. 그 사람들한테 \"그건 너가 아니다\"라고 말을 하면 이게 뭐가 되겠느냐는 거다. 하지만 이 얘기를 하는 이유는 하나다. **대부분의 사람들이 고통을 겪는 원인이 그런 잘못된 정체성을 자기로 착각해서** 그것 때문에 고통을 다 겪는다는 거다. 그런데 왜 내가 이런 고통을 겪는지를 모른다.\n\n---\n\n#### **고통의 뿌리는 정체성 집착이다**\n\n애 학비를 대줘야 하는데 학비가 없다거나, 가게 세가 없다거나 하는 상황이 있다. 학비를 댈 수 있을 때 대주고, 못 댈 때는 못 대주면 된다. 다음번에 대줘야겠다 하고 노력해서 대주면 된다. 그런데 괴로운 것은 그런 상황을 액면 그대로 보고 처리해 나가지 못하고, **내가 바라고자 하는 상황, 이상적으로 생각했던 그 상황에 현재 내가 못 맞춰줬다고 생각하면서** 그것을 계속 붙들고 힘들어하고 괴로워한다는 거다.\n\n여기에 가장 핵심적인 역할을 하는 게 정체성이다. 이 상황에서 내가 생각하는 나의 모습을 지키고 싶다는 것, 내가 생각하는 상황을 지키고 싶다는 것. 그게 나라고 생각하니까 거기서 쓸데없이 많은 에너지를 투쟁에 소모한다는 거다. 핵심은 **'나는 이래야 된다, 저래야 된다', '나는 이", "source": "essay"}, {"id": "essay_620_78f76dc5ed", "text": "내가 생각하는 상황을 지키고 싶다는 것. 그게 나라고 생각하니까 거기서 쓸데없이 많은 에너지를 투쟁에 소모한다는 거다. 핵심은 **'나는 이래야 된다, 저래야 된다', '나는 이 상황을 겪고 싶다, 겪고 싶지 않다'** 는 거다. 그것 때문에 힘들고 고통스러워하니까. 삶을 살지 말라는 게 아니다. 가족의 의무가 있으면 의무를 당연히 해야 한다. 아내 앞에서는 남편이 돼버린 것이다. 아내가 있기 때문에 내가 남편이 돼버린 거다. 애들이 있을 때는 애들이 있으니까 내가 아버지가 돼버린 거다. 그때는 아버지 노릇을 해야 하고, 아내 앞에서는 남편 노릇을 해야 한다. 그게 그 순간의 나의 정체성이다. 그런데 **남편의 역할을 하면서 아버지 걱정을 하고** 있는 거다. 깨어있을 때의 대부분의 시간을 그렇게 과도한 걱정으로 나의 정체성을 내 스스로 규정 지을 필요가 없다는 거다.\n\n---\n\n#### **갑갑한 부인이라는 것은 없다**\n\n상황이 나를 만들었다고 생각하지만, 상황은 내가 누구와 있느냐, 어디 있느냐, 언제 있느냐, 무엇이 내 앞에 있느냐에 따라 수시로 변한다. 갑갑하다고 느끼는 상황이 있다고 하자. 그것을 변화를 줘야 한다고 하면, 그것도 또 잘못된 정체성으로 하는 거다. **갑갑한 부인이라는 것은 없는 거다. 내가 거기에 갑갑한 부인을 탁 지은 거다.** 소크라테스 부인이 악녀라는 말이 왜 나오느냐고 물을 수 있다. 악녀일지 아닐", "source": "essay"}, {"id": "essay_621_287ef6b72e", "text": "으로 하는 거다. **갑갑한 부인이라는 것은 없는 거다. 내가 거기에 갑갑한 부인을 탁 지은 거다.** 소크라테스 부인이 악녀라는 말이 왜 나오느냐고 물을 수 있다. 악녀일지 아닐지는 우리가 모르는 거다. 어떤 면에서 보느냐에 따라 다른 거다. 철학자들은 결혼을 대부분 안 한다. 철학이나 문학을 하고 싶은 사람은 결혼하지 말고 스님으로하면서 해야 한다. 자기 생각이 뚜렷하고 둥글둥글하게 살아가는 스타일이 아닌데 가정을 꾸리면, 같이 굴러가는 가정의 일원들이 부딪힘으로 굴러가는 삶을 사니 가족들이 고통스럽다.\n\n---\n\n#### **생각의 덫에서 빠져나오기**\n\n\"그것도 네 생각이다\" 하면 그냥 찢어지는 수밖에 없는 거다. \"네 생각이고 내 생각은 그렇지 않아, 우리 생각이 틀리구나.\" 어차피 정체성으로만 사는 게 아니라 생각으로도 사는데, \"그건 네 생각이요\" 이러면 할 말이 없는 거다. 맞고 틀리고도 없다. 생각이니까. 중요한 건 뭐냐면, **내가 그 생각을 붙들고 있으면서 고통을 갖고 있느냐** 하는 문제다. 생각 자체는 옳고 그름이 없다. 내 생각을 붙들게 하는 게 내 환경 때문일 수 있다. 이런 환경에서도 다른 쪽의 생각을 붙들고 있을 수도 있다. 스타일이 다른 거다. 에너지가 안 맞는 거다. 그런 생각을 붙들고 있어도 내가 회피하면 관계없는데, 내가 그 생각 때문에 힘드니까 문제가 되는 거다. 사람들이 그러니까, 그런 나의", "source": "essay"}, {"id": "essay_622_8015ca6c9b", "text": "타일이 다른 거다. 에너지가 안 맞는 거다. 그런 생각을 붙들고 있어도 내가 회피하면 관계없는데, 내가 그 생각 때문에 힘드니까 문제가 되는 거다. 사람들이 그러니까, 그런 나의 정체성도 아닌 것을 가지고 **헛힘을 쓰면서** 살고 있다는 거다. 그 사람 입장에서는 헛힘이 아닐 수도 있다. 그나마 그렇게 투덜대지 않고 표현도 안 하면 살 수 없었을 수도 있다. 하지만 **과도한 생각 때문이라는 것을 알아야 벗어난다.** 내가 스스로 그것을 나의 정체성으로 생각하기 때문에 거기에 매여버리는 거다.\n\n생각의 덫에서 빠져나가기가 쉽지 않다는 것, 그건 사실이다. 그냥 냉철하게, 여실하게 보면 된다. 그걸 받아들여야 한다는 건 사회적인 속성이지만, 내가 그걸 안 받아들이면 된다. 고통의 뿌리가 어디에 있는지를 아는 것이 먼저다. 내가 정체성도 아닌 것을 나로 착각해서 거기에 매여 있다는 것을 알기만 해도, 그 매임은 조금씩 느슨해진다. #정체성의허구 #생각과나의동일시 #고통의뿌리 #과거심불가득 #흐름으로서의나\n\n--- (구분선)\n\n[파일명: 조건지어짐_자유와참나_수필.md]\n\n### **조건지어짐_자유와참나_수필**\n\n#### **심심함이 백지다**\n\n심심하면 무언가로 자꾸 채우려 한다. 심심함으로부터 벗어나려 하니까 **공허해지는 거고, 외로워지는 거다.** 그래서 바깥에서 나를 찾으려 하는 거다. 심심함을 그냥 둬야 한다. 심심하면 뭘", "source": "essay"}, {"id": "essay_623_2474a5f5d0", "text": "가로 자꾸 채우려 한다. 심심함으로부터 벗어나려 하니까 **공허해지는 거고, 외로워지는 거다.** 그래서 바깥에서 나를 찾으려 하는 거다. 심심함을 그냥 둬야 한다. 심심하면 뭘 딱히 하지 않고 '이게 내가 심심한 상태에 있다'고 보면, 내 안에서 뭔가 올라온다. 그러면 내가 그것을 **명확히 알 수 있다.** 그것이 조건 지어진 건지 아닌지. 조건 지어진 행동이라는 건, 좀비들이 하는 것과 같다. 누군가 시키면 시키는 대로만 한다. **사람은 자기가 주체적으로 하는 게 아닌 거다.** 왜? 나로 사는 게 아니니까. 남이 조건 지어준 대로 사는 거니까. 그래서 심심함이 필요하다. **백지에다가** 오만 걸 색칠을 해놓으면, 거기에다 내가 원하는 걸 그릴 수가 없다. 이미 선이 많이 그려져 있고 색도 많이 칠해져 있으니까. **심심하게 한다는 거는 이 공간을 지우는 거다.** 지우개로 싹 지워 놓으면 거기서 내가 원하는 걸 쓸 수가 있다. 요즘 사람들이 끌어당김의 법칙을 얘기한다. 내가 생각하는 대로 된다고. 그런데 **심심한 데다가 써야 그게 정확하게 된다.** 복잡한 데다가 쓰면 끌어당김의 법칙이 안 된다.\n\n심심함 속에서 **진정한 나가 드러난다.** 그게 **창조성이 회복된 나** 다.\n\n---\n\n#### **참나를 찾는 나는 지금 거짓인가**\n\n요즘 코치들이 스루 셀프(True Self), 참나를 많이 얘기한다. 그런데 여기에", "source": "essay"}, {"id": "essay_624_4c30d69c47", "text": "게 **창조성이 회복된 나** 다.\n\n---\n\n#### **참나를 찾는 나는 지금 거짓인가**\n\n요즘 코치들이 스루 셀프(True Self), 참나를 많이 얘기한다. 그런데 여기에 오해의 소지가 굉장히 많다. **내가 참나를 찾는다 하면, 참나를 찾아가는 나는 지금 거짓이라는 거 아닌가.** 참나를 찾았다. 그러면 참나 찾은 것 이외에는 다 거짓이라는 거 아닌가. 이건 이런 거다. **그림자가 본체를 찾는다?** 말이 안 된다. 그림자는 어떤 본체의 그림자잖아. 그러면 지금 참나를 찾는다 할 때 그림자가 본체를 찾았다고 생각을 하는 거다. '내가 참나를 알았네' 하고 인식한단 말이다. 그러면 그거는 **거짓된 나가 참나를 알았다는 거잖아.** 그거는 참나를 찾은 게 아니다. 천 개의 강물에 달빛이 비친다. 여기도 비치고 저기도 비치고 다 비친다. 그런데 **비친 달빛이 참나를 알았다** 고 한다. 그게 제대로 참나를 찾은 거냐는 말이다. 우리가 지금 그런 **넌센스를 하고 있는 거다.**\n\n**조건 지어지지 않는 것이 참나** 인데, 어떤 조건을 지어서 자꾸 찾으려 한다. 참나는 감춰지고 드러나고 하는 그런 조건에 매이지 않는 게 참나다. 그런데 자꾸 어떤 조건을 갖춰야지만 참나를 찾거나 드러나게 한다고 생각하는 거다. 그래서 수행을 해도 **자유롭지가 않은 거다.** 자유롭다는 건 어떤 거에도 매이지 않는 게 자유로운 거잖아. 조건", "source": "essay"}, {"id": "essay_625_e746b97cc0", "text": "조건을 갖춰야지만 참나를 찾거나 드러나게 한다고 생각하는 거다. 그래서 수행을 해도 **자유롭지가 않은 거다.** 자유롭다는 건 어떤 거에도 매이지 않는 게 자유로운 거잖아. 조건 지어지면 자유롭지 않다. 그래서 얘기하는 게 **조건 지어짐으로부터의 자유** 다.\n\n---\n\n#### **자유를 얻으면, 그다음은**\n\n**자유를 얻으면,** 그다음에는 내가 조건 지울 수도 있고 안 지을 수도 있다. 그건 이제 내 선택이고 내 필요에 의해서 **새로운 조건을 쓰는 거다.** 조건 짓는 것 자체가 잘못된 건 아니다. **조건에 매이는 게 문제다.** 내가 매였다는 걸 모르는 게 문제다. 우리가 다 사회적으로 교육받고 억압되고 그런 것들이 우리를 계속 얽매고 있다. 직장 다녀서 돈 벌어야 되고, 저축 잘해야 부자가 되고. '어떻게 해야 행복해진다' — 이것들이 다 사회적인 조건 지어짐의 기준이고, 우리가 거기에 따르는 거다.\n\n기준에 맞게 살면서 행복할 수 있는 사람이 그렇게 많지 않다. 기준에 따를 수도 있다. 하지만 **내가 세운 기준** 이어야 한다. **내가 선택할 수 있어야 한다.** 나랑 안 맞으면 새로 세우는 거다. 그런데 우리나라는 기준이 하나로 딱 정해져 있어서, 거기서 벗어난 사람들은 다 스스로 실패자라고 생각한다. 본인 스스로 루저라 한다. 사회적으로 주어진 조건을 나의 과거, 현재, 미래에다가 투사해서 '내가 과거 잘못", "source": "essay"}, {"id": "essay_626_bcb8611b19", "text": "정해져 있어서, 거기서 벗어난 사람들은 다 스스로 실패자라고 생각한다. 본인 스스로 루저라 한다. 사회적으로 주어진 조건을 나의 과거, 현재, 미래에다가 투사해서 '내가 과거 잘못 살았다. 지금 현재 잘못 살고 있다. 앞으로 잘못 살게 될 것이다' 하고 자꾸 자기 스스로 조건을 지어 강화시키는 거다. **그거로부터 자유로워져야 된다는 얘기다.** 그러니까 우리가 '과거를 못 바꾼다'고 생각하잖아. **과거도 바꿀 수 있다.** 과거의 상황, 과거에 내가 경험했던 건 바꿀 수가 없지. 하지만 그걸 바라보는 **해석을 바꾸는** 거다.\n\n---\n\n#### **느낌에서 새로운 해석이 들어간다**\n\n해석을 어떻게 바꾸느냐. 그게 지혜다. 이걸 코칭으로 한다면, **내가 원하는 꼴(목표)** 에서 봐야 한다. 지금 내가 과거의 어떤 문제 때문에 시달리고 있다. 그러면 내가 원하는 상태가 있잖아. **해석을 지금 여기서 과거의 거를 해결하려고 하면 안 된다.** 더 미래의 시점도 아니고, 내가 원하는 상태. 이상적인 거. **꼴 상태에서 이걸 봐야 한다.** 그래야 새롭게 이 해석을 내가 다시 쓸 수가 있다. 과거의 조건 지어짐 때문에 수치심으로 나타날 수도 있고, 불안이나 두려움으로 나타날 수도 있다. 왜냐하면 **과거를 내가 계속 잘못 해석하고 있기 때문이다.** 우리가 어떤 경험을 한다. 그 경험을 해석할 때, 경험했을 때의 어떤 **느낌", "source": "essay"}, {"id": "essay_627_3896a71894", "text": "안이나 두려움으로 나타날 수도 있다. 왜냐하면 **과거를 내가 계속 잘못 해석하고 있기 때문이다.** 우리가 어떤 경험을 한다. 그 경험을 해석할 때, 경험했을 때의 어떤 **느낌** 이 있다. **이 느낌이 감정을 만든다.** 느낌에서 감정이 올라온다. 그럼 이 **감정과 나의 해석이 결합을 한다.** 그래서 내 몸 어딘가에 **무의식적으로 패턴으로 저장이 된다.** 그래서 **감정과 해석의 분리가 필요하다.** 그러면 이걸 어떻게 하느냐. 내가 이루고자 하고 바라고자 할 때, 그 성공한 상태의 **너무 기분 좋은 느낌** 이 있을 거 아닌가. **느낌에서 새로운 해석이 들어가야 한다.** 이건 명상을 하면서 체계를 잡아온 것이다. 이걸 알려주는 데가 없다. 마음에 대해서, 인간의 정서에 대해서 깊이 이해가 있어야지만 알 수 있는 거다.\n\n감정도 다루고 해석도 다루고, 미래도 다루고 꼴도 다루고 동시에. 코치들에게 아주 강력한 툴이 될 거다.\n\n---\n\n#### **조건 지어짐을 알아차리게 하는 법**\n\n그래서 한편으로, 사람들로 하여금 조건 지어졌다는 거를 어떻게 깨닫게 하느냐. **'이게 해결이 된 상태는 어떨 것 같냐'** 와 **'만약에 해결이 안 된 상태는 어떨 것 같냐'** 이렇게 두 가지 상태를 물어본다. 그러면 '내가 해결이 된 상태'가 '해결이 안 된 상태'에 대한 두 가지 조건에 지금 내가 매여 있구나, **조건", "source": "essay"}, {"id": "essay_628_0c483b8aba", "text": "된 상태는 어떨 것 같냐'** 이렇게 두 가지 상태를 물어본다. 그러면 '내가 해결이 된 상태'가 '해결이 안 된 상태'에 대한 두 가지 조건에 지금 내가 매여 있구나, **조건 지어짐** 그걸 이제 알게 된다. 비즈니스 코칭에서는 여기까지는 가면 안 되고, 영성 코칭에서는 이거를 해줘야 한다. 내가 이 조건 지어짐, 이 두 가지가 다 지금 조건 지어진 상태라는 걸 사람이 **알아차리게** 되는 거다. 여기서 **새로운 선택** 을 하게 해야 한다. 내가 원하고자 하는 상태도 역시 **조건 지어졌던 거** 라는 걸 알아차리게 해야 한다. 이 원한 것도 누군가한테 조건 지어진 걸로 내가 해석하고 있었던 거다.\n\n그래서 이 두 개가 다 조건 지어진 상태라는 걸 알고, 이 두 개의 조건 없이 **조건 지어지지 않은 상태의 새로운 상을 선택하게 해야 한다.** 이래야 **진정한 자유** 가 된다.\n\n이걸 알려주는 데가 없다. 코칭을 제대로 하려면 영성과 철학에 대한 깊은 이해가 있어야 한다. 마음과 인간의 정서를 깊이 알아야만 닿을 수 있는 자리다. 명상을 해본 사람만이 알 수 있는 것이기도 하다.\n\n---\n\n#### **코치도 심심함의 훈련이 되어 있어야 한다**\n\n코칭 프레젠스라는 게 바로 이 심심함 상태다. **심심함, 모호함.** 그래서 이 심심함과 모호함을 기꺼이 **초대할 수 있어야 한다.** 코칭 자리에. 이건 고객만이 아니고", "source": "essay"}, {"id": "essay_629_5be710d6f2", "text": "코칭 프레젠스라는 게 바로 이 심심함 상태다. **심심함, 모호함.** 그래서 이 심심함과 모호함을 기꺼이 **초대할 수 있어야 한다.** 코칭 자리에. 이건 고객만이 아니고 **코치도 그 자리에 들어가야 한다.** **코치들은 이 심심함의 훈련이 되어 있어야 한다.** 그래야 굉장히 예민하게 알아차림이 된다. **코치들부터 조건 지어짐에서 벗어나야** 고객들이 조건 지어졌다는 걸 알아차리게 해줄 수 있다. 그러니까 아주 미세한 조건 지어짐도 알아차려야 한다. 에고가 굉장히 교묘하기 때문에. 코치가 그거를 예민하지 않으면 그걸 못 알아챈다. 명상할 때도 마찬가지다. **에고의 교묘한 그거** 를 파악을 못 하면, 내가 예민하지 않으면.\n\n코치가 코칭을 할 때도 에고가 개입될 수 있다. 그래서 **선명하게 하려 한다,** 코치가 자꾸. 선명하게 내가 어떤 역할을 하고, 선명하게 고객이 어떤 알아차림이 되게끔 자꾸 하려 한다. 그걸 내려놔야 한다. **모호함을 질겨야 한다.**\n\n---\n\n#### **원하는 삶 자체도 고정된 조건 지어짐이다**\n\n코치들은 꼭 '내가 원하는 삶'을 새롭게 쓰기를 원한다. 그런데 **원하는 삶 자체도 고정된 조건 지어짐이다.** 사람들이 말할 때 '그렇게 하면 좋지 않을까요?' 이런 식으로 **남의 말을 빌려와서 말한다.** 어디서 '그래야 되는 거 아니냐'는 소리를 들었던 거다. 그게 정말로 자기가 원", "source": "essay"}], [{"id": "essay_630_f7c894cb40", "text": "사람들이 말할 때 '그렇게 하면 좋지 않을까요?' 이런 식으로 **남의 말을 빌려와서 말한다.** 어디서 '그래야 되는 거 아니냐'는 소리를 들었던 거다. 그게 정말로 자기가 원하는 게 아니고, 사회에서 조건 지어진 거다. 코치들도 여기서 괴리를 느낀다. '고객이 원하는 대로 해도 될까?' 이런 생각이 드는 거다. **진짜 원하는 게 뭔지를 끌어내 주는 것도 코치의 역할** 인데, **그것조차도 조건 지어졌다는 거를 알아차리게 해야 한다.**\n\n코치들이 진짜 **알아차림을 잘해야 하는 게,** 고객의 말을 딱 듣고 '이게 뭔가 괴리가 있다, 어폐가 있다, 아니면 다른 사람 말을 빌려온 것 같다' 이런 거를 섬세하게 체크해야 한다. '방금 하신 말씀은 진짜 마음에서 우러나왔다기보다는 생각을 통해서 하신 말씀 같은데, 어떻게 생각하세요?' 이렇게 물어보면, 사람들이 다시 생각해보고 '와, 이거는 사실 진짜 제가 원하는 거 같진 않고, 사회생활을 하면서 좋다고 들었던 것 같다' 이런 식으로 말을 한다.\n\n---\n\n#### **사례를 만들어야 한다**\n\n이 방법은 임상 사례를 만들어야 한다. 코치들에게 아주 강력한 툴이 될 거다. 고가 코칭을 팔 때는 어떻게 해야 하느냐. 퍼널, 깔때기 효과가 있다. 예를 들어 시간당 50만 원을 받는다. 10명이 신청해서 5명이 환불을 해도 250만 원이다. 5만 원짜리로 250만 원을 벌려면 50명을", "source": "essay"}, {"id": "essay_631_49b49cda0e", "text": "하느냐. 퍼널, 깔때기 효과가 있다. 예를 들어 시간당 50만 원을 받는다. 10명이 신청해서 5명이 환불을 해도 250만 원이다. 5만 원짜리로 250만 원을 벌려면 50명을 해야 한다. **마음에 안 들면 100% 환불해 주겠습니다.** 그러면 고객은 부담 없이 한번 해본다.\n\n진짜 그게 퍼널이다. 무료도 많이 해주고, 수준별로 올라오면 여기는 단가가 높아야 한다. 그게 서로에게 **정당한 값** 이다. 6년 동안 공부해서도 못 찾은 거를 거기서 찾게 해주는 거니까. **조건 지어지지 않는 자유로운 삶을 살게 하자.** 그게 이 모든 것의 방향이다. 코치들을 가르치고, 코치들이 일반 사람들을 만나고, 학교에서도 아이들에게 코칭 철학을 알려준다. 아이들에게 말해주는 사람이 없었던 거다. **'너는 자율적이고 창의적이고 네 안에 해답이 있다'** 이런 얘기를 해주는 사람이. 다 '넌 이거 틀렸어, 맞았어. 답이 이건데 왜 그렇게 안 써?' 이렇게 하는 사람만 있었다. 코칭을 접하고 나서야 그게 달라졌다. 아이들의 눈이 똘망똘망해지는 건 그 말을 처음 들어서다. 이론적인 배경을 계속 정립해 놓으면, 코칭으로 풀고, 콘텐츠로도 풀고. **아빠의 업그레이드 버전이 너희** 아닌가. 그렇게 같이 가는 거다. #조건지어짐 #참나의오해 #심심함과창조 #감정과해석의분리 #코칭프레젠스\n\n--- (구분선)\n\n[파일명: 조건지어짐해소_글쓰기와분리_수", "source": "essay"}, {"id": "essay_632_d163ac6bcb", "text": "이 너희** 아닌가. 그렇게 같이 가는 거다. #조건지어짐 #참나의오해 #심심함과창조 #감정과해석의분리 #코칭프레젠스\n\n--- (구분선)\n\n[파일명: 조건지어짐해소_글쓰기와분리_수필.md]\n\n### **조건지어짐해소_글쓰기와분리_수필**\n\n#### **글로 써봐**\n\n생각으로 떠올리면 그 사람 얼굴까지 같이 뜬다. 그때 들었던 말, 억울했던 장면, 치밀어 오르던 감정이 뒤죽박죽 한꺼번에 올라온다. 이미지와 스토리와 감정이 동시에 동원되면 힘이 세진다. **리얼리티가 확장** 된다. 아드레날린이 솟고 호르몬이 나오고, 너무 **실체화돼** 버리니까 생각할 때마다 속이 상하고 불안하고 분해진다. 그걸 글로 써보면 달라진다. **글쓰기가 치유** 가 되는 건 그래서다. 글로 쓰면 객관화된다. 머릿속에서 나올 때처럼 강하지 않다. 뇌에서 나오는 것은 기승전결이 없고, 이랬다저랬다 하고, 결론도 없이 그 찝찝한 감각이 계속 이어진다. 그런데 글로 쓰면 어쨌든 단락이 져버린다. 끝이 생긴다. 에너지가 계속 이어지지 않는다. 중요한 건 거기다 감정까지 다 실어버리지 않는 거다. 사진까지 붙이면 더 생생해지고, 그 스토리 안으로 또 빠져든다. 그냥 있었던 사실 스토리만 쓰는 것이다. 그러면 이렇게 된다. **'이거는 그냥 내가 얘기였구나. 그런 일이 있었는데, 이걸 내가 다시 돌이킬 수는 없지. 그냥 나를 위해서 용서하자.'**\n\n**나하고 있었던", "source": "essay"}, {"id": "essay_633_20dad1421c", "text": "는 것이다. 그러면 이렇게 된다. **'이거는 그냥 내가 얘기였구나. 그런 일이 있었는데, 이걸 내가 다시 돌이킬 수는 없지. 그냥 나를 위해서 용서하자.'**\n\n**나하고 있었던 사건하고 분리를 시킨 거다** .\n\n---\n\n#### **잊으라는 말은 틀렸다**\n\n사건이 없었다는 게 아니다. 잊으라 하면 잊어지지 않는다. 오히려 더 강화된다. \"다 지난 일이잖아, 잊어.\" 옆에서 위로한답시고 하는 말인데, 이 사람은 그게 잊어지지 않는다. 생생하게 자기가 경험했던 건데. 하지만 그것은 단지 나한테 벌어졌던 **이벤트** 였던 거다. **지금 내가 그것 때문에 굳이 고통을 받을 필요는 없다는 얘기다** . 감정도 꺼집어내봐야 한다. 그때 기억나는 장면, 떠오르는 것들을 다 써보면 솟아 있던 감정도 해소된다. 그러면서 사건과 감정과 장면을 **분리시킬 수가 있다** . '이거는 감정에 대한 기억이구나. 이 스토리에 대한 기억이구나. 장면에 대한 기억이구나. 그것 때문에 내가 굳이 고통받을 필요가 없겠구나.' 생각날 때마다 화가 나면, 그게 더 생생하게 살아나도록 **내가 계속 강화시키는 거다** . 거기다 에너지를 또 넣어주는 것이다. 그러니까 10년, 20년이 지나도 옛날 얘기를 계속 하게 된다.\n\n---\n\n#### **피해자 코스프레**\n\n사람들이 그 기억을 잊고 싶지 않은 데는 이유가 있다. 단순히 억울해서가 아니다. 그것이 자기", "source": "essay"}, {"id": "essay_634_3ef294ef34", "text": "지나도 옛날 얘기를 계속 하게 된다.\n\n---\n\n#### **피해자 코스프레**\n\n사람들이 그 기억을 잊고 싶지 않은 데는 이유가 있다. 단순히 억울해서가 아니다. 그것이 자기 자신이라고 믿기 때문이다. 피해자의 자리는 인정 욕구가 숨어있는 자리다. '나는 이렇게 피해를 많이 본 사람이야'라는 서사는, 뒤집어 보면 '그러니 너희는 나를 감싸줘야 해', '나를 함부로 대하면 안 돼'라는 보호 요청이기도 하다. 잘난 경험을 반복해서 꺼내 드는 것도, 힘들었던 기억을 끝없이 되씹는 것도, 결국 같은 뿌리에서 나온다. 인정받고 싶다는 것. 그 욕구를 알아채야 한다. 인정해주는 것이 먼저다. 그것 없이 \"그건 네 생각이야\", \"그냥 잊어버려\"라고 말하면 반발심만 남는다.\n\n나의 삶에는 굉장히 많은 부분이 있다. 우리가 바라봐야 될 부분이 많은데, 그 어떤 일부분만을 계속 강조하면서 강화시키니까 내 삶이 거기에 매인다. **조건 지어져 버린 거다** .\n\n---\n\n#### **조건 지어짐으로부터의 자유**\n\n**조건 지어짐으로부터의 자유** . 불교에서 말하는 니르바나, 열반이 그거다. 조건으로부터의 자유다. 어디 죽어서 불국토에 가는 게 아니다. **내가 이런 조건에 매여 있었다는 걸 알아야 된다** . 그게 정견이다. 지혜의 눈으로 봐야 보인다. '이게 실체가 아니고, 예전에 그런 일이 없었다는 건 아니지만.'\n\n그게 중요하다. **인정이", "source": "essay"}, {"id": "essay_635_777e5aa5d4", "text": "에 매여 있었다는 걸 알아야 된다** . 그게 정견이다. 지혜의 눈으로 봐야 보인다. '이게 실체가 아니고, 예전에 그런 일이 없었다는 건 아니지만.'\n\n그게 중요하다. **인정이 들어가야 한다** . '네가 그땐 참 힘들었겠구나. 맞아, 너 힘들었어.' 아무리 상대방에게 그럴 의도가 없었다 해도, 내가 느꼈으면 그건 맞다. 인정 욕구를 바라는 사람에게는 인정이 먼저다. 그런 다음이다. '하지만 힘든 거를 지금까지 계속 끌고 올 필요는 없지 않니?' **너는 그것보다 훨씬 더 많은 삶을 살아내야 되기 때문이다** . 더 많은 것을 경험하고, 더 많은 사람들과 관계를 맺고, 더 좋은 삶을 살아야 한다. 이거에 매여서 계속 넘어지면, 나머지의 넓고 열려있는 삶이 불쌍해진다. 그러니까 그 사람을 위해서가 아니다. **너 자신을 위해서다** . 너가 알아주기를 바라는 무수한 관계와 상호작용들, 네가 선택할 수 있는 많은 선택지들, 다 기다리고 있다. 그것들을 향해서 가기 위해서 **기억을 놔주라는 거다** . 사람을 놔주라는 게 아니고. **연민이 그거다** . 이게 어떻게 보면 **자기 돌봄** 이다. 자기 돌봄이 돼야 다시 조건 지어짐이 아닌 새로운 자리에서 사람들을 보게 된다. 그러면 과거의 사람을 용서하고 말고는 **내 선택** 이다. 하고 싶으면 하고, 안 하고 싶으면 안 해도 된다. 하지만 **이 조건 지어짐은 내가 풀어놔 줘야", "source": "essay"}, {"id": "essay_636_f343de6dfc", "text": "람들을 보게 된다. 그러면 과거의 사람을 용서하고 말고는 **내 선택** 이다. 하고 싶으면 하고, 안 하고 싶으면 안 해도 된다. 하지만 **이 조건 지어짐은 내가 풀어놔 줘야 되는 것이다** .\n\n---\n\n#### **인식의 범위**\n\n나를 위해서, 열려있는 무수한 삶을 위해서, 이 **조건을 해소시켜야 한다** . 사람들이 어려움을 겪는 부분들이 다 그런 거다. 과거의 기억, 미래에 올지 안 올지도 확실하지 않은 불안. 그런 것들이 조건으로 강화돼 있고 **실체화돼** 버리니까, 우리 **인식의 범위가 굉장히 좁아진다** . 그 인식하는 것을 나라고 인식한다. 의식은 누구나 다 있다. 산도 보고, 별도 보고, 수백 광년 떨어진 별도 우리가 보는 것이다. **의식은 무한하다** . 끝이 없다. 의식이 그렇게 넓은데, 그걸 나라고 인식하지 않는다. 내가 인식하는 것만 나라고 인식하기 때문이다. 몸이 너무 강력하게 인식되니까 이걸 나라고 느낀다. 내 차라고 인식하니까 그게 내 차인 것이다. 기억상실증이 걸리면 그게 내 찬지도 모른다. **인식의 범위를 확장시켜 줘야 한다** . 그 일련의 작업으로서 기억의 **조건 지어짐을 풀어주는 작업** 이 필요하다. #글쓰기 #조건지어짐 #분리 #인식의범위 #자기돌봄\n\n--- (구분선)\n\n[파일명: 존재보다관계_이벤트장_수필.md]\n\n### **존재보다관계_이벤트장_수필**\n\n#### **존재가", "source": "essay"}, {"id": "essay_637_0d67bacb4a", "text": "글쓰기 #조건지어짐 #분리 #인식의범위 #자기돌봄\n\n--- (구분선)\n\n[파일명: 존재보다관계_이벤트장_수필.md]\n\n### **존재보다관계_이벤트장_수필**\n\n#### **존재가 아니라 관계다**\n\n사람들이 보통 **존재** 를 많이 생각한다. '나', '너', '우리', '남' 이런 것들. 그런데 사실 개별적인 존재라는 것은 우리 개념 속에 있는 거다. 이 전체가 다 통으로 한꺼번에 존재하는 거잖아. 관념적으로 우리가 파악하는 것일 뿐이다. 그러니까 존재보다 **관계** 를 생각해야 한다. 내가 어떤 일을 하거나 누구와 관계를 맺거나 할 때, **그 관계 속에서 벌어지는 이벤트** 를 생각해야 한다는 거다. 그런 생생한 삶의 이벤트들이 관계 속에서 벌어진다. 그러니까 이제 이벤트가 잘 벌어지도록, 잘 발생하도록 조직 구성원들이 관계 맺음을 하고 상호작용을 하면 그 이벤트가 아주 잘 벌어지게 된다. 하지만 **개인의 자기 존재만을 생각한다면** , 그런 이벤트 속에서 자기 존재를 더 중요하게 여긴다면, 그 이벤트가 제대로 잘 안 벌어지고 마찰이 일어나고 불협화음이 생기게 된다는 거다. 그래서 조직 구성원이나 리더도, 학교 선생님들도 마찬가지다. **어떻게 장(場)이 잘 펼쳐질 것인가** , 그 장 속에서 이벤트가 잘 펼쳐지고 진행될 것인가를 염두에 둬야 일이 잘 성사된다.\n\n---\n\n#### **이벤트 장과 나를 분리시키지 말라**", "source": "essay"}, {"id": "essay_638_9b0c4b76e7", "text": "장(場)이 잘 펼쳐질 것인가** , 그 장 속에서 이벤트가 잘 펼쳐지고 진행될 것인가를 염두에 둬야 일이 잘 성사된다.\n\n---\n\n#### **이벤트 장과 나를 분리시키지 말라**\n\n세상을 향할 때, 그 이벤트 장 속에서 자기 존재를 생각한다는 것은 그 이벤트와 나를 분리시키는 거다. 그 장과 나를 내 스스로가 분리시키면서, 그 속에서 뭔가 내가 이득을 얻고 싶다고 생각하면 안 된다. 그런데 이게 어떤 일에 참여할 때 자꾸 이런 생각이 든단 말이다. \"내 존재감이 없는 거 아닌가?\", \"나는 없는 거 아니야?\" 예를 들어 절에서 행사를 할 때, 그 속에서 일을 하면 \"내 개인적인 수행은 없는 거 아니야?\" 이렇게 생각하는 거다. **내가 손해를 본다** 고 생각하는 거다. 반대로 상대를 너무 많이 배려하고 너무 친절하게 하는 것도 마찬가지다. 그것도 어떤 욕심이 끼었기 때문일 수 있다. 자기가 잘 보이고 싶고, 돋보이고 싶고, '난 이렇게 좋은 사람이야'라는 관념이 깃든 거다. 너무 본인에게 집착하는 것도 문제지만, **너무 과도하게 상대를 의식하고 배려하는 것도 옳지 않다.**\n\n**상대라기보다 상호작용이 어떻게 잘 일어나게 하느냐** , 그 관점에서 봐야 한다. 너와 내가, 또는 우리가, 또는 우리와 다른 조직이 어떻게 하면 상호작용이 잘 발생하고 그 속에서 이벤트가 잘 벌어지게 하느냐. 그런 관점으로 대해야 한다는 거다. 그래서", "source": "essay"}, {"id": "essay_639_fc485bb968", "text": "한다. 너와 내가, 또는 우리가, 또는 우리와 다른 조직이 어떻게 하면 상호작용이 잘 발생하고 그 속에서 이벤트가 잘 벌어지게 하느냐. 그런 관점으로 대해야 한다는 거다. 그래서 **존재보다 관계를 더 생각해야 한다** 는 것을 하나의 큰 틀에서 패러다임으로 만들고 싶다. 그걸 하나의 과정으로 만들고 싶다는 거다.\n\n---\n\n#### **코칭 프레젠스는 이벤트 장이다**\n\n지금 코칭도 자꾸 존재를 얘기한다. 고객의 존재, 코치는 어때야 하고 고객은 어때야 한다는 식으로. 그런데 중요한 것은 **코칭이 있어야 한다, 코칭이 벌어지고 있는 것이다** 라는 점이다. 코칭이 어떻게 벌어지고 있느냐가 중요한 거지, 거기서 고객이 중심이 될 수도 없고, 고객의 존재에 집중하거나 코치의 존재에 집중하면 안 된다. 코칭 프레젠스(Coaching Presence)라는 것이 결과적으로는 그 어떤 **이벤트 장** 이다. 코칭이 벌어지는 이벤트 장이 바로 코칭 프레젠스다.\n\n현존이라는 것은 그 이벤트에 참여하는 사람들이 상호작용이 활발하게 일어나면서 어떤 이벤트가 벌어진 것을 의미한다. 그것은 말하자면, 코치가 고객과 같이 춤을 추는 거다. 그러면 그 속에서는 행위, 즉 **춤만 존재하는 거지 고객도 아니고 코치도 아닌 거다.** 그냥 코치나 고객이 따로 존재하는 것이 아니라는 거다. 그 춤, 그 코칭이라는 춤에 하나의 그냥 거기에 녹아 있는 거다.", "source": "essay"}, {"id": "essay_640_bf8a47025a", "text": "춤만 존재하는 거지 고객도 아니고 코치도 아닌 거다.** 그냥 코치나 고객이 따로 존재하는 것이 아니라는 거다. 그 춤, 그 코칭이라는 춤에 하나의 그냥 거기에 녹아 있는 거다. 이런 것이 회사면 회사, 강의면 강의, 코칭이면 코칭, 가정이면 가정, 모든 부분에 적용이 될 수 있다. 그 장이 그때그때 바뀌겠지. **그때그때 그 장에 맞춰서 춤을 추고,** 그 장에 맞춰서 같이 돌아가야 한다. 춤을 추면 밀고 당기기를 해야 하는 것 아닌가. 서로 상대방이 밀면 내가 약간 밀려주고, 또 내가 밀면 상대방이 밀려주고. **서로 같이 밀면 불협화음이 생기는 것** 아닌가.\n\n---\n\n#### **존재에 집중하면 그 사람이 잘못된 게 된다**\n\n아이를 대할 때도 마찬가지다. 아이의 존재에 집중해버리면 어떤 일이 잘못 벌어지고, 그러면 \"네가 잘못해서 그랬다\" 하고 생각하게 된다. **존재에 집중해버리면 그 사람이 잘못한 게 된단 말이다.** 아이가 잘못을 했다. 그러면 그 아이라는 존재가 잘못된 게 아니잖아. 그게 어떤 이벤트가 벌어진 것뿐인 거다. 그러면 이제 그 이벤트에 초점을 맞춰서 바라보면, 아이를 존재적으로 비난하게 되지 않는다. 그 일이 그때 불협화음이 일어난 거다. 상호작용이 잘못 일어나거나 관계 맺음이 잘못된 것일 수 있는 거다. 그 아이가 친구 간이건, 야단치는 나 자신에게건, **관계 맺음에서의 행동** 에 잘못됨을 잡아주는", "source": "essay"}, {"id": "essay_641_deb585ee13", "text": "어난 거다. 상호작용이 잘못 일어나거나 관계 맺음이 잘못된 것일 수 있는 거다. 그 아이가 친구 간이건, 야단치는 나 자신에게건, **관계 맺음에서의 행동** 에 잘못됨을 잡아주는 거지, 그 아이가 못된 아이라서 잡아주는 게 아니다. **존재를 바꾸려 하면 안 된다.** 걔 존재는 존재지만, 걔가 관계 맺음에서의 행동에 올바른 방향을 잡아줘야 하는 거다. 그래서 코치들한테도 얘기한다. \"고객의 존재를 얘기하면서 또 변해야 된대. 그러면 고객의 존재를 바꾼다는 거 아니야.\" 그게 문제다.\n\n---\n\n#### **코칭도 고객에게 끌려가면 안 된다**\n\n코칭에서 \"고객이 원하는 대로 데려가 줘야 된다\"고 할 때, 고객의 존재에 집중하니까 고객이 원하는 대로 가게 된다. 그런데 고객이 만약 잘못된 길을 가고 있다면, 코치가 오히려 그 역할을 해주게 되는 거다. 잘못되는 길 가는 데 도움이 되는 거다. 코치가 그 사람의 의도를 100% 파악하는 건 아니다. 대화니까. 본인 스스로도 의도가 있지만 그게 명확하게 표시되지 않으니까, 모르고 도와주는 격이 돼버리는 거다. 이벤트 장에 집중한다는 것은 그래서 단순히 고객에게 맞춰주는 게 아니다. **코칭이 어떻게 벌어지고 있느냐** , 그 상호작용 속에서 무엇이 일어나고 있느냐를 함께 보는 거다. 춤을 추되, 서로 같은 방향으로만 밀면 안 된다. 그게 관계이고, 그게 이벤트 장이다. #존재보다관계 #", "source": "essay"}, {"id": "essay_642_ddadeef8c8", "text": "느냐** , 그 상호작용 속에서 무엇이 일어나고 있느냐를 함께 보는 거다. 춤을 추되, 서로 같은 방향으로만 밀면 안 된다. 그게 관계이고, 그게 이벤트 장이다. #존재보다관계 #이벤트장 #코칭프레젠스 #상호작용 #관계맺음의철학\n\n--- (구분선)\n\n[파일명: 존재와인식_같은판속에서_수필.md]\n\n### **존재와 인식, 같은 판 속에서**\n\n#### **아이의 경로는 내 것이 아니다**\n\n아이가 어릴 때는 세상을 만나는 접점이 엄마 아빠 그 경계 안에 있다. 그때는 어느 정도 영향력을 미칠 수 있다. 그런데 유치원을 가고 학교를 가면 만나는 접점이 엄청나게 늘어난다. 엄마 아빠의 영향력은 그만큼 줄어든다. 고등학교, 대학교를 졸업하면 더욱 그렇다. **아이의 경로는 그 아이가 만나온 수많은 접점들의 연장선이다.** 그런데 부모가 어렸을 때 아이에게 이렇게 저렇게 했다는 것도, 부모 자신이 살면서 겪어온 많은 접점에서 형성된 것이다. 부모의 선택도 사실은 부모의 수많은 접점에서 나온 것이다. 그러니까 내 생각과 의지로 아이의 인생이 어떻다 저떻다, 어떻게 됐으면 좋겠다 판가름을 내릴 수 없다. 아이의 삶이나 내 삶이나 전체적으로 통으로 수많은 인연들과 접점에서 일어나는 하나의 현상이다. 과거에 그렇게 했으면 애가 더 잘 컸겠거니 하고 후회할 필요가 없다. 앞으로 어떻게 컸으면 좋겠다 해도 내 의도대로 돼주질 않는다. **내 생각과 의", "source": "essay"}, {"id": "essay_643_25a15171c7", "text": "서 일어나는 하나의 현상이다. 과거에 그렇게 했으면 애가 더 잘 컸겠거니 하고 후회할 필요가 없다. 앞으로 어떻게 컸으면 좋겠다 해도 내 의도대로 돼주질 않는다. **내 생각과 의지는 아주 부수적인 작은 부분이기 때문이다.**\n\n---\n\n#### **촛불 하나가 타면**\n\n촛불이 하나 타고 있다. 주위가 환하게 비춰진다. 그런데 이것은 촛불과 주위에 환하게 비춰지는 것과 초 — 이 세 가지가 개별적으로 일어나는 현상이 아니다. 촛불이 타니까 주위가 환해지는 것과, 촛불을 일으키는 초가 **전체적으로 하나로 돌아가는 것** 이다. 그런데 우리는 이것을 개별적으로 띄어놓고 생각한다. 촛불이 어떻게 바뀌면 이 방이 천국으로 바뀌지 않을까, 법당으로 바뀌지 않을까, 촛불이 흔들리면 지옥으로 바뀌지 않나 — 이렇게 생각하는 것이다. 어느 한 가지 요소를 바꾼다고 해서 맞물려 돌아가는 전체 현상을 내가 원하는 방향으로 바꿀 수 없다. 그냥 통째로 돌아가는 이것을 믿고 맡길 수밖에 없다. 80억 명의 인류가 있으면 80억 개의 촛불이 다 그렇게 세상을 비추고 있다. 우리 아이도 지금 자기 방에서 촛불이 켜졌으면, 그 방을 밝히는 역할을 다 하고 있는 것이다.\n\n---\n\n#### **존재와 인식은 둘이 아니다**\n\n나무가 있다. 나무가 나무로 보인다. 당연하다. 나무로 보인다는 것은 내가 이미 나무를 온전히 받아들이고 있다는 것이다. 그런데 거기서", "source": "essay"}, {"id": "essay_644_4758b1f120", "text": "#### **존재와 인식은 둘이 아니다**\n\n나무가 있다. 나무가 나무로 보인다. 당연하다. 나무로 보인다는 것은 내가 이미 나무를 온전히 받아들이고 있다는 것이다. 그런데 거기서 꽃으로 보고 싶어 한다. 이것은 당연한 것을 당연하지 않게 하고 싶은 것이다. 거기서 고통이 따른다. **존재와 인식은 둘이 아니다.** 항시 같이 드러난다. 인간에게는 의식이 발현되는데, 의식은 있는 그대로 통으로 받아들이는 것이다. 인식은 그 의식 속에서 특정 부분을 잡아쓰는 것이다. 컵이 있는 자리에 다른 것들도 많이 있지만 커피를 마셔야겠다는 생각이 드니까 컵으로 인식되는 것이다. 그런데 우리는 인식이 다르게 되기를 바란다. 저 컵이 값비싼 컵으로 인식되기를 바란다. 이것은 인식을 의식으로 바꾸고 싶은 것이다. 그냥 알려지는 것을 어떻게 바꾸겠는가. **바꿀 수 없다.** 그런데 바꾸고 싶으니까 자가당착이 일어나는 것이다.\n\n---\n\n#### **같은 판을 딴판으로 바꾸려는 모순**\n\n애랑 나랑 같이 있으면 같은 판이다. 이 판에서 나를 딱 떼내 가지고 뭔가 바꾼 나로 판에 새로 있고 싶은 것 — 이것은 엄청난 모순이다. 같이 한 판인데 떼어진 판은 존재할 수 없다. 떼버리면 그것은 완전히 딴판이다. 합쳐진 판 속에서 내가 원하는 판으로 돌아가기를 바라는 것이 넌센스다. 지극히 당연한 것을 당연한 것으로, 당연한 한 판으로 보면 되는데 딴판으로 바꾸", "source": "essay"}, {"id": "essay_645_9034432300", "text": "면 그것은 완전히 딴판이다. 합쳐진 판 속에서 내가 원하는 판으로 돌아가기를 바라는 것이 넌센스다. 지극히 당연한 것을 당연한 것으로, 당연한 한 판으로 보면 되는데 딴판으로 바꾸려고 하는 것이다. 우리 아이가 서울에 있어도 같은 판이다. 거리의 차이만 있을 뿐이다. 아이를 생각하지 않아도 같은 우주에서의 한 판 속이다. 그러니까 **우리가 할 수 있는 최선은 당연하게 받아들여지는 것을 당연하게 받아들이는 것** 이다.\n\n---\n\n#### **알아차림도 의도다**\n\n마음 챙김을 하면 이것이 변할 것이다, 알아차림을 하면 주변이 바뀔 것이다 — 이것도 의도가 들어간 것이다. 내가 원하는 식으로 뭔가 바뀌기를 원하는 마음이 있기 때문에 알아차림을 하는 것이다. 수행하지 않는 사람들은 물질적인 현상 세계를 바꾸려 하고, 수행자들은 인식을 바꾸려 한다. 그런데 그것이 괴리감이다. 사실 우리는 이미 100% 있는 그대로를 받아들이고 있다. 존재와 인식이 하나로 돌아가고 있다. 이렇게 보여지고, 냄새 맡아지고, 배고프면 밥 먹고, 겨울이 되면 춥고 — 당연한 것이 당연하게 드러나고 있다. 거기서 또 다른 알아차림이나 마음 챙김이 필요한 것이 아니다. **바라는 만큼의 고통이 따른다.** 조건을 바꾸려는 의지가 강하면 강할수록 고통은 더 커진다. 내가 왜 이런 조건을 지금 들이대고 있는지, 그것을 돌아보는 것이 중요하다. 대상을 바꾸려 하는 것이", "source": "essay"}, {"id": "essay_646_817f8d83aa", "text": "고통이 따른다.** 조건을 바꾸려는 의지가 강하면 강할수록 고통은 더 커진다. 내가 왜 이런 조건을 지금 들이대고 있는지, 그것을 돌아보는 것이 중요하다. 대상을 바꾸려 하는 것이 아니라, 내가 왜 그런 관점으로 보고 있는지를 보는 것이다. #존재와인식 #같은판 #촛불비유 #바라는만큼고통 #당연함\n\n--- (구분선)\n\n[파일명: 좌뇌우뇌_통제와확장_수필.md]\n\n### **좌뇌우뇌_통제와확장_수필**\n\n#### **우뇌만 남았을 때**\n\n테일러라는 여자 뇌과학자가 있다. 좌뇌에 뇌출혈이 일어나 어느 정도 기능이 다 소멸을 해버렸다. 우뇌만 활성화된 거다. 그러면서 완전히 우주와 합일이 되고, 내가 어디까지가 경계인지 구분이 안 가는 상태가 됐다. 좌뇌는 언어적인 기능을 담당한다. 그동안 학습되어 온 것들, 부모로부터 들은 것, 학교에서 배운 것, 매스컴이나 여러 곳에서 언어적으로 들은 개념들, 관념들. 그것들로 계속 뭔가를 구성하는 쪽이다. '나는 이런 사람이야', '나는 이런 일을 하는 사람이야', '나는 이런 신념이 있어', '나는 이래야 돼', '이러면 안 돼', '저러면 안 돼'. 주로 안 되는 쪽이 많다. 왜냐하면 **좌뇌는 통제하고, 비교 판단하고, 잘했다 못했다 따지는** 쪽이기 때문이다. 반면 우뇌는 경계가 없고 구분이 없다. 감성이라든가, 공감각, 사랑, 연민 같은 것들이 우뇌에 있는 이유가 그거다. 너와 나의 구분이", "source": "essay"}, {"id": "essay_647_78b7cadcfa", "text": ", 잘했다 못했다 따지는** 쪽이기 때문이다. 반면 우뇌는 경계가 없고 구분이 없다. 감성이라든가, 공감각, 사랑, 연민 같은 것들이 우뇌에 있는 이유가 그거다. 너와 나의 구분이 없으니까 '이거 너 가져' 할 수도 있지만, 남의 것을 그냥 가져올 수도 있는 거다. 모르는 사람 것도 내가 가져다 먹을 수 있는 거고, 일인칭이 되어버리는 거다. 그리고 좌뇌가 하는 얘기를 우뇌가 듣는 역할을 한다.\n\n---\n\n#### **막행막식과 통제자**\n\n깨달은 사람 중에 그런 사람들이 있다. 아무 집에나 가서 그냥 드러누워서 자고 먹고, 너와 나의 구분이 없으니까. 그걸 **막행막식** 이라 한다. 졸리면 자고, 술 먹건, 고기를 먹건, 자기는 다 여여해서 아무 문제가 안 된다고 하는 스님도 있다. 그런데 세상 모든 사람이 그렇게 할 수는 없잖아. 사회적인 규범이 있는 것이고, 그거를 **통제해 주는 역할을 좌뇌가 한다.** 뇌가 무한정으로 확장하고 한쪽으로 치우쳐서 자기 영역의 구분 없이 무한정 뻗어 나가는 걸 적절히 통제해주는, **통제자의 역할** 인 거다. 이너게임에서 **셀프 원(Self 1)의 역할** 을 좌뇌가 해주는 거다. 근데 얘가 자꾸 제한을 하니까 우뇌가, 우리가 뭘 하고 싶어도 못 하는 거다. 우뇌는 제한을 받지 않으면 굉장히 능력을 발휘한다. 잠재의식 쪽하고도 연결되어 있다고 봐야 하는데, 제한이 없으니까 여러 가지 내가", "source": "essay"}, {"id": "essay_648_aba6775bf8", "text": "뇌가, 우리가 뭘 하고 싶어도 못 하는 거다. 우뇌는 제한을 받지 않으면 굉장히 능력을 발휘한다. 잠재의식 쪽하고도 연결되어 있다고 봐야 하는데, 제한이 없으니까 여러 가지 내가 생각했던 거 이상의 성과를 낼 수가 있다. 기술을 빨리 습득한다든가, 예술을 한다든가 하면, 좌뇌에서 봤을 때 '이런 색깔을 써도 되나?', '원래 스탠다드가 있는 거 아니야? 거기에 맞춰서 그려야 되는 거 아니야?' 하고 자꾸 통제를 한다. 그 통제가 없어지면 자유롭게 그리게 된다. 고정관념이 없어져 버리니까.\n\n가수들이 대마초 같은 걸 피면 이 좌뇌가 스톱해버린다. LSD 마약도 마찬가지다. 그러면 우뇌가 활성화되니까 평상시에 생각지도 못했던 노래를 확 부르고 노래가 너무 잘되고, 세상이 너무 아름답고 사랑스러워진다. 군인들이 싸우려 하질 않고 참새에게 집 지어줘야 한다고 하는 거다. 물론 그렇게 되어도 문제는 없지만, 그거는 한편으로 보면 **어린애와 같은 마음일 수도 있고, 미성숙 기제일 수도 있는 거다.**\n\n---\n\n#### **셀프 원의 목소리를 잠재우는 것**\n\n이너게임에서 주 초점이 뭐냐면 이 **셀프 원의 목소리를 잠재우는 거** 다. 공을 칠 때 공이 날아오는 거에 집중하라고 한다. 공이 어떤 높이로 날아왔냐. 그러면서 **공의 어떤 때가 너의 흥미를 끌었냐** , **그럴 때 느꼈던 감각에 집중하라** 고 한다. 명상도 마찬가지다. 스탠", "source": "essay"}, {"id": "essay_649_7c64145af4", "text": "에 집중하라고 한다. 공이 어떤 높이로 날아왔냐. 그러면서 **공의 어떤 때가 너의 흥미를 끌었냐** , **그럴 때 느꼈던 감각에 집중하라** 고 한다. 명상도 마찬가지다. 스탠퍼드 대학교 교수가 얘기할 때 명상을 하면 집중 공백이 없어진다고 한다. **호흡에 집중하라.** **느낌에 집중해서 그 전체적인 인식의 범위를 확장시키라** 는 거다.\n\n셀프 원을 잠재우면, 이너게임의 공을 호흡으로 대입시켜 볼 수 있다. 이너게임에서의 공이 날아오는 궤적, 거기서 내가 흥미를 끄는 게, 스탠퍼드 교수가 얘기하는 호흡에 집중하는 거랑 같은 거다. 감각에 집중하는 것도 똑같다. 양쪽 다 그렇게 하면 **좌뇌가 조용해진다.** 테일러 교수가 얘기하는 좌뇌의 재잘거림이 조용해진다는 거다. 이너게임에서도 셀프 원이 계속 옆에서 재잘거린다. **'너 그렇게 하면 안 돼', '지금 잘못된 폼이잖아.'** 이렇게 하니까 못 한다는 거다. 어떤 규정된 포맷에 자기를 자꾸 맞추려 하니까. 지금 세 가지 사례가 나왔다. 테일러라는 여자 뇌과학자, 스탠퍼드 남자 교수, 그리고 이너게임. 이 세 가지를 조합해보면, 몸을 써서 하는 활동이라든가 창조적인 일, 그림을 그린다든가 음악 활동 같은 비언어적인 활동들을 할 때, **명상 수행을 하는 것도 마찬가지다. 명상 수행이 다 그런 거다. 좌뇌의 목소리를 잠재우는 거다.**\n\n---\n\n#### **표상과 실상**", "source": "essay"}, {"id": "essay_650_8b6c2ae78f", "text": "같은 비언어적인 활동들을 할 때, **명상 수행을 하는 것도 마찬가지다. 명상 수행이 다 그런 거다. 좌뇌의 목소리를 잠재우는 거다.**\n\n---\n\n#### **표상과 실상**\n\n깨달음의 요체가 바로 그거다. 좌뇌의 재잘거림이 **이게 실제가 아니다** 는 것을 아는 거다. '이거는 뭐고, 저거는 뭐야?' 하는데 그거는 개념이고 말일 뿐이지 실제가 아니잖아. '사과 맛이 어때?' 하면 뭐 달고 이렇다고 떠든다. 그건 사과가 아니잖아. **표상인 거다. 실상이 아닌 거다.** 표상과 실상을 딱 구분 지어주는 게 깨달음이다. 이너게임에서도 목표 설정을 할 때는 좌뇌를 써야 한다. 그런데 그 목표를 **설정까지 가는 과정에서는 우뇌을 쓰는 거다.** 좌뇌를 스톱시키고. 좌뇌에서 재잘거림이 오면 그거를 알아차려서 스톱시키기가 운동을 하면서는 쉽지 않다. 그래서 공에 집중하게 만드는 거다. 나의 감각에 집중하고 공에 집중하면 **완전히 지금 여기에 집중하게 된다.** 명상도 지금 그런 거다.\n\n---\n\n#### **나무 하나와 숲 전체**\n\n일상적으로 명상할 때는 '내가 또 끄달리는구나' 하고 이 좌뇌 움직임을 딱 알아채고 스톱시킬 수 있다. 쉬운 건 아닌데, 어느 정도 명상이 많이 돼야지만 그게 스톱이 된다. 운동할 때는 날아오는 공에 집중함으로써 좌뇌를 스톱시키는 거다. '내가 이거 공 치면서 딴 생각하고 있네. 이러면 안 되지' 하는 순", "source": "essay"}, {"id": "essay_651_68bda56c26", "text": "정도 명상이 많이 돼야지만 그게 스톱이 된다. 운동할 때는 날아오는 공에 집중함으로써 좌뇌를 스톱시키는 거다. '내가 이거 공 치면서 딴 생각하고 있네. 이러면 안 되지' 하는 순간 벌써 거기 가버린 거다.\n\n어쨌든 지금 여기에 집중하면 좌뇌가 조용해진다. 좌뇌는 시간 속에 사는 뇌다. 언어는 순서가 있어야 말이 된다. 기가 나오고, 승이 오고, 전이 오고, 결이 와야 한다. 갑자기 결이 튀어나왔다가 기로 돌아가면 알아들을 수 없다. 논리는 순서를 따르는 것이고, 좌뇌는 그 논리의 집이다. 그래서 좌뇌는 시간의 영향을 받는다. 반면 우뇌는 전체를 한꺼번에 느낀다. 좌뇌는 나무 하나하나를 보고, 우뇌는 숲을 본다. 지금 여기에 집중하면 시간의 순서를 따르는 좌뇌가 조용해진다. 그때 숲이 보이기 시작한다. 스탠퍼드 교수가 얘기하는 것도 **전체적인 시각을 가지라** 는 거다. 하나의 작은 인지에 초점을 잡지 말고, **넓은 인지 능력을 확장시키라** 는 거다. 그게 우뇌를 쓰는 거다.\n\n---\n\n#### **명상과 ADHD**\n\nADHD는 인식의 폭이 좁다. 좌뇌 우뇌 상관없이. 그런 집중력은 높은 반면에 폭이 상당히 좁고 생각의 멈춤도 길다. A 다음에 B도 찾고 C도 찾을 수 있게, 집중의 공백 기간을 줄여나가야 하는데, 대상이 옮겨가면 맥락이 안 생기고 전체를 못 보게 된다.\n\n명상을 하면 생각의 멈춤이 줄어들고 인식의 폭이 넓어진", "source": "essay"}, {"id": "essay_652_18b2b64a9f", "text": "찾고 C도 찾을 수 있게, 집중의 공백 기간을 줄여나가야 하는데, 대상이 옮겨가면 맥락이 안 생기고 전체를 못 보게 된다.\n\n명상을 하면 생각의 멈춤이 줄어들고 인식의 폭이 넓어진다. **확장된다.** 그게 ADHD의 좁은 시야나 인식의 폭도 넓힐 수 있다는 거다. 성취에도 다 쓰일 수 있다. 이너게임에 ACT(액트)라는 모델이 있는 것처럼, 뇌의 작동과 이너게임, 명상 이런 것들의 공통점이 결국 하나로 만난다. **좌뇌의 재잘거림을 잠재우고, 지금 여기의 감각으로 인식을 확장하는 것.** 그게 명상이고, 이너게임이고, 깨달음이다. #좌뇌우뇌 #셀프원 #표상과실상 #인식의확장 #명상과이너게임\n\n--- (구분선)\n\n[파일명: 중용과적중_유연한삶의태도_수필.md]\n\n### **중용과적중_유연한삶의태도_수필**\n\n#### **절대적으로 좋은 것은 없다**\n\n뭘 먹거나 이런 것도 그렇고, **수행** 을 하는 것도 그렇다. 뭔가 하나가 절대적으로 이게 좋다, 현미가 좋다, 과일이 좋다, 이런 게 모든 사람한테 다 좋지는 않다는 거다. 일반적으로 좋을 수는 있겠지만, 상황이 저마다 다 특수하고 체질별로도 다 다르니까. 수행도 그런 거다. 팔정도를 보면 정견, 정사유, 정어, 바른 말을 써야 되고, 바르게 보고, 바른 선정에 들고 이렇게 한다. 그런데 그것도 정해진 답이 있는 정견이 있고 바른 말이 있고 그런 건 아니다. **그때에 따라서 적절", "source": "essay"}, {"id": "essay_653_b66de4be73", "text": "정어, 바른 말을 써야 되고, 바르게 보고, 바른 선정에 들고 이렇게 한다. 그런데 그것도 정해진 답이 있는 정견이 있고 바른 말이 있고 그런 건 아니다. **그때에 따라서 적절하게 보고, 적절하게 말하고, 적절하게 사유하는 거다.** 상황에 맞춰서. **근기** 에 맞춰서. 대기설법이라 하잖아. 그게 **중도** 다. 그리고 동양 철학에서는 그걸 **중용** 이라 한다.\n\n---\n\n#### **중용은 적중이다**\n\n중용은 **적중** 한다는 거다. 표적을 향해서 이쪽 방향으로 쏘았는데 맞았다. 그렇다고 계속 거기만 쏘면 안 된다. 표적이 옮겨갈 수도 있잖아. 그러면 그때는 또 방향을 다시 바꿔서 옮긴 쪽에다 쏘아줘야 한다. 그래야 적중이 되는 거잖아.\n\n중도나 중용이나 다 같은 맥락이다. 우리 삶도 그렇다. 어느 한쪽으로 너무 치우쳐서 이게 좋다 하면 막 그걸로 매달리게 된다. 아무리 좋은 **법** 이래도 거기에 매달려 버리면, 법조차도 나중엔 **놔야 한다.** '법'이라고 딱 세워버리면 거기 매이는 게 되잖아. 나머지는 법 아닌 게 생겨버리는 거다. '이것이 법이다' 하고 딱 세워버리면 비법이 또 생긴다. 그러니까 이것도 법일 수 있고 저것도 법일 수 있고, 때에 따라서 이것이 법이 아닐 수도 있고 저것이 법이 아닐 수도 있는 거다. **그때그때 상황에 맞춰서 활용을 해야 한다.** 그게 **삶의 지혜** 인 것 같다.\n\n-", "source": "essay"}, {"id": "essay_654_abdd092034", "text": "수 있고, 때에 따라서 이것이 법이 아닐 수도 있고 저것이 법이 아닐 수도 있는 거다. **그때그때 상황에 맞춰서 활용을 해야 한다.** 그게 **삶의 지혜** 인 것 같다.\n\n---\n\n#### **강한 주장 뒤에 중용이 있어야 한다**\n\n유튜브나 이런 데서 '아 이게 옳다', '저게 옳다' 하는 것들이 많다. 자기 주장이 사람들한테 어필을 해야 되니까 **강하게** 나갈 수밖에 없다. 제목도 강하게 써야 눈길을 끄니까.\n\n그런데 그 주의할 사항은 뒷부분에 살짝이라도 얘기해줘야 한다. 강한 제목으로 주목을 끌되, **중용적으로, 지혜적으로 접해야 되는 부분은 뒷부분에서 살짝 얘기해주는 거다.** 그것도 안 하는 사람이 대부분이다. 그러니까 그걸 보고 시간 낭비하고, 시행착오를 겪는다. 그게 또 엄청난 피해다. #중용 #중도 #적중의지혜 #팔정도 #삶의지혜\n\n--- (구분선)\n\n[파일명: 지혜와안목_본질을다루는코칭_수필.md]\n\n### **지혜와안목_본질을다루는코칭_수필**\n\n#### **지식은 어디서 나왔는가**\n\n**지식이 정보를 가공해서 나온 지식이냐, 아니면 지혜에서 나온 지식이냐** 에 따라서 지식의 퀄리티가 결정된다. 훨씬 더 차이가 있는 거다. 지혜 자체는 볼 수가 없는 거잖아. 그것이 지식으로 드러나야 한다. 지식으로 드러나는 게 책일 수도 있고, 어떤 제품일 수도 있고, 물건, 도면일 수도 있다. 이 컵도 그렇다. 오목", "source": "essay"}, {"id": "essay_655_87bfb0a946", "text": "혜 자체는 볼 수가 없는 거잖아. 그것이 지식으로 드러나야 한다. 지식으로 드러나는 게 책일 수도 있고, 어떤 제품일 수도 있고, 물건, 도면일 수도 있다. 이 컵도 그렇다. 오목하게 하면 여기 뭔가 담을 수 있구나 하는 이치가 담겨 있는 거잖아. 일자로 만들면 다 흘러내려 버리겠지. 이치가 들어 있으니까 유사 이래로 계속 이 컵을 쓰는 거다. 이치가 안 담겨 있다면 금방 없어져 버렸을 거다. 인류 보편타당한 이치니까, 인류 보편타당한 지혜가 이렇게 지식으로 드러난 거잖아. 지식은 시대에 따라서 변한다. 교통수단이 말이었다가 자전거, 자동차, 비행기로 변해왔다. 이렇게 현상적으로 드러나는 물건들은 계속 변하지만, **원리, 뭔가를 이용해서 거기에 이치가 들어가 있는 거다.** 빨리 이동할 수 있다는 이치는 변화가 없다. 계속 거기에 작동하고 있는 거다. 지식 저변에 이치로써 작동하고 있는 거다.\n\n---\n\n#### **코칭이 능력 이상을 못 다루는 이유**\n\n코칭 같은 경우에 **환경이나 행동이나 능력까지밖에 못 다룬다.** 고객의 정보를 바탕으로 지식적인 차원에서 보기 때문에 그 이상을 못 본단 말이다. 그런데 **가치 신념이나 정체성, 더 나아가 영적인 부분까지 다루려면 지혜 차원에서 들어가야 한다.** 코칭 스킬이나 모델을 어떻게 써야 된다 하는 것도 다 지식이잖아. 지식적인 게 지혜에서 나온 지식이면 능력 이상의 것을 다룰 수", "source": "essay"}, {"id": "essay_656_122ebc1d3c", "text": "부분까지 다루려면 지혜 차원에서 들어가야 한다.** 코칭 스킬이나 모델을 어떻게 써야 된다 하는 것도 다 지식이잖아. 지식적인 게 지혜에서 나온 지식이면 능력 이상의 것을 다룰 수 있다. 하지만 정보나 데이터에서 나온 지식이라면, 남의 프로세스를 사용하는 거, 남의 언어를 쓰는 거, 그렇게 해서 나온 가공된 지식은 **능력 이상을 다루기가 힘들다.** 코치들이 이것을 배워서 하려면, 자기가 **지식의 지혜를 체득** 해봐야 한다. 아니면 그런 교육을 받든가. 내가 누군지 알아야, 또는 내 가치 신념이 남한테 주어지는 신념인지 내 스스로 검토된 가치 신념인지 이 정도는 파악할 정도가 돼야 한다. 그래야 내가 가치 신념을 다룰 수 있는 거 아닌가.\n\n---\n\n#### **가면을 쓰고 있는지 알아야 한다**\n\n나의 정체성이 내 스스로 원하는 정체성인지, 누군가한테서 주입된 정체성을 내가 쓰고 있으면서 그거를 나라고 여기고 살고 있는 건지. **남이 가면을 쓰고 있는지** 알아야 한다. 가면을 씀으로 인해서 사람이 공허해지고, 외로워지고, 많은 문제가 생긴다. 가면 때문에 자기의 본질을 모르고 사니까 삶이 공허해진다. 그걸 내가 검토할 수 있어야 한다. 그래야 '이 사람이 이 가치 신념을 얘기하는데 이게 정말 본인의 가치 신념인지', '이 사람이 자기 정체성을 얘기하는데 이게 정말 본질에 가까운 정체성인지를' **코치가 알 수 있어야 한다는", "source": "essay"}, {"id": "essay_657_89e29324e0", "text": "사람이 이 가치 신념을 얘기하는데 이게 정말 본인의 가치 신념인지', '이 사람이 자기 정체성을 얘기하는데 이게 정말 본질에 가까운 정체성인지를' **코치가 알 수 있어야 한다는 거다.** 그러려면 자기가 그쪽으로 훈련이 돼 있어야 한다. 자기 스스로의 정체성이나 가치 신념을 바라볼 수 있어야 한다. 훈련하는 방법은 자꾸 그걸 검토해 보는 거다. **내 스스로 직면을 해보는 거다.**\n\n코치 자신도 무의식에 습관적인 태도로 그 사람이 쓰는 언어를 그냥 액면 그대로 받아들여 버리면, 왜곡된 가치 신념과 잘못된 가면을 사람의 본 모습이라고 생각하면서 접근하게 된다. 그래서 코치 자신이 그걸 바라볼 수 있는 **안목** 이 생겨야 한다. **안목이라는 게 그게 지혜다.**\n\n---\n\n#### **안목은 멀리, 넓게, 깊게 보는 것이다**\n\n건축가 이일우 소장이 건축할 때 뭘 하나 갖고 싶다면 뭘 갖고 싶냐 하니까 안목을 가지고 싶다고 했다. 안목이 지혜다. 바라보는 안목이잖아. **안목은 멀리, 넓게, 또는 깊게 바라볼 수 있는 거다.** 남들이 못 보는 것을 보는 거다. 건축에서 당장 이쁘다, 모양이 이쁘다라든가 이런 한쪽으로 치우쳐서 본 게 아니고, 이 사람이 이 집에서 10년, 20년, 30년 오래 살아도 불편함을 최소한으로 느끼고, **이 사람의 삶의 목적을 구현하는 데 도움이 되는 집** 으로 만들어주는 게 안목이다. 요새는 건", "source": "essay"}, {"id": "essay_658_d96e921ea1", "text": "이 이 집에서 10년, 20년, 30년 오래 살아도 불편함을 최소한으로 느끼고, **이 사람의 삶의 목적을 구현하는 데 도움이 되는 집** 으로 만들어주는 게 안목이다. 요새는 건축비가 싸다 해서 날림으로 짓거나, 모양을 위주로 해서 단열이나 방음은 전혀 신경 안 쓴다. 이런 거는 안목이 없는 거다.\n\n코치도 그런 안목을 키워야 한다. 안목을 키워야지만, 자꾸 경험해보고, 경험을 안 해봤으면 지혜로운 사람한테 배우든가. 지식을 배우는 게 아니고 **지혜로써 안목을** 자꾸 배우든가. 그리고 현장에서 고객들을 만나면서 자꾸 적용해보고 나의 안목으로 키워야 한다. 안목을 키우는 게 코치에게 본질적으로 필요한 이유가 있다. 한 명 코칭 받았더니 처음 봤을 때만 살짝 소용이 있고 시간이 지나면 도로아미타불 돼버리는 거, 그게 환경만 바꿔줬기 때문이다. 환경을 새로 옮겨주면 도로 마찬가지가 돼버린다. **본질적인 게 바뀌어야 한다.** 그래야 어느 환경에 있어도 자기 능력이나 이런 걸 발휘하고 삶의 목적을 잃지 않고 갈 수 있게 된다. 환경이 바뀌면 목적 자체도 바뀌어 버리는 거다. 그런 거를 다뤄주지 않으면 진정으로 사람이 자신의 삶을 살게 도와줄 수 없다. **안목을 가지고 사람의 가치 신념이나 정체성을 다뤄줘야 한다.**\n\n---\n\n#### **안목을 기르는 방법**\n\n안목을 기르는 건 어떻게 하느냐. 지혜를 가진 사람들하고 자꾸 많은", "source": "essay"}, {"id": "essay_659_12d2f74d8d", "text": "목을 가지고 사람의 가치 신념이나 정체성을 다뤄줘야 한다.**\n\n---\n\n#### **안목을 기르는 방법**\n\n안목을 기르는 건 어떻게 하느냐. 지혜를 가진 사람들하고 자꾸 많은 교육을 받던, 대화를 하던 그렇게 하고, 그다음에 지혜로 접근할 수 있는 것을 일상생활에서 실천해야 한다. **명상을 많이 해본다든가, 자기 성찰을 많이 해본다든가, 자기만의 검토된 언어들을 많이 구사해 본다든가.** 시를 써본다든가, 글을 써본다든가. 그러면서 자기를 자꾸 **객관화** 시키는 거다. 내가 지금 쓰고 있는 신념이 내 신념이 아니고 어딘가 주입된 거를 당연한 듯이 쓰고 있구나 하는 걸 알아채는 것. 그런 작업들이 필요하다. **자기 객관화를 자꾸 시켜가야 한다.** 그게 진짜 공부다. 명상하는 데서는 명상을 하든가, 참선을 하든가 하라는 거 아닌가. 코칭 쪽에서도 그런 자기를 이해할 수 있는 코치가 우선 **자기 자신의 가치 신념과 정체성을 스스로 다룰 수 있어야 한다.** 우리가 코칭 프로그램에 가치 신념을 어떻게 재정의하느냐, 그걸 다루는 거다.\n\n---\n\n#### **조건 지어진 목적은 오염된 목적이다**\n\n목표를 최종 목적에서 새로 규정을 지어야 하는데, 그 목적이 **조건 지어진 목적이면 안 된다는 거다.** 지금 코칭에서는 거기까지만 다루고 있다. '네가 원하는 게 뭐냐?' 근데 이 사람이 원하는 게 본질이 원하는 게 아니고, 가면", "source": "essay"}, {"id": "essay_660_58a6548abc", "text": "목적이 **조건 지어진 목적이면 안 된다는 거다.** 지금 코칭에서는 거기까지만 다루고 있다. '네가 원하는 게 뭐냐?' 근데 이 사람이 원하는 게 본질이 원하는 게 아니고, 가면에서 원하는 거란 말이다. '남들이 돈 벌면 성공한대', '배움을 많이 배우면 성공할 수 있어' 이런 사회적으로 통용되는 것들로 목적을 세워버리면 제대로 된 게 아닌 거다. **조건 지어짐으로부터 눈치채고 조건을 다 치워야 한다.** 조건을 다 치운 상태에서, 아무런 조건이 없는 상태에서 내가 바라고자 하고 원하고자 하는 바를 세워야 한다. 그러면 저절로 자기 개인의 이득보다는 **세상을 위해서 내가 기여할 수 있는 바로 가게 된다** 는 거다. 영적이거나 비전 쪽이 된단 말이다. **비전은 내가 꾸는 꿈이 아니다. 비전은 우리 사회가 모두가 다 그쪽 방향으로 나아가야 되겠다는 것이다.** 나의 가정, 나의 조직, 내가 포함된 사회의 구성원들이 다 같이 가야 될 목적. 거기가 비전이다. 그러면 비전을 세울 수 있게 된단 말이다.\n\n그래야지만 비로소 잘못 형성된 가치 신념이나 정체성에 매이지 않고 **새로운 안목으로 나의 앞으로 가야 될 삶의 여정을 새롭게 만들어 나갈 수 있다.**\n\n---\n\n#### **틀을 잡아야 한다**\n\n방법론적인 스킬이 세부적으로 나와야 하지만 큰 틀이 먼저다. **틀을 못 잡으면 안 된다.** 틀에서 벗어나 버리면 이것도 아니고 저", "source": "essay"}, {"id": "essay_661_9618e3f33f", "text": "---\n\n#### **틀을 잡아야 한다**\n\n방법론적인 스킬이 세부적으로 나와야 하지만 큰 틀이 먼저다. **틀을 못 잡으면 안 된다.** 틀에서 벗어나 버리면 이것도 아니고 저것도 아니고, 뭘 추구하고자 하는지도 모르게 된다. 내가 틀을 잡고 있으면 이것을 바라볼 힘이 생긴다. '이거 내가 직관적으로 이렇게 하는 거네', '내가 이거 무의식적으로 행동하고 있네', '내 삶의 목표를 정할 때 무의식적으로 정하고 있네.' 코치도 무의식적으로 코칭을 하고, 그것도 무의식적으로 하니까 엉뚱한 목표 세우고 잘못된다. 다이어트를 한다고 하면 '살 빼고 싶다'. 살 빼는 건 목표인 거지 목적이 아니잖아. 살을 왜 빼려 하느냐. '더 건강하게 살고 싶다'가 더 상위 개념 아닌가. 왜 건강하게 살고 싶냐. 자꾸 이렇게 올라가줘야 한다. 그냥 이뻐 보이려고 살 빼겠다는 거는 **거짓 자아** 의 어떤 거다. '살이 빠지면 이쁘다'는 외부의 가치 신념을 아무 검토 없이 차용한 거잖아. **내가 선택한 목표여야 한다.**\n\n안목을 가지고 그걸 구사할 수 있어야 한다. 코치들도 부분적으로 쓰고 있지만, 이게 정확한 **안목을 가지고 구사할 수 있어야 한다는 거다.** #지혜와지식 #안목 #가치신념과정체성 #조건지어진목적 #비전\n\n--- (구분선)\n\n[파일명: 지혜와철학_채움이아닌비움_수필.md]\n\n### **지혜와철학_채움이아닌비움_수필**\n\n####", "source": "essay"}, {"id": "essay_662_26d38736ce", "text": "식 #안목 #가치신념과정체성 #조건지어진목적 #비전\n\n--- (구분선)\n\n[파일명: 지혜와철학_채움이아닌비움_수필.md]\n\n### **지혜와철학_채움이아닌비움_수필**\n\n#### **지혜는 채워서 아는 게 아니다**\n\n지혜라는 거는 뭘 **채워 넣어서 아는 게 아니고, 비워서 앎이 들어오게 만들어야** 한다. 그래서 철학을 자꾸 뭘 배워서 알면 그거는 그냥 철학 이론을 배우는 거고, 내가 어떤 **비어있는 상태** 로 있을 때에 지혜가 그 **진공 상태로 저절로 빨려 들어오게** 하는 것, 그것이 정확한 앎이다. 어떤 사상은 완성이 있는 거잖아. 사상은. 그런데 지혜는 완성이 없는 거다. 철학은. 철학이 완성이 됐다고 본다면 그건 철학이 아닌 거다. 그렇게 되면 이제 **사상(思想)**이 돼버린단 말이다. #지혜와철학 #비움 #진공상태 #사상과철학의차이 #채움이아닌비움\n\n--- (구분선)\n\n[파일명: 진리수신_지혜와자비_수필.md]\n\n### **진리수신_지혜와자비_수필**\n\n#### **법은 허공에 있다**\n\n진리에 대해서 얘기하거나 법에 대해서 얘기하는 것은, 법이 딴 데 있는 게 아니고 내 머릿속에 있는 게 아니다. **법이 허공에 있다.** 허공 중에 꽉 차 있다. 법을 찾아서 어디 딴 데로 갈 필요가 없다. 법이 허공에 있기 때문에 내가 **안테나를 잘 세우기만 하면 된다.** 안테나를 잘 세워서 수신만 잘하면 법이나 진리가", "source": "essay"}, {"id": "essay_663_ff1a9b96d3", "text": "꽉 차 있다. 법을 찾아서 어디 딴 데로 갈 필요가 없다. 법이 허공에 있기 때문에 내가 **안테나를 잘 세우기만 하면 된다.** 안테나를 잘 세워서 수신만 잘하면 법이나 진리가 나를 통해서 드러난단 말이다. 이것은 외워서 되는 게 아니다. 그렇다면 어떻게 안테나를 세우느냐. **사람을 도우려고 하는 마음** 이 있어야 한다. 사람을 도우려고 하는 마음이 있으면 안테나를 세운 거다. 그러면 진리가 나한테 와서 그 사람한테로 가는 거다. 왜냐하면, 그 사람이 안테나를 안 세우고 있거든. 내가 돕고자 하는 사람한테 바로 갈 수가 없다. 그러니까 누군가 안테나를 세우고 있는 사람이 이것을 전달해줘야 한다. **메신저 역할** 을 해줘야 한다는 얘기다. 그러니까 이게 나의 뇌피셜이 아닌 거다. 내가 한참 얘기하고 나면 나중에 생각해보면 나도 잘 모른다. 내 소리가 아니고 법의 소리이기 때문이다.\n\n---\n\n#### **아상이 많으면 잡음이 섞인다**\n\n돕고자 하는 마음과, 내가 알고 있는 **알음알이** , 아상일 수 있는 그걸 내려놔야 한다. **내가 아상이 많으면 잡음이 섞인다.** 지지직직. 라디오가 주파수 잘 맞아야 되는데, 자기 주파수도 있단 말이다. 이 자기 채널이 있다. 그러면 이 우주의 소리와 수신기의 소리가 같이 섞이니까 지지직하고 말이 앞뒤가 안 맞는다. 가끔은 제대로 된 방송이 나왔다가, 이 방송 갔다 저 방송 갔다 와서", "source": "essay"}, {"id": "essay_664_8ac34929f7", "text": "자기 채널이 있다. 그러면 이 우주의 소리와 수신기의 소리가 같이 섞이니까 지지직하고 말이 앞뒤가 안 맞는다. 가끔은 제대로 된 방송이 나왔다가, 이 방송 갔다 저 방송 갔다 와서 얘기한단 말이다. 그래서 두 가지 마음이 있어야 한다. **남을 도우려고 하는 마음과, 나의 아상을 내려놓는 것.** 남을 도우려고 하는 마음을 내면 주파수는 저절로 맞춰진다. 이 남을 돕고자 하는 마음이 방향성이다. 수신기를 그리로 돌려야 하는 거다. 엉뚱한 쪽으로 비추고 있으면 이 사람이 못 보잖아. 도우려고 하는 마음은 사람을 도우려고 하는 거니까, **사람 쪽으로 틀어야 한다.** 사람이 원하고자 하는 걸 돌려야 한다. 내가 원하고자 하는 걸 틀면 안 된다. 그럼 이 사람하곤 전혀 관계없는 얘기를 하는 거거든. 방향을 틀고 주파수를 맞춘다는 거는 이 사람이 원하는 방향의 주파수를 맞추는 거다. **이 사람한테 도움이 될 수 있는 주파수를 맞추는 거다.**\n\n엉뚱한 방향의 방송이 나오면 공감이 안 가잖아. 남을 도우려고 하는 것은 사람을 도우려고 하는 방향성이고, 나 자신의 아상을 내려놓는 거는 잡음 없이 깨끗한 진리를 전달하고자 하기 위해서다. 이 마음이 있으면 진리가 사람한테 전달이 된다는 거다. 물론 그 사람도 본인의 아상을 얼마나 내려놓느냐에 따라 달라진다. 내가 그 사람을 향했는데 그 사람은 딴 데로 가면 안 된다. 눈은 여기 있지만 마음은", "source": "essay"}, {"id": "essay_665_71f695d7bb", "text": "한테 전달이 된다는 거다. 물론 그 사람도 본인의 아상을 얼마나 내려놓느냐에 따라 달라진다. 내가 그 사람을 향했는데 그 사람은 딴 데로 가면 안 된다. 눈은 여기 있지만 마음은 딴 데 가 있으면 안 들어간다. **서로 같이 맞아야 한다.** 전달해 주는 사람이 방향성과 깨끗한 음을 전달하고자 하는 것과, 받아주는 사람도 방향이 맞아야 하고, 온전히 받아들이고자 하는 마음의 절실함이 있어야 한다. 그래야지만 이게 통한다. 기준을 세워놓고 나머지는 그냥 열심히 할 뿐이다. 공부도 열심히 하고, **인연 따라서** 잡아 쓰는 거다.\n\n---\n\n#### **지혜와 자비**\n\n무기나 재료는 내가 열심히 찾고 만들고 하고, 나머지는 주파수와 아상을 내려놓는 거다. 그게 무슨 얘기냐면, **상대방한테 주파수를 맞춘다는 거는 그게 자비다.** 그리고 나의 아상을 내려놓는 거, 나를 비워서 우주의 진리가 내 몸을 통해서 나아갈 수 있게 하는 거가 **지혜다.** 나의 알음알이를 쓰는 게 아니란 말이다. 내 뇌피셜을 상대방한테 전달하면 공명이 안 일어난다.\n\n이게 **줄탁동시** 라 하잖아. 나는 쪼고, 받고자 하는 사람은 안에서 쪼고, 딱 들어맞았을 때 깨달음이 거기서 딱 공명이 일어나는 거다. 서로 맞아야 한다는 말이다. 모든 가르침이나 배움이나 이런 것이 그렇게 해야 일어나는 거다. **지혜와 자비를 다 써야 한다.** 학력은 높은데, 박사,", "source": "essay"}, {"id": "essay_666_a487c56802", "text": "공명이 일어나는 거다. 서로 맞아야 한다는 말이다. 모든 가르침이나 배움이나 이런 것이 그렇게 해야 일어나는 거다. **지혜와 자비를 다 써야 한다.** 학력은 높은데, 박사, 석사, 해외 유학을 갔다 왔는데도 자기가 할 일이 없다는 거는 이 지혜와 자비가 부족하고 안테나를 제대로 맞추지 못했기 때문이다. **자기 목소리를 내려고 하기** 때문이다.\n\n진리를 전달하는 일은 빈손으로 서 있는 것이 아니다. 방향을 맞추고 아상을 내려놓는 것이 일의 본질이라면, 무기와 재료는 내가 열심히 찾고 만들고 갈고닦아야 한다. 지혜와 자비가 채널이라면, 그 채널을 통해 흘러나올 내용은 내가 쌓아온 공부와 경험으로 채워진다. 안테나만 세운다고 방송이 나오는 것이 아니다. 수신기가 제 기능을 하려면 그 안에 쌓인 것들이 있어야 한다. 수련과 준비는 그래서 함께 간다. 나머지는 인연 따라 잡아 쓰는 것이다.\n\n#### **우주의 네트워크에 접속하는 것**\n\n우주에는 엄청나게 많은 정보들이 있다. 인터넷으로 따지면 웹에 접속을 하면 세상 모든 정보를 다 검색할 수 있잖아. 근데 기계 안에 저장돼 있는 메모리, 그걸로 써먹는다는 거는 칩에다 지식을 배우고 저장 장치에다 넣어놓는 거다. **한계가 있다. 배운 거 이상은 발휘를 못하는 거다.** 근데 깨달은 사람들은 그거는 **웹서비스로 들어간단 말이다.** 웹에 있는 모든 정보를 다 긁어올 수가 있는 거다", "source": "essay"}, {"id": "essay_667_3223ad20ee", "text": "거다. **한계가 있다. 배운 거 이상은 발휘를 못하는 거다.** 근데 깨달은 사람들은 그거는 **웹서비스로 들어간단 말이다.** 웹에 있는 모든 정보를 다 긁어올 수가 있는 거다. **우주의 네트워크에 접속하는 거다.** 그러니까 나를 넘어서는 거다. 지식을 가진 건 한계가 있다는 거다. 그래서 지혜는 무한정으로 써먹을 수가 있는 거다.\n\n예수님이 무슨 학벌이 있는 건 아니잖아. 그냥 시골 목수, 30대 초반의 젊은 청년이었는데도 그렇게 하잖아. **공명이, 주파수가 맞으니까.** 우주의 진리하고 이 주파수가 딱 맞으니까 그렇게 온 거다. 그 사람은 자기를 완전히 비워버려서 사랑이나 자비가 그냥 사방으로 미치고 또 깨끗하다. **내 안에 나의 아상이 없으니까.** 그러니까 완전히 온 우주가 그냥 거기 들어가는 거다. 이 페트병 안에 완전히 비었으니까 거기에 딱 하느님의 진리나 법이 그냥 딱 들어가 있는 거다.\n\n---\n\n#### **코칭 프레젠스로 쓰이는 상태**\n\n코치들이 갈망하는 **코칭 프레젠스(Coaching Presence)**라는 게 있다. 내가 종교적으로 설명을 했지만, 코치들한테는 이게 하이 레벨이다. 최상 KPC 이상은 돼야 코칭 프레젠스가 뭔지를 안다. 그 사람들한테는 상당히 강력한 게 된다. 코치가 고객한테 향해야 한다. 자비심이다. 그다음에 코치의 아상을 내려놔야 한다. **그래야지만 코칭 프레젠스가 형성된다.", "source": "essay"}, {"id": "essay_668_cb83e64385", "text": "뭔지를 안다. 그 사람들한테는 상당히 강력한 게 된다. 코치가 고객한테 향해야 한다. 자비심이다. 그다음에 코치의 아상을 내려놔야 한다. **그래야지만 코칭 프레젠스가 형성된다.** 코칭이 고객과 둘이 아니게 해서, 그 코칭 프레젠스 공간에서 진짜 상호작용이 일어나고, 고객과 함께 춤을 추는 것. 서로 공명을 일으키고 율동을 한다는 거다. 그래서 고객의 잠재력을 충분히 끌어올리는 거다. 이것을 이렇게 설명할 수 있는 코치가 없다. **이게 작은 게 아니다.**\n\n하루아침에 장착이 되지는 않지만, 이 마인드셋으로 코칭을 해야 된다는 방향성이 잡힌다는 거다. 수위 조절을 해야 한다. 사람들이 현실에서 적용이 가능하고, 가능성이나 희망을 가질 수 있게. 그래야 이쪽으로 발을 들여놓기가 쉽다. 전 세계적으로 유명한 마스터급 코치들도 빅마인드 체험 같은 걸 상상을 초월할 정도의 고가를 받아가면서 전해준다. 왜냐. MCC, KSC이면서도 자기 자신에 대해서 몰라. 입으로는 '나로 살으리' 어쩌고저쩌고 하지만, 정작 '나'에 대해서 모른다. 그러면 비싼 돈을 주고서라도 배운단 말이다.\n\n---\n\n#### **수련은 끝났다, 펼치는 게 문제다**\n\n책도 쓰고, 유튜브를 하든, 전자책을 쓰든, 강의를 하든. 나라는 사람이 어떤 사람인지 **냄새를 풍겨야 한다.** 예수는 기적을 보여서 '내가 하느님의 아들'이라는 걸 증명하면서 트래픽을 발생시킨 거", "source": "essay"}, {"id": "essay_669_5ce4353719", "text": "하든, 전자책을 쓰든, 강의를 하든. 나라는 사람이 어떤 사람인지 **냄새를 풍겨야 한다.** 예수는 기적을 보여서 '내가 하느님의 아들'이라는 걸 증명하면서 트래픽을 발생시킨 거다. 부처님은 말로써 깨닫게 해서. 나는 나만의 방식으로 트래픽을 만들어야 한다.\n\n예수도 예수가 되기 전까지 숨겨진 기간이 있었다. 몇 년간의 알려지지 않은 기간. 그때 수련을 한 거다. 부처님도 6년간 고행을 했다. **수련은 끝났다. 이제 펼치는 게 문제다.** 내 스스로 확신을 더 가져야 한다. **포지션을 그렇게 취한다는 게 중요하다.** 승자의 포지션을 취해야 한다. 지금은 사람들한테 확신을 심어줘야 할 때이기 때문에 약해 보이고 인간적으로 보일 필요가 없다.\n\n---\n\n#### **도화선이 필요하다**\n\n경전을 보면 다 제자들이 부처님한테 물어봤다. 물어보는 것에 대해서 부처님이 답을 해준 거다. **묻고 답하고, 묻고 답하고, 그렇게 해서 진리가 전달이 된 거다.** '야, 제자들 모여라' 하고 모아놓고 일장 연설을 푼 게 아니고. 누군가 도화선을 붙인 사람이 필요한 거다. 예수도 12제자가 있었잖아. 사람들이 듣고서 전파를 했으니까 예수가 된 거다. 그냥 예수님 혼자 했으면 누가 알겠어, 지금 이 세상에서. 부처님도 마찬가지고 공자님도 마찬가지다. 본인들이 책 한 권도 안 썼다. 제자들이 듣고 전달 전달하다가 글자가 나오니까 그걸 글자로 표현", "source": "essay"}, {"id": "essay_670_4d8b9f6f4f", "text": "했으면 누가 알겠어, 지금 이 세상에서. 부처님도 마찬가지고 공자님도 마찬가지다. 본인들이 책 한 권도 안 썼다. 제자들이 듣고 전달 전달하다가 글자가 나오니까 그걸 글자로 표현한 거다. **그런 작업이 필요하다.** 이렇게 녹음할 수 있는 것도 있고, 문자화시킬 수 있는 게 좋다. 지금은. #안테나와수신 #지혜와자비 #코칭프레젠스 #아상내려놓기 #줄탁동시\n\n--- (구분선)\n\n[파일명: 진리의쉬움_삼라만상의성경_수필.md]\n\n### **진리의쉬움_삼라만상의성경_수필**\n\n#### **어려우면 진리가 아니다**\n\n진리가 어려우면 진리가 아니다. 진리에 이것저것 갖다 붙여서 덕지덕지 붙으면, 그거는 잡스러운 게 많이 꼈다는 거 아닌가. 어려우면 진리가 아니다. **쉬워야 진리인 거다.** 하늘을 보면 그냥 하늘이잖아. 산은 산이고, 나무는 나무고. 나무를 아는 데 있어서 뭔가 붙여져야 아는 건 아닌 거 아닌가. 그냥 바람이 불면 그냥 바람이 부는 거고.\n\n---\n\n#### **삼라만상이 이미 성경이다**\n\n기독교인들이 말하듯 하느님이 이 세상을 지었다면, 하느님이 이 세상을 어떻게 만들었겠는가. **하느님의 이치가 여기에 다 들어가 있는 거 아닌가.** 그러니까 **이 자체가 이미 성경인 거다.** 종이짝에 있는 성경이 아니고, 이미 여기 하느님의 뜻이 나무 하나, 풀 한 포기 위에 다 있는 거 아닌가. 삼라만상에 돌아가는 바람 불고", "source": "essay"}, {"id": "essay_671_e688b033cc", "text": "니까 **이 자체가 이미 성경인 거다.** 종이짝에 있는 성경이 아니고, 이미 여기 하느님의 뜻이 나무 하나, 풀 한 포기 위에 다 있는 거 아닌가. 삼라만상에 돌아가는 바람 불고 비 오고 이런 게 다 있는 그대로, 하느님의 뜻이 이 땅에 구현이 되고 펼쳐지는 거 아닌가. 하느님의 뜻이 그 안에 이치로. 그러면 그냥 이걸 이해하는 데 어마어마하게 복잡한 뭔가가 있는 게 아니잖아.\n\n하늘이 저렇게 맑고 푸르구나, 나무가 저렇게 피어 있구나, 꽃이 피는구나, 새가 지저귀는구나. 그냥 그게 다 자체가 하느님의 성경인 거다. **그렇게 쉬운 거라는 거다.** 하느님의 진리라는 게. 진리가 그런 거를 아는 것처럼, 그 자체가 진리인 거 아닌가. 거기에 이미 하느님의 뜻이 다 구현이 돼 있으니까, 그걸 보는 나 자신 안에도 하느님이 다 들어가 있다. 그러니까 그걸 이해하는 데 무슨 대단한 뭔가가 있어야 되는 건 아니라는 거다. 어려우면 그거는 어떤 의도가 들어가 있는 거다. **진리는 한편으로 보면 너무 쉬워서 오히려 이해하기 어려운 그런 거다.** 너무 쉬워서, 이해하고 말도 할 게 없잖아. 거기다 더 덧붙이고 붙일 게 없잖아.\n\n---\n\n#### **손바닥으로 삼라만상을 가리는 것**\n\n그런데 마치 대단한 진리가 어딘가 숨어 있고, 어딘가 감춰져 있는 것처럼, 자기만 아는 것처럼 갖다 붙여버리면 이제 그거는 진리하고 먼 거다.\n\n이것이 진리", "source": "essay"}, {"id": "essay_672_e963b3f315", "text": "만상을 가리는 것**\n\n그런데 마치 대단한 진리가 어딘가 숨어 있고, 어딘가 감춰져 있는 것처럼, 자기만 아는 것처럼 갖다 붙여버리면 이제 그거는 진리하고 먼 거다.\n\n이것이 진리야하면서 손바닥으로 탁 들이대면서, 손바닥에 **진리** 라고 써서 보여주면서, **이 삼라만상을 못 보게 하고 자기 손바닥만 쳐다보게 하는 거다.** '이것만, 여기 진리가 있으니까 여기 봐. 진리라고 써 있잖아.' 그러고 가리는 거다. 그것도 진리를 한글로 쓴 것도 아니고 한문으로 써 가지고 '집'이라 써 있으면 이거 뭐야? 모르잖아. 그런 거나 마찬가지라는 거다. **너무나 쉬워서 도리어 알기 어렵다.** #진리의쉬움 #삼라만상 #하느님의뜻 #성경은자연이다 #손바닥과삼라만상\n\n--- (구분선)\n\n[파일명: 집착과혐오_온전한수용_수필.md]\n\n### **집착과혐오_온전한수용_수필**\n\n#### **몸과 마음이 둘이 아니다**\n\n내부 감각, 고유 감각. 핵심 정서는 몸에서 올라오는 느낌을 뇌에 전달한다. 거기서 불안이 느껴진다. 결국 **몸과 마음은 둘이 아닌 것** 이다. 뇌과학이 하는 이야기도, 불교 수행이 하는 이야기도 결국 같은 곳을 가리킨다. 문제는 그 감각들이 편도체에 잘못 퇴적(堆積)되는 데서 생긴다. 내부 감각이 오작동하고, 잘못 해석된다. 그것을 바로잡으려면 **지금 여기로 감각이 와야** 한다. 몸을 쓰는 활동이 그것을 돕는다. 도끼질을", "source": "essay"}, {"id": "essay_673_d03f42d178", "text": "잘못 퇴적(堆積)되는 데서 생긴다. 내부 감각이 오작동하고, 잘못 해석된다. 그것을 바로잡으려면 **지금 여기로 감각이 와야** 한다. 몸을 쓰는 활동이 그것을 돕는다. 도끼질을 할 때, 칼질을 할 때 나는 도끼가 지금 어디 있는지 계속 인지해야 한다. 감각에 집중할 수밖에 없다. 걷기 명상도 마찬가지다. 발에 닿는 느낌, 손에 닿는 느낌. **고유 감각을 깨워주는 것** 이다. 명상할 때 아랫배가 들락날락하는 것도 고유 감각이다. 그 느낌에서 안다.\n\n---\n\n#### **집착과 혐오, 그 사이에서**\n\n부처님 말씀처럼 느낌에는 세 가지가 있다. 좋은 느낌, 싫은 느낌, 좋지도 않고 나쁘지도 않은 느낌. 좋은 것은 자꾸 더 하려 하고, 나쁜 것은 혐오를 느끼며 회피한다. 무덤덤한 것은 따분하게 느껴 졸거나 망상을 피운다. **집착과 혐오** 가 거기서 일어난다. 혼침(昏沈)에 빠지거나. 중요한 것은 이것이다. **느낌이 안 일어나게 하는 것이 명상의 목적이 아니다.** 뜨거운 것은 뜨겁다 느끼고, 차가운 것은 차갑다 느끼고, 좋은 것은 좋다 느끼고, 나쁜 것은 나쁘다 느껴야 한다. 아무것도 안 느끼는 것, 완전히 부처님 가운데 토막처럼 있는 것, 그건 수행이 잘못되고 있는 것이다. **무기(無記)에 빠지는 것** 이다. 좋을 때 좋고, 싫을 때 싫고. 그래야 한다. 단, **좋은 것에서 끝나야지 집착으로 가면 안 된다.** 싫은 것", "source": "essay"}, {"id": "essay_674_e9dba4fd80", "text": "이 잘못되고 있는 것이다. **무기(無記)에 빠지는 것** 이다. 좋을 때 좋고, 싫을 때 싫고. 그래야 한다. 단, **좋은 것에서 끝나야지 집착으로 가면 안 된다.** 싫은 것을 싫어하는 자체가 잘못된 것이 아니다. 그것이 혐오로, 회피로, 탐욕으로 이어지는 것이 문제다. 불교적인 명상으로 보면, 느낌이 올라올 때 '이것은 단순히 느낌일 뿐인데, 나는 지금 이것에 집착을 일으키거나 혐오를 일으키고 있구나'라고 **알아차리는 것** 이다. 알아차린다는 것은 전전두엽이 활성화되는 것이다. 전전두엽이 활성화되면 편도체는 안정화된다.\n\n무덤덤한 느낌은 그냥 지나가지 않는다. 따분함은 그 자체로 불편한 것이어서, 우리는 거기서 빠져나오려 졸거나 망상을 피운다. 회피 반응이 일어날 때는 몸이 먼저 안다. 편도체가 긴장하고, 몸에 힘이 들어간다. 욕심이 일어날 때도 마찬가지다. 손에 힘이 들어가고, 어깨가 굳는다. 집착이든 혐오든, 그 반응은 생각이 아니라 몸에서 먼저 드러난다. 그래서 몸을 살피는 것이 시작이다.\n\n---\n\n#### **가치를 매긴 것은 나다**\n\n'나는 나쁘다', '나는 찌질하다.' 이것이 문제다. 다른 것이 문제가 아니다. 나의 어떤 상황을 두고 '이건 찌질한 것이다'라고 하는 것은, **가치를 매긴 것** 이다. 내 기준에서 매긴 가치다. 그것이 이 세상의 **절대적인 가치는 아니다.** 아프리카나 북한에 사는 사람과", "source": "essay"}, {"id": "essay_675_3261df86b6", "text": "'이건 찌질한 것이다'라고 하는 것은, **가치를 매긴 것** 이다. 내 기준에서 매긴 가치다. 그것이 이 세상의 **절대적인 가치는 아니다.** 아프리카나 북한에 사는 사람과 비교해 보면 내가 찌질하다고 한 그 상황이 전혀 다른 무게로 다가올 것이다. 가치 매김이 달라지면 느낌도 달라진다. 지금 나의 상황은 **연기(緣起)**에 의해 벌어지고 있는 것뿐이다. '이것이 있으면 저것이 있고, 저것이 없으면 이것이 없다.' 그동안 살아온 인연들, 행해온 모든 것들의 연기가 지금 이 상황을 만들고 있다. 거기에 좋다 나쁘다 하는 것은 내가 가치를 매긴 것이다. 내 기준이다. 그런데 자꾸 그 가치 매김을 하니까 오작동이 생긴다.\n\n---\n\n#### **불편함을 동력으로**\n\n그렇다고 '찌질한 채로 그냥 살아준다'는 것이 아니다. 내가 어떤 목적을 세우고, 그 지향하는 삶에 비추어 지금 이것이 불편하다면, 불편을 느낄 수 있다. 그러면 그 불편을 **목적을 향해 가는 동력으로 삼을 수 있다.** 어려움이 있기 때문에 앞으로 나아가게 된다. 어려움을 긍정적인 요소로 활용할 수 있다. 그러나 그것을 단순하게 '찌질한 것'이라고 낙인찍어버리면, 동력이 되지 않는다. 그냥 거부가 되어버린다. 거부는 분리를 낳고, 분리는 오작동을 낳는다. 느낌은 느끼되, 가치 매김에서 한 발 물러서는 것. 그것이 편도체 오작동에서 벗어나는 길이고, 몸과 마음이 하나", "source": "essay"}, {"id": "essay_676_6ef4f5bbc0", "text": "거부가 되어버린다. 거부는 분리를 낳고, 분리는 오작동을 낳는다. 느낌은 느끼되, 가치 매김에서 한 발 물러서는 것. 그것이 편도체 오작동에서 벗어나는 길이고, 몸과 마음이 하나로 이어지는 길이다. #집착과혐오 #고유감각 #알아차림 #가치매김 #연기\n\n--- (구분선)\n\n[파일명: 찝찝함과기억_생각과감정의분리_수필.md]\n\n### **찝찝함과기억_생각과감정의분리_수필**\n\n#### **찝찝함이 올라오는 구조**\n\n자원봉사센터에서 전화가 왔다. 거절할 수밖에 없는 상황이었는데, 그래도 마음이 좋지는 않았다. 밥을 먹다가도 '만약에 모든 요청에 예스를 한다면, 그거를 들어줘야 되는 거 아닌가' 하는 생각을 하면서 **찝찝함이 또 올라오는 거다.** 찝찝함이. 그 구조를 보면 이렇다. 생각을 떠올리니까 찝찝함이 올라왔다. 찝찝함은 있는데, 거기서 생각이 찝찝함을 끌어올린 거다. 그러면 거기서 이 생각은 대체가 될 수 있잖아. 다른 생각으로. 찝찝함이 있는 상태에서 이 생각은 다른 걸로 바꿀 수 있잖아. 아니면 생각을 떼버리든가, 없애고 찝찝함만 보는 거다. 그러면 이미 **찝찝함이 없어진다.** 감정은 떼기가 힘드니까, **생각을 떼어내는 거다.**\n\n---\n\n#### **감정은 그릇이다**\n\n감정이 그릇이라고 본다면, 그게 이제 어떤 내용물에 들어가는 거 아닌가. 그러면 그게 찝찝함이라고 우리가 이제 그렇게 생각을 하는 거다. 그래서", "source": "essay"}, {"id": "essay_677_577e93d4a7", "text": "#### **감정은 그릇이다**\n\n감정이 그릇이라고 본다면, 그게 이제 어떤 내용물에 들어가는 거 아닌가. 그러면 그게 찝찝함이라고 우리가 이제 그렇게 생각을 하는 거다. 그래서 얘네가 항시 그냥 이렇게 붙어 다닌다. 그러니까 **생각만 떠오르면 이 찝찝함은 계속 올라오는 거다.**\n\n이게 어떻게 보면 하나의 풍선 같은 거다. 비닐 고무풍선. 안에 어떤 생각이 담기면 형태대로 이렇게 모양이 잡힌다. 우리는 그거를 찝찝함이나 두려움이나 화남, 이런 식으로 그렇게 부르는 거다. 그래서 그 생각을 갖다가 덜어내버리면 이게 도로 그냥 **바람이 빠져버리는 거다.** 둘 다 없어지는 거다. 감정이라는 게 거기에 생각이 들어와야 힘을 받고 부피가 커진다. 생각을 꺼내면, 그 찝찝한 감정에 담길 수가 없게 된다. 성격이 같아야 들러붙잖아. 생각을 떼버리니까 다른 생각은 여기 안 들어오는 거다. 그러니까 얘가 오그라들어서 **아무것도 아닌 게 돼버리는 거다.**\n\n---\n\n#### **외면과 분리는 다르다**\n\n기분이 안 좋을 때 '나가서 걸어', '몸을 써라' 이러는 게 있다. 하지만 그거는 **외면하는 거다.** 직접 내가 그거를 상대해서 분리 작업을 하지 않았잖아. 그냥 제껴 놓는 거다, 딴 데에 관심을 쓰면서. 그러다가 또 생각이 나면 다시 또 똑같이 찝찝함이 올라온다.\n\n그러면 어떻게 분리를 하느냐. 찝찝함이 생각을 하면서 올라왔잖아. 그", "source": "essay"}, {"id": "essay_678_61d60bfc3b", "text": "그냥 제껴 놓는 거다, 딴 데에 관심을 쓰면서. 그러다가 또 생각이 나면 다시 또 똑같이 찝찝함이 올라온다.\n\n그러면 어떻게 분리를 하느냐. 찝찝함이 생각을 하면서 올라왔잖아. 그러면 **찝찝함은 그냥 놔두는 거다.** 두 개를 다 없애려고 하면 안 된단 말이다. 없애려 하지 말고, 감정은 그냥 찝찝함으로 놔두고, **생각만 바꿔보는 거다.** 생각은 얼마든지 바꿀 수 있잖아. 감정을 놔두고 이걸 처리하려 하지 말고, 생각만 바꿔봐. 아니면 생각을 '이거는 그냥 생각뿐이구나' 하고 이 생각을 떼고 찝찝함만 봐. 그러면 어느 순간에 얘도 같이 없어져 버린다. **지금 느끼는 게 중요하다.** 스토리는 중요하지가 않다. 단지 얘가 결합을 했기 때문에 힘을 나타내는 거거든. 내용물은 뭐가 됐든 한계가 없다. 스토리는 얼마든지 바뀔 수 있는 거다. 이 찝찝함에 얹어있는 거다. 그럼 얘는 그냥 한번 제껴보고 보면, 찝찝한 마음도 이게 붙어있을 때 힘을 쓰는 건데, 따로 있으니까 **그냥 그림자와 같이 사라져 버리는 거다.**\n\n---\n\n#### **억압하면 더 단단하게 결합된다**\n\n외면하면 다시 이 생각이 떠오르면 또 나온다. 그리고 **억압하려고 하면 이걸 더 오히려 강화시킨다.** 이 접착력을. 왜냐하면 눌렀으니까. 반죽을 할 때도 이렇게 누르면 더 붙잖아. 송편도 그렇고. 그런 식으로 압력을 주면 더 단단하게 더 결합이 된다는 거다,", "source": "essay"}, {"id": "essay_679_baa07450fe", "text": "히려 강화시킨다.** 이 접착력을. 왜냐하면 눌렀으니까. 반죽을 할 때도 이렇게 누르면 더 붙잖아. 송편도 그렇고. 그런 식으로 압력을 주면 더 단단하게 더 결합이 된다는 거다, 억누르면. 그러니까 얘네가 그냥 결합돼 있는 거였구나 하고 보는 거다. 찝찝함은 그냥 없애려고 하지 말고, 다루려고 하지 말고. **그냥 이걸 보는 거다.** '어우, 이거 찝찝함이구나.' 얘만 떼 봐. 그러면 얘가 사라진다는 거다. 투명 그릇에 빨간 물을 부으면 빨갛게 보이고, 노란 물을 부으면 노랗게 보인다. 그런데 우리는 그냥 '빨간 컵이다', '노란 컵이다'라고 생각을 한다. 근데 내용물을 따르고 보니까 '어, 그냥 투명한 컵이었네.' 어차피 **감정이라는 컵은 버릴 필요가 없다.** 그때그때 담기는데, 이걸 담아서 또 넣고, 담아서 또 넣고 계속 채워서 놓는 거다. 새로운 것들이 오면 계속 여기다 또 담아서 저장하고, 감정만 붙여서.\n\n그러니까 **기억하고 계속 감정이 붙어 있어서 계속 내 안에 남아있는 거다.**\n\n---\n\n#### **내면 아이는 쇼다**\n\n기억에 감정이 붙어서 계속 내 안에 남아있으면 내면 아이가 수십 개 수천 개가 생긴다고 할 수 있다. 그런데 그것을 내면 아이라고 하면 이거는 또 곤란해지는 거다. 왜냐하면 거기다가 생명을 부여해서 그걸 키우고 달래고 얼르고 이런 쇼를 할 필요가 없는 거다. 그건 **그야말로 쇼다.** 스토리", "source": "essay"}, {"id": "essay_680_f09946f203", "text": "내면 아이라고 하면 이거는 또 곤란해지는 거다. 왜냐하면 거기다가 생명을 부여해서 그걸 키우고 달래고 얼르고 이런 쇼를 할 필요가 없는 거다. 그건 **그야말로 쇼다.** 스토리를 오히려 얹는 거다. 아이를 항시 상대해야 될 거 아닌가.\n\n---\n\n#### **기억은 기억대로, 감정은 감정대로**\n\n생각을 버리라는 건 아니다. 왜냐하면 생각은 기억이잖아. **기억을 바꿀 수도 없다.** '옛날에 겪었던 거 잊어라' 그런다고 잊어지냐고. 안 잊어지잖아. 그건 사실이니까. 그러니까 생각을 바꾸거나 변형을 주려 하지 말고, '그건 있었지, 그건 있었는데', **분리만 하자는 거다.** 감정 따로, 생각 따로.\n\n자꾸 연습을 하게 되면 바로바로 된다. 지금 감정이 그때 감정이 아니잖아. 생각은 그래, 생각은 그때 생각이다. 기억하고 이 감정이 붙어 있는데, 얘는 그때 기억이다. 그거는 없앨 수가 없다. 근데 지금 내가 느끼고 있는 감정은 그때 감정이 아니잖아. 내가 지금 얘를 바라보고 있는 건 **지나가는 감정이란 말이다.** 그러니까 얘는 얼마든지 사라진다. 얘가 힘을 받는 거는 기억 때문에 힘을 받는 거거든. 감정은 왔다가 사라져 버려야 되는 건데, 그때 내가 어떤 일을 겪었는데 화가 났어, 그게 잘못된 건 아니다. 근데 다음에 올라왔을 때도 계속 화가 같이 올라온다는 데 문제가 있는 거거든. 그러니까 **기억은 기억대로 인정해주고,*", "source": "essay"}, {"id": "essay_681_efc92a3a55", "text": "어떤 일을 겪었는데 화가 났어, 그게 잘못된 건 아니다. 근데 다음에 올라왔을 때도 계속 화가 같이 올라온다는 데 문제가 있는 거거든. 그러니까 **기억은 기억대로 인정해주고,** 일이 있었던 건 사실이니까. 근데 이 감정은 그때 감정이 아니잖아. '왜 그때의 감정을 왜 내가 지금도 느끼고 있지?' 이렇게 되는 거다. **이 감정이 생각이 없으면 감정은 아무것도 아니니까.** 감정만 존재할 수 있는 그런 거는 없잖아. 반드시 기억이 있기 때문에 감정이 따라 올라오는 거다.\n\n기억과 감정이 같이 올라오면, 기억은 기억인데 **'이 감정을 내가 이걸 가지고 있을 필요가 있나?'** 이렇게 보는 거다. 그 기억은 있었지, 그건 사실이다. 근데 지금 그때 감정을 내가 느낄 필요가 없네. 그러면 이 감정이 그냥 해소가 돼버리는 거다, 그걸 내가 아는 순간에.\n\n#생각과감정의분리 #찝찝함의구조 #기억과감정 #억압하지않기 #감정은그릇이다\n\n--- (구분선)\n\n[파일명: 차이수용_올셀프_수필.md]\n\n### **차이수용_올셀프_수필**\n\n#### **차이가 있어야 느낄 수 있다**\n\n차이에 대해 이야기할 때, 우리는 흔히 나와 세상 사이의 차이를 먼저 떠올린다. 그런데 그것을 안으로 끌어들일 필요가 있다. 내 안에서 떠오르는 생각, 감정, 느낌들도 차이가 생길 수밖에 없다. 차이가 있어야 그것이 어떤 특정한 감정이나 느낌으로 알아채진다. **차이", "source": "essay"}, {"id": "essay_682_04fda45599", "text": "그것을 안으로 끌어들일 필요가 있다. 내 안에서 떠오르는 생각, 감정, 느낌들도 차이가 생길 수밖에 없다. 차이가 있어야 그것이 어떤 특정한 감정이나 느낌으로 알아채진다. **차이가 없다면 그것은 발생하지 않는다.** 행복한 감정만 계속 느낀다고 해보자. 거기에는 차이가 없다. 차이가 없으면 행복이라는 것 자체를 구분할 수 없다. 행복이 행복으로 느껴지는 것은 불행이나 불안이 있기 때문이다. 내 안에서 일어나는 행복, 불안, 두려움, 기쁨, 이 모든 것이 함께 있기에 삶의 **역동성**이 발현된다.\n\n---\n\n#### **나를 거부하지 않는다는 것**\n\n그런데 우리는 그 안에서 특정한 것을 차별한다. '나는 행복한 감정만 느껴야 돼.' '이 불안은 없어져야 해.' '이 두려움은 나쁜 거야.' 그렇게 차별을 두고 분리시키려 할 때, **나 스스로 나를 거부하게** 된다. 그것이 괴로움의 원인이다. 내 안에서 일어나는 모든 것은 **신의 사랑**이고 창조성이다. 행복만이 아니라 불안도, 기쁨만이 아니라 두려움도. 그것들이 다 나의 삶에서 나오는 것이다. 어느 하나를 잘라내려 하면, 그것은 나의 일부를 거부하는 일이 된다.\n\n---\n\n#### **안팎에 두루 적용한다**\n\n이것은 바깥에만 적용하는 이야기가 아니다. 나와 세상 사이의 차이를 있는 그대로 받아들이는 것처럼, 내 안에서 일어나는 것들에 대해서도 똑같이 적용해야 한다. 안팎이 다", "source": "essay"}, {"id": "essay_683_e0a49d6ecf", "text": "한다**\n\n이것은 바깥에만 적용하는 이야기가 아니다. 나와 세상 사이의 차이를 있는 그대로 받아들이는 것처럼, 내 안에서 일어나는 것들에 대해서도 똑같이 적용해야 한다. 안팎이 다르지 않다. 그것이 삶의 철학으로 받아들여질 때, 비로소 **올셀프(All Self)**로서 온전한 나로 살 수 있다. 좋은 감정만 남기고 나쁜 감정은 덜어내는 것이 아니라, 내 안에서 일어나는 모든 것을 내 것으로 받아들이는 것. 그것이 온전함이다. #차이수용 #올셀프 #내면수용 #자기거부 #역동성\n\n--- (구분선)\n\n[파일명: 차이와사랑_차별없는세상_수필.md]\n\n### **차이와사랑_차별없는세상_수필**\n\n#### **차이가 없으면 꺼진 거다**\n\n나무의 신과 꽃의 신, 나의 신, 너의 신 이게 다 따로따로 있는 게 아니다. 하나의 신이 나무에도 깃들어 있고 꽃에도 있고 나한테도 있고 너한테도 있고, 이렇게 다 깃들어 있는 거다. 근데 이게 **차이가 없으면 안 된다**는 거다. 차이가 있어야 구별이 되고 구분이 되잖아. 그래야 네가 너인 줄 알고 내가 나인 줄 알고 나무가 나무인 줄 알고 꽃이 꽃인 줄 아는 거다. **다양성**이 생기는 거고, 고요함이 생기는 거다. 그게 신의 사랑이다. 그 차이가. 이 차이가 **차별이 되거나 분리**가 되면 그게 죄다. 그게 원죄라고. 그게 지옥이고. 근데 차이가 **사랑**이 되면 그게 천국이 되는 거다. 차이", "source": "essay"}, {"id": "essay_684_5741f69f8d", "text": "신의 사랑이다. 그 차이가. 이 차이가 **차별이 되거나 분리**가 되면 그게 죄다. 그게 원죄라고. 그게 지옥이고. 근데 차이가 **사랑**이 되면 그게 천국이 되는 거다. 차이가 없다면 그냥 멈춤이다. **꺼진 거다.** 이 차이 때문에 세상이 이렇게 벌어지는 거다. 차이로 인해서 구분이 생기고 분별이 생기고, 내가 너를 알아보고 네가 나를 알아보고. 서로가 알아봐 주고, 서로를 사랑할 수 있게 되는 거다. 그게 없다면 드러나지가 않는 거다.\n\n---\n\n#### **차이에서 에너지가 생긴다**\n\n차이가 있음으로 인해서 에너지가 생기는 거다. 낙차가 생기는 거잖아. 단차가 생기는 거다. 높고 낮으면 고조장단이 생긴다. 우리가 **젓가락, 윳가락** 이러잖아. 가락이 그게 그거다. 높은 데서 낮은 데로 내려오면 가락이 생기잖아. 다시 올라가면 또 가락이 생기잖아. 이 젓가락, 윳가락 식으로 차이에 의해서 이게 발생한단 말이다. 그것 때문에 에너지가 생기고 흥이 생긴단 말이다. 거기서 **신바람**이 나오는 거다. 악보에서도 높낮이가 있다. 그게 가락이다. 거기서 **신명**이 나오는 거다. 차이가 없다면 동적이지가 않다. 모니터 화면에 총천연색 여러 가지 색이 다양하게 나오잖아. 그걸로 인해서 모니터에 산도 생기고 물도 생기고 꽃도 생기고 나무도 생기고. 차이 때문에 그런 것들이 벌어지잖아. 그래서 우리가 거기서 **아름다움을 느낄", "source": "essay"}, {"id": "essay_685_7649019d71", "text": "이 다양하게 나오잖아. 그걸로 인해서 모니터에 산도 생기고 물도 생기고 꽃도 생기고 나무도 생기고. 차이 때문에 그런 것들이 벌어지잖아. 그래서 우리가 거기서 **아름다움을 느낄 수 있는 거다.** 차이로 인해서 아름다움. 감동도 느끼고. **신의 창조성을 느끼는 거다.** 그 에너지. 차이 때문에 에너지가 발생하는 거거든. 역동이 생기는 거다. 그게 없으니까 사람들이 우울한 거다. **역동성이 없으니까.**\n\n---\n\n#### **차이와 차별은 다르다**\n\n세상에 차이가 벌어진다. 누구는 잘 살고 누구는 못 산다. 누구는 금수저로 태어나고 누구는 흙수저로 태어난다. 그게 평등하지 않다고 보는 거 아닌가. 근데 그 차이 나는 거가 문제가 아니고, 사람들이 문제 삼는 거는 **차이를 문제 삼는 게 아니고 차별을 문제 삼는 거다.** '내가 흙수저로 태어났는데 왜 차별을 해?' 이렇게 되는 거거든. 사람들이 좋은 차를 타려고 하는 게 차별을 당하지 않기 위해서 그러는 거다. **차별을 하지 않는다면 차이가 나는 것쯤은 참을 수 있다는 거다.** 그리고 나도 언젠가는 잘 사는 쪽으로 자리 이동을 할 수도 있는 거고. 차별을 하지 않으면. 근데 차별이 존재하니까 차이 나는 것에 대해서 굉장히 저항을 할 수밖에 없게 된다는 거다. 그러니까 **차이가 분리나 차별이 되지 않도록 서로 이 공동체가 노력을 해야 한다.** 세상을 살다 보니까 어쩔", "source": "essay"}, {"id": "essay_686_63310b5e5b", "text": "이 나는 것에 대해서 굉장히 저항을 할 수밖에 없게 된다는 거다. 그러니까 **차이가 분리나 차별이 되지 않도록 서로 이 공동체가 노력을 해야 한다.** 세상을 살다 보니까 어쩔 수 없이 차이 나는 부분은 있을 수밖에 없는 건데, 오히려 위에 높은 데에 있는 사람들이 더 노력을 해서 차별적인 요소들을 많이 제거해줘야 한다.\n\n---\n\n#### **저소유, 하나의 삶의 방식**\n\n이 차이라는 다양성에서 고요함도 한편으로 보면 나오는 거다. 내가 **자발적 빈곤, 자발적 가난**을 선택할 수도 있다. 미니멀리즘 같은 것도 내가 선택해서 할 수 있잖아. 근데 그걸로 인해서 차별을 받을까 봐 겁내는 거다, 사람들이. '가난'이라는 말에는 이미 차별적인 요소가 있다. 뭔가 부족하다, 불만족. 그래서 저소유, 무소유 쪽이 더 가깝다. 무소유는 관념적인 거고, 물질적인 것에 반대되는 것을 부각시키기 위해서 만들어낸 현실성 없는 용어다. 우리가 삶의 하나의 방식으로서 **저소유를 받아들일 수 있다.** 무작정 성장하려고 애쓰지 않고 그냥 있는 그대로 나를 받아들이면서 최소한 적게 쓰고 그렇게 살겠다. 이것도 하나의 삶의 방식으로 받아들일 수 있다. 근데 그것을 '너는 게으르다', '너는 무능하냐?' 이렇게 **차별을 받을까 봐** 사람들이 겁내하는 거고, 그런 삶의 방식을 못 사는 거다. 한편으로 보면 그게 적극적으로 세상을 더 좋게 만드는 것일", "source": "essay"}, {"id": "essay_687_b437b6396e", "text": "르다', '너는 무능하냐?' 이렇게 **차별을 받을까 봐** 사람들이 겁내하는 거고, 그런 삶의 방식을 못 사는 거다. 한편으로 보면 그게 적극적으로 세상을 더 좋게 만드는 것일 수도 있다. 옷의 독성도 있잖아. 저소유를 하면 그만큼 오염을 발생 안 시키는 거 아닌가. 그런 것도 하나의 삶의 방식인데, 돈을 가지고 벌써 이렇게 차별을 두니까 세상이 그렇게 된다.\n\n저소유를 하면 세상에 적극적으로 좋은 일을 하는 것일 수 있다. 옷이 몸에 독성을 미친다는 연구도 있다. 생산 과정에서 화학 물질이 들어가고, 빠르게 소비되고 버려지는 옷은 환경을 오염시킨다. 내가 저소유를 선택하면 그만큼 오염을 발생시키지 않는 것이다. 그것도 하나의 삶의 방식이다. 그런데 돈과 소비로 사람을 차별하는 세상에서는, 그 방식이 곧 차별의 빌미가 되어버린다. 세상이 그렇게 된다.\n\n#차이와차별 #신의사랑 #역동성 #저소유 #차이가사랑이될때\n\n--- (구분선)\n\n[파일명: 차이인식과관점전환_고통과안전지대_수필.md]\n\n### **차이인식과관점전환_고통과안전지대_수필**\n\n#### **고통은 차이에서 느껴진다**\n\n소리도 그냥 한 소리만 계속 있으면 뭐가 뭔지 구분이 안 된다. 빛깔도 한 색만 다 있다면 차이가 나지 않는다. 그러니까 차이가 있어야 안다는 거다. 내가 힘들다, 힘들어 죽겠다, 어디가 아프다, 고통스럽다, 외롭다, 이런 감정들 있잖아. 그것도 지금", "source": "essay"}, {"id": "essay_688_8e43f8942d", "text": "색만 다 있다면 차이가 나지 않는다. 그러니까 차이가 있어야 안다는 거다. 내가 힘들다, 힘들어 죽겠다, 어디가 아프다, 고통스럽다, 외롭다, 이런 감정들 있잖아. 그것도 지금 내가 그거를 안다는 거 아닌가. '하, 내가 괴로워' 그러면 괴롭다는 거를 알잖아. 그러면 그게 왜 괴롭다는 거를 알게 됐냐면, **괴롭지 않은 것들이 있기 때문에 괴로운 걸 아는 거다.** 이 세상이 전부 괴롭기만 하면 괴로운 걸 어떻게 알겠나. 지금 내가 괴롭다고 하는 거는 **괴롭지 않은 것들이 있음을 전제로 한다**는 거다. 손에 가시가 박혔어. 그럼 거기가 아프잖아. 아프다는 걸 안다면, 다른 아프지 않은 곳이 있다는 거다. 만약에 힘들어 죽겠는데 전쟁이 나왔고 호랑이가 쫓아와. 그러면 그걸 알겠냐고. 그러니까 지금 내가 힘들고 고통스러운 것보다 **그거를 둘러싼 것들은 그만큼 힘들거나 고통스럽지 않다**는 거다. 그래서 걔가 나한테 유별나게 그렇게 느껴지는 거다. **지금 내가 느끼고 있는 고통의 최고치**인 거다. 나머지는 그냥 괜찮은 거다. 괜찮으니까 내가 못 느끼고 있는 거다.\n\n---\n\n#### **이 부분 이외에는 아무 일도 없다**\n\n이 집 방이 문제야, 방이 지저분해, 방이 문제라고 생각해. 그러면 그걸 문제라고 직시하는 거는 **나머지 것들은 괜찮다는 걸 전제로 한다**는 거다. 내가 인식하는 범위 내에서. 어차피 내가 인지하지 못하", "source": "essay"}, {"id": "essay_689_8ff5c320dd", "text": "지저분해, 방이 문제라고 생각해. 그러면 그걸 문제라고 직시하는 거는 **나머지 것들은 괜찮다는 걸 전제로 한다**는 거다. 내가 인식하는 범위 내에서. 어차피 내가 인지하지 못하는 것들은 알 수 없잖아. 내가 인지하는 범위 내에서 그렇다는 거다. 그러니까 거기에서 관점 전환을 할 필요가 있다는 거다. 물론 내가 괴롭고 아프고 하는 거는 사실이다. 그거는 부정할 수 없는 사실이다. 왜냐하면 아프고 배고프고 괴로우니까. 근데 그것에 내가 몰입을 하면 안 된다는 거다. 몰빵을 해버리면 안 된다. '이게 나의 전부구나' 하고 생각하면 안 된다는 거다. 그렇지 않은 그보다 더 큰 부분이 있다는 거다. 그러면 이것이 또 다른 데로 관점이 옮아가거나, 시간이 지나가면 변할 거기 때문에, 그렇지 않은 쪽으로도 자꾸 주의를 돌리고 관점을 변화를 줄 필요가 있다는 거다. 그런 내가 느끼는 감각이 됐든, 감정이 됐든, 생각이 됐든, **그거 이외에는 아무 일도 없다는 거다.** 이외엔 아무 일도 없다. 그러니까 그걸 생각하면 안심을 할 수가 있는 거다. **우리가 쉴 수가 있는 거다.** 안전 지대가 훨씬 많다는 거다.\n\n---\n\n#### **스스로 조건을 강화시키고 있다**\n\n어떤 문제가 나를 계속 괴롭혀. 그 문제가 나를 괴롭힌다는 거는, 괴롭히지 않는 무수히 많은 일들 가운데서 **이것이 유달리 크게 내가 지금 거기에 집중하고 있다는 거다.**", "source": "essay"}, {"id": "essay_690_8dc5a73f23", "text": "어떤 문제가 나를 계속 괴롭혀. 그 문제가 나를 괴롭힌다는 거는, 괴롭히지 않는 무수히 많은 일들 가운데서 **이것이 유달리 크게 내가 지금 거기에 집중하고 있다는 거다.** 그러니까 한편으로 보면 내 스스로 그것을 굉장히 **조건을 강화시키고 있는 거다.** 그러면 나는 또 거기에 더 집중하게 되고, 이 문제가 나한테 더 크게 다가온다는 거다. '아프지 않거나', '아파도 괜찮다'가 아니고, 고통스러운 건 고통스러운 거다. 힘든 건 힘든 거다. 분명히 그거는 내가 그렇게 느끼니까 느끼지 말라고 할 수는 없다. 하지만 그 가운데서도 **다른 면도 볼 수 있어야 한다는 거다.** 그래야 여기에 너무 매몰되지 않고 얼른 그거를 헤어 나올 수가 있다.\n\n---\n\n#### **가시를 빼는 방법**\n\n어떤 사람을 볼 때 그 사람의 유독 안 좋은 면이 보인다. '하, 저 사람 싫어.' 사람의 어떤 부분이 싫다는 거는, 그렇지 않은 부분도 분명히 있다는 거다. 다 싫어버리면 아예 얘기할 것도 없는 건데, 어떤 모습이 유달리 나한테 싫게 느껴진다는 거는 **그렇지 않은 부분도 있다는 거다.** 근데 싫은 모습에 내가 계속 집중하면 내 스스로 계속 힘들어진다는 거다. 나도 그 조건에 같이 들어가 버리기 때문에. 힘든 것과 내가 둘이 아니잖아. 몸에 가시가 박혔으면 아픈 것과 내가 둘이 아니니까 느끼는 거잖아. 상대방을 가시로 보면, **가시와 내", "source": "essay"}, {"id": "essay_691_aa45a0cb57", "text": "도 그 조건에 같이 들어가 버리기 때문에. 힘든 것과 내가 둘이 아니잖아. 몸에 가시가 박혔으면 아픈 것과 내가 둘이 아니니까 느끼는 거잖아. 상대방을 가시로 보면, **가시와 내가 둘이 아니게 돼버리는 거다.** 상대방을 가시로 생각하는 한, 물론 가시일 수도 있고 톡톡 나를 찌르고 아프고 할 수 있지만, 가시를 제외한 많은 부분들이 있다. 어쩔 수 없이 같이 살 수밖에 없는 관계라면, 가족관계든 직장이든, 그렇지 않은 부분도 있을 거라는 거다. **그러니까 그거를 봐야 한다는 거다.** 그래야 내가 스스로 박힌 가시를 내가 빼는 것과 같다는 거다. **내가 사람의 다른 면을 보는 거다. 그래야 가시가 빠지는 거다.** 사람을 위해서 용서하라는 게 아니고, 나의 가시를 내 스스로 빼기 위해서. 내 가시가 여기 살에 박혔는데 내가 빼야지 누가 빼겠어. 내가 빼야 한다. 나는 아픈데 상대방을 아무렇지 않게 대하지만 나는 아프다. 그걸 '야, 그건 네가 예민한 거 아니야' 이렇게 얘기할 수는 없다. 예민한 게 잘못된 건 아니다. 내가 예민한데 어떡해. 하지만 **딱 가시 이외에 사람의 가시 이외의 것을 봐버리는 거다.** 그게 내가 가시를 빼버리는 거다. **그게 나를 위하는 길이다.** 자꾸 그렇게 봐지면 나중에는, 내가 가시라고 느꼈던 게 가시가 아니구나 하는 걸 알게 된다는 거다. #차이인식 #고통과안전지대 #관점전환 #가시의비유", "source": "essay"}, {"id": "essay_692_48179a7e86", "text": "게 나를 위하는 길이다.** 자꾸 그렇게 봐지면 나중에는, 내가 가시라고 느꼈던 게 가시가 아니구나 하는 걸 알게 된다는 거다. #차이인식 #고통과안전지대 #관점전환 #가시의비유 #고통에매몰되지않기\n\n--- (구분선)\n\n[파일명: 찰나의진실_무아의오해_수필.md]\n\n### **찰나의진실_무아의오해_수필**\n\n#### **찰나찰나 매 순간 진실하다**\n\n**찰나찰나 매 순간 진실하다는 거다.** 없는 게 아니다. 무아(無我)라는 게 자칫 오해가 생기는데, **무아는 고정된 실체가 없다는 거다.** 찰나찰나인 나는 그게 나잖아. 찰나찰나에 존재하는 내가 나잖아. 찰나찰나 존재하는데, **찰나찰나가 존재할 때에 대상과 내가 항시 같이 나온다.** 나만 따로 존재하는 게 아니고, 상황과 내가 함께 나온다는 거다. 내가 추구하는 것이라든가 내가 해결해야 될 문제라든가 그런 것들은 **찰나찰나 순간에서 찾아야 한다.** 어디 딴 데, 내 생각으로, 무슨 방편으로 찾는 게 아니라. 그 찰나찰나 순간순간 나와 상황이 같이 하나로 돌아가는 그게 참나니까, 그게 온통 나니까. 거기에만 내가 존재할 수 있는 거잖아. 딴 데 존재하는 게 아니고. 그러니까 내가 존재할 수밖에 없는 그곳에서 내가 뭔가를 찾고 방법을 찾고 해결하려고 하면 **거기서 해결해야 한다.** 그러니까 찰나찰나가 진실한 거다. 근데 우리가 자꾸 그거를 없다거나, 무니까, 무아니까 없다", "source": "essay"}, {"id": "essay_693_4f74bbe731", "text": "그곳에서 내가 뭔가를 찾고 방법을 찾고 해결하려고 하면 **거기서 해결해야 한다.** 그러니까 찰나찰나가 진실한 거다. 근데 우리가 자꾸 그거를 없다거나, 무니까, 무아니까 없다, 다 꿈이다, 이렇게 해버리면 안 된다는 거다. #찰나찰나 #무아의오해 #고정된실체없음 #지금여기 #참나는순간에있다\n\n--- (구분선)\n\n[파일명: 참나를찾을수없는이유_의식의나_수필.md]\n\n### **참나를찾을수없는이유_의식의나_수필**\n\n#### **코칭과 명상 단락**\n\n코칭만으로는 부족하다. 코칭과 명상이 함께 가야 한다. 코칭은 조건 지어진 것들을 인식하고 새로운 방향을 찾게 해주지만, 그 조건 지어짐의 뿌리를 실질적으로 느슨하게 해주는 것은 명상이다. 두 가지가 쌍두마차로 함께 들어가야, 사람이 비로소 조건 지어짐으로부터 진짜 자유로워질 수 있다. 코치들도 마찬가지다. 코칭만 하는 것으로는 한계가 있다. 명상이 함께 들어간 코칭이어야, 고객이 코치에게 매이지 않고 스스로 성장하는 힘을 키울 수 있다.\n\n#### **빨간 신호등은 안내다**\n\n좋고 나쁜 일이 따로 있는 게 아니다. 빨간 신호등은 이 길이 아니고 다른 길로 가라는 것을 제시해 주는 것일 수 있다. 상황이 나를 막는 것처럼 느껴질 때, 그것은 사실 **나의 의식이 성장하는 방향으로 상황이 몰고 가는 것**이다. 데이비드 호킨스는 이것을 '영혼의 어두운 밤'이라 표현했다. 당시에는 굉장", "source": "essay"}, {"id": "essay_694_4871f03b6b", "text": "를 막는 것처럼 느껴질 때, 그것은 사실 **나의 의식이 성장하는 방향으로 상황이 몰고 가는 것**이다. 데이비드 호킨스는 이것을 '영혼의 어두운 밤'이라 표현했다. 당시에는 굉장히 힘들지만, 거치고 나면 많이 성장해 있다. 어둡다는 것은 드러나지 않았다는 것이고, 밝아진다는 것은 의식화됐다는 것이다.\n\n---\n\n#### **무의식과 잠재의식은 다르다**\n\n그런데 여기서 말을 정확히 해야 한다. 사람들이 흔히 '무의식'이라고 부르는 것은 사실 **잠재의식**이다. 심리학자들도 잘못 쓰고 있다. 무의식은 완전히 없는 것이다. 무(無)에서 유(有)가 나올 수는 없다. 화면 자체가 없는 것이 무의식이다. 그런데 잠재의식은 다르다. 화면이 꺼진 상태다. 언제든지 켜면 다시 드러날 수 있다. 불이 켜질 수 있는 대기 상태. 드러나지 않은 상태일 뿐, 있다. 우리 몸도, 지금의 대상들도 한편으로 보면 다 잠재돼 있는 것이다. 우리가 의식화시켰을 때 드러나는 것이다.\n\n---\n\n#### **'안다'는 것의 한계**\n\n우리는 안다고 착각한다. \"나는 저 사람을 알아.\" 그런데 정말 아는가? 내가 해석한 것이다. 내 수준에서 이해했을 뿐이다. 그래서 그 사람이 예상과 다르게 행동하면 \"내가 알던 애가 아니네\"라고 한다. 알았던 게 아닌데 알았다고 생각한 것이다. 사람만이 아니다. 글도, 상황도, 모든 대상이 그렇다. 우리가 진정으로 알 수 있는 것은", "source": "essay"}, {"id": "essay_695_508f14a9b6", "text": "행동하면 \"내가 알던 애가 아니네\"라고 한다. 알았던 게 아닌데 알았다고 생각한 것이다. 사람만이 아니다. 글도, 상황도, 모든 대상이 그렇다. 우리가 진정으로 알 수 있는 것은 없다. **'안다'가 아니라 '이해한다'고 해야 더 정확하다.** '나는 지혜를 속속들이 다 알아'라고 하면 말이 안 된다. 다 안다고 착각하기 때문에 거기서 오해가 생긴다. 모른 적이 없다. 계속 알고 있었다. 그게 의식이다. 그게 우리의 기본 세팅 값이다.\n\n---\n\n#### **참나를 찾을 수 없는 이유**\n\n사람들은 참나를 찾으러 인도를 가고, 명상을 하고, 수행을 한다. 그런데 '찾는다'는 것 자체가 문제다. **알려지면 이미 대상이다.** '내가 참나를 찾았다'고 하는 순간, 참나는 나의 대상으로 전락해 버린다. 나와 참나가 분리된다. 그러면 다시 내가 주관이 되고 참나가 객체가 된다. 이것은 참나가 아니다. 아는 주체는 알 수가 없다. 이게 있고 없고 하는 것을 아는 그것, 그게 나다. 그런데 그 '아는 것' 자체를 어떻게 알 수 있는가? 그것을 알겠다는 순간 그것은 이미 대상이 되어 버린다. 그러니 알 수가 없다. '참나를 찾았다'고 하는 사람들은 찾은 게 아니다. 잊어버린 그게 참나인데, 그것을 대상으로 만들어 버린 것이다.\n\n---\n\n#### **'나의 의식'이 아니라 '의식의 나'**\n\n'나의 의식'이라고 하면 나와 의식을 분리하는 것이", "source": "essay"}, {"id": "essay_696_920d28c332", "text": "잊어버린 그게 참나인데, 그것을 대상으로 만들어 버린 것이다.\n\n---\n\n#### **'나의 의식'이 아니라 '의식의 나'**\n\n'나의 의식'이라고 하면 나와 의식을 분리하는 것이다. 나라는 것이 먼저 있고 그 나에게 의식이 딸려 있다는 뜻이 된다. 그런데 그게 아니다. 의식이 먼저다. '의식의 나'가 맞다. 의식이 있고, 그 의식 안에서 내가 드러나고 있는 것이다. 종지에 바다를 담으려는 것처럼, 작은 그릇인 나 안에 어떻게 의식을 넣겠는가. 나한테 어떻게 의식을 넣나. 의식 속에 내가 지금 드러나 있는 것이다. 의식이 나보다 선험적으로, 더 바깥에 있는 것이다. 내가 여기 있다는 것을 의식이 알고 있으니까. 이것을 알면 '내가 깨달았다'는 말 자체가 성립하지 않는다. 깨달음 속에 내가 있는 것이지, 내 속에 어떻게 깨달음을 넣겠는가. . #참나 #의식의나 #잠재의식 #앎의한계 #불이\n\n--- (구분선)\n\n[파일명: 참나찾기의역설_삶의역동성_수필.md]\n\n### **참나찾기의역설_삶의역동성_수필**\n\n#### **참나를 찾는다는 것은 넌센스다**\n\n코치들이나 이런 사람들이 **참나**를 찾는다고 한다. 트루 셀프(True Self), 참나를 찾으려고 노력하고 그랬는데, 참나가 있다는 것은 지금 거짓 나라는 거 아닌가. 내가 나의 삶을 지금에서 부정하는 거다, 그거는. 참나를 찾는다는 거는. 참나를 찾았어. 그러면 참나를 찾기 전에", "source": "essay"}, {"id": "essay_697_3613c9ca36", "text": "고 그랬는데, 참나가 있다는 것은 지금 거짓 나라는 거 아닌가. 내가 나의 삶을 지금에서 부정하는 거다, 그거는. 참나를 찾는다는 거는. 참나를 찾았어. 그러면 참나를 찾기 전에 모든 것들은 거짓이었다는 거지, 그렇지 않은가. 그러니까 이거는 **넌센스**라는 거다. 참나라는 것이 따로 있는 게 아니라는 거다. **내가 참이다.** 참나가 아니고, 참된 나가 따로 있는 것이 아니고, **내가 참이었구나.** 나의 삶 통째로가, 나를 포함한 나를 둘러싼 모든 것, 있는 그대로가 참이었구나 하는 거를 온전하게 수용하는 것, 그게 참나를 지금 발현하고 깨닫는 거다. 어디 딴 데서 참나를 따로 얻는 게 아니라는 거다. 배워서 만든, 만들려고 했던 그것이 거짓이었다는 거 아닌가. 수련을 하고 뭔가를 해서 내가 참나가 됐어. 그러면 안의 알맹이가 거짓이라는 거 아닌가. 그렇게 돼서 형성된 참나가 그게 참나겠냐는 거다.\n\n---\n\n#### **도라고 이름을 지으면 이미 도가 아니다**\n\n참나가 따로 있다면, 참나는 진정한 참나가 아니라는 거다. 마치 **'도가도 비상도'(道可道 非常道)**처럼, 도라고 이름을 지으면 그것은 이미 도가 아닌 거다. 부처, 여래, 여래라는 상을 세우면 이미 그것은 여래가 아닌 거다, 금강경에서 말하듯이. 그러니까 **내가 참나를 찾았어** 하면, 그거는 이미 **넌센스**를 내 스스로가 생각으로 만들어서 착각을 하고", "source": "essay"}, {"id": "essay_698_0c9063ce2f", "text": "상을 세우면 이미 그것은 여래가 아닌 거다, 금강경에서 말하듯이. 그러니까 **내가 참나를 찾았어** 하면, 그거는 이미 **넌센스**를 내 스스로가 생각으로 만들어서 착각을 하고 있는 거다. 참이라는 것과 거짓은 항시 같이 다닌다. 동전의 양면처럼. 참인데 거짓이 있어야 참이라고 할 수 있다. 거짓이 없는데 참이라고 할 수 있겠나. 그러니까 **참이라고 할 때는 이미 거짓을 내포하고 있다는 거다.** 그거는 진정한 참이라고 볼 수가 없는 거다. 어떤 참이라고 하는 상태가 따로 딱 고정되게 있다 하고 명사화시켜버리면, 그 참이라는 조건에 묶여버리는 거 아닌가. 그게 이제 굳어져 버리는 거다. **참라는 것은 어떤 동적인 상태여야 한다.** 언어로 따지면 동사가 돼야 한다는 거다.\n\n---\n\n#### **참나는 역동 속에 있다**\n\n매 순간 끊임없이 역동적으로 흐르고, 리듬과 율동과 춤사위가 쳐지는. **참나라는 거는 이렇게 역동이 발생되기 때문에 신이 나고 흥이 나는 거다.** 그 속에서. 그게 살아있음을 나타내는 거다. 살아있음, 역동성. 코칭 쪽에서는 **심리 역동**이 일어난다고 하는데, 역동이 일어난 상태가 리듬이다. **율려(律呂)**라고 하기도 한다. 율려에 딱 맞아떨어진 거다. 내 흐름을 탄 거다. 흐름을 타면 고저장단이 생기잖아. 높낮이가 생긴단 말이다. 높낮이가 생기니까 여기서 에너지의 역동이 일어나는 거다, 이 고저", "source": "essay"}, {"id": "essay_699_c3f1a84a2c", "text": "다. 율려에 딱 맞아떨어진 거다. 내 흐름을 탄 거다. 흐름을 타면 고저장단이 생기잖아. 높낮이가 생긴단 말이다. 높낮이가 생기니까 여기서 에너지의 역동이 일어나는 거다, 이 고저장단에 맞춰서. 거기에서 가락이 생기고, 리듬이 생기고, 흥이 나온다. 그러면서 이제 **신바람**이 생기는 거다.\n\n---\n\n#### **어렸을 때의 역동성**\n\n삶의 어떤 역동성, 원래 우리가 잃지 않았던 역동성, 어렸을 때 느꼈던 것. 어렸을 때 놀아도 피곤하지가 않잖아. 걔네들은 삶과 자기가 분리되어 있지가 않았다. 그냥 놀이 자체가 다 그냥 나였잖아. **놀이와 내가 둘이 아니었거든.** 그러니까 역동 속에 있으니까 항시 신나고 그냥 재밌고 그렇게 살지. 근데 우리는 삶과 내가 분리가 돼버리니까 역동에서 내가 빠져나오고, 나의 유리한 쪽으로 삶을 자꾸 받고 싶고, 조정하고 싶고, 그렇게 되니까 내가 신호를 치는 거다. 그건 **나를 조건화시키는 거다.** 나를 강화시킨다는 거는 특정 조건으로 나를 강화시킨 거거든. 그러면 이제 많은 강화된 나를 만나게 돼, 상대적으로. 그러니까 **세상이 힘든 거다.**\n\n---\n\n#### **있는 그대로가 온전한 치유다**\n\n이런 부분들을 시로도 풀 수 있고, 코칭으로도 풀 수 있고, 철학으로도 풀 수 있고, 전자책으로도 풀 수 있다. 그렇게 여러 가지로 사람들을 있는 그대로 이게 온전한 치유다. 심리 치료나 내면", "source": "essay"}, {"id": "essay_700_5d4fd1c450", "text": "시로도 풀 수 있고, 코칭으로도 풀 수 있고, 철학으로도 풀 수 있고, 전자책으로도 풀 수 있다. 그렇게 여러 가지로 사람들을 있는 그대로 이게 온전한 치유다. 심리 치료나 내면의 아이나 그런 걸로 해서 할 수는 있지만, 그것은 과거를 지금 현재에 가져와서 치유가 된 상태지, 미래의 어떤 그것은 안 되잖아. 근데 **과거 현재 미래가 따로 있는 것이 아니고, 온통 지금 있는 그대로가 온통 참**이라고 본다면, 거기엔 치유도 없고 다 없는 거다. **그렇게 돼야 진짜 온전한 치유가 일어난 거란 말이다.** 이것도 참나라는 건 명사잖아. 그럼 참이라는 어떤 거에 가둬놓는 거다. **조건을 지어버린 거다.** 그렇기 때문에 이게 진정한 참나라고 볼 수가 없다. #참나의역설 #도가도비상도 #삶의역동성 #율려 #있는그대로가치유다\n\n--- (구분선)\n\n[파일명: 초와촛불_불성의발현_수필.md]\n\n### **초와촛불_불성의발현_수필**\n\n#### **초의 성품은 빛이다**\n\n초를 물질로 보면 그냥 밀랍 덩어리다. 그런데 초의 성품은 무엇인가? 촛불을 밝히는 것이다. 빛을 내서 주위를 밝히는 것, 그것이 초의 성품이다. 이것을 사람에게 적용해 본다. 우리에게는 원래 불성이 있다. 그 빛이 초가 있어서 새로 생기는 게 아니다. 원래 빛은 있었던 것이다. 다만 초라는 인연을 만나서 빛이 나는 거다. 촛불이 그렇게 드러나듯, 우리의 불성도 그렇게 드러", "source": "essay"}, {"id": "essay_701_77e3ed7868", "text": "이 있다. 그 빛이 초가 있어서 새로 생기는 게 아니다. 원래 빛은 있었던 것이다. 다만 초라는 인연을 만나서 빛이 나는 거다. 촛불이 그렇게 드러나듯, 우리의 불성도 그렇게 드러난다. **지금 이 자체가, 있는 그대로 우리가 촛불을 밝히고 있는 것이다.** 불성을 밝히고 있으니까, 이 드러나는 모든 것이 그대로 비치고 불성이 된다. 지금 이 자체가.\n\n---\n\n#### **지금 여기에 머무른다는 것**\n\n명상을 하건, 좌선을 하건, 여느 때든. 지금 여기에 존재한다는 것은, **초가 촛불을 지금 밝히고 있는 것**이다. 지금 여기에 머무른다는 것은 그런 뜻이다. 무언가를 이루거나 완성하는 게 아니다. 지금 이 자리에서 이미 밝히고 있는 것이다. 수행은 그 사실로 돌아오는 일이다.\n\n---\n\n#### **초도, 촛불도, 공간도 온통 나다**\n\n그런데 초 따로, 촛불 따로, 공간 따로가 아니다. 초도, 촛불도, 이 공간 자체도 다 그냥 온통 나다. 아침에 의식이 깨어나면 공간이 인식되고, 나 자신도 인식되고, 대상도 인식된다. 그런데 그것들은 어느 하나라도 분리되면 나타날 수 없다. 초가 없으면 촛불이 없다. 촛불이 없으면 초가 있은들 그게 뭐에 쓰이는지 알 수 없다. 빛이 없으니까 대상도 드러나지 않는다. 그것들이 다 동시에 드러난다. 따로따로 드러나는 게 아니다. 그래서 **둘이 아니다.** #불성 #촛불비유 #지금여기 #불이 #존", "source": "essay"}, {"id": "essay_702_b75636a72d", "text": "수 없다. 빛이 없으니까 대상도 드러나지 않는다. 그것들이 다 동시에 드러난다. 따로따로 드러나는 게 아니다. 그래서 **둘이 아니다.** #불성 #촛불비유 #지금여기 #불이 #존재\n\n--- (구분선)\n\n[파일명: 촛불명상_의식의나_수필.md]\n\n### **촛불명상_의식의나_수필**\n\n#### **초에 불을 켜기 전**\n\n자신이 초라고 상상해 보라. 아직 불이 켜지지 않은 초. 깜깜하다. 드러나는 게 없다. 이제 누군가 불을 켰다. 눈을 뜨면 보인다. 촛불이 켜졌으니까 보인다. 눈을 감으면 깜깜하다. 다시 뜨면 드러난다. 이 꺼짐과 드러남이 어디서 벌어지고 있는가? 여기서. 나의 꺼짐과 드러남이 여기서 벌어지고 있다. 그럼 뭐가 나인가? 내가 어디 있는가? **내가 아는 곳에 내가 다 있다.** 두 사람이 각자 눈을 감았다 떴다 해도, 밝음의 앎은 달라지지 않는다. 색맹이라면 색깔은 달리 보일지언정, 안다는 것 자체는 똑같다. 아는 것의 질은 나눌 수 없다.\n\n---\n\n#### **경계를 나눌 수 없다**\n\n두 개의 초에 불을 켜면 방이 환해진다. 그런데 이 환함 중에서, 어디까지가 내 밝음이고 어디서부터가 네 밝음인가? 나눌 수 없다. 100개의 초가 한 방에 켜져도 마찬가지다. 100개의 밝음의 경계를 그을 수 없다. **의식에는 경계가 없다.** 그래서 의식이 나다. 나의 의식이 아니라 **의식의 나**다. 아는 그것은 나눌 수", "source": "essay"}, {"id": "essay_703_6f6b530582", "text": "방에 켜져도 마찬가지다. 100개의 밝음의 경계를 그을 수 없다. **의식에는 경계가 없다.** 그래서 의식이 나다. 나의 의식이 아니라 **의식의 나**다. 아는 그것은 나눌 수 없다. 하나의 의식이 너라는 초를 통해서 빛나고, 나라는 초를 통해서 빛난다. 너와 나는 하나라는 말이 아니다. **둘이 아니라는 것**이다. 하나라면 대상이 없으니 알 수가 없다. 둘이라면 만날 수가 없다. 둘이 아니기 때문에 서로를 알아보는 것이다.\n\n---\n\n#### **아는 것이 나다**\n\n차 안에서 바깥 경치를 볼 때, 경치는 대상이고 아는 것은 나다. 주관이기 때문에 나다. 눈이 있어도 대상이 없으면 무엇을 보는지 알 수 없다. 귀가 있고 소리가 있어도 깊이 잠들면 듣지 못한다. 보는 대상, 보는 눈, 그리고 그것을 아는 나. 이 셋 중 하나라도 없으면 본다는 내가 없다. 셋은 따로 떨어져 있지 않다. 내가 뇌 속에 있다면 지금 뇌 안을 훤히 들여다보고 있어야 한다. 그렇지 않다. 나는 몸 안에 있지 않다. 내가 몸이 있다는 걸 안다는 것은, 내가 몸을 벗어나 있다는 것이다. 보이는 것, 들리는 것, 느끼는 것 — 이 모든 것이 드러나는 공간. 꺼짐과 드러남을 다 담고 있는 이 공간. 그것이 나다. 이 스페이스, **이것이 나다.** 깊은 잠에 빠지면 나는 없다. 죽었을 때도 없다. 그렇게 없어졌다 생겼다 하는 나는 현상적인 나다. 불이 꺼진 상", "source": "essay"}, {"id": "essay_704_d2ab9a38e8", "text": "있는 이 공간. 그것이 나다. 이 스페이스, **이것이 나다.** 깊은 잠에 빠지면 나는 없다. 죽었을 때도 없다. 그렇게 없어졌다 생겼다 하는 나는 현상적인 나다. 불이 꺼진 상태의 초처럼, 잠재태로 있는 것이다. 화면이 꺼져 있는 것처럼. **그러나 진짜 나는 항시 있다.**\n\n---\n\n#### **조건 지어진 나와 큰 나**\n\n\"내 맘대로 되지 않는데 어떻게 다 나라고 할 수 있냐\"는 물음이 나온다. '내 맘대로 된다'는 것은 조건 지어진 나다. 촛불이 꺼졌을 때의 초를 나라고 생각하는 것이다. 그 초는 작은 나, 육신의 나다. 그러나 꺼짐과 드러남을 담고 있는 이 공간은 꺼지지 않는다. 네 촛불이 꺼져도 이것은 남아 있다. 그것이 **온통 나**다. 우리가 완전히 별개라면 서로 만날 수도 없었을 것이다. 완전히 다른 차원에 있다면 같은 공간에서 보고 듣고 느끼고 할 수 없다. 어떤 연결고리가 있기 때문에 같은 차원에서 함께 있는 거다. 이것을 알 때 비로소 진정으로 쉴 수 있다. 다 나니까. 그리고 나만을 생각하던 데서, 더 많은 사람을 생각하게 된다. **이것이 다 나이기 때문에.** 세계관이 바뀌는 거다. 원래 사람은 주관적이다. 내가 하고 싶은 대로 하고 싶다. 그러나 이게 다 나라는 것을 알게 되면, 더 좋은 방향이 '나한테 좋은 방향'이 된다. 지혜한테 좋은 게 아니라, 나한테 좋은 것. 나는 온통이니까. 『하느님과의", "source": "essay"}, {"id": "essay_705_5988b8f8d9", "text": "대로 하고 싶다. 그러나 이게 다 나라는 것을 알게 되면, 더 좋은 방향이 '나한테 좋은 방향'이 된다. 지혜한테 좋은 게 아니라, 나한테 좋은 것. 나는 온통이니까. 『하느님과의 수다』라는 책에 이런 이야기가 나온다. 청년이 신에게 묻는다. 이것도 바랐는데 안 됐고, 저것도 바랐는데 안 됐다고. 그런데 대화를 나눠보니 결국 다 자기가 바란 대로 이루어졌던 것이다. 삶이 그렇다. 이것을 인식하게 되면 삶에 대한 **엄청난 책임감**이 생긴다.\n\n---\n\n#### **불성은 설명되지 않는다, 체험되어야 한다**\n\n촛불을 실제로 켜놓고 이 명상을 하면 더 파워풀하다. 각자 자신의 촛불을 켜고 앉는다. 불성을 설명으로 알 수는 없다. 체험해야 한다. 법문을 일방적으로 하는 게 아니라, 사람들 안에 있는 것을 끄집어내주는 것이다. 불성을. AI 시대가 될수록 사람들은 더 영적으로 목말라할 것이다. AI가 지식을 대신해주면, 우리는 지식 너머로 갈 수밖에 없다. 그래서 영적인 것이 더 필요해진다. 코칭과 명상이 그 역할을 할 수 있다.\n\n#### **물질적 풍요와 영적 빈곤 단락**\n\n한국은 물질적으로 풍요롭다. 먹을 것도 넘치고 살기 편한 환경도 갖춰졌다. 그런데 정서적으로, 영적으로는 풍요롭지 않다. 물질의 풍요가 영적 목마름을 채워주지 못한다. AI가 지식을 대신해주는 시대가 될수록, 사람들은 지식 너머를 갈구하게 된다. 그 목마름을 채", "source": "essay"}, {"id": "essay_706_2d0b92ff91", "text": "정서적으로, 영적으로는 풍요롭지 않다. 물질의 풍요가 영적 목마름을 채워주지 못한다. AI가 지식을 대신해주는 시대가 될수록, 사람들은 지식 너머를 갈구하게 된다. 그 목마름을 채울 수 있는 것이 코칭과 명상이다. 이 역할을 해야 한다.\n\n#의식의나 #촛불명상 #불이 #올셀프 #불성\n\n--- (구분선)\n\n[파일명: 추상과구상_덜어냄_수필.md]\n\n### **추상과구상_덜어냄_수필**\n\n#### **스쳐 지나갈 때와 자세히 볼 때**\n\n경치를 보면서 스쳐 지나갈 때, 사물은 구체적으로 보이지 않는다. 그냥 덩어리로, 대충의 윤곽으로만 지나간다. 그런데 '저것이 무엇이다' 하고 눈에 인식이 되는 순간, 비로소 구체적인 상(相)이 생긴다. 스쳐 지날 때는 추상적으로 처리되고, 집중해서 볼 때는 구상(具象)으로 잡힌다. 이것이 뇌가 추상과 구상을 처리하는 방식이다. 그런데 구상이라 해서 그 사물의 전체를 보는 것도 아니다. 우리는 비춰지는 면밖에 볼 수 없다. 그러니 구상으로 본다는 것도 어떻게 보면 반쪽짜리다. 그리고 그 구상으로 '이것이 뭐다' 하고 분별을 해봐야, **본질을 파악하려면 결국 추상으로 갈 수밖에 없다**. 잡다한 것이 빠져야 본질이 드러나기 때문이다.\n\n---\n\n#### **추상화가 그렇게 그려지는 이유**\n\n구상이 인식의 영역이라면, 추상은 의식의 영역이다. 의식적으로 다가오는 것이다. 추상으로 들어가면, 본질에서는 형", "source": "essay"}, {"id": "essay_707_23fb428561", "text": "이다.\n\n---\n\n#### **추상화가 그렇게 그려지는 이유**\n\n구상이 인식의 영역이라면, 추상은 의식의 영역이다. 의식적으로 다가오는 것이다. 추상으로 들어가면, 본질에서는 형태도 특정한 상도 다 없다. 본질에서는 결국 다 추려질 것이고, 추려지고 남은 것들은 다 비본질적인 것이기 때문이다. 추상화(抽象畫)를 그리는 화가들이 하는 일이 바로 그것이다. 사물의 본질을 계속 줄여나가고, 추려나가고, 추려나가다 보니 어떤 면, 선, 색만 남는 것이다. 그래서 추상화에는 나무도, 꽃도, 구름도, 소도, 사람도, 집도 없다. **본질에는 그런 것들이 없기 때문이다**. 본질로 들어가면 다 하나의 어떤 상일 뿐이다. 아주 본질로 들어가면, 결국 우리에게 비춰지는 것들은 일체가 다 상뿐이다. 상이기 때문에 변한다. 실상이라면 변하지 않아야 한다. 그런데 여기에 공간과 시간이라는 또 하나의 상이 붙어버리니까 이것이 실감이 나는 것이다. 공간도 상이고 시간도 상이고 보여지는 것도 다 상이다. 그러니 공간도, 시간도, 물질도 다 우리 마음이 그려낸 것이다. 우리 마음이 비춰낸 것이다.\n\n---\n\n#### **실오라기 하나 걸치지 않고**\n\n본질에 다가서기 위해서는 다 털어내야 한다. 잡다한 지식이고 뭐고 다 필요 없다. **\"실오라기 하나 걸치지 않고\"**, \"내가 머릿속에 뭘 안다, 어쩐다\" 이런 것도 다 놔줘야 비로소 본질에 다가설 수 있다.", "source": "essay"}, {"id": "essay_708_2cf9a0e986", "text": "내야 한다. 잡다한 지식이고 뭐고 다 필요 없다. **\"실오라기 하나 걸치지 않고\"**, \"내가 머릿속에 뭘 안다, 어쩐다\" 이런 것도 다 놔줘야 비로소 본질에 다가설 수 있다. 본질을 한 번은 마주쳐봐야 한다. 자기가 추구하는 것에서 그 본질이 뭔지는 한 번 깊이까지 맞닥뜨려봐야 한다. 본질에 다가간다는 것은 **단순성**이다. 단순하고 본질적인 것이기 때문에 거기서 오히려 어마어마한 확장성이 생긴다. 딱 정해지면 더 이상 발전이 없다. 나무는 나무로 끝이다. 나무가 토끼가 될 수는 없다. 그런데 본질로 들어가면, 드러난 현상들은 본질의 **변용**이기 때문에, 본질을 알면 얼마든지 그 변용을 할 수 있다. 본질을 접하고 나서 그 뒤에 무궁무진한 것을 펼칠 때, 하고자 하는 일이 훨씬 풍요로워지고 값어치가 달라진다.\n\n---\n\n#### **시도 결국 추상이다**\n\n시도 자꾸 줄여나가는 것이다. 불필요한 것을 다 줄여나가고 추려서, 남는 그 어떤 것만이 시다. **추상과 결국 같은 것이다**. 본질에 다가서기 위해 덜어내는 일, 군더더기를 없애는 일, 이것이 시이고 추상화이고 코칭이다. 어느 분야에서 무언가를 진정으로 추구한다면, 그 본질을 한 번은 접해봐야 한다. 본질을 마주치지 않고 펼치는 것과, 본질까지 내려가 보고 나서 펼치는 것은 다르다. 덜어낼수록 드러난다. #추상 #구상 #덜어냄 #본질 #SSF\n\n--- (구분선)\n\n[파", "source": "essay"}, {"id": "essay_709_43681f6115", "text": "한다. 본질을 마주치지 않고 펼치는 것과, 본질까지 내려가 보고 나서 펼치는 것은 다르다. 덜어낼수록 드러난다. #추상 #구상 #덜어냄 #본질 #SSF\n\n--- (구분선)\n\n[파일명: 코치의비전_대승보살도_수필.md]\n\n### **코치의비전_대승보살도_수필**\n\n#### **마차는 어디로 가는가**\n\n왜 나로 살아야 하는가. 왜 코치로 살아야 하는가. 코치는 고객과 사회에 어떤 비전을 제시하는 사람이어야 하는가. 이 물음들이 코치의 여정을 어떻게 걸어가야 하는지를 결정한다. 코치(Coach)의 어원은 마차다. 마차는 고객이 원하는 곳으로 간다. 고객을 태우고, 고객이 가리키는 방향으로 달린다. 그것이 코치의 역할이라고들 안다. 그런데 나는 여기서 한 번 더 묻는다. 고객이 원하는 그 방향이 정말 고객 자신이 원하는 것인가? 사회에서 강요되고 부여된 것은 아닌가? 조건이 하나도 없었어도, 아무 제약이 없었어도, 여전히 그 길을 원하는가? **이 물음을 확실하게 물어봐 줘야 한다.** 당신이 가는 길이 맞습니까? 이게 누구한테 조건 지어진 방향성이 아니라, 정말 당신이 원하는 것입니까? 그리고 이것이 우리 모두의 유익을 위해 정말 필요한 것입니까? 그 합의가 됐을 때, 맞아졌을 때에 코치가 고객을 태우고 간다. 그 비전을 향해서.\n\n---\n\n#### **소승과 대승, 작은 마차와 큰 수레**\n\n마차가 작으면 소승(小乘)이다. 고객 한", "source": "essay"}, {"id": "essay_710_93a2c18ade", "text": "됐을 때, 맞아졌을 때에 코치가 고객을 태우고 간다. 그 비전을 향해서.\n\n---\n\n#### **소승과 대승, 작은 마차와 큰 수레**\n\n마차가 작으면 소승(小乘)이다. 고객 한 사람만을 위한 것이다. 그런데 내가 끄는 마차가 큰 수레라면, 그것은 대승(大乘)이다. 고객 한 사람을 넘어, 조직이 될 수도 있고, 사회가 될 수도 있다. 코치는 불교에서 말하는 보살이다. **대승보살도를 실현해야 한다.** 왜 그런가? 고객이 원하는 것이 사회에 반한다면, 그것은 결과적으로 고객 자신에게도 안 좋다. **사회가 전부 '온통 나'니까.** 올셀프의 관점에서 보면, 나와 남이 둘이 아니기 때문에, 모두가 유익된 방향으로 가야 비로소 개인인 나도 행복해질 수 있다. 고객이 행복해지고, 그 여정을 함께하는 코치도 행복해진다.\n\n---\n\n#### **코치가 드라이버인 이유**\n\n코치는 마차의 드라이버다. 고객이 원하는 대로 끌려가는 게 아니라, 고객과 조직과 사회가 함께 바라는 공통된 비전을 향해 같이 갈 수 있도록 **운전자의 역할**을 해야 한다. 고객의 개인적인 욕망만을 채우려는 방향으로 무작정 달려가는 것, 그것에 대해 코치가 어떻게 생각해야 하는지 아직 확고하게 정립이 안 된 코치들이 많다. 그런데 **대승보살도**의 관점에서, **올셀프**의 관점에서 보면 분명해진다. 모두의 유익을 향할 때 비로소 개인도 행복해진다. 코치로 사는 것은,", "source": "essay"}, {"id": "essay_711_d6e97be1fc", "text": "정립이 안 된 코치들이 많다. 그런데 **대승보살도**의 관점에서, **올셀프**의 관점에서 보면 분명해진다. 모두의 유익을 향할 때 비로소 개인도 행복해진다. 코치로 사는 것은, 나로 사는 것이고, 그 '나'가 온통이기 때문에, 코치의 비전은 필연적으로 고객과 사회를 향할 수밖에 없다. #코칭 #대승보살도 #올셀프 #비전 #불이\n\n--- (구분선)\n\n[파일명: 코칭사업_방향메모.md]\n\n### **코칭사업_방향메모.md**\n\n#### **작성 맥락**\n\n대화 중 나온 사업·콘텐츠 방향 구상 메모. 철학 수필과 별도로 정리.\n\n---\n\n#### **코칭 + 명상 쌍두마차**\n\n- 코칭만으로는 부족하다. 코칭과 명상이 함께 들어가야 조건 지어짐으로부터 진정한 자유가 가능하다.\n- 명상이 함께할 때 코칭 효과가 지속된다. 고객이 코치에게 매이지 않고 스스로 성장하게 된다.\n- 일반 고객에게도 코칭과 명상을 함께 제공하는 구조가 필요하다.\n\n---\n\n#### **가격 전략**\n\n- 비싼 상품을 사려는 사람은 생각보다 많다. 프리미엄 상품으로 포지셔닝할 것.\n- 가격이 비쌀수록 고객이 더 열심히 참여한다. 공짜는 효과가 안 난다.\n- 코칭을 공짜로 해주면 안 된다.\n\n---\n\n#### **콘텐츠·프로그램 개발 방향**\n\n- 코칭 프로그램, 교육 프로그램, 전자책, 명상 프로그램을 계속 만들고 상품화한다.\n- 이론을 현장에서 적용하면서 체화시", "source": "essay"}, {"id": "essay_712_85871c9b7d", "text": "---\n\n#### **콘텐츠·프로그램 개발 방향**\n\n- 코칭 프로그램, 교육 프로그램, 전자책, 명상 프로그램을 계속 만들고 상품화한다.\n- 이론을 현장에서 적용하면서 체화시키고, 이론과 현장의 갭을 좁혀 나간다.\n- 이 과정을 통해 독자적인 강력한 코칭 프로세스를 완성한다.\n- 완성된 프로세스로 코치를 양성하여 선한 영향력을 더 넓게 펼친다.\n\n---\n\n#### **해외 확장**\n\n- 논문 작성 및 발표를 통해 해외에도 알릴 수 있다.\n\n--- (구분선)\n\n[파일명: 코칭의본질_혼줄을찾아라_수필.md]\n\n### **코칭의본질_혼줄을찾아라_수필**\n\n#### **혼줄이 나와야 실마리가 풀린다**\n\n코칭을 할 때 고객의 혼줄을 나게 해야 한다. 혼줄이 나야 혼의 줄이 나온다. 혼의 줄이 실마리가 된다. 거기서부터 실마리가 풀린다. 그렇다면 혼이란 무엇인가. 고객의 욕구, 아주 원초적인 욕구다. 고객이 '이건 해결해야 되겠다'고 잠재되어 있는 것. **그게 말에 실리는 것이 혼이다.** 다른 게 혼이 아니다.\n\n---\n\n#### **혼은 비어 있는 곳으로 간다**\n\n혼이 움직이는 방향이 있다. **내가 비어 있다고 하는 곳으로 간다.** 돈이 부족하다고 느끼면 마음이 돈 있는 쪽으로 간다. 아름다움이 부족하다고 느끼면 아름다움을 채우려 간다. 배가 고프면 보이는 게 다 밥이다. \"밥 줘.\" 그 말이 나온다. 그게 혼줄이다. 사람이", "source": "essay"}, {"id": "essay_713_8d3e72e69c", "text": "끼면 마음이 돈 있는 쪽으로 간다. 아름다움이 부족하다고 느끼면 아름다움을 채우려 간다. 배가 고프면 보이는 게 다 밥이다. \"밥 줘.\" 그 말이 나온다. 그게 혼줄이다. 사람이 정말 해결해야 할 것이 말에 실릴 때, 욕구와 니즈가 말로 나올 때, **그것이 혼줄이 된다.** 혼줄이 나오면 고객은 자신의 근본 욕구가 무엇인지를 스스로 파악하게 된다. 내가 무엇을 욕망하는지를 알게 된다. 그래서 코치는 고객을 혼줄 나게 해야 한다. 고객이 혼줄이 나야 본인의 문제를 해결할 수 있는 실마리를 찾을 수 있다. #혼줄 #코칭본질 #실마리 #욕구 #경청\n\n--- (구분선)\n\n[파일명: 코칭의정신_해답은안에있다_수필.md]\n\n### **코칭의정신_해답은안에있다_수필**\n\n#### **솔루션을 줄 수 없다**\n\n사람이 현실적인 문제를 들고 온다. 코치는 그 문제에 솔루션을 줄 수 없다. 솔루션까지 주면 그것은 컨설팅이 된다. 스승이 된다. \"그럴 땐 이렇게 해봐.\" 그게 아니다. 점술이나 그런 것들은 솔루션까지 준다. 그러면 그 사람 인생의 책임이 누구에게 가는가. 잘 되거나 잘못되거나 책임을 질 수 있는 사람이 없다. **상황과 감정과 생각은 그 사람이 제일 잘 안다.** 아무것도 보지 않는 사람이 어떻게 이래라저래라 할 수 있는가.\n\n---\n\n#### **해답은 네 안에 있다**\n\n지금 처한 상황을 온전히 받아들이고, 그 상황 안에 온전히 머", "source": "essay"}, {"id": "essay_714_241257487c", "text": "** 아무것도 보지 않는 사람이 어떻게 이래라저래라 할 수 있는가.\n\n---\n\n#### **해답은 네 안에 있다**\n\n지금 처한 상황을 온전히 받아들이고, 그 상황 안에 온전히 머물면, 거기에 합당한 방법이 그 사람 안에서 나온다. **해답은 아무도 모른다. 너밖에.** 그건 네가 찾아야 한다. 네 안에 있으니까. 코치는 찾는 방법을 안내할 수 있다. 탐색하는 데 도와줄 수 있다. 같이 찾아가는 동반자가 될 수 있다. 그러나 답을 줄 수는 없다. **그것이 코칭의 정신이다.** 대신 질문을 돌려줄 수 있다. 가장 큰 문제가 무엇인지 두세 가지만 말해보라고. 그중에서 가장 먼저 해결하고 싶은 것이 무엇인지. 그것이 어떻게 됐으면 좋겠는지. 그렇게 물어가는 것이다. 더 깊이 들어가고 싶다면 그때 개별 코칭으로 이어진다. 답은 없다. 줄 수가 없다. 아무도. #코칭정신 #해답은안에있다 #안내자 #질문 #올셀프\n\n--- (구분선)\n\n[파일명: 코칭프레젠스_우주의식_수필.md]\n\n### **코칭프레젠스_우주의식_수필**\n\n#### **공명이 일어나는 공간**\n\n코칭 프레젠스(Coaching Presence)라는 것이 있다. 고객과 코치가 하나의 공명을 일으키는 상태다. 고객과 내가 **둘이 아닌** 어떤 상태에 도달하는 것이다. 고객의 마음이 나에게 그대로 전달되고, 나의 마음이 고객에게 그대로 전달된다. 그것이 코칭 프레젠스다. 그런데 이것", "source": "essay"}, {"id": "essay_715_5bb61d863a", "text": ". 고객과 내가 **둘이 아닌** 어떤 상태에 도달하는 것이다. 고객의 마음이 나에게 그대로 전달되고, 나의 마음이 고객에게 그대로 전달된다. 그것이 코칭 프레젠스다. 그런데 이것이 노력해서 새로 얻어야 하는 것이 아니다. **코칭 프레젠스는 지금 여기에서 항시 일어나고 있다.** 코치가 알아야 하는 것은 이것이다. 우리는 이미 온전하게 코칭 프레젠스의 공간에 있다. 그것을 고객이 인식할 수 있도록 해줘야 한다. 그래야 고객도 안심하고 자기를 온전히 드러낼 수 있다.\n\n---\n\n#### **지지직거리면 공명이 안 일어난다**\n\n코치가 자신의 초(육체, 개별적 자아)에만 머물러 있으면 어떻게 되는가. 내가 지지직거리고 부스럼을 타고, 고객은 고객대로 떠들고 나는 나대로 떠든다. 서로 공명이 일어나지 않는다. 거기서는 진정한 치유도, 성장도 일어나지 않는다. **온전한 코칭 프레젠스**란, 이 훤하게 드러나 있는 이 공간으로 돌아오는 것이다. 통(通)으로 열리는 것이다. 그 상태에서 코치와 고객은 쿵짝이 맞아 돌아간다. 댄스로 말하자면, 저절로 서로 춤이 추어지는 상태. 밀고 당기고 하면서 스텝이 엉키지 않는다.\n\n---\n\n#### **있는 그대로, 둘이 아닌 것**\n\n코치의 역할은 고객이 자신을 드러내고, 자기 자신의 모습을 있는 그대로 알게 하는 것이다. 코칭 프레젠스라는 공간에서 자기를 있는 그대로 발견하게 하는 것이다. 그런데 *", "source": "essay"}, {"id": "essay_716_26d9d7c01d", "text": "것**\n\n코치의 역할은 고객이 자신을 드러내고, 자기 자신의 모습을 있는 그대로 알게 하는 것이다. 코칭 프레젠스라는 공간에서 자기를 있는 그대로 발견하게 하는 것이다. 그런데 **'있는 그대로'라는 것이 곧 둘이 아닌 것**이다. 코칭 프레젠스 그 자체가 나다. 다 통으로. 고객이 그 공간에서 발견하는 것은 이것이다. '내가 웅얼대고, 내 몸 안에 갇혀 있고, 조건 안에 갇혀 있는 그것이 나가 아니었구나. **나는 몸 안에 있는 나, 조건에 묶여 있는 나보다 훨씬 큰 존재구나.'** 고정돼 있는 것이 아니라, **역동적인 삶 자체**구나. 이것을 고객이 받아들이고 납득하면, 그야말로 굉장한 치유와 성장이 일어난다. 고객은 잃어버렸던 **본래 에너지를 회복**하게 된다.\n\n---\n\n#### **우리는 우주의 의식이다**\n\n이것을 더 큰 맥락으로 끌어올리면, 우주의 이야기가 된다. 우주 자체는 엄청난 무의식이다. 그런데 인간이 태어나면서 이렇게 많은 촛불이 켜지고, 속속들이 다 밝게 비추고 있다. 우주가 자기 자신을 발견하는 것이다. 스스로를 드러내는 것이다. **우리는 우주의 의식이다.** 우리가 이 무의식적인 부분들을 밝게 비추게 하기 위해서, **우주가 우리를 드러나게 하는 것이다.** 우리가 이 땅에 온 이유가 바로 그것이다. 코칭 프레젠스는 그 우주적 드러남의 한 장면이다. #코칭프레젠스 #통通 #우주의식 #불이 #올셀프\n\n-", "source": "essay"}, {"id": "essay_717_6c6206e91a", "text": "우리를 드러나게 하는 것이다.** 우리가 이 땅에 온 이유가 바로 그것이다. 코칭 프레젠스는 그 우주적 드러남의 한 장면이다. #코칭프레젠스 #통通 #우주의식 #불이 #올셀프\n\n--- (구분선)\n\n[파일명: 타자에_의해서_규정지어지는_나_수필.md]\n\n### **타자에_의해서_규정지어지는_나_수필**\n\n#### **가장 많이 경험하는 것**\n\n하루를 돌아보면, 평생을 돌아봐도, 우리가 가장 많이 경험하는 것은 무엇인가. 눈에 보이는 것, 귀에 들리는 것, 몸으로 느껴지는 것. 눈을 뜨는 순간부터 이것들이 쏟아진다. 어렸을 때부터 지금까지, 생각은 천양지차로 달라졌지만 이렇게 보고 듣고 느끼는 경험만큼은 한결같이 이어져왔다. 이것을 떠나서는 어떤 경험도 없다. 이것을 떠난 것은, 한편으로 다 망상이다.\n\n---\n\n#### **나와 대상은 따로 있지 않다**\n\n그런데 이 경험에서 중요한 것이 있다. 경험되는 것 안에 나와 대상이 항시 같이 있다는 것이다. 대상이 따로 있고 내가 따로 있는 것이 아니다. 이 대상에 나도 언제나 함께 등장한다. 그러니까 **대상과 동떨어진 나라는 것이 없다**. 소리가 들리면 소리를 듣는 내가 된다. 내가 먼저 있어서 소리를 듣는 게 아니다. 보이는 것이 있기에 본다는 사실이 증명된다. 감정도 느껴지는 것이니 대상이다. 느낌도 대상이다. 느껴지는 것들은 전부 대상이다. 그렇다면 나를 규정짓는 것은 무엇인가.", "source": "essay"}, {"id": "essay_718_5657d1a363", "text": "게 아니다. 보이는 것이 있기에 본다는 사실이 증명된다. 감정도 느껴지는 것이니 대상이다. 느낌도 대상이다. 느껴지는 것들은 전부 대상이다. 그렇다면 나를 규정짓는 것은 무엇인가. 내가 타자라고 생각했던 것들이다. 내 바깥의 것들, 나와 무관하다고 여겼던 것들이 오히려 **나를 규정짓고 있다**. 타자에 의해서 내가 무엇인지를 내가 확인하게 된다. 참 아이러니다. **타자와 나는 둘이 아닌 것이다.** 그것들이 없이는 내가 뭔지를 알 수 없다. 없는 것은 아니지만, 알 수가 없다. 죽으면 경험되어지는 것이 없다. 그것은 경험되어지는 것이 없는 것일 뿐이지, 내가 없는 것은 아니다. 다시 태어나면 또 이렇게 경험될 것이다. 눈을 뜨는 순간 다시 이것이다.\n\n---\n\n#### **경험은 다 같다**\n\n생각은 다르다. 네 생각과 내 생각은 서로 다르고, 어제의 생각과 오늘의 생각도 다르다. 그러나 **경험되어지는 것은 같다**. 너도 그렇고 나도 그렇고, 누구든 눈을 뜨면 보이고 들리고 느껴진다. 그 경험의 방식 자체는 모두에게 똑같이 주어져 있다. 생각의 차이가 나를 갈라놓는 것 같지만, 경험의 층위에서는 우리가 같은 자리에 있다. #타자와나 #규정과경험 #주객불이 #대상과의식 #올셀프\n\n--- (구분선)\n\n[파일명: 통밖으로나오기_개념감정시공간코칭올셀프_수필.md]\n\n### **통밖으로나오기_개념감정시공간코칭올셀프_수필**\n\n####", "source": "essay"}, {"id": "essay_719_d1d9b5e63b", "text": "불이 #대상과의식 #올셀프\n\n--- (구분선)\n\n[파일명: 통밖으로나오기_개념감정시공간코칭올셀프_수필.md]\n\n### **통밖으로나오기_개념감정시공간코칭올셀프_수필**\n\n#### **통 안에 갇힌다는 것**\n\n우리는 여러 종류의 통 안에 산다. 가장 먼저 알아차리기 쉬운 것은 몸통이다. 내 몸의 경계 안에 내가 있다는 느낌. 그런데 **통 밖으로 나와야 한다**는 것은 몸통 밖만을 말하지 않는다. **개념의 통**도 있다. '이것은 이렇다', '저것은 저렇다' — 이렇게 딱 규정해버리는 순간, 개념의 통 안에 갇혀버린다. **감정의 통**도 있다. 감정에 확 매몰되어버리면 그 감정의 통 안에 갇히는 것과 같다. 더 확장하면 **시간의 통**도 있다. 과거, 현재, 미래로 나누어 시간을 보는 순간, 시간이라는 통 안에 갇힌다. 오로지 지금 여기밖에 없다는 자리, 그것이 시간의 통 밖이다. **공간의 통**도 마찬가지다. 시공간은 사실 우리 의식의 어떤 펼쳐짐이고, 한편으로 보면 기억의 펼쳐짐이기도 하다. 그 시공간의 통으로부터도 자유로워지는 것, 그것이 진짜 통 밖이다. 올셀프로 살면 애쓰지 않아도 된다. 지적으로 '이래야지, 저래야지' 하지 않아도, 통 밖으로 감정이나 개념이 저절로 나와 물결을 타듯 흐름을 탄다.\n\n---\n\n#### **통 안에서는 통 밖을 모른다**\n\n통 밖으로 나오는 것을 사람들은 두려워한다. 모름의 영역이기 때", "source": "essay"}], [{"id": "essay_720_f8bffe29ad", "text": "로 감정이나 개념이 저절로 나와 물결을 타듯 흐름을 탄다.\n\n---\n\n#### **통 안에서는 통 밖을 모른다**\n\n통 밖으로
