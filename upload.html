n\n#### **씨앗은 줄기를 향해 가는 것이 아니다**\n\n씨앗이 꽃을 향해서 가면 앞이 안 보인다. 씨앗은 꽃을 상상할 수 없다. 줄기도 꽃을 상상할 수 없다. 한 번도", "source": "essay"}, {"id": "essay_410_29f4017fb3", "text": "여정이다.\n\n#### **씨앗은 줄기를 향해 가는 것이 아니다**\n\n씨앗이 꽃을 향해서 가면 앞이 안 보인다. 씨앗은 꽃을 상상할 수 없다. 줄기도 꽃을 상상할 수 없다. 한 번도 본 적이 없기 때문이다. **뭘 해야 할지 모르는 것이 당연하다.** 씨앗은 씨앗으로서의 성품을 발현해 나가면 된다. 그러면 줄기가 된다. 줄기가 됐으면 줄기로서의 역량과 성품을 발현하면 된다. 줄기로서 최선을 다했기 때문에 꽃을 피울 수 있게 되는 것이다. 꽃을 향해서 가는 것이 아니라, 지금 내가 씨앗이라면 씨앗으로서 충실하면 된다. 씨앗이 꽃이 못 돼서 결핍이 있는 것이 아니다. 오히려 꽃이 아닌 것이 씨앗으로서는 온전한 것이다. **씨앗일 때는 씨앗인 것이 온전하게 받아들여지고 있다.** 그러니까 줄기로 나아갈 수 있게 된다.\n\n#### **내가 나를 거부하고 있다**\n\n짜증을 쉽게 내는 성격이 있다. 결핍처럼 느껴진다. 그런데 짜증이 올라오면 짜증인 줄 안다. 그것이 이미 받아들여지고 있다는 것이다. 내가 그것을 안다는 것은 이미 온전히 수용하고 있다는 것이다. 그런데 이거는 고쳐야 돼 하면, 내 안에서 올라온 것을 거부하는 것이다. 결과적으로 **나를 거부하고 있는 것이다.** 그러면 나하고 싸우는 결과가 된다. 에너지를 거기다 빼앗기는 것이다. 내가 화가 났다고 해서 내가 바뀌어야 한다는 것은 오류다. 화는 나의 일시적인 상태일 뿐이다. 알려지", "source": "essay"}, {"id": "essay_411_18179cd555", "text": "다.** 그러면 나하고 싸우는 결과가 된다. 에너지를 거기다 빼앗기는 것이다. 내가 화가 났다고 해서 내가 바뀌어야 한다는 것은 오류다. 화는 나의 일시적인 상태일 뿐이다. 알려지는 모습이 나인 줄 알기 때문에 혼란스러운 것이다. 나는 그 모습보다 크다. 때에 따라 화일 수도 있고 기쁨일 수도 있다. 고치고 싶은 모습이 있다면 한번 온전히 느껴봐야 한다. 누군가에게 학습된 결과로 싫다고 느끼는 것일 수도 있기 때문이다. 온전히 품어보고 나서도 아닌 것 같으면, 그때는 내 온전한 선택으로 바꾸면 된다. 그러면 나의 주도성이 커진다.\n\n#### **쓰레기 메모에서 몇백 편의 시가 나온다**\n\n시를 쓸 때 떠오르는 것을 노트에 쓴다. 나중에 봐도 유치하고 지우고 싶다. 그런데 놔둔다. 놔두고 또 보고 또 본다. 조금씩 고쳐진다. 거기다 몇 글자 더 붙여주고, 한참 잊어버렸다가 다시 보고 하다 보면 어느 순간 딱 커서 하나의 완성체가 된다. 스스로 나는 시야 하면서 자기를 보여준다. 처음부터 그런 시가 나오는 것이 아니다. 완성된 것도 2년씩 걸린다. 아무것도 아닌 메모에서 몇백 편의 시가 나온다. 그것을 결핍으로 보면 훌륭한 시인들의 시와 비교해서 벌써 찢어버렸을 것이다. **가능성으로 보니까 자꾸 들여다본다.** 자꾸 들여다보고 두드리다 보면 그렇게 크는 것이다. 씨앗도 햇빛이 계속 땅을 두드리고, 비가 내리면서 두드린다. 그 씨앗이 온", "source": "essay"}, {"id": "essay_412_1a753ca4f1", "text": "것이다. **가능성으로 보니까 자꾸 들여다본다.** 자꾸 들여다보고 두드리다 보면 그렇게 크는 것이다. 씨앗도 햇빛이 계속 땅을 두드리고, 비가 내리면서 두드린다. 그 씨앗이 온전하기 때문에 두드리는 것이다. 장미가 못 됐다고 두드리는 것이 아니다. 두드리다 보면 소리를 듣고 열리면서 가능성이 열린다.\n\n#### **찔레꽃에게 왜 장미가 안 되냐고 하면 안 된다**\n\n나는 찔레꽃의 가능성인데 장미꽃에 기준을 두고 왜 아직 장미꽃이 안 되냐고 하면 안 된다. 전혀 연관성이 없는 것과 비교하고 있는 것이다. 외부에서 비교 판단의 기준을 잡아버리면 주도권을 외부에 맡기는 것이다. 내가 나를 결핍으로 보는 것이 아니라 나의 온전함을 발현시키는 쪽으로 보면 안목의 방향이 바뀐다. 부족한 면을 채우려 하는 것이 아니라, 내 안에 잠재되어 있는 가능성이 점점 자란다. 지금은 아무것도 아닌 것 같지만 1년이 지나고 10년이 지나면 엄청나게 각도가 커진다. **결핍 방향이냐, 온전함을 발현시키는 방향이냐 — 이것이 삶의 정반대 방향이다.** 내가 나를 먼저 받아줘야 한다. 그렇게 하다 보면 남들도 나를 그렇게 봐주게 된다. 이미 그렇게 하고 있다. 내 본성은 나 자신을 온전히 받아들이고 있다. 그러니까 다 알려진다. 괜히 남한테 주워들은 생각으로 나 스스로의 가능성을 재단하고 있을 뿐이다.\n\n#씨앗의온전함 #결핍이아닌가능성 #찔레꽃과장미 #시메모에", "source": "essay"}, {"id": "essay_413_5b52c4a809", "text": "전히 받아들이고 있다. 그러니까 다 알려진다. 괜히 남한테 주워들은 생각으로 나 스스로의 가능성을 재단하고 있을 뿐이다.\n\n#씨앗의온전함 #결핍이아닌가능성 #찔레꽃과장미 #시메모에피소드 #올셀프\n\n--- (구분선)\n\n[파일명: 앎의불변성_드러남_수필_v2.md]\n\n### **앎의불변성_드러남_수필**\n\n#### **촛불이 꺼져도 앎은 없어지지 않는다**\n\n촛불이 켜지면 환하고, 꺼지면 깜깜하다. 그런데 촛불이 꺼졌을 때 어둠이 있다는 것을 누가 아는가. 깜깜하다는 것을 아는 그것이 있다. **앎은 촛불이 꺼져도 없어지지 않는다.** 드러나지 않는 것뿐이다. 전깃불도 마찬가지다. 빛이 어딘가에 따로 있다가 나오는 것이 아니다. 조건이 맞으면 드러나는 것이다. 태어남과 소멸도 그렇다. 자연이건 인간이건 태어났다 소멸했다 하는 것은 촛불이 켜졌다 꺼졌다 하는 것과 같다. 촛불이 꺼진다고 세상이 없어지는 것이 아니듯, **앎은 항상 존재하되 드러나느냐 드러나지 않느냐의 차이가 있을 뿐이다.**\n\n---\n\n#### **뭐라 딱 잡으면 넌센스가 된다**\n\n\"그렇다면 촛불을 켜는 사람은 누구냐?\" 기독교인들은 그것이 신이 아니냐고 할 수 있다. 규정 지을 수도 있고 아닐 수도 있다. 그런데 그것을 뭐라고 딱 잡아버리는 순간 이미 **넌센스가 돼버린다.** 고정돼버리기 때문이다. 내가 생각으로 알았다는 것은 머리로 안 것이다. 개념적인 앎이다. 그", "source": "essay"}, {"id": "essay_414_330ce1d77e", "text": "수도 있다. 그런데 그것을 뭐라고 딱 잡아버리는 순간 이미 **넌센스가 돼버린다.** 고정돼버리기 때문이다. 내가 생각으로 알았다는 것은 머리로 안 것이다. 개념적인 앎이다. 그 개념적인 앎을 내버리면 뭐라 할 수도 없고 뭐라 안 할 수도 없다. **그냥 있는 그대로인 것이다.** 있는 그대로의 그것은 너와 나를 따로 나눌 수 없다. 과거 현재 미래도 없다. \"누가 촛불을 켰다\"고 하는 순간 벌써 과거와 현재가 나눠지는 것이다. 그렇게 되면 이미 **진정한 앎이라고 볼 수 없다.**\n\n---\n\n#### **개념을 치워버리면 드러남만 있다**\n\n개념적인 앎을 치워버리면 무엇이 남는가. **그냥 앎만 있는 것이다. 드러남만 있는 것이다.** 이 앎을 나의 앎이라고 할 수 있는가. 앎은 언제 따로 생기거나 하는 것이 아니다. 내가 10살 때도 그렇게 알았을 것이고, 10년 후에 살아있다 해도 그냥 이렇게 드러날 것이다. **나이를 먹었다고 촛불이 늙는 것이 아니다.** 초가 나이 들었다고 촛불이 비리비리해지지 않는다. 앎은 변하지 않는다. 촛불이 100개가 켜졌다고 해서 앎이 100개로 나뉘는 것이 아니다. \"이것은 나의 앎이고, 저것은 너의 앎이다\"라고 나눌 수 없다. **앎은 나눌 수 없다.** 삶을 떠나서 나라는 것이 존재하지 않듯, 앎도 따로 분리해서 소유할 수 없다. 이것은 개념으로 파악할 수 없다. **체득해야 한다.**\n\n-", "source": "essay"}, {"id": "essay_415_6bed216cd3", "text": "수 없다. **앎은 나눌 수 없다.** 삶을 떠나서 나라는 것이 존재하지 않듯, 앎도 따로 분리해서 소유할 수 없다. 이것은 개념으로 파악할 수 없다. **체득해야 한다.**\n\n---\n\n#### **달을 가리키는 손가락**\n\n개념적으로 아는 앎은 개념을 아는 것이다. **달을 가리키는 손가락을 알았다는 것이지, 달을 안 것이 아니다.** 개념으로는 달에 닿을 수 없다. 있는 그대로의 앎, 드러남 그 자체는 개념으로 파악할 수 없다. 그냥 아는 것이다. 그냥 있는 것이다. #앎 #드러남 #개념 #촛불 #올셀프 #체득\n\n**--- (구분선)**\n\n[파일명: 언어의맹점_소리만전달될뿐_수필.md]\n\n### **언어의맹점_소리만전달될뿐_수필**\n\n#### **뜻을 전달했다는 착각**\n\n나는 어떤 의미를 전달했다고 생각한다. 분명히 말했으니까. 그런데 **사실은 그냥 소리만 전달됐을 가능성이 많다.** '사과'라고 말한다. 나는 사과라는 뜻을 전달했다고 생각한다. 하지만 받아들이는 사람은 그걸 그렇게 받아들이지 않을 가능성이 많다. 서로 감각적으로 받아들이는 게 다 다르기 때문이다. '사랑해'라고 말한다. 나는 사랑을 전달했다고 생각한다. 하지만 받아주는 사람은 '사랑'이라는 말을 그냥 소리로 들었을 뿐이다. 그럼에도 불구하고 \"내가 널 사랑한다 했는데 왜 내 마음을 몰라주냐\"고 한다. **그거 언어의 오류다.** 그걸 전제로 해야 한다.\n\n#", "source": "essay"}, {"id": "essay_416_a1e41bcc34", "text": "'이라는 말을 그냥 소리로 들었을 뿐이다. 그럼에도 불구하고 \"내가 널 사랑한다 했는데 왜 내 마음을 몰라주냐\"고 한다. **그거 언어의 오류다.** 그걸 전제로 해야 한다.\n\n#### **소리와 뜻은 다르다**\n\n말에 깨달은 사람들은 **말에는 뜻이 없다** 고 한다. 그냥 소리만 있다는 거다. 그게 실상이 아니라는 거다. '사과'라는 소리나 '사랑'이라는 소리나, 저기 매미 소리나 다 똑같다는 거다. 뜻으로 보면 천양지차로 다 달라지지만, 소리 입장에서 보면 다 같은 소리다, 그냥. [?확인필요: \"영혼이 있다기보다는 어떤 혼인 거죠\" — 맥락상 의미 재확인 필요. 김상복 코치님의 \"말 속에 영혼이 있는 게 아니라 소리 속에 있다\"는 말에 대한 응답으로, '영혼'보다 더 적확한 다른 언어가 있었던 것인지 확인 요망.]\n\n#### **대화란 차이를 좁혀가는 것**\n\n그러니까 대화라는 것은 **서로 차이점을 좁혀가는 것** 이다. 내가 전달했으니까 상대방이 당연히 알아야 한다고 생각하면 서로 부딪힘이 생기고 오해가 쌓인다. 100% 전달됐다는 전제 자체가 이미 틀렸다. 언어는 **뜻을 옮기는 투명한 그릇이 아니다.** 소리라는 형태로 공기를 건너오는 동안, 뜻은 이미 흩어지기 시작한다. 이걸 전제로 두면, 상대가 내 말을 못 알아듣는 게 잘못이 아니라는 걸 안다. 그냥, 언어가 원래 그렇게 생겼다. #언어 #소통 #말의한계 #오해 #", "source": "essay"}, {"id": "essay_417_2ccbffce49", "text": "뜻은 이미 흩어지기 시작한다. 이걸 전제로 두면, 상대가 내 말을 못 알아듣는 게 잘못이 아니라는 걸 안다. 그냥, 언어가 원래 그렇게 생겼다. #언어 #소통 #말의한계 #오해 #언어의오류\n\n**--- (구분선)**\n\n[파일명: 언어의오류_정서교류_A_언어정서_수필.md]\n\n### **언어의오류_정서교류_A_언어정서_수필**\n\n#### **말이 옳은가, 그른가**\n\n\"이 말이 옳은 말인가?\" 가끔 이런 질문이 나온다. 하지만 말이라는 것은 옳고 그름이 없다. 상황에 따라 다를 뿐이다. 그보다 더 근본적인 문제가 있다. **말이나 글은 어차피 오류가 날 수밖에 없다는 거다.** '사과'라고 할 때, 그 말의 '사과'가 먹는 사과는 아니다. 내가 '사과'라고 했는데, 이 사람은 사죄하는 사과로 들을 수도 있다. 나는 먹는 사과를 얘기했지만, 벌써 그것만 해도 오류가 생긴다. 그리고 똑같은 먹는 사과를 지칭한다 해도 내가 살아오면서 경험하고 느꼈던 사과와, 상대방이 살아오면서 느꼈던 사과의 뉘앙스, **쿼알리아** 가 다르다. 서로 받아들이는 감각이 다르고, **언어의 정서** 가 서로 다르다. 그래서 '나는 너가 좋아'라고 할 때, 그 좋다는 게 자기 자신이 좋은 건지, 자기 취향을 나타내는 건지, 정말 내가 좋아서 좋은 건지 착각이 생긴다.\n\n#### **조건보다 언어 정서가 먼저다**\n\n결혼을 할 때, 그 사람의 조건을 보고 사귈 것", "source": "essay"}, {"id": "essay_418_d0abc4bfff", "text": "은 건지, 자기 취향을 나타내는 건지, 정말 내가 좋아서 좋은 건지 착각이 생긴다.\n\n#### **조건보다 언어 정서가 먼저다**\n\n결혼을 할 때, 그 사람의 조건을 보고 사귈 것이냐, 아니면 **그 사람과 나와의 언어 정서가 서로 맞나** 를 볼 것이냐. 회사를 선택할 때도 마찬가지다. 회사의 조건보다 그 회사의 정서가 나랑 맞는가를 먼저 봐야 한다. 100% 맞을 수는 없다. 하지만 어느 정도는 맞출 수 있겠다는 감이 있어야 관계 맺음이 원활해진다. 그것이 없으면, 서로 잘 지내려 노력할수록 오히려 싸움이 된다. 마치 내가 영어로 말하고 있는데 상대방은 아프리카 언어로 얘기하는 것과 같다. 그럴 때는 비언어적인 소통이라도 손짓 발짓으로 되는데, 우리는 계속 언어로 소통하려 하다 보니 오히려 더 안 통한다. 그럴 때는 물어야 한다. \"그게 무슨 얘기야? 내가 이해를 못 하겠어.\" 상대방이 이해를 못 하면 다른 방식으로, 비유로라도 얘기해 줘야 한다. \"예를 들면 어떤 이야기야?\" 이렇게라도 물어봐야 한다. **은유나 직유나 비유를 써서라도 서로 조정하고 맞추려고 노력해야 한다.** 시를 써보면 그런 표현이 능숙해진다.\n\n#### **사랑이 딱 하나로 정의될 수 없는 이유**\n\n우리가 언어를 굉장히 둔감하게, 습관적으로 쓰기 때문에 '내가 생각했던 사랑이 네가 생각했던 사랑이야'라고 착각한다. 하지만 사랑이 그렇게 딱 하나로 정의된다", "source": "essay"}, {"id": "essay_419_496b9b5833", "text": "수 없는 이유**\n\n우리가 언어를 굉장히 둔감하게, 습관적으로 쓰기 때문에 '내가 생각했던 사랑이 네가 생각했던 사랑이야'라고 착각한다. 하지만 사랑이 그렇게 딱 하나로 정의된다면 인생의 유행가가 그렇게 많이 나올 수 없다. 여태까지 사랑에 대한 시를 쓰고 노래를 했지만, **사랑은 하나로 정의될 수 없다.** 그러기 때문에 '내가 사랑했던 사랑이 아니'라고 하면서 이혼을 하게 된다. 서양 사람들은 언어가 안 맞을 때 동거를 해본다. 맞추는 공간과 시간을 갖는 거다. 결혼을 했어도 언어의 정서가 서로 교류되고 조정될 시간을 줘야 한다. 공간은 서로 만남을 많이 갖는 것이고, 시간은 대화를 많이 하는 것이다. 자꾸 \"너는 이런 뜻이었어\", \"나는 이런 뜻으로 얘기했던 거야\", \"그게 어떤 거야?\" 이런 식으로 조정하는 관계가 필요하다. 부모 자식 간에도 마찬가지다. 아이가 크면서 학교나 인터넷에서 자기들만의 문화에서 형성된 언어 습관이 생긴다. 근데 부모는 계속 집에 있을 때처럼 대화하니까 통하지 않는다. '왜 이렇게 못 알아듣냐'는 말에 '엄마는 몰라'라고 방문을 닫는 건 그 때문이다.\n\n#### **연장에 좋고 나쁨이 없듯이**\n\n너무 답답해서 \"내 가슴을 좀 까 보였으면 좋겠다\"고 할 때가 있다. 하지만 가슴을 까 볼 필요까지는 없다. 일단 전제로 깔고 들어가야 하는 것은 이것이다. **지금 우리가 언어적으로 안 맞는 거구나,", "source": "essay"}, {"id": "essay_420_c0869b8cb8", "text": "을 좀 까 보였으면 좋겠다\"고 할 때가 있다. 하지만 가슴을 까 볼 필요까지는 없다. 일단 전제로 깔고 들어가야 하는 것은 이것이다. **지금 우리가 언어적으로 안 맞는 거구나, 전혀 다른 언어를 쓰고 있구나.** 다른 정서의 언어는 좋고 나쁨이 없다. 이것은 수단이기 때문이다. 연장에 좋은 연장, 나쁜 연장이 따로 없듯이. 연필도 좋은 연필, 나쁜 연필이 없다. 비싼 연필, 안 비싼 연필은 있지만. **소통이 잘 되는 말이 좋은 언어다.** 코칭에서도 마찬가지다. 고객이 쓰는 언어와 코치가 받아들이는 것이 서로 다를 수 있다. 말에는 오류가 있고 오해가 있다. 자기 해석으로 듣는 것이다. 하지만 언어에서 느껴지는 떨림이나, 그때의 표정이나 비언어적인 것이 있다. 거기에 사람의 더 온전한 감정과 느낌이 실릴 수 있다. 그래서 조정하려는 노력이 굉장히 필요하다. 서로 맞추려는 노력. **상대방 입장에서 생각하는 것보다 서로 조율하는 게 더 필요하다.** 나를 완전히 비우고 100% 그 사람 입장에서 생각한다는 건 쉬운 얘기가 아니다. 어쨌든 나는 내 입장에서 보기 마련이다. 그래서 계속 조정해 나가는 과정이 관계 맺음 속에서의 상호작용을 원활하게 해주는 방법이 된다. **새로운 관계 맺음 속에서 새로운 언어의 개념 규정이 필요하다.** 만나는 사람마다, 상황마다. #언어의오류 #언어정서 #쿼알리아 #소통 #관계맺음\n\n**--- (구분선", "source": "essay"}, {"id": "essay_421_73561df3ad", "text": "된다. **새로운 관계 맺음 속에서 새로운 언어의 개념 규정이 필요하다.** 만나는 사람마다, 상황마다. #언어의오류 #언어정서 #쿼알리아 #소통 #관계맺음\n\n**--- (구분선)**\n\n[파일명: 언어의오류_정서교류_B_앎과이해_수필.md]\n\n### **언어의오류_정서교류_B_앎과이해_수필**\n\n#### **대화 내용보다 정서의 교류가 먼저다**\n\n여자들끼리 카페에서 모이면 각자 다른 말을 하고 다른 이야기를 한다. 그런데 카페에서 나올 때 후련하고 기분이 괜찮다. 그건 대화 내용이 중요했던 게 아니다. **서로 정서를 교류했기 때문이다.** 관계에서 사실은 언어적 소통보다 정서의 교류가 더 중요하다는 걸 인정해야 한다. 그 사람의 언어 이면을 본다는 것은, 그 사람의 숨은 의도를 본다는 것은 바로 **정서를 서로 조율하겠다는 것이다.** 그래야 이면을 볼 수 있다.\n\n#### **맥락이 맞아야 꿰뚫어 볼 수 있다**\n\n'꿰뚫어 본다'는 것이 바로 그것이다. 그 사람의 맥락을 서로 맞추는 것이다. **콘텍스트가 서로 맞아야 비로소 진정한 이해가 된다.** 너는 이 얘기를 하고 있는데 나는 저 얘기를 하고 있으면 서로 맥락이 안 맞는다. 나의 언어적 맥락과 상대방의 언어적 맥락이 맞아야 한다. 남북 정상회담이건 군사회담이건, 단순하게 의견을 조정한다는 것이 원활하게 안 되고 깨지고 나오는 이유도 그것이다.\n\n#### **'안다'는 딱", "source": "essay"}, {"id": "essay_422_26adc940e2", "text": "상대방의 언어적 맥락이 맞아야 한다. 남북 정상회담이건 군사회담이건, 단순하게 의견을 조정한다는 것이 원활하게 안 되고 깨지고 나오는 이유도 그것이다.\n\n#### **'안다'는 딱딱하고 '이해한다'는 말랑말랑하다**\n\n우리가 뭘 안다는 것은 100% 안다고 할 수 없다. 사과도 100% 안다고 할 수 없는데, 하물며 사람을 어떻게 100% 알겠는가. 우리가 '알았어'라고 할 때는 언어적으로 알았다는 것을 전제한다. 그런데 그것은 오류가 전제된 것이기 때문에 100% 알았다고 할 수 없다. **'안다'는 것은 딱딱한 앎이다.** 내가 아는 걸 '틀렸다' 하면 굉장히 기분이 나쁘다. 그만큼 딱딱하다는 이야기다. **'이해한다'는 것은 말랑말랑한 이해다.** 오해를 전제로 할 수 있다는 거다. 나의 이해가 100%가 아닐 수 있다는 것을 전제한다. 그만큼 신축성이 있다. **이해는 정서적인 수용이 바탕이 된다.** 이해하려고 하는 자세. 이해하려고 하는 마음자세. 이것이 이해다. 100% 이해는 없다.\n\n---\n\n*[편집 메모: 박의섭이 대화 말미에 \"지금 이 마지막에 한 얘기는 또 새로운 한 꼭지가 될 수 있어\"라고 언급함. '정서적 수용'을 별도 꼭지로 심화 확장할 가능성 있음.]* #이해 #정서교류 #앎과이해 #소통의본질 #맥락\n\n**--- (구분선)**\n\n[파일명: 언어의창조_사유의자유_수필.md]\n\n### **언어의창조_사유의자유", "source": "essay"}, {"id": "essay_423_9627c9c59e", "text": "확장할 가능성 있음.]* #이해 #정서교류 #앎과이해 #소통의본질 #맥락\n\n**--- (구분선)**\n\n[파일명: 언어의창조_사유의자유_수필.md]\n\n### **언어의창조_사유의자유_수필**\n\n#### **남의 개념으로 생각하면 그 이상을 넘을 수 없다**\n\n**남이 정의한 개념어로 생각하면 그 이상의 것을 생각할 수도 없고 사유할 수도 없다.** 모든 단어를 다 바꾸거나 검토할 필요는 없다. 하지만 핵심적인 개념은 충분히 숙고하거나 재정의해서 우리의 개념어로 사고를 해야, 기존의 고정관념에 얽매이지 않는 사유를 할 수 있고 논리를 전개해 나갈 수 있다. 그사람들이 부여한 개념으로 사유하면 **그사람들이 만들어 낸 시뮬레이션 세계에 갇히게 된다.** 그것을 넘어설 수 없는 거다. 서양 철학이나 유명한 철학자들을 보면 다 자기만의 개념어를 만들어서 구사한다. 그 세계를 이해하려면 그 사람이 부여한 개념을 배워야 한다. 그 사람의 사유를 이해하려면 **그 사람의 시뮬레이션 속으로 들어가 버려야 한다.**\n\n#### **우리의 언어로 원천적인 지혜를 만들어야 한다**\n\n세상에 가치 있는 것을 내놓기 위해서는 **우리의 언어로 스스로 원천적인 지혜가 담긴 말들을 많이 만들어서** 사용하고 세상에 퍼트려야 한다. 그래야 그네들이 짜놓은 시뮬레이션의 세계에 갇히지 않고 **자유를 얻게 된다.** 남의 언어를 쓴다는 것 자체가 이미 그 사람이 만들", "source": "essay"}, {"id": "essay_424_b83327858a", "text": "만들어서** 사용하고 세상에 퍼트려야 한다. 그래야 그네들이 짜놓은 시뮬레이션의 세계에 갇히지 않고 **자유를 얻게 된다.** 남의 언어를 쓴다는 것 자체가 이미 그 사람이 만들어 낸 조건에 갇히는 것이다. 매이는 것이다. 그 조건 지어짐으로부터 해방하려면, 그 언어에 대해서 **내가 새롭게 정의를 내릴 수 있어야 한다.** 이게 과연 정말 합당한 것인가를 검토해야 한다. 아니면 새롭게 만들어내든가.\n\n#### **순우리말에 지혜 보고가 있다**\n\n혹은 우리가 원래 가지고 있던 언어들이 있다. 순우리말. **거기에 굉장히 지혜가 많이 담겨 있다.** 우리가 일상적으로 아무 뜻 없이 쓰는 말들이 있다. 그런데 그 말들은 사람들이 여태까지 살아오면서 언어를 상징화할 때 **그 시대 사람들의 감성과 정서가 녹아들어** 있는 것이다. 그 정서를 이해하면 거기에 한편으로 굉장한 **지혜 보고** 가 있고, 나의 사유의 원천을 알 수 있다. 그런데 우리가 관습적으로 그냥 쓰니까 전혀 검토되지 않는다. 습관적으로, 무의식적으로 써 버리는 거다. **그러니까 지혜를 활용 못 하고 있는 것이다.** #언어창조 #개념어 #사유의자유 #순우리말 #시뮬레이션\n\n**--- (구분선)**\n\n[파일명: 언어적민감성_추상화오류_A_개념주입_수필.md]\n\n### **언어적민감성_추상화오류_A_개념주입_수필**\n\n#### **개념에 걸려 넘어지는 사람들**\n\n우리", "source": "essay"}, {"id": "essay_425_da66eb467f", "text": "선)**\n\n[파일명: 언어적민감성_추상화오류_A_개념주입_수필.md]\n\n### **언어적민감성_추상화오류_A_개념주입_수필**\n\n#### **개념에 걸려 넘어지는 사람들**\n\n우리는 지금 다 언어에 매여 있다. 그리고 모든 명상의 마지막 핵심 단계가 그것이다. **말에 매이지 않는 것, 생각에 매이지 않는 것.** 그게 마지막이다. 시험을 떠나서라도 사람들은 자기 생각에 걸려서 넘어지고 있다. 개념에. 그러니까 이제 개념을 쥐고 사람들한테 개념을 주입시켜서 자기 마음대로 조정되게끔 가스라이팅도 한다. 어떤 이즘(ism)이 그런 것이다. 나치즘, 페미니즘. 그런 것들은 개인이 본인 스스로 생각할 수 없게끔 누군가 이념을 주입시키는 거다. 뭣도 모르고 막 열광하다 보면 나도 모르게 생각 없이 거기에 쫓아가게 된다. 그것이 한 번 주입이 되면 내가 쉽게 **온전한 나로서 살 수 없게** 된다. 누군가 주입한 나로서 사는 거지, 온전한 나로서 사는 게 아니다.\n\n#### **앞에서 옳은 말을 하고 뒤에 이념을 끼워 넣는다**\n\n**진짜 비판적 사고가 필요하다.** 앞으로는 AI 시대가 되기 때문에 너무나 많은 정보가 쏟아진다. 그래서 거기서 자신이 옳다고 생각하는 것을 선택하기가 엄청나게 힘들어진다. 그리고 이런 것을 전파할 때 쌩짜로 그냥 하는 것이 아니다. 기존에 옳은 것들을 얘기하면서 거기다 슬쩍 자기 것을 끼워 넣는다. 겉으로 보기에", "source": "essay"}, {"id": "essay_426_1ae1baca6a", "text": "것을 선택하기가 엄청나게 힘들어진다. 그리고 이런 것을 전파할 때 쌩짜로 그냥 하는 것이 아니다. 기존에 옳은 것들을 얘기하면서 거기다 슬쩍 자기 것을 끼워 넣는다. 겉으로 보기에는 다 옳은 얘기를 한다. 옳은 얘기를 하는데 이면에다가 슬쩍 자기네 이념을 끼워 넣는 거다. 사람들은 앞에서 옳은 얘기를 했으니까 뒤의 얘기도 옳을 것이라고 **일반화 오류에 빠진다.** 그래서 **내 스스로 생각하고, 개념에 매이지 않고, 개념을 뛰어넘어서 개념을 활용할 수 있는 방편** 이 필요하다.\n\n#### **언어적 민감성은 지성의 한 축이다**\n\n언어적 민감성은 일반인들에게도 굉장히 필요하다. 코치들은 코칭과 연결하지만, 일반인들에게는 스스로 생각할 수 있는 힘을 길러주는 것이다. 네 가지 지성 중 지성 영역에 **언어적 민감성** 을 넣어야 한다. 내가 어떻게 스스로 사고하고, 언어의 개념에 매이지 않고, 개념을 넘어서서 개념을 자유롭게 활용할 수 있는지에 대한 것이다. #언어적민감성 #개념주입 #가스라이팅 #비판적사고 #온전한나 #중복주의\n\n**--- (구분선)**\n\n[파일명: 언어적민감성_추상화오류_B_비유와표상_수필.md]\n\n### **언어적민감성_추상화오류_B_비유와표상_수필**\n\n#### **기억에 감정이 붙는 이유**\n\n우리가 어떤 과거의 장면을 떠올릴 때는 시각적인 것으로 떠올린다. 시각 정보가 90%다. 색상도 1700만 가지,", "source": "essay"}, {"id": "essay_427_7add964a36", "text": "비유와표상_수필**\n\n#### **기억에 감정이 붙는 이유**\n\n우리가 어떤 과거의 장면을 떠올릴 때는 시각적인 것으로 떠올린다. 시각 정보가 90%다. 색상도 1700만 가지, 원근감도 있고, 그만큼 정보량이 많다. 그래서 뇌는 시각 정보를 베이스로 받아들인다. 그러면 왜 거기에 감정이 붙느냐. **기억의 중요도를 매기려는 것이다.** 쓸데없이 시시콜콜한 것까지 다 기억할 필요가 없다. 뇌 입장에서 가장 효율적인 게 뭐냐면, 굉장한 감정을 일으켜서 그것을 내가 잊지 않게끔 하는 거다. 필요 없는 것은 감정의 동요가 없다. 그러면 걔는 중요도를 낮춰버린다. 금방 휘발된다. 하지만 내가 안 잊어야 되는 것, 예를 들어 이걸 먹었는데 엄청 아팠어. 거기다 강한 감정을 결합시키는 거다. 그럼 보기만 해도 그 감정이 올라와서 회피하게 된다. 좋았던 것은 계속하게 하고, 싫었던 것은 피하게 하는 거다. **태그를 붙이듯이, 감정이 기억에 붙는다.** 음성의 경우는 다르다. 소리는 객관적인데, 의미는 내가 해석하는 것이다. 누가 기분 나쁜 소리를 했어. 웃으면서도 욕을 할 수 있다. 목소리는 조용한데 내가 굉장히 기분 나쁠 수 있다. 그 의미는 **내 의미** 다. 내가 그걸 나쁘게 해석했기 때문에 기분 나쁜 거다. 이걸 **쿼알리아(감각질)**라고 한다. 내가 감각질 자체를 기분 나쁘게 개념화시켰기 때문에 그런 소리를 들으면 기분이 나빠지는", "source": "essay"}, {"id": "essay_428_53768a17bf", "text": "가 그걸 나쁘게 해석했기 때문에 기분 나쁜 거다. 이걸 **쿼알리아(감각질)**라고 한다. 내가 감각질 자체를 기분 나쁘게 개념화시켰기 때문에 그런 소리를 들으면 기분이 나빠지는 거다. 하나의 기억에 촉수가 많이 붙어있으면 기억이 오래간다. 오감이 다 달라붙으면 훨씬 리얼리티가 생기면서 생생하게 느껴지면서 기억이 오래간다.\n\n#### **표상을 언어화하면 추상이 된다**\n\n경험의 대부분이 이미지다. 시각 정보가 90%라고 했다. 그 이미지를 언어로 바꿔서 표현해버리면 **언어는 굉장히 한정적이다.** 심상에 떠오르는 시각적인 것을 표상이라고 한다. 그 표상을 언어화시켜버리면 이게 **추상형으로 가버린다.** 이것도 컵이고 저것도 컵이다. 다 '컵'이라는 하나의 범주로 추상화시켜버리는 거다. 이게 종이컵이든 유리컵이든 손잡이가 있든 없든 다 '컵'이라고 한다. 그게 훨씬 더 빨리 전달할 수 있기 때문이다. 시각은 딱 보여주면 동시에 한꺼번에 전달된다. 하지만 **언어는 순차적으로 나열해서 기승전결로** 정보를 전달해야 한다. 그러니까 정보량이 굉장히 제한적일 수밖에 없다. MP3 파일을 압축해버리면 정보량이 많이 줄어드는 것처럼. 그래서 심상에 떠오르는 표상을 언어화시킬 때, **고객이 자기 스스로도 왜곡을 하고, 듣는 사람은 당연히 더 왜곡이 될 수밖에 없다.** 코치가 고객의 진술만을 듣고 그 사실을 정확히 알 수가 없다. 또 하나", "source": "essay"}, {"id": "essay_429_4a7a234938", "text": "언어화시킬 때, **고객이 자기 스스로도 왜곡을 하고, 듣는 사람은 당연히 더 왜곡이 될 수밖에 없다.** 코치가 고객의 진술만을 듣고 그 사실을 정확히 알 수가 없다. 또 하나는, 고객도 마찬가지다. 고객이 말하는 것을 고객 본인도 제대로 얘기를 할 수가 없다. 쿼알리아로 해석해서 말을 하니까. 그것도 해석이 제대로 안 될 수 있다. 그러니까 코칭에서 **느꼈던 감정은 진실하다.** 그걸 떠올렸을 때 이 사람이 괴로워. 그러면 괴로움이 일어났다는 건 사실이다. 그거는 인정을 해줘야 한다. 하지만 내용은 이 사람의 쿼알리아에 맞춰서, 이 사람이 어떤 것을 개념화시키느냐에 따라서 얼마든지 바뀔 수 있다.\n\n#### **감정을 명사화하면 해소될 길이 없어진다**\n\n내가 이런 일을 겪었는데 '굉장히 괴로웠어요'라고 한다. 그러면 '괴롭다'는 감정이 굉장히 복합적인 감정인데, **생략해버리고 그냥 '괴롭다'는 하나로 축약시켜버리는 거다. 추상화시켜버린 거다.** '사랑한다'는 것도 마찬가지다. 사랑한다는 거는 아주 굉장히 복합적인 감정인데 단순하게 '사랑한다' 하나로 규정 지어버리면 거기서 빠져나올 수가 없다. '내가 사랑하는데 이렇게 행동해도 되나', '이 사람을 사랑한다고 했는데 이런 생각을 가져도 되나' 하면서 꼼짝을 못 한다. **감정을 명사화시켜서 고정시켜 놨기 때문에 해소가 안 된다.** '화', '괴로움', 이렇게 명사화시켜서", "source": "essay"}, {"id": "essay_430_f49e6f82df", "text": "을 사랑한다고 했는데 이런 생각을 가져도 되나' 하면서 꼼짝을 못 한다. **감정을 명사화시켜서 고정시켜 놨기 때문에 해소가 안 된다.** '화', '괴로움', 이렇게 명사화시켜서 딱 픽스를 시켜 놓으니까, 생각을 하거나 기억을 떠올리면 내가 규정 지은 '화'가 탁 튀어나오는 거다. 이거는 감정이 흘러버리는 건데, 이걸 규정 지어 놓지 않으면 이게 굉장히 복합적인 감정이라는 걸 알 수 있다. 화라고 꼭 주장할 필요가 없다. 여러 가지가 섞여 있는 거니까. 그러면 화라는 감정이 주된 감정이 아니게 된다. 얼마든지 바꿀 수 있는 거다.\n\n#### **비유를 하면 새로운 인사이트가 나온다**\n\n화에 대해서 새로운 해석을 내려보는 거다. \"그 화를 비유로 표현해보면 어떻게 표현하고 싶어?\" \" **나는 마그마가 속에서 부글부글 끓다가 너무 많아져 가지고 위로 폭발한 화산 같습니다.** \" 단순히 '화'라고 생각했을 때와, '쌓인 게 많았구나'라고 했을 때 느낌이 달라진다. '화'라고 할 때는 참든가 폭발시키든가 두 가지밖에 없다. 근데 마그마에 비유를 하니까 — \" **미리미리 퍼서 비워내야 될 것 같고요.** \" 이런 식으로 새로운 방법의 인사이트가 나온다. **비유나 은유를 통해서 실체가 불명확한 감정을 풀어봤을 때 새로운 상태를 모색할 수 있게 된다.** 이것이 단일 감정이 아니고 여러 가지 일로 이루어져 있다는 것을 알게 된다. 처리", "source": "essay"}, {"id": "essay_431_adbe12f34c", "text": "비유나 은유를 통해서 실체가 불명확한 감정을 풀어봤을 때 새로운 상태를 모색할 수 있게 된다.** 이것이 단일 감정이 아니고 여러 가지 일로 이루어져 있다는 것을 알게 된다. 처리할 수 있는 게 생기는 거다. '화'를 다룬다고 보면 선택지가 두 벌밖에 안 된다. 근데 이러면 여지가 굉장히 많아진다. 코치가 신경 써야 할 것은 지금 사람의 상태, 그걸 떠올렸을 때 올라오는 감각, 그것만 처리해주면 된다. 그리고 사람의 진술을 새롭게 해석해서 그 사람이 **새로운 관점이나 새로운 표현 방법** 으로 해석할 수 있게끔 도와주는 게 코치로서의 역할이다. 그렇게 되면 그동안에 갖고 있던 고정관념에 매여있던 것에서 이 사람이 풀려나게 된다. 비유는 여러 가지로 가능하다. 그게 새로운 고정관념이 되는 게 아니다. '꽃이 꺾인 감정 같다', '하늘이 흐려진 감정 같다' — 이렇게 다양하게 비유를 할 수 있으면, 제삼자 입장에서 객관적으로 감정을 들여다볼 수 있게 된다. 그리고 목표를 정할 때도 마찬가지다. 고객이 \"행복해지고 싶어요\"라고 한다. 이 행복이라는 범주가 너무 크다. 타겟이 불명확해진다. **되고 싶은 상태를 비유나 직유로, 동사화시켜서 표현하게 하면** , 고객이 코치와 얘기하다 보면 조정을 할 수 있다. 상태는 바뀔 수 있는 거다. 이것이 딱 고정된 것이 아니고 내가 얼마든지 바꿀 수 있다는 인지가 되면, 타겟을 정확히 인지하면서 자", "source": "essay"}, {"id": "essay_432_f6d3a8590f", "text": "객이 코치와 얘기하다 보면 조정을 할 수 있다. 상태는 바뀔 수 있는 거다. 이것이 딱 고정된 것이 아니고 내가 얼마든지 바꿀 수 있다는 인지가 되면, 타겟을 정확히 인지하면서 자기 욕구나 숨은 니즈를 정확히 보게 된다. 어떻게 보면 그림으로 표현해보게 하는 것이 더 직접적이다. 그림 치료가 더 효과를 볼 수 있는 것도 그 때문이다. 코치는 그림으로 할 수 없으니까, 그것을 마치 그림으로 그린 것처럼 **비유를 하게 하는 거다. 시각 정보화시키는 거다. 표상화시키는 거다.** 표상화가 선명할수록 기억에 딱 남기 때문에 타겟을 정확히 쫓아갈 수 있게 된다. **추상을 다시 원래의 표상으로 바꿔서 고객한테 장착시키는 거다.** 미션과 비전을 정할 때도 마찬가지다. '인류의 행복한 삶을 위해서'라고 하면 불명확하다. 너무 추상적이다. **비유로 표현해보거나 직유로 — 이게 시의 원리다.** #추상화오류 #쿼알리아 #비유은유 #표상 #코칭 #감정명사화\n\n**--- (구분선)**\n\n[파일명: 언어적민감성_추상화오류_C_삶의생생함_수필.md]\n\n### **언어적민감성_추상화오류_C_삶의생생함_수필**\n\n#### **나는 언어와 신념의 조합이다**\n\n나라는 것은 사실 **언어와 신념의 조합이다.** 나를 생각할 때 내가 언어로 나를 생각하지 않으면 내가 없는 거다. 말과 생각, 글과 생각을 빼고 나를 표현해보라 그러면 어떻게 표현하겠어. 없다.", "source": "essay"}, {"id": "essay_433_7a49f3a5b6", "text": "*언어와 신념의 조합이다.** 나를 생각할 때 내가 언어로 나를 생각하지 않으면 내가 없는 거다. 말과 생각, 글과 생각을 빼고 나를 표현해보라 그러면 어떻게 표현하겠어. 없다. 우리는 나를 생각할 때 '나는 어떤 사람이다'하고 규정을 지어버린다. '나는 변호사야', '나는 의사야'. 어릴 때 부모님으로부터 '넌 저주받은 아이야', '네가 어떻게 성공할 수 있겠니' 막 이런 이야기를 듣고 자란 사람들이 있다. 그걸 깨지 못하고 평생 가지고 있기도 한다. 어린 시절은 도화지와 같은 상태라서 다른 사람들이 뭘 그려주면 그대로 받아들일 수밖에 없다. **그런데 그게 진짜 내가 아니라는 걸 알아야 한다.** 그냥 남의 말일 뿐이다. **그림에 그려져 있는 거는 나일 수 있다.** 그건 나다. 그런데 거기 **해석이 문제인 거다.** 그걸 바라보는 내가 해석하는 면. 그 해석적인 면은 내가 얼마든지 바꿀 수 있다. 올셀프로 볼 때는 생각이 다르다. 그것조차도 나다. 나의 아픈 기억이건, 내가 버리고 싶건, 회피하고 싶건, **그냥 올셀프에서 올라오는 거다.**\n\n#### **추상화의 오류가 삶을 뜬구름으로 만든다**\n\n언어로 규정을 지을 때 심각한 정도의 왜곡이 일어난다. 나의 삶이 엄청나게 많은 부분으로 이루어져 있음에도 불구하고, **추상화시키는 과정에서 너무 많은 삶이 버려진다.** 그중에 아주 '좋다, 나쁘다', '화난다, 기뻤다, 슬", "source": "essay"}, {"id": "essay_434_e175fa30a7", "text": "난다. 나의 삶이 엄청나게 많은 부분으로 이루어져 있음에도 불구하고, **추상화시키는 과정에서 너무 많은 삶이 버려진다.** 그중에 아주 '좋다, 나쁘다', '화난다, 기뻤다, 슬펐다' 이런 몇 가지 추상성으로 굉장히 축약이 돼버린다는 거다. 자기 스스로도 자기 삶을 굉장히 오해하고 있는 거다. 할머니한테 \"지나온 삶이 어떠세요?\"라고 하면, \"소설책을 10권을 써도 모자라\"라고 한다. 그 말이 사실이다. 근데 \"한번 써 봅시다. 얘기해 보세요.\"라고 하면 몇 페이지도 못 쓴다. **왜냐하면 기억 속에는 그게 있는데, 추상적으로 기억해서 추상적으로 진술하다 보니까 굉장히 축약이 돼버린 거다.** 10년을 살아도 \"어우 대박이었죠\"라고 한마디로 끝나버린다. 그러면 이게 삶이 굉장히 공허한 삶이 돼버린다. 뜬구름 같은 삶이 돼버린다. 보석처럼 빛났던 순간들이 다 부정이 돼버리는 거다. 사람들이 디테일한 기쁨, 섬세한 슬픔 이런 걸 못 느끼고 그냥 이 좁은 감정의 폭 안에서만 놀면서 사니까 삶의 재미를 모른다. **추상이라는 것은 표지판이다. 지도다.** 나의 삶이 왜 지도에 국한돼서, 기쁨 표지판에 있다가 슬픔 표지판에 옮겨가면서 표지판만 왔다갔다 하는가. 사실은 3차원 공간 속에서의 엄청난 많은 역동과 생생함이 있는데도 불구하고, 1차원 세계에서 감정을 표현하고 있는 거다. 삶을 무지개의 1700만 가지 색상으로 봐야 되는데 거의 흑백", "source": "essay"}, {"id": "essay_435_ee8c4e8704", "text": "은 3차원 공간 속에서의 엄청난 많은 역동과 생생함이 있는데도 불구하고, 1차원 세계에서 감정을 표현하고 있는 거다. 삶을 무지개의 1700만 가지 색상으로 봐야 되는데 거의 흑백이거나 기껏해봐야 빨주노초파남보 이 정도로만 생각하면서 사니까 재미없는 거다.\n\n#### **구체적으로 부르면 삶이 되살아난다**\n\n구체적으로 진술하게 하면 달라진다. \"그때 감정을 떠올렸을 때 어떤 느낌이었어요?\" 그러면 \"양변기에 버튼을 확 눌러서 그냥 확 떠내려가게 했으면 좋겠어\"라는 식으로 생각이 나온다. 이렇게 하면 **삶이 다시 생생하게** 살아난다. 코치와 대화할 때도, 고객이 추상적인 언어를 쓰게 되면 왜곡이 일어난다. \"행복했어요\"라고 하면, \"행복이라는 감정을 조금 더 디테일하게 한번 표현해 주시겠어요? 예를 들어보자면 어떤 것에 비유해 볼 수 있을까요?\" 이렇게 해보면 — 그냥 단순하게 한마디로 규정 지을 수 없는 여러 가지 복합적인 것 때문에 내가 그렇게 규정 지었구나 하는 것을 알게 된다. **디테일에서 살아나게 된다.** 그래야 자기 삶을 온전히 들여다보고 이해를 하고, '내가 생각했던 것처럼 그렇게 지긋지긋한 것만 있었던 건 아니었구나'를 알게 된다. 그래서 앞으로 어떤 일을 겪을 때에도 디테일이 생겨나게 된다. 더 세세하게 관찰하게 되고, **추상을 넘어선 실상을 제대로 관조한 성찰이 일어나는 삶을 살 수 있게 된다.** 그런 관", "source": "essay"}, {"id": "essay_436_edbb4e64a3", "text": "서 앞으로 어떤 일을 겪을 때에도 디테일이 생겨나게 된다. 더 세세하게 관찰하게 되고, **추상을 넘어선 실상을 제대로 관조한 성찰이 일어나는 삶을 살 수 있게 된다.** 그런 관점 전환이 일어날 때, 내가 겪어왔던 모든 것들이 다 나를 온전한 삶으로 이끄는 어떤 하나의 방편이었구나, 하고 **자기 삶을 온전히 끌어안게 된다.** 온통 나로 인정하게 된다. 언어로부터 자유를 얻는다는 게 그래서 얼마나 중요한가. 자신의 과거와 현재와 미래를 다 좌지우지하는 거다. 우리는 언어로 다 생각할 수밖에 없기 때문이다. 자기 삶을 기억할 때도 언어로, 진술할 때도 언어로 한다. **그래서 언어에 대한 민감성에 눈뜨고, 내가 언어를 새롭게 조명해보고 표현해볼 때, 비로소 온전한 나로 사는 삶과 더 합일에 가까워진다.** #삶의생생함 #추상화오류 #올셀프 #온전한나 #표상 #코칭\n\n**--- (구분선)**\n\n[파일명: 에고의생각_올셀프의지혜_수필.md]\n\n### **에고의생각_올셀프의지혜_수필**\n\n#### **왜 내 마음대로 안 될까**\n\n\"왜 내 맘대로 안 되지?\" 이 질문이 자꾸 올라온다. 올셀프라는데 왜 내 마음대로 안 되냐고. 기도를 열심히 해도, 믿음이 강해도, 교회를 빠지지 않고 나가도 왜 안 되냐고. 그 생각이 일어나는 데가 어디인가. **머릿속이다.** 몸 안에서 일어나고 있다. 옆에 있는 사람은 그걸 모른다. 그러니까 그건 **에", "source": "essay"}, {"id": "essay_437_1e2fb1b79a", "text": "교회를 빠지지 않고 나가도 왜 안 되냐고. 그 생각이 일어나는 데가 어디인가. **머릿속이다.** 몸 안에서 일어나고 있다. 옆에 있는 사람은 그걸 모른다. 그러니까 그건 **에고의 생각** 이다. 육신 안에 갇혀있다고 생각하는 거기서 일어나는 거니까. 그거를 '나'라고 보는 것이다. 지금 '내 생각'이라고 생각하는 것들이. 그런데 나는 그걸 넘어선 존재인데. 그러니까 내 생각대로 안 되는 거다. 내 마음대로 되고 싶다는 것은 내 육신 바깥의 것을 내 마음대로 일어나게 하고 싶다는 거다. 그런데 지금 생각하고 있는 건 육신 안에서다. **육신 안에서 일어나는 생각이 어떻게 바깥의 것을 조정할 수 있겠는가.** 바깥의 것이 내 머릿속 생각대로 움직여지기를 바라는 거다. 그러니까 내 마음대로 안 될 수밖에 없다.\n\n#### **상황이 올셀프의 메시지다**\n\n그렇다면 머릿속 생각을 넘어선 것은 무엇인가. 지금 이 현상적으로 느껴지는 이 상황이다. **이 상황이 올셀프의 메시지다.** 이 상황이 주는 메시지를 읽어야 한다. 우리가 자꾸 머릿속 안에서 일어나는 생각으로 외부를 조정하려 하니까 답답한 거다. 메시지를 읽겠다는 것은 내가 이 상황을 받아들이겠다는 것이다. 그래야 여기서 답이 나온다. **답은 이 안에 있다.** 머릿속 생각 안에 있는 게 아니고, 지금 이 안에 있다. 이게 나이니까. 여기서 모든 게 다 벌어지고 있다. 지금 여기", "source": "essay"}, {"id": "essay_438_5cdbe796e2", "text": ". 그래야 여기서 답이 나온다. **답은 이 안에 있다.** 머릿속 생각 안에 있는 게 아니고, 지금 이 안에 있다. 이게 나이니까. 여기서 모든 게 다 벌어지고 있다. 지금 여기서. 그러니까 여기에 머물러야 한다. 생각으로 아는 것이 아니고. 생각을 내려놓아야 한다. 생각을 넘어서야 한다. 지금 이 모든 생각과 감정과 느낌과 봄과 들음, 이것이 일어나는 이 여기에 머물러야 한다. **이 앎에 머물러야 한다.** 이것은 개념으로 아는 게 아니다. 생각으로 아는 게 아니다. 그래서 사람들은 이걸 모름이라고 한다. \"모르겠는데요.\" 그 **모름 속에 머물러야 한다.** 개념적으로 아는 게 아니니까 모름이지, 알고 모름도 없는 거다. 여기는 지금 그냥 이거다. 그냥 이것에 있어야 한다.\n\n#### **올셀프의 메시지는 왜곡 없이 읽어야 한다**\n\n올셀프의 메시지는 감정으로도 올라오고, 생각으로도 올라온다. 느낌으로도 오고, 빛으로도 오고, 소리로도 오고, 내 안의 감정으로도 오고, 생각으로도 온다. 그런데 이것을 **내 육신 안에 것으로 읽어버리면 왜곡이 발생한다.** 올셀프의 관점에서 읽어야 하는데, 내 육신 안에 있는 것으로 읽어버리기 때문이다. 그래서 올셀프의 관점이 중요하다. 서류 문제나 기술적인 것을 해결할 때는 생각을 써야 한다. 그 생각도 쓸 수 있다. 다만 그때에도, 내 에고 안에서 느끼는 것이 아니라 올셀프가 전하는 메시지", "source": "essay"}, {"id": "essay_439_0a0448faee", "text": "의 관점이 중요하다. 서류 문제나 기술적인 것을 해결할 때는 생각을 써야 한다. 그 생각도 쓸 수 있다. 다만 그때에도, 내 에고 안에서 느끼는 것이 아니라 올셀프가 전하는 메시지로 감정과 생각을 받아들이는 것이다.\n\n#### **에고의 생각은 알음알이고, 올셀프의 관점은 지혜다**\n\n내 안에서 일어나는 것은 지식적인 부분이다. 내가 알고 있는 것을 갖고 굴리는 거니까. 그거를 지혜로 바꾸는 거다. **전식득지(轉識得智)다.** 식(識)을 바꿔서 지혜로 돌리는 것이다. 에고의 관점에서는 내가 유리한 쪽으로 생각한다. 나만 유리하자고 하는 거다. 그런데 남도 자기만 생각한다. 그러니까 서로 충돌이 생길 수밖에 없다. 그거는 나한테도 유리할 수가 없다. 문제를 해결하는 방법이 안 된다. **올셀프 관점으로 생각하면 다르다.** 내가 갖고 싶은 마음이 있으면, 상대방도 그런 마음이 있겠구나, 하는 여지가 생긴다. 내가 이렇게 느끼니까 너도 이렇게 느낄 수가 있겠구나. 내가 이런 생각을 하니까 너도 그런 생각을 할 수 있겠구나. 이것이 이해의 여지다. 당신은 당신 안에 들어가 있고, 나는 내 안에 들어가 있으면 — 분리돼 있으니까 — 서로 이해할 여지가 없어진다. 내 감정은 내 감정이고, 네 감정은 네 감정이 돼버린다. **올셀프의 관점으로 보면 그 분리가 녹는다.** 그러니까 **에고의 관점에서 생각하는 건 알음알이고, 올셀프의 관점에서", "source": "essay"}, {"id": "essay_440_8d910c7b62", "text": "내 감정은 내 감정이고, 네 감정은 네 감정이 돼버린다. **올셀프의 관점으로 보면 그 분리가 녹는다.** 그러니까 **에고의 관점에서 생각하는 건 알음알이고, 올셀프의 관점에서 생각하는 게 지혜다.**\n\n#### **지구와 달과 우주**\n\n지구에서 일어나는 일과 달에서 일어나는 일은 서로 다르다. 지구에서 일어나는 건 지구에 있는 사람이 알고, 달에서 일어나는 건 달에 있는 사람이 안다. 서로 모른다. 그렇지만 **둘 다 우주 안에서 일어난다.** 이 공간에서, 이 의식에서 다 일어나는 것이다. 나라는 지구와 너라는 달은 서로 다른 것 같지만, 전혀 별개의 것이 아니다. **올셀프에서 일어난다.** 나의 올셀프와 당신의 올셀프가 둘이 아니다. 그러니까 몰라도 된다. 모른다는 것이 올셀프가 아니라는 게 아니다. 모름 속에 머무는 것, 그것이 이미 올셀프 안에 있는 것이다.\n\n#### **셀프 코칭 — 관점을 이동한다**\n\n어떤 생각이 떠오를 때 물어봐야 한다. '이거 나만 유리하자고 하는 내 육신 안의 생각인가?' 그걸 알아차리면, 다음 질문이 온다. **'에고를 벗어난 올셀프의 관점은 뭐지?'** 이것이 셀프 코칭이다. 시점 이동, 관점 이동이다. 올셀프의 관점으로 이동하는 것. 그렇게 되면 올셀프가 강력해진다. 나를 바꾸고, 세상을 바라보는 관점을 바꾼다. 지혜롭게 세상을 바라보는 관점이 생긴다. #올셀프 #에고 #전식득지 #지혜", "source": "essay"}, {"id": "essay_441_cbca79b9e4", "text": "관점으로 이동하는 것. 그렇게 되면 올셀프가 강력해진다. 나를 바꾸고, 세상을 바라보는 관점을 바꾼다. 지혜롭게 세상을 바라보는 관점이 생긴다. #올셀프 #에고 #전식득지 #지혜 #셀프코칭 #관점이동\n\n**--- (구분선)**\n\n[파일명: 에고의연극_나를붙들고_수필.md]\n\n### **에고의연극_나를붙들고_수필**\n\n#### **에고는 문제를 만들어야 존재한다**\n\n**셀프 1이 그냥 아무 역할이 없으면 자기 존재감이 없다.** 그러니까 자꾸 이렇게 존재감이 있게끔 이유를 달아댄다. '야, 이렇게 가만 있으면 너 나태한 거 아니야? 이래 가지고 어떻게 성장할 거야? 어떻게 성공할 거야? 지금 이 상태는 뭔가 문제가 있는 거야. 뭔가 더 많이 노력해야 해. 지금 봐봐 힘든 게 얼마나 많아. 통장에 잔고가 없잖아. 이거 큰일 났잖아. 어떻게든지 해결해야 돼.' 이러면서 **문제를 만드는 거다.** 지금 당장에 해결하라고 다그치고. 문제를 만들어야 자기 존재감이 생기는 거다. 정치인들이 뭔가 자꾸 이슈를 터트리는 게 뭐겠는가. 자기가 존재했다는 것을 세상 사람들한테 알리는 거다. 국회에서 소리소리 지르고 욕하고 주먹다짐해야 스포트라이트를 받는다. **에고도 똑같다.** 걔도 '나'라는 것이 좋으면 좋은 대로 '나'라는 걸 유지하고 싶어 한다. 나쁜 것도 '나'라는 느낌을 계속 느끼고 싶은 거다. 그래야 자기 존재감이 생기니까. 아무 일", "source": "essay"}, {"id": "essay_442_84acd6e1e4", "text": "다.** 걔도 '나'라는 것이 좋으면 좋은 대로 '나'라는 걸 유지하고 싶어 한다. 나쁜 것도 '나'라는 느낌을 계속 느끼고 싶은 거다. 그래야 자기 존재감이 생기니까. 아무 일 없는 거면 불안하다.\n\n#### **에고는 잠자면 사라진다는 걸 안다**\n\n**얘가 잘 안다.** 뭘 잘 아냐면, 밤에 잘 때는 자기가 사라진다는 걸 안다. 육신은 계속 있다. 어쨌든 90이고 100이고 살지 않는가. 육신을 유지하는 데 밥을 먹고 하지만, 특별하게 애쓰지 않아도 그냥 살아간다. 잠을 잔다고 육신이 없어지는 건 아니다. 아침이 되면 또 육신이 이어진다. 그런데 **에고는 자기는 잠잘 때 없어진다.** 그게 너무나 불안하다. 그리고 특별하게 주시가 안 되면, 어떤 이목을 끌지 않으면 사라진다. 그러니까 뭔가가 자꾸 문제를 일으켜야, 아등바등해야 그나마 겨우 존재감을 얻는다. 이 사람의 주목을 끄는 거다. **에고가 셀프 2의 관심을 다 끌어** 당긴다. 셀프 2는 그냥 보고 듣고 세상을 두루두루 알고 들으면서 여여하게 살아간다. 아무 문제 없다. 바디(몸)도 아무 문제 없이 살아간다. 다 아무 문제 없이 사는데, **'나'만 바둥바둥 살아야 된다고 생각하는 거다.**\n\n#### **생각과 감정에 '나'를 딱 붙인다**\n\n그러니까 더 강하게 어떤 감정이 올라오면 '이때다 싶어' 가지고 탁 거기에 달라붙는다. '이거는 내가 괴로운 거야.' 슬픈 감", "source": "essay"}, {"id": "essay_443_fb01661c23", "text": "#### **생각과 감정에 '나'를 딱 붙인다**\n\n그러니까 더 강하게 어떤 감정이 올라오면 '이때다 싶어' 가지고 탁 거기에 달라붙는다. '이거는 내가 괴로운 거야.' 슬픈 감정이 올라오면 '이건 내가 슬픈 거야.' **'그때다 싶어'** 가지고, 어떤 생각이 올라오면 '이건 내 생각이야' 하면서 탁 생각·느낌·감정에 **'나'를 딱 붙여** 버린다. 그리고 안 떨어지려 한다. 그런데 느낌은 사라진다. 이거 느꼈다가 저거 느껴진다. 감정도 사라진다. 슬펐다가 사라지고, 또 좋기도 했다가 사라진다. 생각도 이 생각 나왔다가 또 사라진다. **계속 옮겨간다.** 이 느낌에 붙었다가 저 감정에 붙었다가 이 생각에 붙었다가 자꾸 붙어댄다. 그래야 '나'라는 걸 계속 가져갈 수 있으니까. 그리고 조정하기 가장 쉬운 게 **생각** 이다. 생각의 스토리를 실체화시키려고 자꾸 한다. **슬픈 주인공** 역할을 하려 한다. 멜로드라마의 슬픈 주인공. 그래야 사람들이 거기에 넋을 놓고 빠지지 않겠는가. 그러니까 나의 모든 자원을 걔가 다 가져가고 있다. 그러면서 '내가 계속 슬프구나'라고 생각하게 만든다. 새소리도 들리고 나름 좋은 것들도 많이 있는데, 그것을 다 못 보고 오로지 '나'라는 에고가 없어지지 않게 하기 위한 **쇼, 연극** 에 붙었다 저기 붙었다를 반복한다. 그것들을 강화시키면서. '나'라는 게 없어지면 안 되니까 그걸 계속 끌고", "source": "essay"}, {"id": "essay_444_000f44995e", "text": "고 오로지 '나'라는 에고가 없어지지 않게 하기 위한 **쇼, 연극** 에 붙었다 저기 붙었다를 반복한다. 그것들을 강화시키면서. '나'라는 게 없어지면 안 되니까 그걸 계속 끌고 간다. 거기다 감정도 불어넣어주고, 생각도 불어넣어주고 이러면서 질질질질 끌려 다닌다. **그게 우리 삶이다.**\n\n#### **'나'라는 게 있긴 한가 — 반문**\n\n그래서 반문해야 한다. 생각을 없애려 하지도 말고, 끌려가려 하지도 말고, 그때 **반문** 해야 한다. '이 생각을 내가 한 건가?' '이 생각에 나라는 게 있나?' 어떤 느낌이 올라왔을 때. '그래, 이 감정이 올라오는 건 올라오는 거구나. 이런 감정이 올라왔구나.' 근데 여기에 **'나'라는 게 있나?** '내가 이 느낌을 계속 갖고 갈 필요성이 있나?' **'나'라는 게 이 느낌을 느끼는 '나'라는 게 있나?** 마치 이렇게 생각하는 거다. 들릴 때 내가 듣나? 내가 애써서 듣나? 내가 애써서 보나? 이 느낌을 내가 떠올렸나? 이렇게 **'나'가 있긴 한가?** 자꾸 이걸 돌려서 생각해봐야 한다. 그렇게 의심을 해봐야 '나'가 일상생활에서 그걸 갖고 다닌다는 것을 안다. 수행을 떠나서, 깨달음을 떠나서, 어쨌든 하루를 살아가는 데 여기에 질질질질 끌려다니며 살 필요가 없다는 거다.\n\n#### **걱정할 시간에 방향을 전환한다**\n\n만약에 그런 느낌을 느끼고 싶지 않다면, 다른 방법을", "source": "essay"}, {"id": "essay_445_0410d8cb79", "text": "든 하루를 살아가는 데 여기에 질질질질 끌려다니며 살 필요가 없다는 거다.\n\n#### **걱정할 시간에 방향을 전환한다**\n\n만약에 그런 느낌을 느끼고 싶지 않다면, 다른 방법을 찾으면 된다. **걱정할 시간에.** 두려움이나 막막함이나 이런 걸 느끼고 싶지 않다면, 차라리 나가서 걷든가, 뭔가를 보든가. **방향 전환을 하는 게 낫다.** 그걸 느끼고 있는 것보다. 아니면 그것이 문제가 돈 때문이라면, 그걸 해결하는 쪽으로 나의 자원을 그쪽으로 그냥 쓰는 게 낫다. 느낌을 계속 갖고 다니면서 거기다 시간을 다 허비하는 것보다는.\n\n---\n\n*[⚠️세계관 확인] '셀프 1/셀프 2' 언어가 이 대화에서 처음 등장한다. 올셀프 세계관의 구조도에는 '에고'와 '올셀프'의 구분은 있지만 '셀프 1/셀프 2'라는 용어가 명시되어 있지 않다. 이너게임(Inner Game)의 Self 1/Self 2 개념과 연결된 것인지, 박의섭의 독자적 언어인지 확인 필요. 세계관 문서에 편입 여부 검토 요망.* #에고 #셀프1 #반문 #나라는것 #올셀프 #수행\n\n**--- (구분선)**\n\n[파일명: 역동성_자기수용_수필.md]\n\n### **역동성_자기수용_수필**\n\n#### **못마땅한 부분을 버리려 할 때**\n\n내 안에서 발생되는 차이가 있다. 나 스스로 내가 못마땅한 부분. 취하고 싶은 것과 배제하고 싶은 것. 그런데 그 못마땅한 부분을 버리고자 한다는", "source": "essay"}, {"id": "essay_446_1af3426c74", "text": "마땅한 부분을 버리려 할 때**\n\n내 안에서 발생되는 차이가 있다. 나 스스로 내가 못마땅한 부분. 취하고 싶은 것과 배제하고 싶은 것. 그런데 그 못마땅한 부분을 버리고자 한다는 것은, 그것을 나와 **분리** 시키겠다는 것이다. 분리가 내 마음대로 되지 않으니 괴롭고 불만족스러운 것이다. 그런데 한번 뒤집어 보면, 불만족스러운 부분이 있기 때문에 만족스러운 부분도 있다. 만족스럽지 않은 부분이 있기 때문에 만족스러운 부분으로 나아가려는 동기가 생기고, 그것이 에너지가 된다. 그것을 나의 **역동성** 으로 받아들이면 되는 것이다.\n\n---\n\n#### **그림자와 싸우는 일**\n\n그런데 그것을 분리시키려 하면, 분리하는 과정에서 필연적으로 투쟁이 발생한다. 자기 그림자를 보고 싸우는 것이나 마찬가지다. 그것은 자기 스스로를 거부하는 것이다. 한편으로 보면 그 못마땅한 부분은 **신의 선물** 일 수 있다. 거기서 **창조성** 이 나온다. 차이에서 아름다움이 나오고, 아름다움에는 사랑이 있다. 사랑이란 진선미가 내포된 것이다. 사랑하면 다 아름답게 보인다. 사랑으로 인해 차이가 나오는 것이고, 차이로 인해 창조성이 생긴다.\n\n---\n\n#### **내 안에 신을 모신다는 것**\n\n그 차이를, 못마땅한 부분을 포함한 내 안의 모든 것을 내가 받아들인다는 것은, 한편으로 보면 **내 안에 신을 모시는** 것이다. 그것을 거부한다는 것은", "source": "essay"}, {"id": "essay_447_a4926decbc", "text": "신을 모신다는 것**\n\n그 차이를, 못마땅한 부분을 포함한 내 안의 모든 것을 내가 받아들인다는 것은, 한편으로 보면 **내 안에 신을 모시는** 것이다. 그것을 거부한다는 것은 나와 신을 분리시키는 것과 마찬가지다. 나를 온전히 수용한다는 것은 좋은 부분만 골라 가지는 것이 아니다. 못마땅한 부분까지 포함해서, 그 차이 전체를 내 삶의 역동성으로 받아들이는 것이다. 그때 비로소 창조성이 흐른다. #역동성 #자기수용 #창조성 #그림자 #신의선물\n\n**--- (구분선)**\n\n[파일명: 역동성흐름_맥락의줄기_수필.md]\n\n### **역동성흐름_맥락의줄기_수필**\n\n#### **저절로 일어난다**\n\n봄이 나다, 들음이 나다. 그 봄과 들음이 찰나찰나 일어나고 사라지면서 나라는 하나의 실체가 있다고 느껴진다. 파도처럼 한 파도가 일어나면 다음 파도를 일으키고, 그 힘이 이어지면서 우리 삶이 나아간다. 그것을 누가 일으키는가. 내가 일으키는 것이 아니다. 보지 않고 싶어도 저절로 보인다. 듣고 싶지 않아도 저절로 들린다. 에고가 조정할 수 있는 부분이 아니다. 그 **삶의 역동성 흐름** 이 우리를 끌고 간다. 그게 우주가 우리를 살리는 것이다. 내가 노력하지 않아도, 다 보이고 들리고, 마음이 느껴지고, 생각이 일어난다.\n\n---\n\n#### **에고는 그림자다**\n\n수입이 발생되는 데 너무 오래 걸릴 것 같다, 가능성이 희박할 것 같다. 에", "source": "essay"}, {"id": "essay_448_943766b84f", "text": ", 다 보이고 들리고, 마음이 느껴지고, 생각이 일어난다.\n\n---\n\n#### **에고는 그림자다**\n\n수입이 발생되는 데 너무 오래 걸릴 것 같다, 가능성이 희박할 것 같다. 에고가 자꾸 그런 생각을 한다. 사무실을 내고 자료를 만들고 하는데, 그것도 어쩔 수 없다는 거냐고 묻는다. 어쩔 수 없다. 그게 그렇게 가는 것이다. 그런데 이 대목에서 반론이 생긴다. 에고도 셀프 원이고, 셀프 투이고, 다 나 아니냐고. 맞다. 셀프 원도 나이고 셀프 투도 나다. 그런데 **에고는 그림자와 같은 것이다.** 그림자도 나에게서 나온다. 그렇다고 그림자에 휘둘릴 이유는 없다. 그림자를 보고 무서워할 이유가 없다. 그림자가 보이는 것은 어쩔 수 없다. 그런데 그것을 그림자라고 **여실하게 알아야 한다.** '이것은 생각일 뿐이다.' 결과를 가정하고, 앞날이 이럴 것이다 저럴 것이다 하는 것이 다 생각이다. 생각은 실상을 바꾸지 못한다. 그림자가 실상을 바꿀 수 없는 것처럼. 목표를 세우고 과정이 제대로 가고 있는지 점검하면서 가는 것은 맞다. 그러나 삶의 역동성에 따라 파도를 타고 가면 우주가 그렇게 살게 한다. 그것을 믿어야 한다. 내가 어찌할 수 없는 부분이기 때문이다. **괜히 두려움을 사서 안고 갈 필요가 없다.** 어차피 가는 것인데. 생각이 어떻게 그것을 바꾸겠는가.\n\n---\n\n#### **맥락이 있어야 전달된다**\n\n어떤 이론을 정립", "source": "essay"}, {"id": "essay_449_4e25e9c8b3", "text": "다. **괜히 두려움을 사서 안고 갈 필요가 없다.** 어차피 가는 것인데. 생각이 어떻게 그것을 바꾸겠는가.\n\n---\n\n#### **맥락이 있어야 전달된다**\n\n어떤 이론을 정립하는 것은 나무와 같다. 뿌리가 있고, 줄기가 있고, 가지가 있다. 가지 하나, 이파리 하나를 따로 떼어서 사람들에게 전달할 수 없다. 사람들에게 무언가를 전달하려면 **맥락** 이 있어야 한다. 강좌든, 책이든, 하나의 완성된 형태로 내놓으려면 **맥락적인 흐름** 이 있어야 한다. '그래서 한마디로 말해서 뭐야?' 그것이 줄기다. 이야기의 줄거리, 뿌리. 그것이 딱 픽스된 상태에서 가지들을 연결하면 된다. 가지는 이미 많이 붙어 있다. 연결하고 살을 더 붙이면 된다. 뿌리를 40년 동안 내렸다면, 그 뿌리에서 줄기를 세우는 일이 지금 해야 할 일이다. #역동성흐름 #에고그림자 #맥락 #삶의흐름 #올셀프\n\n**--- (구분선)**\n\n[파일명: 연금술사_역동성배움_수필.md]\n\n### **연금술사_역동성배움_수필**\n\n#### **불평불만이 삶을 끌고 간다**\n\n지금 닥치는 현실에서 계속 불만족과 불평을 느낀다. 그러면 **불평불만의 에너지로 삶을 밀고 가게 된다.** 그 에너지가 삶을 끌고 가는 것이다. 점점 더 그렇게 된다. 힘든 거는 힘든 거다. 불평이 없을 수 없다. 그런데 거기서 계속 불평불만을 하고 있으면, 그것이 내 **패턴화** 가 되어버린다.", "source": "essay"}], [{"id": "essay_450_99d2351eca", "text": "삶을 끌고 가는 것이다. 점점 더 그렇게 된다. 힘든 거는 힘든 거다. 불평이 없을 수 없다. 그런데 거기서 계속 불평불만을 하고 있으면, 그것이 내 **패턴화** 가 되어버린다. 내 시야가 계속 그쪽을 향한다. 내가 스스로 **자가 프로그래밍** 을 시키는 것이다. 나쁜 것에는 분명 나쁜 면이 있다. 힘든 건 힘든 거다. 그러나 그것이 긍정적으로 작용할 수도 있는 **가능성을 내 스스로 차단시키는** 것이다. 자꾸 나쁜 쪽으로 작용하도록 내 스스로 강화시키는 것이다.\n\n---\n\n#### **배움으로 바꾸거나, 수용하거나**\n\n힘든 것을 만났을 때 선택지가 있다. 첫째, **'삶이 나에게 뭘 가르쳐 주려고 이러나?'** 배움으로 바꾸는 것이다. 둘째, 이것은 삶의 역동성에서 필연적으로 겪을 수밖에 없는 것이라고 수용하는 것이다. 셋째, 극복하려면 방법을 찾는 것이다. 정상에 올라가야지 하면 뿅 하고 올라가 있는 것이 아니다. 산을 올라가는데 힘든 것이다. 내려가는 곳도 있어야 올라가는 곳이 있다. 그 지점에서 필요한 것이 **'그럼에도 불구하고'** 라는 패턴이다. 습관적으로 불만이 툭 튀어나왔을 때, 거기서 멈추고 '그럼에도 불구하고, 이런 면도 있어'로 넘어가는 것이다. '이거를 통해서 나는 뭘 배워야 되지?' '이걸 겪고 나면 분명히 또 좋은 게 올 거야.' 그것이 **성찰이고 깨어있음** 이다.\n\n---\n\n#### **역동성이", "source": "essay"}, {"id": "essay_451_b7209a5294", "text": "넘어가는 것이다. '이거를 통해서 나는 뭘 배워야 되지?' '이걸 겪고 나면 분명히 또 좋은 게 올 거야.' 그것이 **성찰이고 깨어있음** 이다.\n\n---\n\n#### **역동성이 오감을 깨운다**\n\n단맛만 취하면 다른 맛을 다 몰라버린다. 단맛조차 모른다. **쓴맛도 보고 신맛도 보고 여러 가지 맛을 봐야 오감이 깨어있게 된다.** 차이가 감각을 깨워주는 것이다. 흔들기 때문에. 그냥 잠잠한 것은 자는 것이다. 무딘 상태다. 좋았다 나빴다 요동을 친다. 내가 요동치는 그 진폭만큼 **삶이 역동적으로 깨어있게 된다.** 폭포수 옆 가파른 언덕길을 빠르게 지나갈 때 졸 수가 없다. 온몸으로 생생하게 깨어있다. 딴 생각을 못 한다. 오로지 지금 이 순간의 느낌만 있다. 역동성이 그것을 알려주는 것이다. 역동성은 또한 **창조성의 원천** 이다. 리듬감이 생기고 흥이 생긴다. 미끄럼틀을 타는 것이 그것이다. 반대로 안정만 추구한다면, 그게 **우울증이고 권태감** 이 된다. 그러니까 삶의 파도 위에 보드를 타야 한다. 삶의 역동성이 어디로 끌고 가는지 한번 보자. 기왕이면 기쁜 마음으로 타고 가면 된다. 고통 속에서 탈 이유가 없다.\n\n---\n\n#### **연금술사가 되는 것**\n\n내 앞에 닥친 경계를 **신이 나한테 준 선물로 바꿀 수 있다.** 시련으로 경험할 수도 있지만, 신의 선물로 경험할 수도 있다. 그 선택을 내가 할 수 있다.", "source": "essay"}, {"id": "essay_452_40e4d03315", "text": "사가 되는 것**\n\n내 앞에 닥친 경계를 **신이 나한테 준 선물로 바꿀 수 있다.** 시련으로 경험할 수도 있지만, 신의 선물로 경험할 수도 있다. 그 선택을 내가 할 수 있다. 그것이 인간의 **자유 의지** 다. 자유 의지가 있다는 것이 바로 이것이다. 어떤 것을 신의 선물로 경험하느냐, 시련으로 경험하느냐의 차이. 어려움이 없다는 것이 아니다. 우리가 시련이라고 생각하는 그것을 **신의 선물로 바꾸는 것이 삶의 연금술이다.** 우리는 **연금술사가 되어야 한다.** 나의 선택에 따라서 연금술사가 될 수도 있고, **피해자** 가 될 수도 있다. 그것을 선택할 수 있다. 그것이 자유 의지다. #연금술사 #역동성 #불평불만패턴 #깨어있음 #자유의지\n\n**--- (구분선)**\n\n[파일명: 연기의세계_인연의수레바퀴_수필.md]\n\n### **연기의세계_인연의수레바퀴_수필**\n\n#### **집 한 채를 짓는 데 얼마나 많은 인연이 있었는가**\n\n이 집을 짓게 된 것, 우리는 내가 열심히 노력해서 지었다고 생각한다. 물론 노력을 안 했다는 건 아니다. 그런데 우리가 한 부분보다도 어마어마하게 많은 부분들이 있었다. 덤프트럭이 얼마나 많이 와서 흙을 부었는가. 돌공장도 기여를 했다. 포크레인 기사도 와서 땅을 얼마나 많이 다졌는가. 사람 하나를 만드는 데도 그 사람의 엄마, 아빠가 힘을 썼다. 우리 대신 여기 와서 그런 인연을 짓게 하기 위", "source": "essay"}, {"id": "essay_453_c78df3d3d8", "text": "장도 기여를 했다. 포크레인 기사도 와서 땅을 얼마나 많이 다졌는가. 사람 하나를 만드는 데도 그 사람의 엄마, 아빠가 힘을 썼다. 우리 대신 여기 와서 그런 인연을 짓게 하기 위해서. **인연을 우리가 만들었다고 볼 수는 없다.** 집을 짓는 과정 하나에도 우리가 모르는 어마어마하게 많은 인연들이 있었다. **이게 삶의 태도로서 굉장히 중요하다.** 세상이 이렇게 어려워지는 이유는, 다들 자기가 잘나서 잘 먹고 잘 산다고 생각하기 때문이다. 내가 투자를 잘했으니까, 내가 집을 잘 샀으니까 집값이 올랐다고 생각한다. 물론 그런 부분이 없다는 건 아니지만, 그게 전부는 아니다. 그건 아주 **미묘한 일부분** 이다. 방아쇠를 당기면 총알이 날아간다. 그렇다고 해서 내가 총이나 총알을 다 만든 건 아니다. 나는 그냥 방아쇠를 당겼을 뿐이다. 그런 정도다, 우리의 생각이라는 건, 우리의 애씀이.\n\n#### **인연이라는 거대한 수레바퀴**\n\n**인연이라는 거대한 수레바퀴** 는 기어가 맞물려 돌아가듯이 돌아간다. 시계 안의 여러 기어들이 물려서 돌아가는 것처럼. 내가 좀 더 빨리 돌아가고 싶다고 해서 빨리 돌아가지지 않는다. 왜냐하면 서로 맞물려 있으니까. **연기적으로** 다 맞물려 있는 것이다. 내가 무리하게 많이 돌아가면, 나보다 작은 기어들은 내가 한 바퀴 돌 때 수십 바퀴를 돌아야 한다. **어딘가에서는 고통이 발생된다.** 그", "source": "essay"}, {"id": "essay_454_6162a93ee8", "text": "기적으로** 다 맞물려 있는 것이다. 내가 무리하게 많이 돌아가면, 나보다 작은 기어들은 내가 한 바퀴 돌 때 수십 바퀴를 돌아야 한다. **어딘가에서는 고통이 발생된다.** 그 사람들은 아무 영문도 모르고 뼈 빠지게 도는 거다. 누군가가 '나 빨리 한 번 더 돌자'고 애쓰는 바람에, 영문도 모르고 그렇게 돌아간다는 것이다. 저마다의 바퀴들이 다 그렇게 하지만 어차피 이것은 연기적으로 다 돌아간다. 이것이 돌아가니까 저것이 돌아가는 거다. **내가 돌리는 게 아니고, 이것이 돌아가니까 내가 돌아가는 거다.** '나는 왜 이렇게 안 돌아가지. 더 빨리 돌아가고 싶고, 힘을 안 들이고도 누군가 돌려주면 좋겠다.' 그런 마음들이 **쓸데없는 고통을 양산해내는 거다.** 이 연기적으로 세상을 굴리는 것이 신이라면 신이고, 법이라면 법이고, 진리라면 진리인 거다. 그 거대한 연기의 세계에서 우리가 미치는 영향은 아주 **미미하다.** 그걸 가지고 마치 내가 혼자 나의 삶이라는 기어를 돌린다고 생각하는 거다. 그런데 어떤 사람은 굉장히 쉽게 돌아가는 것 같다. 그것도 다 연기에 의해서 그렇게 돌아가는 거다. 그 사람은 하필 큰 바퀴를 자기라고 여기는 것이고, 나는 지금 이 조그만 바퀴를 나라고 여기는 것뿐이다. 하지만 우리의 본성은 이 거대한 전체다. 그러니까 **연기의 수레바퀴를 돌리는 힘에다가 many 부분을 내려놔도 된다.**\n\n####", "source": "essay"}, {"id": "essay_455_1336978545", "text": "이 조그만 바퀴를 나라고 여기는 것뿐이다. 하지만 우리의 본성은 이 거대한 전체다. 그러니까 **연기의 수레바퀴를 돌리는 힘에다가 many 부분을 내려놔도 된다.**\n\n#### **내가 하는 게 사실은 없다**\n\n결과가 어떻게 나올까 봐 두려워하는 것이다. 그걸 한 번이라도 놓아봤는가. 하루가 됐건, 한 달이 됐건 그냥 놓고 살아보라는 것이다. 과연 우리가 생각하는 것처럼 이것을 놓으면 큰일 나고, 기어가 딱 멈출 것 같다. 그런데 **절대 그렇게 멈춰지지 않는다.** 삶이라는 게. 내가 멈추고 싶어도 못 멈춰진다. 연기적으로 물려서 돌아가기 때문에. 생각해보면 내 몸을 유지하는 데도, 혈관에 내가 피를 돌리는가. 심장을 움직이는 데 내가 무엇을 하는가. 하는 게 없다. 세수를 할 때도 이 팔의 각도, 강도 이런 걸 내가 어떻게 다 알아서 하는가. 세수를 해야지 하고 방아쇠는 내가 당기지만, 그 나머지는 다 이 몸이 알아서 한다. 걸을 때도 그렇다. 운전할 때 핸들을 어떻게 틀어야 한다, 브레이크를 밟아야 한다, 그걸 한 번이라도 생각하고 온 적이 있는가. 없다. 그냥 왔다. '집에 가자' 하고 방아쇠를 당기니까 총알이 핑 나가듯이. **법이나 진리나 부처가 잠깐이라도 0.1초라도 관심을 끊으면, 이 세상에 존재할 수가 없다.** 절대 살 수가 없다. 그거는 확실히 믿어도 된다. 그게 하느님이건 부처님이건 진리건, 그것이 무관심하게", "source": "essay"}, {"id": "essay_456_f8eb108c24", "text": "가 잠깐이라도 0.1초라도 관심을 끊으면, 이 세상에 존재할 수가 없다.** 절대 살 수가 없다. 그거는 확실히 믿어도 된다. 그게 하느님이건 부처님이건 진리건, 그것이 무관심하게 '니가 알아서 살어' 하면, 그때부터 숨도 쉬고, 심장도 뛰고, 눈도 깜빡이고, 피도 돌리고 다 해야 한다. 그렇게 할 수 있는가. 걱정을 어마어마하게 해서 그걸 하게 할 수 있는가. 최첨단 과학자들을 불러도 자기 생명을 그렇게 유지할 수 있는가. **절대 없다.** 절대 진리가 아니면, 지금 여기에 0.1초도 존재하지 못한다. 그런데 거기에다가 괜히 '나'라는 것이 끼어들어서 마치 그거의 모든 책임을 내가 다 져야 되는 것처럼 '이거 앞으로 대책을 세워야 된다' 하면서 생각으로만 '어떻게 하지? 어떻게 하지? 큰일 나는 거 아니야?' 이러고 있는 거다. 예수님도 그래서 그 말을 한 것이다. '오늘 뭘 입을까, 내일 뭘 먹을까 걱정하지 말라. 이 날아다니는 새도 하느님이 다 알아서 먹인다.'\n\n#### **결과는 진리에 맡기고, 걱정할 시간에 방법을 찾는다**\n\n세상에는 우리가 볼 때 불합리하게 돌아가는 것 같지만, 사실은 기어가 꽉 맞물려서 연기적으로 돌아가듯이 정말 꽉 맞물려 돌아간다. '하늘의 그물은 성근 것 같아도 하나도 빠져나갈 수 없다'는 말이 그것이다. **꽉 법이나 진리가 이렇게 맞물려 돌아간다.** 어마어마하게 많은 인연들이 얽히고설키면서", "source": "essay"}, {"id": "essay_457_49de15064d", "text": "돌아간다. '하늘의 그물은 성근 것 같아도 하나도 빠져나갈 수 없다'는 말이 그것이다. **꽉 법이나 진리가 이렇게 맞물려 돌아간다.** 어마어마하게 많은 인연들이 얽히고설키면서 세상이 벌어진다. 코로나가 올 줄 누가 예상했는가. 우리의 의도와는 전혀 다르게 별의별 일이 다 펼쳐진다. 그런데 이것이 나중에 어떤 길로 가게 인도할지는 아무도 모른다. 더 좋은 쪽으로 가게 할라고 이런 일이 있을지 그건 모른다는 거다. 그러니까 **결과는 법이나 진리에 맡겨야 한다.** 이 세상에 어떤 사람이래도 결과에 대해서 알 수가 없다. 걱정을 안 할 수는 없지만, 걱정할 시간에 차라리 **방법을 찾는 게 더 낫다.** 우리가 할 수 있는 것을 조금씩 해나가는 게 낫다. 괜히 나를 그런 에너지에다가 밀어낼 필요가 없다. **고통을 사서 할 필요가 없다.** 밧줄을 하나 갖다 놓고 '저거 뱀이지' 하면서 계속 뱀이라고 생각하면서 오해할 필요가 뭐가 있는가. 안 받아들이려는 마음이 있기 때문에 그런 거다. 그게 우리를 더 힘들게 하는 거다. 믿음이라는 것도 마찬가지다. 어떤 불상이나 말씀을 믿는 것, 그건 다 망상이다. 지금 이 눈 깜빡이고, 내 얘기를 듣고, 이것을 다 그 자리에서 부처가 다 하고 있구나 — 그것을 믿는 것이 진정한 믿음이다. 그게 완전히 팩트고, 사실이다. 지금 다 그렇게 하고 있다. 연기법이라는 게 **'이것이 있음으로써 저것이 있", "source": "essay"}, {"id": "essay_458_a20e0fba26", "text": "리에서 부처가 다 하고 있구나 — 그것을 믿는 것이 진정한 믿음이다. 그게 완전히 팩트고, 사실이다. 지금 다 그렇게 하고 있다. 연기법이라는 게 **'이것이 있음으로써 저것이 있다'**는 건데, 이것이 따로 있고 저것이 따로 있다고 생각하는 거다. 그게 착각이다. 이것으로 인해서 저것이 있고, 저것으로 인해서 이것이 있다. 대상이 있으니까 그걸 아는 게 있는 거 아닌가. 그게 둘이 아닌 건데, 온통 나다. 그런데 쟤 따로 나 따로 있다고 보는 거다. 대상 따로 주체 따로. 그러니까 자꾸 **존재를 차지** 하려 한다. 그게 착각이다. 고정된 '나'라는 것이 따로 없다. 다 연기법으로 존재하는 거다. 세상 모든 게, 나를 포함해서. 그거를 알면, 그게 **해탈** 이다. #연기 #인연 #올셀프 #내려놓음 #진리 #고통\n\n**--- (구분선)**\n\n[파일명: 영성감성지성_감정에너지_수필.md]\n\n### **영성감성지성_감정에너지_수필**\n\n#### **감성은 나를 움직이게 하는 에너지다**\n\n영성, 감성, 지성이 골고루 발달해야 한다. 그 가운데 감성이 그만큼 또 중요하다. **감성 에너지는 나를 움직이게 하는 에너지다.** 동기 부여를 하는 것이 이 감성이다. 화가 나면 그냥 평안이 없던 것이 확 신이 나기도 한다. 우울하거나 하면 또 아무것도 할 힘도 없어진다. **이 감정 자체가 나의 파워를 올리거나 내리게 하는 데 굉장히 중요한", "source": "essay"}, {"id": "essay_459_4a2c4b8370", "text": ". 화가 나면 그냥 평안이 없던 것이 확 신이 나기도 한다. 우울하거나 하면 또 아무것도 할 힘도 없어진다. **이 감정 자체가 나의 파워를 올리거나 내리게 하는 데 굉장히 중요한 역할을 한다.** 그래서 이 감정을 얼마나 잘 이해하고 원하는 방향 쪽으로 조율할 수 있느냐가 중요하다. 감정을 하나의 물줄기라고 생각하면 **물꼬를 어떻게 트느냐** , 때를 봐서 이것을 하는 것도 세상을 살아가는 데 굉장히 큰 하나의 기둥이다.\n\n#### **고삐 풀린 망아지와 예리한 칼**\n\n그렇다고 해서 감정 내키는 대로 해버리면 **고삐 풀린 망아지** 가 돼버린다. 그럴 때 지성과 영성이 적절히 이것을 제어해준다. 하지만 반대로 아주 날카로운 지혜와 지성만 잔뜩 있다고 하면, 이건 아주 **예리한 칼 같아서 그냥 다 베어버릴 수가 있다.** 그래서 여기에 감성이 들어가야, 칼 가지고 요리도 만들 수 있는 거다. 베지만 어떻게 베느냐에 따라서 남을 벨 수도 있고, 그걸로 요리도 만들 수 있다. 지혜나 지식이 가야 할 방향성을 잡아주는 것이 감정이고 감성이다.\n\n#### **가슴이 따뜻해야 한다**\n\n감성은 **가슴과 관련됐다.** 자비, 연민. 지혜와 자비는 함께 가는 것이다. 불성도 그렇다. 세상을 바라볼 때 가슴이 따뜻해야 한다. 감정이 올라오는 장소로서의 **가슴을 이해하는 것** — 영성과 지성이 아무리 날카로워도, 이 가슴의 온기 없이는", "source": "essay"}, {"id": "essay_460_0c624f8f33", "text": "이다. 불성도 그렇다. 세상을 바라볼 때 가슴이 따뜻해야 한다. 감정이 올라오는 장소로서의 **가슴을 이해하는 것** — 영성과 지성이 아무리 날카로워도, 이 가슴의 온기 없이는 그 예리함이 요리가 아니라 상처만 만든다. 그러니까 감성·지성·영성, 이 셋이 같이 딱 서야 한다. #영성 #감성 #지성 #감정에너지 #가슴 #자비\n\n**--- (구분선)**\n\n[파일명: 영원한배경_무상한현상_수필.md]\n\n### **영원한배경_무상한현상_수필**\n\n#### **모니터에 상이 나타나면 살아있다고 한다**\n\n컴퓨터 모니터를 본다고 하자. 그게 살아있는지 죽어있는지 어떻게 아는가. 화면을 켜서 거기에 불이 들어오고 뭔가가 나타나면 비로소 '살아있다'고 하는 거 아닌가. 전기를 껐다. 그러면 깜깜해진다. 아무것도 상(相)이 없다. 그러면 '죽어있다'고 하거나 '잠들어있다'고 하거나 '기절했다'고 하는 거다. 다시 전기가 들어갔다. 상이 나타났다. 그러면 '살아있다'고 한다. **상이 나타나면 살아있다고 하고, 상이 꺼지면 죽어있다고 하는 거다.**\n\n#### **그러나 화면 자체는 어디 간 게 아니다**\n\n여기서 중요한 게 있다. **화면 자체가 어디 간 건 아니다.** 상이 안 나타났을 때도 화면은 있다. 상이 나타날 때도 화면은 있다. 그거는 항시 변함없이 있는 거다. 그 화면 위에서 뭔가가 나타났다 사라지고, 나타났다 사라진다. 내 어릴 때", "source": "essay"}, {"id": "essay_461_efd3ef6613", "text": "상이 안 나타났을 때도 화면은 있다. 상이 나타날 때도 화면은 있다. 그거는 항시 변함없이 있는 거다. 그 화면 위에서 뭔가가 나타났다 사라지고, 나타났다 사라진다. 내 어릴 때 모습도 나타나고, 나이 먹었을 때 모습도 나타나고, 늙었을 때 모습도 나타나고, '꼴까닥' 했다가 다음 또 뭔가의 모습으로 나타나고. 모니터 화면은 없어지거나 한 적이 없다. 그러니까 우리가 아침에 나타났다가 깊은 밤 잠잘 때 사라진다. 나타났다 사라졌다. 기절했다가 깨어난다. 죽었다가 다시 태어난다. 항시 그렇다. 하지만 **그것이 나타나는 배경, 그거는 그냥 계속 있는 거다.** 그게 어디 간 게 아니다. 없는 허공에서 상이 맺힐 수는 없는 것 아닌가. **화면이 있어야 현상이 있을 수 있듯이, 이 바탕은 항상 있다.** #배경 #올셀프 #무상 #상(相) #불변 #존재의본질\n\n**--- (구분선)**\n\n[파일명: 영혼육_통일성과앎_수필.md]\n\n### **영혼육_통일성과앎_수필**\n\n#### **초와 촛불과 빛 — 영혼육의 비유**\n\n촛불로 치면 이렇다. 초에서 불이 켜진다. **초가 육(肉)이고** , 거기서 켜진 촛불이 혼(魂)이다. 그리고 촛불로 인해서 빛이 난다. 하얗게 드러난다. 그게 영(靈)이다. 촛불은 내 촛불도 있고 자기 촛불도 있다. 그런데 거기서 나오는 빛은 누구의 빛도 아니다. 그게 영이다. '나의 영', 이런 식으로 영이 따로 있는", "source": "essay"}, {"id": "essay_462_92eab09567", "text": "드러난다. 그게 영(靈)이다. 촛불은 내 촛불도 있고 자기 촛불도 있다. 그런데 거기서 나오는 빛은 누구의 빛도 아니다. 그게 영이다. '나의 영', 이런 식으로 영이 따로 있는 것이 아니다. 근데 영이 사실은 우리다. 나다. **영이 그렇게 밝게 아는 거다.** 그렇다고 영이 혼을 떠나서는 밝음이 없다. 그러니까 **혼이 필요하다.** 혼 자체도 육이 없으면 안 된다. 육으로 인해서 빛이 나는 거니까. 그러니까 **영혼육이 다 둘이 아니다.** 삼자(三者)다. 기독교에서 말하는 **삼위일체** 가 그것이다. 각각을 여의고는 드러날 수가 없다.\n\n#### **한쪽으로만 치우치는 것의 문제**\n\n영적인 부분만 너무 강조하는 경우가 있다. 한쪽으로 너무 치우치는 거다. 그게 틀렸다는 것이 아니라 그쪽으로 많이 이야기한다는 거다. 우리 삶은 **통으로 나** 라고 했다. 영은 육이 없으면 살아버릴 수가 없다. 세상을 다 깨닫고자 한다면서 다 팽개치고 법문만 듣고 이렇게 산다면 그건 제대로 된 삶이 아니다. 그렇다고 산다고만 해서 영이나 이런 것을 내팽개치고 오로지 몸집만 부풀리는 것도 마찬가지다. 아무리 큰 초래도 촛불은 하나다. 거기서 빛나는 것도 좀 넓은 바운더리에 빛나거나 조금 적게 빛나거나 할 수 있지만, **밝음이라는 거** 그 자체에 무슨 차이가 있는가. 서치라이트로 비추건, 형광등으로 비추건, 레이저로 비추건 무슨 차이가 있는", "source": "essay"}, {"id": "essay_463_3f7840400e", "text": "더리에 빛나거나 조금 적게 빛나거나 할 수 있지만, **밝음이라는 거** 그 자체에 무슨 차이가 있는가. 서치라이트로 비추건, 형광등으로 비추건, 레이저로 비추건 무슨 차이가 있는가.\n\n#### **앎은 항상 있다**\n\n우리가 밝다고 느끼는 것은 **가시광선을 인식하기 때문에** 빛이다. 그런데 가시광선이 아닌 아무런 깜깜한 상태라 해도, **앎이라는 것은 그냥 있는 거다.** 적외선 카메라로 보면 보인다. 박쥐는 빛이 없어도 본다. 초음파를 쏴서 본다. 그러니까 앎이라는 것은 형태의 문제가 아니다. **앎은 항상 있다.** 어떤 형태로 드러나느냐의 차이일 뿐이다. 모니터 화면이 상(相)이 있든 없든 항상 있듯이, 앎도 가시광선이 있든 없든 항상 있다. 그게 영이고, 그게 올셀프다. #영혼육 #삼위일체 #앎 #올셀프 #촛불비유 #통일성\n\n**--- (구분선)**\n\n[파일명: 오온_관계맺음_수필.md]\n\n### **오온_관계맺음_수필**\n\n#### **가화합(假和合): 진짜 뭉친 게 아니다**\n\n불교에서는 인간을 **색수상행식(色受想行識)** , 곧 **오온(五蘊)**의 화합으로 설명한다. 색(色)은 물질적인 것, 수(受)는 닿는 느낌, 상(想)은 대상에 대한 인식, 행(行)은 의지적 작용, 식(識)은 분별하고 아는 것. 이 다섯 가지가 모여서 나를 이룬다는 것이다. 그런데 그것이 **가화합(假和合)**이다. 진짜로 딱 고정되게 뭉쳐서", "source": "essay"}, {"id": "essay_464_3d0a7188ea", "text": "인식, 행(行)은 의지적 작용, 식(識)은 분별하고 아는 것. 이 다섯 가지가 모여서 나를 이룬다는 것이다. 그런데 그것이 **가화합(假和合)**이다. 진짜로 딱 고정되게 뭉쳐서 된 것이 아니라는 것이다. 양자역학에서 까를로 로벨리가 말하는 **관계 속에서 형성** 된다는 것과 같다. 나는 고정된 실체가 아니라 관계 맺음 속에서 드러나는 것이다. 냉장고를 냉장고로 인식하는 나와, 냉장고 사이에도 관계 맺음이 있다. 내가 대상을 보는 것이 아니라, 보는 나와 보이는 대상이 같이 발생한다. 들으면 들음에 대한 관계 맺음이 있다. **관계 맺음 속에서 사건들이 계속 벌어지고 있는 것이다.**\n\n---\n\n#### **나는 주체로 고정되고 싶다**\n\n그런데 우리는 자꾸 나를 주체로 고정시키려 한다. 나는 딱 고정되어 있고 다른 것들이 변한다고 생각한다. 그러나 관계 맺음 속에서의 **사건들의 연속** 일 뿐이다. 만화 영화의 주인공이 자기는 만화가 아니고 싶어하는 것과 같다. 연극이 끝나도 자기는 계속 있을 것이라 생각한다. 그러나 연극은 이벤트, 사건이다. 사건이 끝나면 또 새로운 사건이 벌어진다. 거기서 또 누군가 주인공이 나타난다. 그것이 또 나다. 별을 보고 안다는 것은 **별의 앎이 나인 것이다.** 수천억 개의 별이 보인다면, 수천억 개의 별을 보는 나가 있는 것이다. 소리가 들리면 듣는 무언가가 있다는 것이 증거다. **이것들을", "source": "essay"}, {"id": "essay_465_7657af2d23", "text": "안다는 것은 **별의 앎이 나인 것이다.** 수천억 개의 별이 보인다면, 수천억 개의 별을 보는 나가 있는 것이다. 소리가 들리면 듣는 무언가가 있다는 것이 증거다. **이것들을 떼놓고는 나를 얘기할 수 없다.**\n\n---\n\n#### **세상과 나는 얽혀 있다**\n\n이것들이 전부가 **통으로 나다.** 내 육신 밖의 모든 것이 타자가 된다고 생각하지만, 그것은 내가 협소하게 갇힌 것이다. **세상과 나는 뗄 수 없이 얽혀 있다.** 자석의 플러스와 마이너스처럼, 한쪽을 잘라도 또다시 플러스 마이너스가 생긴다. 내 맘대로 안 된다고 할 수 있다. 그런데 '내 맘대로 돼야 한다'는 것도 생각이다. **있는 그대로가 그냥 나다.** 이대로에 아무 문제가 없다. 보여지고 들려지고 그냥 이렇게 있는 것이다. 매 순간순간 태어났다 사라진다. 잠잘 때만이 아니라 매 순간. 이것이 있으니 저것이 있는 **연기(緣起)**다. 이것과 저것이 통으로 다 나다.\n\n---\n\n#### **천상천하유아독존(天上天下唯我獨尊)**\n\n내가 접속한 메타버스에서는 나도 있고 모든 것이 있다. 당신이 접속한 세상에도 내가 있고 모든 것이 있다. 그것이 중첩되어 하나처럼 느껴진다. 결국 **하나밖에 없다는 것이다.** 천상천하유아독존이 그것이다. 이 세상이 시뮬레이션이 아닐 확률이 수십억 분의 일이라는 주장이 있다. 과학이 불교에서 말하는 무상(無常)과 같은 방향을 가리", "source": "essay"}, {"id": "essay_466_93bc41c29c", "text": "밖에 없다는 것이다.** 천상천하유아독존이 그것이다. 이 세상이 시뮬레이션이 아닐 확률이 수십억 분의 일이라는 주장이 있다. 과학이 불교에서 말하는 무상(無常)과 같은 방향을 가리키고 있다. 삶과 죽음도 둘이 아니다. 파동이 올라가면 삶이고 내려가면 죽음이고, 그것이 연속이다.\n\n---\n\n#### **조건을 강화할수록 갇힌다**\n\n경제적 자유를 얻겠다고 돈을 벌면, 경제에 예속된다. 많이 알면 알수록 더 많이 조건화된다. **안다는 조건에 갇히는 것이다.** 나를 강화시키면 강화시킬수록 거기에 갇혀 더 구속된다. 자유로워지려 할수록 구속된다. 해탈이란 강화된 조건을 푸는 것이다. 있는 그대로 받아들이는 것이다. 그것이 쉽지는 않다.\n\n---\n\n#### **지혜와 자비는 둘이 아니다**\n\n새로운 관계 맺음이란 이것이다. 이원적인 관계에서 벗어나, **너와 나는 연결되어 있고 통으로 나뉠 수 없다는 것을 아는 것.** 내가 세상의 중심이지만 너도 세상의 중심이다. 내가 중심인 세상에 네가 보이고, 네가 중심인 세상에 내가 보인다. **상호 연기적으로 보이는 것이다.** 이 이해가 될 때 진정한 자비가 나온다. **지혜(智慧)와 자비(慈悲)가 둘이 아니라는 것이 그것이다.** 통으로 나이기 때문에 자비로운 마음을 가질 수밖에 없다. 거기서 사랑이 싹을 튼다. #오온 #가화합 #관계맺음 #연기 #지혜와자비\n\n**--- (구분선)**\n\n[파일", "source": "essay"}, {"id": "essay_467_35a1a242be", "text": "그것이다.** 통으로 나이기 때문에 자비로운 마음을 가질 수밖에 없다. 거기서 사랑이 싹을 튼다. #오온 #가화합 #관계맺음 #연기 #지혜와자비\n\n**--- (구분선)**\n\n[파일명: 온전한나_인지부조화_수필.md]\n\n# 온전한나_인지부조화_수필\n\n---\n\n## 가상의 나를 끌고 다닌다\n\n직장에서 야단을 맞았다. 집에 와서도 그 장면이 머릿속에서 반복된다. 나는 원래 이런 실수를 하는 사람이 아닌데, 나는 그래도 되는 사람이 아닌데. 그러면서 그 야단 맞은 나와 내가 생각하는 나 사이에서 싸움이 일어난다.\n\n이걸 **인지 부조화**라고 한다.\n\n사실 야단 맞은 그 순간, 나는 온전하게 야단을 맞고 있었다. 야단 맞는 것 자체가 온전한 나다. 지금 그게 나를 구성하고 있다. 그런데 거기서 \"나는 야단 맞으면 안 되는 스타일이고, 나는 이런 실수를 하는 사람이 아니고\" 하면서 **가상의 나**를 끌고 다니는 것이다. 야단 맞는 현재의 나와 내가 세워둔 상 사이에서 투쟁이 일어난다.\n\n더 문제는 이게 직장에서만 끝나지 않는다는 것이다. 집에 와서도 그 가상의 나를 끌고 온다. 집에서 온전하게 쉬고 있어야 할 나까지 훼손당한다. 매 순간 그렇게 되는 것이다.\n\n---\n\n## 지금 이 순간이 나다\n\n그러면 나는 무엇인가?\n\n지금 이 순간, 의자에 닿는 느낌이 있다. 지나가는 차 소리가 들린다. 바깥 풍경이 보인다. 안에서 올라오는 생각들, 느", "source": "essay"}, {"id": "essay_468_2556a6096b", "text": "-\n\n## 지금 이 순간이 나다\n\n그러면 나는 무엇인가?\n\n지금 이 순간, 의자에 닿는 느낌이 있다. 지나가는 차 소리가 들린다. 바깥 풍경이 보인다. 안에서 올라오는 생각들, 느낌들, 감정들. 이 총합이 나다. 여기서 어느 것 하나를 뺀 나가 있을 수 있는가. 이것들을 전부 제외한 독립적인 나가 따로 있는가.\n\n없다.\n\n**지금 보이는 것, 들리는 것, 느껴지는 것, 안에서 올라오는 것 — 이 전체가 나다.** 찰나찰나 드러나는 이 나로서 있는 것이 정말 나로 있는 것이다.\n\n그런데 우리는 어떤 고정된 나, 픽스된 나를 찾으려 한다. 인도를 가고 히말라야를 가고 막 돌아다녀도 절대 찾을 수가 없다. 인도에서 찾았다고 해도 한국에 돌아오면 여기 있는 나로 확 바뀌어버린다. 그런 픽스된 나는 세상에 찾으려야 찾을 수 없다.\n\n지금 여기를 떠난 나는 없기 때문이다.\n\n---\n\n## 나의 바운더리를 어디까지로 볼 것인가\n\n보통 우리는 이 몸 안에만 나라고 생각한다. 그리고 바깥은 나 아닌 것이라고 생각한다.\n\n그런데 바깥에 보이는 것도 나를 구성한다고 한다면, 바깥에 들리는 소리도 나를 구성한다고 한다면, **나의 바운더리를 어디까지 한정 지을 수 있는가.** 경계를 나눌 수가 없다.\n\n사장님이 말을 한다. 그 목소리가 내 안에서 들린다. 그게 나를 구성하고 있다. 사장님이 말을 한 것이 내 안에서 나로 이루어진다. 그걸 내가 밀어내지 않", "source": "essay"}, {"id": "essay_469_7994578c43", "text": "계를 나눌 수가 없다.\n\n사장님이 말을 한다. 그 목소리가 내 안에서 들린다. 그게 나를 구성하고 있다. 사장님이 말을 한 것이 내 안에서 나로 이루어진다. 그걸 내가 밀어내지 않으면, 지금 이 순간에 내가 온전히 존재하는 것이다. 그게 **정말로 나로 존재하는 것이다.**\n\n여기서 선사 임제의 말이 나온다. **수처작주 입처개진(隨處作主 立處皆眞).** 내가 있는 곳마다 내가 주인이다. 그 상황을 밀어내지 않고 온전히 받아들일 때, 그 자리에서 내가 주인이 된다. 나보다 높고 낮음의 문제가 아니다. 그게 다 나이기 때문이다.\n\n---\n\n## 가면과 역동적인 나\n\n그러면 사회에서 나를 설명할 때는 어떻게 하는가. 이름, 나이, 직업, 역할 — 이것들이 나인가.\n\n이것들은 **페르소나(persona), 가면**이다. 사회적인 역할로서의 나다. 딸이 있으니까 아빠가 되고, 아내가 있으니까 남편이 된다. 이게 연기적인 관계다. 관계 맺기 위해서 서로가 가면을 쓰고 서로에 맞는 역할을 하며 살아가는 것이다.\n\n문제는 이 역할을 **정체성으로 고정시켜버리는 것**이다. 학교에서 교장이면 집에 와서도 교장 노릇을 하려 한다. 정치인은 어디 가서도 장관이다. 인플루언서는 가족한테도 인플루언서 짓을 한다. 그 가면이 자기인 줄 알아버리는 것이다.\n\n그런데 나는 역동적으로 변한다. 매 순간 찰나찰나. 구름이 자기 정체성을 세우지 않기 때문에 하늘과", "source": "essay"}, {"id": "essay_470_d11a99a08e", "text": "가족한테도 인플루언서 짓을 한다. 그 가면이 자기인 줄 알아버리는 것이다.\n\n그런데 나는 역동적으로 변한다. 매 순간 찰나찰나. 구름이 자기 정체성을 세우지 않기 때문에 하늘과 섞이고 어디든 갈 수 있듯이, **고정시킬 수 없는 것을 고정시키려 하기 때문에 괴롭다.** 강물을 손으로 붙잡으면 강물이 아니듯이.\n\n나라는 것에 무아(無我)라는 말을 쓴다. 내가 없다는 게 아니다. **고정시킬 수 없다는 것이다.** 불교에서 말하는 무아는 찰나찰나 역동적으로 드러나는 나를 말하는 것이다.\n\n---\n\n## 통으로 존재하는 나\n\n내가 이 육체만을 나라고 여기면, 나를 컵 하나에 가두는 것이다. 컵에 담을 수 있는 것은 한정되어 있다. 그런데 내가 통으로 존재하는 나로 본다면, 가능성이 360도로 열린다.\n\n이게 제한된 나인 거다. 내가 부족하다는 전제 하에서의 나다. 지식이 부족하고, 실력이 부족하고, 배움이 모자라고 — 그건 한정된 부분의 나다. **통으로 존재하는 나는 그보다 훨씬 넓다.**\n\n지금 이 세상이 나를 구성한다면, 이 세상과 내가 둘이 아니다. 그러면 이 세상을 어떻게 하겠는가. 사랑할 수밖에 없다. 나머지 나 아닌 것들이 전부 내 적이 되고 투쟁이 일어나는 건, 내 스스로 이 조그마한 육신에 나를 가두어버리고 세상과 분리시켜버렸기 때문이다.\n\n그렇게 통으로 보면, 직장에서도 새로운 관점이 열린다. 나리님이나 동료를 뺀 독립", "source": "essay"}, {"id": "essay_471_6d4fba78b7", "text": "일어나는 건, 내 스스로 이 조그마한 육신에 나를 가두어버리고 세상과 분리시켜버렸기 때문이다.\n\n그렇게 통으로 보면, 직장에서도 새로운 관점이 열린다. 나리님이나 동료를 뺀 독립적인 내가 직장에 있을 수 있는가. 서로가 둘이 아니게 되면, 그 사람이 행복해야 내가 행복해진다는 걸 아는 것이다. 이게 **진정한 리더십이다.** 사장만이 발휘하는 리더십이 아니다. 직원으로서도 얼마든지 발휘할 수 있다. 거기가 내 바운더리이기 때문이다.\n\n---\n\n## 지금 여기는 움직이지 않는다\n\n인플루언서를 생각하든, 과거의 일을 떠올리든, 미래를 걱정하든 — 그 모든 것을 지금 여기서 하고 있다. 지금 여기를 벗어날 수가 없다.\n\n**지금 여기는 움직이지 않는다.**\n\n파도만 보면 막 역동적이고 정신이 없다. 그런데 그게 바다라고 보면 바다는 한 번도 움직인 적이 없다. 그게 평온이다. 역동적인 평온이다. 어디에도 매이지 않기 때문에 흔들리지 않는 것이다.\n\n사람들이 지금 여기 있으려고 명상을 하고 별짓을 다 한다. 그런데 지금 여기를 벗어날 래야 벗어날 수 없다. 물속에 있는 물고기가 물을 찾아다니는 것과 같다. 물을 벗어난 물고기가 어떻게 있겠는가. 이미 지금 여기에 있다. 항상 여기에 있었다.\n\n---\n\n## 생각은 컵 하나도 들 수 없다\n\n생각으로 나를 바꾸려 한다. 생각으로 이 상황을 어떻게 해보려 한다. 그런데 **생각으로는 컵 하나도", "source": "essay"}, {"id": "essay_472_21713bdfe0", "text": "있다. 항상 여기에 있었다.\n\n---\n\n## 생각은 컵 하나도 들 수 없다\n\n생각으로 나를 바꾸려 한다. 생각으로 이 상황을 어떻게 해보려 한다. 그런데 **생각으로는 컵 하나도 들 수 없다.**\n\n안 된다는 생각이 자꾸 든다고 말한다. 그러면 그 안 된다는 것이 뭔가. 안 된다는 생각 아닌가. 생각이 고정됨으로부터 풀려나는 건 생각을 하지 말라는 게 아니다. 그 생각이 생각임을 알아가는 것이다. 있는 그대로 이것이다. 안 된다는 생각이 있을 뿐인 것이다.\n\n칼 로저스는 인간을 석양이라고 바라봤다. 저 빨간 부분은 없애고 이 부분을 조정해야 아름답겠다고 생각하지 않듯이, 그냥 석양을 바라보고 행복감을 느낀다는 것이다. 사람은 충분한 믿음과 사랑을 주면 알아서 좋은 방향으로 나아가게 되어 있다, 그 자신으로 존재하게 하면 — 이것이 로저스의 생각이다.\n\n있는 그대로를 인정해주는 것. 개조하고 개선하고 다듬어야 된다고 생각했던 것을 내려놓고, **너 자체로 존재할 때 제일 좋게 살 수 있다**는 것. 수치심도, 충동도, 안 좋다고 생각하는 감정까지도 다 받아들이는 것. 그게 수행적인 마인드가 장착된 것이다.\n\n---\n\n## 관점을 바꾸면 세상이 달라진다\n\n싫고 짜증나고 없어졌으면 좋겠다는 생각이 올라올 때, 그 생각이 없다면 지금 어떤 상태인가. 그 상황이 문제가 아니라, 그 상황을 바라보는 나의 해석이 문제다.\n\n물론 옆에서 누가 치면", "source": "essay"}, {"id": "essay_473_142c97b100", "text": "짜증나고 없어졌으면 좋겠다는 생각이 올라올 때, 그 생각이 없다면 지금 어떤 상태인가. 그 상황이 문제가 아니라, 그 상황을 바라보는 나의 해석이 문제다.\n\n물론 옆에서 누가 치면 불편하다. 그건 정확한 것이다. 그런데 막 신경질을 부리고 초벌리는 게 아니라, 그 감정을 처리해주고 나면 이 사람이 왜 그런지 의도를 물어볼 수 있다. 어떻게 하면 우리가 평화롭게 지낼 수 있는지 물어볼 수 있다. **훨씬 현명한 선택**이 가능해진다.\n\n그게 객관적으로 보는 게 아니다. 어떻게 봐도 주관이다. 객관적으로 보려는 것도 억지고 애쓰는 것이다. 그것도 또 힘들어진다. 완전히 주관적으로 보되, 그 주관에 생각의 꼬리표를 덕지덕지 붙이지 않는 것이다.\n\n---\n\n## 자유의지와 진정한 자유\n\n자유의지가 있다 없다를 논하기 전에, 자유라는 것 자체를 다시 봐야 한다.\n\n자유롭다는 것은 자유롭지 않음을 전제로 한다. 자유롭다 아니다, 이 이분법을 떠나 있는 것이 **진정한 자유**다. 내 마음대로 하는 게 자유라고 생각하지만, 그게 아니다.\n\n수동이냐 능동이냐를 따지기 이전에, 그 수동과 능동의 주체인 나가 무엇인지를 먼저 봐야 한다. 주체가 무엇으로 이루어져 있는가. 그게 분명해지지 않으면 수동이니 능동이니 자유의지니 하는 것들이 다 허공에 떠 있는 얘기가 된다.\n\n그러니까 환경이 맞지 않아서 다른 환경으로 떠나는 것도 자유로운 것이다. 이 환경도", "source": "essay"}, {"id": "essay_474_9153b34438", "text": "분명해지지 않으면 수동이니 능동이니 자유의지니 하는 것들이 다 허공에 떠 있는 얘기가 된다.\n\n그러니까 환경이 맞지 않아서 다른 환경으로 떠나는 것도 자유로운 것이다. 이 환경도 나고 저 환경도 나이기 때문에. 배고프면 밥 먹고, 졸리면 자고, 여기 있으면 불편하면 부산도 가는 것과 똑같다. **다 나이기 때문에 오히려 더 자유롭게 움직일 수 있다.** 구름이 자기를 고집하지 않기 때문에 하늘 어디든 갈 수 있는 것처럼.\n\n---\n\n## 창조성은 확장된 나에서 온다\n\n자연을 보면 봄마다 꽃이 피고 새잎이 돋는다. 누가 그걸 설계하겠는가. 자연 자체가 창조성의 원천이다.\n\n창조적인 인간이 되려면 내가 알고 있는 것, 기억하고 있는 것의 테두리를 뛰어넘어야 한다. 그런데 내가 이 세상과 둘이 아니라면, 내가 확장될 때 새로운 것이 나온다. 매 순간 새로운 눈으로 새롭게 봐지게 된다.\n\n고정된 지식의 창고 안에서 답을 찾으려 하면, 담을 수 있는 것이 한정된다. 컵을 나라고 여기면 컵 안에만 담긴다. 그런데 통으로 본다면, 그 경계가 사라진다. 그래서 나오는 것이다. 생각해두지 않았는데 나오고, 계획하지 않았는데 흘러나온다. 이게 창조다.\n\n---\n\n## AI 시대에 필요한 것 — 의심하는 능력\n\nAI가 그럴듯한 말을 한다. 학자들도 그럴듯한 말을 쓴다. 그런데 AI의 할루시네이션이 AI만 있는 게 아니다. 잘못된 전제로부터 도출한 이론", "source": "essay"}, {"id": "essay_475_14174962b8", "text": "시대에 필요한 것 — 의심하는 능력\n\nAI가 그럴듯한 말을 한다. 학자들도 그럴듯한 말을 쓴다. 그런데 AI의 할루시네이션이 AI만 있는 게 아니다. 잘못된 전제로부터 도출한 이론을 그냥 받아들이면, 그게 다 잘못된 전제 위에 쌓인 것이다.\n\n**'똑딱이'처럼 그냥 받아들이면 안 된다.** 유명한 사람이 썼다고, 교수라는 사람이 썼다고 그냥 받아들이는 것은 공부가 아니다. 이게 맞나? 이 전제가 사실인가? 이걸 의심하고 깊이 사고해보는 것이 진짜 공부다.\n\n아빠한테 계속 반문하는 것이 아빠 말이 틀렸으면 해서가 아니다. 맞았으면 좋겠기 때문에 확인하는 것이다. 이 부분도 반박이 가능하네, 가능하네, 가능하네 — 이런 질문들을 다 통과하고 나서야 진짜 사실로 판명이 나는 거다. 그게 납득이다. 그게 AI 시대에 더욱 필요한 능력이다.\n\n---\n\n지금 내가 한정된 육신에 갇혀 살아왔는데 그게 아니라는 걸 안다면, 이건 **천지가 뒤바뀔 정도의 혁신**이다. 한번 믿어봐라. 손해 보는 셈 치고 한번 살아봐라.\n\n#온전한나 #수처작주 #지금여기 #페르소나 #인지부조화\n\n--- (구분선)\n\n[파일명: 올셀프_CEO코칭_나무뿌리_수필.md]\n\n### **올셀프_CEO코칭_나무의뿌리_수필**\n\n#### **삼각형을 뒤집어야 한다**\n\n보통은 삼각형을 그리고 단계적으로 올라간다고 생각한다. 그건 겉으로 보는 거다. CEO 입장에서 보면 **삼각형을", "source": "essay"}, {"id": "essay_476_a0e1e823fe", "text": "칭_나무의뿌리_수필**\n\n#### **삼각형을 뒤집어야 한다**\n\n보통은 삼각형을 그리고 단계적으로 올라간다고 생각한다. 그건 겉으로 보는 거다. CEO 입장에서 보면 **삼각형을 뒤집어야 한다.** 그러면 꼭짓점을 중심으로 해서 밑으로 빠져나가는 게 영성인데, 영성이 **미션과 비전** 이다. 이것은 CEO의 내면에 있는 거다. 내면의 뿌리. 말하자면 **사람의 뿌리** 다. 식물이 참 묘한 게, 가지를 보면 뿌리를 알 수 있고, 뿌리를 보면 가지가 어떻게 뻗어 나가는지 알 수 있다. 비슷하게 형성이 된다. 그러니까 이 사람의 **비전과 미션이 내면에서 자리를 잡고 있어야 한다.**\n\n#### **미션은 존재 이유다**\n\n비전이 방향성이라면, **미션은 존재 이유다.** 그 회사의 존재 이유. 우리가 왜 존재해야 되는가. 지금 많은 기업들이 흔들리는 이유는 **존재 이유가 돈이기 때문이다.** 돈만 보고 쫓아간다. 돈은 여기서 나왔다가 저기서 나왔다가 한다. 돈만 보고 우왕좌왕 쫓아가다 보니까 방향성을 잃어버린다. 그러니까 **이 회사가 왜 존재해야 되는지, 왜 이 회사를 운영해야 되는지에 대해서 정확한 미션이 있어야 한다.** 그 미션이 있어야 힘든 것도 이겨낼 수 있고, 꾸준히 할 수 있다. 그 미션을 직원들한테 심어주면 직원들도 동기부여가 된다. 사장이 자기 안에 장착된 비전과 미션을 **뿌리에서부터 계속 이파리로 공급해줘야", "source": "essay"}, {"id": "essay_477_0283df9210", "text": "이겨낼 수 있고, 꾸준히 할 수 있다. 그 미션을 직원들한테 심어주면 직원들도 동기부여가 된다. 사장이 자기 안에 장착된 비전과 미션을 **뿌리에서부터 계속 이파리로 공급해줘야 한다.** 뿌리에서 그게 올라가지 않으면 **이파리들이 시들어버린다.** 이파리가 잘못되면 '야, 니가 잘못했다. 이파리 잘라버려. 새로운 이파리 붙여' 이러면 안 된다. 자기가 뿌리에서부터 미션과 비전을 끌어올려서 이파리를 공급 못 해주는 건 생각 안 하고 이파리만 잘못했다고 나무라는 거다.\n\n#### **올셀프가 기본 베이스다**\n\n올셀프는 뿌리와 이파리와 가지가 전부 다 올셀프다. 하나의 나무다. **올셀프가 기본 베이스가 돼야 한다.** 올셀프 개념으로 CEO가 직원들을 나랑 둘이 아닌 것으로 본다면 — 내 직원들을 올셀프 개념으로 나랑 둘이 아니게 본다면 **회사가 어떻게 망하겠는가.** '저건 나랑 관계없는 놈이다. 필요 없으면 잘라' 이렇게 생각하니까 안 되는 거다. 그걸 지켜보는 나머지 직원들이 있다. 회사에 마음을 좋게 내주는 사람이 많아야 회사가 잘 된다. 내가 마음을 어떻게 먹느냐에 따라서 같은 일을 해도 마음 내서 하는 거와 마지못해 하는 거가 다르다. 그게 CEO의 마인드다. 나갈 때도 마찬가지다. 들어올 때 환영 파티를 열어주듯이, **나갈 때도 후하게 해서 축하 파티를 보내야 한다.** 그러면 나머지 사람들도 '나도 나갈 때 저렇게", "source": "essay"}, {"id": "essay_478_1fe16573b5", "text": "EO의 마인드다. 나갈 때도 마찬가지다. 들어올 때 환영 파티를 열어주듯이, **나갈 때도 후하게 해서 축하 파티를 보내야 한다.** 그러면 나머지 사람들도 '나도 나갈 때 저렇게 후하게 대접받겠구나' 하는 마음이 생겨서 열심히 하게 된다.\n\n#### **기업은 생태계다**\n\n올셀프가 확장되면 **환경까지 포함된다.** 나무가 성장하는 데 나무만 잘 성장하는 게 있는가. 토양과 주위 환경이 건강해져야 한다. 산성비 속에서는 나무가 아무리 성장하려 해도 안 된다. 그러니까 **전체적인 시각을 갖게끔 CEO들을 코칭하는 게 가장 본질적인 일이다.** 기업 하나를 살리는 것은 그 밑에 딸린 직원들과 그 식구들까지 살리는 일이다. **사회적인 손실이 너무 크다.** 라이프 코칭보다 CEO 코칭이 훨씬 더 중요할 수도 있다. 대기업은 이미 숲이다. 기업 생태계가 이루어져 있다. 각각 나무에 일관성이 있어야 되지만, 그 나무들과 조화를 이루는 전체 생태계에 대한 일관성도 있어야 한다. 그 일관성이란 다른 게 아니다. **서로 잘 사는 거다.** 그게 올셀프다. **같이 상생하고, 상대가 잘 돼야 나도 좋은 거고, 나도 잘 되는 거다.**\n\n#### **수행에서 문리가 터진다**\n\n이런 것들을 어떻게 아는가. 경영 책도 보고 공부도 열심히 한다. 그런데 기본적으로 **수행을 해놓으면 문리가 터진다.** 책 내용도 없지만 그렇게 터지면 이런 걸 보", "source": "essay"}, {"id": "essay_479_b58d252b90", "text": "터진다**\n\n이런 것들을 어떻게 아는가. 경영 책도 보고 공부도 열심히 한다. 그런데 기본적으로 **수행을 해놓으면 문리가 터진다.** 책 내용도 없지만 그렇게 터지면 이런 걸 보고도 다 찾아서 꿰어 맞춰지는 거다. 비전과 사명이 따로따로 놀면 안 된다. **비전과 사명이 합치될 때 강력한 에너지로서 영향력이 발휘된다.** 그러니까 이제 코칭도 있고, 교육도 있고, 명상도 있지만 — 원천이 되는 것은 올셀프. 그 판 안에 사람들이 들어오게 되면 된다. #올셀프 #CEO코칭 #미션비전 #나무의뿌리 #기업생태계 #온나코칭\n\n**--- (구분선)**\n\n[파일명: 올셀프_검열자_상황과하나되기_수필.md]\n\n### **올셀프_검열자_상황과하나되기_수필**\n\n#### **올셀프를 하는 와중에 검열자가 나온다**\n\n올셀프를 하는데 미세하게 자기의 상황을 조종하려는 마음이 생긴다. '이랬으면 좋겠는데.' '잡념이나 이런 게 없이 깨끗했으면 좋겠는데.' 뭔가 성가심이 없는 편안한 상태를 바라는 거다. 올셀프를 하는 과정에 그것이 슬그머니 올라온다. 그러니까 그 마음마저도, 그 목소리마저도 딱 **검열자** 가 있다. 올셀프를 하는 와중에 자기검열하는 검열자가 있어서, '이게 이렇게 바뀌어야 되는 거 아닌가', '왜 올셀프를 하는데도 이런 꿈이 나오지', '깨어 있을 때도 이런 생각이 나오지' 하는 마음이 든다. 이런 마음이 들 때도 그 마음을 알아차", "source": "essay"}, {"id": "essay_480_41adfc3787", "text": "이렇게 바뀌어야 되는 거 아닌가', '왜 올셀프를 하는데도 이런 꿈이 나오지', '깨어 있을 때도 이런 생각이 나오지' 하는 마음이 든다. 이런 마음이 들 때도 그 마음을 알아차려줘야 한다. **그 마음까지도 내려놔야 한다.** 왜냐하면, 그거는 있는 그대로가 아니고, 에고가 바라는 어떤 상태의 올셀프를 함으로 인해서 뭔가를 또 추구하는 거다. '올셀프를 하면 이렇게 돼야 돼' 하는 추구심이 또 생기는 거다. 그 추구심을 없애줘야 한다. 그 마음에 끌려가서 어떤 상태를 바라면 안 된다는 거다. '이것도 그냥 올셀프에서 올라오는 거구나' 하고 다 수용해야 한다. **내용이 중요한 게 아니다.** 지금 뭔가 생각이 올라왔다는 게 중요한 거다. 내용에 빨려 들어가면 안 된다.\n\n#### **상황과 내가 하나다**\n\n'나'라는 게 어떤 생각, 감정이나 그런 것들이 그때그때 올라오는 것들의 집합체가 아니다. 나는 그것을 포함한 이 상황까지도, 내가 인지하는 상황까지도 전부 나다. 그게 올셀프다. **상황이 벌어지는 배경까지도 다 나다.** 보이는 반경이 다 나고, 들리는 소리도 다 나고. 내 안에서 소리가 들리는 거다. 상황 따로, 내가 따로 존재하지 않는다. 그런데 상황과 동떨어진 나이기를 바라면 안 된다. '이 상황이 마음에 안 들어. 이 상황을 벗어난 나이기를 바란다.' 이거는 지금 상황 속에 있음에도 불구하고 그것을 벗어난 나를 바라", "source": "essay"}, {"id": "essay_481_0dd11f19a3", "text": "데 상황과 동떨어진 나이기를 바라면 안 된다. '이 상황이 마음에 안 들어. 이 상황을 벗어난 나이기를 바란다.' 이거는 지금 상황 속에 있음에도 불구하고 그것을 벗어난 나를 바라는 마음이다. **그거는 가상의 나다.** 온전하게 지금 이 상황과 내가 하나라는 것을 받아들일 때, 어떤 생각이나 감정에 휘둘리는 나를 넘어설 수 있다. 그래서 온전한 나로 지금 여기에 살 수 있다. 상황이라는 거는 지금 여기잖아. 내가 상황에서 떨어질래야 떨어질 수 없다. 내가 다른 데 가도 역시 상황과 나는 둘이 아니다. 그게 통으로 사는 거다. 온통으로.\n\n#### **실질적 어려움과 확대 해석은 다르다**\n\n그렇다고 지금 상황을 만족하게 그냥 살으라는 게 아니다. 다른 상황으로 옮길 수도 있다. 어쨌든 이 배경과 이 나는 둘이 아니라는 거다. 실질적인 어려움이 있다면 방법을 찾아 상황을 바꿔야 한다. 불이 났으면 피해야 하고, 냄새가 나면 방을 치워야 한다. 회사가 너무 힘들면 다른 방법을 찾아야 한다. 그런 것까지 아무렇지 않다는 게 아니다. 하지만 **아직 오지 않은 걱정, 과거의 기억, 상황과 관련 없는 두려움을 지금 이 상황에 투사하는 것은 다르다.** 상황을 확대 해석해서 미리 예단하거나 불안해할 필요가 없다는 거다. 그거는 내가 지금 온전하게 여기에 존재하지 않는다는 거다. 상황과 내가 하나가 되지 않았다는 거다. 미래에 가 있는 생각,", "source": "essay"}, {"id": "essay_482_f2cff187ba", "text": "해석해서 미리 예단하거나 불안해할 필요가 없다는 거다. 그거는 내가 지금 온전하게 여기에 존재하지 않는다는 거다. 상황과 내가 하나가 되지 않았다는 거다. 미래에 가 있는 생각, 상황에서 벗어난 생각 — 그게 옳지 않다는 게 아니다. 그게 에너지를 빼앗아 간다는 거다.\n\n#### **상황을 수용할 때 방법이 나온다**\n\n내가 처한 환경과 상황이 온전히 다 나다. 그걸 온전히 수용할 때에 거기서 새로운 방법이 발견될 수 있다. 상황을 바꾸고 싶으면 바꾸려는 힘도 거기서 나온다. 확대 해석하면서 두려움이나 불안 쪽으로 에너지가 뺏긴다. 지금 이 상황에 머물면 **에너지가 온전히 이 상황을 바꾸거나 방법을 찾는 데 쓰인다.** 상황이 마음에 안 들면, 생각만 옮겨가는 게 아니라 내가 옮겨가야 한다. 몸이나 이런 것들이 다 옮겨가야 한다는 거다. #올셀프 #검열자 #추구심 #상황수용 #지금여기 #에너지\n\n**--- (구분선)**\n\n[파일명: 올셀프_관계수용_수필.md]\n\n### **올셀프_관계수용_수필**\n\n#### **상대방도 올셀프다**\n\n올셀프(All-Self)를 말할 때, 나는 주로 내 안에서 올라오는 것들을 이야기해왔다. 생각이 올라오건, 느낌이 올라오건, 감정이 올라오건 그것은 전부 올셀프다. 내 주변에서 들려오는 소음이 됐건, 보이는 것이 됐건, 냄새 맡아지는 것이 됐건 그것 역시 올셀프다. 내용물이 무엇이든 그것은 교체될 수", "source": "essay"}, {"id": "essay_483_d2fbe5fec4", "text": "감정이 올라오건 그것은 전부 올셀프다. 내 주변에서 들려오는 소음이 됐건, 보이는 것이 됐건, 냄새 맡아지는 것이 됐건 그것 역시 올셀프다. 내용물이 무엇이든 그것은 교체될 수 있는 내용물일 뿐이고, 올라왔다는 사실 자체가 진실이다. 그런데 여기서 한 걸음 더 나아가야 할 지점이 있다. **상대방 사람도 그렇다** 는 것이다. 사람이 나한테 어떤 얘기를 하건, 그것도 역시 내용물보다 사람이 얘기하고 있다는 그것, 그것도 올셀프여야 된다. 상대방의 뜻이 나하고 맞으면 동의가 되고, 맞춰도 되고 안 맞춰도 되지만, 어쨌든 상대방의 표정이 됐건, 말투가 됐건, 그때 느끼는 감정이 됐건 그것은 올셀프다. 나를 둘러싼 환경과 대상이 올셀프로 확장되듯, 나와 관계 맺는 사람 역시 올셀프로 들어와야 한다. **상대방, 나를 둘러싼 환경, 이 모든 것이 다 올셀프가 돼야 진정한 올셀프가 된다.**\n\n---\n\n#### **내용물이 아니라 지금 드러나는 것**\n\n관계에서 우리는 주로 내용물을 주고받는다. 말, 주장, 의견, 설명. 그런데 그 내용물은 대부분 허구다. 사람이 사과를 얘기한다고 해서 진짜 사과가 아니다. 내가 어떤 감정을 말로 설명한다고 해서 그게 그 감정 자체가 아니다. 내용은 그렇다고 말하는 것이지, 그 자체가 아니다. \"나는 너를 사랑해\" 하면서 화를 낸다면, 오히려 그 화를 내는 것이 더 진실일 수 있다. 말로 꺼낸 사랑 고백은", "source": "essay"}, {"id": "essay_484_17bb6494f2", "text": "가 아니다. 내용은 그렇다고 말하는 것이지, 그 자체가 아니다. \"나는 너를 사랑해\" 하면서 화를 낸다면, 오히려 그 화를 내는 것이 더 진실일 수 있다. 말로 꺼낸 사랑 고백은 허구일 수 있고, 지금 이 순간 드러나고 있는 감정의 상태가 진실에 가깝다. **내용과 지금 나한테 느껴지는 현상적인 부분을 분리하는 것이 핵심 포인트다.** 지금 여기서 일어나고 있는 것, 표정, 말투, 호흡, 그때 느껴졌던 감정, 비언어적인 것들, 이것이 지금 이 사람을 가장 잘 표현하는 것이다. 사람이 과거의 문제점을 얘기할 때 그 내용은 그 사람조차도 자신의 뇌피셜일 뿐이다. 자신이 생각하는 관점에서의 상황이다. 그래서 그 내용에 어떤 솔루션을 들이밀어도 사람의 상황을 100프로 파악할 수 없으니 딱 맞는 해결책이 될 수가 없다. 중요한 것은 지금 그 사람의 상태다. 지금 내담자가 와서 말은 딴 얘기를 해도, 지금 사람이 얘기하는 말투라든가 표정, 호흡, 그때 느껴졌던 감, 이런 것에 그 사람이 고스란히 다 녹아있다. 말로 표현하지 않은 그 사람 자체가 드러나는 것이다. 그것이 나한테 읽혀지는 것이고, 그것이 올셀프다.\n\n---\n\n#### **에고가 에고를 상대하는가, 올셀프로 소통하는가**\n\n코치들 사이에서 '판단 중지', '판단 유보'라는 말을 자주 쓴다. 그런데 그것은 판단을 중지하는 게 아니다. **판단을 해도 되는데, 거기에 '나'라는 게 빠", "source": "essay"}, {"id": "essay_485_37745e1183", "text": "로 소통하는가**\n\n코치들 사이에서 '판단 중지', '판단 유보'라는 말을 자주 쓴다. 그런데 그것은 판단을 중지하는 게 아니다. **판단을 해도 되는데, 거기에 '나'라는 게 빠져버려야 된다.** 내 생각에서 '나'가 빠져버려야 한다는 것이다. 내 생각이 옳다고 하면 그것은 올셀프가 아니다. 나만이 옳다는 트루 셀프(True Self)의 개념이다. 의도에 '나'라는 게 들어가 있으니 상대방도 의도가 생기고, 거기서 충돌이 생긴다. 그러니까 타인과의 관계 맺음을 할 때도 올셀프의 개념이 들어가 줘야 한다. 핵심적인 질문은 이것이다. **에고가 에고를 상대하느냐, 올셀프의 관점으로 서로 소통하고 상호작용을 하느냐.** 이것이 관계의 질을 가르는 차이다. 코칭 프레즌스(Presence)도 결국 이것이다. 지금 여기서 일어나고 있는 것, 지금 여기서 느껴지는 것들. 오로지 지금 여기밖에 없다. 지금 여기서 일어나는 이것은 그냥 있는 그대로 진실하다.\n\n---\n\n#### **둘이 아님(不二)과 수용의 이유**\n\n나도 지금 여기서 드러나고 있고, 상대방도 드러나고, 배경도 드러나고 있다. 항시 같이 드러난다. 대상과 나는 분리될 수 없다. 나하고 얘기하고 있는 상대방도 나하고 분리가 될 수 없다. **상대방의 에고인 나랑 둘이 아니라는 게 아니다. 상대방의 지금 드러난 그것이 나랑 둘이 아니라는 것이다.** 상대방의 비언어적인 것들, 지금 이", "source": "essay"}, {"id": "essay_486_3e3f33bc35", "text": "도 나하고 분리가 될 수 없다. **상대방의 에고인 나랑 둘이 아니라는 게 아니다. 상대방의 지금 드러난 그것이 나랑 둘이 아니라는 것이다.** 상대방의 비언어적인 것들, 지금 이 순간 드러나는 표정과 감정과 태도, 그것이 나랑 둘이 아니기 때문에 내가 그것을 온전히 수용할 이유가 있다. 수용할 수도 있고 수용하지 않을 수도 있는 것이 아니라, 올셀프이기 때문에 수용해야 하는 것이다. 그것이 수용되고 서로 공명이 될 때에야 비로소 이야기는 부차적인 것이 된다. 내 생각을 상대방한테 설득하거나 강요하는 것은 그 수용이 이루어지고 난 뒤의 이야기다. 그게 되고 나서의 부차적인 것이다. 상대방의 표정이나 상대방이 얘기하는 느낌이나 이런 것도 다 올셀프를 증명한다. 그것조차도 있는 그대로 내가 느껴주는 것이 중요하다. **내용물이 오고 가는 것보다, 내용물을 조율하려 하는 것보다 지금 나한테 느껴지는 상대방의 모습이나 감정, 그것의 상호작용이 더 중요하다.** 그것이 있는 그대로 나 자신을 드러내 주고 있는 것이니까.\n\n---\n\n#### **욕구는 표현되는 것으로 이미 해소된다**\n\n수용이 이루어지면 욕구가 드러날 공간이 생긴다. 부부간에 의견 충돌로 싸우는 것은 의견을 맞추려 하다 보니 그렇게 되는 것이다. 서로 상대방의 감정이나 이런 것들은 다 무시돼 버리고 의견만 \"내 주장이 옳다\", \"니 주장이 옳다\"로 나간다. 그러면 의견 뒤에 숨", "source": "essay"}, {"id": "essay_487_7f08b71f28", "text": "의견을 맞추려 하다 보니 그렇게 되는 것이다. 서로 상대방의 감정이나 이런 것들은 다 무시돼 버리고 의견만 \"내 주장이 옳다\", \"니 주장이 옳다\"로 나간다. 그러면 의견 뒤에 숨은 욕구들은 서로 표현될 기회를 놓친다. 감추는 것이 아니라 표현될 기회를 놓치고 있는 것이다. 욕구가 나오려면, 사람의 비언어적인 것과 내가 수용이 될 때 그 공간이 생긴다. 그리고 중요한 것은 이것이다. **욕구가 표현됐다는 것은 이미 욕구 자체가 상당 부분이 해소된다.** 욕구가 눌러져 있었기 때문에 화가 발생한 것이다. 욕구의 대상이 해결되고 안 되고는 사실 그 사람 스스로도 부차적인 것이다. 지금 자기가 욕구가 있는데, 욕구를 통해서 화가 났는데, 왜 그걸 몰라주냐, 바로 그것이다. 그것만 알아줘도 상당 부분이 해소된다. 오은영 박사나 정혜신 씨 같은 사람들이 \"당신이 옳다\"고 하는데, 거기서 한 가지 착각을 하면 안 된다. 내용이 옳다고 생각하면 안 된다는 것이다. \"응, 맞아 니 말이 다 옳아\"가 되면 안 된다. 그것은 옳다 그르다가 아니다. 지금 화가 났다는 그 사실, 그 상태가 **진실** 이라는 것이다. 지금 화를 내고 있으니까 그것은 팩트다. 내용물이 옳은 것이 아니라, 지금 드러나고 있는 상태가 진실한 것이다. 그것을 수용하는 것이다.\n\n---\n\n#### **얘기가 오고 가는 그 안에서도**\n\n얘기가 당연히 오고 갈 것이다. 거기서 오고", "source": "essay"}, {"id": "essay_488_39d68796d6", "text": "아니라, 지금 드러나고 있는 상태가 진실한 것이다. 그것을 수용하는 것이다.\n\n---\n\n#### **얘기가 오고 가는 그 안에서도**\n\n얘기가 당연히 오고 갈 것이다. 거기서 오고 가는 얘기까지도 어떤 진실에 가까워지려면, 거기에 '나'가 빠져야 된다. 내용에 \"내 생각이 옳아\", \"니 생각은 어떻고\" 하면 서로 허구의 '나'가 들어가 버린다. 그러면 왜곡이 생긴다. 이미 얘기에는 그것이 전제가 돼 있다. 내가 어떻다 저떻다 얘기를 할 때는 \"이거는 내 생각이야\"라는 것이 들어있다. 그래서 얘기에서도 그것을 볼 수 있어야 한다. 이 사람 얘기에서 어떤 내용이 그 사람의 에고에서 나오는 얘기인지 아닌지도 살펴야 한다. 상대방이 에고로 얘기하고 있다면, 거기서도 '나'라는 것을 한번 분리해볼 수 있도록 해야 한다. 그리고 다시 자꾸 지금 여기의 상황으로 오게끔 질문을 해준다. \"지금 얘기를 하면서 느낌이 어떠세요?\", \"어떤 감정이 드세요?\" 그 얘기를 통해서 얻고 싶은 게 무엇인지 욕구를 끄집어내 주거나, 그 사람이 에고를 제3자의 관점으로 객관적으로 들여다볼 수 있게 질문을 던져주는 것, 이런 포인트를 잡아가는 것이 필요해진다. 이것은 올셀프가 어느 정도 파악됐을 때의 이야기다. 관계에서의 올셀프까지 가려면, 이미 나 개인적인 올셀프에 숙달이 되고, 현상이나 대상적인 것에 올셀프까지 확장된 상태에서 오는 것이다. 내가 불안하거나 화가", "source": "essay"}, {"id": "essay_489_f42199d8dd", "text": "악됐을 때의 이야기다. 관계에서의 올셀프까지 가려면, 이미 나 개인적인 올셀프에 숙달이 되고, 현상이나 대상적인 것에 올셀프까지 확장된 상태에서 오는 것이다. 내가 불안하거나 화가 나거나 이러면 다 내 안에서 올라오는 것이니까, 그것을 거부하려 하면 안 된다. 온 세상이 다 하나라고 본다면, 내가 뭐가 올라왔다면 그것도 다 그 자리에서 올라온 것이다. 그것을 \"이런 건 찌질해서 싫어\", \"이런 화나는 모습은 싫어\" 하고 회피하면, 그것은 온전한 것을 거부하는 것이다. 나 자신을, 그것을 거부하는 것이다. **상대방도, 나를 둘러싼 환경도, 지금 이 순간 드러나고 있는 모든 것이 다 올셀프다. 그것이 수용될 때 비로소 진짜 대화가 시작된다.** #올셀프 #수용 #관계 #코칭 #에고\n\n**--- (구분선)**\n\n[파일명: 올셀프_목적지_부처님손바닥_수필.md]\n\n### **올셀프_목적지_부처님손바닥_수필**\n\n#### **이렇게 편안하게 살아도 되나**\n\n올셀프라는 걸 자꾸 인식하니까 생각에 대한 집착이나 부담이 적어지면서 마음이 편해진다. 그런데 그러다 보면 이런 생각이 불쑥 올라온다. '어머, 이렇게 아무 생각 없이 편안하게 살아도 되나?' 생각을 하나 안 하나 살아가는 거는 큰 차이가 없다. 생각을 써야 되는 건 목적을 정할 때다. 서울을 가야 된다. 그러면 서울을 가야 된다는 걸 잊으면 안 된다. 그럴 때 생각을 쓰면 된다. 서울", "source": "essay"}, {"id": "essay_490_40ae8c666c", "text": "하나 살아가는 거는 큰 차이가 없다. 생각을 써야 되는 건 목적을 정할 때다. 서울을 가야 된다. 그러면 서울을 가야 된다는 걸 잊으면 안 된다. 그럴 때 생각을 쓰면 된다. 서울까지 가는 것은 그냥 알아서 빨간불이면 서고, 파란불에 가고 — 다 자동적으로 된다. 차를 몰고 가면서 잡생각을 하건, 한눈을 팔건 어쨌든 간다. 차가 움직여서, 몸이 알아서 간다. '내가 이걸 지금 제대로 가고 있나' 하고 매 순간 의심할 필요가 없다. 가끔 확인하면 된다. '내가 지금 목적지를 바로 가고 있나?' 그럴 때 생각을 쓰면 된다.\n\n#### **목적과 목표는 다르다**\n\n목적이라는 거는 내가 가야 되는 이유, 해야 되는 이유다. **목표는 거기까지 가기 위해서 어떤 경로로 갈 것인가 이정표를 세우는 거다.** 목표는 변할 수 있다. 사격 훈련을 한다. 가까운 곳도 연습하고 먼 것도 연습하고 — 목표는 변한다. 그런데 사격 연습을 한다는 자체는 목적이니까 변함이 없다. 올셀프를 전하는 것도 마찬가지다. 올셀프이니까 올셀프를 전할 마음을 낼 수 있는 거다. 그게 목적이 된다. 만약 돈을 받기 위해서 한다면 올셀프가 수단이 돼버린다. 하다 보니 돈이 벌리는 것은 어쩔 수 없는 거지만, **돈을 벌기 위해서 올셀프를 한다고 본다면 올셀프 정신에 위배가 된다.**\n\n#### **목적지를 잊지 말아야 한다**\n\n올셀프가 내 목적이잖아. 내 스스로가 올셀프", "source": "essay"}, {"id": "essay_491_5b91a8893e", "text": "는 거지만, **돈을 벌기 위해서 올셀프를 한다고 본다면 올셀프 정신에 위배가 된다.**\n\n#### **목적지를 잊지 말아야 한다**\n\n올셀프가 내 목적이잖아. 내 스스로가 올셀프니까. 그걸 잊지 말아야 한다. 그걸 잊고 마음이, 생각이 딴 데로 헤매기 시작한다. '내가 지금 아무 생각도 없는데 제대로 하고 있나? 뭘 할까, 어쩔까?' 걱정도 하고. 이렇게 **목적지를 잊는 거다.** 그럴 때 다시 올셀프로 돌아와야 한다. **올셀프라는 것은 잊지 말아야 한다.** 목적지. 그런데 그거는 어디 멀리 가는 게 아니다. 늘 올셀프잖아. 노력을 해서 어딜 가야 되는 게 아니다. 명상을 해야 올셀프가 얻어지는 게 아니다. 항시 **지금 여기가 올셀프다.** 헤매지만 않으면 된다.\n\n#### **이탈해도 올셀프다 — 아무리 뛰어도 부처님 손바닥**\n\n이탈만 안 하면 그냥 올셀프다. 그런데 더욱더 좋은 소식이 있다. **이탈을 해도 올셀프다.** 벗어날 수가 없다. 올셀프를 벗어났다고 착각하고 있는 거다. 올셀프를 벗어날래야 벗어날 수가 없다. 왜? 올셀프니까. 올셀프인데 어떻게 올셀프를 벗어나겠는가. '벗어났다' 해놓고 착각을 하는 거다. **아무리 뛰어도 부처님 손바닥이라는 게 바로 이 얘기다.** 부처님 손바닥을 벗어날 수가 없다. 근데 '벗어났어. 다시 찾아야 돼' 이러면서 노력을 하고 있다는 거다. 착각에 빠져서. 그러니까 이게 굿뉴스", "source": "essay"}, {"id": "essay_492_bf8105ad5b", "text": "바닥이라는 게 바로 이 얘기다.** 부처님 손바닥을 벗어날 수가 없다. 근데 '벗어났어. 다시 찾아야 돼' 이러면서 노력을 하고 있다는 거다. 착각에 빠져서. 그러니까 이게 굿뉴스다. 깨달음을 따로 얻을 필요도 없고, 올셀프를 잃어버릴 수도 없다. 잊을 수 없는 목적지이면서, 벗어날 수 없는 경계다. #올셀프 #목적과목표 #부처님손바닥 #깨달음 #이탈 #굿뉴스\n\n**--- (구분선)**\n\n[파일명: 올셀프_본질적연결성_재료_수필.md]\n\n### **올셀프_본질적연결성_재료_수필**\n\n#### **진흙과 파도 — 재료는 같다**\n\n올셀프가 무엇인지, 왜 올셀프의 마인드를 가져야 하는지를 쉽게 얘기해보면 이렇다. 진흙이 있다. 진흙으로 당신을 만들었다. 또 진흙으로 나를 만들었다. 당신은 당신 나름대로 불순물 같은 게 묻어있을 수 있고, 나는 나름대로 묻어 있을 수 있다. 당신은 그걸 나라고 여기고, 나는 이걸 나라고 여긴다. 그런데 **진흙이라는 거는 당신도 진흙이고 나도 진흙이다.** 서로 떨어져 있는 게 아니다. 형태는 다르지. 우리가 보는 상은 다르지만 **본질은 같다. 재료가 같다.** 파도가 치는데, 파도 하나를 나라고 보고 옆에 일어나는 파도를 당신이라고 본다면 — 모양은 서로 다르다. 그런데 재료는 그냥 바닷물이라는 재료는 같다.\n\n#### **보는 속성, 듣는 속성 — 한마음**\n\n지금 이렇게 세상이 펼쳐져 있는데, 당신", "source": "essay"}, {"id": "essay_493_880f6d2cf6", "text": "이라고 본다면 — 모양은 서로 다르다. 그런데 재료는 그냥 바닷물이라는 재료는 같다.\n\n#### **보는 속성, 듣는 속성 — 한마음**\n\n지금 이렇게 세상이 펼쳐져 있는데, 당신이 본다. 보는 봄을 아는 것, 보여지는 걸 아는 그것 — 그 속성이 당신이랑 나랑 같다. 들음을 아는 것도 당신하고 나랑 같다. 당신이 듣는 속성이나 내가 듣는 속성이 서로 다른 게 아니고 **속성은 같다.** 보고 듣고 냄새 맡고 생각하고, 이걸 다 아는 그 식(識)이 있다. 식으로 더 들어가면 그거는 다 같다는 거다. 같은 재료라는 거다. 그러니까 **한마음이다.** 나눠져 있는 것 같지만 본질적으로 들어가면 한 나무다. 한 나무에서 각각의 가지에서 피어나는 당신이라는 이파리와 나라는 이파리다. 겉으로 드러나는 모습은 서로 차별이 있는 것 같지만, 경험하는 그것은 서로 분리되지 않는다.\n\n#### **중첩되는 부분이 훨씬 많다**\n\n당신도 지금 이걸 보고 있고, 나도 보고 있다. 내가 내는 소리를 당신도 듣고 나도 듣는다. 이것은 **앎이 서로 중첩되는 거다.** 서로 전혀 관계가 없다면 어떻게 같이 듣겠는가. 중첩이 될 수 있다는 것은 분리되지 않는 부분이 있다는 거다. 물론 당신 생각을 내가 알 수 없고, 내 생각을 당신도 알 수 없다. 방향은 다를 수 있다. 그런데 **본다는 것, 듣는다는 것, 생각한다는 것 — 이 본질적인 것은 서로 중첩될 수", "source": "essay"}, {"id": "essay_494_7b7bea1f70", "text": "당신 생각을 내가 알 수 없고, 내 생각을 당신도 알 수 없다. 방향은 다를 수 있다. 그런데 **본다는 것, 듣는다는 것, 생각한다는 것 — 이 본질적인 것은 서로 중첩될 수 있다.** 재료가 같기 때문이다. 재료가 서로 전혀 다른 걸로 쓰여있다면 중첩이 안 되겠지. 중첩이 안 되는 부분이 뭐냐. 당신의 생각과 나의 생각, 당신의 감정과 내 감정 — 이런 것은 중첩이 잘 안 된다. 그런데 그것이 우리 삶에 큰 부분은 아니다. 우리가 중첩되는 부분에 비하면. 우리는 이 넓은 세상을 다 같이 공유하면서 보고, 들려오는 소리를 다 같이 공유하고, 이 세상을 이렇게 만져가면서 서로 공유한다. 내가 탁자를 만지는 것과 당신이 탁자를 만지는 것이 무슨 차이가 있는가. **서로를 수용할 수 있는 부분이 굉장히 많다는 거다.**\n\n#### **올셀프는 코끼리다 — 설명은 방편일 뿐**\n\n올셀프라는 거를 받아들일 때 많은 것들이 삶에서 해결될 수 있다. '아, 너랑 나랑 본질적으로 같은 재료구나. 다르지 않구나.' 이것을 이해하면 현상 이면에 우리가 서로 분리되어 있지 않고 연결되어 있다는 것을 회복하게 되어, 서로 공유하고 소통할 수 있는 여지가 굉장히 늘어난다. 그런데 올셀프는 **경험적인 부분이다.** 우리의 본성이니까. 원리적으로 설명하는 것은 그냥 설명일 뿐이다. 한 측면으로밖에 설명할 수 없다. 코끼리를 설명할 때 코는 이렇게 생겼어,", "source": "essay"}, {"id": "essay_495_a01514f814", "text": "데 올셀프는 **경험적인 부분이다.** 우리의 본성이니까. 원리적으로 설명하는 것은 그냥 설명일 뿐이다. 한 측면으로밖에 설명할 수 없다. 코끼리를 설명할 때 코는 이렇게 생겼어, 다리는 이렇게 생겼어, 꼬리는 이렇게 생겼어 — 이렇게 한 측면만 설명할 수밖에 없다. 코끼리를 설명하려면 '자 봐, 이게 코끼리야' 하고 딱 봐야 한다. 아무리 부분적으로 설명을 마무리한들 온전한 코끼리에 대한 설명은 아니다. **코끼리가 있다는 것을 알려주는 것뿐이다.** 본인이 깨달아봐야 알게 된다. 그것을 보게끔 하는, 그쪽으로 관심을 돌리게끔 하는, 보게 하는 방편으로서 말을 하는 거다. 사실 가장 쉬운 것은 그냥 이것이다. 지금 이렇게 다 여기서 일어나고 있는 거잖아. **당신도 지금 이거고, 나도 이거잖아.** 지금 여기서 다 일어나고 있는 거잖아. 그냥 이렇게만 해버리면 된다. #올셀프 #본질적연결 #재료 #중첩 #한마음 #방편\n\n**--- (구분선)**\n\n[파일명: 올셀프_불국토_사랑의작용_수필.md]\n\n### **올셀프_불국토_사랑의작용_수필**\n\n#### **내가 잘 살면 주변이 보살이 된다**\n\n굳이 사람을 설득시켜서 보살로 만들지 않아도 된다. **내가 잘 살면 내 주변에 모든 사람들이 보살이 된다.** 내가 경험하는 것들로부터 배움을 얻어서 내가 잘 되면, 나의 경험에 동참했던 사람들 — 그게 좋은 경험이건 나쁜 경험이건 경험을 해", "source": "essay"}, {"id": "essay_496_a687d52f93", "text": "살면 내 주변에 모든 사람들이 보살이 된다.** 내가 경험하는 것들로부터 배움을 얻어서 내가 잘 되면, 나의 경험에 동참했던 사람들 — 그게 좋은 경험이건 나쁜 경험이건 경험을 해주게끔 했던 사람들이 다 보살로 화현된다. 겉으로 드러나게 된다는 거다. 대승불교에서 **불국토를 만든다는 것이 바로 이 원리다.** 한 사람이 부처가 출생하면 그 부처가 출생한 모든 세계가 다 불국토가 된다. 그 키포인트가 **나한테 있다.** 누군가 나를 도와서가 아니고, 내가 뭔가를 얻어서 세상을 바꾸는 것이 아니다. 수십만 년 된 동굴의 어둠이 촛불 하나 탁 켜면 이 순간 밝아지듯이, 그렇게 일시에 불국토가 된다. 나는 올셀프를 고민하면서 내 모든 과거를 다 긍정하게 됐다. 수십만 년 된 어둠이래도 밝아지는 것은 한순간에 탁 밝아진다.\n\n#### **깨달음을 삶에서 증거로 살아내야 한다**\n\n너무 깨우치는 것만이 중요한 게 아니다. **깨침을 내 삶에서 실현하는 게 더 중요하다.** 그게 증거로서 살아내는 것이다. 그래야 실질적인 불국토가 된다. 나만의 환상적인 불국토가 아닌. 그렇기 때문에 **내가 잘 살아야 되는 이유** 가 있다. 나만 잘 살라고 잘 살아야 되는 게 아니다. 내가 잘 사는 것이 곧 세상 사람들이 잘 살게 하는 이유가 된다. 그 사람들의 존재 이유를 내가 나로부터 증명할 수 있다. 한 생각이 탁 트이면서 행동이 바뀌고, 그러면서 이", "source": "essay"}, {"id": "essay_497_07f9a86702", "text": "다. 내가 잘 사는 것이 곧 세상 사람들이 잘 살게 하는 이유가 된다. 그 사람들의 존재 이유를 내가 나로부터 증명할 수 있다. 한 생각이 탁 트이면서 행동이 바뀌고, 그러면서 이 사회가 바뀐다. 고 한 생각을 탁 열어주는 일. 이거 내가 잘 살아야 되는 이유가 탁 나오면 이 사람들이 정말 허투루 살 수 없다. 그게 정말 **자기 사랑의 길이다.** 나를 정말 사랑하는 길이다. '사랑하세요', '러브 유어 마이셀프' — 이렇게 말로만 하면 그런가보다 하는 거지 왜 그런지를 모른다. 사랑은 말로 그렇게 얘기할 수 있는 게 아니다. 생각을 넘어선 거다. 물 한 잔 마셔. 이게 사랑이다. **말로 표현되면 그건 사랑이 아니다.**\n\n#### **존재 자체가 사랑이다**\n\n이원성이 갈라진 것 같지만, 사실은 **분리가 있다는 거는 사랑을 전제로 하는 거다.** 바람이 불고 나무가 흔들리는 것도 다 사랑의 작용이다. **존재 자체가 사랑이다.** 존재가 일으키는 작용도 사랑이다. 고정된 손이라는 것은 없다. 하지만 고정된 손이 없는 가운데 물컵도 쥐고 뭐 싸움도 하고 가르치기도 하고 온갖 작용을 다 한다. 그것도 사랑이다. 이원성을 '분리다, 악이다' 이렇게 보면 악이지만, 이원성이 갈라진 것은 근본적으로 **사랑이 내면에 있는 거다.** **성주괴공(成주壞空)** — 만들어지고, 머물고, 허물어지고, 다시 흩어진다. 있던 것이 없어진 건 아", "source": "essay"}, {"id": "essay_498_a211b72198", "text": "이지만, 이원성이 갈라진 것은 근본적으로 **사랑이 내면에 있는 거다.** **성주괴공(成주壞空)** — 만들어지고, 머물고, 허물어지고, 다시 흩어진다. 있던 것이 없어진 건 아니다. 그냥 균일하게 흩어져 있는 거다. 그것이 다시 모이고 형태를 가지고 작용한다. 그러다가 또 허물어진다. 이것도 역시 **우주적인 사랑의 표현이다.** 전체적으로 보면. 하나의 모습에 집착해서 그것만 선이고 허물어지는 것은 악이다 이렇게 보는 게 분리의 작용으로 보는 거다. #올셀프 #불국토 #보살 #사랑 #성주괴공 #깨달음의실현\n\n**--- (구분선)**\n\n[파일명: 올셀프_빈공간_굴림의원리_수필.md]\n\n### **올셀프_빈공간_굴림의원리_수필**\n\n#### **사랑이 아니라 주입이다**\n\n사랑을 한다고 하면서 내가 억지로 넣어주려고 하는 것은 사랑이 아니고 **주입** 이다. 나의 욕망을 상대에게 투사하는 거다. '내가 너를 사랑하는데 너는 왜 날 안 사랑해?' — 이건 주입이다. **사랑과 욕구를 잘 구분할 줄 알아야 한다.** 코칭도 마찬가지다. 내가 고객한테 뭘 주입하고 가르쳐주려 하면 그게 코칭이 안 된다. **셀프1의 목소리를 잠재우면 침묵이 생긴다.** 고요가 생긴다. 그러면 고요의 압력 차이 때문에 **지혜가 딱 이리로 끌려 들어온다.** 거기서 지혜가 발생한다.\n\n#### **끌어당김의 법칙을 뒤집는다**\n\n돈을 어떻게 벌지? — 이", "source": "essay"}, {"id": "essay_499_ac0cb91d50", "text": "생긴다. 그러면 고요의 압력 차이 때문에 **지혜가 딱 이리로 끌려 들어온다.** 거기서 지혜가 발생한다.\n\n#### **끌어당김의 법칙을 뒤집는다**\n\n돈을 어떻게 벌지? — 이건 셀프1의 방법이다. 내가 이 돈을 어디에 써야 될지, 돈이 필요한 용처를 먼저 찾는 거다. **빈 공간을 먼저 만드는 거다.** 그러면 돈이 빈 공간으로 끌려 들어온다. 지금 끌어당김의 법칙은 외부에 있는 것을 내 것으로 당기려 한다. 하지만 내가 빈 공간을 만들어서 돈이 그리로 움직이게 하는 것 — 이게 오히려 더 끌어당김의 법칙에 맞는 거다. 예를 들어서 내가 많은 사람한테 올셀프를 가르쳐주는 선원을 차려야겠다는 마음을 낸다. 그러면 선원이 지금 없다. 써야 될 때가 생긴 거 아닌가. **빈 공간을 내가 만든 거다.** 이렇게 원을 세우면 돈이 그렇게 딸려 들어온다. '돈 벌면 뭐를 할 거다'가 아니다. '이걸 해야 되는데 돈이 필요하다' — 이래야 돈이 끌려 들어온다. '돈을 벌면 꼭 선원을 차려야지' 이러면 선원은 평생 못 차린다. 방향이 반대다. 빚을 갚기 위해서 돈을 벌려고 하면 안 된다. 그거 채우려고 하는 거니까. **원만히 잘 돌아가는 원(願)이어야 한다.** 원만하게 돌아가서 원이다. 대행 스님이 **공용공식(公用公食)** — 다 같이 쓰이는 쪽으로 — 이렇게 얘기했다. **굴리는 데에 필요한 에너지로 쓰여야 한다.** 이걸 가두겠다고", "source": "essay"}, {"id": "essay_500_765af83680", "text": "만하게 돌아가서 원이다. 대행 스님이 **공용공식(公用公食)** — 다 같이 쓰이는 쪽으로 — 이렇게 얘기했다. **굴리는 데에 필요한 에너지로 쓰여야 한다.** 이걸 가두겠다고 해버리면 막혀서 안 들어온다.\n\n#### **이 집은 우리 것이 아니다**\n\n이 집을 지을 때 여러 가지 힘든 일들이 있었다. 그런데 도와줬던 사람들이 진짜 아무 사심 없이, 아무런 대가 없이 도와줬다. 그랬을 때 이런 마음이 들었다. **'이 집은 우리 집이 아니고 다 같이 지은 집이다.'** 지금 생각해보니까 이게 내 것만의 것이 아니다. 우리 모두의 것인데 이 집이고 이 공방이고 이 땅이다. 그러니까 내 거라고 집착하고, 원하는 대로 안 된다고 화를 내면 안 된다. **굴리는 것뿐인 거다.**\n\n#### **굴름과 굴림**\n\n나라는 것도 이미 **굴름(구름)**이다. 굴러가는 거다. 굴러야 되는데, 이걸 굴릴라면 **굴림** 이 필요하다. 굴림이 하나의 돈일 수도 있고 그런 에너지다. **굴림에 필요한 자원으로 쓰이는 거다.** 그래서 우리가 굴림을 하는 주체로서의 굴름이 되는 거다. '이게 딱 나를 위해서 굴림이 존재해야 된다'고 하면 안 된다는 거다. 가두려 할 때 흐름이 막힌다. 흘러야 들어온다. #올셀프 #빈공간 #굴림 #원(願) #공용공식 #끌어당김\n\n**--- (구분선)**\n\n[파일명: 올셀프_존재증명_깨어있음_수필.md]\n\n### **올셀프", "source": "essay"}, {"id": "essay_501_6635fe5984", "text": "막힌다. 흘러야 들어온다. #올셀프 #빈공간 #굴림 #원(願) #공용공식 #끌어당김\n\n**--- (구분선)**\n\n[파일명: 올셀프_존재증명_깨어있음_수필.md]\n\n### **올셀프_존재증명_깨어있음_수필**\n\n#### **의심조차 올셀프다**\n\n올셀프 하니까 마음도 편안해지고, 잡념도 별로 없어지고, 걱정도 올라오다 마는데 — '올셀프가 이게 진짜 맞아?' 하는 의심이 올라온다. 그 의심이 올라올 때도 **'이것도 올셀프에서 올라오는구나'** 하면 된다. 그 걱정을 내가 알고 있잖아, 지금. 걱정하는 것과 내가 상관이 없으면 그걸 내가 알지를 못할 거 아닌가. 알았다는 것은 거기에 올셀프라는 거다. 의심의 내용이 중요한 게 아니다. **의심이 올라왔다는 거** , 그게 중요한 거다. 의심을 내가 알았다는 거 아닌가. 차 소리가 들려. 차 소리가 뭔 의미가 있는가. 차가 나를 괴롭히려고 하는 게 아니다. 그냥 지나가면서 소리를 내는 거다. 그 소리 자체가 지금 **올셀프를 가르쳐 주고 있는 거다.** 소리 대상과 내가 둘이 아니니까 그걸 알게 되는 거다. 감정도 그렇고, 생각도 그렇다. **올셀프 아닌 게 없다.** 나랑 관련이 없으면 내가 그걸 어떻게 아는가. 모르는 거다.\n\n#### **모든 것이 내 존재를 증명한다**\n\n이 손이 보이잖아. 이걸 왜 아는가. 이 손하고 당신하고 관련이 없다면 어떻게 이 손을 알겠는가. 소리하고 나랑", "source": "essay"}, {"id": "essay_502_3a872a5684", "text": ". 모르는 거다.\n\n#### **모든 것이 내 존재를 증명한다**\n\n이 손이 보이잖아. 이걸 왜 아는가. 이 손하고 당신하고 관련이 없다면 어떻게 이 손을 알겠는가. 소리하고 나랑 관련이 없다면 내가 소리를 어떻게 듣는가. **내 안에서 들리는 소리다.** 눈 떠봐. 이게 뭔가. 봄이잖아. 봄을 얘가 증명해 주고 있다. 이것이나 저것이나 봄을 증명하는 데 무슨 차이가 있는가. 내용은 다르지만 **당신이 보고 있다는 걸 증명하는 데에는 아무 차이도 없다.** 다 내가 봄이라는 사실을 증명해주고 있다, 이것들이. 차 소리가 나를 시끄럽게 괴롭힌다고 하는 것은 의미를 부여하는 거다. 신랑이 타고 오는 차 소리라고 생각하면 좋은 소리고, 싫어하는 사람이 타고 있다고 생각하면 나쁜 소리가 된다. 그냥 그건 소리다. **감정도 그냥 에너지일 뿐이다.** 거기다가 두려움이다, 괴로움이다, 외로움이다 갖다 붙이는 거다. 소리 자체가 내용은 중요한 게 아니다. **소리 자체가 당신이 듣고 있다는 걸 지금 증명해 주는 거다.** 당신 존재를 증명해주는 거다. 그래서 삼라만상이 불법이 아닌 게 없다는 거다. 두두물물이 다 불경이다. 불경이 뭔가. 내가 부처님임을 가르쳐 주는 게 불경이잖아. **아주 생생하게 당신이라는 존재를 이런 것들이 다 지금 가르쳐주고 있다.** 나한테 드러나는 것들이 다 내 올셀프의 세계에서 벌어지고 있는 거다. 지금 여기서 당신", "source": "essay"}, {"id": "essay_503_1fa45e9813", "text": "불경이잖아. **아주 생생하게 당신이라는 존재를 이런 것들이 다 지금 가르쳐주고 있다.** 나한테 드러나는 것들이 다 내 올셀프의 세계에서 벌어지고 있는 거다. 지금 여기서 당신한테 감각되어지는 그것들이 올셀프다. 나는 그것만 신경 쓰면 된다.\n\n#### **깨어있음밖에 경험할 수 없다**\n\n잠을 아주 확 들어버리면 잠을 경험할 수 있는가. 못 한다. 죽음을 경험할 수 있는가. 못 한다. **내가 경험할 수 있는 건 깨어있는 것뿐이다.** 그러면 죽음과 잠은 나랑 상관이 없다는 얘기다. 내가 경험할 수 없는 건 나한테 없는 거다. **나랑 상관있는 건 깨어있음밖에 없다는 거다.** 항시 우리는 깨어있다. 깨어있지 않을 수가 없다. 이게 깨어남이다. **이게 깨달음이다.** 깨달음을 따로 얻는 게 아니다. 이미 딱 눈 뜨면 깨달은 거다. 이것들이 계속 자기가 깨달아있다는 사실을 증명해주고 있다. 그런데 '어떻게 하면 깨닫지, 어떻게 하면 깨닫지?' 하면서 명상을 해서, 수행을 해서, 인도까지 가서 깨달으려 한다. 그건 물속에서 '물이 어딨지, 물이 어딨지?' 하면서 목말라 죽겠다고 하는 거랑 똑같다. **어디 가서 나를 찾을 필요가 없다.** 덤프트럭 소리도 나를 생생하게 살아있음을 증명해준다. 발바닥에 닿는 느낌이 다 생생하게 나를 증명해준다. 내 말소리도 당신을 증명하고 있다. 지금 이것들이 다 지금 여기서 생생하게 살아있는 거다", "source": "essay"}, {"id": "essay_504_5cc66fb690", "text": "나를 생생하게 살아있음을 증명해준다. 발바닥에 닿는 느낌이 다 생생하게 나를 증명해준다. 내 말소리도 당신을 증명하고 있다. 지금 이것들이 다 지금 여기서 생생하게 살아있는 거다. 코를 가지고 있으면서 코가 어딨나 하는 것과 똑같다. **눈을 찾으러 인도까지 가는 것과 똑같다.** #올셀프 #존재증명 #깨어있음 #깨달음 #삼라만상 #불경\n\n**--- (구분선)**\n\n[파일명: 올셀프_차이와분리_수필.md]\n\n### **올셀프_차이와분리_수필**\n\n#### **단절할수록 고독해진다**\n\n올셀프의 삶이 사람들 마음속에 장착이 되어야 하는 이유가 있다. 지금 저마다 다 자기 자신의 존재만을 생각한다는 거다. 개별적인 존재로 있으려 한다. 다 관계를 단절시키고 '나'라는 것에 집중한다. 그러다 보니 한편으로는 자유로워진 것 같은데, 굉장히 외로워지고 공허해진다. 이 세상은 통으로 존재하는데, 거기서 나 하나를 딱 떼어서 개별적으로 파악하려 하다 보니까 자기 모순에 빠지는 거다. 나의 존재 가치가 없어져 버린다. **'나'라는 것은 타자와의 관계에서 인식되는 건데, 타자를 부정해버리니까 나 자신조차도 같이 부정이 돼버리는 결과** 가 초래된다는 거다. '나만 잘 살면 된다'는 식이 된다. 나만 무한정 돈을 끌어들여야 되고, 내 집만 올라야 되고. 나의 이득을 위해서는 자연 환경 파괴나 관계 파괴를 무차별적으로 자행한다. 극단적인 개인화에 모", "source": "essay"}, {"id": "essay_505_470b8ae2a6", "text": "면 된다'는 식이 된다. 나만 무한정 돈을 끌어들여야 되고, 내 집만 올라야 되고. 나의 이득을 위해서는 자연 환경 파괴나 관계 파괴를 무차별적으로 자행한다. 극단적인 개인화에 모두가 경도되다 보니까 세상이 점점 살기 힘들어진다. 그러니까 이것이 받아들여져야 한다. **'나'라는 것은 세상의 존재가 존재하기 때문에 나도 같이 존재할 수 있는 거구나. 곧 세상이 나고 내가 세상이라는 거구나.** 그래야 내가 잘 살기 위해서라도 세상에 뭔가 기여를 해야 되고, 끊어졌던 관계를 회복해야 된다. **단절을 시키면 시킬수록 나는 고립될 수밖에 없다. 내 존재를 강화시킬수록 나는 오히려 더 고독해질 수밖에 없다.** 그것은 아주 필연적이다.\n\n#### **차이는 창조성이고, 분리는 고립이다**\n\n한국의 정서가 신명이다. 신바람. '신바람 난다'는 것이 동적인 거다. 고정적으로 딱 하나가 있다는 게 아니고 **움직임 속에서 서로 차이** 가 나는 거다. 분리가 아니고 차이다. 색의 차이도 있으니까 색으로 구별하는 거고, 소리에도 차이가 나니까 차 소리로 인식하는 거다. '나'라는 것도 내가 느끼는 '나'라는 것도 어떤 차이인 거지, 분리는 아니다. 타자와 나는 차이가 있다. 대상과 나도 차이가 있다. **하지만 그 차이가 분리가 되어서는 안 된다는 거다.** 분리를 해서는 존재할 수가 없다. 다 똑같고 한 가지만 보인다면 어떻겠는가. 색상의 차이", "source": "essay"}, {"id": "essay_506_58a571cf9e", "text": "다. 대상과 나도 차이가 있다. **하지만 그 차이가 분리가 되어서는 안 된다는 거다.** 분리를 해서는 존재할 수가 없다. 다 똑같고 한 가지만 보인다면 어떻겠는가. 색상의 차이가 없다면 이것을 저것인지 어떻게 알겠는가. 차이가 없으면 획일적이 돼버린다. **차이가 있기 때문에 모든 게 다 벌어지는 거다. 차이가 신의 창조성이다.** 그것이 드러나기 위해서는 반드시 뒤에 배경도 있어야 한다. 그래서 차이가 차별이 되지 않고, 차이로 인해 분리가 되지 않고, 서로가 서로의 차이남을 인정해줘야 한다. '너는 왜 그래? 너는 왜 느려?' 이런 식으로 하면 안 된다. 차이 나는 것은 차이 나는 대로 그만한 이유가 있는 거다. 차이가 났다고 비난한다고 우리가 우월해지지 않는다. **비난 때문에 나 자신의 존재도 부정이 돼버린다.**\n\n#### **신바람 — 고정되지 않은 신**\n\n신바람. 신을 바람으로 표현한다. 이 '신'이라는 것이 고정된 신이 아니다. 나무의 신이 딱 따로 있고 꽃의 신이 따로 있다는 게 아니다. **신이 나무에도 깃들어 있고, 꽃에도 깃들어 있고, 나한테도 깃들어 있다는 거다.** 나한테 내 신이 따로 있고 나무의 신 따로 있고 꽃의 신이 따로 있다면 그건 분리다. 이것을 다신론이라고 하는 사람이 있다. 그런데 다신론이 아니다. 샤머니즘의 다신론이 아니고, 엄밀히 따지면 **올신론(All-Theism)이다.** 모든 것", "source": "essay"}, {"id": "essay_507_4caa58d7cc", "text": "있다면 그건 분리다. 이것을 다신론이라고 하는 사람이 있다. 그런데 다신론이 아니다. 샤머니즘의 다신론이 아니고, 엄밀히 따지면 **올신론(All-Theism)이다.** 모든 것에 다. 통신론이다. 하나의 신이라고 얘기할 수도 없는 거다. '하나'라고 하면 벌써 '둘'이 돼버리니까. 둘이라는 것을 전제하는 하나니까. 그러니까 **올셀프(All Self)라고밖에 할 수가 없는 거다.**\n\n#### **이 땅에서 천국을 구현하는 것**\n\n그런 사상을 받아들이면 이 세상이 훨씬 살기 좋은 세상으로 바뀐다. 바뀔 수밖에 없다. 그렇게 살아야 정말 이 땅에서 천국을 구현하는 거다. '죽어서 천국', '신천지로 가고' — 이거는 완전히 넌센스다. #올셀프 #차이와분리 #올신론 #신바람 #연기 #개인화\n\n**--- (구분선)**\n\n[파일명: 올셀프_체상용_시의적절성_수필.md]\n\n### **올셀프_체상용_시의적절성_수필**\n\n#### **선과 악은 고정되지 않는다**\n\n선이냐 악이냐는 고정된 것이 아니다. 칼에 좋은 칼이 있고 나쁜 칼이 따로 있는 건 아니다. 요리에 썼으면 좋은 칼이고, 사람을 죽이는 데 쓰면 나쁜 칼이다. 칼 자체에 좋고 나쁨이 어디 있는가. **시의적절함이 있는 것뿐이다.** 물이 반쯤 있는 컵 — 배가 부른 사람은 '아직 반은 남았네' 하지만, 목이 마른 사람은 '반밖에 안 남았네' 한다. **이 사람이 배가 고픈지 목이", "source": "essay"}, {"id": "essay_508_01d2368eda", "text": "의적절함이 있는 것뿐이다.** 물이 반쯤 있는 컵 — 배가 부른 사람은 '아직 반은 남았네' 하지만, 목이 마른 사람은 '반밖에 안 남았네' 한다. **이 사람이 배가 고픈지 목이 마른지 상태에 따라서 선이냐 악이냐가 결정된다.** 이 자체로 선이냐 악이냐는 없다. 이것이 선이다 하고 딱 세워버리면, 그것이 아닌 나머지 것들은 다 악이 된다. 그건 아주 좁은 소견에서만 보는 거다. 이런 관점을 얻는 것이 굉장히 중요하다. 부처님도 형이상학적인 끝없는 논쟁거리들에는 대답하지 않았다. 화살을 맞아 아프면 화살을 뽑으면 된다. 화살이 어디서 날아왔는지를 따지는 게 급한 게 아니다.\n\n#### **체상용(體相용) — 이치에 맞게**\n\n**체(體)** 는 본체다. **상(相)** 은 드러나는 모습이다. **용(用)** 은 그것이 쓰이는 작용이다. 주먹이면 주먹 자체가 체고, 이런저런 모습이 상이고, 거기서 쓰이는 것이 용이다. **채상용을 통해서 부처가 세상을 이롭게 하는 작용을 한다.** 진리를 몸으로 하기 때문에 **이치에 맞게 행동해야지만 세상이 잘 돌아간다.** 다리가 네 개 균일하게 맞아야 되는데 한 다리를 잘라버리면 테이블의 역할을 못 한다. 이치를 구현하지 못했기 때문이다. 작용이 제대로 되지 않는다. 체가 흐트러지면 상이 어지러워지고, 상이 어지러우면 용이 안 된다. **균형이 맞아야 한다.** 그런데 네 다리가 다 똑같아야 한", "source": "essay"}, {"id": "essay_509_391c3276ac", "text": "지 못했기 때문이다. 작용이 제대로 되지 않는다. 체가 흐트러지면 상이 어지러워지고, 상이 어지러우면 용이 안 된다. **균형이 맞아야 한다.** 그런데 네 다리가 다 똑같아야 한다는 것도 고정된 시각이다. 바닥이 기울어져 있다면 수평을 잡으려면 이쪽 두 개는 짧아야 하고 저쪽은 길어야 한다. 그게 **적중(的中)** 이다. 균형이다. 남들이 보기에는 '왜 다리를 그렇게 만들었어? 다리 똑같이 만들어야지.' 하지만 그건 사람들이 생각하는 평등이지 적중은 아니다.\n\n#### **정견(正見)과 시의적절성**\n\n**정견은 이럴 때는 이게 이렇게 짧아야 이 밸런스가 잡힌다는 걸 딱 알아보는 것이다.** **시의적절성은 이치에서 온다.** 이성에서 오는 거다. 그게 법, 진리다. 그런데 그건 고정된 법이 아니다. 상황에 따라서 변한다. **고정되지 않는다는 것, 시의적절하게 변할 수 있다는 것 — 이게 진리다.** 회사도 마찬가지다. 체가 회사의 사내 규칙을 딱 고정되게 픽스해 놓아버리면 상이 얼어버린다. 상이 얼면 용이 제대로 작용하지 못한다. 직원들의 얼굴에 인상이 박히면 작용이 제대로 나오지 않는다. **이치에 맞는 경영이 필요하다.** 그것은 고정된 법칙이 아니라 시의적절한 법칙이다. 각자 저마다의 상황에 맞춰서 **능동성을 부여해줘야 한다. 자율성을 줘야 한다.** 시의적절한 것은 담당 업무를 맡는 담당자가 제일 잘 안다. 그러면 그", "source": "essay"}, {"id": "essay_510_fcee9410ff", "text": "니라 시의적절한 법칙이다. 각자 저마다의 상황에 맞춰서 **능동성을 부여해줘야 한다. 자율성을 줘야 한다.** 시의적절한 것은 담당 업무를 맡는 담당자가 제일 잘 안다. 그러면 그 사람들한테 권한과 자율성을 주는 거다. 그게 이치에 맞는 거다. #체상용 #시의적절성 #정견 #중도 #올셀프 #이치경영\n\n**--- (구분선)**\n\n[파일명: 올셀프_현실과내용물_이데아_수필.md]\n\n### **올셀프_현실과내용물_이데아_수필**\n\n#### **현실은 온전하다 — 내용물이 문제다**\n\n지금 차 소리가 들리고, 그라인더 소리가 들리고, 바람이 부니까 나뭇잎이 출렁인다. 이런 것들은 사실 뭐라고 규정 지을 수가 없다. 그냥 지금 있는 그대로다. 이것들이 서로 떨어져서 독립적으로 존재할 수 없다. 이 소리도, 바람도, 나뭇잎이 일렁거리는 것도, 차가 지나가는 것도 — 뭐 하나 딱 떨어져서 이것이 뭐다 하고 규정 지을 수 없다. **규정 짓는 것 자체는 우리의 기억이다.** 그러니까 그거는 얼마든지 대체가 가능하다. 그런데 우리가 거기에 고정된 관념으로 꼬리표를 붙인다. 새소리는 좋은 소리, 차 소리는 시끄러운 소리. 이미 거기에 규정이 돼버린 거다. 그러니까 그것들 중심에 **'나'가 있는 거다.** '나한테 좋은 소리', '나한테 나쁜 소리', '나한테 좋은 환경', '나한테 나쁜 환경' — 이렇게 '나'라는 게 이미 전제가 돼있는 거다. 그런", "source": "essay"}, {"id": "essay_511_2ba3c83756", "text": "에 **'나'가 있는 거다.** '나한테 좋은 소리', '나한테 나쁜 소리', '나한테 좋은 환경', '나한테 나쁜 환경' — 이렇게 '나'라는 게 이미 전제가 돼있는 거다. 그런데 지금 이 펼쳐지는 차 소리, 망치 소리, 바람이 일렁거리는 느낌, 이런 것들이 다 그냥 전체가 '나'라는 거다. 내가 이런 것들을 느낀다기보다는, 이런 것들이 이렇게 삶이 펼쳐지는데 **'나'라는 어떤 하나의 구심점이 그냥 있는 것뿐이다.** 거기서 이런 이벤트가 그냥 벌어지고 있는 것뿐이다. 그게 하나의 포인트가 될지언정, 걔를 중심으로 세상이 펼쳐지는 건 아니라는 거다. 우리는 자꾸 중심에다 기준을 잡아놓고, 세상이 중심점에 맞춰서 돌아가주기를 바란다. 각자 개개인이 다 자기 중심적으로 세상이 돌아가기를 바라니까. 그게 될 일인가. 바닷가의 파도가 어느 한 파도가 자기만 유리하게 쳐지기를 바라고, 옆에 파도는 꺾이기를 바란다면 그게 바다의 역동성이 있는가. 바다가 통째로 그냥 나인데.\n\n#### **이데아는 저 하늘에 있지 않다**\n\n플라톤이 얘기한 이데아는 현실에서 더 완전한 관념이 있다는 거다. 저걸 나무라고 인식한다는 것은 나무의 이데아가 있다는 거다. '아름다움'이라면 완전한 아름다움의 이데아가 있는데, 꽃이 아름다움의 이데아를 일부분 가지고 있어서 아름답게 보인다는 거다. 그런데 그건 몇천 년 전 사람들의 생각이다. **지금 그냥 우리가 이렇", "source": "essay"}, {"id": "essay_512_f4293b9ded", "text": "완전한 아름다움의 이데아가 있는데, 꽃이 아름다움의 이데아를 일부분 가지고 있어서 아름답게 보인다는 거다. 그런데 그건 몇천 년 전 사람들의 생각이다. **지금 그냥 우리가 이렇게 인식하고 보고, 이게 이데아다.** 이데아가 현실과 동떨어진 어디 하늘나라에 있는 게 아니다. 기독교도 거기서 나왔다. 지금 여기를 벗어나서 하늘나라에 이상적인 세계가 있다는 것 — 그 이데아 사상에서 차용한 거다. 그런데 따로 있는 게 아니다. **지금 여기서 느껴지는 이 자체가 그냥 다 이데아다.** 보고 듣고, 이거 온전하잖아.\n\n#### **'올셀프' 하면 가벼워진다**\n\n마음이 불편하고 조급해질 때, 어떤 수렁에 빠져있을 때 — '아, 난 올셀프인데' 이러면, 갑자기 그 수렁이 없어지면서 내가 넓은 곳에 존재하고 넓은 시야가 생긴 것 같아진다. 뭔가 품어야 될 것 같고, 이해심이 생기고, 너나가 구분되지 않는, 진짜 올셀프의 그런 감정을 느끼게 된다. 막연하게 화두를 잡는다든가, '깨어있어야 해' 같은 마음가짐도 중요하다. 그런 이론으로 사는 것도 중요하다. 그런데 그냥 올셀프라는 개념과 원리를 어느 정도 이해하고 나서, **'올셀프' 하면 많이 편안해지고 가벼워진다.** 그 원리를 알수록, 실생활에서 자꾸 되뇌일수록 삶이 많이 가벼워지고 풍요로워진다.\n\n#### **내용물은 무상하고, 실상은 온전하다**\n\n**인식이 어떤 것이 무엇이다 하고 규", "source": "essay"}, {"id": "essay_513_b592a1d7b2", "text": "* 그 원리를 알수록, 실생활에서 자꾸 되뇌일수록 삶이 많이 가벼워지고 풍요로워진다.\n\n#### **내용물은 무상하고, 실상은 온전하다**\n\n**인식이 어떤 것이 무엇이다 하고 규정 짓는 것들은 다 잠깐잠깐 사라져버린다. 그게 내용물이다.** 그건 무상하다. 내가 그걸 인식할 때만 있으니까. 차가 지나가는데 '저건 차 소리다' 하고 인식할 때만 차 소리지, 얘기에 빠져있거나 다른 것에 빠져있으면 그냥 뭔가 휙 지나간 거였다. **인식이
