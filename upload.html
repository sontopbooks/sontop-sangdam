 나오는 것을 사람들은 두려워한다. 모름의 영역이기 때문이다. 코칭도 그렇다. 고객이 10년 넘게 같은 코치를 만나도 변화가 없다면, 그것은 코치 자신도 통 안에 있기 때문이다. 통 안에서 통 안에 있는 고객을 만나는 것이다. 통 밖을 모르니 통 밖으로 꺼내야 한다는 것도 모른다. 그때그때 답답함이 해소되는 것으로 그칠 뿐, 근본이 달라지지 않는다. 통 안에 있으면 통 밖의 세상이 두렵다. 머리로 아는 게 아니기 때문이다. 통 밖으로 나오면 그냥 안다 — 내가 통 안에 갇혀 있었다는 것을. 생각으로 굴려서 아는 것이 아니라 그냥 알게 된다. 그러나 그 앎에 이르기 전에는, 통 밖이 얼마나 환한 세상인지 알 수 없다. 익숙함 안에 머무는 것이 편안하다고 느끼기 때문에 나오지 않으려 한다. **백척간두 진일보(百尺竿頭 進一步)**. 백 척 낭떠러지 끝에서 한 발짝 더 내딛는 것이다. 어떻게 될지 모르는 모름의 영역으로 나아가는 것. 통 밖으로 뛰어내리는 것이다.\n\n---\n\n#### **부딪침은 나오라는 메시지다**\n\n통 안에 있으면 다른 통들과 부딪친다. 통이 크면 에고도 그만큼 크고, 부딪치는 충격도 크다. 본인은 무법자라 안 힘들다고 생각하지만, 부딪힐 때는 세다. 서로가 서로를 아프게 한다. 그런데 그 부딪침", "source": "essay"}, {"id": "essay_721_de6f14bf6f", "text": "통들과 부딪친다. 통이 크면 에고도 그만큼 크고, 부딪치는 충격도 크다. 본인은 무법자라 안 힘들다고 생각하지만, 부딪힐 때는 세다. 서로가 서로를 아프게 한다. 그런데 그 부딪침은 사실 **통 밖으로 나오라는 메시지다.** 부딪침이 없다면 통 안에 있어도 그냥 굴러간다. 굳이 밖으로 나와야 할 이유를 느끼지 못한다. 뭔가 부딪히니까 '아이구 아야', '뭔가 잘못됐지' 하게 되는 것이다. 그러니까 부딪침은 고마운 메시지다. 통 밖에서 나온 사람은 통 안의 사람이 부딪쳐 와도 다르게 본다. '악의가 있어서가 아니고, 나를 해치려는 게 아니고, 저 사람이 통 안에 갇혀 있어서 그런 것이다.' 비난보다 꺼내주고 싶어진다. 통 안에 있을 때의 답답함을 직접 느껴봤기 때문이다. 그래서 힘들어도 두드리게 된다. 소리를 질러서라도 나오게 하고 싶어진다. 그것이 연민이고 자비다.\n\n---\n\n#### **덤프트럭 비유와 에고의 크기**\n\n#### **덤프트럭도 통 안에 갇혀서 굴리고 있는 것이다. 남한테 피해를 주는지도 모르고, 자기가 큰 통이라고 그냥 간다. 통의 크기와 에고의 크기는 비례한다. 통이 큰 만큼 에고가 크면, 부딪칠 때 면적이 넓으니까 충격도 그만큼 세다. 본인은 무법자처럼 안 힘들다고 생각하지만, 실제로 부딪히면 서로가 서로를 세게 아프게 한다. 게다가 통이 크면 벗어나기도 그만큼 더 어렵다.**\n\n---\n\n#### **통 안 괴로", "source": "essay"}, {"id": "essay_722_e265dbb154", "text": "본인은 무법자처럼 안 힘들다고 생각하지만, 실제로 부딪히면 서로가 서로를 세게 아프게 한다. 게다가 통이 크면 벗어나기도 그만큼 더 어렵다.**\n\n---\n\n#### **통 안 괴로움과 통 밖 괴로움**\n\n생각이나 괴로움이 올라올 때, 한번 물어볼 수 있다. 이것이 통 안에서 느끼는 괴로움인가, 통 밖에서 느끼는 괴로움인가. 통 안에서 느끼는 괴로움이라면, 그걸 들고 바깥으로 나와서 다시 느껴봐야 한다. 나오면 달라진다. 통 밖에서 보면 그 괴로움의 해결 방법도 보이고, 별 것 아닌 것이 되기도 한다. 통 안에 있으니까 답답하고 괴로운 것이다. 통 밖으로 나오는 순간, 통 안에서 느꼈던 그것이 이미 달라져 있다.\n\n---\n\n#### **통 안도 통 밖도 다 올셀프다**\n\n통 밖으로 나와도 생각과 감정은 사라지지 않는다. 여전히 일어난다. 다만 다르다. 통 안에 갇혀 있을 때의 생각은 통 안의 생각이고, 통 밖에서 쓰는 생각은 **올셀프의 관점에서 쓰는 생각**이다. 그것이 지혜로운 생각이 되고, 지혜로운 감정이 된다. 세상을 이롭게 하는 방향으로 쓰인다. 사람들과 부딪치지 않도록 간격을 유지하고, 속도를 조절하고, 균형을 잡을 수 있게 된다. 괴로움도, 외로움도, 답답함도 — 이것들은 통 안에 있기 때문에 생기는 것이다. 통 밖으로 나오는 순간, 통 안에서 느꼈던 그것이 이미 달라진다. 그리고 통 밖으로 나와보면 알게 된다. 통 안도,", "source": "essay"}, {"id": "essay_723_021714d566", "text": "도, 답답함도 — 이것들은 통 안에 있기 때문에 생기는 것이다. 통 밖으로 나오는 순간, 통 안에서 느꼈던 그것이 이미 달라진다. 그리고 통 밖으로 나와보면 알게 된다. 통 안도, 통 밖도, 다른 통도 — **결국 다 올셀프 안의 일이다.** 그게 핵심이다. #올셀프 #통밖으로 #개념의통 #감정의통 #시공간 #백척간두진일보 #코칭\n\n--- (구분선)\n\n[파일명: 통안의괴로움_올셀프로굴려라_수필.md]\n\n### **통안의괴로움_올셀프로굴려라_수필**\n\n#### **통 안에 갇히면 보이지 않는다**\n\n통(桶) 안에 있으면 통이 어떻게 굴러가는지를 볼 수 없다. 안에 있으니까. 방향도 모르고, 제대로 굴러가는지도 모른다. 이리 부딪치고 저리 부딪친다. 다른 통들과도 부딪친다. 얼마나 아프겠는가. **통 안에서 생각하는 것은 에고의 생각이다.** 통 바깥으로 나와서 생각하는 것이 올셀프의 관점이다. 통 밖으로 나와야 보인다. 이 통이 이렇게 가면 다른 통과 부딪치겠구나. 내가 원하는 방향으로 통을 굴릴 수 있다.\n\n---\n\n#### **고난은 나쁜 소식이 아니다**\n\n삶에 부딪침이 많다면, 고난이 많다면, 그것은 지금 통 안에서 몸부림치고 있다는 뜻이다. 그런데 그것이 나쁜 소식이 아니다. **통 밖으로 나오라는 메시지다.** 드러나는 것이 다 올셀프라 했다. 드러나는 것이 다 나다. 그러니 지금 내게 드러나는 힘듦도, 아픔도, 답답함도,", "source": "essay"}, {"id": "essay_724_49df59cd0b", "text": "것이 나쁜 소식이 아니다. **통 밖으로 나오라는 메시지다.** 드러나는 것이 다 올셀프라 했다. 드러나는 것이 다 나다. 그러니 지금 내게 드러나는 힘듦도, 아픔도, 답답함도, 전부 올셀프의 메시지다. '내가 지금 잘못 가고 있구나.' '나는 지금 통 안에서 구르고 있구나.' 그 메시지를 읽을 수 있어야 한다. 중요한 것은 지금 어떤 상황에 처해 있느냐가 아니다. **그 상황을 어떻게 살려서 쓰느냐다.** 상황은 결국 통 밖으로 나오라는 메시지다. 올셀프의 메시지다. 통 밖으로 나와야 한다. 올셀프의 관점으로. #통桶 #올셀프 #에고 #고난의메시지 #관점전환\n\n--- (구분선)\n\n[파일명: 통증과나라는전제_아픔의수용_수필.md]\n\n### **통증과나라는전제_아픔의수용_수필**\n\n#### **'나'가 전제가 되어 있다**\n\n좌측 골반 관절이 아프다. 그러면 이런 생각이 온다. 왜 아프지? 아프면 안 되는데. 운동도 하는데 왜 이러지? 점점 좋아져야 하는데. 그런데 \"왜 아프지?\"라고 할 때 이미 전제가 들어가 있다. **'내가 왜 아프지?'** 나는 아프면 안 된다는 전제. 나는 건강해야 한다는 전제. 나는 나아져야 한다는 전제. 철학에서도 전제를 의심하라 했다. 여기서도 마찬가지다. **'나'라는 전제를 의심해야 한다.** 아플 수도 있고 안 아플 수도 있다. 모든 가능성이 열려 있다. 아플 때는 아프고 안 아플 때는 안 아프는 것", "source": "essay"}, {"id": "essay_725_0d2d9f88a6", "text": "했다. 여기서도 마찬가지다. **'나'라는 전제를 의심해야 한다.** 아플 수도 있고 안 아플 수도 있다. 모든 가능성이 열려 있다. 아플 때는 아프고 안 아플 때는 안 아프는 것이 자연스러운 것이다.\n\n---\n\n#### **저항이 아픔을 붙잡는다**\n\n'나는 아프면 안 돼'라는 생각이 아픔을 온전히 느끼는 것을 방해한다. 저항감이 생긴다. 그 저항이 긴장을 만든다. 몸이 굳는다. 스트레스가 쌓인다. 그러면서 스스로에게 신호를 보낸다. '뭔가 잘못되고 있어.' 그 자기 확신이 강화된다. 더 긴장하고, 더 아프다. **안 아프고 싶다는 생각이 오히려 아픔을 더 강화시킨다.** 그냥 지나갈 수 있었던 아픔을 붙잡고 있는 것이다. 반대로 플라시보 효과를 생각해 보라. 아무 효과 없는 약이어도 '이걸 먹으면 낫는다'고 들으면 긴장이 풀린다. 마음이 편해진다. 그러면서 실제로 낫는다. 생각이 몸을 통제하고 있다는 것이다.\n\n---\n\n#### **통증은 뇌에 있다**\n\n골반이 아프다. 그런데 골반은 고깃덩어리다. 아픔을 느끼는 곳이 어디인가. **뇌다.** 현대 과학이 바뀐 것이 이것이다. 통증은 뇌에서 느끼는 것이다. 골반에 통증이 있는 게 아니라 뇌에 통증이 있는 것이다. 침을 아픈 곳이 아닌 다른 데 놔도 낫는 이유가 그것이다. 뇌가 자극을 받기 때문이다. 생각의 일이다. 아픔도. 그러니 '나는 아프면 안 된다'는 과민한 생각이 몸을 더", "source": "essay"}, {"id": "essay_726_dcd44e87ea", "text": "것이다. 침을 아픈 곳이 아닌 다른 데 놔도 낫는 이유가 그것이다. 뇌가 자극을 받기 때문이다. 생각의 일이다. 아픔도. 그러니 '나는 아프면 안 된다'는 과민한 생각이 몸을 더 긴장하게 만들고, 몸 스스로 치유하는 힘을 방해한다. **에고가 우리 삶을 방해하는 것이나, 생각이 몸의 치유를 방해하는 것이나 같다.**\n\n---\n\n#### **아픔을 있는 그대로 수용하라**\n\n그러면 어떻게 해야 하는가. 아픔이 오면 **아픔을 그냥 온전히 느껴보라.** 저항하지 않고. '왜 또 아프면 안 되는데'라는 마음 없이. '지금 이 느낌이 일어나고 있구나, 아프다는 느낌이 일어나고 있구나.' 그렇게 수용하는 것이다. 그리고 나서 실제로 고칠 것이 있으면 고치면 된다. 자세가 잘못됐으면 바로잡으면 된다. 먹는 것이 문제면 바꾸면 된다. 방법을 찾으면 된다. 그런데 먼저 수용이다. 수용 없이 저항만 하면 몸 치유의 힘을 막는다. 나이 들면 몸이 안 좋아진다는 것도 생각이다. 어디까지가 한계인지는 아무도 모른다. **한계를 스스로 긋지 말아야 한다.** 아픔이 오면 아픔을 느끼고, 안 아프게 하고 싶으면 방법을 찾으면 된다. 그게 다다. #통증 #나라는전제 #수용 #플라시보 #에고와치유\n\n--- (구분선)\n\n[파일명: 파도와바다_불성과나의오해_수필.md]\n\n### **파도와바다_불성과나의오해_수필**\n\n#### **내가 한다는 것 자체가 넌센스다**", "source": "essay"}, {"id": "essay_727_43a80b1ed6", "text": "#에고와치유\n\n--- (구분선)\n\n[파일명: 파도와바다_불성과나의오해_수필.md]\n\n### **파도와바다_불성과나의오해_수필**\n\n#### **내가 한다는 것 자체가 넌센스다**\n\n놔야 된다, 알아야 된다, 깨우쳐야 된다, 알아차림을 해야 된다, 어떤 상태가 돼야 된다. 우리가 이런 생각을 한다. 지금 이것이 아닌 다른 어떤 상태에 내가 있어야 된다는 것이다. 그런데 **그게 넌센스라는 거다.** 왜냐하면 나라는 것은 이게 생각이잖아. 내가 없다는 것이 아니고, 내가 이렇게 해야지 하고 뭔가 얻고자 하는 것, 그 이면에는 꼭 나라는 것이 전제돼 있다. 굳이 말로 '나는 먹고 싶다' 안 해도, 먹고 싶다 할 때 벌써 나라는 것이 전제돼 있는 것이다. 어떤 의도를 일으키는 이면에는 그것을 일으키는 어떤 주체가 있다고 상정을 하는 것이다. 그런데 **그 주체가 실재하지 않는다는 것을 아는 게 깨달음이다.** 다른 게 깨달음이 아니고.\n\n---\n\n#### **지금 여기 목전이 그냥 나다**\n\n이미 그냥 통으로 다 온전히 들어가 있다. 지금 여기는 이게 전부 다 어떤 앎의 의식에서 통으로 다 드러나고 있는 것이다. 방이라는 걸 알고 있고, 방에서 나는 소리도 알고 있고, 내가 있음도 안다. **내가 있음도 여기 아는 것에서 드러나는 것이다.** 그러면 지금 눈앞에 이 목전이 그냥 있는 그대로 나인 것이다. 내가 없다는 것이 아니고. 그런데 이", "source": "essay"}, {"id": "essay_728_309a2733eb", "text": "고, 내가 있음도 안다. **내가 있음도 여기 아는 것에서 드러나는 것이다.** 그러면 지금 눈앞에 이 목전이 그냥 있는 그대로 나인 것이다. 내가 없다는 것이 아니고. 그런데 이거는 매번 들리고 보이고 그런 게 바뀌는 대로 또 다 알고 있잖아. 여기 방에 있으면 나는 이걸 안다. 여기도 내가 있는 거다. 집 밖으로 나가면 밖에도 내가 있는 것이다. **전 우주에 다 내가 있는 것이다.** 내가 그걸 다 알고 있으니까. 따로 얻으려 하고 추구하고자 하는 것이 있다는 것은, 이미 지금 여기를 벗어난 다른 것을 찾고 있다는 것이다. **지금 여기를 벗어난 어떤 것을 원하는 것이기 때문에 지금 여기를 부정하는 결과가 돼버리는 것이다.** 그게 허구라는 것을 확인할 뿐이다. 깨달음이 따로 있는 게 아니고.\n\n---\n\n#### **생각뿐만 아니라 의도까지도 알아야 한다**\n\n생각으로는 우리가 잘 안다. 나라는 건 다 생각으로 이루어져 있지. 그런데 그것뿐만 아니고 **의도까지도 알아야 한다는 것이다.** 그 의도를 일으키는 것. 뭔가 욕구가 올라오고 이런 건 아무 문제가 없다. 본성에서 올라오는 것이니까. 그런데 **그 의도가 올라와도 그 의도의 중심은 없다.** 딱 고정된 뭔가가 있어서 그것이 의도를 일으키고 깨닫고 이런 게 아니라는 것이다. 그때그때 그냥 불어나는 것뿐인 거다. 통으로 그것이 따로 떨어져서 어떤 실체가 있는 게 아니라는 것", "source": "essay"}, {"id": "essay_729_176c52feab", "text": "고정된 뭔가가 있어서 그것이 의도를 일으키고 깨닫고 이런 게 아니라는 것이다. 그때그때 그냥 불어나는 것뿐인 거다. 통으로 그것이 따로 떨어져서 어떤 실체가 있는 게 아니라는 것이다.\n\n---\n\n#### **파도는 바다와 따로 없다**\n\n하나의 파도가 일어났다. 그 파도는 바다하고 떨어져서 독립된 파도가 있는 게 아니잖아. 따로 뭔가 완전한 깨달음을 얻은 파도가 돼야 된다거나 완전한 바다가 돼야 된다거나 이게 아니잖아. **파도 그 자체를 보면 그게 바다다.** 그냥 파도이면서 바다란 말이다. 그런데 우리는 뭔가 완벽한 파도가 되기를 원한다. 그건 있을 수가 없잖아. 파도는 고정돼 있는 게 아니다. 쳤다가 철썩하고 또 다시 가라앉히고 다시 또 일어났다 가라앉히고 그렇잖아. 딱 완벽한 고정된 형태의 파도가 어디 있겠는가. 그런데 우리는 그걸 찾는 것이다. 그런 완벽한 고정된 형태의 깨달은 나를. 나는 계속 변한다. 방에 있을 때는 방을 아는 나인데, 방 밖으로 나가면 온 우주를 다 보이는 나잖아. 화장실에 있으면 화장실을 아는 나인 것이고, 밤에 깊은 잠 속에서는 또 없잖아. 파도가 그야말로 잠잠해져 가지고 파도가 있는지 없는지도 모를 정도로 잠잠한 게 자는 거다. 그게 아침 되면 또 일어나는 것이다.\n\n---\n\n#### **특정 파도를 잡겠다는 것이 넌센스다**\n\n지금 이것 아닌 다른 경계를 찾거나, 어떤 상태를 내가 원하는 상태가", "source": "essay"}, {"id": "essay_730_3ff23322f9", "text": "거다. 그게 아침 되면 또 일어나는 것이다.\n\n---\n\n#### **특정 파도를 잡겠다는 것이 넌센스다**\n\n지금 이것 아닌 다른 경계를 찾거나, 어떤 상태를 내가 원하는 상태가 돼야 된다. 그런데 그 상태는 잡을 수가 없다. **상태를 잡는다는 것은 특정 파도를 잡겠다는 것하고 똑같다.** 그게 넌센스라는 것이다. 파도가 없다는 게 아니다. 나는 이 파도로 일어났는데 상대방도 저 파도로 일어나는 것이다. 온갖 파도가 다 있잖아. 바다에. 그렇게 개별적으로 다 일어나지만 **근본적으로는 하나의 바다의 표현인 것이다.** 그 온갖 파도가 다 그렇다. 어떤 놈은 파도가 세게 치는 놈도 있고 작게 치는 놈도 있다. 그런데 그걸 누가 어떤 게 좋고 나쁘고, 높고 낮고 할 수가 없는 것이다. 어떤 놈은 바위에 부딪쳤다가 그냥 사그라지는 놈도 있고, 어떤 놈은 바닷가 해변까지 와가지고 모래를 휙 쓸고 가는 놈도 있고, 배에 부딪히는 놈도 있고. 그 모든 것을 그냥 알고 **온전히 받아들이는 것이다.** 그 파도의 모습 그 자체로 이미 온전히 받아들여지고 있는 것이다. 파도가 독립적으로 치는 게 아니잖아. 바람 부는 것하고 주변 파도의 높낮이 그것에 따라서 나도 또 일어나는 것이다. 매 순간이 사실은 있는 그대로 다 받아들여지고 있는 그대로 **진실하다.** 배가 고파, 배가 고픈 게 그냥 진실한 것이다.\n\n---\n\n#### **학습된 개념이", "source": "essay"}, {"id": "essay_731_f676ae463b", "text": "어나는 것이다. 매 순간이 사실은 있는 그대로 다 받아들여지고 있는 그대로 **진실하다.** 배가 고파, 배가 고픈 게 그냥 진실한 것이다.\n\n---\n\n#### **학습된 개념이 주인 노릇을 한다**\n\n핵심은 그거다. **내가 뭘 한다는 것 자체가 넌센스라는 것이다.** 우리가 계속 생각으로부터, 과거의 패턴, 배운 것, 너다 어떻다 나다 어떻다 이런 것들이 학습된 것이 뭉쳐져 가지고 그 생각 개념이 강력하게 뭉쳐져 가지고 그게 주인 노릇을 한다는 것이다. 그런데 사실 **생각도 내가 일으키는 게 아니다.** 그냥 저절로 일어나는 것이다. 바다에 파도가 지 혼자 일어나는 게 아니고 바람이나 주변 파도의 높낮이에 의해서, 어떤 연기적인 조건에 의해서 그냥 일어나듯이. 내 생각도 그냥 의자가 보이면 의자를 보는 나가 돼버리는 것이다. 나무를 보면 나무를 보는 나가 돼버리는 것이고, 소리를 들으면 소리를 듣는 나가 돼버리는 것이다. 이것들이 동시에 다 드러나는, **이걸 아는 그게 나인 것이다.** 그런데 내가 뭐라고 딱 고정시켜 버리겠다고 하면, 아무리 깨달은 것이라고 할지언정 막혀버리는 것이다. 걸려버리는 것이다. 삼매를 딱 들어갔다 한다는 것도 완전히 외부하고 차단이 돼버리는 것이다. 온전히 드러나질 않는 것이다. 그것도 하나의 특별한 상태일 뿐인 것이다. **그냥 있는 그대로 지금 여기에서 드러나는 이대로 액면 그대로가 그냥 진실하", "source": "essay"}, {"id": "essay_732_41c613703d", "text": "고 차단이 돼버리는 것이다. 온전히 드러나질 않는 것이다. 그것도 하나의 특별한 상태일 뿐인 것이다. **그냥 있는 그대로 지금 여기에서 드러나는 이대로 액면 그대로가 그냥 진실하다는 것이다.**\n\n---\n\n#### **마음은 하나다, 부처가 듣고 있다**\n\n의자는 의자대로 보이고 소리는 소리대로 들린다. 그런데 의미는 틀릴 수 있다. 내가 얘기하는 의미하고 당신이 얘기하는 의미는 틀릴 수 있잖아. 그런데 소리가 들린다는 것은 나도 똑같이 들리고 자기도 똑같이 들리는 것이다. 보이는 것도 내가 보는 것과 자기가 보는 것이 똑같다. **그러니까 그 마음은 하나의 마음이 이렇게 다 보고 있다는 것이다.** 나를 통해서 바다의 이 파도도 드러나고 저 파도도 드러나는 것이다. **부처가 지금 이 소리를 듣고 있다는 것이다.** 내가 듣고 있는 줄 알았는데 부처가 이 소리를 듣고 있는 것이다. 내가 보는 줄 알았더니 부처가 보고 있는 것이다. 내가 느끼는데 부처가 느끼고 있는 것이다.\n\n---\n\n#### **나무는 온 우주가 키우고 있다**\n\n나무가 혼자 크는가. 나무가 무슨 의지가 있어서 크는가. 햇빛의 각도, 지역, 주변에 나무가 있고 없고, 큰 나무가 있으면 그걸 피해서 한쪽으로 삐뚤어져서 자라는 것이다. 나무 안에 내가 있어서 '나는 이렇게 커야지, 똑바로 커야지, 삐뚤게 커야지' 이런 게 아니잖아. 나는 소나무인데 '나는 장미나무로", "source": "essay"}, {"id": "essay_733_5b2a14af5c", "text": "걸 피해서 한쪽으로 삐뚤어져서 자라는 것이다. 나무 안에 내가 있어서 '나는 이렇게 커야지, 똑바로 커야지, 삐뚤게 커야지' 이런 게 아니잖아. 나는 소나무인데 '나는 장미나무로 크고 싶어, 어떻게든지 수행을 해서 꼭 장미나무가 될 거야.' 이렇게 생각하면 그게 말이 되는가. 말이 안 되는 얘기다. **우주가, 자연이, 불성이, 하느님이 나무로 표현된 것이다.** 나무를 성장시키고 있는 것이다. 나무가 혼자 크는 게 아니다. 온 우주가 키우고 있는 것이다. 저 하늘의 별이고 별빛이고, 내리는 빗방울, 새소리, 이런 것들이 다 어우러져서 나무가 크는 것이다. **나무로서 드러나는 것이다.** 그런데 사람만 그러지 않으리라는 법이 어디 있는가. 사람이 생각을 하잖아. 그런데 그 생각도 사실 사람이 하는 것이 아니다. **생각이 일어나는 것뿐인 것이다.** 내가 생각을 막 하는 게 아니다. 그냥 일어나는 것이다. 감정도 일어나고. 마치 나무에서 광합성 작용이 일어나고 물을 빨아들이고 그 빨아들인 것을 나무 위로 이파리로 올리고 하는 것처럼, 내 몸 안에서도 그게 일어나는 것이다. 거기에 생각이 하나 더 일어나는 것뿐이다. **나무 안에 불성이 있으니까 나무가 크는 것이다.** 나무가 힘이 있어서 큰 게 아니다. 우리도 우리 안에서 불성이, 하느님이, 지금 이 고깃덩이를 통해서 작동을 하는 것이다. 잠잘 때는 아무것도 모르잖아. 나무처럼.", "source": "essay"}, {"id": "essay_734_3c3ca1ce05", "text": "것이다.** 나무가 힘이 있어서 큰 게 아니다. 우리도 우리 안에서 불성이, 하느님이, 지금 이 고깃덩이를 통해서 작동을 하는 것이다. 잠잘 때는 아무것도 모르잖아. 나무처럼. 그런데 불성이 딱 깨어나면 이제 작동을 하는 것이다. 그래서 보고 듣고 알고 다 한다는 것이다. **그런데 이것을 우리가 내가 한다고 착각을 일으켜버리는 것이다.** 거기에 가상의 나가 생기는 것이다. 그 가상의 나가 없으면 불성이 나인 것이다. 나 이것이 곧 불성이 돼버리는 것이다. 그런데 우리는 내가 보고 내가 듣고, 내 스타일대로 보고 싶고 내 스타일대로 들었으면 좋겠다고 한다. 그게 오해고 넌센스라는 것이다.\n\n---\n\n#### **이미 지금 다 온전하다**\n\n그 오해를 해소해 버리면, 있는 그대로 그냥 지금 항시 그냥. 그러니까 스님들이나 이런 사람들이 '이미 지금 다 온전한데 왜 자꾸 찾으려 하냐?' 그 얘기가 그것이다. 다른 게 아니고. **그냥 내가 한다는 것만 없으면,** 그냥 지금 이렇게 보고 있는 이 자체가 온전히 그냥 다 봐지는 것이다. 나무는 나무대로 보이고 꽃은 꽃으로 보이는 것이다. 이 소리는 이 소리로 들리고. 이게 부족함이 하나도 없는 것이다. 있는 그대로 완전히, 이 능력이 다 지금 불성이, 하느님이 지금 이렇게 하고 있다는 것이다. **그게 핵심이다.** #파도와바다 #불성과나 #가상의나 #깨달음의오해 #있는그대로온전함\n\n-", "source": "essay"}, {"id": "essay_735_2cfed72fde", "text": "대로 완전히, 이 능력이 다 지금 불성이, 하느님이 지금 이렇게 하고 있다는 것이다. **그게 핵심이다.** #파도와바다 #불성과나 #가상의나 #깨달음의오해 #있는그대로온전함\n\n--- (구분선)\n\n[파일명: 패턴재생_선택적인식_수필.md]\n\n### **패턴재생_선택적인식_수필**\n\n#### **기억을 재생하며 산다**\n\n현재를 사는 것 같지만, 사실은 과거의 기억을 재생하며 사는 것이다. 누군가를 대할 때도, 상황을 볼 때도, 선택을 할 때도 — 기억된 패턴으로 본다. '요놈은 이런 놈', '지금 상황은 이런 것'. 그 패턴으로 현재를 보고 미래를 본다. 그러니 **패턴을 바꾸고 싶어도 안 바뀌는 것이다.** 바꾸고 싶은 것은 패턴 자체가 아니다. **삶을 바꾸고 싶은 것이다.** 그런데 이것이 기억의 재생이기 때문에, 과거의 잣대로 선택을 하는 한 삶은 그대로다. 호오포노포노든, 염송이든, 대부분의 방법이 과거의 패턴을 '지우는' 것에 집중한다. 그런데 지우는 것만으로는 부족하다. **미래를 새롭게 선택해야 한다.**\n\n---\n\n#### **내가 원하는 쪽을 본다**\n\n선택을 할 때 또 과거의 패턴대로 하려고 한다는 것을 **알아차려야** 한다. 그 순간을 알아차리면, 다르게 선택할 수 있다. **내가 원하는 쪽으로 봐야 한다.** \"이건 과거 경험으로 봤을 때 안 될 것이다\" 이러지 말고, \"이거는 잘 됐으면 좋겠다\", \"이건 더", "source": "essay"}, {"id": "essay_736_950e3040e0", "text": "알아차리면, 다르게 선택할 수 있다. **내가 원하는 쪽으로 봐야 한다.** \"이건 과거 경험으로 봤을 때 안 될 것이다\" 이러지 말고, \"이거는 잘 됐으면 좋겠다\", \"이건 더 좋아졌으면 좋겠다\" — 그쪽으로 선택하는 것이다. 잘 되는 쪽, 좋아지는 쪽, 내가 원하는 쪽을 자꾸 봐야 한다. 그것이 계속 그 패턴을 재생시킨다. 내가 선택하는 쪽으로 계속 조명이 비춰진다. 우주는 넓은데, 시야를 문에 두면 문이 전부가 되고, 창문으로 두면 온 우주가 들어온다. 집착하거나 혐오하는 상황에 인식을 **몰빵**하면, 그 상황으로 기억을 계속 재생하게 된다.\n\n---\n\n#### **중생의 패턴이 아닌 불성을 선택한다**\n\n원한다는 것 자체가 결핍을 나타낸다. 없으니까 원하는 것이다. 수행도 마찬가지다. 아직 깨닫지 못했으니까 깨닫기를 원하는 것이다. \"나는 중생이니까 깨달아야지\" 이러면, 스스로 중생임을 인정하고 있는 것이다. 중생의 패턴으로 중생의 삶을 바꾸려 하면 안 된다. **나의 불성을 봐야 한다.** 불성을 자꾸 선택해야 한다. 그러면 패턴이 **중생의 패턴에서 불성의 패턴으로 바뀐다.**\n\n---\n\n#### **삶은 환(幻)이고, 무상하다**\n\n이 삶이 **시뮬레이션 스토리**이기 때문에 그렇다. **환(幻)**이다. 환영의 스토리다. 원래 시간도 없고 공간도 없다. 우리의 본성 자리는 찰나생 찰나멸(刹那生 刹那滅)한다. 여기 있", "source": "essay"}, {"id": "essay_737_b1fd855aea", "text": "**시뮬레이션 스토리**이기 때문에 그렇다. **환(幻)**이다. 환영의 스토리다. 원래 시간도 없고 공간도 없다. 우리의 본성 자리는 찰나생 찰나멸(刹那生 刹那滅)한다. 여기 있던 손이 저쪽으로 움직였다고 생각하는 것은, 그 궤적을 기억으로 연결한 것이다. 기억이 없다면 손이 순간적으로 나타났다 사라지는 연속일 뿐이다. 불교에서 **무상(無常)**하다는 게 그 얘기다. 고정된 형이 없이 계속 변한다는 것. 금강경에서 \"꿈 같고, 거품 같고, 번개 같고, 구름 같다\"고 하는 것이 이것이다.\n\n---\n\n#### **결핍을 보면 결핍을 재생한다**\n\n돈을 많이 벌고 싶으면, 돈이 많은 것을 봐야 한다. 그런데 \"빚을 빨리 갚았으면\", \"이자를 빨리 갚았으면\" 하면서 자꾸 **빈곤을 재생**한다. 자식을 볼 때도 마찬가지다. \"쟤는 저걸 좀 고쳤으면\", \"저것만 좀 치우면\" — 그 순간 **안 치우는 과거를 재생시키고 있는 것이다.** 그걸로 계속 보니까, 그것이 계속 나타난다. **내가 됐으면 좋겠는 것을 선택해서 봐야 한다.** 바뀌었으면 좋겠다며 마음에 안 드는 것을 자꾸 보면, 그것을 재생할 뿐이다.\n\n---\n\n#### **세상에는 나밖에 없다**\n\n이 세상에는 나밖에 없다. 나한테서 드러나는 당신, 나한테서 드러나는 이 육신, 구름도, 세상 모든 것이 나한테서 드러난다. 세상에 70억 명이 있으면, **70억 개의 나만 있는 것이", "source": "essay"}, {"id": "essay_738_627c348099", "text": "상에는 나밖에 없다. 나한테서 드러나는 당신, 나한테서 드러나는 이 육신, 구름도, 세상 모든 것이 나한테서 드러난다. 세상에 70억 명이 있으면, **70억 개의 나만 있는 것이다.** 이것을 재생하고 있는 사람은 나니까. 그러니 무엇을 재생할지는 내가 선택한다. 과거의 패턴인가, 불성인가. 결핍인가, 풍요인가. 조명은 내가 비춘다.\n\n#### **업력 연결 단락**\n\n내가 계속 그쪽을 조명 비추니까 그 면만 나한테 보이는 것이다. 내 패턴이 재생되어 내 패턴이 현실로 나타나는 것이다. 내가 선택을 계속 그쪽으로 하기 때문이다. 이것이 업력이고, 그게 계속 내 삶을 밀고 가는 것이다.\n\n#패턴재생 #선택적인식 #불성 #무상 #업력\n\n--- (구분선)\n\n[파일명: 페트병비유_의식이담기는그릇_수필.md]\n\n### **페트병비유_의식이담기는그릇_수필**\n\n#### **페트병에 바닷물을 담으면**\n\n페트병에 바닷물을 담는다. 페트병은 육체고, 담긴 물은 의식이다. 그런데 페트병이 바닷물을 만든 것은 아니다. 담고 있을 뿐이다. 육체에서 정신이 태어난 것이 아니다. **의식이 육체에 스며든 것이다.** 바닷물을 페트병에 담았다 해서 그 물이 바닷물이 아닌 것은 아니다. 바닷물이나 페트병 속 물이나 똑같은 물이다. 의식은 둘이 아니다. 페트병 속 물이 '페트병의 물'이 아니듯, 이 의식은 '나의 의식'이 아니다. **의식의 나다.** 육체에서", "source": "essay"}, {"id": "essay_739_945ef5fb34", "text": "다. 바닷물이나 페트병 속 물이나 똑같은 물이다. 의식은 둘이 아니다. 페트병 속 물이 '페트병의 물'이 아니듯, 이 의식은 '나의 의식'이 아니다. **의식의 나다.** 육체에서 의식이 생겨나 보고 듣는 것이 아니다. 의식이 우리를 통해서 세상을 비춰보는 것이다. 서양철학이 오랫동안 육체와 정신이 하나냐 둘이냐를 두고 싸워왔다. 일원론과 이원론. 그런데 페트병 하나로 이 문제가 달라진다. 담는 것과 담기는 것. 그릇과 그 안에 스민 것. 둘이면서 둘이 아니다.\n\n---\n\n#### **그릇이 형태를 갖추면 의식이 스민다**\n\n인류가 진화하면서 뇌가 형성됐다. 그 뇌에 의식이 스몄다. 쥐의 뇌에는 쥐의 의식이 스민다. 쥐 모양의 페트병에 쥐의 의식이 담기는 것이다. 꽃의 모양을 띠면 거기에 꽃의 의식이 담긴다. 꽃의 성품이 깃든다. 꽃 대궁에서 꽃이 만들어지는 게 아니듯, 육신 안에서 의식이 만들어지는 것이 아니다. **완전한 관점의 전환이다.** 보통 내 육신 안에서 의식이 생겨나 보고 듣는다고 생각한다. 그런데 아니다. 의식이 먼저다. 그릇이 갖춰지면 거기에 의식이 스미는 것이다.\n\n---\n\n#### **우주는 하나의 거대한 네트워크다**\n\n우주 전체가 거대한 하나의 의식 네트워크라고 보면 어떻겠는가. 뇌의 임무가 에너지를 효율적으로 분배하는 것이듯, 우주 전체도 그런 방식으로 작동한다. 지금 전쟁이 일어나고, 누군가 남을 이용하고", "source": "essay"}, {"id": "essay_740_5d5dce6314", "text": "대한 하나의 의식 네트워크라고 보면 어떻겠는가. 뇌의 임무가 에너지를 효율적으로 분배하는 것이듯, 우주 전체도 그런 방식으로 작동한다. 지금 전쟁이 일어나고, 누군가 남을 이용하고, 부작용이 생겨도, 그것은 거대한 네트워크 안의 일부다. 결국 그것도 어떤 방향으로 흘러가고 있다. 인간이 의식화되어 가는 방향으로. 옛날에는 동물과 사람이 의식에서 크게 다르지 않았을 것이다. 그런데 점점 진화하면서 의식화된다. **의식화된다는 것은 영적인 세계로 가고 있다는 것이다.** 나중에는 육신의 제약을 벗어난 어떤 상태로, 에테르체처럼, 기독교에서 말하는 천사처럼, 불교에서 말하는 보살처럼 존재할 수도 있다.\n\n---\n\n#### **진화와 지금 여기 단락**\n\n#### **진화라는 것도 시간적으로, 과거에서 현재 미래를 순차적으로 발현되는 것이 아니다. 늘 지금이고 늘 여기다. 그래서 지금 여기라고 하는 것이다. 어떤 것이 드러나고 가라앉고, 드러나고 가라앉고 하느냐에 따른 것이지, 시간의 순서를 따르는 것이 아니다.**\n\n---\n\n#### **아미타불의 빛, 늘 지금 여기**\n\n서방정토에는 아미타불이 있다고 한다. 우주의 서쪽에 아미타불 세계가 있다는 것이다. 동서남북 사방팔방에 다 부처님 세계들이 있다. 부처님 세계가 있다는 것은 그만큼 거기가 의식화된 세계라는 것이다. 밝다는 것이다. 아미타불은 무량광(無量光) 무량수(無量壽)다. 빛이 무한", "source": "essay"}, {"id": "essay_741_eb2b4104bb", "text": "사방팔방에 다 부처님 세계들이 있다. 부처님 세계가 있다는 것은 그만큼 거기가 의식화된 세계라는 것이다. 밝다는 것이다. 아미타불은 무량광(無量光) 무량수(無量壽)다. 빛이 무한량으로 퍼져나가고 수명이 무한정하다는 뜻이다. . 그런데 진화라는 것이 시간적으로 순차적으로 일어나는 것은 아니다. **늘 지금, 늘 여기다.** 과거에서 현재, 미래로 순서대로 발현되는 것이 아니다. 드러나고 가라앉고, 드러나고 가라앉고. 그것이 늘 지금 여기서 일어나고 있다. 우주가 밝아지는 것도, 의식이 깨어나는 것도, 먼 미래의 일이 아니다. 지금 여기서다. #페트병비유 #의식의나 #우주네트워크 #아미타불 #늘지금여기\n\n--- (구분선)\n\n[파일명: 풍성한대화_상호작용의힘_수필.md]\n\n### **풍성한대화_상호작용의힘_수필**\n\n#### **어색함은 나쁜 감정이 아니다**\n\n대화가 딱딱하게 굳는다. 서로 조용해진다. 이것이 누구 잘못인가. 잘못이 없다. 서로가 다 소통에 서툰 것이다. 어색함의 정체는 나쁜 감정이 아니다. **뜻이 불명확한 상태다.** 내가 한 말을 저 사람이 제대로 받아들였는지 모른다. 저 사람이 이렇게 말하는 의도가 무엇인지 모른다. 확실하게 전달되지 않은 채로 대화가 이어지면, 그 불분명함이 쌓이면서 서로 사이에 벽이 생긴다.\n\n---\n\n#### **상호작용이 대화를 풍성하게 한다**\n\n벽을 허무는 것은 간단하다. 상호작용이다.", "source": "essay"}, {"id": "essay_742_68d7f26932", "text": "은 채로 대화가 이어지면, 그 불분명함이 쌓이면서 서로 사이에 벽이 생긴다.\n\n---\n\n#### **상호작용이 대화를 풍성하게 한다**\n\n벽을 허무는 것은 간단하다. 상호작용이다. \"이렇다는 건가요?\" \"조금 이해가 안 되는데 예를 들어 설명해 주실 수 있나요?\" 이런 말 한마디가 대화를 풍성하게 만든다. 조정하고, 또 조정하고. 그렇게 서로의 뜻을 맞춰가는 과정이 관계를 살아있게 한다. **상호작용은 이해를 확인하는 것이 아니라, 관계를 여는 것이다.** #상호작용 #소통 #경청 #관계 #대화\n\n--- (구분선)\n\n[파일명: 한국철학의때_우리만의사유_수필.md]\n\n### **한국철학의때_우리만의사유_수필**\n\n#### **철학의 보편성과 사상의 특수성**\n\n철학은 보편성을 띨 수밖에 없다. 인간이란 무엇인가, 존재는 세계를 어떻게 인식하는가. 이 물음은 어느 시대, 어느 민족이든 피해갈 수 없다. 그런데 사상은 다르다. **사상은 시대적 특수성을 반영해야 한다.** 그 시대를 살아가는 사람들의 삶의 방식, 가치관, 신념을 담아야 한다. 철학이냐 사상이냐 명확히 나눌 수는 없지만, 이 구분이 보편성의 문제를 타당하게 생각하게 해준다.\n\n---\n\n#### **AI 시대, 인간이란 무엇인가**\n\n인공지능이 인간의 노동력을 넘어 정신적인 영역까지 대신하게 되었다. **그렇다면 과연 인간이란 무엇인가.** 메타버스와 같은 새로운 세계가 오면", "source": "essay"}, {"id": "essay_743_f69a1d0de8", "text": "AI 시대, 인간이란 무엇인가**\n\n인공지능이 인간의 노동력을 넘어 정신적인 영역까지 대신하게 되었다. **그렇다면 과연 인간이란 무엇인가.** 메타버스와 같은 새로운 세계가 오면, 우리가 세계를 인식해온 틀 자체가 바뀔 수 있다. 손으로 만져지고 감각되던 물질 세계에서, 전혀 다른 형태의 세계를 인식해야 하는 시대가 왔다. 어디까지가 인간의 영역인가. 얼마만큼 허용할 것인가. 이것이 앞으로 가장 큰 철학적 화두가 될 것이다. 온 세계가 실시간으로 연결된 지금, 철학적 사유는 공부로만 끝나서는 안 된다. **진짜 철학을 하려면 내 삶을 이해하는 우리만의 틀이 있어야 한다.** 그 틀은 우리 언어로 표현되어야 한다. 남의 사유로, 남의 레고를 써서 조립하면 무엇이 나오겠는가. 케이팝과 영화와 드라마가 전 세계로 뻗어 나가고 있다. 거기에는 세계인의 공감을 얻는 우리만의 무언가가 분명히 있다. 그것이 사상이건 철학적 사유건 간에.\n\n---\n\n#### **한국적이면서 보편 타당한 철학을 정립할 때**\n\n서양 철학은 경제력과 군사력을 바탕으로 전 세계의 사상을 지배했다. 이제는 다르다. **문화적 콘텐츠의 힘으로 우리만의 독특한 사상을 전개할 수 있다.** 이원론적으로 혼란한 세상에 새로운 이정표를 제시해야 한다. 박찬욱 감독이 아카데미에서 로컬이라는 말을 들었다. 그런데 로컬이 보편이 되는 시대가 왔다. **한국적이면서도 세계에 보편 타당", "source": "essay"}, {"id": "essay_744_b3d90d640f", "text": "으로 혼란한 세상에 새로운 이정표를 제시해야 한다. 박찬욱 감독이 아카데미에서 로컬이라는 말을 들었다. 그런데 로컬이 보편이 되는 시대가 왔다. **한국적이면서도 세계에 보편 타당한 철학을 정립하기에 지금이 정말 좋은 시절이다.** #한국철학 #보편과특수 #AI시대 #우리만의사유 #로컬이보편이다\n\n--- (구분선)\n\n[파일명: 한바탕바다_파도와올셀프_수필.md]\n\n### **한바탕바다_파도와올셀프_수필**\n\n#### **이 공간은 누구 것인가**\n\n나의 올셀프는 이 공간이다. 그런데 당신의 올셀프도 이 공간 아닌가. 우리가 지금 이 공간을 같이 공유하고 있다. 이 소리도 같이 듣고, 이 방도 같이 느끼고 있다. 이 공간 안에서 당신이라는 느낌과 생각이 일어나고 있다. 이 공간 안에서 나라는 느낌과 생각이 일어나고 있다. 그렇다면 이 공간은 누구 것인가. 당신은 거기서만 본다고 생각하고, 나는 여기서만 본다고 생각한다. 그런데 **앎은 분리돼 있지 않다.** 하나의 앎이 여기서 일어나고 또 저기서 일어나는 것이다. 당신이 저쪽을 바라보고 나는 이쪽을 바라보는 것은 차이다. 분리가 아니다.\n\n---\n\n#### **내 안에서 일어난다고 다 아는 것도 아니다**\n\n생각이 내 안에서 일어난다고 해서 그것이 당신과 완전히 분리되어 있다는 것이 아니다. 지금 내 심장이 어떻게 뛰고 있는지 나는 아는가? 내 안에서 일어나는 생각들을 내가 다 아는가", "source": "essay"}, {"id": "essay_745_d818c534f3", "text": "생각이 내 안에서 일어난다고 해서 그것이 당신과 완전히 분리되어 있다는 것이 아니다. 지금 내 심장이 어떻게 뛰고 있는지 나는 아는가? 내 안에서 일어나는 생각들을 내가 다 아는가? 나도 내 마음을 모를 때가 많다. 이 감정이 도대체 무슨 감정인지 모를 때도 많다. 내 안에서 일어난다고 해서 그것이 온전히 나만의 것이라고 할 수 없다. **생각이나 감정이나 느낌이나, 다 이 한 바탕 의식 공간에서 일어나는 것이다.** 이 공간이 마음일 수도 있고, 의식일 수도 있다. 이 의식에서 저기서 드러나고, 여기서 드러나는 것이다. 이벤트가 벌어지는 위치가 다를 뿐이다.\n\n---\n\n#### **제주도 파도와 독도 파도**\n\n삶 전체가 하나의 바다라면, 나는 그 바다에서 일어나는 한 파도고 당신도 한 파도다. 제주도에서 일어나는 파도와 독도에서 일어나는 파도는 모양이 다르다. 기억도 다르고 경험도 다르다. 각자의 파도에 떨어지는 물방울에 따라 모양이 달라지듯, 각자의 기억이 형성된다. 그런데 파도라는 성질은 같다. 물이라는 성질은 같다. **한 바탕 바다에서 일어나는 파도들이다.** 계속 출렁거리지만 근본 바탕은 하나의 마음 작용이다. 꿈 같고 환상 같다. 고정돼 있는 것이 아니다.\n\n---\n\n#### **바다가 파도를 경험한다**\n\n우리는 파도가 바다를 경험한다고 생각한다. 그런데 반대다. **바다가 당신을 통해서 바다를 경험하고 있고, 나를", "source": "essay"}, {"id": "essay_746_a4a94d7e53", "text": "것이 아니다.\n\n---\n\n#### **바다가 파도를 경험한다**\n\n우리는 파도가 바다를 경험한다고 생각한다. 그런데 반대다. **바다가 당신을 통해서 바다를 경험하고 있고, 나를 통해서 바다를 경험하고 있는 것이다.** 의식이 나를 통해서 세상을 비춰보는 것이다. 올셀프가 나라는 파도를 통해서, 당신이라는 파도를 통해서, 스스로를 경험하고 있는 것이다. #올셀프 #한바탕 #파도비유 #의식공간 #불이\n\n--- (구분선)\n\n[파일명: 항상성_신의선물_수필.md]\n\n# 항상성_신의선물_수필.md\n\n## 몸은 기억이다\n\n몸이 어떻게 생겼는지, 우리는 사실 잘 모른다. 안에서 지금 무슨 일이 벌어지는지도 모른다. 그러면서 이것을 '나'라고 한다. 아무 근거도 없이, 털끝같이 믿는다.\n\n**몸은 무의식이다.** 의식화되지 않은 것이 몸이라는 형태로 이렇게 드러나 있다. 의식이 아주 정교하게 짜 맞춰지고 농축되면 현상계에서 몸으로 오식화되어 드러난다. 꽃이 원래 거기 있었던 건 아니다. 공기가 따뜻해지니까 꽃이라는 것이 오식화되어 나왔다. 지금 저 차도, 나무도, 하늘의 구름도 모두 의식이 뭉쳐져서 이렇게 드러난 것이다.\n\n그러니까 이제 어디가 아프면 우리는 마음속으로 빨리 나았으면 좋겠다고 바란다. 그런데 몸이 기억을 한다. 기억이라는 건 어떻게 보면 의식이 무의식화되는 것, 잠재의식 속에 내장되는 것이다. 그게 금방 없어질 수가 없다.\n\n나무", "source": "essay"}, {"id": "essay_747_a818d9d2a0", "text": "빨리 나았으면 좋겠다고 바란다. 그런데 몸이 기억을 한다. 기억이라는 건 어떻게 보면 의식이 무의식화되는 것, 잠재의식 속에 내장되는 것이다. 그게 금방 없어질 수가 없다.\n\n나무가 되기 위해서는 그 나무를 기억하고 있어야 한다. 나무가 갑자기 구름이 됐다 미림으로는 안 된다. 나무는 나무로서 자기를 지키려 한다. 그래서 나무에 상처가 나면 금방 낫지 않는 것이다. 우리 사람도 마찬가지다. 내가 나라는 정체성이나 습관이 쉽게 안 변하는 것, 그게 바로 **항상성** 때문이다.\n\n## 빨리 안 낫는 것이 고마운 이유\n\n허리가 아프게 되기까지는 아주 오래 걸렸을 것이다. 몸이 계속 아프다 아프다 아프다 하고 기억을 쌓아온 것이다. 그 기억이 농축되어 쌓인 것이 지금 이 몸이다.\n\n그런데 여기서 뒤집어 생각해볼 수 있다. 빨리 안 낫는 게 **고마운 것**이라고. 왜냐하면 그 힘 때문에 내가 나로서 있으니까. 항상성의 힘이 있기 때문에 자고 일어나도 나는 나로 유지된다. 아픈 것만 고르고 건강한 것만 유지할 수는 없다. 그 힘은 전체를 유지한다. 아프면 아픈 대로, 그것도 포함해서 자기를 계속 유지해야 하니까.\n\n그러면 기도를 해서 바꿀 수 있을까. 굿을 해서 기적을 바라는 것이 그게 되겠냐는 거다. 물론 그 안에 어떤 의미는 있다. 강력하게 원하는 바를 무의식에 주입하는 효과랄까. 긍정적인 에너지가 전달되어 조금은 작용하기도 하겠지.", "source": "essay"}, {"id": "essay_748_5b5f1327ea", "text": "적을 바라는 것이 그게 되겠냐는 거다. 물론 그 안에 어떤 의미는 있다. 강력하게 원하는 바를 무의식에 주입하는 효과랄까. 긍정적인 에너지가 전달되어 조금은 작용하기도 하겠지.\n\n## 고통은 우주가 보내는 친절이다\n\n그런데 더 근본적으로 보면, 내 앞에 나타난 것 자체가 사실은 **신의 선물**일 수 있다. 고통이 너무 길어지는 건 힘들다. 그런데 왜 길어지냐면, 그 선물을 안 받으려 하기 때문이다. 거부하려는 힘 때문에 오히려 그것을 더 강화시킨다. 계속 그것과 싸우니까.\n\n이원성에서 헤매고 있는 것을 빨리 통과하게끔 도와주는 것이 우리에게 고통으로 온다. 그래서 고통은 선물이다. 그런데 사람들은 자기를 만족시켜주는 것을 선물이라고 생각한다. ego를 만족시켜주는 것을 선물이라고 여긴다. 고통은 그 반대쪽에서 온다. ego를 깨주는 쪽으로 온다.\n\n고통이 크면 클수록 빨리 깨고 싶어진다. 그게 두드리는 것이다. 꿈에서 깨라고. 바이런 케이트나 에크하르트 톨레 같은 사람도 너무 고통스러우니까 깨어난 것이다. 어떻게 할 수가 없었으니까. 석가모니 부처님도 마찬가지다. 6년 고행을 하고 완전히 피고를 상대받도록 수행했는데 안 됐다. 거의 죽을 지경에 갔는데 죽을 먹고 나서야 깨어났다.\n\n수행하는 사람들은 그런 고통을 적극적으로 선물로 활용해서 깨어나려 한다. 빨리 드러내게 해주는 것이다. **고통으로 통해서 무의식이 의식화된다.** 아픔", "source": "essay"}, {"id": "essay_749_a22fd30edb", "text": "먹고 나서야 깨어났다.\n\n수행하는 사람들은 그런 고통을 적극적으로 선물로 활용해서 깨어나려 한다. 빨리 드러내게 해주는 것이다. **고통으로 통해서 무의식이 의식화된다.** 아픔으로 통해서 그것이 드러나면서 이원성으로부터 해방이 시작된다. 너무 지긋지긋하고 지겨우니까. 차라리 죽어버렸으면 좋겠다는 생각이 들 만큼 지긋지긋해지면, 그때 그 자아의 감옥에서 벗어나기 시작한다.\n\n## 차처럼 관리하되, 차가 주인이 돼선 안 된다\n\n이 몸을 어차피 쓰고 살아야 한다. 내 차가 나는 아니지만, 차를 막 굴리고 관리도 안 하면 안 된다. 세차도 가끔 해줘야 되고 오일도 갈아줘야 된다. 몸도 그런 정도다. 그런데 **이 몸이 주인이 돼버리면 안 된다**는 것이다.\n\n몸도 그 몸만의 경로가 있다. 길을 가고 있다. 그걸 내 의지로 어떻게 할 수 있을 것 같지만, 그게 그렇게 어떻게 안 된다. 몸도 신의 선물이기 때문에.\n\n이 육신에 대한 집착, 이것을 나라고 털끝같이 믿는 것. 그 집착을 내려놓게 하려고, 온갖 고통이 오는 것이다. 사실 어떻게 보면.\n\n#항상성 #몸은기억이다 #신의선물 #고통과수용 #올셀프\n\n--- (구분선)\n\n[파일명: 항시존재_드러남_수필.md]\n\n### **항시존재_드러남_수필**\n\n#### **눈이 없어도 내가 있다**\n\n눈을 감아보자. 눈이 없다고 생각해보자. 보이는 게 없다. 그래도 내가 있다는 건 안다. 귀가 없어서", "source": "essay"}, {"id": "essay_750_4220cab885", "text": "### **항시존재_드러남_수필**\n\n#### **눈이 없어도 내가 있다**\n\n눈을 감아보자. 눈이 없다고 생각해보자. 보이는 게 없다. 그래도 내가 있다는 건 안다. 귀가 없어서 소리를 못 들어도, 냄새를 못 맡아도, 몸의 느낌이 없어도. 그래도 내가 있다는 건 안다. 깊은 잠에 빠졌을 때는 꿈도 없다. 뇌가 거의 활동하지 않는 그 시간, 보이는 것도 들리는 것도 없다. 그래도 내가 없었다고 할 수 있을까. 아침에 깨어나면 내가 있구나 하고 안다. 깨어났을 때 갑자기 무(無)에서 나타난 것인가. 없는 것에서는 나타날 수 없다. 없는 건 없는 것이니까. 모습을 바꿀 수는 있을지언정, 없었던 적은 없었을 것이다. **항시 있었던 것이다.** 그냥 드러났다 사라졌다 했을 뿐이다.\n\n---\n\n#### **거울과 드러남**\n\n거울을 보면 내 모습이 드러난다. 거울을 안 보면 내가 어떻게 생겼는지 모른다. 그러나 모르는 것뿐이지, 없는 게 아니다. 이 세상이 거울이라고 보면 이렇다. 세상이 드러나니까 내가 살아있구나 하고 확인이 된다. 잠을 자거나, 기절을 하거나, 죽으면 세상이라는 거울이 치워지는 것이다. 그러면 확인이 안 된다. 없는 게 아니라, 확인이 안 될 뿐이다. 아침에 깨어나면 세상이 다시 드러나고, 소리가 들리고, 눈을 뜨면 세상이 보인다. 내가 있다는 것이 점점 더 확실해진다. 기절을 했다가 깨어나면 또 있다. 없었다가 나타난", "source": "essay"}, {"id": "essay_751_8934a6b2b9", "text": "이다. 아침에 깨어나면 세상이 다시 드러나고, 소리가 들리고, 눈을 뜨면 세상이 보인다. 내가 있다는 것이 점점 더 확실해진다. 기절을 했다가 깨어나면 또 있다. 없었다가 나타난 게 아니라, 있었는데 확인이 안 됐다가 다시 확인이 된 것이다.\n\n---\n\n#### **개체성과 둘이 아님**\n\n몸에서 확인이 되는 나는 **개체성**을 갖는다. 그런데 몸이 없어지면 개체성은 없다. 몸을 통해 확인되는 나와, 그 바탕이 되는 것은 다르다. 그 바탕은 나로 드러날 수도 있고, 당신으로 드러날 수도 있고, 누구로든 드러날 수 있다. 나눠지지 않았기 때문이다. 마음은 **둘이 아니다.** 지금 환하게 알고 보고 듣고 하는 이것이 어디 간 게 아니다. **드러남**이 있으면 거기서 나타난다. 드러나지 않았을 때는 모를 뿐이다.\n\n---\n\n#### **화면과 본성**\n\n모니터 화면을 생각해보자. 전기가 들어와서 상이 맺혀야 이게 쓸 수 있는 화면이구나 하고 안다. 꺼져 있으면 저게 뭔지 모른다. 고장 난 건지, 켜질 수 있는 건지, 그냥 새카만 무언가인지 알 수 없다. 그렇다고 없는 것은 아니다. **비활성화되어 있을 뿐이다. 언제든지 스탠바이가 되어 있다.** 우리 본성이 그렇다. 항시 스탠바이가 되어 있다. 전기가 들어오면 반짝하고 빛난다. 세상과 삶이 동시에 반짝하고 나타나는 것이다. 화면이 꺼지면 깜깜해지는 것이고. 그렇다고 없는 게 아니다.", "source": "essay"}, {"id": "essay_752_4b1d07433d", "text": "그렇다. 항시 스탠바이가 되어 있다. 전기가 들어오면 반짝하고 빛난다. 세상과 삶이 동시에 반짝하고 나타나는 것이다. 화면이 꺼지면 깜깜해지는 것이고. 그렇다고 없는 게 아니다. 보였다 하면, 들렸다 하면, 화면이 켜진 것이다. 환하게 알아졌다는 것이다. 화면이 꺼지면 깜깜해지는 것이고. **없는 게 아니다.**\n\n---\n\n#### **화면에는 늙고 죽음이 없다**\n\n삶과 죽음, 윤회를 생각할 때 육신의 관점에서 보면 윤회가 있을 수 있다. 화면에 스토리가 켜지고, 한 인물이 나타나 살다가 죽고, 또 다른 몸을 받고 태어나는 것이다. 화면에 상으로 그렇게 나타나는 것이다. 그런데 **화면 자체에는 늙고 죽음이 없다.** 우리가 아는 본성은 어렸을 때도 이렇게 알았고, 지금도 이렇게 알고 있다. 나이를 먹어도, 죽었다가 다시 태어나도 이렇게 알 것이다. 변화가 없다. 계속 이렇게 있다. 본성에는 윤회가 없다. 있다 없다를 떠난 것이다. 있을 때 있고, 없을 때 없는 것이다. 그렇지만 없지는 있었다. **항시 있었다.** 그러니까 나타나는 것이다. 나타났다 없어졌다 할 수 있는 것은, 그것이 항시 있었기 때문이다. #항시존재 #드러남 #본성 #올셀프 #불이\n\n--- (구분선)\n\n[파일명: 해석_고통성장_수필.md]\n\n### **해석_고통성장_수필**\n\n#### **상황은 고정돼 있지만 해석은 바꿀 수 있다**\n\n직장에서 상사가 나를 좋", "source": "essay"}, {"id": "essay_753_6a53d9b4e0", "text": "--- (구분선)\n\n[파일명: 해석_고통성장_수필.md]\n\n### **해석_고통성장_수필**\n\n#### **상황은 고정돼 있지만 해석은 바꿀 수 있다**\n\n직장에서 상사가 나를 좋게 대하거나 나쁘게 대하거나, 퇴직금을 받아야 할 상황인데 일이 자꾸 꼬이거나, 이런 상황들이 삶에서 벌어진다. 그런데 이것을 내가 어떻게 해석하느냐에 따라 나한테 좋게 작용할 수도 있고 나쁘게 작용할 수도 있다. **상황은 바꿀 수 없지만, 해석은 얼마든지 바꿀 수 있다.** 이것이 코칭에서도 아주 유용하게 쓰인다. \"새롭게 해석해 봐라\", \"다르게 해석하면 어떨 것 같냐?\", \"그 상황을 다른 각도로 해석해 볼 수 있지 않겠냐?\" 이런 질문들이 가능한 것은 해석이 고정된 것이 아니기 때문이다. 그런데 여기서 핵심을 짚어야 한다. **사실이 나를 힘들게 하는 게 아니고, 해석이 힘들게 하는 것이다.** 힘든 일이 있었다는 것은 그냥 일이 있은 것이다. 그것을 내가 해석해서, 그 해석에 따라 올라오는 감정 때문에 힘든 것이다.\n\n---\n\n#### **1차 화살과 2차 화살**\n\n불교에서 말하는 두 개의 화살이 있다. 그때 아픔을 겪었다면 그건 변하지 않는다. 그 아픔을 겪었다는 것이 **1차 화살**이다. 하지만 그것을 해석하는 것은 **2차 화살**이다. 그 2차 화살을 내가 계속 나한테 날리고 있는 것이다. 그것 때문에 고통을 계속 받고 있는 것이다. 그", "source": "essay"}, {"id": "essay_754_10df888196", "text": "**1차 화살**이다. 하지만 그것을 해석하는 것은 **2차 화살**이다. 그 2차 화살을 내가 계속 나한테 날리고 있는 것이다. 그것 때문에 고통을 계속 받고 있는 것이다. 그래서 해석을 바꿈으로써 지금의 상황을, 지금 선택할 수 있는 상황을 바꿀 수 있다. 새로운 액션을 취할 수 있는 선택을 할 수 있게 된다. 반대로 잘못된 해석에 계속 매인다고 하면, 그것이 조건 지어짐이다. 조건 지어지면 내가 묶여있는 것이고 갇혀있는 것이다. 그것을 풀려면 해석을 바꿀 수밖에 없다. **새로운 조건을 짓는 것이다. 내가 원하는 조건으로, 나의 성장 쪽으로 조건을 바꾸는 것이다.**\n\n---\n\n#### **포지션을 옮겨주는 것**\n\n지금 힘들게 느껴지는 상황에서 \"이걸 힘들지 않게 해석하라\"는 것은 말이 안 된다. 그런 식으로 해석을 바꾸라는 이야기가 아니다. **포지션을 내가 옮겨주는 것이다.** 방법은 이렇다. 새로운 목표를 설정하게 한다. 니가 원하는 목표가 무엇인지, 그렇게 됐다고 가정하고, 그 상황에서 과거를 다시 해석해 본다. 그러면 지금 상황에서는 그렇게밖에 볼 수 없었던 것이 새롭게 보인다. 나의 시선과 시각을 바꿔주는 것이다. 내가 원하고자 하는 목표나 목적에 도달했을 때의 위치로 시각을 올려놓는다. 그것은 분명히 지금보다 높은 상태다. 그 위치에서 다시 보면 달리 보인다. \"결과적으로 나를 성장시키려고 그런 것이구나\", \"나", "source": "essay"}, {"id": "essay_755_561197e9e8", "text": "나 목적에 도달했을 때의 위치로 시각을 올려놓는다. 그것은 분명히 지금보다 높은 상태다. 그 위치에서 다시 보면 달리 보인다. \"결과적으로 나를 성장시키려고 그런 것이구나\", \"나의 이 목표를 이루게 하기 위해서 내가 이런 과정을 겪었구나.\" 이렇게 새로운 시각으로 상황을 보게 된다. 사람이 살면서 지금 상황이 좋으면 과거의 일을 좋게 해석하고, 지금 상황이 안 좋으면 과거를 탓하는 경향이 있다. 그 원리를 미래 쪽으로 적용하는 것이다. **목표가 이루어진 상황에서 지금을 바라보면 지금의 어려움은 새롭게 보인다.** 지금은 갈팡질팡하는 이 상황이 미래의 그 자리에서 보면 오히려 나한테 약이 됐던 것이 된다. 코칭의 GROW 모델에서 골(Goal)이 목표 설정이다. 골이 들어간 상황에서, 골인이 된 상황에서 지금을 해석해 보는 것이다. 헬리콥터 시각에서 지금 이 상황을 보는 것이다.\n\n---\n\n#### **감정과 해석은 다른 문제다**\n\n힘들다는 것은 결국 감정 때문이다. 힘든 일이 있었다는 것은 그냥 일이 있은 것이다. 그것을 해석해서 그 해석에 따라 올라오는 감정 때문에 힘든 것이다. 목표에 도달한 상황에서 본다면 지금의 감정은 아닌 것이다. **감정을 배제하고 이성적으로 상황을 바라보게 된다.** 감정을 지금 여기 놔두고 내가 새로운 위치로 가서 새롭게 각도를 보는 것이다. 그 새로운 해석에서는 감정이 배제된다. 편견이나 선입관", "source": "essay"}, {"id": "essay_756_8b177218cd", "text": "제하고 이성적으로 상황을 바라보게 된다.** 감정을 지금 여기 놔두고 내가 새로운 위치로 가서 새롭게 각도를 보는 것이다. 그 새로운 해석에서는 감정이 배제된다. 편견이나 선입관 없이 볼 수 있게 된다. 이 감정 때문에 해석의 왜곡이 생기는 것이니까. 지금 상황에서 감정을 배제하고 본다는 게 쉽지 않다. 감정이 나를 지배해 버렸으니까. 그러면 감정에서 벗어나야 하는데, **기왕이면 내가 원하는 목적지로 벗어나자는 것이다.** 부정적으로 볼 필요가 없다. 내가 원하는 상황에서 보면 상황을 객관적이고 이성적으로 판단할 수 있게 된다. 글을 쓸 때의 감정과 해석할 때의 감정은 다른 문제다. 나를 표현한다는 것은 결국 내가 느끼는 감정이고 느껴지는 느낌이다. 그것이 나다. 원초적인 나다. 진짜 나를 표현하려면 그때 느끼는 느낌과 감정이 생생하게 살아있어야 한다. 글을 쓸 때는. 그것이 시가 되고 수필이 되고 소설이 된다. 그런데 그 감정과 느낌이 내 스스로 어떤 상황을 바라볼 때는 렌즈로 작용해서 왜곡되게 바라보게 할 수 있다. **글을 써서 나를 표현할 때의 감정과, 어떤 상황에 처해서 고민하고 힘들어 할 때의 감정과 느낌은 다른 문제다.** 전자는 있는 그대로의 나를 드러내는 것이고, 후자는 해석의 오류를 만들어낼 수 있다.\n\n---\n\n#### **사실 자체에 좋고 나쁨은 없다**\n\n결국에는 다 해석의 오류, 인식의 오류다. 인생에 있어", "source": "essay"}, {"id": "essay_757_551720bc7f", "text": "나를 드러내는 것이고, 후자는 해석의 오류를 만들어낼 수 있다.\n\n---\n\n#### **사실 자체에 좋고 나쁨은 없다**\n\n결국에는 다 해석의 오류, 인식의 오류다. 인생에 있어서 좋고 나쁨은 없다. 그냥 그런 일이 펼쳐지는 것이다. 자연에도 좋고 나쁨은 없다. 그것을 자기 입장에서 \"이건 좋은 상황이야\", \"나쁜 상황이야\" 하고 해석하는 것뿐이다. 우리가 객관적으로 안다는 것은 없다. 지금 내 각도, 내 시선에서 보는 것뿐이다. 그것을 다른 각도에서 보면 전혀 다르게 보인다. 또 다른 입장이 되면 또 전혀 다르게 보인다. 잘못 해석한 것이라기보다, **편향되게 보는 것이다.** 인간은 그럴 수밖에 없다. 눈이 앞으로만 향해 있으니까. 무림의 고수 중에 아무리 현란한 무술을 가진 사람도 평생 주먹 하나만 수련한 사람을 못 당한다고 한다. 선에서도 일지선사는 손가락 하나로, 덕산의 방망이 선사는 방망이 하나로 모든 것을 다 제도했다. 많은 것을 할 필요가 없다. **해석 하나로 많은 것을 다 해결할 수 있다.** 결국 다 그것 때문이니까. 괜히 상황을 나쁘게 해석한 것을 머릿속에 담고 고통을 받을 필요가 없다. 해석을 잘해서 나한테 계속 화살을 쏘지 않는 것, 어떻게 보면 그것이 가장 나를 사랑하는 방법이기도 하다. 수행과 명상이 결국 고정관념과 편견의 틀을 깨는 것이라면, 해석의 전환은 그 수행이 삶에서 작동하는 구체적인 방식이다.", "source": "essay"}, {"id": "essay_758_c936a9675e", "text": ", 어떻게 보면 그것이 가장 나를 사랑하는 방법이기도 하다. 수행과 명상이 결국 고정관념과 편견의 틀을 깨는 것이라면, 해석의 전환은 그 수행이 삶에서 작동하는 구체적인 방식이다. #해석 #고통 #성장 #코칭 #감정\n\n--- (구분선)\n\n[파일명: 해석의해석_오류의구조_수필.md]\n\n### **해석의해석_왜곡의구조_수필**\n\n#### **해석이 해석을 한다**\n\n누군가가 어떤 일을 경험했다. 그 사람이 그 경험에 해석을 붙였다. 나는 그 해석을 들었다. 그리고 나는 그 해석에 다시 나만의 감정을 입혀 또 다른 해석을 만든다. **해석이 해석을 하고 있는 것이다.** 거기서 오류가 난다. 나는 그 당사자를 모른다. 그 사람이 겪은 상황도 모른다. 그 사람이 어떤 의도를 가졌는지도 모른다. 그런데도 그 사람이 나쁜 놈인지 좋은 놈인지를 판단한다. 그것도 이미 한 겹 왜곡된 남의 해석을 통해서. 더 나아가 과거부터 현재까지 일련의 사건들을 내 머릿속에서 연결하고, 미래도 이럴 것이라고 스토리를 짓는다. 온갖 소설을 쓰는 것이다. 그 사람과는 전혀 관계도 없는 내가, 그 이야기를 듣고 괴롭다. 갖다 붙였기 때문이다.\n\n---\n\n#### **색안경 위에 색안경**\n\n그 사람이 느낀 감정의 렌즈를 나의 렌즈로 교체할 필요가 없다. 그 사람의 왜곡된 렌즈를 내 렌즈로 삼아 상황을 판단할 필요가 없다. 하루에도 수만 가지 생각이 스쳐간다. 거기에", "source": "essay"}, {"id": "essay_759_19cae8c239", "text": "그 사람이 느낀 감정의 렌즈를 나의 렌즈로 교체할 필요가 없다. 그 사람의 왜곡된 렌즈를 내 렌즈로 삼아 상황을 판단할 필요가 없다. 하루에도 수만 가지 생각이 스쳐간다. 거기에 들었던 이야기에 색안경을 낀 것을 내 색안경까지 끼고, 온갖 상상과 공상으로 이야기를 계속 짓는다. 그러면서 괴롭고, 에너지를 소진한다. 사람이 흔히 그렇게 산다. 그 사람도 바뀐다. 그때그때 생각이 바뀌고, 의도도 바뀐다. 안 바뀌면 이상한 것이다. 내가 판단한 그 사람은 이미 그 사람이 아닐 수 있다.\n\n---\n\n#### **구분해야 할 것**\n\n내가 직접 경험한 것인가, 아니면 누군가의 해석을 내가 다시 해석하고 있는 것인가. **이것을 구분할 수 있어야 한다.** 내가 직접 경험한 것이라면 그나마 내가 다룰 수 있다. 그러나 누군가의 해석을 들은 것이라면, 그것은 사실 나와 관계없다. 내가 판단할 수 있는 것이 아니다. 할 수 있는 것은 이것이다. 그 사람의 감정과 느낌을 위로하는 것. 새로운 해석을 할 수 있도록 도와주는 것. 거기까지다. 나의 개인적인 잣대를 거기에 들이댈 필요가 없다. 나와 관련된 것만 해석하면 된다. #해석의해석 #인지오류 #왜곡 #관점 #올셀프\n\n--- (구분선)\n\n[파일명: 해석의힘_원고_수필.md]\n\n### **해석의힘_원고_수필**\n\n인생의 한복판에서 우리는 수많은 상황과 마주한다. 직장에서 그 사람, 직장 상사가 나를", "source": "essay"}, {"id": "essay_760_9821c03067", "text": "- (구분선)\n\n[파일명: 해석의힘_원고_수필.md]\n\n### **해석의힘_원고_수필**\n\n인생의 한복판에서 우리는 수많은 상황과 마주한다. 직장에서 그 사람, 직장 상사가 나를 어떻게 대하느냐의 문제부터 퇴직금을 앞두고 일이 꼬이는 난감한 상황에 이르기까지, 삶은 예측 불가능한 사건들로 가득하다. 중요한 것은 상황 자체가 아니다. 우리가 그 상황을 어떻게 해석하느냐에 따라 결과가 완전히 달라진다는 사실이다. **상황은 바꿀 수 없어도 해석은 바꿀 수 있다.** 가령 퇴직금을 받지 못하게 될 위기에 처했다고 가정해보자. 이 사실 자체는 변하지 않는 '1차 화살'이다. 하지만 이것을 '세상이 나를 버렸다' 혹은 '나는 늘 운이 없다'고 해석하며 고통받는 것은 내가 스스로에게 쏘는 '2차 화살'과 같다. 사실이 나를 힘들게 하는 것이 아니라, 그 사실에 대한 나의 고정된 해석이 고통을 지속시키는 것이다. 해석이 나를 족쇄처럼 묶어두는 **'조건 지어짐'**이 되어버린다. 우리가 겪는 괴로움의 근원은 결국 인식의 오류, 즉 해석의 오류에 있다. 자연에는 좋고 나쁨이 없듯이, 우리 삶에 펼쳐지는 일들 역시 본질적으로는 중립적일 수 있다. 다만 내가 나의 입장과 시선에서 그것을 '나쁜 상황'이라 규정하고, 그 부정적인 해석을 머릿속에 담고 있으면서 고통을 자처하는 것이다. 따라서 이 족쇄를 풀고 새로운 삶의 선택지를 만들기 위해서는, 그 해석", "source": "essay"}, {"id": "essay_761_ceb34df2b5", "text": "에서 그것을 '나쁜 상황'이라 규정하고, 그 부정적인 해석을 머릿속에 담고 있으면서 고통을 자처하는 것이다. 따라서 이 족쇄를 풀고 새로운 삶의 선택지를 만들기 위해서는, 그 해석의 틀을 깨고 새로운 각도에서 바라보는 것이 필수적이다. 해석을 바꾸기 위한 가장 강력한 방법은 '목표 설정'을 통해 시각의 위치를 옮기는 것이다. 현재의 고통을 겪고 있는 내 위치에서 아무리 '힘들지 않게 해석해야지'라고 되뇌어봤자 그 진정성은 와닿지 않는다. 지금 힘들게 느껴지는 감정이 나를 지배하고 있기 때문이다. 필요한 것은 **'헬리콥터 시각'**이다. 목표를 달성한 미래의 성공적인 위치로 올라가 현재의 상황을 내려다보는 것이다. 내가 원하는 목표를 성취한 미래의 시점에서 과거를 되돌아보면, 현재의 고통스럽던 경험은 완전히 새롭게 보인다. 그때의 힘든 상황이 '나를 성장시키기 위해 반드시 겪어야 했던 과정', '나의 이 목표를 이루게 하기 위한 일련의 과정'으로 재해석된다. 시각 자체가 높아지고 위치가 바뀌었으므로, 현재의 부정적인 감정은 배제된 채 이성적이고 객관적으로 상황을 바라볼 수 있게 된다. 감정이 렌즈처럼 작용하여 상황을 왜곡시키던 편향된 시각에서 벗어나는 것이다. 이러한 새로운 해석은 우리에게 상황을 이겨나갈 수 있는 힘을 부여한다. 수많은 현란한 무술을 가진 사람보다 평생 주먹 정권 내지르는 것 하나만 수련한 고수가 그 사람의 주먹 하", "source": "essay"}, {"id": "essay_762_a3e7d9ff08", "text": ". 이러한 새로운 해석은 우리에게 상황을 이겨나갈 수 있는 힘을 부여한다. 수많은 현란한 무술을 가진 사람보다 평생 주먹 정권 내지르는 것 하나만 수련한 고수가 그 사람의 주먹 하나로 모든 것을 이기듯이, 상황 해석의 힘 하나만 제대로 갖춘다면 인생의 많은 문제들을 해결할 수 있다. 우리가 일상생활의 기록을 남길 때도, 단순히 사실을 적시하는 신문 기사처럼 기록할 것이 아니라, 그 상황을 겪으며 느낀 감정과 느낌, 그리고 궁극적으로 그 상황을 어떻게 새로운 성장의 동력으로 해석했는지를 담아내야 한다. 결국 감정을 있는 그대로 생생하게 표현하는 것은 시나 수필을 쓸 때 '나'를 표현하는 고유함이 되지만, 어떤 상황을 내 스스로가 인식하고 해석할 때에는 그 감정에 치우쳐 왜곡된 판단을 내릴 위험이 있다. 코칭이나 명상 같은 수행이 필요한 이유도 바로 여기에 있다. 고정관념과 편견을 깨고, 내가 원하는 목표라는 새로운 조건을 짓고, 그 유리한 위치에서 현재를 다시 바라보는 지혜로운 해석이야말로, 내 마음을 보호하고 나를 가장 사랑하는 방법이자 성장의 동력을 확보하는 핵심이 될 것이다. #해석 #조건지어짐 #헬리콥터시각 #1차화살2차화살 #코칭\n\n--- (구분선)\n\n[파일명: 허구의나_저항없는수용_수필.md]\n\n### **허구의나_저항없는수용_수필**\n\n#### **기억이라는 대상**\n\n지나간 일이 후회스럽게 떠오를 때, 나는 그 일을 상대", "source": "essay"}, {"id": "essay_763_e87c55a176", "text": "[파일명: 허구의나_저항없는수용_수필.md]\n\n### **허구의나_저항없는수용_수필**\n\n#### **기억이라는 대상**\n\n지나간 일이 후회스럽게 떠오를 때, 나는 그 일을 상대하고 있다고 생각한다. 그런데 그 일은 이미 없다. 그 일은 기억 속에만 있다. 내가 지금 상대하고 있는 것은 그 일이 아니라 **기억**이다. 기억은 실제로 일어난 일이 아니다. 그런데 나는 그 기억을 가지고 후회하고, 해석하고, 합리화하려 한다. '내가 왜 그랬을까'에서 시작해서 '그래도 나는 그 정도 일은 이해할 수 있는 넓은 사람이야'로 방향을 튼다. 이것이 자기 합리화다. 이솝우화의 여우가 닿지 않는 포도를 두고 '어차피 신포도일 거야'라고 말하는 것처럼, 매여 있는 상태에서 벗어나기 위해 다른 쪽을 잡는 것이다. 그런데 타겟을 바꿨다고 해서 집착이 사라진 것은 아니다. 원래의 기억에 끌렸다는 것도 집착이지만, **해소시켜야 된다는 것도 집착**이다. 불편함에서 벗어나려는 그 움직임 자체가 이미 그 불편함에 매여 있음을 전제로 한다. 어떤 기억이 유독 크게 다가오는 것은 그 기억이 지금 가장 강한 자극이기 때문이다. 몸 어딘가가 심하게 아프면 그 아픔이 강하게 치고 올라와 딴 생각이 별것 아닌 것이 된다. 배가 극도로 고파도 마찬가지다. 그 강한 자극이 해소되면, 아까의 기억이 다시 크게 돌아온다. 자극의 강도에 따라 의식의 중심이 이동할 뿐이다.", "source": "essay"}, {"id": "essay_764_e6bcddc4a5", "text": "딴 생각이 별것 아닌 것이 된다. 배가 극도로 고파도 마찬가지다. 그 강한 자극이 해소되면, 아까의 기억이 다시 크게 돌아온다. 자극의 강도에 따라 의식의 중심이 이동할 뿐이다. 여기서 주목할 것은, 이 모든 과정에 **'나'가 있다는 전제**가 밑바탕에 깔려 있다는 것이다. 불편한 나가 있고, 그 나가 편안한 쪽으로 이동해야 한다는 전제. 그 나가 납득할 만한 해석을 세워야 한다는 전제. 이것이 은연중에, 의식하지 않아도, 작동하고 있다. 그런데 그 나는 실제로 존재하는가? 나는 지금 이렇게 보이고 들리고 느껴지는 전체 그 자체다. 원래 나는 아무 스크래치도 없는 통으로 있는 것인데, 기억 하나가 떠올랐다는 것은 나머지는 지금 그게 아니라는 뜻이다. 그 기억이 지금 강하게 붙잡고 있는 것뿐이다. 괴로움이 있을 때 나는 보통 그것을 없애거나 다른 것으로 대체하려 한다. 그런데 만약 괴로움만 있다면 어떻게 될까? 괴로움만 있다면, 괴로움 아닌 곳으로 갈 수가 없다. 비집고 들어올 틈도, 빠져나갈 틈도 없다. 그러면 괴로움이라는 것 자체가 성립하지 않는다. 괴로움은 괴로움 아닌 것이 있을 때 괴로움이 된다. 둘이 있어야 괴로움이 괴로움으로 인식된다. 이것을 꺼뜨리려 하는 한, 나는 괴로움을 계속 괴로움으로 인정하고 있는 것이다. 괴로움으로부터 벗어나려 하는 바로 그 움직임이 괴로움을 살려두는 것이다. 반대로, 괴로움을 **옴팍 받아들여*", "source": "essay"}, {"id": "essay_765_2a42c86b76", "text": "리려 하는 한, 나는 괴로움을 계속 괴로움으로 인정하고 있는 것이다. 괴로움으로부터 벗어나려 하는 바로 그 움직임이 괴로움을 살려두는 것이다. 반대로, 괴로움을 **옴팍 받아들여** 버리면—그냥 '그래, 괴로워' 하고 거기에 그냥 있어 버리면—괴로움을 괴로움으로 계속 유지시켜 주던 조건 자체가 풀려버린다. 내가 풀려나는 것이 아니다. 내가 벗어나는 것이 아니다. 그 상대성의 조건 자체가 해소되는 것이다. 못 깨달았다는 것도 마찬가지다. '나는 아직 못 깨달았어' 하고 그걸 옴팍 받아들이면, 못 깨달았다는 것이 깨달음과 못 깨달음의 상대성에서 풀려 버린다. 그냥 아무것도 아니게 된다.\n\n---\n\n#### **삶을 예스(Yes) 한다는 것**\n\n지혜로운 이들이 말하는 '물 흐르듯 살라'는 것은 무감각하게 살라는 말이 아니다. 물은 높은 곳에서 낮은 곳으로 그냥 흐른다. 이쪽으로 가면 안 된다, 저 장애물이 싫다—이런 것 없이. 바람이 불면 부는 대로 흔들린다. 내가 그것에 저항한다고 해서 물의 흐름이 바뀌지는 않는다. 잠깐 방향이 틀어질 수는 있지만 결국 흘러간다. 내가 저항하느라 용을 쓰는 동안, 흐름은 어차피 그냥 간다. **연기적으로** 이 세상의 일은 전체적으로 그렇게 가는 것인데, 내 하나의 의도가 거기에 반영되지 않는 경우가 대부분이다. 괜히 나만 용을 쓰는 꼴이다. 기차를 타고 가면서 창밖의 경치를 보는 것과 같다. 좋은 경", "source": "essay"}, {"id": "essay_766_16a76da625", "text": "체적으로 그렇게 가는 것인데, 내 하나의 의도가 거기에 반영되지 않는 경우가 대부분이다. 괜히 나만 용을 쓰는 꼴이다. 기차를 타고 가면서 창밖의 경치를 보는 것과 같다. 좋은 경치가 나오면 좋고, 거슬리는 풍경이 나오면 불편하다. 그런데 그 경치가 기차 안에 영향을 주는가? 경치가 아무리 바뀌어도 기차 안에는 아무 일도 없다. 이미 지나간 경치를 쫓아서 뒤칸으로 달려간들, 싫은 풍경을 피해 앞칸으로 도망친들—그 분별은 어느 칸에서도 따라온다. 분별이 경치에 있는 것이 아니라 나의 생각에 있기 때문이다. **삶을 예스(Yes) 해야 한다**는 것은 이것이다. 불편함이 올라오면 싫어하거나 없애려 하지 않고, 그냥 '그래, 한번 있어 보자' 하고 관심을 가지고 본다. 좋으면 좋음으로 있어 보고, 싫으면 싫음으로 있어 본다. 그것과 싸우지 않고 그냥 거기 있으면, 그것이 상대성에서 풀린다. 그것이 놓아버리는 것이다. '놔야지' 하고 놓으려는 것은 이미 놓지 못한 상태를 전제로 한다. '잊어야지' 하고 잊으려는 것도 아무 일 없는 깨끗한 상태를 원하는 것이다—그것도 또 다른 집착이다. 이 습관적인 경향, 무언가에 매였다가 거기서 벗어나려 다른 것을 잡는 이 패턴이 이른바 업(業)이다.\n\n---\n\n#### **허구의 나**\n\n**통으로 매 순간 그냥 통으로 존재할 수 있는 것**인데, '이런 상태로 바꿔야 하고', '시달리기 싫고', '편안한", "source": "essay"}, {"id": "essay_767_25ce2e56a0", "text": "이른바 업(業)이다.\n\n---\n\n#### **허구의 나**\n\n**통으로 매 순간 그냥 통으로 존재할 수 있는 것**인데, '이런 상태로 바꿔야 하고', '시달리기 싫고', '편안한 상태로 있고 싶어' 하는— **그 나라는 것이 허구**다. 불편함이 없다는 게 아니다. 불편함은 있다. 그런데 **불편한 그 나가 있다는 전제**가 문제다. 그 나가 편안한 쪽으로 이동해야 한다는 구도가 문제다. 불편하면 그냥 불편함과 하나가 되면 된다. 괴로우면 그냥 괴로움을 옴팍 받아들이면 된다. 그러면 그 나도 없어진다—그 허구의 나가. 해결해야 할 문제라면 옴팍 받아들이면서 해결된다. 해결 안 돼도 되는 것이라면 그냥 해결 안 돼도 된다. 좋아도 되고 싫어도 된다. 그것과 하나가 되면 된다. 양쪽에서 왔다 갔다 하는 **허상의 나**, 편하고자 하고 좋은 것만 찾으면서 편하지 않은 것을 거부하는 그 나— **걔가 항상 문제를 일으키는 것**이다. 지금 이 순간, 보이고 들리고 감각되는 이것들—이게 나다. 그것들은 매 찰나 바뀌지만 기차 안은 아무 일이 없다. 그 기억이, 그 감정이, 나에게 큰 영향을 줄 힘이 없다. 줄 힘이 있었다면 그때 이미 그렇게 됐을 것이다. 지금 내가 그것을 인지할 수 있다는 것 자체가 이미 아무 일도 없다는 증거다. 아무 일이 없기 때문에 인지가 가능한 것이다.\n\n괴로움을 괴로움으로 인정하는 한, 그것은 사라지지 않는다.", "source": "essay"}, {"id": "essay_768_220a84ca21", "text": "가 그것을 인지할 수 있다는 것 자체가 이미 아무 일도 없다는 증거다. 아무 일이 없기 때문에 인지가 가능한 것이다.\n\n괴로움을 괴로움으로 인정하는 한, 그것은 사라지지 않는다. 깨달음도 마찬가지다. 깨달음이 있고 없음이 상대적으로 서 있을 때, 나는 못 깨달은 쪽에 놓이게 된다. 그런데 못 깨달았다는 것을 옴팍 받아들여 버리면—깨달음과 못 깨달음의 상대성 자체가 풀려버린다. 내가 벗어나는 것이 아니다. 그냥 아무것도 아니게 된다.\n\n기차를 타고 가면서 창밖을 본다. 경치가 좋으면 좋고, 거슬리면 불편하다. 이미 지나간 경치를 쫓아 뒤칸으로 달려가도, 싫은 풍경을 피해 앞칸으로 도망쳐도—그 분별은 어느 칸에서도 따라온다. 분별이 경치에 있는 게 아니라 내 생각에 있기 때문이다. 내가 어느 칸에 있든 기차 안에는 아무 일도 없다. 지금 이 순간, 보이고 들리고 감각되는 이것들이 매 찰나 바뀐다는 것 자체가 아무 일도 없다는 증거다. 그 감정이, 그 기억이 나에게 큰 영향을 줄 힘이 없다. 줄 힘이 있었다면 그때 이미 그렇게 됐을 것이다. 지금 내가 그것을 인지할 수 있다는 것 자체가—아무 일이 없기 때문에 인지가 가능한 것이다.\n\n#기억과허구 #저항없는수용 #허구의나 #옴팍받아들임 #삶을예스하기\n\n--- (구분선)\n\n[파일명: 허상과실상_지금여기올셀프_수필.md]\n\n### **허상과실상_지금여기올셀프_수필**\n\n#### **불안이라는", "source": "essay"}, {"id": "essay_769_cb777f098b", "text": "허구의나 #옴팍받아들임 #삶을예스하기\n\n--- (구분선)\n\n[파일명: 허상과실상_지금여기올셀프_수필.md]\n\n### **허상과실상_지금여기올셀프_수필**\n\n#### **불안이라는 명사가 삶을 끌고 다닌다**\n\n눈을 뜨니 불안하다. 그러면 아침부터 불안이라는 명사가 나를 끌고 다닌다. 밥도 먹는 둥 마는 둥 한다. 삶의 많은 디테일이 그냥 흘러간다. 불안하고만 상대하느라고. 그런데 그 불안은 허상이다. 추상으로 명사화시켜버린 것이다. **허상과 상대하느라고 실상의 삶을 놓친다.** 천국도 마찬가지다. 죽어서야 천국에 갈 수 있다고 생각하지만, 천국이라는 추상을 깨버리면 지금 이 자체가 천국이다. 추상의 삶에서 빠져나와야 한다. 그래야 있는 그대로의 삶을 순수하고 온전하게 살 수 있다.\n\n---\n\n#### **실상은 만들어야 하는 것이 아니다**\n\n실상의 삶, 진실의 삶이 따로 있는 것이 아니다. 노력해서 만들어야 하는 것도 아니다. **추상으로 명사화시킨 삶에서 빠져나오면, 있는 그대로 이 상태가 온전한 삶이다.** 온전한 나가 되기 위해 알아차림을 일으키고 깨달아야 한다고 생각하면, 그것이 목표가 되고 조건이 된다. 그러면 지금 이 삶이 수단화돼버린다. 수단화된 삶은 흘려버리게 된다. 그렇게 해서 좋은 삶이 될 수 없다. **실상의 '지금 여기'가 온전한 나로 오는 것을 받아들였을 때,** 그때서야 비로소 에고를 놓아주게 되고 온전한", "source": "essay"}, {"id": "essay_770_91b26135c2", "text": "화된 삶은 흘려버리게 된다. 그렇게 해서 좋은 삶이 될 수 없다. **실상의 '지금 여기'가 온전한 나로 오는 것을 받아들였을 때,** 그때서야 비로소 에고를 놓아주게 되고 온전한 나로 살아가게 된다.\n\n추상의 삶에서 빠져나올 때 올셀프와 딱 맞닿는다. 통으로 나온다. 그것이 온전한 나다.\n\n---\n\n#### **발밑이나 제대로 봐라**\n\n깨닫는 것은 세수하다 코 만지는 것보다 쉽다고 했다. 왜냐하면 눈만 뜨면 된다. 눈앞이 그냥 진리다. 도(道)다. 뜰 앞의 잣나무, 똥 막대기. 깨달음이 무엇이냐고 물으면 이렇게 답한다. **발밑이나 제대로 봐.** 지금 선 자리가 이미 깨달음이다. 노력해서 어딘가를 가야 깨달음이 있는 게 아니다. 올셀프는 이것을 현대적인 의미로 풀어서 설명하는 것이다. 일반인들이 이해하기 쉽게. 삶을 온전하게 경험하는 것. 에고가 만족하는 어떤 대단한 상태가 아니라, **온전한 나로서 사는 것.** 그것이 올셀프가 추구하는 것이다. 생각 하나 바꾸기 나름이다. 먼 것이 아니다. 지금 여기에 이미 있다. #올셀프 #지금여기 #허상과실상 #뜰앞의잣나무 #추상명사\n\n--- (구분선)\n\n[파일명: 헤쳐나가기에서_펼침으로_수필.md]\n\n### 헤쳐나가기에서_펼침으로**_수필**\n\n#### **헤쳐나가기에서 펼쳐나가기로**\n\n그동안은 헤쳐나가기 바빴다. 먹고살고, 빚 갚고, 아이들 키우고. 그렇게 버텨왔다. 그런데 이제는", "source": "essay"}, {"id": "essay_771_62303c8fc0", "text": "쳐나가기에서_펼침으로**_수필**\n\n#### **헤쳐나가기에서 펼쳐나가기로**\n\n그동안은 헤쳐나가기 바빴다. 먹고살고, 빚 갚고, 아이들 키우고. 그렇게 버텨왔다. 그런데 이제는 펼쳐나가면서 살 수 있다. 헤쳐나가기와 펼쳐나가기는 다르다. 하나는 생존이고, 하나는 삶이다. 내공이 쌓여야 뜻을 펼칠 수 있다고 한다. 살아온 노하우, 경험, 연륜, 지혜. 그것이 켜켜이 쌓인 다음에야 드러나기 시작한다. **그러니 지금이 적기다.**\n\n---\n\n#### **돈은 에너지다**\n\n'어떻게 하면 잘 벌지'라고 생각하면, 지금 못 벌고 있다는 것을 전제한다. 결핍을 전제하는 것이다. 그 생각이 결핍을 만든다. 반대로 '어떻게 하면 잘 쓸까'라고 생각하면, 이미 있다는 것을 전제한다. **돈은 에너지다. 흐름이다.** 잘 쓰면 잘 들어온다. 돈에 대한 가치 신념을 점검해야 한다. '부자는 나쁜 사람이다', '돈은 더러운 것이다' — 이런 신념이 돈을 막는다. 부자는 다른 사람들에게 많은 가치를 제공했기 때문에 그만큼 가진 것이다. 돈은 생명을 살리는 수단이다. 가족을 먹이고 입히고, 남도 도울 수 있는 것이 돈이다. 멋지게 쓰고 싶다는 생각이 돈을 불러온다.\n\n---\n\n##### **돈을 잘 쓰면 도울 수 있다**\n\n#### **원래는 부자가 되면 어려운 사람을 돕겠다고 생각했다. 그런데 생각해보니 꼭 그렇지 않았다. 지금 할 수 있는 일이 있다.", "source": "essay"}, {"id": "essay_772_d43609cd80", "text": "#### **돈을 잘 쓰면 도울 수 있다**\n\n#### **원래는 부자가 되면 어려운 사람을 돕겠다고 생각했다. 그런데 생각해보니 꼭 그렇지 않았다. 지금 할 수 있는 일이 있다. 한 달에 3만 원씩, 보육원 아이들을 위해 기부를 시작했다. 정부에서 내려오는 돈으로 밥 한 끼에 3200원. 한창 크는 아이들이 배도 못 채우고 있다. 돈을 잘 쓴다는 것이 이런 것이다. 크게 모아서 한 번에 쓰는 것이 아니라, 지금 할 수 있는 만큼 흘려보내는 것. 돈은 흐름이라고 했다. 막혀 있으면 썩는다. 흘러야 산다.**\n\n---\n\n##### **코치가 스님보다 나은 이유**\n\n만약 스님이 됐다면 어땠을까. 결혼도 못 하고, 법복을 입고, 사람들과 이미 다른 거리를 두고 살았을 것이다. 가르쳐줬다고 돈을 달라고 할 수도 없다. 알아서 시주하면 고마운 것이고, 안 하면 그만이다. 그런데 코치는 다르다. 결혼을 하고, 세상 안에서 살면서도 당당하게 자기 뜻을 펼 수 있다. 가르침에 정당하게 대가를 받는다. 기브 앤 테이크다. 세속의 삶을 살면서도 영적인 뜻을 펼 수 있는 방식이 코칭이다. 어쩌면 대한민국에서 부녀가 함께 코칭센터를 여는 것도 처음일 것이다.\n\n---\n\n#### **나쁜 것을 없애려 하지 말고 좋은 것을 키워라**\n\n항생제를 투입하면 나쁜 균만 죽는 것이 아니다. 좋은 균도 같이 죽는다. 그리고 깨끗해진 자리에 가장 먼저 앉는 것은 나쁜", "source": "essay"}, {"id": "essay_773_30284af79b", "text": "**나쁜 것을 없애려 하지 말고 좋은 것을 키워라**\n\n항생제를 투입하면 나쁜 균만 죽는 것이 아니다. 좋은 균도 같이 죽는다. 그리고 깨끗해진 자리에 가장 먼저 앉는 것은 나쁜 균이다. 오히려 몸이 더 안 좋아진다. 사회도 마찬가지다. 나쁜 것에 초점을 맞추고 없애려 하면, 오히려 거기에 에너지를 주는 것이다. 집중해주면 먹고 큰다. 유튜브의 자극적인 영상도, 편 가르기 뉴스도 그렇게 확대 재생산된다. 우리가 소비하면서 양성하고 있는 것이다. **좋은 것이 더 확산되도록 해야 한다.** 좋은 가치, 좋은 신념, 좋은 행동을 더 키우는 것이 필요하다. '나는 옳고 상대가 그르다'는 이분법적 구조 안에서 놀아나는 게 아니라, 그 구조를 벗어나 좋은 것을 향해 에너지를 써야 한다.\n\n---\n\n#### **예수님의 \"다 이뤘다\" — 이미 올셀프다**\n\n십자가에 못 박혀 죽어가는 예수님. 뜻을 못 펴고 죽는 것처럼 보인다. 그런데 마지막 숨을 거두기 전에 말한다. **\"다 이뤘다.\"** 다 이뤘다. 이미 올셀프가 된 것이다. 예수님은 올셀프의 삶을 산 것이다. 결과가 어떻든, 지금 이 자리에서 온전하게 살았다. 그것으로 충분했다. 소아에서 대아로. 대승보살의 정신이 거기에 있다. 내 자식만 잘 살게 하려는 것이 아니라, 내 자식이 살 환경을 먼저 좋게 하는 것. 그게 결국 내 아이들이 건강하게 크는 길이다. **온통 나이기 때문에, 당연히", "source": "essay"}, {"id": "essay_774_3dcaa7658e", "text": "이 거기에 있다. 내 자식만 잘 살게 하려는 것이 아니라, 내 자식이 살 환경을 먼저 좋게 하는 것. 그게 결국 내 아이들이 건강하게 크는 길이다. **온통 나이기 때문에, 당연히 그렇게 참여하고 해야 한다.** #펼쳐나가기 #돈은에너지 #좋은것키우기 #대승보살도 #올셀프\n\n--- (구분선)\n\n[파일명: 현상과마음_둘이아니다_수필.md]\n\n### **현상과 마음, 둘이 아니다**\n\n#### **소리도 잡을 수 없다**\n\n소리가 들린다. 소리의 실체가 딱 있는 것이 아니다. 다음 소리가 오면 먼저 소리는 없어진다. 소리를 잡을 수 없다. 현상이기 때문이다. 형광등 불빛도, 촛불의 빛도 잡을 수 없다. 마찬가지로 내 안에서 올라오는 느낌도 하나의 현상이다. 감정도 현상이다. 외로움이라는 감정이 딱 있는 것이 아니다. 외로움으로 지금 드러나는 것이다. 커졌다 작아졌다 하고, 다른 감정으로 대체되기도 한다. 생각도 드러나는 현상이다. 보이는 것도 마찬가지다. 컵이 하나 있으면 컵만 따로 볼 수 없다. **컵이 있으려면 컵 아닌 것들이 있어야 한다.** 컵은 컵 아닌 다른 것에 의존해서 드러나는 것이다. 컵이라는 개별 존재가 따로 있는 것이 아니라, 다른 것들과의 관계에서 벌어지는 차이로 인해 컵으로 느껴지는 것이다.\n\n---\n\n#### **나라는 것도 현상이다**\n\n내 육신이 있다는 것을 안다. 그것도 내 육체 이외의 것들이 아니기 때문에", "source": "essay"}, {"id": "essay_775_771ceefcd4", "text": "계에서 벌어지는 차이로 인해 컵으로 느껴지는 것이다.\n\n---\n\n#### **나라는 것도 현상이다**\n\n내 육신이 있다는 것을 안다. 그것도 내 육체 이외의 것들이 아니기 때문에 육체로서 알려지는 것이다. 육체 아닌 것들과의 관계 속에서 드러나는 하나의 현상이다. 나를 포함한 세상 모든 것들이 다 일시적으로 드러나는 현상이다. 깊은 잠 속에서는 없다. 실체라면 딱 고정되게 항시 있어야 할 것이다. 어렸을 때의 나와 지금의 나가 다르다. 어렸을 때 느꼈던 현상이 있었고, 지금의 나라는 것을 느끼고 있는 것이다. 어떨 때는 엉덩이에 느낌이 가 있기도 하고, 어떨 때는 손에, 어떨 때는 생각에 가 있기도 한다. **촛불의 모양이 바람에 따라 계속 움직이듯, 어떤 고정된 형태가 없다.** 현상이기 때문이다.\n\n---\n\n#### **현상을 아는 것과 현상은 둘이 아니다**\n\n드러났다 사라졌다, 소리가 들렸다 안 들렸다, 보였다 안 보였다, 느껴졌다 안 느껴졌다 — 이 모든 것들이 그럴 수 있는 이유는 전부 현상이기 때문이다. 그런데 현상만 있는 것은 아니다. 현상을 아는 것이 항시 같이 있다. 알려지고, 들려지고, 보여지고, 느껴진다. 그런데 그것들이 없으면 그것을 아는 것도 없다. **둘이 아니다.** 느껴지는 현상과 그것을 아는 마음이 따로 떨어져 있지 않다. 따로 떨어져 있다면 알 수가 없을 것이다. 옴팍 마음에서 일어나는 현상이기 때문", "source": "essay"}, {"id": "essay_776_cfcef74ef8", "text": "아는 것도 없다. **둘이 아니다.** 느껴지는 현상과 그것을 아는 마음이 따로 떨어져 있지 않다. 따로 떨어져 있다면 알 수가 없을 것이다. 옴팍 마음에서 일어나는 현상이기 때문에 대상과 그것을 아는 마음이 둘이 아닌 것이다. 일어나는 모든 현상이 그것을 아는 주체와 별개가 아니라는 것은, 다시 말해서 일어나는 모든 현상 자체가 나라는 것이다. 나한테 알려지는 것이다. 고정되어 있지 않으니 딱 잡을 것이 없다. 이것이 무엇이다 하고 규정을 내릴 수 없다. 규정을 내린다는 것은 기억에 의존하는 것이다. 그것도 현상이다. **촛불을 잡았다, 빗물을 잡았다고 얘기할 수 없듯이** — 잡았다는 생각이 있을 뿐이다. 실제로 잡지 못한다. #현상과마음 #둘이아니다 #무상 #컵비유 #촛불비유\n\n--- (구분선)\n\n[파일명: 혼과침묵_차이의역동_수필.md]\n\n### **혼과침묵_차이의역동_수필**\n\n#### **혼은 고정된 것이 아니다**\n\n혼이라는 것이 있다. 사람에게만 있는 게 아니다. 짐승도, 나무의 정령도, 살아있다면 거기에 혼이 깃들어 있다. 그것은 하나의 생명력이다. 에너지가 활동하고 있다는 것이다. 그런데 우리는 혼을 자꾸 육체에 갇힌 무언가로, 고정된 존재로 생각한다. 아니다. **혼은 동적인 개념이다.** 들어왔다 나갔다 한다. 꿈속에서는 과거 현재 미래를 돌아다닌다. 고정된 것이 아니라 역동하는 것이다. 그래서 혼을 이해하려면", "source": "essay"}, {"id": "essay_777_e099295d4e", "text": "로 생각한다. 아니다. **혼은 동적인 개념이다.** 들어왔다 나갔다 한다. 꿈속에서는 과거 현재 미래를 돌아다닌다. 고정된 것이 아니라 역동하는 것이다. 그래서 혼을 이해하려면 존재로 파악하려 하면 안 된다. **관계로 봐야 한다.** 혼은 관계 안에서 역동한다.\n\n---\n\n#### **말이 성립하려면 침묵이 있어야 한다**\n\n태초에 하느님이 말씀으로 세상을 창조했다고 한다. 그것은 혼을 불어넣었다는 이야기다. **말이 곧 혼이다.** 그렇다면 말이 성립하려면 무엇이 있어야 하는가. **침묵이 있어야 한다.** 말 없음이 있어야 한다. 말이 있기 이전에 말 없음이 있다. 그런데 말 없음이 말이 되려면 **차이**가 나야 한다. 차이가 없으면 말이 안 된다. 그 차이가 에너지다. 차이에서 에너지가 나온다. 에너지가 혼이고 생명력이고 활동력이다. 기압차가 있어야 바람이 부는 것처럼. 차이가 있어야 움직임이 생긴다.\n\n---\n\n#### **코치가 비어 있음을 만들어야 한다**\n\n코칭에서도 마찬가지다. 코치가 고객의 근본적인 욕구를 끌어내어 말로 표현하게 하려면, **코치가 비어 있음을 만들어줘야 한다.** 차이를 만들어줘야 한다. 그래야 고객이 말 없음에서 말을 던진다. 차이 때문에. 코치가 고객의 말에 코치 자신도 같이 말을 던지면 어떻게 되는가. 존재 대 존재가 부딪쳐 버린다. 플러스 마이너스 제로가 된다. 코칭이 일어나지 않는다.", "source": "essay"}, {"id": "essay_778_148acb8e1b", "text": "던진다. 차이 때문에. 코치가 고객의 말에 코치 자신도 같이 말을 던지면 어떻게 되는가. 존재 대 존재가 부딪쳐 버린다. 플러스 마이너스 제로가 된다. 코칭이 일어나지 않는다. **코칭 프레젠스란 차이가 발생하도록 비어 있음을 만들어주는 것이다.** 그 비어 있음은 질문으로 만든다. 질문은 모름의 영역이다. 모름이 있어야 차이가 생기고, 차이가 있어야 고객 안에서 무언가가 튀어나온다. 코치와 고객이 계속 말과 말을 핑퐁처럼 주고받으면 거기서 실마리가 나오지 않는다. 고객이 충분히 모를 수 있는 공간, 그 침묵 안에서 말의 실마리가 툭 튀어나온다.\n\n---\n\n#### **실마리가 튀어나올 때**\n\n고객은 실이 엉켜 있다. 엄청나게 엉켜 있는데 실마리를 못 찾고 있는 것이다. 그 실마리를 찾는 것이 코칭이다. 실마리가 튀어나오면 차이 때문에 역동이 발생한다. 그러면 술술 풀린다. 풀어주는 방법을 아는 것은 고객이다. 코치는 실마리를 잡아당길 뿐이다. 코치가 고객을 존재로 바라보는 것보다 **코칭이라는 관계로 바라봐야** 하는 이유가 여기 있다. 혼과 혼이 역동을 띠고 만나는 관계. 거기서 코치와 고객이 차이에서 발생하는 역동을 즐기며 주거니 받거니 할 때, **저절로 춤이 추어지는 댄싱**이 된다.\n\n---\n\n#### **말의 의미보다 말에 실린 에너지**\n\n그런데 코치들이 놓치는 것이 있다. 고객의 말의 **의미**보다 말에 **실리", "source": "essay"}, {"id": "essay_779_28c8ae5b6e", "text": "*저절로 춤이 추어지는 댄싱**이 된다.\n\n---\n\n#### **말의 의미보다 말에 실린 에너지**\n\n그런데 코치들이 놓치는 것이 있다. 고객의 말의 **의미**보다 말에 **실리는 에너지**가 더 중요하다는 것이다. 그게 혼이다. 말은 언어 이전의 것이다. 언어는 의미를 담지만, 말은 더 본질적이다. 뜻이 없어도 된다. \"야!\", \"왜?\" — 이것도 말이다. 거기에 실린 에너지, 고저, 강약, 리듬, 단차, 가락. 코치들이 더 염두에 두어야 하는 것이 이것이다. **말에도 혼이 있다.** #혼 #침묵 #차이의역동 #코칭프레젠스 #말의에너지\n\n--- (구분선)\n\n[파일명: 후퇴가도약이된다_탄성의원리_수필.md]\n\n### **후퇴가만드는도약_새총의탄성원리_수필**\n\n#### **갑작스러운 행운이 더 위험하다**\n\n평균적인 삶을 살다가 갑자기 행운이 오면 좋은 것 같다. 그런데 올라간 만큼 떨어질 수 있다. 낙차가 크다. 평균으로 떨어졌을 때보다 훨씬 더 큰 데미지를 입는다. 반대로 시련이 와서 나락으로 떨어지는 것 같다면 어떤가. 그때 탄성이 작용한다. **떨어지는 만큼 튀어오를 수 있다.** 조금 떨어지면 조금 올라가고, 많이 떨어지면 떨어진 것보다 훨씬 더 멀리 갈 수 있다.\n\n---\n\n#### **새총을 뒤로 당길수록 더 멀리 나간다**\n\n새총을 4분의 1만 당기면 1미터 간다. 절반을 당기면 4 ~~5미터 간다. 끝까지 당기면", "source": "essay"}, {"id": "essay_780_7c19cd8226", "text": "멀리 갈 수 있다.\n\n---\n\n#### **새총을 뒤로 당길수록 더 멀리 나간다**\n\n새총을 4분의 1만 당기면 1미터 간다. 절반을 당기면 4 ~~5미터 간다. 끝까지 당기면 20~~ 30미터도 간다. **탄성은 당기는 만큼 곱해진다.** 지금 불안한 마음이 있다면, 이것이 탄성을 준비하는 기간이다. 뒤로 당기는 동안 에너지가 응축되어야 한다. 당기는 듯 마는 듯 하면 안 된다. 응축될 때까지 기다려야 한다. 그런데 못 참고 중간에 그냥 놓아버리면 어떻게 되는가. 조금밖에 나가지 않는다. 안정은 찾을지언정, 내가 바라는 목표 지점까지 갈 수 없다. **활시위를 잡아당기는 것은 힘들다. 그 힘듦을 견뎌야 한다.**\n\n---\n\n#### **목표에서 멀어지는 것처럼 보이는 시간**\n\n뒤로 당기는 동안은 마이너스가 나는 것 같다. 목표에서 점점 멀어지는 것 같다. 에너지는 쏟아붓는데 밑지는 장사 같다. 손해를 보고 있는 것 같다. 그런데 그것을 견디는 시간이 반드시 필요하다. **임계점을 넘어가서 탁 놓으면, 플러스가 아니라 곱하기가 된다.** 처음에 4분의 1만 당긴 것은 플러스다. 뒤로 많이 당기면 그때부터 곱하기다. 중간에 '이거 될까?' 싶어서 그냥 놓아버리면 과녁을 맞출 수 없다. **힘든 게 당연하다.** 내가 원하는 목표까지 가기 위해 뒤로 당기는 것이 힘든 것은 당연한 것이다. 그것을 받아들여야 한다.\n\n---\n\n####", "source": "essay"}, {"id": "essay_781_cfe2e53983", "text": "버리면 과녁을 맞출 수 없다. **힘든 게 당연하다.** 내가 원하는 목표까지 가기 위해 뒤로 당기는 것이 힘든 것은 당연한 것이다. 그것을 받아들여야 한다.\n\n---\n\n#### **목표를 놓치지 말아야 한다**\n\n아무리 멀리 나간들 방향이 틀리면 소용없다. 목표가 뭔지를 정확히 보고, 뒤로 당기는 것과 방향성을 정확히 잡는 것이 중요하다. 당기는 동안 믿음을 잃지 않아야 한다. '놓기만 하면 나간다'는 자기 확신. 용기. 그것을 잃지 않고 계속 당기는 것. 답답하고 '과연 맞출 수 있을까' 싶어도, **목표가 무엇인지를 놓치지 않는 것.** 그게 탄성이 제 힘을 발휘하는 조건이다.\n\n그것은 어떤 시크릿에서 말하는 '이미 성공했다는 느낌을 유지하는 것'과 맥이 닿아 있다. 믿음이라고 불러도 좋고 확신이라고 불러도 좋다. 이름이 무엇이든, 활시위를 끝까지 당기는 동안 그것을 잃지 않는 것—그것이 핵심이다.\n\n#탄성원리 #후퇴와도약 #새총비유 #임계점 #믿음", "source": "essay"}, {"id": "poem_book_0_ed921e16c6", "text": "2026-05-19\\_웃네시집\n\n\\---\n\n\\#시선  \n꽃이 어디 산과 들에만 필까\n\n따뜻한 눈길로 세상을 바라보는\n\n우리들 가슴에도\n\n꽃 한 송이쯤은 피어있지\n\n\\---\n\n\\#봄의 기별  \n가령  \n고개 너머 산비탈 바위 밑  \n응달진 샘 팔뚝의 맥이  \n청개구리 목젖 놀듯 뛰던가\n\n덜떨어진 나뭇잎이 등을 동그랗게 말고  \n마른 종소리를 털어내던가\n\n호숫가 잘게 부서진 얼음 조각들이  \n자박자박 너스레를 떨던가\n\n제법 허리가 굵어진 바람이  \n진득진득하게 농지거리하며 엉겨 붙던가\n\n개울물 살얼음 밑 조약돌 볼에  \n살이 오르기 시작하면\n\n봄이 '냉큼 가마'하고  \n기별하는 것이다\n\n\\---\n\n\\#바보  \n이쁘다고 해도 웃고  \n발소리만 들어도 웃고\n\n아스팔트 한옆에서도  \n돌밭에서도\n\n눈길 한번 안 줘도", "source": "poem_book"}, {"id": "poem_book_1_c52a163ab3", "text": "작하면\n\n봄이 '냉큼 가마'하고  \n기별하는 것이다\n\n\\---\n\n\\#바보  \n이쁘다고 해도 웃고  \n발소리만 들어도 웃고\n\n아스팔트 한옆에서도  \n돌밭에서도\n\n눈길 한번 안 줘도  \n웃기만 하는\n\n꽃은 바보다\n\n너 보고 웃는 나는  \n더 바보다\n\n\\---\n\n\\#꽃이 이쁜 이유  \n강변을 산책 중에  \n노란 꽃이 일렁입니다\n\n꽃향기에 발목 잡혀  \n발걸음이 더딥니다\n\n잠자리에 눕는데  \n눈앞이 온통 노랗습니다\n\n몇몇을 데려와야겠다고 생각한 나는  \n아침 일찍 강변으로 향합니다\n\n한번 봤다고 해맑게 웃으며 반겨줍니다\n\n‘누가 우리 집에 갈래?’  \n저마다 손을 마구 흔들며  \n‘저요, 저요’ 합니다\n\n유난히 손을 심하게 흔드는, 또 몇몇을  \n조심스럽게 떠서 까만 비닐봉지에 담습니다\n\n행여나 누가 볼까 싶어 가", "source": "poem_book"}, {"id": "poem_book_2_39453dc835", "text": "갈래?’  \n저마다 손을 마구 흔들며  \n‘저요, 저요’ 합니다\n\n유난히 손을 심하게 흔드는, 또 몇몇을  \n조심스럽게 떠서 까만 비닐봉지에 담습니다\n\n행여나 누가 볼까 싶어 가슴이  \n연탄불 위에 올려진 마른 오징어가 됩니다\n\n‘나는 이렇게 꽃 도둑이 되었습니다’\n\n몇 년 전에 이런 사정으로 데려온 아이들이  \n마당을 에워싸고 서서, 나만 보면  \n함박웃음을 짓는 것이 심상치 않습니다\n\n소심하고 어리숙한 꽃 도둑은  \n그제야 눈치를 챕니다\n\n제 씨를 바람에 실어 날리기도 하고  \n바짓가랑이에 찰싹 붙이기도 할 때부터  \n알아봤어야 했는데요\n\n꽃이 이쁘게 생겨 먹은 이유를  \n알 것 같습니다\n\n\\---\n\n\\#산꽃  \n너는 어쩌다가 그리 가냘프게 태어나서  \n눈에 잘 띄지도 않을 만큼 작게 태어나서\n\n보잘것", "source": "poem_book"}, {"id": "poem_book_3_5c2f234cb6", "text": "야 했는데요\n\n꽃이 이쁘게 생겨 먹은 이유를  \n알 것 같습니다\n\n\\---\n\n\\#산꽃  \n너는 어쩌다가 그리 가냘프게 태어나서  \n눈에 잘 띄지도 않을 만큼 작게 태어나서\n\n보잘것없는 바위틈, 산비탈 한 모퉁이에서  \n볕도 외면하고 흙도 변변찮은 곳에 기대어 살면서\n\n낯빛 하나 구김 없이 해맑게 웃는지\n\n\\---\n\n\\#봄의 품  \n볕이 따뜻해서  \n뒤를 돌아보았다\n\n봄이  \n꼭 안아 주며\n\n\"이제는 꽃을 피우거라“\n\n\\---\n\n\\#풀꽃  \n세상은 갈수록  \n자기만 봐달라 하고  \n저만 높다 하는데\n\n너희들은 어찌 그리  \n한 움큼도 안 되는 곳에  \n옹기종기 모여서\n\n환하게 웃으며 고개나 쳐들고  \n기껏해야 바람에 향기를  \n실어 날리는 게 다이더냐\n\n\\---\n\n\\#가까이하면  \n요즘 자꾸 생각이 안 나서", "source": "poem_book"}, {"id": "poem_book_4_4cd0db6324", "text": "안 되는 곳에  \n옹기종기 모여서\n\n환하게 웃으며 고개나 쳐들고  \n기껏해야 바람에 향기를  \n실어 날리는 게 다이더냐\n\n\\---\n\n\\#가까이하면  \n요즘 자꾸 생각이 안 나서  \n바보가 된 느낌이다\n\n언제부터 그랬나  \n떠올려 보니\n\n꽃이 이뻐 보이기 시작하면서부터  \n그런 것 같다\n\n지나가다 꽃을 보고 있노라면  \n미처 다 베껴 쓰지 못했는데 당번 녀석이  \n지워버린 칠판처럼 희뿌옇게 되는 것이다\n\n이게 다 아무 생각 없이 흔들흔들하는  \n바보 같은 꽃 때문이다\n\n가까이하면 닮는다고 하더니만\n\n\\---\n\n\\#자작나무 아래서  \n“아 야\\~ 뭐허냐  \n내 얘기 안 듣고  \n관둬라  \n말로 될 야그냐 이게”\n\n“이리 와봐라  \n퍼뜩 이리 온나  \n됐다, 마\\~  \n니가 안 오면 내가 가께”\n\n“잔말 말고", "source": "poem_book"}, {"id": "poem_book_5_9a6aad9ffe", "text": "“아 야\\~ 뭐허냐  \n내 얘기 안 듣고  \n관둬라  \n말로 될 야그냐 이게”\n\n“이리 와봐라  \n퍼뜩 이리 온나  \n됐다, 마\\~  \n니가 안 오면 내가 가께”\n\n“잔말 말고 손 좀 줘봐라  \n안 준다꼬\\~?  \n관도\\~  \n니가 안 주면 내가 잡으께”\n\n“정이란 게 말로만은 안 되는 거거든  \n이래 가까이서 손도 잡고 해야 하거든  \n니도 좋체\\~?”\n\n“내가 시방 뭐허냐  \n가만있는 널 붙잡고  \n미쳤는갑다 내가”\n\n“그라도\\~  \n이래 서로 통하니 니 속도 후련체\\~?  \n통하는 게 이래 좋은 기라”\n\n“사는 게 뭐 있노, 통하는 게 사는 거지”\n\n“아 야\\~ 내 다음에 또 오께  \n서운해 말거래이\\~”\n\n“자작아\\~”\n\n\\---\n\n\\#가을밤을 거닐다  \n꽃 한 송이 꺾으려고  \n손을 뻗는데\n\n살포", "source": "poem_book"}, {"id": "poem_book_6_4dd186ab97", "text": "통하는 게 사는 거지”\n\n“아 야\\~ 내 다음에 또 오께  \n서운해 말거래이\\~”\n\n“자작아\\~”\n\n\\---\n\n\\#가을밤을 거닐다  \n꽃 한 송이 꺾으려고  \n손을 뻗는데\n\n살포시  \n손목을 잡는\n\n달빛\n\n\\---\n\n\\#꽃을 보다  \n나이를 먹으니  \n고개가 자꾸 숙어져서  \n꽃을 보게 된다\n\n꽃을 볼 때마다  \n입꼬리가 올라가서  \n실없는 사람이 된다\n\n\\---\n\n\\#긴 밤  \n어디  \n꽤나 심심한 이 있나 보다\n\n오죽 심심하면  \n밤이나 잡아 늘리고 있을까\n\n정 할 일 없으면, 차나 마시든지  \n아님 사랑이나 하든지  \n못다 쓴 시나 쓰든지\n\n그래도 심심하면 달이나 굴리든지  \n굴리다 배고프면 베먹기라도 하든지  \n별이나 켰다 껐다 하든지\n\n긴 밤\n\n꽤나 할 일도 없는 이가  \n할 일 없는 나를  \n할", "source": "poem_book"}, {"id": "poem_book_7_fae80be9d8", "text": "쓴 시나 쓰든지\n\n그래도 심심하면 달이나 굴리든지  \n굴리다 배고프면 베먹기라도 하든지  \n별이나 켰다 껐다 하든지\n\n긴 밤\n\n꽤나 할 일도 없는 이가  \n할 일 없는 나를  \n할 일 없게 만드는구나\n\n에라  \n밤이나 잡아 늘려야겠다\n\n\\---\n\n\\#풀빵  \n아내랑 장을 봤다\n\n동태 만원  \n풋고추 한 봉지  \n손두부 한 모\n\n버섯은 물어만 보고  \n비싸다며 사지 않는다\n\n속으론 나도 몇 가지 사고픈 게 있었는데  \n말은 안 했다\n\n‘아\\! 풀빵 냄새\\~’  \n“여보 풀빵 먹을래?”\n\n자기는 밀가루 냄새가 나서 싫다며 휙 가버린다\n\n‘더 나이 들면  \n풀빵 장사나 해볼까\n\n팥앙금에 설탕은 조금만 넣고  \n달콤한 시 한 숟갈 듬뿍 넣어 버무리면 좋겠다\n\n먹는 사람들은  \n왜 기분이 좋아지는 줄도 모르고  \n행", "source": "poem_book"}, {"id": "poem_book_8_dd92e9e308", "text": "‘더 나이 들면  \n풀빵 장사나 해볼까\n\n팥앙금에 설탕은 조금만 넣고  \n달콤한 시 한 숟갈 듬뿍 넣어 버무리면 좋겠다\n\n먹는 사람들은  \n왜 기분이 좋아지는 줄도 모르고  \n행복하게 먹지 않을까?’\n\n상상만으로도  \n잘 구워진 풀빵처럼 부풀어 오르는데  \n아내가 어서 가자며 부른다\n\n나는 또 풀빵 틀에 들어가는 밀가루 반죽같이  \n탁 풀어진 웃음을 지으며 따라나선다\n\n\\---\n\n\\#겨울밤  \n새벽에 잠이 깨서 살포시 눈을 떠보니  \n아직도 창밖은 깜깜합니다  \n아마 밤도 잠이 푹 든 게지요\n\n한참 눈을 감고 있다가  \n개미허리만큼 눈을 뗍니다  \n그래도 창밖은 여전히 깜깜합니다\n\n또 얼마만큼 시간이 흘렀을까요  \n이번에는 풍뎅이 궁뎅이만큼 눈을 떠 봅니다  \n여전히 밤이 일어날 생각을 안 합니다\n\n이런\\", "source": "poem_book"}, {"id": "poem_book_9_6256a68545", "text": "큼 눈을 뗍니다  \n그래도 창밖은 여전히 깜깜합니다\n\n또 얼마만큼 시간이 흘렀을까요  \n이번에는 풍뎅이 궁뎅이만큼 눈을 떠 봅니다  \n여전히 밤이 일어날 생각을 안 합니다\n\n이런\\! 이젠 아예 코를 골며 주무시는군요  \n도대체 낮에 무슨 짓을 하며 돌아다니는지\n\n밤이 일어나기를 기다리다 못해 깜박  \n잠이 들다 깼는데, 어느새  \n어디론가 가버렸습니다\n\n앞산에는 벌써 쇠똥구리가  \n해님을 굴려 올리고 있군요\n\n참 게으른 겨울밤입니다\n\n\\---\n\n\\#채송화  \n웃고 또 웃었다  \n네가 볼 때까지\n\n너를 보고 좋아서  \n해가 질 때까지 웃었다\n\n\\---\n\n\\#강아지풀  \n오늘도  \n많이 흔들렸구나?\n\n괜찮아\\!\n\n네가  \n흔들리는 건\n\n너 때문이 아니야\n\n저녁노을에 한눈팔다 온  \n가늣한 바람이, 내 마음을", "source": "poem_book"}, {"id": "poem_book_10_bbf9cc456f", "text": "웃었다\n\n\\---\n\n\\#강아지풀  \n오늘도  \n많이 흔들렸구나?\n\n괜찮아\\!\n\n네가  \n흔들리는 건\n\n너 때문이 아니야\n\n저녁노을에 한눈팔다 온  \n가늣한 바람이, 내 마음을  \n스치고 지나갔기 때문이지\n\n\\---\n\n\\#마음  \n길 가다  \n마음 하나 주웠다\n\n누구냐?  \n함부로 버린 이\n\n\\---\n\n\\#내 아픈 상처에게  \n아무리 작은 풀들도 그늘을 주고받는데\n\n너는 누구에게 상처 준 적 없더냐\n\n물도 바위 옆을 스칠 때는 쓸리고\n\n바람도 나뭇가지 사이를 지날 때는  \n소리를 낸다\n\n갈라 터지고 나서야 아무는  \n신음\n\n\\---\n\n\\#불러주기  \n땅 위로 올라오는 새순에게  \n가지에서 부풀어 오르는 꽃망울에게  \n알에서 깨어난 병아리에게\n\n한 뼘 올라오는 두려움에게  \n기댈 곳 없는 외로움에게  \n촛불처", "source": "poem_book"}, {"id": "poem_book_11_efdf3aa70e", "text": "\\#불러주기  \n땅 위로 올라오는 새순에게  \n가지에서 부풀어 오르는 꽃망울에게  \n알에서 깨어난 병아리에게\n\n한 뼘 올라오는 두려움에게  \n기댈 곳 없는 외로움에게  \n촛불처럼 흔들리는 불안에게  \n가슴이 데일 것 같은 화에게  \n한 방울 떨군 슬픔에게\n\n“아가“\n\n\\---\n\n\\#빈 잔  \n바람이 부는 줄 알았더니  \n인연이 오는 거네요\n\n오고 가는 것이 인생인 줄 알았더니  \n가로수 한 그루 우두커니 서 있네요\n\n한 점 바람에 뺨을 의지한 채  \n오늘도 잘 살았습니다\n\n삶의 걸음을 허락한 육신에게  \n수고한 두 손에  \n위로의 빈 잔을 건넵니다\n\n\\---\n\n\\#잘 찾아봐라  \n아스팔트, 숨 막히는 곳  \n이슬 방석만큼이라도 움켜쥘 것이 있으면\n\n그곳에  \n쉼 없이 달려온, 멍든 걸음이  \n숨 한번 고", "source": "poem_book"}, {"id": "poem_book_12_97961a9700", "text": "의 빈 잔을 건넵니다\n\n\\---\n\n\\#잘 찾아봐라  \n아스팔트, 숨 막히는 곳  \n이슬 방석만큼이라도 움켜쥘 것이 있으면\n\n그곳에  \n쉼 없이 달려온, 멍든 걸음이  \n숨 한번 고를\n\n가랑가랑한 떨림이  \n있을 것이니\n\n\\---\n\n\\#빈자리  \n먼지가 뽀얗게 쌓인 벤치에서  \n아무도 앉지 않을 그 벤치에서\n\n누군지도 모를 누군가를  \n기 다 린 다\n\n나뭇잎 하나 툭 떨어져\n\n또  \n 르  \n 르  \n 굴러 내게 왔다\n\n\\---\n\n\\#자신을 사랑한다는 것  \n들판의 풀꽃을 보라\n\n자신을 얼마나 사랑하면  \n부는 바람에 온몸을 내맡기며  \n서리를 하얗게 뒤집어쓰고도  \n다만 몸을 웅크리지 않느냐\n\n손이 뻘꫋게 시려와도  \n온전히 떨어질 날을  \n두려움 없이 기다리는  \n저 단풍잎은\n\n또 얼마나  \n자신을 사랑하", "source": "poem_book"}, {"id": "poem_book_13_e29c71df86", "text": "서리를 하얗게 뒤집어쓰고도  \n다만 몸을 웅크리지 않느냐\n\n손이 뻘꫋게 시려와도  \n온전히 떨어질 날을  \n두려움 없이 기다리는  \n저 단풍잎은\n\n또 얼마나  \n자신을 사랑하는 것이더냐\n\n\\---\n\n\\#눈 감은 겨울  \n사랑도 영광도 다 떨어진 가지에  \n날 선 하늘이 조각조각 매달렸습니다\n\n새들도 외면한 앙상한 나목의 그림자가  \n힐긋힐긋 눈을 흘깁니다\n\n겨울의 모가지를 움켜쥔 잿빛 구름이  \n문득문득 해를 가리는 그림 같은 날에\n\n눈 질끈 감은 바람이 앞을 가로막고  \n나는 한 발짝도 떼어놓지 못합니다\n\n\\---\n\n\\#풀은 풀끼리  \n추우면 서로 덮어주길  \n졸리면 팔베개해 주길  \n바람 불면 어깨동무해 주길\n\n풀은 풀끼리 의지하길\n\n밟으면 누우면 되고  \n잘리면 또 나면 되고  \n뽑히면 바통 터치", "source": "poem_book"}, {"id": "poem_book_14_312981e9dc", "text": "풀끼리  \n추우면 서로 덮어주길  \n졸리면 팔베개해 주길  \n바람 불면 어깨동무해 주길\n\n풀은 풀끼리 의지하길\n\n밟으면 누우면 되고  \n잘리면 또 나면 되고  \n뽑히면 바통 터치하면 되고\n\n풀은 풀끼리 손잡아 주길\n\n타는듯한 목마름도  \n깜깜한 두려움도  \n아침 이슬 나눠 마시며\n\n풀은 풀끼리 견뎌내길\n\n산과 들, 온 세상을\n\n여린 가슴으로 감싸주길\n\n\\---\n\n\\#구피에게  \n떨지 마라 구피야\\!  \n어항 속에 있는 네가  \n뭐가 무서워 떠는지 모르겠구나\n\n아니다 구피야\\!  \n떨고 싶으면 떨어라\n\n물 위에 떨어진 달빛도  \n낯살을 찌푸리며 떨더라\n\n짝을 찾지 못한 산새 울음소리에  \n앞산 사시나무도 사시나무 떨듯 떨더구나\n\n누구는 말하면서 떨고  \n누구는 추워서 떨고  \n누구는 약해서 떨고  \n누구는", "source": "poem_book"}, {"id": "poem_book_15_24e84f7b1b", "text": "살을 찌푸리며 떨더라\n\n짝을 찾지 못한 산새 울음소리에  \n앞산 사시나무도 사시나무 떨듯 떨더구나\n\n누구는 말하면서 떨고  \n누구는 추워서 떨고  \n누구는 약해서 떨고  \n누구는 외로워서 떨더구나\n\n나도 어떨 땐 화가 나서 부들부들 떨고  \n또 어떨 땐 무서워서 오들오들 떤다\n\n산다는 것은 떤다는 것  \n떨지 않으면 살아 있는 것도 아니다\n\n하늘의 반짝이는 별도  \n제 꼬리를 찾아 나서는 유성도  \n하느님이 떨면 생겨난다더라\n\n그러니 구피야\\!  \n우리 함께 떨자\n\n\\---\n\n\\#바람을 잡아 세우다  \n바람을 잡아 돌려세우니  \n그냥 가게 놔두라 한다\n\n움켜쥔 손 풀고  \n듬성듬성 살라 한다\n\n눈물은 자기가 말릴 테니  \n울기나 하란다\n\n거북살스러운 것은 가져갈 테니  \n사랑이나 하란다\n\n주름진 세월은 둘둘", "source": "poem_book"}, {"id": "poem_book_16_b7f34fc84f", "text": "냥 가게 놔두라 한다\n\n움켜쥔 손 풀고  \n듬성듬성 살라 한다\n\n눈물은 자기가 말릴 테니  \n울기나 하란다\n\n거북살스러운 것은 가져갈 테니  \n사랑이나 하란다\n\n주름진 세월은 둘둘 말아 갈 테니  \n먼 산이나 보란다\n\n혹시 다른 바람이 흔들 거든  \n힘 빼라 한다\n\n서두르지 않아도 잘 간단다  \n저절로 바람처럼 간단다\n\n지금 생각하는 그런 일은 없단다  \n꿈속의 꿈이란다\n\n자기는 이만 갈 테니  \n깨든지 말든지 맘대로 하란다\n\n\\---\n\n\\#허용  \n꽃들이 활짝 피었다는 것은  \n이파리들이 하늘을 향해 팔을 벌린다는 것은  \n강물이 말없이 달빛을 비춘다는 것은  \n별을 하염없이 바라본다는 것은\n\n엄마가 아기에게 젖을 물린다는 것은  \n종이가 글씨를 받아낸다는 것은  \n허공이 모든 것을 드러낸다는 것은  \n그", "source": "poem_book"}, {"id": "poem_book_17_f238756c00", "text": "말없이 달빛을 비춘다는 것은  \n별을 하염없이 바라본다는 것은\n\n엄마가 아기에게 젖을 물린다는 것은  \n종이가 글씨를 받아낸다는 것은  \n허공이 모든 것을 드러낸다는 것은  \n그대가 이 시를 본다는 것은\n\n너의 품에서, 나를\n\n잊는다는 것은\n\n\\---\n\n\\#흔들릴 시간은 충분합니다  \n꽃이 흔들립니다  \n풀도 고개를 숙인 채  \n바람에 어깨를 기댑니다\n\n아직 기도할 시간은 충분합니다  \n내가 살아갈 시간과  \n죽고 난 후의 시간까지 더하면 말입니다\n\n노래할 시간도 많습니다  \n텅 빈 가슴에서 울리는  \n침묵의 노래는 영원하니까요\n\n물론 사랑할 시간은 셀 수도 없지요  \n풀처럼 약한 우리는  \n흔들리는 것이 사랑이기 때문입니다\n\n\\---\n\n\\#양말  \n양말이 죄다 구멍이 나서  \n장에 갔다\n\n양말 파는 아주", "source": "poem_book"}, {"id": "poem_book_18_489cff3da9", "text": "물론 사랑할 시간은 셀 수도 없지요  \n풀처럼 약한 우리는  \n흔들리는 것이 사랑이기 때문입니다\n\n\\---\n\n\\#양말  \n양말이 죄다 구멍이 나서  \n장에 갔다\n\n양말 파는 아주머니  \n“세 개에 오천 원이요\\~”  \n양말값이 그 정도 하는가 보다 하고  \n세 켤레를 샀다\n\n스무 걸음쯤 가다 보니  \n똑같은 양말을 한 개에  \n천 원에 파는 것이 아닌가\n\n양말 장수 아저씨  \n“우리 양말은 안 신으면 안 떨어져요\\~”  \n그렇게 질긴 양말이 단돈 천 원이라니\\!\n\n‘바가지를 썼구나’\n\n분한 마음을 만회하고자  \n얼른 세 켤레를 더 샀다\n\n집으로 돌아오는데  \n양말 여섯 켤레를 든 손이 무겁다\n\n‘이 양말이 내 발에 씌워지기까지  \n제값만큼의 경로를 따라왔을 터인데  \n그 안에 얼마나 많은 구멍 난 삶들이", "source": "poem_book"}, {"id": "poem_book_19_627639a0a8", "text": "샀다\n\n집으로 돌아오는데  \n양말 여섯 켤레를 든 손이 무겁다\n\n‘이 양말이 내 발에 씌워지기까지  \n제값만큼의 경로를 따라왔을 터인데  \n그 안에 얼마나 많은 구멍 난 삶들이 있었을까’\n\n하마 배처럼 잔뜩 부풀어 오른 장마철 구름이  \n어깨를 누른다\n\n빗물 한 방울이 툭\\!  \n얼굴에 떨어진다\n\n\\---\n\n\\#너 안의  \n사랑이 사랑하게  \n내버려둬라\n\n외로움이  \n외로워하도록\n\n슬픔이  \n슬퍼하도록\n\n내버려둬라\n\n너는\n\n\\---\n\n\\#흔적  \n바람이 불어오면  \n바람결을  \n한 올 한 올 엮겠습니다\n\n구름이 밀려오면  \n구름 속을  \n한 겹 한 겹 펼쳐 보겠습니다\n\n누군가  \n하나하나 헤아렸을 별들을  \n나도 따라 읽어가며  \n손끝으로 되짚어 봅니다\n\n오늘 밤은  \n외롭지 않겠습니다\n\n밤이  \n짙은 어", "source": "poem_book"}, {"id": "poem_book_20_62c8be9910", "text": "속을  \n한 겹 한 겹 펼쳐 보겠습니다\n\n누군가  \n하나하나 헤아렸을 별들을  \n나도 따라 읽어가며  \n손끝으로 되짚어 봅니다\n\n오늘 밤은  \n외롭지 않겠습니다\n\n밤이  \n짙은 어둠을 향해 걸어갈수록  \n내가 엮어내고 찾아낸 흔적은  \n더욱 선연히 드러나기 때문입니다\n\n\\---\n\n\\#벚꽃  \n비가 와도  \n바람이 불어도\n\n돌아서는  \n너의 등을 보아도\n\n툭\\! 떨어져  \n바닥을 뒹굴어도\n\n나는 괜찮다\n\n허공을 갈아서 사랑을 마셨으니\n\n\\---\n\n\\#사랑할수록  \n얼마나  \n많이 생각했으면\n\n얼마나  \n오래 봤으면\n\n별을 닮고\n\n해를 닮고\n\n달을 담고\n\n꽃은\n\n\\---\n\n\\#사랑이라는  \n우리가 언제 사랑했더냐  \n사랑했다는 생각이 있었을 뿐이지\n\n우리가 언제 사랑하지 않은 적은 있더냐  \n사랑이라는 말을 몰", "source": "poem_book"}, {"id": "poem_book_21_aa78b5af5f", "text": "닮고\n\n달을 담고\n\n꽃은\n\n\\---\n\n\\#사랑이라는  \n우리가 언제 사랑했더냐  \n사랑했다는 생각이 있었을 뿐이지\n\n우리가 언제 사랑하지 않은 적은 있더냐  \n사랑이라는 말을 몰랐을 때나\n\n사랑이라는 말조차  \n기억하지 못할지라도\n\n\\---\n\n\\#여름비  \n풀잎이 흠뻑 젖은 것을 보니  \n간밤에 다녀갔나 봅니다\n\n마당이 움푹 파인 것을 보니  \n꽤나 울다 갔나 봅니다\n\n공기가 서늘한 것을 보니  \n그래도 후련은 했나 봅니다\n\n그대가 다녀간 줄도 모르고  \n잠만 잔 나는\n\n파란 하늘만큼 무정한  \n바보인가 봅니다\n\n\\---\n\n\\#그때 그 가을  \n고운 단풍잎 하나 주워  \n책갈피에 꽂아 두었습니다\n\n별 하나 콕 집어  \n가슴에 접어 두었습니다\n\n손에 딱 잡히는 돌멩이 주워  \n아무도 없는 개울에  \n퐁당\\!", "source": "poem_book"}, {"id": "poem_book_22_08d994dc9c", "text": "때 그 가을  \n고운 단풍잎 하나 주워  \n책갈피에 꽂아 두었습니다\n\n별 하나 콕 집어  \n가슴에 접어 두었습니다\n\n손에 딱 잡히는 돌멩이 주워  \n아무도 없는 개울에  \n퐁당\\! 던져 보았습니다\n\n몰라줘도 좋을 것 같아서  \n그리했습니다\n\n물빛보다 더 반짝이고  \n기억보다 먼\n\n그때\n\n그 가을\n\n\\---\n\n\\#망울  \n그리고 그리다  \n쌓이고 또 쌓였지\n\n툭\\! 터져 버릴\n\n\\---\n\n\\#가을의 나이  \n딱히 슬픈 것도 없는데  \n눈가에 이슬이 맺히는 것을 보면  \n가을 하늘이 시리도록 푸른가 봅니다\n\n뭐 그렇게 사무치는 것도 없는데  \n가슴이 싸해지는 것을 보면  \n풀벌레 울음소리가 꽤나 처량한가 봅니다\n\n아주 조금, 아주 잠깐  \n구멍 난 바람이 스쳐 갔을 뿐인데  \n그림자가 축 처진 것을 보면  \n가", "source": "poem_book"}, {"id": "poem_book_23_b371cf1711", "text": "는데  \n가슴이 싸해지는 것을 보면  \n풀벌레 울음소리가 꽤나 처량한가 봅니다\n\n아주 조금, 아주 잠깐  \n구멍 난 바람이 스쳐 갔을 뿐인데  \n그림자가 축 처진 것을 보면  \n가을도 나이를 먹나 봅니다\n\n\\---\n\n\\#벚꽃이 지다  \n차마 말로는 하지 못할 사랑이기에  \n너는 입이 없구나\n\n마음으로만 봐야 할 사랑이기에  \n눈도 없구나\n\n곁에 머물지 못할 사랑이기에  \n붙잡지 않고 날릴 뿐이구나\n\n불꽃같은 인연이라도 영원을 안고 가야 하기에  \n속절없이 지는구나\n\n꽃 너는\n\n너의 사랑은  \n그렇게 피었다 가는구나\n\n\\---\n\n\\#그해 봄  \n술 한잔 마시고 강변을 걷는데  \n벚나무 한 그루가 떡하니 버티고 서서  \n길을 막고 비키지를 않는다\n\n가만히 보니  \n이 친구도 어디서 한잔했인지  \n얼굴은 불그스레", "source": "poem_book"}, {"id": "poem_book_24_c683b90ce7", "text": "그해 봄  \n술 한잔 마시고 강변을 걷는데  \n벚나무 한 그루가 떡하니 버티고 서서  \n길을 막고 비키지를 않는다\n\n가만히 보니  \n이 친구도 어디서 한잔했인지  \n얼굴은 불그스레하고 꽃술 냄새가 진동했다\n\n“좋은 말로 할 때 비켜\\!”\n\n꿈쩍도 하지 않고 외려 팔을 흔드네\n\n성질이 난 나는 발로 정강이를  \n힘껏 걷어차니 눈물을 흘리더라  \n그런데 ‘무슨 눈물을 하늘하늘 흘리냐’\n\n눈물이 하도 곱고 이뻐서  \n나도 모르게 눈물이 나왔다\n\n안쓰러운 마음에 나무를 부둥켜안고 울다 보니  \n그놈의 독한 꽃술 냄새에 취해서, 또 울었다\n\n\\---\n\n\\#일 년  \n꽃 피고 꽃 지는 사이\n\n꽃 지고 또 피는 사이\n\n\\---\n\n\\#사랑을  \n하려면  \n되어야지\n\n아닌데  \n어찌하나\n\n꽃 피지 않으면  \n향기 또한 없어", "source": "poem_book"}, {"id": "poem_book_25_a86bdf1d77", "text": "\\---\n\n\\#일 년  \n꽃 피고 꽃 지는 사이\n\n꽃 지고 또 피는 사이\n\n\\---\n\n\\#사랑을  \n하려면  \n되어야지\n\n아닌데  \n어찌하나\n\n꽃 피지 않으면  \n향기 또한 없어\n\n꽃 그냥 꽃\n\n\\---\n\n\\#사랑을 잊은 사랑  \n사랑이\n\n꽃처럼 피었다가 뚝 떨어질 리 없다  \n바람처럼 왔다가 휙 스쳐 갈 리 없다  \n눈처럼 쌓이다가 스르르 녹을 리 없다\n\n있다\\!\n\n나는 해가 저무는 강변에 서서  \n너를 생각하다가\n\n문득  \n너를 잊었다\n\n갈대 사이로 언뜻언뜻  \n반짝이는 것을 보았다\n\n새 한 마리가 물을 박차고  \n푸드덕 날갯짓하며 날아오른다\n\n잠시 출렁이던 물결이  \n이내 바람을 따른다\n\n자신을  \n온전히 내주었던 허공이  \n숨죽이며 보고 있다\n\n\\---\n\n\\#단풍의 사랑  \n떨어질 줄 알면서도", "source": "poem_book"}, {"id": "poem_book_26_a07cb0a080", "text": "짓하며 날아오른다\n\n잠시 출렁이던 물결이  \n이내 바람을 따른다\n\n자신을  \n온전히 내주었던 허공이  \n숨죽이며 보고 있다\n\n\\---\n\n\\#단풍의 사랑  \n떨어질 줄 알면서도  \n붉어지고  \n또 붉어지고\n\n붉어지기 위해  \n떨어지고  \n또\n\n떨  \n어  \n지  \n고\n\n\\---\n\n\\#수지를 맞추다  \n몇 날 며칠 깎고 다듬어  \n장에 가지고 갔다\n\n온종일  \n도마 한 개 팔았다\n\n돌아오는 길에 노란 꽃이  \n나를 보고 웃는다\n\n저렇게 이쁘고 향기를 뿜어도  \n눈길 한 번 못 받고 공치는 날이 많을 텐데\n\n첫 장에 한 개라도 판 나는  \n장사 수완이 없는 것은 아니다\n\n시도 한 편 썼으니  \n수지는 맞았다\n\n\\---\n\n\\#나무와 나  \n나무는 대패질하면  \n고운 결이 드러나는데\n\n세월이라는 대패에 깎인 나는", "source": "poem_book"}, {"id": "poem_book_27_853f02659b", "text": "장사 수완이 없는 것은 아니다\n\n시도 한 편 썼으니  \n수지는 맞았다\n\n\\---\n\n\\#나무와 나  \n나무는 대패질하면  \n고운 결이 드러나는데\n\n세월이라는 대패에 깎인 나는  \n무엇을 드러내는가\n\n나무도 곰삭으면  \n그 깊이가 더해가는데\n\n바닷가 모래 언덕에 파묻힌  \n폐그물처럼 삭아가는 나는  \n이마에 주름만 느는구나\n\n나무는 나뭇결로 살아온 이력을 말하고  \n나는 그 위에  \n쓴다\n\n뜨거운 냄비 하나 올려놓지 못할  \n무용한 시를\n\n\\---\n\n\\#나뭇결(木理)  \n좀 살아본 나무치고  \n주름 없는 나무는 없다\n\n얽히고설킨 땅 밑  \n뿌리를 내리고 살다 보면\n\n꽃 피고  \n열매 맺을 때도 있지만\n\n바람에 서리에  \n골도 파이고 이랑도 생기는 거지\n\n말로는 꺼내지 못할  \n속 깊은 그 세월을\n\n한 해 또", "source": "poem_book"}], [{"id": "poem_book_28_c3969d121e", "text": "밑  \n뿌리를 내리고 살다 보면\n\n꽃 피고  \n열매 맺을 때도 있지만\n\n바람에 서리에  \n골도 파이고 이랑도 생기는 거지\n\n말로는 꺼내지 못할  \n속 깊은 그 세월을\n\n한 해 또 한 해  \n휘감아 새길 뿐\n\n그 속을 누가 알랴  \n까보기 전에는\n\n\\---\n\n\\#장마  \n게으른 목수는  \n장마철이 그나마 맘 편히 쉬는 때이다\n\n비가 많이 오면\n\n나무도 습기를 잔뜩 머금고  \n배가 부르기 때문이다\n\n이럴 때는 나무에 새 옷을 입히려 해도  \n잘 마르지 않아 애를 먹는다\n\n아주 손을 놓을 순 없어서  \n이것저것 손을 대보지만\n\n이 핑계 저 핑계 대며  \n미꾸라지처럼 빠져나가는 일손을  \n잡을 재간이 없다\n\n여름에만  \n장마가 오는 것은 아니다\n\n목수나 농부같이  \n몸을 써서 벌어 먹고사는 삶은  \n녹록하고 눅눅", "source": "poem_book"}, {"id": "poem_book_29_763e6d72ad", "text": "저 핑계 대며  \n미꾸라지처럼 빠져나가는 일손을  \n잡을 재간이 없다\n\n여름에만  \n장마가 오는 것은 아니다\n\n목수나 농부같이  \n몸을 써서 벌어 먹고사는 삶은  \n녹록하고 눅눅하다\n\n요령 없는 그들은  \n늘 장마다\n\n\\---\n\n\\#산다는 것  \n물 위에  \n생각을 쓴다\n\n물 위에  \n인생을 쓴다\n\n흐르는 물 위에  \n삶을\n\n쓰다\n\n\\---\n\n\\#존재의 이유  \n모른다\n\n왜  \n주름이 패이는지  \n바람에 흔들리는지\n\n왜  \n서 있기만 한지  \n너에게 닿을 수 없는지\n\n왜  \n나무라고 불리는지\n\n나는\n\n모르는\n\n나무다\n\n\\---\n\n\\#봄은 오는데  \n바람이 부네요  \n하늘에는 낮달이 뜨고  \n아직 꽃은, 피지 않았어요\n\n무심코  \n갈대가 가리키는 곳을 봅니다  \n아무도 없네요  \n어디서 오는지 모를  \n바람", "source": "poem_book"}, {"id": "poem_book_30_ed79fc8cc8", "text": "\\#봄은 오는데  \n바람이 부네요  \n하늘에는 낮달이 뜨고  \n아직 꽃은, 피지 않았어요\n\n무심코  \n갈대가 가리키는 곳을 봅니다  \n아무도 없네요  \n어디서 오는지 모를  \n바람이 지나갈 뿐\n\n발끝을 더듬어  \n갈대밭 끝까지 가보아도  \n아무도 없네요  \n잊어야 할 것도, 그리워할 것도 없는  \n바람만 지나갈 뿐\n\n발도 발바닥도 없는 바람이  \n속이 빈 채 멍하니 서 있는  \n갈대 머리를 밟고 지나갑니다\n\n머리카락  \n날리며\n\n\\---\n\n\\#꽃으로  \n아무도 보지 않게  \n구름 속에 묻어라\n\n그러면  \n하늘이라도 알아주겠지\n\n비가 되어 내려서  \n땅으로 스미겠지\n\n꽃으로 피어나겠지\n\n그렇게  \n火가\n\n花가 되겠지\n\n\\---\n\n\\#빌어야 사는  \n구름은 하늘을 빌어 제 심사를 그리고  \n나뭇잎은 바람을 빌어", "source": "poem_book"}, {"id": "poem_book_31_aeeff33130", "text": "되어 내려서  \n땅으로 스미겠지\n\n꽃으로 피어나겠지\n\n그렇게  \n火가\n\n花가 되겠지\n\n\\---\n\n\\#빌어야 사는  \n구름은 하늘을 빌어 제 심사를 그리고  \n나뭇잎은 바람을 빌어 쌓인 넋두리를 털어 낸다\n\n나는 너의 품을 빌어 얼굴을 묻고  \n등을 빌어 지친 하루를 기대고  \n손을 빌어 너의 안녕을 빌고  \n바랜 추억을 빌어 잔을 채우고  \n짙은 어둠을 빌어 시를 쓴다\n\n서로 빌어야 사는  \n빌어 주어서 사는\n\n\\---\n\n\\#훈장  \n그 옛날  \n자식 수만큼 넓어야 하는 등에  \n막노동으로 쌓인 피로보다 높은 담을  \n훈장 하나로 헐어내시던  \n아버지\n\n세상의 모든 훈장은 가슴을 내밀고 달던데  \n아버지는 무슨 죄를 지은 것처럼  \n잔뜩 웅크린 등에  \n첫눈보다 하얀 훈장을 붙이시었다\n\n아버지가 어머니에게", "source": "poem_book"}, {"id": "poem_book_32_87e213fc15", "text": "헐어내시던  \n아버지\n\n세상의 모든 훈장은 가슴을 내밀고 달던데  \n아버지는 무슨 죄를 지은 것처럼  \n잔뜩 웅크린 등에  \n첫눈보다 하얀 훈장을 붙이시었다\n\n아버지가 어머니에게 받으셨던 훈장을  \n나도 아내에게 받는다\n\n이슬 젖은 강아지풀처럼 휘어진 등에  \n무서리보다 시린 훈장을\n\n자랑스럽지도  \n보이지도 않을\n\n아버지와 같은\n\n그 등\n\n그 자리에\n\n\\---\n\n\\#조약돌  \n구르고\n\n구르다 보면\n\n둥그레지겠지\n\n살아온 날들\n\n인연들\n\n참 많이도 굴렀소\n\n그대나\n\n나나\n\n\\---\n\n\\#나 같은 사람도 쓴다  \n몽당연필만큼도 몰랐던 내가  \n나무토막을 자르며 시를 쓴다\n\n가슴에 쓰고 눈물로 지운다  \n지우다 패인 자리가  \n글자 되고 시가 된다\n\n시를 쓰며 위로받은 내가  \n아린 가슴에 꽃 한 송이 심으려", "source": "poem_book"}, {"id": "poem_book_33_b310029e91", "text": "던 내가  \n나무토막을 자르며 시를 쓴다\n\n가슴에 쓰고 눈물로 지운다  \n지우다 패인 자리가  \n글자 되고 시가 된다\n\n시를 쓰며 위로받은 내가  \n아린 가슴에 꽃 한 송이 심으려  \n시를 쓴다\n\n살 모르던  \n나 같은 사람도\n\n쓴다\n\n\\---\n\n\\#새는 고개를 뒤로 젖히고 기도한다  \n아내가 숟가락을 들고 나에게 오면 나는  \n“아\\~” 한다  \n둥지에서 먹이를 기다리는 아기 새처럼\n\n“이런 것도 혼자 못 먹어?”\n\n어릴 적 어머니는 내가 아프면, 거뭇한 된장물을  \n숟가락에 풀어 “아\\~” 하라고 하셨다  \n크면서 어머니의 따땃하고 저릿한 것이 고프면  \n‘배가 아프다’고 했다\n\n나는 앞으로도 아내에게  \n‘아\\~‘ 할 것이다  \n따땃하고 저릿한 것이 목구멍을 타고  \n심장으로 흐르기를 바랄 것이다\n\n나", "source": "poem_book"}, {"id": "poem_book_34_7872783f95", "text": "하고 저릿한 것이 고프면  \n‘배가 아프다’고 했다\n\n나는 앞으로도 아내에게  \n‘아\\~‘ 할 것이다  \n따땃하고 저릿한 것이 목구멍을 타고  \n심장으로 흐르기를 바랄 것이다\n\n나도 이젠 물에 개어, 떠 넣어 줄 것이다  \n누군가는 나의 시를 삼키고  \n가슴에 따땃하고 저릿한 것이 흐르기도 할 테니\n\n고개를 한껏 뒤로 젖히고 하는  \n나만의 기도가, 부디  \n멈추지 않기를  \n깊이깊이 흐르기를\n\n\\---\n\n\\#기도  \n가야 할 목적지를  \n잊지 않으면\n\n쉬었다 가도, 멈추어도  \n이미 그곳\n\n나를 넘어서서 나를 잊고  \n너에게 이르는\n\n앵무새의 합창이 아닌, 홀로  \n날아오르는 독수리의 날갯짓\n\n삶을 통째로 내어 맡기고  \n미리 감사하며  \n그냥 사랑하며\n\n내 가난한 기도는  \n너에게 닿는다\n\n\\---\n\n\\", "source": "poem_book"}, {"id": "poem_book_35_e506896a82", "text": "는\n\n앵무새의 합창이 아닌, 홀로  \n날아오르는 독수리의 날갯짓\n\n삶을 통째로 내어 맡기고  \n미리 감사하며  \n그냥 사랑하며\n\n내 가난한 기도는  \n너에게 닿는다\n\n\\---\n\n\\#웃네  \n꽃 보
