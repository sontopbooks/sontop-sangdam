e3323e286", "text": "나가 어디 있겠는가. 고정된 나를 붙들려 할수록 지금 이 순간의 나를 놓친다.\n\n---\n\n#### **삶의 신비, 축복**\n\n매 순간 바뀐다는 것은 불안한 일이 아니다. **그것이 삶의 신비이고, 축복이다.** 경험하는 매 순간이 새롭다는 것. 그리고 그것을 안다는 것 자체가 이미 축복이다. 알지 못하면 깜깜한 어둠이지만, 지금 이것을 알고 있다는 것 — 그 앎이 이미 열려 있다는 것이다. 나는 고정되어 있지 않다. 그러니 지금의 나를 너무 붙들지 않아도 된다. 이 순간의 나도, 저 순간의 나도, 다 온전히 나다. #관계의나 #무아 #찰나 #올셀프 #그냥아는마음\n\n--- (구분선)\n\n[파일명: 나는무엇인가_주관과의식의전체성_수필.md]\n\n### **나는무엇인가_주관과의식의전체성_수필**\n\n#### **나는 주관이다**\n\n형광등을 바라본다고 해보자. 형광등은 대상이다. 눈에 보이는 객관이다. 그것을 알아보는 나는 주관이다. 형광등이 있다는 것을 아는 그것이 나다. 형광등이 내가 아닌 것은 분명하다. 방도 보인다. 방을 보고 있는 그것이 나다. 소리도 들린다. 소리를 듣고 있는 것이 나다. 몸도 느껴진다. 그런데 몸은 나인가? 몸이 있다는 것을 내가 느끼는 것이지, 몸이 나는 아니다. 몸은 알려지는 것이다. 생각이 올라왔다. 생각은 나인가? 생각도 알려지는 것이다. 감정이 올라왔다. 감정도 나가 아니다. 결론이 나온다. **알려지면 나", "source": "essay"}, {"id": "essay_101_5330f58e0c", "text": "이지, 몸이 나는 아니다. 몸은 알려지는 것이다. 생각이 올라왔다. 생각은 나인가? 생각도 알려지는 것이다. 감정이 올라왔다. 감정도 나가 아니다. 결론이 나온다. **알려지면 나가 아니다.** 나는 아는 것이니까. 나는 주관이고, 알려지는 것은 전부 객관이다. 그러면 나는 무엇인가. 느낌도 아니고, 생각도 아니고, 몸도 아니고, 감정도 아니고, 형광등도 아니고, 방도 아니다. 알아차림이라고 해도 안 된다. 알아차림을 내가 알았다면 그것도 이미 대상이 된다. 앎이라고 해도 안 된다. 앎이라는 것을 내가 알았다면 그것도 대상이다. **무엇이라 규정하는 순간 그것은 이미 객관이 되어버린다.** 나를 모르고 사는 것인가. 그렇지는 않다. 나가 없는 것도 아니다. 분명히 있다. 유령이 아니니까. 그런데 내가 나를 뭐라고 규정할 수가 없다. 그렇게 규정할 수 없는 내가 왜 이렇게 고민이 많은가. 고민이라고 올라왔다면 그 고민도 나가 아니다. 이것은 이론이 아니다. 실제로 그렇게 생각해봐야 한다. 나의 출처가 과연 무엇인가.\n\n---\n\n#### **촛불이 켜지면**\n\n깜깜한 방에 촛불 하나를 켰다고 해보자. 빛이 탁 들어오면 모든 대상이 동시에 드러난다. 촛불이 켜기 전에는 아무것도 안 보였다. 내 몸도 안 보였다. 소리도 없다고 하면 그냥 어떤 막연한 느낌만 있을 뿐이다. 그런데 불이 들어오면 다 보인다. 나도 드러난다. 밝다는 것은 곧 안다", "source": "essay"}, {"id": "essay_102_02be8e91a9", "text": "전에는 아무것도 안 보였다. 내 몸도 안 보였다. 소리도 없다고 하면 그냥 어떤 막연한 느낌만 있을 뿐이다. 그런데 불이 들어오면 다 보인다. 나도 드러난다. 밝다는 것은 곧 안다는 것이다. 밝으니까 알 수 있다. 그런데 깜깜할 때도 원래 없었던 것은 아니었다. 있었는데, 깜깜하니까 몰랐던 것이다. 촛불을 혼(魂)이라고 해보자. 혼이 딱 들어오면 세상이 다 보인다. 밝혀지면 나라는 것도 드러나면서 세상도 같이 드러난다. **통으로.** 내 몸도 비로소 느껴진다. '아, 이건 나고 저거는 남이구나.' 그런데 이것은 항시 같이 드러난다. 나라는 것과 세상과 대상이 항시 동시에 드러나지, 분리해서 따로 드러나는 일이 없다. 꽃이 하나 보인다고 해보자. 꽃만 단독으로 보일 때가 있는가. 꽃이 보일 때는 뒤의 배경도 보이고, 공기도 있고, 햇빛도 있고, 내 몸도 보이고, 그것을 보는 무언가도 분명히 있다. **뭐든지 드러나려면 통으로 같이 드러난다.** 배경만 보이다가 갑자기 꽃이 툭 튀어나오는 것이 아니다. 그러니까 **'올셀프'**란 이것이다. 전체가 통으로 같이 드러나니까 같이 안다. 촛불이 꺼지면 다시 안 보인다. 그것이 죽음이다. 안 보이지만 보고 있는 것은 여전히 있다. 깜깜해서 보이지 않을 뿐이지, 없어진 것이 아니다. 그것은 항시 있다. 대상이 없으니까 있다는 것을 인식해줄 수 없을 뿐이다. 그것은 삶과 죽음을 초월해서 있는 것", "source": "essay"}, {"id": "essay_103_5b41409fb8", "text": "여전히 있다. 깜깜해서 보이지 않을 뿐이지, 없어진 것이 아니다. 그것은 항시 있다. 대상이 없으니까 있다는 것을 인식해줄 수 없을 뿐이다. 그것은 삶과 죽음을 초월해서 있는 것이다.\n\n---\n\n#### **주관과 객관은 둘이 아니다**\n\n아는 것—무엇이라 규정할 수 없는 그것—이 현상을 떠나서 따로 있는가? 없다. 객관이 없으면 주관도 없다. 주관과 객관은 항시 같이 나타난다. 형광등을 아는 것과 내 마음속에 생각이 있다는 것을 아는 것—그것이 **둘이 아니다.** 항시. 몇십억 광년 떨어진 하늘의 별이 반짝 보인다. 별이 보였다는 것을 알았다. 드러났다. 거기에도 의식이 있는 것이다. 의식이 거기서 반짝 한 것이다. **온 우주에 의식이 꽉 차 있다.** 드러났다 하면 다 의식이다. 보였다 하면 다 의식이다. 소리가 들렸다 하면 다 의식이다. 생각이 나타났다 하면 그것도 다 의식이다. 드러났다 하면 거기에 다 의식이 붙어있다. 의식 없이 우주가 존재할 수 있는가. 의식이 없는데 우주가 있다는 것을 알 수 있는가. 알 수 없다. 드러나지 않는다. **의식이 '이게 우주가 존재하는구나' 하고 알려면, 아는 주체가 있어야 한다.** 그래서 주관과 객관은 둘이 아니다. 하나면 모른다. 또 완전히 하나면 알 수가 없다. 주객으로 분리되어야 아는데, 이것이 딱 달라붙어 있다. 동전의 앞뒷면처럼 뗄 수가 없다.\n\n---\n\n#### **왜 괴", "source": "essay"}, {"id": "essay_104_be2d55bb32", "text": "아니다. 하나면 모른다. 또 완전히 하나면 알 수가 없다. 주객으로 분리되어야 아는데, 이것이 딱 달라붙어 있다. 동전의 앞뒷면처럼 뗄 수가 없다.\n\n---\n\n#### **왜 괴로운가**\n\n그렇다면 왜 인간은 괴로운가. **동일시 때문이다.** 대상인데 그 대상을 '이것이 나다'라고 강력하게 동일시하기 때문이다. 거기에서 느껴지는 것을 가지고 '이건 괴롭다', '슬프다'라고 규정 짓는다. 형광등을 나라고 완전히 동일시해버렸다고 해보자. 형광등이 점점 빛이 얇아지고 깜빡깜빡하면 내가 슬프고 두려워진다. 자식에게 동일시하면 자식이 슬플 때 나도 슬프고, 자식이 기쁠 때 나도 기쁘다. **내가 어느 것과 동일시하느냐에 따라서, 무엇이라 알 수 없는 그것이 슬퍼졌다가 기뻐졌다 한다.** 그런데 나는 전체적인 것이다. 이 세상과 분리될 수 없다. 이미 태어나서 이렇게 보고 듣고 알고—이것은 계속 있었다. 세상이 없어진다고 해서 그 아는 것이 없어지는 것이 아니다. 촛불이 꺼져도 아는 것은 있었다. 없어지지 않았다. 머릿속에서 뱅뱅 돌아가는 생각에 과도하게 집착하고 동일시하면, 생각이 나를 끌고 간다. **한 줌도 안 되는 생각이 내 삶을 조정하려 한다.** 그런데 이것은 통으로 다 돌아가는 것이다. 전체가 연기적으로 돌아간다. 내 몸도 연기적으로 돌아가는 세상의 하나일 뿐이다. 바람이 부는데 꽃 하나가 반대 방향으로 흩날릴 수 있는가. 그렇", "source": "essay"}, {"id": "essay_105_a06df68232", "text": "이것은 통으로 다 돌아가는 것이다. 전체가 연기적으로 돌아간다. 내 몸도 연기적으로 돌아가는 세상의 하나일 뿐이다. 바람이 부는데 꽃 하나가 반대 방향으로 흩날릴 수 있는가. 그렇게 되기를 바라는 것이 우리 마음이다. 나만 꿋꿋하기를 바라고, 나만 흔들리지 않기를 바란다.\n\n---\n\n#### **전체 통으로 의식을 두라**\n\n그러면 어떻게 사는가. **전체 통으로 살아야 한다.** 생각이 나를 괴롭힐 때, 앞으로 어떻게 될까 걱정이 되고, 방법을 찾고, 잘 살고 있나 못 살고 있나 계속 생각이 돌아갈 때—그 생각에만 인식을 모으니까 고통스러운 것이다. **의식 자체는 그것과 아무 상관이 없다.** 의식은 어떤 상태래도 관계없이 그냥 있다. 혼을 촛불로 본다면, 생각에 끌릴 때 촛불이 흔들린다. 그러면 바깥에 그림자가 어지럽게 움직인다. 생각에 끌달려서 혼이 들락날락하는 것이다. 그 그림자를 보고 울고불고 하고 있는 것이다. 그럴 때는 **내 보이는 방 전체, 밝게 드러나는 이 전체에 의식을 두어야 한다.** 의식 차원으로 인식을 확장시켜놓아야 한다. 의식은 지금 이미 다 알고 있다. 나타나면 동시에 나타난 세상과 한꺼번에 다 드러난다. 비가 오면 맞든가, 우산을 쓰든가. 비는 안 맞고 싶고, 우산 쓰기도 싫고, 밖에 나가고 싶고—그것이 우리 생각이다. 잘못을 했으면 그 결과를 맞아야 한다. 맞으면 빨리 지나간다. 맞기 전까지 계속 고", "source": "essay"}, {"id": "essay_106_10d59e2ac2", "text": "산을 쓰든가. 비는 안 맞고 싶고, 우산 쓰기도 싫고, 밖에 나가고 싶고—그것이 우리 생각이다. 잘못을 했으면 그 결과를 맞아야 한다. 맞으면 빨리 지나간다. 맞기 전까지 계속 고민하고, 안 맞으려고 꾀를 부리고—그렇게 삶이 더 힘들어진다. 나에게 오는 경계가 됐건 업이 됐건, 있는 그대로 수용하는 것이다. 연기적으로 흘러가는 흐름이니까. 흔들리면 흔들리는 것을 있는 그대로 받아들이면 된다. 안 받으려 하니까 고통스러운 것이다. **전체 통으로 돌아가는 이 전체에 의식을 두는 것.** 그게 더 앞선다. #나는무엇인가 #주관과객관 #의식의전체성 #동일시 #올셀프\n\n--- (구분선)\n\n[파일명: 나는상이아니다_수면과각성_수필.md]\n\n# **나는상이아니다_수면과각성_수필**\n\n## 알 수 있는 건 전부 상(相)이다\n\n드러난 것은 다 상(相)이다. 알려진 것도 다 상이다. 상 이외에는 알 수가 없다.\n\n느낌도 상이고, 감정도 상이고, 소리도 상이고, 보여지는 것도 상이다. 냄새 맡아지는 것, 감각되어지는 것, 전부 다 상이다. 컵을 만진다. 그런데 이것도 내가 컵을 만지는 게 아니고, 컵하고 손의 차이를 내가 느끼는 것뿐이다. 진정으로 컵을 만질 수가 없다. 나한테 드러나는 건 전부 다 상(相)을 아는 것이다. 100%.\n\n그런데 우리는 그 생각으로 나를 알려 한다. 생각도 상이다. 나한테 알려진 것이다. 상이 상을 아는 것과 마찬가지다.", "source": "essay"}, {"id": "essay_107_bcfaffe767", "text": "테 드러나는 건 전부 다 상(相)을 아는 것이다. 100%.\n\n그런데 우리는 그 생각으로 나를 알려 한다. 생각도 상이다. 나한테 알려진 것이다. 상이 상을 아는 것과 마찬가지다. 이 컵이 나를 알려고 하는 것과 마찬가지다. 그런데 이 상 자체가 '이게 뭐지? 나는 뭐지? 나는 왜 이렇게 힘들지?' 이것도 상이다. 그러니까 **생각으로는 절대 알 수가 없다.** 나 자신을.\n\n---\n\n## 내 속을 내가 모른다\n\n철쭉꽃 줄기 안에서 물이 어떻게 지나가는지 우리가 보는가. 못 본다. 내 혈관에 피가 어떻게 지나가는지 내가 보는가. 못 본다. 저 꽃의 속을 모르는 것이나, 내 속을 모르는 것이나 똑같다.\n\n그런데 사람들은 웃기게도, 이 몸 안에서만 일어나는 것만 나라고 한다. 몸 바깥에서 일어나는 것은 다 나하고 관계없다고 안다. 그런데 정작 이 안에 일어나는 것도 모른다. 뇌가 어떻게 생겼는지, 뇌의 주름이 어떻게 잡혔는지, 척수에 피가 얼마나 지나가는지, 하나도 모른다. 자기 뒤통수도 못 보고, 자기 등도 못 본다. 거울이라는 게 문명에서 생겼으니까 자기 얼굴을 볼 수 있는 것이지, 그것도 나를 보는 게 아니라 상을 보는 것이다. **나를 절대 볼 수가 없다.**\n\n그런데 그것을 나라고 믿어버리니까, 마치 철쭉꽃 하나가 자기가 전부라고 믿듯이, 이 드러나는 것이 전부는 아닌데, 그게 전부라고 믿어버리는 것이다. 저 철쭉꽃이 호박꽃이라", "source": "essay"}, {"id": "essay_108_ba2baf6a16", "text": ".**\n\n그런데 그것을 나라고 믿어버리니까, 마치 철쭉꽃 하나가 자기가 전부라고 믿듯이, 이 드러나는 것이 전부는 아닌데, 그게 전부라고 믿어버리는 것이다. 저 철쭉꽃이 호박꽃이라고 내가 믿는다고 호박꽃이 되는 건 아니다. 그런데 철썩같이 믿으면서, 저 호박꽃이 왜 저쪽 꽃으로 자꾸 보이지, 내가 좀 더 수행하면 저게 호박꽃으로 변할까, 이렇게 막 우기는 것이다. 그게 삶의 굉장한 아이러니이고, 미스터리이고, 한편으로는 신비다.\n\n소리가 들리니까 소리를 듣고 있구나, 를 안다. 귀를 한 번도 직접 경험해 본 적이 없다. 이게 보이니까, 봄으로써 눈을 경험하는 것이다. 눈 자체를 경험할 수 없다. 뇌를 경험할 수 있는가. 생각을 하니까 뇌가 있구나 하는 것을 알지. 뭔가 만져지니까 피부가 있구나 하고 아는 것이다. **직접적으로 내가 나를 경험할 수 없다.** 경험되어지는 건 상밖에 없으니까. 그것도 상이 아니기 때문에 내가 모르는 것이다.\n\n내가 이것이 나다 하고 나를 알려고 하면 그게 어떤 상이어야 한다. 그런데 생각도 내가 아니고, 겉으로 드러난 모습도 그냥 모습이다. 이게 100% 나라면 어렸을 때 나는 뭐고, 앞으로 10년 20년 계속 변하잖아. 고정된 게 없잖아. 그러니까 그건 진실한 내 게 아니라는 거야. 보여지는 상인 것뿐이다. 우리가 알 수 있는 건 전부 다 상이라는 것이다.\n\n---\n\n## 나는 상이 아니다\n\n그게 또", "source": "essay"}, {"id": "essay_109_3f730519c3", "text": "된 게 없잖아. 그러니까 그건 진실한 내 게 아니라는 거야. 보여지는 상인 것뿐이다. 우리가 알 수 있는 건 전부 다 상이라는 것이다.\n\n---\n\n## 나는 상이 아니다\n\n그게 또 한편으로는 다행이다. 상이라면 정말 아무것도 아닌 것 아닌가. 그냥 허망한 것이다. 그런데 이렇게 생생하다. 그리고 내가 상이라면 절대 상이 상을 알 수가 없는 것이다. **나는 상이 아니다.** 그러니까 절대 나는 나를 알 수가 없는 것이다. 그런데 어떻게 할 수 있는가. 상이 보여지니까 아는 것이다.\n\n잠잘 때는 상이 없다. 아무것도 없다. 그러니까 나를 경험 못하는 것이다. 내가 없는 게 아닐 것인데. 아침이 되면 또 깨어난다. 누가 부르면 일어난다. 그 안에 있는 것이 꺼집어내어지는 것이다.\n\n땅이 있음으로써 내가 있구나를 아는 것이다. 상이 드러남으로써 아는 것이다. 그것도 아무것도 아닌 걸로 경험하고 있는 것이지, 없다고 할 수는 없다. 아침이 되면 또 깨어나니까.\n\n**알 수 있는 건 전부 상이다. 그런데 나는 상이 아니다. 그러니까 이렇게 생생하다.**\n\n#상 #무아 #올셀프 #나는상이아니다 #수면각성\n\n--- (구분선)\n\n[파일명: 나다움에서나로_움의발현_수필.md]\n\n### **나다움에서나로_움의발현_수필**\n\n#### **'움'이란 무엇인가**\n\n씨앗이 땅 속에서 아직 터지지 않은 상태를 '움'이라 한다. 움은 잠재성이다. 무엇이 들어있", "source": "essay"}, {"id": "essay_110_3fe97d44a8", "text": "]\n\n### **나다움에서나로_움의발현_수필**\n\n#### **'움'이란 무엇인가**\n\n씨앗이 땅 속에서 아직 터지지 않은 상태를 '움'이라 한다. 움은 잠재성이다. 무엇이 들어있는지 보이지 않는다. 안에 갇혀 있으니까. 잠재돼 있으니까. 그런데 그 안에 모든 것이 다 들어있다. **'나다움'** 이라는 말을 풀어보면, '다'는 전부라는 뜻이다. 나의 전부가 '움' 안에 들어가 있는 것이 '나다움'이다. 아직 발현이 안 된 것이다. 가능성으로만 잠재해 있는 것이다. 코치다움도 마찬가지다. 코치로서의 배움, 능력, 경험, 지식, 지혜, 모든 것이 쌓이고 쌓여서 '움'에 들어간다. **코치의 모든 것이 '움' 안에 있는 것이다.** 그것이 코치다움이다. 아직 코치로 사는 게 아니다.\n\n---\n\n#### **나다움이 쌓여 사무치면 툭 터진다**\n\n나다운 행동을 하고, 나다운 선택을 하고, 그렇게 살다 보면 '나다움'이 쌓인다. 그것이 두툼하게 쌓이고 쌓이다 보면 어떤 계기가 돼서 **툭 터진다.** 터지면 비로소 '나'로 사는 게 된다. 움일 때는 이게 뭔지 모른다. '나다움'이 뭔지 알 수가 없다. 그런데 툭 터져서 싹이 나오면, 그 싹을 보면서 안다. 무슨 싹인지, 어떤 방향으로 자라는 싹인지. 그때야 비로소 알게 된다. **'나다움'이 쌓여 사무치면 툭 터진다.** 터지면 그게 잠재성의 폭발이다. 무의식이 의식화되는 것이다. 보이지", "source": "essay"}, {"id": "essay_111_bf566c633f", "text": "인지, 어떤 방향으로 자라는 싹인지. 그때야 비로소 알게 된다. **'나다움'이 쌓여 사무치면 툭 터진다.** 터지면 그게 잠재성의 폭발이다. 무의식이 의식화되는 것이다. 보이지 않던 것이 드러나는 것이다. 그것이 진정한 '나'로 사는 것이다.\n\n---\n\n#### **'나다움'에서 끝나면 안 된다**\n\n'나다운 삶'을 찾는 사람들이 있다. \"나다운 게 뭐지?\" 하고 계속 묻는다. 주변 사람들에게도 묻는다. \"야, 너답지 않게 왜 이래\"라는 말이 들어온다. 스스로도 \"이거 나답지 않은데\"라며 자기 검열을 한다. 이것은 아직 '움' 안에 있는 것이다. 목적으로 가는 방향을 잡지 못하고 있는 것이다. '나다움'을 자꾸 찾게 된다는 것은, 아직 잠재성에서 벗어나지 못하고 있다는 신호다. **'나다움'에서 끝나면 안 된다는 것이다.** '나'는 모든 가능성이 열려 있는 존재다. 어떤 것이든 내가 선택해서 살 수 있다. 그런데 그 선택이 강요된 것이거나 나도 모르게 세뇌된 것이라면, 그것은 '나'로 사는 게 아니다. **'나다움'에서 '나'로.** 이것이 방향이다.\n\n---\n\n#### **올셀프를 체험하는 코칭 과정**\n\n코치들도 마찬가지다. 방향성을 모르는 게 아니라, 잘못된 가치 신념이나 정체성을 가지고 코칭을 하고 있는 경우가 있다. 코치 자신이 가면을 쓰고 있었던 것을 모르는 것이다. 트루셀프를 찾아야 할 것으로 알고 있었는데, 사실은", "source": "essay"}, {"id": "essay_112_386078138a", "text": ", 잘못된 가치 신념이나 정체성을 가지고 코칭을 하고 있는 경우가 있다. 코치 자신이 가면을 쓰고 있었던 것을 모르는 것이다. 트루셀프를 찾아야 할 것으로 알고 있었는데, 사실은 **올셀프** 였다는 것을 체험으로 알아야 한다. 안 좋은 감정, 나쁜 생각, 불편한 것들 — 이것들을 버려야 할 것으로 알고 있는 코치들이 있다. 그런데 그것들도 전부 다 나다. **올셀프니까, 내 안에서 올라오는 것은 전부 다 그 자체로 메시지가 있다.** 외부에서 닥치는 상황도, 만나는 사람도, 모두 나한테 뭔가를 전달하고 있다. 그것을 알아야 한다. 그러니까 코치 교육 과정에서 해야 할 것은, 코치들이 자기 가치와 신념을 재검토하고, 조건 지어지지 않은 상태에서 다시 방향성을 세우고, 나의 진정한 정체성이 무엇인지를 체험으로 알아가는 것이다. 설명으로 아는 게 아니라 체험으로 알아야 한다. 그 체험을 바탕으로 새로운 정체성과 가치 신념이 세워진다.\n\n---\n\n#### **코치로 사는 길**\n\n코치다움이 쌓이고 쌓여서, 경험과 지식과 지혜와 정보가 모두 '움' 안에 켜켜이 쌓여서, **'움'이 트이면** 그것이 진정한 코치로 사는 것이다. 코치로 산다는 것은 고객에게 비전을 제시하는 것이다. \"코치 받으면 행복하게 살 수 있다\"는 비전. 그런데 코치 자신이 잘못된 가치 신념과 정체성으로 그 비전을 말하면 그것은 공허하다. 코치는 자기 삶의 방향성에 맞는", "source": "essay"}, {"id": "essay_113_90e37180ce", "text": "시하는 것이다. \"코치 받으면 행복하게 살 수 있다\"는 비전. 그런데 코치 자신이 잘못된 가치 신념과 정체성으로 그 비전을 말하면 그것은 공허하다. 코치는 자기 삶의 방향성에 맞는 신념과 가치관을 알고, **안목** 을 키워야 한다. 그 안목을 가지고 코칭할 때 고객에게 진짜 도움이 되는, 나도 만족스러운 코칭이 된다. 코치 자신이 먼저 '나다움'에서 '나'로 터져야 한다. 그래야 고객도 그렇게 살 수 있도록 도울 수 있다. 고객은 '나'로 살고 싶다. 남으로 살고 싶은 사람은 없다. 그런데 '나다운 삶'을 찾으면서 '움' 안에서 맴돌고 있다. 코치가 할 일은 고객의 '나다움'이 쌓이고 사무쳐서 **툭 터지도록** 돕는 것이다. 그것이 고객이 '나'로 살게 되는 길이고, 그 길을 함께 걷는 것이 코치로 사는 길이다. #나다움 #움 #올셀프 #코칭 #잠재성\n\n--- (구분선)\n\n[파일명: 나라는꼬리표_에고와삶의아이러니_수필.md]\n\n### **나라는꼬리표_에고와삶의아이러니_수필**\n\n#### **그냥 보이는데, 거기에 '내가' 붙는다**\n\n그냥 보인다. 내가 보려고 애쓰는 것도 아니고, 그냥 보여진다. 그냥 들린다. 소리 들으려고 애쓰는 것도 아니고, 그냥 들린다. 느낌도 그냥 있다. 좋은 느낌, 나쁜 느낌이 없다는 것이 아니다. 그냥 느껴진다. 그런데 거기에 **'나'라는 것이 자꾸 붙는다.** 그것이 문제다. 볼 때는 **봄(See", "source": "essay"}, {"id": "essay_114_9074f3c1ac", "text": "린다. 느낌도 그냥 있다. 좋은 느낌, 나쁜 느낌이 없다는 것이 아니다. 그냥 느껴진다. 그런데 거기에 **'나'라는 것이 자꾸 붙는다.** 그것이 문제다. 볼 때는 **봄(Seeing)만 있는 것** 이고, 들을 때는 **들림(Hearing)만 있는 것** 이고, 냄새 맡을 때는 **냄새 맡음(Smelling)만 있는 것** 이다. 사실 하루 일상을 들여다보면 내가 나라고 생각할 때가 얼마 없다. 그냥 살고 있다. 그런데 어떤 특정 생각이나 감정에 빠지면, 거기에 **'나'를 동일시** 해서 \"내가 괴로워\"라고 생각하게 된다. 괴로운 느낌이 없다는 것이 아니다. 괴롭다는 것이 잘못됐다는 것도 아니다. 괴로울 땐 괴롭고, 기쁠 땐 기쁘고, 슬플 땐 슬퍼야 한다. 아무 문제가 없다. 문제는 거기에 **'내가'를 계속 갖다 붙인다** 는 것이다. 벽에 '괴로움'이라고 써놓고 그것을 보면, 그 글씨 때문에 내가 괴롭지는 않다. 그런데 거기다 **'내가 괴롭다'**고 써놓고 그걸 읽으면서 자꾸 \"내가 괴롭네, 내가 괴롭네\" 하면, 괴로움 속으로 점점 빠져든다.\n\n---\n\n#### **에고가 나를 강화하는 방식**\n\n통장에 천만 원이 매달 꽂힌다고 해보자. 기분이 좋을 것이다. 그건 아무 문제가 없다. 문제는 그 기쁜 느낌을 **계속 가져가고 싶어 한다** 는 것이다. **'내가 기분 좋은 나'**라는 것을 유지하고 싶은 것이다. 그러려면 '", "source": "essay"}, {"id": "essay_115_137b31816d", "text": "을 것이다. 그건 아무 문제가 없다. 문제는 그 기쁜 느낌을 **계속 가져가고 싶어 한다** 는 것이다. **'내가 기분 좋은 나'**라는 것을 유지하고 싶은 것이다. 그러려면 '나'라는 것을 앞세워야 한다. '나'라는 것이 없으면 통장을 안 보는 순간 기쁨도 동시에 사라지기 때문이다. 그러다 그 천만 원이 은행 실수로 다시 빠져나갔다. 기분이 나쁘다. 그것도 아무 문제가 없다. 그런데 이번에는 **기분 나쁜 '나'**도 똑같이 계속 가져가려 한다. 좋은 것을 취했을 때 '나'가 강화됐던 것처럼, 나쁜 것도 반대로 '나'를 강화시키고 있는 것이다. **에고한테는 기분 좋은 것도 나를 강화시켜 주는 것이고, 기분 나쁜 것도 나를 강화시켜 주는 것이다.** 두 가지 다 에고에게는 좋은 것이다. 그래서 기분 나쁜 이유를 계속 찾아다니게 된다. 신랑을 보고, 집안을 둘러보고, 통장 잔고를 떠올리고, 대출을 떠올리고. 지금 이 순간 실제로 아무것도 눈앞에 없는데도 **기분 나빠야 할 이유** 를 계속 찾는 것이다. 그러다 밤이 오고 잠이 든다. **'나'가 어디 있는가?** 기분 나빴던 '나'가 어디 있는가. 없다. 우리 하루 일상이 그런 식이다.\n\n---\n\n#### **느낌과 싸우면 오히려 강화된다**\n\n에고가 안 좋은 쪽으로 자꾸 강화되면, 안 좋은 것을 보는 쪽으로 시선이 옮겨진다. 불안하거나 막막한 것이 싫다고 하면서도, 그 느낌이 '", "source": "essay"}, {"id": "essay_116_95bc548bb5", "text": "**느낌과 싸우면 오히려 강화된다**\n\n에고가 안 좋은 쪽으로 자꾸 강화되면, 안 좋은 것을 보는 쪽으로 시선이 옮겨진다. 불안하거나 막막한 것이 싫다고 하면서도, 그 느낌이 '나'를 강화시켜 주기 때문에 불안해야 할 이유를 계속 찾아다니게 된다. 그런데 중요한 것이 있다. **불안할 땐 그냥 불안해야 한다.** 기쁠 땐 기쁘고. **느낌과 싸우면 안 된다.** \"불안하니까 이걸 어떻게 없애보자\" 하면, 오히려 불안과 투쟁하는 '나'가 등장해서 그것을 더 강화시킨다. 뜨거운 물을 마시면서 \"나는 수행한 사람이니까 이걸 뜨겁게 느끼면 안 되지\"라고 생각하면 안 된다. 뜨거운 건 뜨거운 것이다. 더운 건 더운 것이고, 차가운 건 차가운 것이다. 울 때는 울고, 웃을 때는 웃어야 한다. **안 좋을 때는 안 좋은 것이다.** 그것이 사람이다.\n\n---\n\n#### **'나'라는 꼬리표를 떼는 일**\n\n**'나'라는 꼬리표.** 태그(tag). 이것이 지금 관성으로 평생 그렇게 살아왔기 때문에 편하다. 그래서 **'나'라는 꼬리표를 떼기가 쉽지 않다.** 알았다가도 또 불현듯 올라온다. 예전의 관성이 남아 있기 때문이다. 어떻게 보면 수행이 그것을 떼어내는 과정이다. 일상에서 문제가 없을 수는 없다. 많은 문제가 있다. 그런데 거기에 **'나'라는 것을 넣어서 버무려 가지고 그것을 계속 유지하려는 것이 문제** 다. 그것만 없다면 삶이 훨씬", "source": "essay"}, {"id": "essay_117_a1ec739e4f", "text": ". 일상에서 문제가 없을 수는 없다. 많은 문제가 있다. 그런데 거기에 **'나'라는 것을 넣어서 버무려 가지고 그것을 계속 유지하려는 것이 문제** 다. 그것만 없다면 삶이 훨씬 가벼워진다. 문제가 앞에 오지 않는다는 것이 아니라, **그것을 맞이하는 것이 훨씬 가벼워지는 것** 이다. 그것으로부터, **'나'라는 그것으로부터 자유로워지는 것.** 그러면 그냥 마실 때 마시고, 아플 때 아파하고, 사랑할 때 사랑하면서 살면 된다. **삶은 있는 그대로 온전하다.** #에고 #나라는꼬리표 #동일시 #올셀프 #온전히받아들임\n\n--- (구분선)\n\n[파일명: 나라는생각_괴로움의근원_수필.md]\n\n### **나라는생각_괴로움의근원_수필**\n\n#### **괴로움에는 언제나 '나'가 전제되어 있다**\n\n힘들다, 괴롭다, 우울하다. 이 말들을 가만히 들여다보면 거기에는 언제나 '내가'가 전제되어 있다. 물리적으로 아파서 괴로울 때는 그때만 괴롭다. 외부에서 압력이 있거나 몸 어딘가가 아프면 그 순간만 괴로운 것이다. 그런데 **생각으로 괴로운 것들은 다 '나'가 전제** 되어 있다. '나'는 의미다. 어떤 생각 안의 내용물이다. 그게 괴로운 것이다. 그런데 우리가 그걸 제대로 눈치채지 못하는 이유는, 거기다 **에고** 라는 것을 또 씌우기 때문이다. '나'라는 생각에 에고라는 것을 한 겹 더 입히면, 그것이 마치 실체가 있는 것 같은 착각을 일", "source": "essay"}, {"id": "essay_118_319c7300b9", "text": "제대로 눈치채지 못하는 이유는, 거기다 **에고** 라는 것을 또 씌우기 때문이다. '나'라는 생각에 에고라는 것을 한 겹 더 입히면, 그것이 마치 실체가 있는 것 같은 착각을 일으킨다.\n\n---\n\n#### **내면의 아이는 실체화의 함정이다**\n\n내면의 아이. 과거의 상처를 치유하기 위해 내면의 아이와 화해한다고 한다. 그런데 그것은 오히려 쓸데없는 짓일 수 있다. 옛날 기억에다 '아이'라는 실체를 만들고, 거기다 감정까지 덧붙이면 더 리얼해진다. 이름까지 주고, 울고 있는 형체까지 만들어낸다. '내면 아이가 울고 있다.' 기억이 점점 더 실체화된다. 이것은 '나'라는 생각에 의미를 쌓아가는 것의 연장이다.\n\n---\n\n#### **'나'라는 관념에 자꾸 의미를 붙인다**\n\n보고, 듣고, 냄새 맡고, 느끼는 것들이 빠르게 순차적으로 일어난다. 너무 빨리 일어나니까 어떤 고정적인 '나'가 있다는 착각이 든다. 그냥 보는 것이 아니라 '내가 본다'고 생각한다. 뭔가 주체가 있어서 그 주체가 보고, 듣고, 생각하고, 감정을 일으킨다고 생각한다. 알게 모르게 '내가'가 항시 붙는다. 거기다 자꾸 의미를 붙인다. '나는 이런 사람이다', '나는 옛날에 어디 살았다', '나는 이걸 좋아하는 사람이다', '나는 지금 이런 일을 하는 사람이다.' 자기소개가 다 그런 식이다. '나는 시인입니다', '나는 누구의 아빠입니다.' 그것은 다 의미다. 의미", "source": "essay"}, {"id": "essay_119_96ff7fd9c4", "text": "'나는 이걸 좋아하는 사람이다', '나는 지금 이런 일을 하는 사람이다.' 자기소개가 다 그런 식이다. '나는 시인입니다', '나는 누구의 아빠입니다.' 그것은 다 의미다. 의미로 자기를 싸는 것이다. 자기 스스로도 자기를 그렇게 안다. '나는 몇 살을 먹었고', '나의 이름은 뭐고', '나는 어디 산다.' 이렇게 해서 '나'라는 것이 완성된 형태의 개념으로 딱 존재한다고 스스로도 그렇게 안다. 최종적으로 포장지가 육신이라는 박스다. 거기 담긴 의미가 '나입니다'인 것이다. 그러나 그것은 다 생각이다. 지금 여기서 보고 듣고 느끼는 이것인데, 이것이 고정되어 있는가. 공방에 가 있을 때는 거기서 보고 듣고 느끼는 것이 나다. 장소만 옮겨서 고정이 되는 것이 아니다. 매 순간 눈으로 보고 귀로 들을 때, 봄이 일어나고 들음이 일어나고 냄새 맡음이 일어나고 감정이 일어난다. 그것들이 동시다발적으로 일어나는데, 이걸 보니까 '이거가 나네' 하는 착각이 든다. 뭔가 주체하는 '나'가 있구나 하고. 그러면서 그 '나'가 삶을 책임져야 되고 주체적으로 끌고 간다고 생각한다. 사실은 그게 아닌데. 그리고 '나'는 교묘하게 숨는다. '나는 불안해', '이건 안 돼', '이걸 원해' 앞에 다 '나'가 전제되어 있는데, 그 '나'를 살짝 빼버린다. '이래야 돼, 저래야 돼', '이런 건 오면 안 돼'. '나'가 너무 앞에 딱 서버리면 불안하기 때문이", "source": "essay"}, {"id": "essay_120_840cd10fb7", "text": "이걸 원해' 앞에 다 '나'가 전제되어 있는데, 그 '나'를 살짝 빼버린다. '이래야 돼, 저래야 돼', '이런 건 오면 안 돼'. '나'가 너무 앞에 딱 서버리면 불안하기 때문이다. 그래서 '나'는 숨고 앞에만 내세운다. 그걸 여실히 봐야 한다.\n\n---\n\n#### **허구의 나가 삶을 끌고 가려 한다**\n\n'나는 박의섭이고, 어디 살고, 뭘 좋아하고, 어떤 사람이다.' 이 '나'가 지금 순간순간 찰나찰나 변하는 삶을 끌고 가겠다는 것이다. 그것이 **에고** 다. **허구의 나** 가 삶을 끌고 가는 것이다. 그런데 생각으로 만들어진 이 '나'는 실상이 아니다. 생각으로 이루어진 것이다. 심지어 생각조차도 마음대로 안 된다. 들리는 것, 보이는 것, 느낌, 감정 — 하나도 내 마음대로 되는 것이 없다. 내가 안 듣고 싶어도 들린다. 생각도 내가 원하지 않아도 떠오른다. 느낌도 나온다. 그런데 이 관념의 '나'가 안정되고 만족한 삶을 살고 싶어 한다. **그게 괴로움의 실체다.** 생각의 놀음이다. 계속 생각의 놀음에 빠려 평생을 사는 것이다. 평생을 자기 자신을 괴롭히면서. 남을 볼 때도 관념으로 본다. '쟤는 어느 학교 나오고, 뭘 잘하고, 뭘 못하고.' 관념인 내가 관념인 상대방을 상대한다. 내 관념대로 상대방이 움직여주기를 바란다. '왜 내 관념을 만족시켜 주지 않느냐'고 한다. 관념이 관념을 상대하면서 내 관념대로 걔가 움", "source": "essay"}, {"id": "essay_121_128213ded9", "text": "' 관념인 내가 관념인 상대방을 상대한다. 내 관념대로 상대방이 움직여주기를 바란다. '왜 내 관념을 만족시켜 주지 않느냐'고 한다. 관념이 관념을 상대하면서 내 관념대로 걔가 움직여주길 바라는 것이다. 귀신 씨나 까먹는 놀음이다. 물리적으로 아프면 그냥 아프면 된다. 고통이 오면 그때 고통을 받으면 된다. 그런데 '나'가 있어서 미리 아프지 않을까 노심초사하고 겁을 낸다. 매 순간순간을 온전히 살지 못하게 된다. **'나'가 생생한 삶의 흐름을, 삶의 역동을 계속 방해하는 것이다.** 인연이 오는 것도 걔가 꼬이게 만든다. 왜곡되게 생각하기 때문이다.\n\n---\n\n#### **우월감과 열등감은 쌍이다**\n\n'나는 4년제 대학을 나왔다.' 이 관념이 나라고 생각하면, 대학원을 나온 사람 앞에서 위축된다. 고등학교를 나온 사람 앞에서는 우월감이 생긴다. 관념이 기준이 되어 열등감과 우월감이 번갈아 온다. 우월감만 느끼고 싶다. 그런데 **우월감과 열등감은 항시 쌍으로 있다.** 하나만 느낄 수는 없다. 우월감을 느끼기 위해서 열등감도 느껴야 한다. 이것이 '나'라는 관념이 만들어내는 구조다.\n\n---\n\n#### **나는 올셀프라는 바다의 파도다**\n\n'나'라는 것이 없어져 버렸다는 것, 그게 **깨어남** 이다. 하늘을 날고 병을 치유하는 것이 아니다. **생각의 놀음에서 깨어나는 것이다.** '이게 다 생각의 일이구나'를 알아차리는 것", "source": "essay"}, {"id": "essay_122_23c1118625", "text": "것이 없어져 버렸다는 것, 그게 **깨어남** 이다. 하늘을 날고 병을 치유하는 것이 아니다. **생각의 놀음에서 깨어나는 것이다.** '이게 다 생각의 일이구나'를 알아차리는 것이다. 나는 **올셀프라는 바다에서 순간순간 찰나찰나 일어나는 파도** 와 같은 이벤트다. 여기서 일어날 때는 여기 파도이고, 저쪽으로 가면 저쪽 파도다. 고정되어 있지 않다. 그런데 이 생각의 '나', 관념의 '나'는 안정된 파도의 형태를 추구하고 싶어 한다. 거기서 나만 빠지면 된다. 고통이 오면 고통을 받으면 된다. 그때 고통을 받으면 되는 것이다. 그것은 다 왔다 갔다 하는 손님이다. 찰나찰나 변하는 것으로 이루어져 있기 때문에, 고통이 계속될 수가 없다. 잠잘 때는 '나'가 없다. 내가 느끼는 세상이 없는 것이다.\n\n---\n\n#### **계절을 막을 수 없듯이**\n\n계절을 막을 수 없다. '나는 봄만 느끼고 싶다'고 해서 겨울이 안 오는 것이 아니다. 내 몸도, 생각도, 인연도, 사건도 — 내 마음대로 컨트롤할 수 있는 것이 없다. 파도가 바다를 어떻게 마음대로 하겠는가. '나는 봄만 있어야 된다'고 해서 다른 계절이 올 것을 미리 예상하고 불만족스러워한다. '왜 이렇게 불안하지?' 그 속을 들여다보면, 그것은 **'나'라는 생각의 욕구가 채워지지 않은 것** 이다. 외로우면 외로우면 된다. 그것이 뭐가 문제인가. '내가 외롭다고 생각하니까' 문제가", "source": "essay"}, {"id": "essay_123_e490b31705", "text": "안하지?' 그 속을 들여다보면, 그것은 **'나'라는 생각의 욕구가 채워지지 않은 것** 이다. 외로우면 외로우면 된다. 그것이 뭐가 문제인가. '내가 외롭다고 생각하니까' 문제가 되는 것이다. '나는 외롭지 않아야 된다'는 관념이 있기 때문이다. '나는 불안해서도 안 되는 사람이고', '나는 안정감을 추구해야 되는 사람이고', '남보다 하나라도 잘나야 되는 사람이고', '남한테 초라해 보이기 싫은 사람이고' — 이런 것들이 다 관념이다. 그러니 삶을 못 받아들이는 것이다. 삶의 흐름을 못 타는 것이다. 그냥 그때그때 들리고 보고 냄새 맡고, 이것이 다 '나'라고 보고 이것이 전부라고 생각한다면, 그냥 매 순간 경험을 하면 된다. 뭐가 올지 모르는 것이다. 거기에 좋고 나쁨이 없다. 경험만 있는데, 거기다 자꾸 '이거는 내가 바라는 게 아니야', '내가 바라는 삶이 아닌데 왜 이런 게 나한테 오지?' 하면서 의미부여를 한다. 그러면서 '나는 괴로워'가 된다.\n\n---\n\n#### **생각의 놀음을 여실히 본다**\n\n생각 자체는 문제가 아니다. **생각의 내용물의 핵심이 '나'라는 생각이다.** 그것을 여실히 봐야 한다. '이게 지금 생각의 놀음에 빠져있구나'를 알아차리는 것이다. 거기서 깨어나는 것이다. '내가 왜 이렇게 우울한 생각이 들지?', '왜 이렇게 불안하지?' — 거기에는 이미 '나'가 전제되어 있다. '나'라는 것의 욕구가", "source": "essay"}, {"id": "essay_124_064fb343e7", "text": "알아차리는 것이다. 거기서 깨어나는 것이다. '내가 왜 이렇게 우울한 생각이 들지?', '왜 이렇게 불안하지?' — 거기에는 이미 '나'가 전제되어 있다. '나'라는 것의 욕구가 충족되지 않는다고 느끼는 것이다. 그것을 속속들이 들여다보면, '이게 또 내가 생각의 놀음에 빠져서 헛짓거리를 하고 있구나'를 보게 된다. 이것 하나만 해결되면 다 끝난다. 수행이고 뭐고 다 끝이다. 모든 고의 원인이 이것이기 때문이다.\n\n---\n\n#나라는생각 #에고 #괴로움의근원 #생각의놀음 #올셀프파도\n\n--- (구분선)\n\n[파일명: 나라는생각은허구인가_의식의구성_수필.md]\n\n### **나라는생각은허구인가_의식의구성_수필**\n\n#### **'나'를 빼면 무엇이 남는가**\n\n생각의 기능이 마비됐다고 해보자. 보고 듣고 느끼는 것은 다 된다. 다만 생각을 못 한다. 그래도 나는 나다. 그냥 보고 듣고 느끼고 있으니까. 그렇다면 그 상태에서 나를 구성하는 것은 무엇인가. 집을 보고 있으면 그 집의 내용물이 나다. 소리가 들리면 그 소리 들림이 나다. 감각이 닿으면 그 닿음이 나다. '나'라는 생각이 없다면, 그것들을 빼놓고는 나를 설명할 수가 없다. 아프리카에 갔다. 주변 환경, 거기서 들리는 소리, 피부에 닿는 공기, 올라오는 생각들 — 그것들이 다 나를 구성한다. **'나'라는 생각이 없다면 그냥 보고 듣고 느끼고 아는 것이 전부다.** 그게 다다.", "source": "essay"}, {"id": "essay_125_e4989b6409", "text": "거기서 들리는 소리, 피부에 닿는 공기, 올라오는 생각들 — 그것들이 다 나를 구성한다. **'나'라는 생각이 없다면 그냥 보고 듣고 느끼고 아는 것이 전부다.** 그게 다다.\n\n---\n\n#### **생각이 '나'다**\n\n그런데 거기서 '나'라는 생각이 생겨난다. 그 순간부터 달라진다. 전까지는 그냥 보고 듣고 느끼고 그냥 알았는데, 이제는 **내가 보고, 내가 느끼고, 내가 안다** 가 된다. 그 '나'는 어디서 왔는가. **생각이 '나'다.** 지금 '내가 있다'는 느낌, '나'라는 것 — 그것이 생각으로 이루어져 있다. 그것을 빼버리면 그냥 이 봄, 이 느낌, 이게 전부다. **'나'는 허구다.** 생각이 만들어낸 것이다. 그렇다고 보고 듣고 느끼는 것이 없다는 말이 아니다. 그것들은 그냥 있다. 다만 거기에 '나'라는 꼬리표를 붙이는 것이 생각이라는 것이다. 그 생각을 걷어내면 — 그냥 봄, 그냥 들림, 그냥 느낌만 있다. 그것이 전부다. 그리고 그것으로 충분하다. #나는허구 #의식의구성 #그냥앎 #에고 #올셀프\n\n--- (구분선)\n\n[파일명: 나라는허구_작용반작용_수필.md]\n\n### **나라는허구_작용반작용_수필**\n\n#### **소리를 듣는 '나'는 어디 있는가**\n\n차가 지나가면 소리가 들린다. 그 순간 우리는 '내가 듣는다'고 생각한다. 그런데 소리가 사라지면, 소리를 듣던 '나'는 어디 있는가. 없어진 것이다. 그", "source": "essay"}, {"id": "essay_126_4ffad8f889", "text": "'는 어디 있는가**\n\n차가 지나가면 소리가 들린다. 그 순간 우리는 '내가 듣는다'고 생각한다. 그런데 소리가 사라지면, 소리를 듣던 '나'는 어디 있는가. 없어진 것이다. 그 '나'는 소리가 있었기에 생긴 것이다. 외부의 소리와 내가 만나는 관계에서 형성된 것이다. 새소리를 들으며 '좋다'는 '나'도, 새소리가 없어지면 없어진다. 이것이 **조건 지어진 '나'**다. 그런데 이 '나'가 계속 바뀌면 정체성이 없어질 것 같으니, 우리는 하나의 **가상의 '나'**를 개념으로 세운다. 소리를 경험하고, 소리를 판단하고, 좋고 싫음을 일으키고, 고통을 받는다고 생각하는 그 '나'. 음식을 먹으면 맛있는 '나', 졸리면 졸린 '나', 배고프면 배고픈 '나'가 계속 바뀌는데, 그 모든 것을 하나의 '나'로 묶어 놓은 것이다. 그러면서 그 조건 지어짐을 계속 강화한다. \"나는 이건 싫어\", \"이건 좋아\"를 반복하면서 스스로 프로그래밍을 받는다. 컴퓨터 화면에 영상이 떠오르지만, 그 영상이 컴퓨터 자체일 수는 없듯이, 아무리 오래 비춰져도 그 영상은 컴퓨터가 아니다. 그런데 우리는 그 영상을 '나'로 믿고 착각하면서 산다.\n\n---\n\n#### **반응이 올라오는 것은 자연스러운 것이다**\n\n'나'라는 것은 어떤 고정된 실체가 아니다. 외부와 내 안에서 일어나는 것들과의 관계에서 생겨나는 하나의 **현상** 이다. 파도처럼. 앞의 파도가 뒤의", "source": "essay"}, {"id": "essay_127_d77cda5f67", "text": "자연스러운 것이다**\n\n'나'라는 것은 어떤 고정된 실체가 아니다. 외부와 내 안에서 일어나는 것들과의 관계에서 생겨나는 하나의 **현상** 이다. 파도처럼. 앞의 파도가 뒤의 파도를 결정하고, 뒤의 파도가 그다음 파도를 결정하듯이. 삶의 역동성이 그렇다. 소리가 일어나면 소리가 들리는 것이고, 생각이 일어나면 생각이 드는 것이다. 그 생각도 내가 주체적으로 일으키는 것이 아니다. 외부의 자극에 의해서 일어나는 것이다. 위험한 상황이 눈에 들어오면 두려운 감각이 올라온다. 그것도 사실은 어떤 에너지가 올라온 것인데, 우리가 거기에 '두렵다'고 이름을 붙인 것뿐이다. 배가 고프면 먹어야 한다. 위험이 오면 피해야 한다. \"나는 수행을 했으니 배가 고프면 안 돼\"라거나 \"저건 둘이 아니니까 괜찮아\" 할 수는 없다. 외부에서 오는 자극과 그에 따라 내 안에 올라오는 반응은 **너무나 자연스러운 것** 이다. 그것을 통제하려는 욕망, 아무리 외부의 자극이 와도 태연해지겠다는 욕망, 그것도 하나의 조건이다. **조건에 구애받지 않는 '나'를 만들려는 것도 조건 지어진 '나'**다. 수행으로 다다르려는 어떤 가공의 상태, 그것도 하나의 조건 지어짐이다.\n\n---\n\n#### **고착화가 문제다**\n\n반응이 올라오는 것 자체는 자연스럽다. 슬픔은 슬픔이 있으면 된다. 두려움은 두려움이 있으면 된다. 그것들은 형성된 것이기 때문에, 그 외부의 자극", "source": "essay"}, {"id": "essay_128_f115ca75b5", "text": "### **고착화가 문제다**\n\n반응이 올라오는 것 자체는 자연스럽다. 슬픔은 슬픔이 있으면 된다. 두려움은 두려움이 있으면 된다. 그것들은 형성된 것이기 때문에, 그 외부의 자극이 사라지면 해소되어 버릴 것이다. 하나의 일어남이고 사라짐이다. 문제는 거기에 '두려움'이라는 이름을 딱 붙여 고착화시키는 것이다. 그러면 다음에 비슷한 감각이 올라올 때 즉시 '두려움'으로 연결되어 버린다. 그리고 그것을 회피하거나, 반대로 '좋음'이면 그것에 집착하거나. **집착하는 '나'가 순간적으로 또 생긴다** . \"나는 이래, 나는 저래\"를 쌓아가면서 '나'를 만들어 놓고, 그 '나'를 바라보면서 또 거기에 묶인다. 그런데 그런 것이 없어도 기뻐할 수 있고, 화가 나면 화가 날 수 있고, 그러면서 사는 데 아무 문제가 없다. 다만 우리가 그것에 끄달리면서 살고 있는 것이다.\n\n---\n\n#### **작용-반작용은 물리 법칙이다**\n\n외부가 나를 규정 짓는다. 내가 외부에 어떤 작용을 했느냐에 따라 외부가 나를 그렇게 규정 짓는다. 이것은 물리 법칙이다. 내가 형성시킨 것만큼의 반작용이 나한테 온다. 바닷가의 큰 섬은 그 둘레에 있는 파도 전체에 영향을 받는다. 바닷가의 모래 한 알은 그 모래 면적만큼의 영향만 받는다. 내가 얼마나 많은 외부와 조건을 걸어놓았느냐에 따라 그만큼의 반작용이 돌아온다. 예를 들어 A가 권력을 유지하기 위해 수많은 외부와", "source": "essay"}, {"id": "essay_129_4140c2bc32", "text": "래 한 알은 그 모래 면적만큼의 영향만 받는다. 내가 얼마나 많은 외부와 조건을 걸어놓았느냐에 따라 그만큼의 반작용이 돌아온다. 예를 들어 A가 권력을 유지하기 위해 수많은 외부와 조건을 걸어 강화시켜 놓았다고 하자. 그 강화된 것만큼의 반작용이 온다. 강한 긴장이 고착화됐다면, 그것은 강한 반작용을 일으키게 되어 있다. 한 방에 폭발해서 해소되든, 조금씩 깨지든, 어떤 방식으로든 강화된 것은 그렇게 될 수밖에 없다. 자연이 그렇기 때문이다. 자기를 강화시키기 위해 외부와 걸어놓은 조건들이 결국 자신을 규정 짓는다. 내가 지시한 것이 나한테 돌아온다. 반대로 외부를 위해 좋은 일을 하면, 그 좋은 것들이 나를 규정 짓는다. 봉사를 하면 봉사한 사람이 되고, 사회에 해를 끼치면 그것이 나를 규정 짓는다. 이것은 누가 심판을 하고 안 하고의 문제가 아니다. 어떤 신이 선악을 따지는 문제도 아니다. **작용-반작용의 물리 법칙이다** . 그러니까 외부를 좋게 만들어야 된다는 것이 당연해진다.\n\n---\n\n#### **안팎이 따로 없다**\n\n내부와 외부는 따로 있지 않다. 항상 함께 발생하고 서로 상호작용 한다. 안팎이 따로 없다는 말이 그것이다. 지금 이 글을 읽으면서 어떤 생각이 일어난다면, 그 생각은 자기가 일으킨 것이 아니다. 이 글을 읽었기 때문에 일어나는 것이다. 그리고 그 생각을 '맞다', '틀리다' 판단하는 것도, 과거에 조건", "source": "essay"}, {"id": "essay_130_0b4c7b8ce2", "text": "면서 어떤 생각이 일어난다면, 그 생각은 자기가 일으킨 것이 아니다. 이 글을 읽었기 때문에 일어나는 것이다. 그리고 그 생각을 '맞다', '틀리다' 판단하는 것도, 과거에 조건 지어진 생각들이 지금의 새 패턴을 해석하는 것이다. **새로운 패턴을 과거의 패턴이 해석하여 또 새로운 패턴을 만든다** . 그 패턴의 연속인 것뿐인데, 거기에 '나'가 붙는다. 그 '나'가 허구라는 것이다. '나'라는 경험이 없다는 것이 아니다. 소리가 들리면 들리고, 밥을 먹으면 배가 부르고, 두려움이 오면 두려움이 있다. 그 경험은 생생하게 있다. 다만 그것을 경험하는 '나'라는 고정된 실체가 없다는 것이다. 조건에 의해 형성되고, 조건이 사라지면 사라지는 것이다. 그것을 알면, 끄달릴 것이 없다. #허구의나 #작용반작용 #조건지어진나 #올셀프 #패턴\n\n--- (구분선)\n\n[파일명: 나를찾는법_지금이상황이나다_수필.md]\n\n### **나를찾는법_지금이상황이나다_수필**\n\n#### **나를 어디서 찾는가**\n\n사람들이 나를 찾는다고 한다. 그런데 나를 어디서 찾는가. 딴 데서 찾을 수는 없다. **내가 지금 처한 상황, 그리고 그 상황을 바라보는 나—이것이 다 그냥 나다.** 딴 데 가서 '나는 무엇일까' 아무리 찾아봐도 답을 찾을 수 없다. 누가 가르쳐 줄 수도 없다. '너는 이거야' 하고 말해준들, 그것은 그 사람이 보는 나이지 내가 알고 싶은 나가", "source": "essay"}, {"id": "essay_131_e64b13536c", "text": "데 가서 '나는 무엇일까' 아무리 찾아봐도 답을 찾을 수 없다. 누가 가르쳐 줄 수도 없다. '너는 이거야' 하고 말해준들, 그것은 그 사람이 보는 나이지 내가 알고 싶은 나가 아니다. 남이 가르쳐 준 답은 소용이 없다. **여기를 봐라 하고 가리킬 수는 있지만, 가르쳐 줄 수는 없다.** 내 상황을 가장 잘 아는 사람이 나다. 어떤 식으로 해결하고 싶은지도 내가 가장 잘 안다. **그 상황을 온전하게 끌어안을 때에 거기서 방법이 나온다.** 상황을 완전히 부정하면서 다른 것을 찾는다면, 그것은 상황에 대한 해결책이 아니다.\n\n---\n\n#### **문제가 곧 해답이다**\n\n지금 처한 상황에서 문제가 생겼다면, 그것을 수용하고 그 상황을 잘 봐야 한다. 거기서 해답이 나온다. 상황을 **회피하거나 확대 해석하거나** 하면 이 상황에 맞는 해답이 아니다. 내가 무엇인지 알고 싶은 것도 마찬가지다. 조용한 데 가서, 특별한 데 가서 찾을 것이 아니다. 지금 이 상황에 처해 있는 내가 진짜 나다. **여기서 관(觀)을 해야 한다. 나를 잘 봐야 한다.** **문제가 곧 해답이다.** 문제도 나다. 지금 처한 상황을 통째로 나라고 수용할 때에, 거기서 새로운 해결책을 발견할 수 있다. 습관적으로는 상황을 벗어난 무언가를 찾게 된다. 생각으로 해답을 찾으려 한다. 그런데 사실 **상황 속에 해답이 다 있다.** 내 안에 답이 있다는 것이 그", "source": "essay"}, {"id": "essay_132_845396418f", "text": "을 발견할 수 있다. 습관적으로는 상황을 벗어난 무언가를 찾게 된다. 생각으로 해답을 찾으려 한다. 그런데 사실 **상황 속에 해답이 다 있다.** 내 안에 답이 있다는 것이 그 말이다. 가장 잘 아는 사람은 나다. 정리가 안 되어 있어서 모르는 것일 뿐이다. **정리는 도와줄 수 있다.** 해답을 발견해가는 방법은 같이 생각해볼 수 있다. 그런데 답 자체는 내가 찾는 것이다.\n\n---\n\n#### **넘어진 자리에서 딛고 일어난다**\n\n**내가 넘어진 자리에서 딛고 일어나야 한다.** 거기 이외에 다른 방법이 없다. 돈이 없다고 해서 일확천금을 꿈꾸거나, 끌어당김으로 해결하거나, 투기로 방법을 찾으려 하면 안 된다. 그것은 지금 이 상황을 벗어나서 찾는 것이다. 지금 이 현실이 곧 나다. 여기를 온전히 보는 것—그것이 나를 찾는 유일한 방법이다. #나를찾는법 #현실이나다 #문제가해답 #수용 #지금이상황\n\n--- (구분선)\n\n[파일명: 나에대한오해와전체의식_올셀프_수필.md]\n\n### **나에대한오해와전체의식_올셀프_수필**\n\n#### **나는 육신 안에 갇혀 있지 않다**\n\n우리가 나라는 것을 이 육신 안에 있다고 자꾸 착각한다. 그게 가장 큰 문제다. 당신이 저기 있고 내가 여기 있다. 각각의 육체 안에 나라는 것이 따로 있다고 느끼니까, 우리는 분리되어 있다고 느낀다. 그런데 사실 **나는 이 육신을 넘어선 전체다.** 그것이 올", "source": "essay"}, {"id": "essay_133_41ebce2fb7", "text": "이 저기 있고 내가 여기 있다. 각각의 육체 안에 나라는 것이 따로 있다고 느끼니까, 우리는 분리되어 있다고 느낀다. 그런데 사실 **나는 이 육신을 넘어선 전체다.** 그것이 올셀프의 개념이다. 이걸 논리적으로 생각해보자. 달에 토끼가 뛰어다니는지 우리는 모른다. 그렇다고 달이 우주를 벗어나 있는가. 아니다. 아프리카에 사자가 몇 마리인지 모른다고 아프리카가 지구를 벗어나 있는 것이 아닌 것처럼, 내 의식 안에서 당신이 일어나고 있다는 것을 모른다고 해서 우리가 분리되어 있다고 볼 수는 없다.\n\n---\n\n#### **너라는 파도, 나라는 파도**\n\n**올셀프** 는 이 모든 것이 다 나라는 것이다. 그렇다면 나는 이 허공에도 있다. 허공에 있으니까 나를 이렇게 볼 수 있는 것이다. 지금 우리가 느끼는 이 허공, 이 의식 공간, 이 공성(空性) — 그 안에서 당신이라는 것과 나라는 것이 일어나고 있다. 이 공간이 다 나다. 그 공간에서 **너라는 파도와 나라는 파도** 가 일어나고 있는 것이다. 같은 바다에서 일어나는 파도들이다. 육신을 벗어나면 다 나다. 똑같이 이 공간을 공유하고 있다. 나를 육신 안에 가두는 순간 **분리감** 이 생긴다. 그 분리감이 괴로움의 뿌리다. 나는 육신에 갇혀 있지 않다. 나는 이 전체다. #올셀프 #분리감 #전체의식 #공성 #온나\n\n--- (구분선)\n\n[파일명: 나의동일성_앎의본질_수필.md]\n\n##", "source": "essay"}, {"id": "essay_134_4dd0178649", "text": "괴로움의 뿌리다. 나는 육신에 갇혀 있지 않다. 나는 이 전체다. #올셀프 #분리감 #전체의식 #공성 #온나\n\n--- (구분선)\n\n[파일명: 나의동일성_앎의본질_수필.md]\n\n### **나의동일성_앎의본질_수필**\n\n#### **어렸을 때와 지금, 똑같은 게 뭐가 있을까**\n\n어렸을 때와 지금, 똑같은 것이 무엇이 있을까. 이름은 바꿀 수 있다. 외모는 완전히 달라졌다. 혈액형은 피의 속성이지, 나를 대표할 수는 없다. 유전자는 프로그램이 된 것이지, 유전자가 나인 것은 아니다. 살아온 이야기, 직업, 어디 사는지, 어떻게 살아왔는지 — 이런 것들도 다 내용물이다. 바뀔 수 있고, 내가 잘못 알고 있을 수도 있다. 만약 기억상실증에 걸렸다면, 그것들은 전부 없어진다. 그런데 나는 있다. 기억을 잃었다가 돌아와도, 계속 유지되는 무언가가 있다. 그게 뭔가.\n\n---\n\n#### **보는 것은 바뀌고, 보는 것은 변하지 않는다**\n\n서울에 살 때와 지금 학곡리에 살 때, 보는 것은 다르다. 안방에 있을 때와 작업실에 있을 때, 보는 것도 다르다. 시냇물 소리를 듣다가 덤프트럭 소리를 들을 수도 있다. 내가 기억하는 것, 지금 떠오르는 느낌, 감정 — 이런 내용물들은 다 변한다. 그런데 그것을 **아는 것** 이 있다. 그것은 변하지 않는다. A가 나타나면 A를 알고, B가 나타나면 B를 알고. 내용물은 계속 바뀌지만, 그 앎은 어렸을 때부", "source": "essay"}, {"id": "essay_135_f98cbae088", "text": "은 다 변한다. 그런데 그것을 **아는 것** 이 있다. 그것은 변하지 않는다. A가 나타나면 A를 알고, B가 나타나면 B를 알고. 내용물은 계속 바뀌지만, 그 앎은 어렸을 때부터 지금까지 똑같다. 그게 나일 것이다.\n\n---\n\n#### **앎과 대상은 쌍으로 있다**\n\n그런데 그 앎이 A나 B와 따로 떨어져 있는 것이 아니다. A가 따로 있고, 그것을 아는 것이 따로 있는 게 아니다. A와 그것을 아는 것은 **항시 쌍으로 함께 있다** . 지금 이 환경과 내가 느끼는 것, 내가 보고 듣는 것과 나 — 이것은 분리될 수 없다. 통으로 하나로 같이 있는 것이다. 내가 환경을 보는 것이 아니라, 환경과 나는 이미 함께 일어나고 있다. #나의동일성 #앎 #올셀프 #안팎이없음 #이미그러함\n\n--- (구분선)\n\n[파일명: 나임증명_기억의정체성_수필.md]\n\n# 나임증명_기억의정체성_수필.md\n\n## 나무는 나무임을 증명하지 않는다\n\n사람들은 나다워지려 하고, 나를 증명하려 하고, 나를 확인하려 한다. 그런데 나무는 굳이 자기가 나무임을 증명할 필요가 없다. 왜냐하면 나무니까.\n\n수행하는 사람들의 오류가 여기에 있다. 깨달음을 찾거나, 깨달음을 얻거나, 깨달음이 되려고 하거나. 내 깨달음을 내가 증명하려 하면, 그것 때문에 못 얻게 된다. 왜냐하면 그전에는 그게 아니었다는 것을 증명해 버리기 때문이다. **내가 나를 찾아버리는 순간에 잊어버", "source": "essay"}, {"id": "essay_136_0a1faf2401", "text": "려고 하거나. 내 깨달음을 내가 증명하려 하면, 그것 때문에 못 얻게 된다. 왜냐하면 그전에는 그게 아니었다는 것을 증명해 버리기 때문이다. **내가 나를 찾아버리는 순간에 잊어버려야 된다.** 이게 아주 미묘한 것이다.\n\n나를 찾거나, 나를 증명하거나, 내가 되려고 하거나. 이런 것이 넌센스라는 거다. 그러면 어떻게 살아야 하냐고 물을 수 있다. 그런데 굳이 그럴 필요가 없다는 것이 요점이다. 나무가 나무임을 애쓰지 않아도 나무인 것처럼.\n\n## 기억으로 이루어진 나\n\n지인 한 분이 해외여행 중에 멋진 경치 앞에서 이런 글을 올렸다. 나는 누구인가. 내가 살아온 게 아무 의미가 없다면. 먹고 사는 데 아무 지장 없고, 아주 좋은 음악 듣고, 파크 골프에 탁구에 여행까지 다니면서, 보통으로 보면 거의 천국에 사는 것 같은데, 엄습해 오는 허전함이 있다는 것이다.\n\n이게 비단 그 한 사람만의 문제가 아니다. 공부를 많이 하고 사회에서 높은 자리까지 오른 사람도 이 문제 앞에선 마찬가지다. 법학대학원 교수도, 관광공사 사장도. **나는 누구인가**. 이게 사람들 공통의 문제다.\n\n그 허전함이 왜 오냐면, 기억으로 살기 때문이다. 기억이 재생되는 것이기 때문에. 내가 나라는 것을 기억이 나를 꽉 붙들고 있어야 하는데, 살아갈수록 그게 점점 희미해진다. 실체가 아니니까. 자꾸 자꾸 휘발이 된다.\n\n우리가 지금 음악을 듣는 것도 기억으로 듣는", "source": "essay"}, {"id": "essay_137_2f22c80c3a", "text": "내가 나라는 것을 기억이 나를 꽉 붙들고 있어야 하는데, 살아갈수록 그게 점점 희미해진다. 실체가 아니니까. 자꾸 자꾸 휘발이 된다.\n\n우리가 지금 음악을 듣는 것도 기억으로 듣는 것이다. 기억이 재생되는 것이다. 상대방의 소리가 연결되어 들리는 것도 기억 때문이다. 기억이 없으면 그냥 가 나 다, 분절돼 버린다. 기억이 있기 때문에 나의 삶이라는 것이 인정된다.\n\n그런데 그것만으로 나의 정체성을 삼으려 하니까, 이게 자연발화적으로 휘발되는 것을 못 견디는 것이다. 치열하게 살았는데, 그게 점점 희미해진다. 굉장히 의미 있는 일이라고 막 쥐고 살았는데, 이제 휘발이 되는 것이다. 점점 나약해지는 것 같은데, 사실 그게 **자기 본연의 모습으로 가고 있는 것**이다.\n\n## ego가 찾는 참나는 없다\n\n사람들이 나다운 모습을 딴 데서 찾으려 한다. 나답게 산다고 얘기하지만, 그 이면에는 뭔가 되고 싶은 롤모델이 내 안에 작동하고 있다. 이것을 바꿔서 다른 나가 되고 싶은 것이다. 그런데 **그것 때문에 안 된다**는 거다.\n\n자원봉사를 하고 남한테 도움을 주면 보람이 크다고 한다. 그것도 의미를 쫓는 것이다. 그래서 그때 뿐이다. 수행을 해서 뭔가 깨달음의 경지를 얻었는데, 지나고 나면 또 도로 마찬가지가 된다. 그런 것은 근본적인 해결책이 안 된다.\n\n**ego가 찾아서 완벽한 참나가 될 수 없다.** 불안한 것도 그래서 불안한 것이", "source": "essay"}, {"id": "essay_138_6d180bdce0", "text": "지를 얻었는데, 지나고 나면 또 도로 마찬가지가 된다. 그런 것은 근본적인 해결책이 안 된다.\n\n**ego가 찾아서 완벽한 참나가 될 수 없다.** 불안한 것도 그래서 불안한 것이다. 그게 계속 두드리는 것이다. 너는 그게 아니야. 그래서 불안이 오는 것, 그것도 신의 선물이다. 불안하기 싫어서 여행을 가고, 좋은 음악을 듣고, 맛있는 걸 먹고, 그런 것으로 메우려 하는데 메워지질 않는다. 기억으로 이루어진 것이기 때문에.\n\n덕지덕지 했던 것들, 내가 나라고 너무 강력하게 믿었던 것들이 떨어져 나가는 건데, 그게 두려운 거다. 그 덕지덕지가 나라고 믿었기 때문에. 그런데 본인은 그것을 모른다.\n\n## 올셀프 — 통으로 수용되는 이것\n\n그렇다면 어디로 가야 하는가. 두 가지 방향이 있다. 하나는 부정으로 가는 것이다. 프랜시스 루시나 루퍼드 스파이라 같은 방식이다. 이건 너가 아니지? 이것도 너가 아니야? 언어로 언어를 치료하는 것, 독으로 독을 제거하는 것이다.\n\n나는 반대로 간다. **긍정으로**, **온전히 받아들이는 것**으로 간다.\n\n생각이 떠오르면 이렇게 볼 수 있다. 이 생각도 내 안에서 떠오르는구나. 그런데 이건 내가 떠오른 게 아니고 저절로 떠오른 거구나. 그러니 이 생각에 대해서 내가 굳이 책임질 필요가 없다. 저 하늘의 구름은 내 구름이 아니라고 생각하니까 먹구름이 되든 사라지든 상관없다. 그런데 그걸 내 것이라고", "source": "essay"}, {"id": "essay_139_0a87d169d3", "text": "오른 거구나. 그러니 이 생각에 대해서 내가 굳이 책임질 필요가 없다. 저 하늘의 구름은 내 구름이 아니라고 생각하니까 먹구름이 되든 사라지든 상관없다. 그런데 그걸 내 것이라고 여겨버리면 변할 때마다 불안해진다.\n\n내 안에서 올라오는 감정이 됐건 뭐가 됐건, 그것을 그냥 **온전히 통과하는 것**이다. 이게 살아있음을 증명하는 것이다. 생생함이다. 그런데 우리는 이 생생함이 즐거움으로만 왔으면 좋겠다. 멋진 차를 타고 드라이브하는 쾌감만이었으면 좋겠고, 물에 풍덩 빠져 허우적거리는 것은 아니었으면 한다.\n\n그런데 지금 나한테 주어지는 것이, 보이고 들리는 모든 것이 통으로 **올셀프**라면, 그 올셀프임을 내가 그냥 온전히 수용할 수 있다면. 내가 이 모습으로 존재할 수 있다는 것 자체가 이미 수용이 되고 있는 것이다. 내 안에서 올라오는 것들이 전부 다 있는 그대로 알아진다.\n\n본성이 있다면, 본성이 그걸 있는 그대로 밀어 올리고 있는 것이다. 나도 그것을 있는 그대로 그대로 알고 있다. 화가 나는 것을 화로 그대로 알아주면 된다. 본성과 내가 둘이 아니라는 것이다.\n\n저기 나무가 있으면, 그 나무가 나무인 것은 나무로서 온전하게 허용된 것이다. 그러니 나무로서 있는 것이다. 나도 그것을 나무로 원판 고대로 보고 있다. 저게 허용되는 것과 내 안에서 이미 그걸 나무로서 허용하는 것이 **둘이 아닌 것**이다.\n\n나는 그걸 통해서,", "source": "essay"}, {"id": "essay_140_dff19e4ffa", "text": "나무로서 있는 것이다. 나도 그것을 나무로 원판 고대로 보고 있다. 저게 허용되는 것과 내 안에서 이미 그걸 나무로서 허용하는 것이 **둘이 아닌 것**이다.\n\n나는 그걸 통해서, 그 나무가 나무임으로써 드러나는 그 마음이 나를 통해서 보이게 되는 것이고, 내가 그 마음을 쓰고 있는 것이다. 내가 그렇게 보는 게 아니다. 사실 내가 하는 게 하나도 없는데.\n\n#나임증명 #기억의정체성 #올셀프 #ego #온전한수용\n\n--- (구분선)\n\n[파일명: 내가생각하는그런상황은없다_수필.md]\n\n### **내가_생각하는_그런_상황은_없다_수필**\n\n#### **자꾸 뭘 붙이는 일**\n\n어떤 일이 있었다. 나무토막을 얻으러 온 사람이 있었고, 상황이 여의치 않아 그냥 돌아가게 됐다. 내 집에 온 손님인데 뭘 좀 줘서 보냈어야 됐나. 그 걸림이 한동안 마음에 남았다. 거기에 스님 법문이 붙었다. 인연을 잘 살리고 끊을 줄도 알아야 한다는 말씀이었다. 살리기만 하면 안 된다, 경우에 따라서는 더 얽히고설키기 전에 딱 끊을 수 있어야 한다고. 고양이에게 밥을 다 주다 보면 덕은 쌓이겠지만 고양이가 늘어나 **생태계에 오히려 파괴** 가 올 수 있다는 비유였다. 좋은 말씀이었다. 그런데 그 말씀을 들으면서 나는 그 일과 비교하기 시작했다. 비교하니까 내가 잘못한 것 같아졌다. 그 일이 다시 떠오를 때마다 '그때 차라리 줄 걸 그랬나, 안 줄 걸 그랬나,", "source": "essay"}, {"id": "essay_141_5ae21fb58f", "text": "그런데 그 말씀을 들으면서 나는 그 일과 비교하기 시작했다. 비교하니까 내가 잘못한 것 같아졌다. 그 일이 다시 떠오를 때마다 '그때 차라리 줄 걸 그랬나, 안 줄 걸 그랬나, 내가 나쁜 건 아닌가' 하는 생각들이 덧붙었다. **자꾸 뭘 붙이는 거** 였다. 그 일 위에, 생각 위에, 또 생각을. 그렇게 하니까 그 일이 점점 큰 무게로 다가왔다. 실질적으로 무게가 있는 것도 아니었는데. 내가 그 일을 굴리고 굴려서 **내 생각으로 자꾸 크게 만든 거** 였다.\n\n---\n\n#### **내가 생각하는 그런 일은 없다**\n\n그럴 때 생각을 **끊어낼 수 있어야 한다** . 그냥 '아 나 왜 이러지' 하고 자책하는 것보다 더 근본적인 질문을 던져야 한다. **'그게 정말 내가 생각하는 그런 일이 있었나?'** 그 일은 분명 있었다. 사람이 왔고, 나무가 있었고, 그냥 돌아가게 됐다. 그 상황은 사실이다. 그런데 내가 생각하는 그런 일, 즉 내가 잘못한 것이고 나쁜 사람이며 인연을 끊어버린 그 일은 없다. 그건 **일면만 내가 본 거** 고, **내 입장에서만 본 거** 다. 그 사람의 의도가 무엇이었는지 나는 정확히 모른다. **확대 해석해 가지고 내 스스로 고통받고 있었던 거** 다. 더군다나 지금 이 순간, 그 일은 없다. 과거에 있었더라도 지금 떠올리는 이 자리에는 그 일이 없다. 내가 그때를 아무리 생생하게 묘사해봤자, 지금은 그", "source": "essay"}, {"id": "essay_142_26d3d16b85", "text": "받고 있었던 거** 다. 더군다나 지금 이 순간, 그 일은 없다. 과거에 있었더라도 지금 떠올리는 이 자리에는 그 일이 없다. 내가 그때를 아무리 생생하게 묘사해봤자, 지금은 그 일이 없는 것이다. **내가 생각했던 그런 일이 없다는 걸 딱 수용할 때** , 그 기억으로부터 **자유로워지는 거** 다. 그 일이 분명히 있었던 건 사실이다. 그런데 내가 생각하는 그런 일은 없기 때문에, 그것을 굳이 갖고 있을 필요가 없다. **놓고 사는 삶** 이다. **놔버리는 거** 다.\n\n---\n\n#### **판단 기준이 되면 안 된다**\n\n아내가 말했다. 지금 상황이 불만족스러우니까 꼬리에 꼬리를 물고 들어가게 된다고. 이 지역에서 굳이 살아야 하나 싶고, 환경도 그렇고 사람 관계도 그렇고. 따지고 들어가다 보면 그 일이 또 튀어나온다고. 그렇다. 그런데 그게 문제다. **내가 생각하는 그런 일이 없었는데** , 그런 일이 없는 것을 가지고 앞으로의 삶을 **판단 기준으로 삼으면 안 된다** . 어디서 살지를 결정하는 데 있어서, 그 일이 이유가 되어선 안 된다는 거다. 그러면 그 일에다가 여기서 살지 않아야 할 이유를 또 붙이는 것이 된다. 옛날 생각과 지금 생각이 선으로 더 강하게 묶인다. 그러니까 지금 어떻게 해야 되나를 판단할 때 그런 요소들을 **배제해 버려야지만** 변수가 줄어들고 상황을 제대로 파악하면서 결정할 수 있게 된다. 일이", "source": "essay"}, {"id": "essay_143_931c69b236", "text": "선으로 더 강하게 묶인다. 그러니까 지금 어떻게 해야 되나를 판단할 때 그런 요소들을 **배제해 버려야지만** 변수가 줄어들고 상황을 제대로 파악하면서 결정할 수 있게 된다. 일이 복잡해 보이는 건 경우의 수를 많이 생각하기 때문이다. 사실은 그냥 **인연 따라서 산다고 본다면** , 어떤 계기가 올 것이고 그때 맞춰서 판단하면 된다. 새들은 하늘을 날지만 발자국이 없다. 구름은 흘러가지만 자국이 없다. 물도 계속 흘러가지 어떤 모양이 딱 있지 않다. **흔적을 안 남긴다** . 그렇게 살아야 가벼워진다. 물론 옛날 것을 아예 참조하지 말라는 게 아니다. 참조는 할 수 있다. 다만 그것을 **내가 생각하는 일로 하면 오판할 가능성이 많이 생긴다** 는 거다. 상대를 판단할 때도, 나 자신을 판단할 때도. 거기서 생각하면 다 그런 식으로밖에 생각할 수 없다. 그런 것들이 모여서 **에고(ego)**가 된다.\n\n---\n\n#### **갈등하는 나가 생겨버린 거야**\n\n원래 그런 게 없었다. 그런 걸로 고민하는 내가 없었다. 그런데 그 사람이 나무를 얻으러 왔고, 스님 법문을 들으면서 내가 의견을 보탰고, 그 사이사이에 선을 그어가다 보니까 **갈등하는 내가 생겨버린 거** 다. 없던 내가. '그때 그 일을 왜 그렇게 했을까, 이건 잘못된 거 아니야' 하고 고민하는 나가 순식간에 생겨버린 것이다. 그런 나는 원래 없었다. 그거에 선을 긋다", "source": "essay"}, {"id": "essay_144_b376beaa7a", "text": "린 거** 다. 없던 내가. '그때 그 일을 왜 그렇게 했을까, 이건 잘못된 거 아니야' 하고 고민하는 나가 순식간에 생겨버린 것이다. 그런 나는 원래 없었다. 그거에 선을 긋다 보니까 그런 내가 만들어진 거다. 내가 생각하는 그런 일은 없었다. 그러니 그런 일로 생겨난 나도, 사실은 없는 것이다.\n\n---\n\n#생각의굴림 #붙임과놓음 #에고 #인연 #자유로워짐\n\n--- (구분선)\n\n[파일명: 내가생각하는나_선긋기의자유_수필.md]\n\n### **내가생각하는나_선긋기의자유_수필**\n\n#### **별자리는 어디에 있는가**\n\n\"나는 찌질하고, 나는 소심하고, 나는 화가 많고.\" 그것은 하늘의 별에 선을 긋고, 그 별자리가 실체한다고 믿는 것과 같다. 선은 내가 그은 것이다. 그 별자리가 하늘 어딘가에 있는 것이 아니다. 똑같은 하늘의 별을 보면서 전혀 다른 별자리를 그을 수 있듯이, 산들이 그냥 있는데 내가 엮어서 '이거는 무슨 산맥이다'라고 규정 짓는 것처럼 — 내가 살아오면서 겪었던 사건들을 이어서 **'나는 이런 사람이야'** 하고 규정 지은 것이다. 그런데 그 허깨비 같은 나가, 지금 이 순간 생생하게 보이고 들리고 느껴지는 현실 앞에서 먼저 나와 버린다. 찌질한 나, 화나는 나, 소심한 나가 이 생생한 현실을 가려버린다. 가상으로 그어진 선들이 나를 제한한다. '나는 이런 사람이니까 이렇게 행동하면 안 돼. 나는 여기까지가 나야.", "source": "essay"}, {"id": "essay_145_1564fb2383", "text": "찌질한 나, 화나는 나, 소심한 나가 이 생생한 현실을 가려버린다. 가상으로 그어진 선들이 나를 제한한다. '나는 이런 사람이니까 이렇게 행동하면 안 돼. 나는 여기까지가 나야.' 내가 스스로 바깥을 탐색할 가능성을 차단시켜버리고, 거기에 맞는 스토리들만 계속 모아간다. 엄청나게 무한대로 열려있는 가능성 중에서, 나는 내가 규정 지은 그 경로만을 따라간다.\n\n---\n\n#### **그냥 보여질 뿐인데**\n\n그런데 여기서 출발점을 보면, 우리는 항시 '내가 본다'는 것을 전제로 깔고 산다. 그런데 그 '내'가 없어도 지금 보이는 것은 똑같다. 내가 애를 써서 보는 게 아니다. 그냥 보여진다. 아무 노력하지 않아도. 들리는 것도 그냥 들려진다. 아침에 눈 떠보니 세상이 주어져 있고, 속이 쓰리면 쓰린 것이 느껴지고, 기억이 떠오르면 그냥 떠오른다. 거기에 내가 노력을 들인 게 없다. 그런데 거기에 '내가'라는 것이 전제로 깔린다. 그래서 '내가 봤는데', '내가 들었던 건데'가 되고, 거기에 '난 싫어', '좋아'가 엮이고, 그 '나'라는 것이 점점 쌓인다. 감정으로 엮으면 '화가 많은 나'가 되고, 신념으로 엮으면 '나는 이런 사람이야'가 된다. 한 번 그렇게 규정 지어지면, 그것이 굴레가 되어 선택할 수 있는 많은 가능성을 제한시킨다. 이것이 **업(業)**이다. 선을 그어놓으면, 다음 선택도 그 선의 맥락을 따라가게 된다. 그 선에", "source": "essay"}, {"id": "essay_146_4262f385c1", "text": "규정 지어지면, 그것이 굴레가 되어 선택할 수 있는 많은 가능성을 제한시킨다. 이것이 **업(業)**이다. 선을 그어놓으면, 다음 선택도 그 선의 맥락을 따라가게 된다. 그 선에서 벗어나질 못한다.\n\n---\n\n#### **지금 이것을 뭐라 할 수 있는가**\n\n분명히 나라는 무언가가 있다. 지금 여기, 생생하게. 누가 때리면 아프다. 그 아픔을 느끼는 것이 없다고 하면 안 된다. 그런데 지금 이것을 — 여자라고 할 수 있는가, 남자라고 할 수 있는가, 찌질한 나라고 할 수 있는가, 화나는 나라고 할 수 있는가. 뭐라고 규정 지을 수 없다. 그런데 너무 생생하게 있다. 여기도 있고, 저기도 있고, 통으로 있다. 그 생생한 것에, 내가 경험한 특정 사건들을 엮어서 '이게 나'라고 생각하는 것이 에고다. 실체는 뭐라 규정 지울 수 없는데, 거기에 내가 선을 그어 이름을 붙인 것이다. 그 허깨비 같은 것이 평생을 나를 괴롭혀 왔다.\n\n---\n\n#### **선은 내가 그었으니 내가 지울 수 있다**\n\n사건은 있다. 그 사람과 겪은 일은 분명히 있었다. 그것을 잊으라는 것이 아니다. 기억은 내가 어떻게 할 수 없다. 그런데 그 사건을 통해서 내가 그은 선들 — 그것은 내가 그은 것이다. 내가 그은 것이기 때문에, 내가 지울 수 있다. 매번 다르게 그을 수 있다. 그 선을 생각할 때마다 내가 괴롭다면, 거기에 매일 필요가 없다는 것이다. 용서하지", "source": "essay"}, {"id": "essay_147_0fef83f5d0", "text": "내가 그은 것이다. 내가 그은 것이기 때문에, 내가 지울 수 있다. 매번 다르게 그을 수 있다. 그 선을 생각할 때마다 내가 괴롭다면, 거기에 매일 필요가 없다는 것이다. 용서하지 못해도 괜찮다. 그 사람이라는 선은 내가 그은 것이기 때문에, 그 허깨비 같은 선을 용서하는 것은 의미가 없다. 그 일을 '그때는 그런 일이 있었지' 하고 수용할 수 있다. 하지만 그때의 '그런 사람'은 없으니까, 그 사람을 용서하는 것은 다른 문제다. 심리 상담에서는 괴로운 A선을 덜 괴로운 B선으로 바꾸는 작업을 한다. 그런데 선을 바꾸는 것이 아니라, 그 선 자체가 실상이 아님을 아는 것이다. 애초에 내가 착각으로 이은 것이기 때문에, 끊을 것도 없다. **찰나찰나 생겼다 없어지는 것임을 알면** , 그때그때 새롭게 선택할 수 있다. 매 순간 360도로 열려있다. 내가 그 선을 알아채는 순간, 다시 선택이 가능해진다. **내가 묶어놓고 내가 묶였으니, 내가 놓아줄 수 있다.** #선긋기 #에고 #업 #자유 #올셀프\n\n--- (구분선)\n\n[파일명: 내면깡통_학습된기준_수필.md]\n\n### **내면깡통_학습된기준_수필**\n\n#### **깡통은 밖에 있지 않다**\n\n나는 오랫동안 외부에 있는 조건들이 나를 둘러싼 깡통인 줄 알았다. 아이들이 어떻게 돼야 하고, 남편이 어때야 하고, 경제적으로 어떻게 돼야 하고, 그런 것들이 나를 가두는 틀이라고 생각했다.", "source": "essay"}, {"id": "essay_148_9b5a731831", "text": "외부에 있는 조건들이 나를 둘러싼 깡통인 줄 알았다. 아이들이 어떻게 돼야 하고, 남편이 어때야 하고, 경제적으로 어떻게 돼야 하고, 그런 것들이 나를 가두는 틀이라고 생각했다. 그러나 그것이 아니다. 그것들은 그냥 있던 그대로 있을 뿐이다. 나를 가두는 깡통은 외부의 조건이 아니라, **내가 설정한 기준** 이었다. '애들은 이래야 돼', '내 경제적인 수준은 이래야 돼', '남편은 이래야 돼.' 그것이 깡통이다. 내 깡통은 그거다. 보통 우리는 이렇게 생각한다. 외부 조건을 바꾸면 된다고. 깡통이 불편하면 다른 깡통으로 옮기면 된다고. 그래서 신랑을 바꾸려 하고, 아이들을 바꾸려 하고, 이혼을 한다. 그러나 **내 기준을 내려놓지 않으면** , 어떤 깡통으로 옮겨도 나는 여전히 그 안에 갇혀 있다. 깡통은 사라지지 않는다.\n\n---\n\n#### **산은 산이요, 물은 물이로다**\n\n왜 산은 산이고, 물은 물인가. 어떤 단계에서는 산이 산이 아니다. '저 산은 높은 산, 저 산은 낮은 산', '저 물은 좋은 물, 저 물은 나쁜 물.' 그것은 내 깡통 안에서 본 산이고 물이다. **내 기준으로 본 것** 이다. 그런데 산을 그냥 산으로 놓고 보면, 산은 그냥 산이다. 비교할 게 없다. 높은 산이란 낮은 산이 있기에 높은 것이고, 좋은 물이란 나쁜 물 대비 좋은 것이다. 부분으로 떼어내야 비교가 생긴다. 통으로 보면 비교가 없다. 이것이", "source": "essay"}, {"id": "essay_149_733918f052", "text": "산이다. 비교할 게 없다. 높은 산이란 낮은 산이 있기에 높은 것이고, 좋은 물이란 나쁜 물 대비 좋은 것이다. 부분으로 떼어내야 비교가 생긴다. 통으로 보면 비교가 없다. 이것이 **상대성** 이다. 우리는 지금 이 상대성 안에서 왔다 갔다 한다. 산의 높고 낮음에 흔들리고, 물의 좋고 나쁨에 흔들리나. 그러나 그것은 내가 만든 기준이 만들어 낸 진동이다.\n\n---\n\n#### **남의 막대기로 재고 있는 것**\n\n시선을 **내면으로 돌려야 한다** 는 말이 있다. 그것은 내 기준점을 돌아보라는 뜻이다. 나의 **조건 지어짐** 을 들여다보라는 것이다. 그런데 그 조건 지어짐이 과연 내가 스스로 설정한 것인가. 사실은 내 것이 아닌 경우가 많다. 누군가에게 **학습당한** 것이다. 남들이 설정한 기준을 내 것이라고 착각하고 받아들인 것이다. 대행수 말씀에 **주장자** 라는 표현이 있다. 내 기준을 내가 스스로 세우는 것, 남한테 영향받지 않는 자기 자신의 척도. 그런데 지금 우리는 전부 남의 막대기를 들고 길고 짧음을 재고 있다. '나보다 저 막대기가 크네, 난 불행해.' '나보다 작은 막대기를 쥔 사람이 있으니, 난 쟤보다 크네.' 그런데 그 막대기가 과연 내 것인가. 내 주장자를 딱 쥐고 있으면, 그것은 길고 짧음의 문제가 아니다. 상대적인 비교에서 벗어난 것이다.\n\n---\n\n#### **점검이 필요하다**\n\n이런 점검이 필요하", "source": "essay"}, {"id": "essay_150_e9439cb892", "text": "연 내 것인가. 내 주장자를 딱 쥐고 있으면, 그것은 길고 짧음의 문제가 아니다. 상대적인 비교에서 벗어난 것이다.\n\n---\n\n#### **점검이 필요하다**\n\n이런 점검이 필요하다. 지금 내가 불만족스럽고 괴롭다면, 그것이 정말 내가 스스로 세운 기준에서 비롯된 것인가. 아니면 어디선가 은연중에 학습된 기준 때문인가. 만약 남이 설정한 기준 때문에 울고 있다면, 그것은 내 삶이 아니다. 남의 시선으로 보는 것이다. 내가 스스로 설정한 기준에서 불만족스럽다면, 그나마 낫다. 적어도 그것은 내 삶에서 비롯된 것이다. 그러나 남의 기준 때문에 내가 불행 속에 놓인다면, 그것은 말도 안 되는 일이다. **내 삶을 주도적으로 산다는 것** , 그 출발은 거기에 있다. 내가 들고 있는 막대기가 진짜 내 것인지 한 번 보는 것. 그게 아니라면 내려놓는 것. 그것이 깡통에서 벗어나는 길이다. #내면깡통 #조건지어짐 #주장자 #학습된기준 #자유\n\n--- (구분선)\n\n[파일명: 내면아이_조건지어짐_수필.md]\n\n### **내면아이_조건지어짐_수필**\n\n#### **감정이 파인 자리에 기억이 담긴다**\n\n**내면 아이** 라는 말이 따로 있는 것이 아니다. 과거에 내가 경험했던 것들, 그러니까 기억에 감정과 느낌이 붙은 것이 내면 아이다. 기억 자체는 시간이 지나면 어느 정도 휘발된다. 문제는 반복이다. 같은 종류의 경험이 계속 누적되면 그것은 깊이", "source": "essay"}, {"id": "essay_151_e87cd1fb26", "text": "던 것들, 그러니까 기억에 감정과 느낌이 붙은 것이 내면 아이다. 기억 자체는 시간이 지나면 어느 정도 휘발된다. 문제는 반복이다. 같은 종류의 경험이 계속 누적되면 그것은 깊이 새겨지고 **강화** 된다. 그게 **강력한 조건 지어짐** 이 되는 것이다. 단지 기억으로만 있으면 그것은 강하게 형성되지 않는다. 그런데 거기에 강력한 고통이나 안 좋은 느낌이 결합되면, 기억은 그 감정이 파인 자리 속으로 더 깊이 각인된다. 감정이 파인 곳에 기억이 담기는 것이다. 그것이 몸 어딘가에 저장되고, **잠재의식화** 된다. 평상시에는 모른다. 그러다 그것이 발현될 특정한 조건을 만나게 되면, 그때의 느낌이 다시 올라온다. 느낌과 감각이 몸에 저장되는 방식은 마치 **레코드판에 노래가 새겨지듯** 파동으로 저장되는 것이다. 강하게 새겨질수록 지워지기 힘들다. 그 감정을 해소하면 기억이 없어지는 것은 아니다. 다만 단지 기억으로만 남아, 더 이상 나한테 영향을 미치지 않게 된다. 기억 자체가 나쁜 것이 아니다. 안 좋은 감정과 느낌이 결합해서 강하게 각인됐다는 게 문제다.\n\n---\n\n#### **씨앗과 잠복**\n\n어떤 이는 좋은 환경을 만나면서 그때 받은 상처가 발현되지 않을 수도 있다. 따뜻한 사람들을 만나고, 좋은 관계 속에 놓이다 보면 씨앗은 그 안에 있지만 싹을 틔우지 않는 것이다. 그러나 그것은 운이다. 운에 기대는 것이다. 외부 환경", "source": "essay"}, {"id": "essay_152_643160f411", "text": "지 않을 수도 있다. 따뜻한 사람들을 만나고, 좋은 관계 속에 놓이다 보면 씨앗은 그 안에 있지만 싹을 틔우지 않는 것이다. 그러나 그것은 운이다. 운에 기대는 것이다. 외부 환경이 바뀌는 특정한 상황이 오면, 그때의 기억이 다시 올라온다. 그것은 잠복해 있던 것이지, 완전히 해소됐다고 볼 수 없다. **조건 지어짐** 은 이렇게 강화된다. 잠재돼 있던 것이 특정 상황에서 발현되고, 그 발현이 다시 같은 자리를 파고들어 더 깊이 새겨진다. 조건이 조건을 부른다. 그래서 '왜 나한테는 나쁜 사람들만 만나지', '왜 나한테만 힘든 일이 생기지' 하는 질문이 반복된다. 그것은 외부가 나쁜 것이 아니라, 내 안의 잠복한 것이 그 방향으로 계속 끌어당기고 있는 것이다.\n\n---\n\n#### **알아줌으로써 풀린다**\n\n어린 아이가 상처를 받았다. 그 아이는 지금도 그 안에 있다. 나는 지금 여기서 그 아이를 보고 있다. 그 아이가 울고 있는 것은, 감정을 알아주지 못했던 것들이 쌓여 있기 때문이다. 누군가 그것을 알아봐 주는 것만으로도 풀린다. 위로까지가 아니어도 된다. '네가 그것 때문에 고통을 받았구나.' 그 인정, 그 알아줌만으로도 쌓인 것이 풀리기 시작한다. 그런데 우리는 아픈 감정이기에 스스로도 외면한다. 들여다보지 않으려 한다. 그러면서 삶이 반복된다. **의식화** 가 필요한 이유가 여기 있다. 그것을 의식으로 떠오르게 해야 한다.", "source": "essay"}, {"id": "essay_153_d98a80a36a", "text": "런데 우리는 아픈 감정이기에 스스로도 외면한다. 들여다보지 않으려 한다. 그러면서 삶이 반복된다. **의식화** 가 필요한 이유가 여기 있다. 그것을 의식으로 떠오르게 해야 한다. 떠오르게 해서 분리 작업을 해야 한다. 지금 내가 힘든 것이 어렸을 때 받은 상처 때문임을 스스로 이해하게 되면, 과거의 나와 화해가 된다. 감정을 알아줬으니까. 그러면 기억은 남지만 감정의 에너지는 해소된다. 해소시키는 방법은 그때의 것을 느껴주고, 시간과 간격을 줘서 **분리** 시키는 것이다. 느낌을 느낌으로 온전히 받아주면, 느낌은 더 이상 기억을 붙잡고 있지 않아도 된다.\n\n---\n\n#### **파동이 파동으로 해소된다**\n\n감정은 에너지다. **에너지 파장** 이다. 그 파장이 해소되는 방식은 공명이다. 소리가 있을 때, 그 소리를 상쇄하는 소리가 같이 들어가면 소리가 해소되듯, 감정의 파장도 같은 방식으로 해소된다. 그게 되면 그때의 기억을 떠올려도 다시 상처가 되지 않는다. 기억은 기억으로만 남는다. 사실은 감정보다 더 내면의 것은 느낌이다. 정서다. 그것이 더 깊은 곳에 있다. 감정 자체는 문제가 없다. 나쁜 감정이고 좋은 감정이고 하는 것조차, 그것도 내가 조건 지워버린 것이다. 아픈 느낌은 아픈 느낌이다. 아픈 건 아픈 거다. 그러나 거기에 생각을 더 버무려서 오염시키고 왜곡시키는 것이 문제다. 상대방은 그런 의도가 아니었는데, 내 안의", "source": "essay"}, {"id": "essay_154_699d2b8296", "text": "지워버린 것이다. 아픈 느낌은 아픈 느낌이다. 아픈 건 아픈 거다. 그러나 거기에 생각을 더 버무려서 오염시키고 왜곡시키는 것이 문제다. 상대방은 그런 의도가 아니었는데, 내 안의 잠복한 것이 그것을 왜곡해서 읽는다. 그리고 다시 각인이 강화된다. 그걸 젊어서, 또는 일찍 안다면 어떻게 될까. '이건 단지 느낌이다. 아픔은 아픔으로 느낄 수 있다. 기쁨은 기쁨으로 느낄 수 있다. 느껴야 한다. 그러나 거기에 생각을 더 보태서 다시 왜곡할 필요는 없다.' 그것이 **2차 화살을 맞지 않는** 것이다. 1차 화살은 피할 수 없다. 그러나 2차 화살은 내가 쏘는 것이다. #내면아이 #조건지어짐 #의식화 #감정에너지 #2차화살\n\n--- (구분선)\n\n[파일명: 내면아이치유_기억과감정의분리_수필.md]\n\n### **내면아이치유_기억과감정의분리_수필**\n\n#### **내면 아이 치유의 함정**\n\n내면 아이를 정화하고 위로하고 상처를 보듬어서 치유한다는 이야기를 많이 한다. 그런데 그것은 과거에 경험했던 기억들, 아픈 기억들이 감정과 결합되어 어딘가에 저장되어 있는 것이다. 그리고 그 내면 아이가 치유되지 않아서 지금 현실에서 어려움을 겪는다고 본다. 내면 아이를 치유해야 자유를 얻는다는 것이다. 그런데 **내면 아이를 치유하고자 하는 것도 에고다.** 에고가 과거의 또 다른 에고를 설정해놓은 것이다. 기억의 파편들, 어떤 생각의 조합들—지금 현재", "source": "essay"}, {"id": "essay_155_06d4f6f4eb", "text": "자유를 얻는다는 것이다. 그런데 **내면 아이를 치유하고자 하는 것도 에고다.** 에고가 과거의 또 다른 에고를 설정해놓은 것이다. 기억의 파편들, 어떤 생각의 조합들—지금 현재의 나라는 생각이 과거에 나였던 생각을 치유하겠다는 것이다. 생각이 생각을 치유하겠다는 것이다. 이렇게 해서는 올바른 방법을 찾을 수 없다. 뇌과학에서 말하길 1초에 1,100만 번의 정보가 들어온다. 그런데 의식으로 인식되는 것은 40비트밖에 안 된다. 그 나머지는 다 무의식으로 쌓인다. 그렇다면 내가 정화해야 할 것이 얼마나 많겠는가. 10살 때 겪었던 아픔, 11살 때, 12살 때—초등학교 때 친구들한테 받은 상처, 부모한테 받은 상처, 중학교 1학기, 2학기, 고등학교, 대학교. **한도 끝도 없다.** 초등학교 1학년 때 내면 아이를 치유했다고 해서 중학교 때 상처받았던 것, 고등학교 때 받은 것이 다 이해가 되는가. 그때는 그때대로 또 따로 기억인데. 위로받았다고 느끼는 것은 플라시보 효과에 가깝다. 근본적으로 치유가 될 수 없다. **연필로 과거의 연필 자국을 지우려는 것이다.**\n\n---\n\n#### **기억과 감정을 분리한다**\n\n그 모든 상처들을 관통하는 것이 있다. 그것들이 다 생각의 일이라는 것이다. 지금 현재 나의 생각의 일이다. 기억이다. 그런데 기억이 감정과 붙어서, 그 기억만 떠올리면 아프고 상처를 입었다고 느끼게 된다. 감정이 올", "source": "essay"}, {"id": "essay_156_ad8e1ab715", "text": "그것들이 다 생각의 일이라는 것이다. 지금 현재 나의 생각의 일이다. 기억이다. 그런데 기억이 감정과 붙어서, 그 기억만 떠올리면 아프고 상처를 입었다고 느끼게 된다. 감정이 올라올 때 내면 아이니 뭐니 하는 또 하나의 스토리를 만들지 말아야 한다. 그냥 그것을 **직면해야 한다.** 직면이란 내 감정을 덧붙이지 않고 사실을 여실히 보는 것이다. 직면은 그 기억에 분노를 더하면서 '하, 내가 그때 얼마나 속상했는데'라고 하는 것이 아니다. 그것은 오히려 옛날의 감정에 지금의 감정까지 더 보태서 기억을 강화시키는 것이다. 직면은 이것이다. **'이거는 단지 기억이구나. 지금의 나한테 이 기억이 영향을 미칠 수가 없구나.'** 기억을 없앨 수는 없다. 그때 그런 일이 있었다는 것은 사실이다. 모른 척하거나 외면할 필요도 없다. 그런데 그때 당시에 있었던 감정이 지금의 내 감정은 아니다. **기억과 감정을 분리할 필요성이 있다.** 기억은 저장되지만 감정은 흘러가는 것이다. 감정을 거기에 다시 씌울 필요가 없다. 그걸 계속 가지고 있으면 나만 손해다. 그때로 돌아가서 문제를 해결할 수도 없고, 그 감정과 똑같은 감정을 가진 사람도 없다. 괜히 나 혼자 끙끙대는 것이다. **기억은 어쩔 수 없이 가지고 있더라도, 감정은 흘려보낼 수 있다.**\n\n---\n\n#### **선택권이 나한테 있다**\n\n그렇다면 어떻게 할 것인가. 먼저 따져볼 것이", "source": "essay"}, {"id": "essay_157_5351b1e11d", "text": "것이다. **기억은 어쩔 수 없이 가지고 있더라도, 감정은 흘려보낼 수 있다.**\n\n---\n\n#### **선택권이 나한테 있다**\n\n그렇다면 어떻게 할 것인가. 먼저 따져볼 것이 있다. **이 감정을 해결할 방법이 있는가, 없는가.** 억울하다면 법적인 방법이 있는지, 그 사람을 만나 이야기할 수 있는지, 진실을 파헤칠 방법이 있는지—시도해볼 가치가 있다면 시도해야 한다. 그런데 그 사람이 이미 없거나 법적으로도 방법이 없거나 해결할 방법이 아예 없다면, 그 감정을 계속 가지고 있는 것은 나한테 아무 이로움이 없다. 쓰레기를 본인이 쥐고 있는 것이다. **기억은 어쩔 수 없지만, 지금 그 기억에 내 감정을 다시 얹을지 말지는 내가 선택할 수 있다.** 당시에는 선택권이 없었다. 어렸고, 화가 났고, 그것은 인정해야 한다. 그렇지만 지금의 나는 다르다. 이것을 계속 갖고 있으면 내가 불리하다는 것을 이제는 알기 때문에, 다른 선택지가 있다는 것을 알기 때문에—그 선택을 할 수 있다. 그동안은 자극이 오면 반응하고, 자극이 오면 반응하는 패턴만 반복했다. 그런데 **반응으로부터 새로운 선택을 할 수 있다는 것을 아는 것, 그것 자체가 치유다.** 패턴에서 빠져나갈 기회를 얻는 것이다. 생각과 감정을 분리하는 것을 매번 연습하다 보면, 뇌 가소성에 의해 나중에는 애쓰지 않아도 자연스럽게 분리가 된다. 습관적으로 툭 하고 화가 올라오던 상황", "source": "essay"}, {"id": "essay_158_41974048ed", "text": "갈 기회를 얻는 것이다. 생각과 감정을 분리하는 것을 매번 연습하다 보면, 뇌 가소성에 의해 나중에는 애쓰지 않아도 자연스럽게 분리가 된다. 습관적으로 툭 하고 화가 올라오던 상황에서 다르게 대응할 수 있게 된다. 지금은 아파도 이차 화살을 계속 맞지 않아도 된다. **그것이 삶의 마스터키다.** 소중한 기억도 있고 아름다운 감정도 있다. 그런 감정은 갖고 있어도 된다. 감정이 나한테 득이 된다면 가지고 있어도 된다. 다만, **감정을 가지고 있을지 버릴지—그 선택의 권한이 나한테 있다는 것을 아는 것이다.** 이제 그 자유가 나한테 있다. #내면아이 #기억과감정의분리 #선택권 #에고의함정 #이차화살\n\n--- (구분선)\n\n[파일명: 내용물_올셀프인식_수필.md]\n\n### **내용물_올셀프인식_수필**\n\n#### **내용이 증명하는 게 아니라 생각이 증명한다**\n\n걱정이 올라온다. 후회가 올라온다. 미래에 대한 불안이 올라온다. 이런 생각들이 올라올 때, 우리는 보통 그 내용에 집중한다. 그 생각을 어떻게 처리할지, 어떻게 없앨지, 아니면 거기에 완전히 빠져들거나. 그런데 여기서 방향을 완전히 바꿔야 할 지점이 있다. 생각이 올라오는 것 자체가 **올셀프(All-Self)**를 증명해 주는 것이다. 이때 중요한 것은 '내용'이 증명해 주는 게 아니라는 점이다. **'생각이 올라왔다'는 그 자체가, 생각을 내가 인식하고 있다는 그 자체가", "source": "essay"}, {"id": "essay_159_fc7b8290e3", "text": "l-Self)**를 증명해 주는 것이다. 이때 중요한 것은 '내용'이 증명해 주는 게 아니라는 점이다. **'생각이 올라왔다'는 그 자체가, 생각을 내가 인식하고 있다는 그 자체가 증명하고 있다.** 내가 있으니까 생각을 아는 것 아닌가. 그러니까 생각이 나를 증명해 주는 것이다. 감정도 마찬가지고, 느낌도 마찬가지다. 그것들이 지금 나한테 인식됐다는 것, 그것이 중요하다. 내용물은 뭐로 대체돼도 관계가 없는 것이다. 어떤 생각이든, 어떤 감정의 기억이든, 그 내용 자체는 올셀프를 증명하는 것과 무관하다. 지금 내가 그것을 느끼고 있다는 사실만이 나를 증명한다.\n\n---\n\n#### **내용물에 동일시되면 허구가 실상을 압도한다**\n\n그런데 우리는 생각의 내용물이 마치 실상인 것처럼, 실재인 것처럼 느껴지기 때문에 거기에 동일시가 돼버린다. 그래서 생각에 확 빠져 들어가 버린다. 허구가 마치 실상으로 느껴져서 완전히 몰입이 돼버리고, 그러면 그것이 나를 압도하게 된다. **허구의 생각이 이 실상의 올셀프를 압도해 버린다.** 그것은 올셀프의 삶이 아니다. 내용물에 빠지면 어떻게 되는가. 생각을 없애려 하거나, 억압하려 하거나, 아니면 거기에 완전히 동일시돼서 빠져버리거나. 생각을 상대하니까 문제가 되는 것이다. 그런데 이 생각이 오히려 내가 올셀프임을 증명하고 있다는 것을 알아버리면, 내용이 더 이상 중요해지지 않는다. 내용에 끌려다니", "source": "essay"}, {"id": "essay_160_465411fa6a", "text": "빠져버리거나. 생각을 상대하니까 문제가 되는 것이다. 그런데 이 생각이 오히려 내가 올셀프임을 증명하고 있다는 것을 알아버리면, 내용이 더 이상 중요해지지 않는다. 내용에 끌려다니지 않게 된다. 생각의 내용물은 이미 지나가 버린 것이거나, 아직 오지 않은 것이다. 과거이거나 미래이거나. 그것은 올셀프와 관계가 없는 것이다. **생각이 일어났다는 그 행위, 그 인식, 그것만이 올셀프를 증명한다.** 생각과 감정과 이 보여지는 세상이 없다면 내가 없는 것이다. 그러니 깨어 있을 때 드러나는 인식되는 모든 것들이 다 내가 있음을 증명한다. 깊은 잠을 자면 아무것도 없다. 나도 없는 깊은 잠을 누가 경험할 것인가. 나도 없는 죽음을 누가 경험할 것인가. 그것은 나와 관계없는 일이다. **지금 깨어 있을 때, 이 드러나고 인식되는 모든 것들이 다 내가 있음을 증명하는 것이다.**\n\n---\n\n#### **감정에 붙은 규정이 내용물이다**\n\n감정도 같은 구조다. 지금 감정이 올라온다. 그런데 감정의 내용물이 있다. '이게 외로움이다, 두려움이다, 찝찝함이다', 이런 것들이 내용물이다. 가슴이 뭔가 뭉클하고 올라오는 그것, 그 순수한 감정은 나를 증명하는 것이다. 그런데 거기다가 '이 감정은 설렘이야, 이 감정은 두려움이야' 하고 의미 부여를 해놓은 것이 내용물이다. 사랑이 그렇다. 누군가를 사랑한다고 할 때, 그것이 실제로 사랑인가. 집착일 수도", "source": "essay"}, {"id": "essay_161_cdedcf270a", "text": "거기다가 '이 감정은 설렘이야, 이 감정은 두려움이야' 하고 의미 부여를 해놓은 것이 내용물이다. 사랑이 그렇다. 누군가를 사랑한다고 할 때, 그것이 실제로 사랑인가. 집착일 수도 있고, 내 욕심일 수도 있다. 그런데 우리는 그 감정에 '사랑'이라는 규정을 지어버린다. **그 규정이 감정의 내용물이다.** 감정이 올라오는 것은 나를 증명하는 것이 맞다. 그러나 그 감정에 붙은 규정, 스토리, 의미 부여, 그것은 올셀프와 관계가 없다. 한 가지 주의할 지점이 있다. 감정의 내용물까지 올셀프와 무관하다는 이야기를 하다 보면 너무 멀리 가는 것처럼 들릴 수 있고, 사람들이 오해할 수 있다. 감정 자체를 느끼지 말라는 이야기가 아니다. 감정이 올라오는 것은 나를 증명하는 것이 맞다. 다만 그 감정에 붙어있는 규정, 스토리, 의미 부여가 내용물이라는 것이다. 그러니까 지금 올라오고 느껴지고 하는 것들을 온전히 100% 수용할 수 있는 것이다. 어떤 스토리가 아니고. **스토리를 수용하라는 게 아니다.** 스토리에 확 휩쓸려 버리는 것은 내용에 빠져버린 것이다. 실제로 이것이 작동하는 순간이 있다. 생각과 감정에 휩쓸려서 괴로울 때, \"내가 괴롭네\"라는 생각과 동시에 \"이것도 내가 올셀프라는 것을 인식시켜 주는 것이네\" 하고 바라보면 바로 괴로움이 없어지는 경험을 할 수 있다. 올셀프의 관점으로 딱 오는 순간, 감정도 내용물도 더 이상 나를 압", "source": "essay"}, {"id": "essay_162_42da236686", "text": "\"이것도 내가 올셀프라는 것을 인식시켜 주는 것이네\" 하고 바라보면 바로 괴로움이 없어지는 경험을 할 수 있다. 올셀프의 관점으로 딱 오는 순간, 감정도 내용물도 더 이상 나를 압도하지 못한다.\n\n---\n\n#### **생각을 수단으로 쓰는 것과 목적으로 삼는 것**\n\n물론 생각에는 수단으로서 써야 하는 것들이 있다. 대출을 해결해야 할 때, 어떤 일을 처리해야 할 때, 그런 생각들은 내가 생각을 부리고 쓰는 수단이 된다. 그 경우에는 생각이 나한테 크게 영향을 미치지 않는다. 이정표나 표지판처럼 방향을 알려주는 것으로 쓰는 것이다. 문제는 생각의 내용물에 집착하면, 내용물이 목적이 돼버린다는 것이다. 거기에 감정이 달라붙으면 더 리얼리티가 느껴지고, 에고의 입장에서 나한테 유리한 쪽으로 생각하려다 보니까 감정까지 덧씌워진다. **감정이 개입된다는 것은 에고의 통 안에서 일어나고 있다는 신호다.** 그것이 이정표가 아니라 불필요한 공상이 되고 있는 것이다. 그럴 때는 내용물에 끌려가지 말고 올셀프의 관점으로 돌아와야 한다. '내가 지금 이 생각이 올라온 걸 내가 알고 있네. 지금 내가 느끼고 있네. 이거는 내가 올셀프임을 증명하고 있는 거 아닌가.' 그렇게 알면 내용물이 중요해지지 않는다. 통 밖으로 나와버린다.\n\n---\n\n#### **관계에서도 스토리가 아니라 감정을 읽어준다**\n\n이것은 개인의 수행에만 해당하는 이야기가 아니다. 사", "source": "essay"}, {"id": "essay_163_b2463e9741", "text": "면 내용물이 중요해지지 않는다. 통 밖으로 나와버린다.\n\n---\n\n#### **관계에서도 스토리가 아니라 감정을 읽어준다**\n\n이것은 개인의 수행에만 해당하는 이야기가 아니다. 사람과의 관계에서도 같은 원리가 작동한다. 누군가 나에게 와서 이야기를 한다. 과거에 있었던 일, 힘들었던 경험, 걱정되는 미래. 그때 중요한 것은 그 사람이 하는 스토리가 아니다. **스토리는 그 사람이 겪었던 경험을 100% 나타내는 것이 아니기 때문이다.** 그것은 그 사람의 관점에서 재구성된 이야기다. 중요한 것은 그 사람이 지금 울고불고 한다는 것, 걱정을 하고 두려움을 느끼고 있다는 것이다. 그것이 지금 나한테 드러나고 있고, 그것이 나의 올셀프를 증명하고 있다. 그 사람의 표정, 말투, 억양, 느낌, 감정, 이것들이 내가 지금 바라보고 있는 것이다. 이것들이 다 나의 올셀프를 증명하는 것이다. 내용물에 빠져버리면 이 비언어적인 신호들을 전부 놓치게 된다. 스토리를 따라가면서 같이 말려버린다. **그 사람의 감정을 읽어주면 된다.** 내용에 같이 빠져서 고민해 주는 것은 아무 소용이 없다. 내면의 아이를 치유한다면서 과거의 스토리를 전부 끄집어낼 필요가 없는 것도 이것 때문이다. 그 사람이 지금 감정이 올라오는 것, 그것이 올셀프다. 나와 둘이 아닌 것이다. 그러니 그 감정을 온전히 함께해 주면 된다. 스토리에 엮이지 않고 지금의 감정만 읽어줘도 사", "source": "essay"}, {"id": "essay_164_8807d3c0c4", "text": "이다. 그 사람이 지금 감정이 올라오는 것, 그것이 올셀프다. 나와 둘이 아닌 것이다. 그러니 그 감정을 온전히 함께해 주면 된다. 스토리에 엮이지 않고 지금의 감정만 읽어줘도 사람의 감정 해소에 큰 역할을 한다. 코칭도 결국 이것이다. 내담자가 스토리에 빠지지 않고 지금 이 감정을 온전히 느끼게 도와주는 것. 올셀프의 관점에서 자기 감정과 스토리를 분리할 수 있게 도와주는 것.\n\n---\n\n#### **나는 내 올셀프만 책임지면 된다**\n\n관계에서 한 가지 더 짚어야 할 것이 있다. 누군가 나한테 부탁을 하러 왔다. 그 부탁은 내용물이다. 들어줄 수도 있고 못 들어줄 수도 있다. 중요한 것은 그 사람이 나한테 왔다는 것, 그것이 나를 증명하고 있다는 사실이다. 그것만 알아주면 된다. 내가 못 들어줬다고 내가 나쁜 사람이거나 자책할 필요가 없다. 상대방이 서운해한다면, 그것은 그 사람의 에고의 통 안에 갇힌 생각으로 한 것이다. 그 사람이 어떻게 생각하는가는 그 사람의 생각의 내용이다. 내용은 허구다. 그것까지 내가 책임질 일은 아니다. **나는 내 올셀프만 책임지면 된다.** 세상 사람들이 괴로운 것은 대부분 이것 때문이다. 서로의 내용물을 책임지려 하고, 서로의 생각의 내용에 좌지우지되고, 그러다가 서로 틀어지고 꼬이게 된다. 내용물까지 내가 생각해서 괴로워할 필요가 없다. 그것이 대인관계에서 올셀프를 하는 방법이다. #올셀프 #내", "source": "essay"}, {"id": "essay_165_a765e079e5", "text": "서로의 생각의 내용에 좌지우지되고, 그러다가 서로 틀어지고 꼬이게 된다. 내용물까지 내가 생각해서 괴로워할 필요가 없다. 그것이 대인관계에서 올셀프를 하는 방법이다. #올셀프 #내용물 #생각 #감정 #관계 #코칭\n\n--- (구분선)\n\n[파일명: 뇌추론_편도체안정화_수필.md]\n\n### **뇌추론_편도체안정화_수필**\n\n#### **뇌는 추론하는 기계다**\n\n우리는 색을 본다고 생각하지만, 사실 뇌는 세 가지 원색의 비율로 나머지를 **확률로 맞추는** 것이다. 빨강이 70%, 파랑이 20%쯤 될 것 같다고 뇌가 예측하면, 그 예측이 색깔로 보인다. 컴퓨터 화면도 마찬가지다. RGB 세 가지 화소로 1700만 가지 색을 구현해 낸다. 감정도 같은 방식으로 작동한다. 몸 안에서 어떤 떨림, 긴장, 내부 감각이 올라온다. 그것은 하나의 에너지다. 그런데 뇌는 그것을 과거의 경험과 비교해서 **예측하고 추론** 한다. '이건 두려움이야', '이건 우울이야', '이건 화야.' 그 이름표는 감각 자체가 붙인 것이 아니라, 뇌가 갖다 붙인 것이다. 뇌는 **추론하는 기계** 다. 이것은 생존을 위해 발달한 능력이다. 이거를 먹어도 되나, 저 상황은 위험한가. 빠르게 판단해야 살아남는다. 그래서 뇌는 항상 예측한다. 글을 읽을 때 일부 글자가 빠져 있어도 아무 문제 없이 읽어버리는 것도 같은 이유다. 뇌가 다음 글자를 예측하고 그냥 처리해 버리기", "source": "essay"}, {"id": "essay_166_624a310f8d", "text": "해야 살아남는다. 그래서 뇌는 항상 예측한다. 글을 읽을 때 일부 글자가 빠져 있어도 아무 문제 없이 읽어버리는 것도 같은 이유다. 뇌가 다음 글자를 예측하고 그냥 처리해 버리기 때문이다.\n\n---\n\n#### **멧돼지와 인스타그램**\n\n원시인은 수풀에서 멧돼지를 만났을 때 편도체가 활성화됐다. 싸울 것인가, 도망칠 것인가. 그 순간 생각할 틈이 없어야 한다. 그래서 편도체가 활성화되면 전전두엽이 다운된다. 시소처럼 한쪽이 올라가면 한쪽이 내려간다. 피와 에너지가 한쪽으로 쏠리는 것이다. 문제는 지금 우리에게 멧돼지가 따로 없다는 것이다. 나보다 좋은 차를 타고 나타난 사람, SNS에서 더 잘 사는 것처럼 보이는 사람, 나를 거슬리는 모든 것이 편도체를 활성화시키는 멧돼지가 된다. 그러면 뇌는 다시 추론을 시작한다. '왜 쟤는 저렇게 잘 사는데 왜 나는 이래?' 거기서 또 이유를 추론한다. '부모를 잘못 만나서', '내가 못나서', '세상이 불공평해서.' 그 추론이 또 다른 감정을 만들고, 같은 사이클이 반복된다. **뇌 가소성에 의해 그쪽 신경망이 더 강화된다.** 인스타그램이 나온 시점에서 미국 청소년들의 우울감이 급격히 높아진 것이 그것이다. 편도체가 쉬지 못하고 계속 활성화되는 것이다.\n\n---\n\n#### **핵심 정서와 안반수의경**\n\n부처님이 쓰신 안반수의경(安般守意經)에 나오는 느낌, 명상할 때 느끼라고 하는 그 느낌이", "source": "essay"}, {"id": "essay_167_ce31bd7d51", "text": "쉬지 못하고 계속 활성화되는 것이다.\n\n---\n\n#### **핵심 정서와 안반수의경**\n\n부처님이 쓰신 안반수의경(安般守意經)에 나오는 느낌, 명상할 때 느끼라고 하는 그 느낌이 뇌과학에서 말하는 **핵심 정서** 와 같은 것이다. 핵심 정서는 몸 안에서 올라오는 내부 감각이다. 거기서 감정도 올라오고, 생각도 올라온다. 명상에서 감각을 느끼라고 하는 것과, 뇌과학에서 내부 감각을 활성화하라고 하는 것이 결국 같은 곳을 가리킨다. 밥 먹을 때 숟가락을 어떻게 드는지 내가 아는 것, 걸을 때 왼발이 나가고 오른발이 나가는 것을 내가 아는 것이 고유 감각이다. 나만 느끼는 것이기에 고유하다. 이 고유 감각과 내부 감각이 제대로 작동할 때 **오작동** 이 줄어든다. 오작동이 줄어들면 쓸데없는 곳에서 충동적이 되거나, 이성적으로 생각해야 할 순간에 감정이 먼저 치고 나오는 일이 적어진다.\n\n---\n\n#### **편도체를 안정화하는 것**\n\n**편도체가 활성화되면 전전두엽이 다운되고, 전전두엽이 활성화되면 편도체가 안정화된다.** 이 두 영역은 시소처럼 물려 있다. 그러니까 명상을 통해 편도체를 안정화시키면, 이성적으로 상황을 바라볼 수 있는 전전두엽이 살아난다. 감정적으로 과도하게 반응하지 않고, 감각의 오류를 잘못 해석하지 않게 되는 것이다. 순간적으로 반응이 올라올 수는 있다. 습관이 있으니까. 그러나 명상이 몸에 배면 빨리 **영점", "source": "essay"}, {"id": "essay_168_753bf2579d", "text": "감정적으로 과도하게 반응하지 않고, 감각의 오류를 잘못 해석하지 않게 되는 것이다. 순간적으로 반응이 올라올 수는 있다. 습관이 있으니까. 그러나 명상이 몸에 배면 빨리 **영점 조정** 이 된다. '지금 내가 쓸데없이 과도한 반응을 하고 있구나.' 그것을 알아차릴 수 있게 된다. 불면증도 같은 맥락이다. 편도체가 과도하게 활성화되어 있으면 몸은 깊이 잘 수 없다. 언제 위협이 올지 모른다는 신호가 켜져 있으니, 안전한 공간에서도 '지금 깨어 있어야 해'라고 느끼는 것이다. 밤에는 명상으로 편도체를 안정화하고, 화를 낼 일이 있다면 낮에 내는 것. 잠자리에 들기 전에 편도체를 쉬게 하는 것이 그래서 중요하다. #뇌추론 #편도체안정화 #핵심정서 #고유감각 #알아차림\n\n--- (구분선)\n\n[파일명: 당연함_모습과싸우지않기_수필.md]\n\n### **당연함, 모습과 싸우지 않기**\n\n#### **보이는 것이 당연함의 증거다**\n\n보이는 것은 당연하게 보인다. 들리는 것은 당연하게 들린다. 느껴지는 것도, 내면에 올라오는 생각과 감정과 느낌도 다 당연하게 느껴진다. 이것들이 모두 당연함을 증명하고 있다. 당연함을 따로 찾을 필요가 없다. 지금 보이고 들리고 느껴지는 이 모든 것들이 당연함을 증명하는 증거이자 경전이다. **산천초목이 다 부처님의 말씀이고 하느님의 성경이다.** 두두물물이 다 당연함을 증명하고 있다. 더러운 것은 더러운 대로 보", "source": "essay"}, {"id": "essay_169_e1d4a2513f", "text": "이 모든 것들이 당연함을 증명하는 증거이자 경전이다. **산천초목이 다 부처님의 말씀이고 하느님의 성경이다.** 두두물물이 다 당연함을 증명하고 있다. 더러운 것은 더러운 대로 보이고, 깨끗한 것은 깨끗한 대로 보이고, 큰 것은 큰 대로, 작은 것은 작은 대로 보인다. 이것은 수행을 해서 얻어야만 알 수 있는 당연함이 아니다. 베이스로 깔려있는 당연함이다. 얻어야 할 것이 아니라 **상기하면 된다.** 나무를 봤는데 나무가 딱 나무로 보였네, 당연하잖아. 새 소리가 들렸어, 당연하잖아. 새소리가 안 나, 안 나니까 당연한 거야. 나도 당연하고 안 나도 당연하다.\n\n---\n\n#### **긴장도 당연하다**\n\n처음 대면하는 상황에서 긴장이 된다. 긴장을 안 해야 되는데 왜 하지 — 이러지 않아도 된다. 긴장도 당연하다. 사람마다 크기는 다르지만, 그 사람이 살아온 환경과 겪어온 경험에 따라 어떤 사람은 더 긴장하고 어떤 사람은 덜 긴장한다. **그 차이 자체도 당연하다.** 면접에서 당황하는 사람이 능력이 부족한 사람이 아니다. 그 상황이 그 사람이 살아온 것에 비추어 봤을 때 어설픔이 있는 것뿐이다. 그 사람이 다른 곳에 가면 더 잘할 수 있고, 거기서 더 잘 쓰임이 발휘될 수 있다. 잘났다 못났다를 딱 잘라 말할 수 없다. 사회 초년생이 스펙이 부족하다고 자책할 것이 없다. 조금 늦게 경험하다 보면 그 사람만의 독특한 경험이 생긴다.", "source": "essay"}, {"id": "essay_170_f59d9d4bf4", "text": "쓰임이 발휘될 수 있다. 잘났다 못났다를 딱 잘라 말할 수 없다. 사회 초년생이 스펙이 부족하다고 자책할 것이 없다. 조금 늦게 경험하다 보면 그 사람만의 독특한 경험이 생긴다. 빠르다 늦다, 맞다 안 맞다 — 그런 식으로 볼 것이 없다.\n\n---\n\n#### **당연함을 받아들이면 가능성이 열린다**\n\n당연함을 당연하게 받아들이면 숙명론처럼 느껴질 수도 있다. 그런데 오히려 **새로운 가능성이 열린다.** 구체적인 행위를 하면 그 행위에 대한 결과가 당연하게 온다. 당연하게 오지 않는다면 시절 요인이 안 맞았거나 노력이 부족했거나 그렇게 된 것이다. 그러면 다른 쪽으로 발현해보거나 돌아서 다시 와보면 된다. 운명이나 숙명이 아니라 삶을 적극적으로 살 수 있는 당연함이다. 원망하고 자책하는 것에서 벗어나 방향을 다시 설정하고 나아가는 것 — 그것이 당연함을 제대로 받아들이는 것이다.\n\n---\n\n#### **모습과 싸우면 힘들어진다**\n\n이름이나 모습과 싸우면 힘들어진다. 이름과 모습은 당연함에서 벗어난 것들이기 때문이다. 이름이나 모습을 떠나서 원래 당연함으로 돌아오면 당연함의 흐름을 탈 수 있다. 더 실질적으로 살 수 있게 된다. 지금 우리가 헛힘을 쓰고 있는 것이다. 모습으로 드러나는 것 자체는 당연하다. 그냥 그 모습대로 나한테 보여주는 것이다. 그런데 그 모습을 내가 원하는 모습으로 바꾸고 싶거나, 내가 원하는 모습이 되기를", "source": "essay"}, {"id": "essay_171_c636ea6120", "text": "있는 것이다. 모습으로 드러나는 것 자체는 당연하다. 그냥 그 모습대로 나한테 보여주는 것이다. 그런데 그 모습을 내가 원하는 모습으로 바꾸고 싶거나, 내가 원하는 모습이 되기를 바라는 것 — **그것이 안 당연한 것이다.** 그 모습에 명칭을 붙여서 그 명칭과 싸우면 더 힘들어진다. 모습은 당연하다. 그 당연한 모습에서 어떤 특정한 생각으로 그 모습이 바뀌기를 바라는 순간 힘들어지는 것이다. 아주 미묘하지만 명확하게 알아야 할 부분이다. 손톱시도 그 당연함을 당연하게 받아들이는 것을 표현한 것이다. 지금 여기, 보이는 것을 그냥 보이는 대로, 들리는 것을 그냥 들리는 대로 — 당연함으로 돌아오는 것. **당연함은 얻어야 하는 것이 아니라, 지금 이 순간 이미 여기 있는 것이다.** #당연함 #모습과싸우지않기 #손톱시 #그냥아는마음 #올셀프\n\n--- (구분선)\n\n[파일명: 당연함과삶_물살을타는법_수필.md]\n\n### **당연함과 삶, 물살을 타는 법**\n\n#### **당연하게 받아들인다는 것은 아무것도 안 한다는 것이 아니다**\n\n수행을 한다고 해서 아무것도 안 하고 잘 살아지는 것은 아니다. 잘 살고 싶으면 잘 사는 것을 해야 한다. 일을 하건 투자를 하건 그 결과가 오는 것은 당연하다. 투기를 하면 그 투기한 만큼의 리스크가 생기는 것도 당연하다. 리스크가 생기면 그것을 받아들이는 것이 당연하다. 배고프면 밥을 찾아 먹어야 하고,", "source": "essay"}, {"id": "essay_172_f2b4894af2", "text": "그 결과가 오는 것은 당연하다. 투기를 하면 그 투기한 만큼의 리스크가 생기는 것도 당연하다. 리스크가 생기면 그것을 받아들이는 것이 당연하다. 배고프면 밥을 찾아 먹어야 하고, 꽃을 보고 싶으면 꽃을 심어야 하고, 꽃이 졌으면 슬퍼할 수도 있다. **당연함을 받아들이는 삶은 수동적인 삶이 아니다. 가장 적극적인 삶이다.** 온전히 받아들이고 그에 맞게 행동하는 것, 그것이 가장 잘 사는 것이다.\n\n---\n\n#### **높은 파도가 오면 높은 파도를 타라**\n\n높은 파도가 오면 높은 파도를 타면 된다. 왜 파도가 높냐고 투덜댈 것이 없다. 높은 파도가 왔으면 높은 파도가 온 것이다. 그 파도를 타고 넘어가야 지나간다. 잔잔한 구간에서 빨리 가고 싶으면 발장구를 치면 된다. 그러면 빨리 간다. 그런데 물의 방향에 반대로 저으면 힘이 든다. 그것도 당연한 것이다. 힘이 드는 것을 당연하게 받아들이면 다른 방법을 찾게 된다. **아, 내가 지금 물살을 거슬리고 있구나.** 그것을 알아채는 것이다. 그러면 물살이 약해지는 부분에서 노를 저을 수 있다. 막 힘든데 전혀 앞으로 나가고 있지 않다면, 그것은 당연한 것이 아니다. 그때 세상을 원망하거나 끌어당김의 법칙을 찾거나 기도를 한다고 바뀌는 것이 아니다. 물살의 방향을 알고 내가 방향을 바꾸거나, 아니면 힘듦을 그냥 인정하고 모터보트를 다는 등 방법을 취해야 한다.\n\n---\n\n#### *", "source": "essay"}, {"id": "essay_173_78df9bbaf8", "text": "찾거나 기도를 한다고 바뀌는 것이 아니다. 물살의 방향을 알고 내가 방향을 바꾸거나, 아니면 힘듦을 그냥 인정하고 모터보트를 다는 등 방법을 취해야 한다.\n\n---\n\n#### **물살과 나는 하나다**\n\n모터보트도 없고 힘도 없다면, 물의 흐름에 따라 잠시 떠내려갔다가 다른 물살이 보이면 그쪽으로 가면 된다. 원하는 방향이 아니더라도 내 체력과 경제력과 상황으로 거기까지 갈 수 없다면, 다른 물살을 타고 돌아가는 방법을 찾으면 된다. 물살 비유를 썼지만 사실 **물살과 그 속에서 떠내려가는 나, 역류를 하려는 나, 이 모든 것이 전체로 하나로 돌아가고 있다.** 고정된 물이 있고 내가 따로 있는 것이 아니다. 그 흐름 속에서 떠내려가는 전체가 나다. 물살이 없고 파도가 없고 내가 가고자 하는 길이 없이, 이 우주에 나만 덜렁 있는 것은 존재하는 것이 아니다. 당연한 것이 아니다. 통째로 하나로 돌아가는 것이 당연한 것이다. **물살과 전혀 관계없는 나라는 것이 따로 있다는 것 자체가 안 당연한 것이다.** 그것을 바랄 수는 있다. 그런데 바라는 만큼의 고통이 따른다. #당연함과삶 #물살비유 #적극적삶 #역류와순류 #올셀프\n\n--- (구분선)\n\n[파일명: 당연함과평정심_우주적마음_수필.md]\n\n### **당연함과 평정심, 우주적 마음**\n\n#### **당연하게 받아들이는 것이 수행의 요체다**\n\n당연한 것을 당연하게 받아들이는 마음", "source": "essay"}, {"id": "essay_174_efb67db7fb", "text": "연함과평정심_우주적마음_수필.md]\n\n### **당연함과 평정심, 우주적 마음**\n\n#### **당연하게 받아들이는 것이 수행의 요체다**\n\n당연한 것을 당연하게 받아들이는 마음 — 이것이 수행의 요체다. 그 마음이 우주적인 마음이고, 기독교에서 하느님의 마음이라 하고 불교에서 불성이라 하는 것이다. 당연하게 받아들이고 있으니까 온 우주가, 나의 모습이 있는 그대로 지금 다 드러난다. 그것이 이미 내 마음에 장착되어 있으니까 당연하게 받아들여지고 있는 것이다. 나만 받아들이는 것이 아니다. 우주 자체, 불성 자체, 하느님의 마음이 온 우주를 있는 그대로 당연하게 받아들여주고 있다. **그 마음이 내 마음과 둘이 아닌 것이다.** 하느님을 믿으면 천국을 가고 안 믿으면 지옥을 간다는 것, 부처님을 믿으면 극락을 가고 복을 받는다는 것 — 이것은 조건이 붙는 것이다. 있는 그대로의 당연함에서 벗어나려 하는 것이다. 이미 온전하게 당연하게 받아들여지고 있는 것인데, 이랬다는 조건을 붙이는 것이다.\n\n---\n\n#### **굿뉴스다**\n\n당연하게 받아들이고 있다는 것을 상기하면 그다음부터는 습관이 된다. 나중에는 노력하지 않아도 그냥 당연하게 받아들인다. 그것이 수행이다. 왜 애쓸 필요가 없느냐. 이미 그렇게 당연하게 받아들이고 있기 때문이다. 내 상태와 관계없이 다 당연하게 받아들여지고 있다. **이게 굿뉴스다.** 내가 어떤 상태라도 다", "source": "essay"}, {"id": "essay_175_615e72c3d9", "text": "이다. 왜 애쓸 필요가 없느냐. 이미 그렇게 당연하게 받아들이고 있기 때문이다. 내 상태와 관계없이 다 당연하게 받아들여지고 있다. **이게 굿뉴스다.** 내가 어떤 상태라도 다 당연하게 받아들여지고 있다. 화가 올라오면 화인 줄 알고, 외로움이면 외로움인 줄 알고, 아프면 아픔인 줄 알고 — 이름을 붙이기 이전에 올라오는 것을 있는 그대로 다 알고 있다. 그러듯이 하느님의 마음, 불성, 우주적인 마음은 나를 있는 그대로 다 받아들여주고 있다. **그 마음이 둘이 아니다.** 나눌 수 없는 마음이다.\n\n---\n\n#### **평정심은 따로 있는 것이 아니다**\n\n평정심이 대단하고 따로 있는 것인 줄 알아서 찾고 취하고 수행해서 얻는 것이라 생각한다. 아무것에도 요동하지 않는 평평한 마음이 있다고 생각한다. 그런데 **높은 것은 높은 대로 알고, 낮은 것은 낮은 대로 알고, 좋으면 좋은 대로, 싫으면 싫은 대로 알려지는 것이 평등한 것이다.** 당연함의 평등성이다. 그것이 평정심이다. 선사들이 평정심이 도라 했다. 있는 그대로 당연하게 받아들이는 것은 걸림이 없다. 그래서 대도는 문이 없다고 하는 것이다. 당연한 것은 당연하게 받아들이면 되니까 걸리거나 문이 있을 수 없다. 어떤 조건을 통과해야 한다면 그것은 소도다. 문이 있는 것이다. 대도는 당연하니까 그냥 흘려보낼 수 있다. 이것이 너무 당연하니까 이 마음을 모르는 것이다. 너무 평", "source": "essay"}, {"id": "essay_176_ea5fcf0e82", "text": "을 수 없다. 어떤 조건을 통과해야 한다면 그것은 소도다. 문이 있는 것이다. 대도는 당연하니까 그냥 흘려보낼 수 있다. 이것이 너무 당연하니까 이 마음을 모르는 것이다. 너무 평정하니까.\n\n---\n\n#### **우주적 마음과 내 마음은 나눌 수 없다**\n\n우주적인 마음과 내 마음을 나눌 수 없다. 경계를 어떻게 나눌 것인가. 외부에 있는 소리도 당연히 들리고, 저 하늘의 별도 당연하게 보인다. 이미 내가 보는 이 세계 전체가 그냥 있는 그대로 당연한 마음이다. 불성이나 신성과 내 마음이 나눠져 있다면 당연한 것을 당연하게 받아들이지 못할 것이다. 그런데 이미 받아들이고 있다. 내가 따로 마음을 일으켜 거부하는 것이 오히려 추가하는 것이다. 당연한 것을 당연하게 받아들이고 있다면 그 마음은 불성이나 신성과 **둘이 아닌 마음** 이다. 나는 그 마음에서 드러나고 있는 것이다. 그 마음을 기본 베이스로 쓰고 있는 것이다. 그러니 경계를 나눌 수 없다. 당연함을 당연하게 받아들이는 것. 그것이 평정심이고, 대도이고, 불성이고, 이미 여기 있는 우주적 마음이다. #당연함과평정심 #대도 #불성과신성 #우주적마음 #둘이아닌마음\n\n--- (구분선)\n\n[파일명: 도_앎의주체_수필.md]\n\n### **도_앎의주체_수필**\n\n#### **아는 주체는 알려질 수 없다**\n\n아는 그것이 무엇인가. 나를 통해서 그것이 보고, 나를 통해서 그것이 듣는다.", "source": "essay"}, {"id": "essay_177_a185ce0c77", "text": "주체_수필.md]\n\n### **도_앎의주체_수필**\n\n#### **아는 주체는 알려질 수 없다**\n\n아는 그것이 무엇인가. 나를 통해서 그것이 보고, 나를 통해서 그것이 듣는다. 그것을 기독교에서는 신이라 하고, 불교에서는 불성이라 한다. 그렇다면 신이, 불성이 도대체 무엇인가. 알 수 없다. 왜냐하면 그것은 **아는 주체** 이기 때문이다. 아는 주체는 **명사화시킬 수 없다.** 대상이 아니기 때문이다. 만약 아는 그것이 대상이 된다면, 그것은 이미 아는 주체가 아니라 대상으로 전락해 버린다. 주관이 대상이 되는 순간, 그것은 더 이상 주관이 아니다. 그래서 신을 알 수 없는 것이다. 불성을 알 수 없는 것이다. 그것은 아는 주관이기 때문에, 어떤 말로 규정하려는 순간 이미 헛다리를 짚는다. '이것이 신이다', '이것이 불성이다' 하는 순간, 그것은 이미 그것이 아닌 것이 된다.\n\n---\n\n#### **'몰라. 괜찮아.'**\n\n그러면 어떻게 해야 하는가. 가장 가깝게 표현하면 **'모른다'** 이다. 그래서 **'몰라. 괜찮아.'** 이것이 가장 근접하게 아는 것이다. 왜 괜찮은가. 모른다는 것은 그것이 아는 대상이 아니기 때문에 모르는 것이다. 틀리고 자시고 할 것이 없다. **통으로 나이기 때문이다.** 통으로 나이기 때문에 괜찮다. 엎어지고 자빠져도 통으로 나이기 때문에 괜찮다. 그러니까 '몰라. 괜찮아.'를 하라는 것이다.", "source": "essay"}, {"id": "essay_178_b969b413a0", "text": "자시고 할 것이 없다. **통으로 나이기 때문이다.** 통으로 나이기 때문에 괜찮다. 엎어지고 자빠져도 통으로 나이기 때문에 괜찮다. 그러니까 '몰라. 괜찮아.'를 하라는 것이다.\n\n---\n\n#### **촛불이 켜졌다**\n\n이것이 이렇게 알고, 이렇게 훤하게 보고 안다. **촛불이 켜진 것** 이다. 드러나서 훤하게 안다. 이것이 **영(靈)**이다. 훤하게 아는 그것은 누가 뭐라 규정 지을 수 없다. 그냥 이렇게 아는 것이다. 부처를 설명해 보라. 설명한 부처는 이미 죽인 부처다. 신이 어떻다 저렇다 떠들어 버리면 그것은 신이 아니다. **사랑** 을 아무리 표현해도 사랑을 표현할 수 없다. 그것은 사랑에 대한 해설서일 뿐, 사랑이 아니다. 사랑은 **하는** 것이지, 설명하는 것이 아니다. 누가 말로 '사랑해'를 떠든다면 **'집어쳐'** 라고 해도 맞다. 맛있는 것을 주는 것, **그것이 사랑이다.**\n\n---\n\n#### **차를 한 잔 마셔**\n\n**도(道)**가 바로 그런 것이다. 조주 스님에게 '도가 무엇입니까?' 라고 떠들지 말고, **'차를 한 잔 마셔.'** 차를 건네고 차를 마시는 그것이 도다. 차 맛을 아는 것, 그것이 도다. 말이 닿을 수 없는 곳에 그것이 있다. 그리고 그것은 이미 지금 여기에서 작동하고 있다. #도 #앎의주체 #불성 #영 #조주차\n\n--- (구분선)\n\n[파일명: 동사적관계_상호의존_수필.md]", "source": "essay"}, {"id": "essay_179_42cb4efa9b", "text": "수 없는 곳에 그것이 있다. 그리고 그것은 이미 지금 여기에서 작동하고 있다. #도 #앎의주체 #불성 #영 #조주차\n\n--- (구분선)\n\n[파일명: 동사적관계_상호의존_수필.md]\n\n### **동사적관계_상호의존_수필**\n\n#### **명사가 아니라 관계다**\n\n삶이 명사적 실체인가, 동사적 실체인가. 고정된 존재라고 할 수 없다는 것은 분명하다. 그런데 동사적 실체라고 해도 그것을 독립된 존재라고 할 수는 없다. 왜냐하면, 동사처럼 무언가가 움직인다고 할 때, 움직이지 않는 배경이 있어야 그것이 움직임으로 인식되기 때문이다. 모든 것이 똑같이 움직인다면 움직임 자체를 파악할 수 없다. 그래서 동사적 실체라고 규정하기보다는 **동사적 관계** 라고 표현해야 맞다. 움직임을 파악하는 것은 움직이지 않는 것이 있기 때문이고, 나를 파악하는 것은 내가 무언가와 관계를 맺고 있기 때문이다. 엄마가 없으면 자식이 없다. 움직이는 것이 있으면 움직이지 않는 배경이 있어야 한다. 상호 관계 속에서 비로소 하나의 현상으로 파악된다.\n\n---\n\n#### **공(空)은 허무가 아니다**\n\n비어 있다는 것, **공(空)** . 단순한 허무가 아니다. **비었으되 존재하는 무엇** 이 있다. 비어 있음 자체가 관계 속에서 파악되는 것이어서, 관계가 없으면 성립되지 않는다. 컵이 컵이 되려면 무언가를 담을 수 있는 공간이 있어야 한다. 그것은 기능적인 비어", "source": "essay"}], [{"id": "essay_180_8557b2bb37", "text": "* 이 있다. 비어 있음 자체가 관계 속에서 파악되는 것이어서, 관계가 없으면 성립되지 않는다. 컵이 컵이 되려면 무언가를 담을 수 있는 공간이 있어야 한다. 그것은 기능적인 비어 있음이다. 그러나 불교에서 말하는 공은 그 공간을 넘는다. **모든 것이 고정된 실체 없이 상호작용하는 것에서 드러나는 하나의 현상** 일 뿐이다. 독립된 실체로서 딱 있는 것이 아니라, **관계로 이루어진 비어 있음** 이다. 그러니까 공이란 없음이 아니라, 고정됨이 없음이다.\n\n---\n\n#### **혼자서 행복할 수 없다**\n\n모든 것이 관계로서만 성립된다면, 나의 독립된 존재보다 **우리의 관계** 를 더 생각해야 한다. 나는 혼자로 성립될 수 없는 상호 의존적인 존재다. 그렇다면 우리 전체가 다 행복해지지 않으면, 개별적인 존재가 혼자서 진정으로 행복할 수 없다. 나의 행복은 관계 안에서만 완성된다. 이것이 대승 보살 정신의 뿌리이기도 하다. 나만 깨달음을 얻겠다는 것이 아니라, 모든 존재가 함께 건너가야 한다는 것. 독립된 나는 없기 때문이다. #동사적관계 #공 #상호의존 #연기 #올셀프\n\n--- (구분선)\n\n[파일명: 동일시_신념체계_수필.md]\n\n### **동일시_신념체계_수필**\n\n#### **좋아하는 나, 싫어하는 나**\n\n무언가를 먹었을 때 맛있다는 느낌이 든다. 또 어떤 것은 싫다. 좋고 싫음 자체는 아무 문제가 없다. 문제는 그 느낌을", "source": "essay"}, {"id": "essay_181_e955f681e0", "text": "체계_수필**\n\n#### **좋아하는 나, 싫어하는 나**\n\n무언가를 먹었을 때 맛있다는 느낌이 든다. 또 어떤 것은 싫다. 좋고 싫음 자체는 아무 문제가 없다. 문제는 그 느낌을 자꾸 자기와 **동일시** 하는 것이다. '나는 이것을 좋아하는 나'라는 것이 생긴다. '나는 저것을 싫어해'라는 것이 자리를 잡는다. 먹을 때 싫으면 싫으면 그만인데, 그것이 **'싫어하는 나'라는 신념으로 굳어진다.** 누군가 '당신은 누구인가요?'라고 물으면 우리는 '나는 이러이러한 것을 좋아하고, 이러이러한 것을 싫어한다'고 말한다. 좋아하고 싫어하는 것으로 **신념 체계가 구축** 된다. 그리고 그것이 나라는 것으로 동일시된다.\n\n---\n\n#### **집착하는 나와 혐오하는 나**\n\n나는 좋음도 경험하고 싫음도 경험한다. 경험은 왔다가 간다. 그런데 그 경험을 개념화해서 '좋아하는 나', '싫어하는 나'를 만들어 버리면, 그 둘이 전면에 나서서 세상을 대신 경험하기 시작한다. 좋아하는 것은 더 취하려는 **집착** 이 되고, 싫어하는 것은 **혐오** 와 거부가 된다. **집착하는 나와 혐오하는 나가 강화** 된다. 그리고 그것이 주인 노릇을 하면서 **온전한 경험을 방해한다.** 집착하는 나, 혐오하는 나는 실상이 아니다. 내가 부여한 것이다. 신념을 세운 것이다. 그것이 **에고** 다. 그런데 그 에고를 나라고 착각하고 사는 것이다.\n\n---", "source": "essay"}, {"id": "essay_182_031cdaf5af", "text": "한다.** 집착하는 나, 혐오하는 나는 실상이 아니다. 내가 부여한 것이다. 신념을 세운 것이다. 그것이 **에고** 다. 그런데 그 에고를 나라고 착각하고 사는 것이다.\n\n---\n\n#### **이원적으로 나누는 것**\n\n온통 다 나다. 의식에 떠오르는 것들, 지금 보이고 들리는 것들, 그 전체가 다 나다. 그런데 그 안에서 **경험하고 싶은 것과 경험하고 싶지 않은 것을 나눠버린다.** 이원적으로 가른다. 세상도 그렇게 나누고, 나 자신도 그렇게 나눈다. 우리 편과 남의 편, 잘난 놈과 못난 놈, 좋은 팀과 싫은 팀. 나의 모습에서도 마찬가지다. 좋아하는 모습은 나이고 싫어하는 모습은 내가 아닌 것으로 한다. 잘난 것만 나이고 찌질한 것은 나가 아닌 것으로 한다. 그렇게 하면 **온전한 나로 살 수가 없다.** 때에 따라서 찌질할 수도 있고, 때에 따라서 잘날 수도 있다. **그 온통이 다 나로 받아들여져야** 한다.\n\n---\n\n#### **스스로 만든 우리**\n\n제한적인 삶은 누가 만드는 것이 아니다. **집착하고 혐오하는 마음 때문에 자기 스스로 제한한 영역 안에 자기를 가두는 것** 이다. 깨끗한 것만 취하고 싶고, 더러운 것은 피하고 싶고, 좋은 것은 가지고 싶고, 안 좋은 것은 남에게 넘기고 싶을 때, 삶은 그만큼 협소해진다. 내 반을 배제시키는 것이나 마찬가지다. 나를 작게 만드는 것이다. 우리는 스스로 신념이라는 울타리", "source": "essay"}, {"id": "essay_183_e2f7f7f0ac", "text": "은 가지고 싶고, 안 좋은 것은 남에게 넘기고 싶을 때, 삶은 그만큼 협소해진다. 내 반을 배제시키는 것이나 마찬가지다. 나를 작게 만드는 것이다. 우리는 스스로 신념이라는 울타리를 치고, 그 안에서 세상을 본다. 그 울타리가 나인 줄 알지만, 그것은 온전한 나가 아니다. #동일시 #신념체계 #집착과혐오 #에고 #올셀프\n\n--- (구분선)\n\n[파일명: 두가지마음_등대와날개_수필.md]\n\n### **두 가지 마음, 등대와 날개**\n\n#### **실수도 이미 받아들여지고 있다**\n\n깎는 명상을 할 때 나무를 잘못 깎거나 실수를 해도, 그 실수가 나한테 드러났다는 것은 그냥 알아주고 온전히 받아들였다는 그 마음이 거기서도 작동하고 있다는 것이다. 내 상태가 안 좋고 힘들고 어렵더라도, 그것도 이미 온전히 받아들여지고 있다. 그러면 사람들이 마음의 무거운 짐을 조금 내려놓을 수 있다. 내가 거부하고 싶었던 찌질한 면도, 이미 우리 마음에서 온전히 수용되고 있으니까. 그래서 다시 용기를 내서 살아볼 힘을 가져갈 수 있다.\n\n---\n\n#### **새의 양 날개처럼**\n\n그냥 아는 마음과 온전히 받아들이는 마음 — 이 두 가지 마음의 측면이 항시 우리 삶의 베이스로 깔려 있다는 것을 인식하고 살게 되면, 이것이 하나의 화두도 되고 염불도 된다. 아무리 힘든 상황이라도 **아, 내가 지금 온전히 받아들여져 있구나** 하면서 안심하고 다시 용기를 낼", "source": "essay"}, {"id": "essay_184_43d6c2b2fa", "text": "있다는 것을 인식하고 살게 되면, 이것이 하나의 화두도 되고 염불도 된다. 아무리 힘든 상황이라도 **아, 내가 지금 온전히 받아들여져 있구나** 하면서 안심하고 다시 용기를 낼 수 있는 등대 역할을 해준다. 이 두 가지 마음을 기억하고 있으면, 마치 새의 양 날개처럼, 수레의 두 바퀴처럼 — 그 힘으로 세상을 앞으로 나아갈 수 있다. **따로 찾지 않아도 항시 작동하고 있는 마음이다.** 그 마음의 기본 베이스 위에서 살겠다 못 살겠다, 좋다 나쁘다가 일어난다. 그런데 그런 마음이 일어나는 것조차도 이미 그냥 알아지고 온전히 받아들여지고 있다. 나의 상태와는 관계없이. 그게 굿뉴스다. #두가지마음 #등대와날개 #그냥아는마음 #온전히받아들이는마음 #올셀프\n\n--- (구분선)\n\n[파일명: 디지털균형_몸마음지금여기_수필.md]\n\n### **디지털균형_몸마음지금여기_수필**\n\n#### **만든 사람들이 먼저 알았다**\n\n디지털 기기를 개발한 사람들 상당수가 자기 자녀에게는 디지털 사용을 제한했다는 것이 알려져 있다. 발트로프 같은, 디지털을 쓰지 않는 학교에 보낸 사람들도 있다. 왜 그랬을까. 그들은 알고 있었기 때문이다. 개발 단계에서부터 목표가 명확했다. 소비자들이 그 플랫폼에 트래픽을 최대한 집중하게 만드는 것. 중독이 목표였다. 그것을 알기 때문에 자기 자식에게는 쓰지 못하게 했다.\n\n---\n\n#### **디지털에서 지금 여기로*", "source": "essay"}, {"id": "essay_185_23ca25ab6e", "text": "비자들이 그 플랫폼에 트래픽을 최대한 집중하게 만드는 것. 중독이 목표였다. 그것을 알기 때문에 자기 자식에게는 쓰지 못하게 했다.\n\n---\n\n#### **디지털에서 지금 여기로**\n\n디지털 기기를 쓰지 말자는 것이 아니다. **밸런스를 잃지 말자** 는 것이다. 가상세계에서의 연결이 삶의 전부가 되면, 나의 몸과 마음이 지금 여기를 경험하지 못하게 된다. 우드카빙이 그것과 연결된다. 나무를 깎을 때 몸과 마음이 함께 협력한다. 눈이 보고, 손이 느끼고, 마음이 집중한다. 그것이 지금 여기에 있다는 것이다. 디지털 기기에서 해방되어 실질적인 감각을 지키면서, 몸과 마음이 함께 무언가를 만들어내는 것. 그것이 **지금 여기 나로 살기** 의 한 축이다. 뭔가 만드는 것, 몸을 써서 알아가는 것. 몸이 알아야 진짜 아는 것이다.\n\n---\n\n#### **연결의 순서**\n\n우리는 연결되고 싶어 한다. 그런데 연결에는 순서가 있다. 먼저 나의 몸과 마음이 서로 연결되어야 한다. **몸 따로, 마음 따로가 아닌 상태** 에서 출발해야 한다. 몸과 마음이 상호작용하고, 그것이 주변 환경과 또 상호작용을 일으킨다. 그것이 진정한 연결이고, 온전한 삶이다. 나를 내버려 두고 가상세계와만 연결되려 하는 것은, 어딘가에서 이미 어긋나 있는 것이다. 어차피 가상세계에서 활동하는 것도 결국 잘 살고자 하는 것이다. 온전하게 살고자 하는 것이다. 그런데 나의", "source": "essay"}, {"id": "essay_186_8322ca186c", "text": "가상세계와만 연결되려 하는 것은, 어딘가에서 이미 어긋나 있는 것이다. 어차피 가상세계에서 활동하는 것도 결국 잘 살고자 하는 것이다. 온전하게 살고자 하는 것이다. 그런데 나의 지금 삶을 희생하면서까지 연결될 필요는 없다.\n\n---\n\n#### **관계 맺음의 기반**\n\n자기 자신과의 관계 맺음이 잘 될 때, 타인과의 관계 맺음도 잘 된다. 자기 몸과 마음의 관계 맺음, 자기를 둘러싼 주변 환경과의 관계 맺음, 가족과 지인과의 관계 맺음이 잘 이루어질 때, 그것이 기반이 되어 사회와의 관계 맺음도 자연스럽게 따라온다. 사회가 잘 소통되려면 구성원 각자의 몸과 마음이 먼저 소통되어야 한다. 그 출발점은 지금 여기, 내 몸과 마음이 함께 있는 것이다. #디지털균형 #몸마음 #지금여기 #관계맺음 #SSF\n\n--- (구분선)\n\n[파일명: 딴청_손톱서점_수필.md]\n\n# 딴청_손톱서점_수필\n\n---\n\n## 장난처럼 시작한 일\n\n손톱서점은 장난에서 시작됐다.\n\n시집 250권이 재고로 들어왔을 때, 처음엔 그냥 나눠주다 보니 나한테 돈이 하나도 들어오지 않았다. 그래서 내가 한번 팔아볼까? 하는 생각이 들었다. 페이스북에 \"시 배달한다\"고 반장난으로 올렸다. 그런데 사람들이 좋아하는 것 같았다.\n\n그러면 기왕에 손톱이라는 시도 썼으니 **손톱서점**으로 해볼까? 내 것만 팔면 재미없으니 남의 일식도 좀 팔아주면 좋겠다고 생각했다. 서점이니까.", "source": "essay"}, {"id": "essay_187_3cbc331bcd", "text": "람들이 좋아하는 것 같았다.\n\n그러면 기왕에 손톱이라는 시도 썼으니 **손톱서점**으로 해볼까? 내 것만 팔면 재미없으니 남의 일식도 좀 팔아주면 좋겠다고 생각했다. 서점이니까. 그러다 시만 있으면 부모들이나 아이들은 관심 없을 테니 동화책도 넣을까? 그렇게 되다 보니 어느 순간 \"시심과 동심을 세상에 전하는 손톱서점\"이라는 말이 생겨났다. 아웃라인이 스스로 생긴 것이다.\n\n그렇게 손톱 수레를 만들어서 끌고 나가자는 데까지 왔다. 거기까지만 생각했는데, 엊그제 갑자기 온라인 플랫폼 아이디어가 떠올랐다. 한 권인데 직접 부르기가 미안한 사람도 있잖아. 그런데 책은 빨리 받아보고 싶으면 온라인으로 주문하면 되잖아. 그렇게 해서 **온라인 선택서점**까지 생겨났다.\n\n아무것도 아닌 것 같지만, 이게 다 그렇게 흘러온 것이다.\n\n---\n\n## n분의 1 바깥으로\n\n내가 10년간 시를 쓴 건 여유가 있어서가 아니었다. 그냥 썼다. 그런데 혼자만 갖고 있지 않았다. 계속 올렸다. 처음엔 \"이게 시도 아니다, 시조도 아니다\"는 말을 들었다. 고치고, 또 고치고, 그렇게 시를 배웠다. 그러다 보니 어느 순간 큰 자산이 됐다. 내가 좋아하는 걸 계속 꺼내놓다 보면 **접점**이 생기고, 거기서 기회가 생긴다.\n\n인천에 화장품학과 교수님이 시집을 주문하고, 손톱수레 소식에 1번으로 3권 주문하겠다고 연락해왔다. 공익재단 이사장이 진지하게 댓글을 달았다", "source": "essay"}, {"id": "essay_188_9b79e523e1", "text": "*이 생기고, 거기서 기회가 생긴다.\n\n인천에 화장품학과 교수님이 시집을 주문하고, 손톱수레 소식에 1번으로 3권 주문하겠다고 연락해왔다. 공익재단 이사장이 진지하게 댓글을 달았다. 내가 계획하고 만든 인연이 아니다. 그냥 계속 노크했더니 문이 열린 것이다. **끊임없이 세상에 노출시키고, 두드리는 것.** 그게 전부다.\n\n그런데 옛날 페이스북 친구들은 잘 반응을 안 한다. 당연하다. 딱 세 권만 팔면 돈이 돼? 기름값도 안 나오는데 아무도 그걸 안 한다. 그런데 나는 여기서 엄청난 가능성을 본다.\n\n보통 서점은 책을 맡겼다가 안 팔리면 반품을 받는다. 작가한테 돌려보낸다. 나는 10권을 내가 직접 산다. 어떻게든 팔겠으니까. 그 대신 조건은 딱 하나다. 유명하지 않은 작가여야 한다. 50% 나 50% 작가, 반품 없음, 그리고 내 모든 플랫폼을 동원해서 그 작가를 알리겠다.\n\n왜 유명하지 않은 작가냐? 남들이 인플루언서 엮어서 n분의 1 싸움을 할 때, 나는 반대로 간다. 돈 많은 쪽이 샅바를 쥐는 판에서 나는 **내가 샅바를 쥘 수 있는 판**을 만드는 것이다. 힘 있는 놈들은 \"저거 말이 되냐\"고 거들떠도 안 보지. 그게 틈새다.\n\n남들이 반대로 안 가는 건 겁이 나기 때문이다. 남들과 다르게 가려면 두려움이 따른다. 그 두려움을 견디는 것. 그런데 나는 그걸 꼭 큰 용기라고 생각하지 않는다. **재미로 본다.** 이게 될까?", "source": "essay"}, {"id": "essay_189_e139c35eb3", "text": "는 건 겁이 나기 때문이다. 남들과 다르게 가려면 두려움이 따른다. 그 두려움을 견디는 것. 그런데 나는 그걸 꼭 큰 용기라고 생각하지 않는다. **재미로 본다.** 이게 될까? 모르지. 해보지 않으면. 안 해보고 안 된다고 단정짓는 건 남의 기준을 따르는 것이다.\n\n---\n\n## 속도보다 방향, 깊이보다 충분함\n\n운이 좋아서 이렇게 됐다고 하는 사람들이 있다. 그 말을 들을 때마다 나는 다르게 생각한다.\n\n**연기(緣起).** 이것이 있으니 저것이 있다. 이유는 있다. 그런데 의미는 없다. 의미는 사람이 부여하는 것이기 때문이다. 알렉산더 대왕이 모기한테 물려서 죽었다. 이유는 있다. 모기가 물었으니까. 그런데 그 모기가 알렉산더 대왕을 물은 데 무슨 의미가 있겠는가. 이유와 의미는 다르다.\n\n그리고 이 세상은 나밖에 없다. 내가 바라보는 세상이다. 내가 파리라면 너는 다르게 보일 것이다. 이 세상이 내가 그린 세상이라면, 이 세상이 나를 망치려고 하겠는가. 어떤 형태로든 나를 돕는 것이다. 내가 힘이 없고 아파도, 그것도 **선물**이다. 내 우주이기 때문에 그렇게 될 수밖에 없는 것이다.\n\n그러니까 비교는 방향의 문제다. 내가 태양 쪽을 보면 그늘을 등지고, 그늘 쪽을 보면 태양을 등진다. 같은 자리에서 어느 쪽을 보느냐의 차이다. 중요한 건 **속도보다 방향**이다. 앞으로의 세상은 얼마나 빨리 가느냐가 아니라 어느 쪽을 향하", "source": "essay"}, {"id": "essay_190_40c5abff3c", "text": "지고, 그늘 쪽을 보면 태양을 등진다. 같은 자리에서 어느 쪽을 보느냐의 차이다. 중요한 건 **속도보다 방향**이다. 앞으로의 세상은 얼마나 빨리 가느냐가 아니라 어느 쪽을 향하느냐다. 방향은 360도로 열려 있다. 지금 태양을 등지고 있어도 언제든지 바꿀 수 있다.\n\n빨리 뾰족하게 가다가 나중에 이게 아니다 싶으면 돌아오기가 힘들다. 조금 갔을 때 방향을 바꾸는 건 쉽다. 그래서 **올인하면 안 된다.** 유연성이 있어야 한다. 방향은 뾰족하게, 방법은 유연하게. 3권을 파는데 죽어도 수레만 싣고 가겠다고 하면 안 된다. 3권은 3권인데 배낭에 메고 갈 수도 있고, 방향성은 많다.\n\n또 하나. 깊이라고 하면 사람들은 막 파는 것을 생각한다. 그런데 나는 **깊이를 충분함으로 본다.** 저 사람이 나보다 더 깊이 팔 수 있다. 그런데 충분한 건 내가 충분하면 충분한 거다. 비교의 대상이 안 된다. 내가 나를 충분하게 느껴주는 것. 내 삶을 지금 충분하게 사는 것. 그러지 못하기 때문에 사람들이 자꾸 내 안에 뭔가 빈 것 같고, 껍데기만 남은 것 같다고 느끼는 것이다.\n\n---\n\n## 프레임 안에 있는 줄 모르는 사람들\n\n서울대 나오고 관광공사 사장까지 한 분이 페이스북에 글을 올렸다. \"나는 누구인가, 내 삶에 아무 의미가 없는 것 같다.\" 탁구도 치고, 바이크볼도 하고, 해외여행도 다니고, 클래식 음악도 듣는다. 그런데 불안하다고", "source": "essay"}, {"id": "essay_191_d38774dff6", "text": "분이 페이스북에 글을 올렸다. \"나는 누구인가, 내 삶에 아무 의미가 없는 것 같다.\" 탁구도 치고, 바이크볼도 하고, 해외여행도 다니고, 클래식 음악도 듣는다. 그런데 불안하다고 했다.\n\n그게 다 채워지지 않는 것이다. 여행이 도피처가 되면, 여행 자체의 충분함이 아니라 공허함을 채우러 가는 거라서 돌아오면 더 공허해진다. 더 더 더. 이렇게 된다.\n\n그 사람은 치열하게 살았다. 사회적으로 모두가 우러러보는 방향을 향해 전력 질주했다. 그런데 말년에 돌아보니 알맹이가 비었다. 왜냐면 남들이 매긴 가치를 쫓아갔기 때문이다. **가치 매기는 주도권을 남한테 줘버린 것이다.** 그 순간 나는 가치 없는 인간이 된다.\n\n이것이 **언어가 씌운 프레임**이다. 행복이라는 말, 성공이라는 말, 선한 영향력이라는 말. 내가 검토하지 않고 사회적 통념을 그냥 받아들이면, 그 프레임 안에 갇힌다. 칸트의 언어를 빌리면 칸트의 프레임 안에서만 생각할 수 있듯이. 정치도 프레임 싸움이다. \"자유민주주의가 맞지?\" 하면 나는 그 프레임 안으로 들어가버리는 것이다.\n\n행복이 추상적 개념이라면 불행도 추상적 개념이다. 그런데 우리는 행복을 단단하게 붙들려 하기 때문에 불안한 것이다. 무지개 같은 것을 단단하게 만들고 지키려 하기 때문이다.\n\n중요한 건 프레임을 쓰느냐 아니냐가 아니다. **프레임 안에서 그걸 쓴다고 착각하느냐, 프레임 밖에서 이용하느냐**", "source": "essay"}, {"id": "essay_192_cefe8e36a7", "text": ". 무지개 같은 것을 단단하게 만들고 지키려 하기 때문이다.\n\n중요한 건 프레임을 쓰느냐 아니냐가 아니다. **프레임 안에서 그걸 쓴다고 착각하느냐, 프레임 밖에서 이용하느냐** 그 차이다. 손톱서점은 이 세상에 없던 서점이다. 나는 새로운 프레임을 만든 것이다. 남의 프레임을 따르지 않고.\n\n그러니까 명상에서 알아차림이란 게 결국 내가 언어적으로 둔감한가 아닌가를 알아차리는 것이다. 비교하고 남의 처지를 내 머릿속에서 재현하고 있을 때 기분이 꿀꿀해진다. 잠잘 때는 그 생각이 없다. 좋은 영화를 보거나 맛있는 음식을 먹을 때도 없다. 그 생각이 우리를 그렇게 많이 재현하고 보여주는 것이다.\n\n---\n\n## 내 안에서 올라온 것들을 환대하기\n\n내 안에서 올라오는 것들을 거부하면 안 된다.\n\n나라는 것이 따로 있는 게 아니다. 차가 바퀴, 핸들, 엔진이 합쳐져서 차가 되듯이, 나도 지금 보는 것, 들리는 것, 안에서 올라오는 감정과 느낌이 합쳐져서 내가 된다. 그런데 거기서 \"이 바퀴 싫다\"고 떼어버리면 내가 나를 거부하는 것이다. 핸들이랑 씨름하면 내가 나랑 씨름하는 것이다. 사람들이 엄청나게 진을 빼는 게 바로 이것이다.\n\n다 하기 싫고, 게으르고, 나태하고. 그런 것들이 올라오면 그걸 억누르거나 바꾸려고 하지 마라. **그게 나니까.** 그걸 내가 인정해줘야 한다. 오히려 **환대**를 해야 한다. 그러면 더 빨리 통과된다. 거부", "source": "essay"}, {"id": "essay_193_dd91e566cb", "text": "고. 그런 것들이 올라오면 그걸 억누르거나 바꾸려고 하지 마라. **그게 나니까.** 그걸 내가 인정해줘야 한다. 오히려 **환대**를 해야 한다. 그러면 더 빨리 통과된다. 거부하고 밀어내면 걔는 \"난데 왜 나를 밀어내?\" 하면서 다시 들러붙으려 한다. 그러다 하루가 다 가고 진이 빠진다.\n\n사회적 기준으로 \"게으르면 안 돼, 그런 생각하면 안 돼\" 하면서 내 안에서 올라온 걸 쳐내는 건 그 기준이 내 것이 아니라는 말이다. 이게 난데. 어떻게 나를 내가 그냥 인정해주지 않겠는가. 다 품어줘야 한다. 그러면 나중에 걔네들이 다 힘을 준다. 인정해줄 때 쓰레기가 아니라 보석이 된다. 그걸 발현하면 그것이 나처럼 힘들었던 사람들한테 또 좋은 쪽으로 쓰인다.\n\n**가치를 발현한다는 게 좋은 것만 내보내라는 게 아니다.** 내 안에서 올라온 것들을 내가 온전히 받아들일 때, 그게 가치가 된다.\n\n---\n\n## 딴청을 피워야 이야깃거리가 생긴다\n\n나는 이야기가 많이 나오는 삶을 살겠다는 것이다.\n\n손톱수레를 끌고 나가다가 쫓겨나는 일도 있을 것이다. 비를 쫄딱 맞을 수도 있다. 그게 다 이야깃거리다. 남들이 보기엔 딴청이다. 말짱한 집 놔두고 왜 수레를 끌고 나가서 비 맞고 쫓겨다니냐. 그런데 거기서 이야기가 만들어진다.\n\n지금 유튜브에서 인플루언서라고 불리는 사람들은 결국 **이야기를 생산한 사람들**이다. 남의 이야기를 하는 것보다 이야", "source": "essay"}, {"id": "essay_194_73959af14e", "text": "비 맞고 쫓겨다니냐. 그런데 거기서 이야기가 만들어진다.\n\n지금 유튜브에서 인플루언서라고 불리는 사람들은 결국 **이야기를 생산한 사람들**이다. 남의 이야기를 하는 것보다 이야기가 만들어지는 삶을 살아야 한다.\n\n민음사 직원이 오랫동안 취직을 못 하면서 그냥 집에 들어앉아 책만 읽었다. 그때 봤다면 \"쟤는 뭐하는 거냐\"고 했을 것이다. 그런데 그 책들이 쌓여서 지금 팟캐스트에서 할 말이 넘쳐나는 사람이 됐다. 독서실 가는 척하면서 도서관에서 공부하기 싫어 책을 읽은 사람이 유튜브 채널을 운영하게 됐다.\n\n딴청. **딴청을 많이 피운 사람이 앞으로 성공한 사람이 된다.** 왜냐하면 그 딴청이 처음 들어보는 이야기가 되기 때문이다.\n\n서울대 나와서 대기업 다니다가 공사 사장까지 하고 해외여행 다니며 노후 준비 다 했다는 사람의 이야기를 누가 듣고 싶겠는가. 본인도 자기 이야기가 재미없다. 그래서 불안한 것이다. 나는 여보랑 할 얘기가 너무 많아서 시간이 부족하다. 지현이를 만나도 물어보고 싶은 게 다 못 나온다. 여기 강원도에만 있으면서도 얘깃거리가 어마어마하다.\n\n---\n\n## 나 자신을 나 스스로 증명하는 것\n\n나는 꼭 돈을 벌어 먹고 사는 것만을 위해 이 일을 하는 게 아니다. **앞으로 인간이 어떤 방식으로 살아야 하는지, 내 스스로가 증명해 보고 싶은 것이다.**\n\nAI가 나오는 세상에서 손톱서점 같은 건 대체가 안 된다.", "source": "essay"}, {"id": "essay_195_2fd43f33b2", "text": "이 일을 하는 게 아니다. **앞으로 인간이 어떤 방식으로 살아야 하는지, 내 스스로가 증명해 보고 싶은 것이다.**\n\nAI가 나오는 세상에서 손톱서점 같은 건 대체가 안 된다. 사람들이 취향이 점점 다분화되기 때문에 그만큼 틈새시장이 어마어마하게 생긴다. n분의 1 싸움이 아니라 자기만의 판을 만드는 것이 가능한 세상이 됐다.\n\n그리고 젊은이들이 앞길이 안 보인다고 한다. 다들 한쪽만 바라보기 때문이다. 운동장에 잔뜩 모여서 맨 앞에 있는 사람들만 쳐다보면 나는 안 보인다. 저 앞에 뭐가 있는지도 모르면서 남들이 그쪽을 보니까 나도 보는 것이다. **뺑뽀 다발, 꽃다발**이다. 지금 젊은이들은 다 꽃다발이다. 방향을 다르게 보면 된다.\n\n그리고 남들이 말하는 것처럼 무조건 노력하면 다 된다는 건 환상이다. 이유는 있지만 의미는 없다. 그런데 이것이 불공평하냐 공평하냐의 문제가 아니다. 그건 차이다. 차별이 아니라 차이. 그리고 그 차이에 어떤 의미와 가치를 부여하는가는 내가 결정하는 것이다.\n\n가치를 남한테 주도권을 줘버리면 나는 그 프레임에 빠진다. 내가 가치를 매겨가면서 내 가치를 발현하면서 사는 것. 아빠가 오늘은 바람한테 책을 읽어주고 왔다는 것으로도 가치를 창출할 수 있다. 그게 내가 매기는 가치다.\n\n그래서 위축될 수가 없다. 내 세상이기 때문에. 나보다 더 약한 것 같아도 그것이 이 세상을 이루고 있다. 제비꽃이 아무리", "source": "essay"}, {"id": "essay_196_f1bc1748fc", "text": "도 가치를 창출할 수 있다. 그게 내가 매기는 가치다.\n\n그래서 위축될 수가 없다. 내 세상이기 때문에. 나보다 더 약한 것 같아도 그것이 이 세상을 이루고 있다. 제비꽃이 아무리 작아도 봄을 품을 정도면 된다. 작은 꽃이 봄의 대표적인 꽃이 아닌가.\n\n나는 그걸 증명하고 싶다.\n\n---\n\n## 연기에서 성기로\n\n**연기법**은 이것이 있으므로 저것이 있다는 법칙이다. 시간적인 관계다. 모기가 물었으니 병에 걸렸다. 이유는 있다. 그런데 의미는 없다. 이게 연기적 이해다.\n\n그런데 **성기(性起)**는 그보다 조금 더 높은 차원이다. 있는 그대로, 좋고 나쁨 높고 낮음 이런 게 없는 세상이다. 크고 화려한 꽃만 불성의 표현이 아니다. 길거리에 있는 하찮아 보이는 작은 꽃도 다 그 표현이다. 찌질한 꽃이 따로 없다. 그게 성기적인 관점이다.\n\n그러니까 니네가 아무리 못나고 찌질하고 뭘 해도 그건 너의 생각이다. 생각이 만든 일이다. 잠들면 그런 게 없다. 그러니까 우리가 사회에서 주입받은 개념들, 내가 선택하지 않은 관념들, 그것들이 나를 굉장히 많이 제한시키고 있는 것이다. 그게 절대적인 법칙이 아니다. 그런데 많은 사람이 그렇게 얘기하니까 내가 보기에도 그렇네 하고 거기 들어가버리면 그 프레임에서 빠져나오기가 힘들다.\n\n**올셀프.** 이 세상은 나밖에 없다. 내가 바라보는 세상이다. 나의 세상은 나밖에 없고, 너의 세상은 너밖에", "source": "essay"}, {"id": "essay_197_12601e346b", "text": "렇네 하고 거기 들어가버리면 그 프레임에서 빠져나오기가 힘들다.\n\n**올셀프.** 이 세상은 나밖에 없다. 내가 바라보는 세상이다. 나의 세상은 나밖에 없고, 너의 세상은 너밖에 없다. 아빠가 파리라면 너는 지금의 너로 보이지 않는다. 그러니까 이 세상이 내가 그린 세상인데, 이 세상이 나를 망치려고 하겠는가. 나한테 닥친 일들, 힘이 없고 아파도, 게으르고 나태해도, 그것도 다 내한테 오는 선물이다.\n\n---\n\n## 어쩌면 늙어서야 묻는 질문을\n\n치열하게 살아온 사람이 늙어서야 \"나는 누구인가\"를 묻는다. 그게 젊은이들한테는 지금 이미 주어진 기회일 수 있다.\n\n아무리 치열하게 해도 직장 하나 구하기 힘든 시대, 그게 자기가 진짜 원하는 게 뭔지 생각해보는 계기가 될 수 있다. 좋은 대학 나와서 시키는 대로만 하면 됐던 사람들은 \"이렇게 하면 돼\"를 그냥 따라갔으니까, 나중에 돌아보면 알맹이가 비었다. 그런데 지금 젊은이들은 어쩔 수 없이 생각하게 된다. \"내가 원하는 게 뭐지? 어떻게 살아야 되지?\" 그런 질문이 주어진 것이다.\n\n스티브 잡스도 자기가 만든 애플에서 잘렸다. 하루아침에 무직 신세가 됐다. 돌이켜보면 그때가 자기 인생에서 가장 좋은 일이었다고 했다. 그런 시기가 필요하다. 인생에서.\n\n최민수 아버지 최무룡이 아들한테 한 말이 있다. \"절대 힘들게 어렵게 골치 아프게 세상을 살지 마라. 그냥 편안하게 자유롭게 가볍게", "source": "essay"}, {"id": "essay_198_48d93cce24", "text": "고 했다. 그런 시기가 필요하다. 인생에서.\n\n최민수 아버지 최무룡이 아들한테 한 말이 있다. \"절대 힘들게 어렵게 골치 아프게 세상을 살지 마라. 그냥 편안하게 자유롭게 가볍게 살아라.\" 남들이 보면 완전 사고뭉치인 사람인데, 말 한마디 한마디가 어디에도 얽매이지 않은 자유로운 영혼의 말이다. 그 아버지가 책방을 가득 채워주고, 어린 아들이 학교 다니는 길에 있는 중고 서점에 자기 자리를 만들었다. 아저씨랑 매일 라면 끓여 먹으면서 책을 읽었다. 그게 쌓인 것이다.\n\n**딴청이 이야기가 되고, 이야기가 삶이 된다.**\n\n---\n\n지금 내가 할 수 있는 가치를 발현하라. 과거에 가치 있는 일을 했는지 찾거나 후회하지 말고, 지금 이 자리에서 냄새를 풍겨라.\n\n#손톱서점 #프레임 #딴청 #충분함 #가치발현\n\n--- (구분선)\n\n[파일명: 맥락으로서의나_고정된나의착각_수필.md]\n\n### **맥락으로서의 나, 고정된 나의 착각**\n\n#### **내가 생각을 떠올리는 것이 아니다**\n\n사람들이 자꾸 착각을 한다. 내가 이런 생각을 한다, 내가 왜 그때 그렇게 했을까, 내가 왜 자꾸 이런 생각을 떠올리지 — 이런 일련의 사건들 중심에 나라는 것이 딱 고정되어 있다고 착각하는 것이다. 그런데 사실은 그런 생각이 떠올려지는 것이 나다. **내가 그 생각을 떠올리는 것이 아니고, 후회를 하는 것이 아니고, 후회를 하고 있는 것이 나다.** 후회하", "source": "essay"}, {"id": "essay_199_03bace31bb", "text": "착각하는 것이다. 그런데 사실은 그런 생각이 떠올려지는 것이 나다. **내가 그 생각을 떠올리는 것이 아니고, 후회를 하는 것이 아니고, 후회를 하고 있는 것이 나다.** 후회하고 싶은 일을 내가 의도해서 떠올리는 것이 아니다. 가만히 있다 보면 그냥 그 생각이 떠올려지고 감정이 나는 것뿐이다. 내가 의도한 대로만 생각이 올라오지 않는다. 그것이 이미 내가 생각을 일으키는 것이 아니라는 증거다.\n\n---\n\n#### **한강은 따로 없다**\n\n그렇다고 나라는 맥락이 없다는 것이 아니다. 갑자기 한강물이 어느 날 낙동강 물이 되고 두만강 물이 되면 그것을 한강이라 할 수 없다. 서울 쪽에 흐르는 강을 우리가 한강이라 하는 것이다. **한강이 따로 있는 것이 아니다.** 서울이라는 맥락을 따라 흐르는 것을 한강이라고 지칭하는 것이다. 나도 마찬가지다. 내 삶의 맥락적 흐름이 나다. 그때그때 경우에 따라 돌과 부딪칠 수 있고 새들도 날아들 수 있듯, 내가 배우고 보고 듣는 맥락에 따라 나라는 것이 있다. 없는 것이 아니고, 그것이 매번 맥락적으로 바뀔 수 있다는 것이다. 딱 고정된 나가 있어서 내가 주체적으로 이것 저것을 하는 것이 아니다. 그래야 변화할 수 있는 가능성이 생긴다.\n\n---\n\n#### **맥락을 떠난 나는 없다**\n\n지금 당신을 만나니까 내가 남편이 되는 것이다. 딸이 있으면 나는 아버지로서의 맥락으로 살아가는 것이다. *", "source": "essay"}, {"id": "essay_200_f52f806d24", "text": "가능성이 생긴다.\n\n---\n\n#### **맥락을 떠난 나는 없다**\n\n지금 당신을 만나니까 내가 남편이 되는 것이다. 딸이 있으면 나는 아버지로서의 맥락으로 살아가는 것이다. **고정된 나가 있는 것이 아니고, 나의 패턴이 있는 것이다.** 당신의 남편이고 딸의 아버지로 겪어온 삶의 맥락 이력이 있고, 그것이 유지되니까 나를 기억하는 것이다. 그 맥락을 잊어버리면 치매 환자와 별다를 것이 없겠지. 어렸을 때부터 너는 이게 잘못됐어, 너는 고쳐야 돼, 네 생각이 틀려먹었어 하고 자꾸 들으니까 틀린 나, 고쳐야 될 나가 딱 고정되게 생각이 드는 것이다. 언어적으로 그렇게 되는 것이다. 그런데 그때 잘못한 나가 있으면 잘한 일을 하면 잘한 나가 되어버린다. 바뀔 수 있어야 하는데 그것을 계속 안고 있는 것이다. 우울한 나, 괴로운 나가 중심이 되어버리고 그 나로 모든 대상을 해석해버린다. 그래서 점점 그런 맥락으로 또 존재하게 된다. 그런데 새로운 상황이나 새로운 인연들이 만나지면 나는 또 다른 나가 될 수 있다. **새로운 가능성으로 다시 태어날 수 있게 된다.** 나를 단단하게 만들라고들 하는데 그것이 넌센스다. 나라는 것 안에 아무것도 없는데 단단한 나가 있다고 생각하면 거기서 오류가 생긴다.\n\n---\n\n#### **환경과 나는 둘이 아니다**\n\n우리는 지구라는 주변 환경과 전체적으로 유기적으로 맞물려서 돌아가고 있다. 그것을 떼놓", "source": "essay"}, {"id": "essay_201_7c53708ea4", "text": "있다고 생각하면 거기서 오류가 생긴다.\n\n---\n\n#### **환경과 나는 둘이 아니다**\n\n우리는 지구라는 주변 환경과 전체적으로 유기적으로 맞물려서 돌아가고 있다. 그것을 떼놓고 나는 없다. 뇌세포가 나는 독자적인 세포야, 환경과 다르게 나는 왜 이럴까 하면 오류다. 세포는 생태계 안에서 존재하는 것이지 단독으로 존재하는 것이 아니다. 나도 나를 둘러싼 환경과 맥락 하에서 존재하는 것이다. 이것과 동떨어진 나는 있을 수 없다. 환경과 나랑 나눌 수 없다면 **이 전체가 나라고 볼 수밖에 없다.** 그런데 이것과 분리된 나가 무한정 성장해야 되고 나만 잘 살아야 된다고 생각하는 데서 언어적 오류가 온다. 실제는 지금 이 환경과 떨어질 수 없게 딱 밀착되어 돌아가는 것이 나다. 그것과 전혀 별개로 나라는 것이 딱 존재한다고 여기는 것은 생각으로 이루어진 가공의 스토리의 나일 뿐이다. 이 언어적 오류를 냉철하게 바라볼 수 있을 때, 그것을 **깨어있다** 고 하는 것이다. #맥락으로서의나 #고정된나의착각 #한강비유 #환경과나는둘이아님 #깨어있음\n\n--- (구분선)\n\n[파일명: 메신저정체성_메시지생산_수필.md]\n\n### **메신저정체성_메시지생산_수필**\n\n#### **받는 자리에서 주는 자리로**\n\n코칭 업계에서 오래 활동한 사람들을 보면 공통적인 패턴이 있다. 남의 이론을 배워서 적용하는 것이다. 듣는 데 익숙해져 있고, 배움 쪽으", "source": "essay"}, {"id": "essay_202_9a3e8a6d6f", "text": "### **받는 자리에서 주는 자리로**\n\n코칭 업계에서 오래 활동한 사람들을 보면 공통적인 패턴이 있다. 남의 이론을 배워서 적용하는 것이다. 듣는 데 익숙해져 있고, 배움 쪽으로만 포지션이 고정되어 있다. 아무리 오래 해도 자기 메시지가 없다. 강의를 쫓아다니고, 누군가의 이론을 익히고, 또 쫓아다니고. 맨날 그렇게만 하면 자기 부스 하나 못 연다. 전환점은 책 한 권이 될 수도 있다. 책이 나오는 순간, 그 사람은 메시지를 받는 입장에서 **메시지를 주는 사람** 이 된다. 포지션이 바뀐다. 일반 직원이었다가 대표가 되는 것과 같다. **메신저로서의 정체성** 이 싹을 틔우는 것이다.\n\n---\n\n#### **스피커를 갖는다는 것**\n\n중요한 것은 **나만의 스피커를 갖는 것** 이다. 유튜브일 수도 있고, 강연일 수도 있고, 글일 수도 있다. 스피커를 갖는다는 것은 단순히 자신을 알리는 마케팅이 아니다. **'나'를 어떻게 포지셔닝 하느냐** 의 문제다. 수동적으로 메시지를 받아들이는 입장인가, 아니면 나의 사상, 철학, 신념을 메시지로 생산해서 계속 공급하는 입장인가. 그 차이다. 유튜브를 하면 세상 사람들에게 내 메시지를 전달해야 한다. 메시지가 안 먹히면 메시지를 바꾼다. 그렇게 하면서 성장한다. 아무리 오랫동안 배움만 쫓아다녀도, 메시지를 생산하지 않으면 자기 것이 없다. 철학 박사도, 15년 차 코치도 그 함정에서 자유", "source": "essay"}, {"id": "essay_203_d6278e9964", "text": "먹히면 메시지를 바꾼다. 그렇게 하면서 성장한다. 아무리 오랫동안 배움만 쫓아다녀도, 메시지를 생산하지 않으면 자기 것이 없다. 철학 박사도, 15년 차 코치도 그 함정에서 자유롭지 않다. 알고 있는 것을 유일한 진리처럼 들고 있지만, 그것이 메시지로 세상에 나오지 않으면 아는 것에 그친다.\n\n---\n\n#### **예수가 메신저인 이유**\n\n예수는 메신저였다. 메시아라는 말 자체가 예언자, 즉 메신저의 뜻이다. 하느님의 뜻을 세상에 전달하러 온 사람. 본인이 그 역할을 너무나 강력하게 믿
