<script>
const BATCHES = [[{"id": "essay_0_c47ead0730", "text": "[파일명: 80억개의촛불\\_무아와통의체득\\_수필.md\\]\n\n### **80억개의촛불\\_무아와통의체득\\_수필**\n\n#### **초 하나가 켜진다**\n\n삶이, 나를 둘러싼 이 모든 것이 통째로 다 나라는 것 — 이걸 이론으로만 알아서는 안 된다. **체득** 해야 한다. 진짜 그런가, 몸으로 알아야 한다. 촛불 비유로 들어가 보자. 밤에 잘 때는 촛불이 꺼져 있다. 아침에 눈을 뜨면 주변 세상이 환하게 드러난다. 촛불이 켜진 것이다. 내 안의 어떤 양분들이 타면서 세상을 비춰본다. 그러니 세상을 본다고 생각한다. 환히 드러나 보이니까. 그 빛이 닿는 범위, 그것이 **나의 촛불이 만드는 바운더리** 다. 방 안에 있다면 방 안이 내 바운더리가 된다. 그 안에 가구도 보이고, 다른 초도 보이고, 내 초도 보인다. 이제 옆에 당신이라는 초가 켜진다. 같은 공간에 두 개의 촛불이 있다. 두 촛불이 환히 밝히는 이것 — **나의 밝힘도 있지만 당신의 밝힘도 있다.** 그런데 여기서 물어보자. 나의 밝음과 당신의 밝음을 어떻게 나누겠는가. '여기까지는 내 빛이야, 여기서부터는 네 빛이야' — **그럴 수 없다.** 나눌 수가 없다. 그러니까 이 **밝음은 둘이 아니다.** 누구 것도 아니고, 그냥 밝음이 앎으로 드러나는 것이다. 있는 그대로 비춰짐이 있을 뿐이다.\n\n---\n\n#### **치직거림을 나라고 삼는다**\n\n초가 형성되면서 불순물이 섞인", "source": "essay"}, {"id": "essay_1_5de1046a41", "text": "* 누구 것도 아니고, 그냥 밝음이 앎으로 드러나는 것이다. 있는 그대로 비춰짐이 있을 뿐이다.\n\n---\n\n#### **치직거림을 나라고 삼는다**\n\n초가 형성되면서 불순물이 섞인다. 살아오면서 그렇게 된다. 그 불순물이 탈 때 촛불이 **치직거린다.** 순수하지 않은 부분이다. 상대편 초는 지금 그 부분이 떨리지 않는다. 나는 떨리는데 저 사람은 안 떨리는 것 같다. 소리도 난다. 그 부분이 타 들어갈 때 나는 그것을 **아픔** 이라고 생각한다. 나만의 고유한 아픔이라고 생각한다. 그런데 실은 그렇지 않다. 통으로 다 드러나고 있는 것 중에서, 그 치직거리는 부분을 집어서 **이거는 나다, 라고 내가 삼는 것이다.** 내가 있어서 그것을 나라고 생각하는 것이 아니다. 그런 이벤트가 지금 일어나고 있는데, 그 부분을 나라고 내가 자꾸 여기는 것이다. TV 화면을 떠올려보자. 화면 안에 나라는 상(像)도 있고 상대편이라는 상도 있다. 각각의 소자(素子)가 빛을 내서 나라고 느끼지만, 사실은 **통으로 그냥 한 통이다.** 화면에서 벌어지고 있는 것들은 통으로 다 하나다. 경계를 나눌 수가 없다. 유일하게 나누는 것이 있다면, 내 초에서 치직거리는 그 부분을 **나라고 느낀다는 것뿐이다.** 그 바운더리에 한정 지어서. 그렇다고 그것만이 나는 아니다.\n\n---\n\n#### **서치라이트를 옮기면**\n\n서치라이트로 한 부분을 비추면 그 드", "source": "essay"}, {"id": "essay_2_c27e555c7d", "text": "**나라고 느낀다는 것뿐이다.** 그 바운더리에 한정 지어서. 그렇다고 그것만이 나는 아니다.\n\n---\n\n#### **서치라이트를 옮기면**\n\n서치라이트로 한 부분을 비추면 그 드러나는 부분이 보인다. 그것을 나라고 생각한다. 서치라이트를 옮기면 다른 부분이 드러난다. 그것도 나다. 서치라이트를 전체적으로 다 비추면 **통으로 나다.** 지금 하필 내 몸을 기점으로 집중해서 비추고 있으니까, 그 드러나는 부분을 나라고 본 것이다. 앎으로 드러났으니까 그것을 나라고 느낀 것이다. 그 서치라이트가 지금 **80억 개다.** 80억 개의 서치라이트가 저마다 자기가 비춘 부분을 나라고 생각한다. 80억 개의 소자가 저마다 빛나면서 '나 혼자 빛나고 있다'고 생각한다. 그런데 사실은 그것들이 전부 **하나의 바탕에 통으로 빛나고 있는 것이다.** 그래서 \\*\\*무아(無我)\\*\\*라고 하는 것이다. 어떤 지점을 딱 찝어서 '이것이 나다'라고 고정시킬 수 없다는 것이다. 아(我)를 명사화할 수 없다는 것이다. 지금 하필 이 부분을 비추고 있어서 그것을 나라고 하는 것이지, 비추지 않는 다른 수많은 부분들은 어둠 속에 잠재해 있다. 서치라이트를 옮기면 그것도 내가 된다.\n\n---\n\n#### **앎이 항상 있다**\n\n한 가지 더 짚어야 할 것이 있다. 초가 아는 것이 아니다. 만약 초가 안다면, 촛불이 꺼졌을 때 깜깜해지는 육신이 아는 것이 된다.", "source": "essay"}, {"id": "essay_3_e34233d5fe", "text": "---\n\n#### **앎이 항상 있다**\n\n한 가지 더 짚어야 할 것이 있다. 초가 아는 것이 아니다. 만약 초가 안다면, 촛불이 꺼졌을 때 깜깜해지는 육신이 아는 것이 된다. 그런데 **초가 아는 건 아니다.** 그냥 **앎이 항상 있는 것이다.** 촛불이 켜졌을 때 비로소 드러나고, 꺼지면 드러나지 않게 되는 것이다. 이것이 이론의 배경이다. 그리고 이것은 이론으로만 머물면 안 된다. 명상 중에 내가 진짜 초라고 생각하고 바라볼 때, 그냥 안다. 내가 통으로 나구나. **전체성을 회복한다는 것은 새로 얻는 것이 아니다.** 원래 그런 것이었는데, 하필 부분에 집중해서 그것을 나로 비춰 본 것뿐이다. 80억 개의 촛불이 저마다 빛나고 있다. 그리고 그 모든 빛이 하나의 바탕에서 온다. \\#올셀프 \\#무아 \\#촛불명상 \\#전체성 \\#체득 \\#80억개의촛불\n\n**\\--- (구분선)**\n\n\\[파일명: 가르치는자와가리키는자\\_온전한삶\\_수필.md\\]\n\n### **가르치는자와가리키는자\\_온전한삶\\_수필**\n\n#### **코치가 먼저 알아야 하는 것**\n\n고객이 온전한 삶을 살도록 돕는 것이 코치의 일이다. 그렇다면 코치가 먼저 알아야 할 것이 있다. 온전한 삶이 무엇인지. 사람이 이 세상에서 어떻게 온전함을 발현하며 사는지. 그 원리를. 이것은 단순한 기술이나 방법론이 아니다. **영적인 원리** 다. 코치들이 그것을 배워야 하고, 배운", "source": "essay"}, {"id": "essay_4_ca3670a94d", "text": "무엇인지. 사람이 이 세상에서 어떻게 온전함을 발현하며 사는지. 그 원리를. 이것은 단순한 기술이나 방법론이 아니다. **영적인 원리** 다. 코치들이 그것을 배워야 하고, 배운 것에 그치는 게 아니라 스스로 그 삶을 살아야 한다. 코칭 과정을 통해서든, 자기 삶을 통해서든 **체화돼야 한다.** 그래야 고객을 온전하게 비춰줄 수 있다.\n\n---\n\n#### **가르치는 자와 가리키는 자**\n\n코치는 고객을 가르치는 사람이 아니다. **가리키는 사람이다.** 가르친다는 것은 고객이 부족하다는 전제 위에 선다. 그런데 가리킨다는 것은 고객에게 이미 온전함이 있다는 것을 안다는 뜻이다. **'온나'니까.** 고객은 이미 온전하다. 다만 지금 그것을 발현하지 못하고 있을 뿐이다. 어려움을 느끼고 있을 뿐이다. 가르치는 자는 티처(Teacher)다. **가리키는 자는 안내자다.** 이 둘은 근본적으로 다르다. 안내자는 손가락으로 가리킨다. 고객의 온전한 모습을 향해서. **코치의 역할은 고객의 모습을 온전하게 비춰줘서, 고객으로 하여금 자신의 온전함을 볼 수 있게 하는 것이다.** 그런데 코치가 그것을 알아야 가리킨다. 온전함이 무엇인지 모르면 가리킬 수 없다. 이 원리를 알고 코칭하는 것과 모르고 코칭하는 것은 천지 차이다.\n\n---\n\n#### **올셀프의 삶을 먼저 사는 코치**\n\n코치들이 먼저 **올셀프(All Self), 온전한 나의", "source": "essay"}, {"id": "essay_5_f68c61d3cc", "text": "원리를 알고 코칭하는 것과 모르고 코칭하는 것은 천지 차이다.\n\n---\n\n#### **올셀프의 삶을 먼저 사는 코치**\n\n코치들이 먼저 **올셀프(All Self), 온전한 나의 삶** 을 살아야 한다. 그래야 고객의 올셀프를 비춰줄 수 있다. 안내해 줄 수 있다. 올셀프가 무엇인지 알고, 그 삶을 살아낼 수 있어야 한다. 그때 고객의 올셀프의 삶도 도울 수 있다. 코치 교육이 필요한 이유가 여기 있다. 영적 원리에 대한 성찰과 체화. 그것이 코칭의 뿌리다. \\#올셀프 \\#안내자 \\#온전한삶 \\#코칭 \\#가리킴\n\n**\\--- (구분선)**\n\n\\[파일명: 각본을믿고즐겨라\\_동시상영\\_수필.md\\]\n\n### **각본을믿고즐겨라\\_동시상영\\_수필**\n\n#### **지금도 잘 되고 있다**\n\n잘 될 수밖에 없다. 잘 되게 정해져 있다. 그리고 잘 되게 정해져 있다는 것은 **지금도 잘 됐다는 것이다.** 지금 잘못된 것이 아니다. 우리는 지금 여기보다 더 나은 무언가를 자꾸 찾는다. 그런데 아무 일도 없는 지금이 정체된 것처럼 느껴지고, 더 높이 올라가야 한다고 생각하는 것 자체가 내가 설정한 것이다. 삶의 역동성에 쓸데없는 가치를 부여하는 것이다. 업(業)이라고 생각하는 것들, 인과응보니 선업이니 악업이니 하는 것들도 삶의 역동성 그 자체다. 이 장면이 다음 장면을 밀어내고, 다음 장면이 또 그다음 장면을 밀어내야 연속극이 계속 진행된다.", "source": "essay"}, {"id": "essay_6_01fbffba67", "text": "생각하는 것들, 인과응보니 선업이니 악업이니 하는 것들도 삶의 역동성 그 자체다. 이 장면이 다음 장면을 밀어내고, 다음 장면이 또 그다음 장면을 밀어내야 연속극이 계속 진행된다. **삶이라는 드라마가 굴러가는 데 필요한 에너지다.** 때에 따라서는 주인공이 슬픈 역할도 해야 된다. 맨날 좋은 역할만 하다가 끝나버리면 드라마에 재미가 없다. 지금 이 부분을 통과하고 있는 것이다. 내려가고 있다고 느껴지는 순간에도, 계속 나락으로만 떨어지는 드라마는 없다. 그런 드라마가 재미가 없기 때문이다. 각본상 그렇게 되어 있다. **바닥을 치면 오를 일만 남았다.** 그러니 이 부분을 통과하고 있는 지금이 오히려 삶이 해피하다고 생각할 수 있는 것이다.\n\n---\n\n#### **밥통에서 온통으로**\n\n나만 잘 되기를 바라는 것은 작은 통 속에 갇혀 있는 것이다. **밥통이다.** 먹고사는 것만 걱정하는 밥통 속에 갇혀 있는 것이다. 나만 보인다. 나한테만 유리한 쪽으로만 생각한다. 그런데 '저 사람들도 잘 되어야 되는구나'라고 생각하는 순간, 내 통 밖으로 나온 것이다. 그것이 자비심이다. 맹자가 말하는 측은지심이고, 공자가 말하는 인(仁)이다. 왜 남을 사랑하게 되는가. 관심이 거기로 옮겨간 것이 아니다. **내 통을 벗어난 것이다.** 남을 위해서 사랑하는 것이 아니라 나를 위해서 사랑하는 것이다. 내 통 속에서 나오기 위해서 사랑하는 행위이", "source": "essay"}, {"id": "essay_7_f5ef97a23e", "text": ". 관심이 거기로 옮겨간 것이 아니다. **내 통을 벗어난 것이다.** 남을 위해서 사랑하는 것이 아니라 나를 위해서 사랑하는 것이다. 내 통 속에서 나오기 위해서 사랑하는 행위이기 때문이다. 인을 행하고 측은지심을 갖는 것이 결국 나를 돕는 것이다. 사랑을 하고 자비를 베풀고 연민을 베푸는 마음이 통 밖으로 나오게 도와준다. 통 밖으로 나오면 **온통(온통 다 나)** 이 된다. 온통이 다 내가 되는 것이다. 통 안도 통 바깥도 통도 다 그냥 하나인 것을, 이제 크게 쓸 수 있게 된다.\n\n---\n\n#### **동시 상영**\n\n삶이라는 연극은 독특하다. 내가 연기자이면서 동시에 관객이다. **동시 상영이다.** 보통 영화는 찍고 나서 극장에 걸어서 상영하고, 배우도 나중에 본다. 그런데 삶이라는 드라마는 연기하면서 바로 본다. 그러니 재미있어야 한다. 주인공이 거지 역할을 해야 한다. 나 거지 역할 안 할래요 이러면 연극이 쫑 난다. 지금 이때는 거지 역할을 하지만, 그 거지 역할에 대한 주인공이다. 지금 이 침체된 역할을 하고 있는 것이다. 역을 통과하고 있는 것이다. 역을 잘 하다 보면 또 좋은 배역을 맡을 수도 있다. 1편, 2편, 3편, 100편이 있다고 보면 내가 지금 여기서는 거지 역할을 하고 있지만 다른 편에 가면 또 주인공 역할도 할 수 있다. 이 한 편에서 왕 역할을 하다가 거지 역할로 떨어졌듯이. 삶이라는 드라마가", "source": "essay"}, {"id": "essay_8_66e83862fb", "text": "다고 보면 내가 지금 여기서는 거지 역할을 하고 있지만 다른 편에 가면 또 주인공 역할도 할 수 있다. 이 한 편에서 왕 역할을 하다가 거지 역할로 떨어졌듯이. 삶이라는 드라마가 어떻게 쓰일지 아무도 모른다. 나는 지금 요 짧은 한 편만 보고 있는 것이다. 드라마 전체를 보면 어느 것 하나도 뺄 수 없다. **거지 역이 있으니까 주인공이 빛나는 것이다.** 그러니까 내가 맡은 배역을 리얼하게 잘 연기하면서 관객으로서도 보는 것이다. '어우 연기 훌륭하게 잘 하네. 막 힘들어 죽겠어. 어떻게 살아야 되지.' 아주 리얼하다. 이렇게 볼 수 있어야 한다. **삶이 그렇게 심각할 필요가 없다는 것이다.** 어차피 각본대로 살고 있는 것인데.\n\n---\n\n#### **각본을 믿는다**\n\n각본이 어떻게 전개될지 아무도 모른다. **재밌으라고 그런 것이다.** 알면 재미가 없지 않은가. 배우 중에 누구 하나가 각본을 알아서 퍼트려버리면 다들 재미가 없어진다. 일부러라도 몰라야 한다. 믿고 맡기라는 것은 **각본을 믿고 맡기라는 것이다.** 각본을 내가 따로 쓰면서 삶의 각본과 다른 각본을 쓰려 하지 말라는 것이다. 삶이라는 각본을 즐겨야 한다. 내 드라마를 쓰면서 고뇌하고 에너지를 낭비할 필요가 없다. 배우가 연기하면서 머릿속으로 각본을 따로 쓰고 있으면 연기가 제대로 안 되는 것과 같다.\n\n---\n\n#### **이원성이 드라마를 만든다**\n\n드라", "source": "essay"}, {"id": "essay_9_d42ec93887", "text": "에너지를 낭비할 필요가 없다. 배우가 연기하면서 머릿속으로 각본을 따로 쓰고 있으면 연기가 제대로 안 되는 것과 같다.\n\n---\n\n#### **이원성이 드라마를 만든다**\n\n드라마가 성립되려면 이원성이 필요하다. 낮은 것이 있어야 높은 것이 생긴다. 왕이 혼자 있으면 왕이 아니다. 국민이 있고 신하가 있으니까 왕이 되는 것이다. 드라마 속 어느 역할 하나도 빠지면 안 된다. 높고 낮고, 귀하고 천하고, 환하고 어둡고. 이원성이 잘못된 것이 아니다. **차이가 있어야 한다는 것이다.** 그 차이 덕분에 삶이라는 드라마가 펼쳐진다. 차이가 있어야 색깔도 있고 리듬도 있고 드라마가 된다. 그러니 나 잘났네, 너보다 잘났네 하는 마음을 함부로 가지면 안 된다. **우리는 관계로 엮여 있기 때문이다.** 내가 왕 역할을 할 수 있는 것은 신하와 국민이 있기 때문이다. 다들 나를 위해 연기를 해주고 있는 것이다. 통으로 하나의 스토리 안에서 다 함께 굴러가고 있는 것이다. 각본을 믿고 즐겨라. 지금 이 삶이라는 막장 드라마가 어떻게 펼쳐질지는 아무도 모른다. 그래서 재밌다. \\#각본을믿고즐겨라 \\#동시상영 \\#온통 \\#이원성 \\#삶의드라마\n\n**\\--- (구분선)**\n\n\\[파일명: 감정관리\\_마음밭\\_돌보기와\\_행복대출\\_이론\\_수필.md\\]\n\n### **감정관리\\_마음밭\\_돌보기와\\_행복대출\\_이론\\_수필**\n\n#### **기분이 나를 이끌", "source": "essay"}, {"id": "essay_10_27b14fe168", "text": "\\[파일명: 감정관리\\_마음밭\\_돌보기와\\_행복대출\\_이론\\_수필.md\\]\n\n### **감정관리\\_마음밭\\_돌보기와\\_행복대출\\_이론\\_수필**\n\n#### **기분이 나를 이끌게 두지 않는다**\n\n내 삶을 기분이 이끌고 가게 두면 안 된다. 기분은 맨날 이랬다 저랬다, 좋았다 나빴다 한다. 그 기분에 따라 삶 자체가 들쑥날쑥 해진다는 거다. 살다 보면 우울할 때가 왜 없겠는가. 하지만 밭도 풀을 뽑아주고 돌봐야 하듯이, 그것이 내가 나를 사랑하는 길이다. 우울한 기분이 들 때도 내 스스로 기분 전환을 시켜주든가, 일부러라도 좋은 쪽 방향으로 생각을 해줘야 한다. 남과 비교하고 그래서 생기는 박탈감이나 우울감, 그런 것들은 다 **생각의 일** 이다.\n\n---\n\n#### **마음 밭에 발효 움을 만든다**\n\n마음 밭에다 퇴비도 넣어주고, 비료도 넣어주고, 마른 것 같으면 물도 넣어줘야 한다. 그래야 거기서 원하는 싹이 튼다. 우울이나 불안이나 두려움 같은 것이 마음 밭에서 올라올 때, 그것을 외면하거나 그것만이 밭의 전부인 것처럼 온 신경을 쏟아 기분이 팍 다운되면 나머지 밭들이 기능을 못 한다. 그 감정들은 **지 알아달라고 나오는 것** 이다. 그러니까 그걸 **거름으로 써야 한다** . 발효가 되게 다시 품어주는 거다. 마음 밭에다 **발효 움** 하나를 만든다. 그런 감정이 올라오면 '네가 올라왔구나' 하고 알아봐 준 뒤,", "source": "essay"}, {"id": "essay_11_77da0e86a9", "text": "그걸 **거름으로 써야 한다** . 발효가 되게 다시 품어주는 거다. 마음 밭에다 **발효 움** 하나를 만든다. 그런 감정이 올라오면 '네가 올라왔구나' 하고 알아봐 준 뒤, 발효 움에 넣는다. 또 다른 것이 올라오면 또 넣는다. 그렇게 **발효가 될 때까지 숙성** 시킨다. 그러면 그것이 나중에는 나한테 다 자양분이 된다. 시인이라면 그런 기분들로 시를 쓴다. 시를 쓴다는 것 자체가 **발효실** 이다. 그 기분들을 발효통에 넣어두고 거기서 시를 뽑아내면 시의 꽃이 핀다. 감정들이 버림받는 것이 아니다. 좋은 감정과 나쁜 감정은 별개가 아니다. 내가 어떤 관점에서 보느냐에 따라 좋고 나쁘고가 결정될 뿐이다.\n\n---\n\n#### **감정은 올라오지만, 무엇을 선택할지는 내가 정한다**\n\n감정이 올라오는 것은 내가 어떻게 할 수 없는 부분이다. 어떤 감정이 들고 이런 것은 나도 모르는 사이에 올라온다. 그러나 그중에서 **뭘 선택하느냐** 는 내가 선택할 수 있다. 이 감정을 계속 가져갈 것인가, 아니면 다른 감정을 선택해서 그쪽으로 기분을 유지할 것인가. 보통은 어떤 감정이 들면 그냥 매몰되어버린다. 그러니 감정이 더 심화되고 심화된다. 그 틀에서 얼른 빠져나와야 한다. 그리고 한 걸음 더 들어가볼 수 있다. 그 감정을 계속 유지하려는 이면에 어떤 의도가 있는가. 비교심이라고 느껴지면, 왜 비교를 하는가를 또 물어야 한다. 그 깊", "source": "essay"}, {"id": "essay_12_c6b275dd52", "text": "빠져나와야 한다. 그리고 한 걸음 더 들어가볼 수 있다. 그 감정을 계속 유지하려는 이면에 어떤 의도가 있는가. 비교심이라고 느껴지면, 왜 비교를 하는가를 또 물어야 한다. 그 깊은 뿌리에는 \\*\\*'내가 남보다 위에 있어야 한다'\\*\\*는 마음이 있다. 누구에게나 있는 원초적인 마음이다. 그것이 나쁜 것이 아니다. 문제는 그 마음을 **동력** 으로 삼느냐, 아니면 회피 수단으로 삼느냐다. 잘하고 싶은 마음이 크면 클수록, 실수하면 못나질 것 같아서 시도조차 하기 싫어진다. 같은 마음이 동력이 되기도 하고 발목을 잡기도 한다.\n\n---\n\n#### **행복은 대출을 내고, 불안은 적금을 든다**\n\n우리는 대개 반대로 살고 있다. 불안은 대출을 낸다. 미리 당겨서 느낀다. 행복은 적금을 든다. '일정 조건이 되면 행복해야지', '이 정도 액수가 차면 찾아야지' 하고 모아둔다. **행복이 일정 양만큼 차야지만 행복해진다** 고 생각하는 것이다. 그러나 **지금 행복하면 된다** . 행복은 신용카드다. 한도가 얼마일지는 아무도 모른다. 그냥 긁으면 된다. 사정없이 긁어 써야 한다. 불안은 반대다. 나올 때마다 '이거는 100년 만기일지 200년 만기일지 아무도 몰라' 하고 거기다 적금을 든다. 묻어두는 거다. 행복을 대출 내어 쓰고, 불안을 적금으로 묻어두는 삶. 그것이 뒤집힌 방향이다.\n\n---\n\n\\#마음밭 \\#발효 \\#감정선택 \\#행복", "source": "essay"}, {"id": "essay_13_1727ae6aba", "text": "라' 하고 거기다 적금을 든다. 묻어두는 거다. 행복을 대출 내어 쓰고, 불안을 적금으로 묻어두는 삶. 그것이 뒤집힌 방향이다.\n\n---\n\n\\#마음밭 \\#발효 \\#감정선택 \\#행복대출 \\#지금행복\n\n**\\--- (구분선)**\n\n\\[파일명: 감정은\\_렌즈다\\_신념과상황을\\_바라보는방식\\_수필.md\\]\n\n### **감정은\\_렌즈다\\_신념과상황을\\_바라보는방식\\_수필**\n\n#### **신념에 가중치가 붙는 순간**\n\n우리는 여러 신념을 갖고 산다. 그런데 그 신념들이 다 같은 무게로 있지 않다. 어떤 것은 '이건 내게 중요해', 어떤 것은 '이건 덜 중요해'로 나뉜다. 그 가중치를 결정하는 것이 **감정** 이다. 내가 어떤 것을 정말 좋아하고, 감정적으로 공감대가 크면, 그것이 **볼록렌즈로 작용** 한다. 다른 신념들보다 그것이 크게 보인다. 글씨가 볼록렌즈를 통해 커 보이듯이. 그러면 나는 거기에 더 큰 가치를 준다. 한번 내 신념 체계로 들어온 것은 그렇게 받아들여진다. 긍정적인 신념이건 부정적인 신념이건 마찬가지다. 감정을 통해 강화된 신념은 **강화된 신념으로 자리를 잡는다** . 그리고 강화될수록 자연적으로 커진다.\n\n---\n\n#### **감정은 렌즈다**\n\n배가 고프면 짜증이 난다. 짜증이 나면 모든 것을 **짜증 나는 렌즈로 본다** . 별게 아닌 일도 더 크게 화가 난다. 반대로 기분이 좋으면 같은 일도 '아유, 별거 아", "source": "essay"}, {"id": "essay_14_0e73162940", "text": "다**\n\n배가 고프면 짜증이 난다. 짜증이 나면 모든 것을 **짜증 나는 렌즈로 본다** . 별게 아닌 일도 더 크게 화가 난다. 반대로 기분이 좋으면 같은 일도 '아유, 별거 아니네' 하고 넘어간다. 이것이 핵심이다. **감정은 렌즈다. 어떤 신념이나 상황을 바라보는 렌즈다.** 렌즈는 경우에 따라 볼록렌즈일 수도 있고 오목렌즈일 수도 있다. 화가 난 상태의 렌즈는 볼록렌즈가 되어 자극을 크게 키운다. 행복한 상태의 렌즈는 오목렌즈가 되어 같은 자극을 작게 만든다. 세상이 달라진 것이 아니다. 렌즈가 달라진 것이다.\n\n---\n\n#### **입력과 출력을 모두 거른다**\n\n감정의 렌즈는 안팎으로 작동한다. 외부에서 새로운 신념이 들어올 때, 그것을 받아들일지 거를지를 지금의 감정 상태가 결정한다. 어떤 결정을 내릴 때도 마찬가지다. 같은 상황, 같은 정보라도 지금 내가 어떤 감정 상태에 있느냐에 따라 전혀 다른 결정이 나온다. **입력과 출력에서 감정이라는 렌즈가 상당히 많은 영향력을 미친다.** 들어오는 것도, 나가는 것도 이 렌즈를 통과한다. **감정의 렌즈를 통해서 나가고 들어온다.** 그러니 어떤 판단을 내릴 때, 지금 내가 어떤 렌즈를 끼고 있는지를 먼저 보는 것이 필요하다.\n\n---\n\n**마음의 렌즈, 신념을 키우고 세상을 왜곡하다**\n\n우리는 세상을 있는 그대로 본다고 믿지만, 사실은 각자의 '감정 렌즈'를 통해 굴절된", "source": "essay"}, {"id": "essay_15_138a0973c9", "text": "먼저 보는 것이 필요하다.\n\n---\n\n**마음의 렌즈, 신념을 키우고 세상을 왜곡하다**\n\n우리는 세상을 있는 그대로 본다고 믿지만, 사실은 각자의 '감정 렌즈'를 통해 굴절된 풍경을 보고 있을 뿐입니다. 어떤 신념에 유독 마음이 가고 가중치를 두게 된다면, 그것은 이미 그곳에 감정이 개입되었다는 증거입니다. 내가 무언가를 강렬하게 좋아하거나 싫어할 때, 그 감정은 '볼록렌즈'가 되어 특정한 신념만을 비정상적으로 크게 부풀려 보여줍니다.\n\n이 렌즈는 무서운 힘을 가집니다. 내가 감정적으로 공감하거나 집착하는 신념은 렌즈를 통해 점점 더 강화되고, 결국 그것이 내 세계의 전부인 것처럼 자리를 잡습니다. 긍정적이든 부정적이든, 한 번 강화된 신념은 스스로 몸집을 키우며 세상을 바라보는 고정된 틀이 됩니다.\n\n하지만 기억해야 할 것은, 렌즈 그 자체가 내가 아니라는 사실입니다. 렌즈가 볼록하든 오목하든, 혹은 어떤 색깔을 띠고 있든, 그것은 '나'라는 바탕 위에서 잠시 세상을 굴절시키고 있는 도구일 뿐입니다. '올셀프'의 관점에서 보면, 우리는 렌즈 너머에서 이 모든 작용을 지켜보는 전체이자 앎입니다. 내가 낀 렌즈의 왜곡을 알아차리는 순간, 우리는 신념의 감옥에서 벗어나 다시 '온통 나(온나)'로 존재하는 맑은 시력을 회복하게 됩니다.\n\n\\#감정렌즈 \\#신념 \\#볼록오목렌즈 \\#입력과출력 \\#감정과판단\n\n**\\--- (구분선)**\n\n\\", "source": "essay"}, {"id": "essay_16_3797a36b7f", "text": "에서 벗어나 다시 '온통 나(온나)'로 존재하는 맑은 시력을 회복하게 됩니다.\n\n\\#감정렌즈 \\#신념 \\#볼록오목렌즈 \\#입력과출력 \\#감정과판단\n\n**\\--- (구분선)**\n\n\\[파일명: 감정의\\_동적\\_표현과\\_안전지대\\_수필.md\\]\n\n### **감정의\\_동적\\_표현과\\_안전지대\\_수필**\n\n#### **감정에 이름을 붙이는 순간**\n\n우리는 뭔가 올라오면 이름을 붙인다. 외로움, 슬픔, 우울함. 이름을 붙이면 일단 안심이 된다. '아, 이게 이거구나.' 그런데 바로 그 순간, 문제가 시작된다. 감정은 본래 말랑말랑하다. 복합적이고, 끊임없이 움직이고, 고정돼 있지 않다. 그런데 거기에 명사를 갖다 붙이는 순간, **고정된 형태** 로 나에게 작용하기 시작한다. 선입관으로. 그러면 이제 비슷한 느낌이 올라올 때마다 나는 그냥 '우울한 사람'이 되어버린다. 규정지어진다. 유명론(唯名論)에서 말하듯, 그 이름은 그냥 이름일 뿐이다. 실체가 있는 것처럼 우리가 생각할 뿐, 그건 이름인 것뿐이다. 그런데 그 이름에 갇혀버리면 우리는 유연성을 잃는다. **감정에 매몰** 돼버리는 거다.\n\n---\n\n#### **동적으로 서술한다는 것**\n\n감정은 동사로 말해야 한다. 명사로 고착시키는 게 아니라 움직이는 그대로, 상태로써 표현해보는 것이다. 그렇게 해보면 감정을 좀 더 세심하게 들여다보게 된다. 그 감정을 이해하게 된다. 아내가 말했다.", "source": "essay"}, {"id": "essay_17_7df48522f3", "text": "다. 명사로 고착시키는 게 아니라 움직이는 그대로, 상태로써 표현해보는 것이다. 그렇게 해보면 감정을 좀 더 세심하게 들여다보게 된다. 그 감정을 이해하게 된다. 아내가 말했다. 시적 표현이 잘 어울리겠다고. 맞다. **시적으로 표현해보는 것** 이 하나의 방법이다. 느낌을 어떤 상태로 동적으로 서술해보는 것. 그러면 이제 그 안에서 중요한 분리가 일어난다. **감정의 에너지와 스토리를 나눠서 볼 수 있게 된다.** 예를 들어, 어떤 느낌이 올라왔을 때 그것을 이렇게 동적으로 서술해보면, 그 느낌이 일어났던 상황이나 상태가 있을 것이다. 그것과 내 안에서 올라온 에너지나 느낌을 분리해서 바라볼 수 있다는 얘기다. '아, 이거는 그냥 잘못된 게 아니다.' 그걸 알게 된다.\n\n---\n\n#### **감정이 올라오는 이유**\n\n왜 감정이 올라오는가. 사실 이건 뇌가 기억의 우선순위를 처리하는 방식이다. '이건 정말 잊을 수 없어' 싶은 것에는 강한 감정이 붙는다. 안 잊어버리게 하려고. 가볍게 지나가는 것들에는 굳이 감정을 붙일 필요가 없다. 그러니까 뇌가 효율적으로 기억을 처리하기 위해 거기에 감정의 농도를 붙이는 것이다. 단순히 기억하기 위한 것이다. 그런데 **이게 나를 압도해버리면 안 된다.** 감정과 스토리가 쌍으로 붙어 있으면, 마치 그게 실체가 있는 것처럼 보인다. 그래서 처리하기가 쉽지 않다. 예전에 벌어졌던 상황은 이제 바꿀", "source": "essay"}, {"id": "essay_18_7b0205386e", "text": "*이게 나를 압도해버리면 안 된다.** 감정과 스토리가 쌍으로 붙어 있으면, 마치 그게 실체가 있는 것처럼 보인다. 그래서 처리하기가 쉽지 않다. 예전에 벌어졌던 상황은 이제 바꿀 수 없다. 그때의 감정도 내가 어떻게 할 수 없다. 비슷한 상황이 오면 그 감정이 그대로 올라온다. 어떻게 할 수가 없다. 그러니까 분리해서 보는 것이다. 에너지는 에너지대로, 스토리는 스토리대로. '이건 그냥 에너지뿐인 것이다. 잘못된 게 아니다.' '이 스토리는 그런 일이 그냥 있었다는 걸 내가 느끼는 거다.'\n\n---\n\n#### **수용과 허용의 공간, 안전지대**\n\n그렇게 될 때 비로소 공간이 생긴다. 내가 그것을 수용하고 허용하는 공간. 그게 **안전지대** 다. 감정의 꼬리표에, 우리가 이름 붙이고 규정지은 것에 압도당하지 않을 수 있는 자리. 거기가 안전지대다. 시적으로 표현해보는 것이 그 문을 여는 방법 중 하나다. 표현해보면 객관적으로 보게 된다. 감정과 스토리와 에너지를 나눠서 볼 수 있게 된다. 이름으로 고착되지 않은, **막히지 않은 품** 이 거기 있다.\n\n\\#감정 \\#언어와고착 \\#에너지와스토리 \\#안전지대 \\#시적표현\n\n**\\--- (구분선)**\n\n\\[파일명: 감정의흐름과코칭\\_단차와비움\\_수필.md\\]\n\n### **감정의흐름과코칭\\_단차와비움\\_수필**\n\n---\n\n#### **감정은 지금 여기를 말한다**\n\n코칭에서 감정이 중요", "source": "essay"}, {"id": "essay_19_792f47dfe0", "text": "일명: 감정의흐름과코칭\\_단차와비움\\_수필.md\\]\n\n### **감정의흐름과코칭\\_단차와비움\\_수필**\n\n---\n\n#### **감정은 지금 여기를 말한다**\n\n코칭에서 감정이 중요한 이유가 있다. 감정은 **지금 여기** 를 말하기 때문이다. 생각은 다르다. 생각은 주로 기억에 기대어 일어난다. 과거의 경험, 과거의 해석, 과거의 자기. 그러니까 누군가에게 \"어떻게 생각해?\" 혹은 \"거기에 어떤 의미가 있어?\"라고 물으면, 그 대답은 지금 여기를 반영하지 않을 가능성이 많다. 다분히 조작적일 수 있다. 코치와의 관계, 기억의 왜곡, 그 사람이 바라는 자기 이미지까지 뒤섞인다. 반면 감정은 솔직하다. \"지금 어떤 감정이 드느냐\"는 물음은 그 사람을 가장 잘 드러낸다. 생각은 말해주지 않는 것을, 감정은 말해준다. 그것이 코칭에서 감정을 먼저 보는 이유다.\n\n---\n\n#### **흐르려면 단차가 있어야 한다**\n\n감정의 속성은 **흐르는 것** 이다. 흐름을 생각해본다. 물이 흐르고, 바람이 흐른다. 흐르려면 무엇이 있어야 하는가. 높고 낮음이 있어야 한다. **단차(段差)가 있어야 한다.** 높은 곳에서 낮은 곳으로만 흐를 수 있다. 그렇다면 코칭에서 감정이 흐르려면, 코치가 낮아져야 한다. 코치가 진공 상태가 되어야 한다. 코치가 카리스마로 꽉 차 있으면, 고객의 감정은 흐를 수 없다. 위축되거나 차단된다. 감정은 눌리고 해소되지 않", "source": "essay"}, {"id": "essay_20_f819aeed7d", "text": "흐르려면, 코치가 낮아져야 한다. 코치가 진공 상태가 되어야 한다. 코치가 카리스마로 꽉 차 있으면, 고객의 감정은 흐를 수 없다. 위축되거나 차단된다. 감정은 눌리고 해소되지 않은 채 그 자리에 고인다. 유재석이나 김국진을 떠올린다. 이들의 리더십이 왜 강력한가. 강호동처럼 카리스마로 공간을 압도하는 게 아니라, **스스로를 비워버리기** 때문이다. 낮아지고, 받침이 되어준다. 그러면 옆 사람이든 방청석이든 시청자든, 안에 있던 것이 자연스럽게 흘러 나온다. 그게 코칭이 코칭이 되는 순간이다.\n\n---\n\n#### **질문 이전에 흐름이 먼저다**\n\n지금 한국의 코칭 현장은 너무 질문에만 집중되어 있다. 물론 질문은 중요하다. 그러나 고객의 진술은 고객 자신도 온전히 알지 못하는 것이다. 내가 생각하는 나, 내가 해석하는 그 일이라는 건 다분히 **자의적인 해석** 이다. 감정의 주고받음을 통해 고객이 **객관적으로 자기를 볼 수 있게** 해주는 것. 그것이 코치의 역할이다. 질문이 아니라 흐름이 먼저다. 이것은 리더십의 문제이기도 하다. 지금은 정보가 넘쳐난다. 시청자도, 구성원도, 고객도 다 잘났다. 이 시대의 리더는 카리스마로 이끄는 사람이 아니라, **스스로가 자기 길을 찾게끔 도와주는** 사람이다. 낮아짐으로써 공간을 열어주는 사람. 비움으로써 흐름을 만드는 사람. 높음으로 이끄는 것이 아니라, 낮아짐으로 흐르게 하는 것.", "source": "essay"}, {"id": "essay_21_f8dac6ab81", "text": "*스스로가 자기 길을 찾게끔 도와주는** 사람이다. 낮아짐으로써 공간을 열어주는 사람. 비움으로써 흐름을 만드는 사람. 높음으로 이끄는 것이 아니라, 낮아짐으로 흐르게 하는 것. 그것이 지금 세상이 요청하는 리더십이다. \\#감정 \\#코칭 \\#단차 \\#비움 \\#리더십\n\n**\\--- (구분선)**\n\n\\[파일명: 개념의감옥\\_철학의본질\\_수필.md\\]\n\n### **개념의감옥\\_철학의본질\\_수필**\n\n#### **신들이 정신을 못 차리고 있다**\n\n신을 못 찾고 있다. 신들이, 신을 못 찾고 있다. 정신만 차리면 되는 건데. 정신 차린 그게 신인데. 그런데 다들 정신을 못 차리고 온갖 이론과 개념을 **덕지덕지** 붙여 가지고는 \"신이 어딨지? 신은 이런 것일까, 저런 것일까? 이 신이 맞는 거야, 저 신이 맞는 거야?\" 하면서 갖다 들이댄다. 그러니까 **신이라고 믿는 글자들의 감옥** , 글자의 미로 속에 빠져서, 이 신들도 정신을 못 차리고 어질어질하고 지금 실신하기 일보 직전인 거다. 잡신이 달래 잡신이 아니다. **잡생각에 끌려가서** \"너는 내 언어를 이해해야 돼, 내 개념을 이해해야 돼\" 하면서 서로 개념과 개념이 충돌을 일으키니까 잡신이 되는 거다. 드글드글 오만 잡신들이 생겨나는 이유가 거기에 있다.\n\n---\n\n#### **철학은 밝아지는 것이다**\n\n철학(哲學)이라는 글자를 보면, 배울 학(學)에 밝을 철(哲)이다. 그러면", "source": "essay"}, {"id": "essay_22_dd44e1d7d0", "text": "드글드글 오만 잡신들이 생겨나는 이유가 거기에 있다.\n\n---\n\n#### **철학은 밝아지는 것이다**\n\n철학(哲學)이라는 글자를 보면, 배울 학(學)에 밝을 철(哲)이다. 그러면 철학을 하면 밝아져야 한다. 밝아진다는 건 얼굴이 환하게 밝아진다는 거다. **철학이란 밝게 아는 것** 이다. 잘 몰랐던 것을 밝게 알게 되면 \"그렇구나\" 하고 웃음이 나온다. 그러니까 **웃지 않으면 사실은 철학이 아니다. 웃어야 철학이지.** 회피하려고 철학을 하지, 심각하려고 철학하는 건 아니잖아. 근데 짐짓 철학을 한다면서 오만상을 다 찌푸리면서 한다? 그건 안 된다. 코치들한테 농담을 하면 안 웃는다. 그러면서 자기들은 철학을 하고 있다고 한다. 이건 넌센스다.\n\n---\n\n#### **아이들이 철학을 잘한다**\n\n진짜 철학을 잘하는 건 아이들이다. 조그마한 것만 봐도 하하 깔깔 웃는다. 어른들이 보기엔 하나도 안 웃긴 것 가지고 웃는다. 그게 철학이다. **아이들은 그냥 투명하게 다 아는 것이다.** 있는 그대로. 별로 웃기지도 않는 걸 보고 팍 깔깔거리는 그 얼굴이, 해맑고 밝다. 그러면 이미 철학을 따로 찾을 필요가 없다. 얼굴에 철학이 있기 때문에. 그런데 교육을 받으면서 머릿속에 개념과 관념들을 잔뜩 밀어 넣는다. **알음알이를 잔뜩 집어넣으면서** 신이 거할 장소를 자꾸 좁히고 밀어내는 거다. 개념으로 꽉 차 있으니까 신이 들어올 틈이", "source": "essay"}, {"id": "essay_23_e04aebc3c9", "text": "받으면서 머릿속에 개념과 관념들을 잔뜩 밀어 넣는다. **알음알이를 잔뜩 집어넣으면서** 신이 거할 장소를 자꾸 좁히고 밀어내는 거다. 개념으로 꽉 차 있으니까 신이 들어올 틈이 없다. 그러면서 딴 데서 신을 찾고, 괴롭다고 한다.\n\n---\n\n#### **삶의 절반을 빠뜨린 철학**\n\n철학자들이 결혼을 안 한다. 태반이다, 거의. 그게 뭔가 좀 웃긴 거다. **정신만의 철학, 관념의 철학, 개념의 철학** 인 거지. 남녀가 서로 사랑을 하고 삶을 사는 그 현실을 빠뜨리고 철학을 하면, 반쪽 철학밖에 이해가 안 된다. 삶을 이해하고, 인간을 이해하고, 세상을 이해하고자 철학을 하는 건데. 맨날 글자 유희, **언어의 유희에 빠져 가지고** 철학을 한다고 하면 안 된다.\n\n---\n\n철학은 밝아지는 것이다. 밝아지면 웃게 된다. 개념의 미로에서 빠져나와 정신을 차리는 것, 그게 신을 찾는 일이고, 철학의 본질이다. \\#철학의본질 \\#개념의감옥 \\#정신차림 \\#웃음과철학 \\#아이의지혜\n\n**\\--- (구분선)**\n\n\\[파일명: 개입과기다림\\_꽃씨비유\\_수필.md\\]\n\n### **개입과기다림\\_꽃씨비유\\_수필**\n\n#### **생각대로 안 되는 이유**\n\n왜 우리 생각대로 되지 않는가. 아이를 생각해본다. 그 아이가 여기까지 자라오는 동안 우리가 알지 못하는 수많은 연기적 조건들이 쌓여왔다. 그리고 그 아이 곁에 새로운 인연이 들어왔다. 그", "source": "essay"}, {"id": "essay_24_7d45c1a3d2", "text": "각대로 되지 않는가. 아이를 생각해본다. 그 아이가 여기까지 자라오는 동안 우리가 알지 못하는 수많은 연기적 조건들이 쌓여왔다. 그리고 그 아이 곁에 새로운 인연이 들어왔다. 그 친구도 마찬가지다. 살아오면서 우리가 전혀 모르는 조건들이 엄청나게 많이 쌓여 있다. 그 둘 사이에 일어나는 것을 내가 생각으로 바꿀 수 있을까. 내가 뭔가 됐으면 좋겠다고 바라는 것, 그 바람 자체도 내가 형성되어 온 조건이다. 내 바람일 뿐이다. 물론 개입을 하면 영향을 미칠 수는 있다. 그러나 내가 원하는 쪽으로 꼭 바꾸기는 쉽지 않다. 지금 당장은 바뀐 것처럼 느껴질지언정, 어거지로 물길을 튼 것이기 때문에 나중에는 더 안 좋은 쪽으로 작용하기 쉽다. 걔네 둘 사이에 무엇이 좋은지, 어떻게 알 수 있겠는가. 수많은 원인과 결과로 이루어진 상황인데, 내가 보기에 좋은 것이 걔네들에게도 좋으리라는 법은 없다.\n\n---\n\n#### **이미 온전히 흘러가고 있다**\n\n**그냥 알려지고 그냥 받아들여지고 있다.** 지금 이 순간에도 삶은 그렇게 흘러가고 있다. 어제의 그 아이가 오늘도 그 아이인 것, 그것이 온전히 받아들여지고 있다는 증거다. 그런데 우리가 막 개입을 해서 이렇게 됐으면 좋겠다고 머릿속에 상상을 하면서 괴로워하면, 그건 나만 힘든 것이다. 실질적으로 개입을 해버리면 나도 그 업에 같이 휩쓸려 같이 어려워진다. 이미 온전하게 그 상황이 흘러가고", "source": "essay"}, {"id": "essay_25_d8395beefc", "text": "면 좋겠다고 머릿속에 상상을 하면서 괴로워하면, 그건 나만 힘든 것이다. 실질적으로 개입을 해버리면 나도 그 업에 같이 휩쓸려 같이 어려워진다. 이미 온전하게 그 상황이 흘러가고 있는데, 나의 의지나 생각으로 거기 개입을 하면 오히려 더 꼬일 수 있다.\n\n---\n\n#### **꽃씨의 여정**\n\n땅에 꽃씨가 하나 떨어졌다. 왜 빨리 안 나오냐고 다그칠 수 있는가. 어느 정도 자랐다. 남들은 다 꽃이 폈는데 너는 왜 안 폈냐고 할 수 있는가. 그것은 그 씨앗의 여정이 가고 있는 것이다. 걱정이 앞서 개입을 해서 가지치기를 하고 비료를 잔뜩 준다. 그런데 알고 봤더니, 그 씨앗은 봄에 꽃이 피는 것이 아니라 가을에 피는 꽃이었다. 꽃이 잠깐 피었다 떨어졌다. 딴 것들은 한 달, 두 달씩 피었는데 왜 이렇게 금방 피냐고 한다. 그런데 알고 봤더니, 그 **삶의 여정 전체가 다 꽃** 이었다. 씨앗일 때도 꽃이고, 죽일 때도 꽃이고, 꽃이 폈을 때도 꽃이고 — 온전히 꽃으로 품어져 있었던 것이다. 받아들여져 있는 것이다. 삶에서 그것이 진리라면, 법이라면, 그 상태 그대로 온전히 받아들여져 있기 때문에 꽃으로 필 수 있는 것이다.\n\n---\n\n#### **부모가 할 일**\n\n**기다려주는 것이다.** 이미 온전히 흘러가고 있는 것에 개입하려는 충동은 사실 그 흐름을 믿지 못하는 것이다. 내 기준으로 빠르고 느린 것을 재고, 내 기준으로 꽃이 예", "source": "essay"}, {"id": "essay_26_2424c0bc81", "text": "**\n\n**기다려주는 것이다.** 이미 온전히 흘러가고 있는 것에 개입하려는 충동은 사실 그 흐름을 믿지 못하는 것이다. 내 기준으로 빠르고 느린 것을 재고, 내 기준으로 꽃이 예쁘고 아닌 것을 판단하는 것이다. 그러나 그 아이의 여정은 이미 온전히 받아들여지고 있다. 씨앗일 때도, 자라는 중일 때도, 꽃이 필 때도. 그것을 아는 것이 먼저다. 그다음은 기다림이다. \\#연기적조건 \\#개입 \\#기다림 \\#온전히받아들임 \\#올셀프\n\n**\\--- (구분선)**\n\n\\[파일명: 거절에\\_대한\\_두려움\\_극복\\_나가아닌\\_내용물의거부\\_수필.md\\]\n\n### **거절에\\_대한\\_두려움\\_극복\\_나가아닌\\_내용물의거부\\_수필**\n\n#### **부탁을 못 하는 이유**\n\n누군가에게 부탁을 할 때 거절당하는 것에 대한 두려움이 크다. 상대방이 내 부탁을 안 들어주면, 그 사람이 나를 거부한 것으로 느껴진다. 그 두려움이 커서 애초에 요청 자체를 못 하는 경우가 많다. 그런데 그 두려움을 조금 다르게 볼 수 있다. 내가 부탁하는 것은 **내용물** 이다. 내 생각, 내 요청, 내 아이디어. 그 내용물은 상대방이 안 받을 수도 있다. 내가 상대방의 부탁을 내 상황에 따라 못 받아줄 수 있듯이, 상대방도 마찬가지다. 그건 내용물이기 때문이다.\n\n---\n\n#### **나를 거부한 게 아니다**\n\n**나를 거부한 게 아니고, 내용물을 거부한 것이다.** 상대", "source": "essay"}, {"id": "essay_27_daf61399cc", "text": "아줄 수 있듯이, 상대방도 마찬가지다. 그건 내용물이기 때문이다.\n\n---\n\n#### **나를 거부한 게 아니다**\n\n**나를 거부한 게 아니고, 내용물을 거부한 것이다.** 상대방이 거부하는 것은 나의 생각, 나의 내용물이다. 나 자신이 아니다. 그러니 상대방이 거부했다고 해서 그 사람 자체를 내가 거부할 필요가 없다. 상황에 따라 지금은 안 받아줬어도 언제든 달라질 수 있다. 거부했다고 관계가 깨지는 것이 아니다. 내 내용물을 거부한 것이기 때문에, 안 들어줘도 괜찮다. 그것은 내 생각이고, 생각의 내용물이니까. 그리고 상대방이 내 생각을 못 들어준 그 상황조차도, 이것은 **올셀프의 온전한 표현** 이다. 그 사람도 온전한 자기로 반응하고 있는 것이다. 다 내용물만 거부한 것이지, 사람 자체를 거부한 것이 아니다.\n\n---\n\n#### **내용물이 나의 전부는 아니다**\n\n이것을 받아들이면 거절에 대한 두려움이 달라진다. 요청을 편하게 할 수 있다. 거부는 얼마든지 있을 수 있다는 전제를 깔고 부탁을 건넬 수 있다. 내용물이 나는 아니다. 나의 전부도 아니다. 그러면 관계가 **가벼워진다** . 서로 자기 의사를 표현하고 상대의 의사를 들을 때, 거부가 있어도 관계가 흔들리지 않는다. 내용물이 오가는 것이지, 사람이 오가는 것이 아니기 때문이다.\n\n---\n\n**거절은 '나'를 향한 화살이 아니다: 내용물과 존재의 분리**\n\n우리가", "source": "essay"}, {"id": "essay_28_5d5614538e", "text": "있어도 관계가 흔들리지 않는다. 내용물이 오가는 것이지, 사람이 오가는 것이 아니기 때문이다.\n\n---\n\n**거절은 '나'를 향한 화살이 아니다: 내용물과 존재의 분리**\n\n우리가 타인에게 무언가를 부탁할 때 주저하는 가장 큰 이유는 거절을 '나라는 존재에 대한 거부'로 받아들이기 때문입니다. 하지만 냉정하게 들여다봐야 합니다. 상대가 거절한 것은 나의 '존재'가 아니라, 내가 내민 '내용물'일 뿐입니다.\n\n내가 상대의 요청을 거절할 때를 떠올려 보십시오. 상대가 싫어서가 아니라, 단지 내 상황이 여의치 않거나 그 제안이 내 생각과 맞지 않아서 거절하는 경우가 대부분입니다. 이처럼 부탁은 단순한 '내용물'의 전달입니다. 내용물은 상대의 상황에 따라 받아들여질 수도, 반려될 수도 있는 소모품과 같습니다.\n\n거절당했을 때의 반응 또한 '나의 올셀프'를 증명하는 순간입니다. 상대의 거절을 \"내 내용물이 지금은 저 사람과 맞지 않았구나\"라고 담백하게 받아들일 수 있다면, 관계는 결코 깨지지 않습니다. 나를 거부한 것이 아니기에 비굴해질 필요도, 상대를 원망할 필요도 없습니다.\n\n'올셀프'의 관점에서 보면, 요청하는 나도, 거절하는 상대도 모두 하나의 흐름 속에 있습니다. 내 생각(내용물)에 '나'라는 딱지를 붙여 고착시키지 마십시오. 내용물은 흐르게 두고, 흔들림 없는 '전체로서의 나'를 신뢰할 때 우리는 비로소 거절의 두려움에서 벗어나 당", "source": "essay"}, {"id": "essay_29_da997d5760", "text": "니다. 내 생각(내용물)에 '나'라는 딱지를 붙여 고착시키지 마십시오. 내용물은 흐르게 두고, 흔들림 없는 '전체로서의 나'를 신뢰할 때 우리는 비로소 거절의 두려움에서 벗어나 당당하게 세상과 소통할 수 있습니다.\n\n\\#거절두려움 \\#내용물과나 \\#올셀프 \\#가벼운관계 \\#요청과거부\n\n**\\--- (구분선)**\n\n\\[파일명: 걱정을\\_해소하고\\_풍요로움으로\\_나아가기\\_관점의전환\\_수필.md\\]\n\n### **걱정을\\_해소하고\\_풍요로움으로\\_나아가기\\_관점의전환\\_수필**\n\n#### **이것 외에는 별 걱정이 없다**\n\n걱정이 머릿속에 딱 떠오를 때, 이렇게 뒤집어볼 수 있다. '이것 외에는 별 걱정이 없네.' 어떤 것이 걱정이 된다는 것은, 그것 이외의 나머지는 다 별 무리가 없다는 뜻이기도 하다. 만약 더 큰일이 벌어져서 전쟁이 일어났다면, 차가 덜덜거리는 것이 무슨 문제가 되겠는가. 그것에 비하면 지금의 걱정은 별거 아니다. 사실 별거 아닌 것이다. 걱정 이외의 것은 지금 다 가지고 있다. 그것 하나만 내가 결핍이라고 생각하는 것이지, 이외에는 다 있다. 이 공간도 가지고 있고, 내 몸도 가지고 있고, 몸의 느낌도 가지고 있다. **초점을 결핍에서 풍요로 바꿔야 한다.** 자꾸.\n\n---\n\n#### **결핍으로 나를 몰지 않는다**\n\n차가 고장 났다. 수리비를 내야 한다. 그럴 때 조금이라도 싸게 해보려고 발버둥 치고 이리저리", "source": "essay"}, {"id": "essay_30_8bf39e2bba", "text": "로 바꿔야 한다.** 자꾸.\n\n---\n\n#### **결핍으로 나를 몰지 않는다**\n\n차가 고장 났다. 수리비를 내야 한다. 그럴 때 조금이라도 싸게 해보려고 발버둥 치고 이리저리 재고 따지면, 내 스스로 계속 결핍의 상황으로 나를 몰고 가는 것이다. 거기다 에너지를 다 쓰고, 시간을 뺏기고, 온통 그 생각에 잡혀버린다. 그런데 생각해보면, 카센터에서 일하는 사람도 나다. 다 나다. 온통 나, 온통 나잖아. 그러면 **내가 나한테 주는 것** 이다. 내가 나한테 주는 거라면 기분 좋게 줘야 한다. 빨리 줘버리고, 내가 펼칠 쪽으로 에너지를 몰아야 한다. 맨날 틀어막는 삶. '어떻게 하면 조금이라도 덜 들어가게 할까'에 초점을 맞추고 살면, 삶도 거기에 계속 맞춰진다. 이제 그렇게 되어서는 안 된다. \\*\\*'내가 무엇을 줄 수 있나', '내가 뭘 펼칠 수 있나'\\*\\*를 자꾸 연구해야 한다.\n\n---\n\n#### **어려운 문제를 주는 이유**\n\n흔들리면 안 된다고 생각하면, 이미 흔들리고 있다는 것이다. 우주가 사람 하나를 이 지구상에 내려오게 해서 먹여 살리려고 얼마나 많은 에너지를 쏟아붓는가. 그 에너지가 들어가 있는 사람을 괴롭히려고 불필요한 일을 하겠는가. 그게 아니다. 결국에는 영적으로 성장하게 하려고 발현시키는 것이다. **결국엔 잘 될 수밖에 없다.** 쉬운 문제만 내면 실력이 늘지 않는다. 덧셈만 가르치면 뺄셈 곱셈 나눗", "source": "essay"}, {"id": "essay_31_b7c2818129", "text": "가. 그게 아니다. 결국에는 영적으로 성장하게 하려고 발현시키는 것이다. **결국엔 잘 될 수밖에 없다.** 쉬운 문제만 내면 실력이 늘지 않는다. 덧셈만 가르치면 뺄셈 곱셈 나눗셈을 어떻게 알겠는가. 어려운 문제를 주는 것이다. 그걸 해결하면 그만큼 더 파워풀해지고, 또 한 단계 높은 문제를 주면 또 한 단계 올라간다. 우리는 자꾸 문제를 안 풀려고 한다. 요리조리 피해가려 하고, 점도 보고 타로도 보고 복권이 맞기를 바란다. 그러나 우주에서 우연히 일어나는 일은 없다. 다 이유가 있다.\n\n---\n\n#### **에고는 덕지덕지 붙은 것들이다**\n\n불안의 원천은 에고다. 에고라는 것이 따로 어딘가에 있는 것이 아니다. 생각과 느낌과 감정들이 탁탁 달라붙고, 그것들이 뭉쳐진 것이 에고다. **덕지덕지 붙은 것들** 이다. 그 에고가 어떻게든 힘든 일을 안 당하려 하고, 안 겪으려 하고, 요리조리 피해가려 한다. 그런데 지나놓고 보면 다 별거 아니다. 내가 자꾸 육신이나 생각과 동일시를 하는 것이 문제다. 그것들과 나를 같다고 여기는 한, 에고의 불안에서 빠져나오기 어렵다.\n\n---\n\n#### **이 열차가 어디까지 가나 한번 보자**\n\n관점의 전환이 굉장히 중요하다. '이 열차가 어디까지 가나 한번 보자.' 그 마음으로 가면 된다. 과정은 할 수 있는 한도의 최소한의 노력을 하면 된다. 결과는 잘 될 수밖에 없다. 어떤 형태로든. 온라", "source": "essay"}, {"id": "essay_32_ae2e885d7e", "text": "요하다. '이 열차가 어디까지 가나 한번 보자.' 그 마음으로 가면 된다. 과정은 할 수 있는 한도의 최소한의 노력을 하면 된다. 결과는 잘 될 수밖에 없다. 어떤 형태로든. 온라인이 열리고, 전자책 홍보 수단이 생기고, 줌이 활성화되고, 머리를 잘 쓰면 예전보다 훨씬 적은 힘으로도 펼칠 수 있는 세상이 됐다. 기존의 마인드가 아니라 **소프트 쪽으로, 온라인 쪽으로 바꿔야 한다.** 그렇게 생각하니 조금 여유가 생긴다. 한번 해볼 만하다.\n\n\\#관점전환 \\#결핍에서풍요 \\#에고 \\#온나 \\#결국잘된다\n\n**\\--- (구분선)**\n\n\\[파일명: 걷기의\\_능동성과\\_상호작용\\_우울함극복\\_수필.md\\]\n\n### **걷기의\\_능동성과\\_상호작용\\_우울함극복\\_수필**\n\n#### **걷는다는 것은 이미 지향하고 있다는 것이다**\n\n걷는다는 행위는 능동적이다. 내가 걷고자 하는 의지가 있으니까 걷는 것이다. 걷는 동안 의식이 매 순간 '걸어라'고 명령을 내리지는 않는다. 그러나 계속 걸음을 옮기고 있다는 것은, 의식이 계속 그것을 지향하고 있다는 뜻이다. **이미 행위 자체에 지향성이 생긴 것이다.** 만약 걷는 동안 의식에 지향성이 완전히 없다면, 그 순간 주저앉을 것이다. 계속 걷고 있다는 사실 자체가 증거다. 의식이 헤매이지 않고, 어떤 조그마한 부분에서라도 그 방향을 향하고 있다는 것. 그것이 **능동적인 지향성** 이다. 자발성이", "source": "essay"}, {"id": "essay_33_b6f0440499", "text": "을 것이다. 계속 걷고 있다는 사실 자체가 증거다. 의식이 헤매이지 않고, 어떤 조그마한 부분에서라도 그 방향을 향하고 있다는 것. 그것이 **능동적인 지향성** 이다. 자발성이 생기는 것이다. 내가 주체적으로 걷게 된다.\n\n---\n\n#### **걸음은 상호작용이다**\n\n걷는다는 것은 단순하게 걸어지는 것이 아니다. 굉장히 여러 가지 신경과 감각들이 **상호작용** 이 일어나야지만 그 행위가 된다. 일반 로봇들조차 자연스럽게 걷는 것이 굉장히 어려운 이유가 여기에 있다. 땅과의 관계 맺음, 걷는 행위 자체와의 관계 맺음. 땅과 내 육신과 걷고자 하는 의지, 그것들이 합쳐져서 상호작용이 일어나는 것이 걸음이라는 하나의 형태다. 가만히 있으면 상호작용이 없다. 그러나 걷는 순간, 지금 여기서 무언가가 만나고 있다. 그 상호작용 속에서 에너지가 발산된다.\n\n---\n\n#### **우울함에서 걸어나온다**\n\n우울할 때 걸으면, 이 의식이 헤매이지 않고 뇌가 뭔가를 행하고 있다. 걷게 하는 행위를 하고 있으니까, 뭔가를 지향하고 있는 것이다. 순간적이고 단순하더라도. 헤매임에서 벗어나 어느 한 부분으로 지향점이 생긴다는 것. 걷는다는 행위는 그 자체로 이미 그런 전환이다. 거창한 결심이 아니라, 걸음을 한 발 옮기는 것. 그 순간 이미 의식은 어딘가를 향하기 시작하고, 상호작용이 일어나고, 에너지가 움직인다. **우울로부터 벗어날 수 있는 가능", "source": "essay"}, {"id": "essay_34_955da903f3", "text": "다. 거창한 결심이 아니라, 걸음을 한 발 옮기는 것. 그 순간 이미 의식은 어딘가를 향하기 시작하고, 상호작용이 일어나고, 에너지가 움직인다. **우울로부터 벗어날 수 있는 가능성이 거기에 있다.**\n\n\\#걷기 \\#지향성 \\#상호작용 \\#능동성 \\#우울함극복\n\n**\\--- (구분선)**\n\n\\[파일명: 검토된언어\\_사고의주도권\\_수필.md\\]\n\n### **검토된언어\\_사고의주도권\\_수필**\n\n#### **내가 만든 언어가 아니라는 것**\n\n내가 만든 언어가 아니라는 것은 **검토되지 않은 언어** 를 뜻한다. 내가 언어에 대해서 검토하지 않고, **습관적으로, 관습적으로 남이 쓰니까 그냥 따라 하는 언어들.** 그것이 사실은 우리의 생각과 사고, 행동, 습관을 많이 규정짓고 제한한다. 나도 모르게 그렇게 생각하고, 나도 모르게 그렇게 행동하고, 나도 모르게 그런 습관이 든다. 우리가 어느 때는 그냥 **무의식적으로 쓰기 때문에** 그것을 모른다. 시 쓰기나 글쓰기를 하면서 비로소 '내가 이런 언어를 쓰네? 근데 내가 정말 이 단어의 뜻을 충분히 검토하고 쓰는 건가?' 하게 된다. 그러면 검토하고 쓰는 것이 거의 없다는 것을 알게 된다. 사람들이 그냥 습관적으로 쓰는 것이다. 매체를 많이 접하고, 특히 아무 생각 없이 TV 같은 것을 보면 거기에서 **무의식으로 단어를 받아들이는 경향** 이 있다. 한때 TV가 보편화되어 있을 때는 사", "source": "essay"}, {"id": "essay_35_ef1984f513", "text": "로 쓰는 것이다. 매체를 많이 접하고, 특히 아무 생각 없이 TV 같은 것을 보면 거기에서 **무의식으로 단어를 받아들이는 경향** 이 있다. 한때 TV가 보편화되어 있을 때는 사람들이 만나면 쓰는 단어가 거의 비슷하고 유행인 말투나 단어들이 있었다. 언어의 민감성이 깨어있지 않으면 이런 것들을 그냥 흘려보낸다.\n\n---\n\n#### **내 언어는 내가 검토한 언어다**\n\n'왜 이렇게 생각하지?', '이 단어의 뜻은 뭐지?', '이 문장이 의미하는 바는 뭐지?'하고 충분히 검토해서 '이거는 이런 거구나' 하고 내가 규정하고 쓸 때야만이 비로소 내가 만든 언어가 된다. 내 표현으로 얘기하는 것이다. 나의 느낌이고 내 감정이고 내 정서다. 그것을 **타인이 규정한 언어로 표현해버리면** 내 느낌을 솔직하게 표현할 수가 없다. 자기 자신한테도 그렇고 타인한테도. 그래서 언어의 단어나 문장에 대해 내가 규정해야 한다. 보편적으로 정확하지 않아도 괜찮다. **내가 규정한 언어** 면 된다. 남들이 쓰는 언어와 똑같아도 관계없다. 그러나 어쨌든 **내가 검토가 돼야 한다.** 내가 검토를 하고, 이 단어를 어떤 의미에서 쓴다는 내 나름대로의 규칙이 있어야지만 그게 내 언어가 된다. 그런 것을 내가 알고 쓰느냐 모르고 쓰느냐의 차이가, 내 삶을 내가 주도적으로 살 수 있느냐 없느냐에 굉장히 영향력을 미친다. 물론 다 그냥 남이 생각하는 대로 생각하", "source": "essay"}, {"id": "essay_36_1883be2639", "text": "어가 된다. 그런 것을 내가 알고 쓰느냐 모르고 쓰느냐의 차이가, 내 삶을 내가 주도적으로 살 수 있느냐 없느냐에 굉장히 영향력을 미친다. 물론 다 그냥 남이 생각하는 대로 생각하고 그러고 사는 것이 쉬우니까 대부분 그렇게 산다. 시를 쓰고 글을 쓰는 작업이 바로 그것이다. 어떤 개념을 내 나름대로 표현하는 것. **표현 수단을 얻는 것이다.** 남들과 똑같이 쓰면 안 된다는 것이 바로 그 이유다.\n\n---\n\n#### **위대한 철학자들이 위대한 이유**\n\n**위대한 철학자들이 위대한 것** 은, 그들이 기존의 선대 철학자들이 쓴 언어를 쓰지 않고 **자기의 언어를 썼기** 때문이다. 그게 자기만의 사유 세계를 펼쳐 나간 것이다. 그러니까 그 사람 말을 이해하려면 그 사람 언어의 속으로 들어가야 한다. 사회적으로 우리가 그런 기존 언어를 쓰게끔 하는데, 그것을 내가 검토했을 때 안 맞는다면 기존의 언어로 사고하면 안 된다는 것이다. 내 나름대로의 언어를 써야 한다.\n\n---\n\n#### **언어는 프레임이다**\n\n이것이 그냥 대충 형성된 언어라면 그나마 괜찮다. 그런데 **힘을 가진 사람들의 지배 논리나 이데올로기** 때문에, 자기네들의 헤게모니를 쥐는 수단으로서의 언어 구조를 알게 모르게 학습시키고 강요하는 경우가 있다. 유신 헌법 하면서 국민교육헌장을 외우라고 하는 것이 그런 거다. 군사부일체(君師父一體). 왕과 부모와 스승은 일체", "source": "essay"}, {"id": "essay_37_d922b322cf", "text": "로서의 언어 구조를 알게 모르게 학습시키고 강요하는 경우가 있다. 유신 헌법 하면서 국민교육헌장을 외우라고 하는 것이 그런 거다. 군사부일체(君師父一體). 왕과 부모와 스승은 일체라는 이 말도 들여다보면, 부모를 거절하지 못하고 스승을 거절하지 못하는 심리에 왕을 끼워 넣은 것이다. 왕과 부모와 스승이 동격이니, 무조건적으로 따라야 한다는 논리가 거기에 숨어 있다. 언어로 프레임을 짜버리면, **그 언어의 프레임에 들어가버린 사람은 덫에 갇히는 것이다.** 그것으로밖에 생각을 못 한다. 아무리 생각하려 해도 그 이상은 생각을 못 한다. 언어가 가지는 강력한 힘이자, 나를 한정 짓는 힘이다. 이것을 알아야 한다.\n\n---\n\n#### **언어의 민감성이 깨어있어야 한다**\n\n그래서 시를 쓰고 글을 쓰는 작업이 필요하다. 코칭을 하는 사람은 말할 것도 없고, **언어의 민감성이 깨어있어야 한다.** 내가 뭔 얘기를 하는지도 모르고 상대방이 뭔 얘기를 하는지도 모르고 서로 '그러려니' 하고 넘어가면 안 된다. 상대방의 감정을 정확히 읽을 수 없게 된다. 나의 감정이나 느낌도 정확히 표현할 수 없게 되고, 그냥 대충 묻어가다 보면 해소되지 않은 채로 응어리가 진 채로 더 굳어지고 강화된다. 어느 날 갑자기 터진다. '너 왜 날 오해했어?' 나는 그 뜻이 아니었는데 싸우게 된다. 부부 사이도, 어떤 관계도 마찬가지다. 서양에서 많이 들어오는 코", "source": "essay"}, {"id": "essay_38_b2a151e1fe", "text": "더 굳어지고 강화된다. 어느 날 갑자기 터진다. '너 왜 날 오해했어?' 나는 그 뜻이 아니었는데 싸우게 된다. 부부 사이도, 어떤 관계도 마찬가지다. 서양에서 많이 들어오는 코칭이나 학문도 그렇다. **그들의 언어를 쓰게 되면 우리가 그들 이상으로 생각할 수가 없다.** 우리만의 철학을 전개하고, 우리만의 사상을 세우려면 우리 언어를 살려야 한다. 예전에는 굉장히 풍부한 우리 언어가 있었는데 지금은 잠식당하고 있다. 유행가도 맨 영어다. 지금은 아이돌 같은 것들이 전 세계를 주도한다지만, 나중에는 거기에 묻혀버리게 된다는 것이다. 몽골이 중국을 쳐들어갔지만 중국 문화에 흡수되어버렸듯이, 언어를 잃으면 결국 그 언어의 세계에 흡수된다.\n\n\\#검토된언어 \\#언어의프레임 \\#사고주도권 \\#언어민감성 \\#내언어\n\n**\\--- (구분선)**\n\n\\[파일명: 결핍에\\_집중하지않을때\\_얻는\\_경제적자유\\_수필.md\\]\n\n### **결핍에\\_집중하지않을때\\_얻는\\_경제적자유\\_수필**\n\n#### **돈이 없는 게 아니라, 돈이 안 보이는 것이다**\n\n말버릇처럼 '돈이 없다, 돈이 없다'를 반복한다. 그런데 돈이 없는 것이 아니다. 돈은 세상에 많다. 엄청나게 많다. 은행에서 찍어내고, 나라에서 찍어내고. 내가 자꾸 '돈이 없다'고 하니까 **돈이 없다는 것에 집중하게 되는 것이다.** 집중은 볼록렌즈와 같다. 햇빛이 볼록렌즈를 통과하면 거기가 굉", "source": "essay"}, {"id": "essay_39_ad30d22550", "text": "에서 찍어내고, 나라에서 찍어내고. 내가 자꾸 '돈이 없다'고 하니까 **돈이 없다는 것에 집중하게 되는 것이다.** 집중은 볼록렌즈와 같다. 햇빛이 볼록렌즈를 통과하면 거기가 굉장히 밝아지고 열이 나고 타기도 한다. '돈이 없다'는 그 부분이 내 삶에 굉장히 밝게 부각된다. 결국에는 불이 붙어서 빵꾸가 난다. 통장 잔고도 빵꾸가 나는 것이다. 통장 잔고가 빵꾸 나는 것에 너무 집중해서 통장 잔고가 빵꾸 나는 면도 있다. 세상의 돈은 엄청나게 많은데, 너무 빵꾸 나는 쪽에 집중하느라 그것을 발견하지 못하고 있는 것이다. **돈을 못 보는 것이다.** 돈을 보는 안목, 돈이 어디 있는지를 보는 안목이 없는 것이다. 그러니까 새로 무언가를 해야 하는 게 아니다. **결핍에 집중했던 것을 하지 않는 것만으로도** 돈의 흐름이 훨씬 원활해질 수 있다.\n\n---\n\n#### **경제적 자유는 돈의 많고 적음이 아니다**\n\n경제적인 자유를 얻는다는 것은 **돈의 있고 없음에 매이지 않는다는 것이다.** 지금 절대적으로 돈이 없어도 결핍을 느끼지 않을 수 있다. 반대로 남들이 보기엔 꽤 부유한데 상대적 결핍이 엄청나게 많을 수도 있다. 경제적 자유는 잔고의 문제가 아니라 **매임의 문제** 다. 삼성 이재용은 돈이 엄청나게 많으니 경제적 자유를 얻었겠다고 생각할 수 있다. 그런데 한편으로는 그 많은 돈을 관리하느라 돈에 엄청나게 묶여 있다. 굴리지", "source": "essay"}, {"id": "essay_40_47a0aec373", "text": "**매임의 문제** 다. 삼성 이재용은 돈이 엄청나게 많으니 경제적 자유를 얻었겠다고 생각할 수 있다. 그런데 한편으로는 그 많은 돈을 관리하느라 돈에 엄청나게 묶여 있다. 굴리지 않으면 수십만 직원이 문을 닫는다. 빚으로 따져도 주식을 가진 것이 다 빚이니 빚도 어마어마하다. 오히려 지금 우리가 그 사람에 비하면 돈에 훨씬 자유로울 수 있다. 조건을 해소하면 된다. 돈이 있을 땐 있는 대로 살고, 없을 땐 없는 대로 사는 것. **그것이 비로소 경제적인 자유를 획득하는 것이다.**\n\n---\n\n#### **사명에 전념하면 돈은 따라온다**\n\n돈 없이 살 수는 없다. 그러나 내가 이 세상에 와서 이 몸을 가지고 해야 할 일, 사명을 가지고 전념하며 살면, **돈이 없어서 못 하게 되는 상황을 우주가 만들지 않는다.** 진짜 해야 할 일과 하고 싶은 일을 열심히 하면, 돈은 쓸 만큼 저절로 생긴다. 적어도 돈이라는 조건에 매여서 앞으로 나아가지 못하는 일은 없게 된다.\n\n\\#결핍과풍요 \\#경제적자유 \\#돈의매임 \\#볼록렌즈 \\#사명 \\#중복주의\n\n**\\--- (구분선)**\n\n\\[파일명: 경청\\_움을여는행위\\_수필.md\\]\n\n### **경청\\_움을여는행위\\_수필**\n\n#### **경청은 움을 여는 것이다**\n\n경청을 한다고 말한다. 그런데 경청이 무엇인지를 움의 언어로 설명할 수 있다. **경청은 움을 여는 것이다.** 상대방의 움을 열고", "source": "essay"}, {"id": "essay_41_ef26613544", "text": "*\n\n#### **경청은 움을 여는 것이다**\n\n경청을 한다고 말한다. 그런데 경청이 무엇인지를 움의 언어로 설명할 수 있다. **경청은 움을 여는 것이다.** 상대방의 움을 열고, 내 움을 열고, 서로 대화를 나누는 것이다. 사람을 깊이 이해한다는 것은 그렇게 서로의 움 안으로 함께 들어가 보는 것이다.\n\n---\n\n#### **코치다움을 파야 한다**\n\n코칭에서 코치는 고객의 움 안에 무엇이 있는지를 고객과 함께 들여다본다. 그런데 그러려면 코치에게도 준비가 있어야 한다. **고객의 움을 수용할 수 있는 코치다움을 파야 한다.** 코치가 되기로 했다면 그때부터 계속 그 움을 키워가야 한다. 경청은 기술이 아니다. 고객의 니즈와 욕구가 담긴 움과, 코치의 움이 **서로 상호작용하는 것** 이다. 경청을 통해 그 상호작용이 일어날 때, 비로소 코칭이 된다. \\#경청 \\#움 \\#코치다움 \\#상호작용 \\#코칭\n\n**\\--- (구분선)**\n\n\\[파일명: 경험을\\_온전히수용할때\\_집착과혐오를\\_넘어서\\_수필.md\\]\n\n### **경험을\\_온전히수용할때\\_집착과혐오를\\_넘어서\\_수필**\n\n#### **집착과 혐오는 왜 강화되는가**\n\n**집착과 혐오가 강화** 되는 이유가 있다. **경험을 깊이 하지 않아서** 다. 온전히 받아들이지 않아서다. 맛있다. 좋다. 거기까지는 문제가 없다. 그런데 또 먹고 싶다. 계속 먹고 싶다. 그것은 맛있다는 경", "source": "essay"}, {"id": "essay_42_f136bb754b", "text": "유가 있다. **경험을 깊이 하지 않아서** 다. 온전히 받아들이지 않아서다. 맛있다. 좋다. 거기까지는 문제가 없다. 그런데 또 먹고 싶다. 계속 먹고 싶다. 그것은 맛있다는 경험을 깊이, 충분히 해주지 않았기 때문이다. 깊이 느끼면 해소가 된다. 그런데 겉으로 피상적으로만 '맛있어' 하면서 넘어가면 그것이 계속 이어진다. 집착이 된다. 혐오도 마찬가지다. '싫어, 싫어'를 계속 반복하면 싫어함이 계속 간다. '좋아, 좋아'가 계속되듯이.\n\n---\n\n#### **아픔을 거부하지 않는다**\n\n일상에서 겪는 아픔을 **온전히, 그 자체로 충분히 느껴버리면** 그다음에는 '이 아픔은 그냥 아픔일 뿐이구나' 하고 보게 된다. 그런데 **아픔을 거부하려고 하는 마음** , 그게 혐오다. 더 취하고 싶어 하는 마음이 집착이고, 거부하려고 하는 마음이 혐오다. **아픔을 거부하지 않으면, 수용해버리면** 혐오로까지 가지 않는다. 똑같은 경험을 하더라도. 경험을 안 하고 살 수는 없다. 그러니 경험을 어떻게 대하느냐가 전부다.\n\n---\n\n#### **경험 속으로 들어간다**\n\n우울증이 온다, 외롭다, 두렵다. 이런 감정들은 **경험을 회피하려고 하는 마음 때문에** 생긴다. '심심해 죽겠다', '지루해 죽겠다'도 마찬가지다. **경험 속으로 들어가지 않으려고 해서** 그런 것이다. 경험을 거부하려는 마음이 그런 것들을 키운다. 경험을 온전히 수용", "source": "essay"}, {"id": "essay_43_25ad8d3e1c", "text": "다. '심심해 죽겠다', '지루해 죽겠다'도 마찬가지다. **경험 속으로 들어가지 않으려고 해서** 그런 것이다. 경험을 거부하려는 마음이 그런 것들을 키운다. 경험을 온전히 수용하면, 그 매 순간이 나한테 새로운 경험으로, 신선한 경험으로 다가온다. 그것들이 다 나니까. **삶이 펄펄 생생한 삶으로 바뀐다.** 세상을 경험하지 않고 살 수 없는 이 삶에서, **경험을 통해 온전한 나로 깨어날 수 있다.** 경험을 온전히 수용할 때 **삶의 생생함과 생동감을 얻을 수 있다** .\n\n\\#온전한수용 \\#집착과혐오 \\#경험 \\#생동감 \\#올셀프\n\n**\\--- (구분선)**\n\n\\[파일명: 고난과성장\\_디자인과표현수단\\_수필.md\\]\n\n### **고난과성장\\_디자인과표현수단\\_수필**\n\n#### **진폭만큼 넓어진다**\n\n때에 따라서는 우울할 때도 있고 침울할 때도 있다. 그런데 그런 것들이 있기 때문에 앞으로 나아가는 힘이 된다. 나의 힘이 되기도 하지만, **상대방의 힘도 된다.** 누군가의 힘든 모습이 보일 때 이해해 줄 수 있는 힘. 내가 힘들어봤으니까 다른 힘든 사람을 이해할 수 있다. **진폭만큼 넓어지는 것이다.** 이쪽을 경험하고 저쪽을 경험해보면, 그만큼의 폭을 이해하게 된다. 그런 경험들은 나한테 오는 손님이다. 어느 한 포지션만 계속 취하려 하면 안 된다. 좋은 상태에만 계속 놓으려 하면 균형이 무너진다. 균형만 무너지는", "source": "essay"}, {"id": "essay_44_9ae18a1140", "text": "만큼의 폭을 이해하게 된다. 그런 경험들은 나한테 오는 손님이다. 어느 한 포지션만 계속 취하려 하면 안 된다. 좋은 상태에만 계속 놓으려 하면 균형이 무너진다. 균형만 무너지는 게 아니다. 그것이 나중에는 우울의 원인이 된다. 계속 같은 상태에 있으면 그것이 기쁨이 아닌 게 되어버린다. 내성이 생겨서 더 높이 올라가야 되는데, 사람이 계속 그렇게만 올라갈 수는 없다. 지쳐버리고 나가떨어진다. 그래서 그런 흐름, 그런 기복 자체를 디자인으로 파악해야 한다.\n\n---\n\n#### **삶은 드라마틱해야 한다**\n\n재미없는 영상이 왜 재미없는가. 계속 밋밋하기 때문이다. 연인이 만나서 행복하게 살다 애 낳고 잘 지내다 죽었다. 끝. 재미없다. 서로 싸우고 헤어질 듯 하다가 누가 무슨 일이 걸리고 다시 만나고 — 그런 것들이 있어야 재미있다. **그게 디자인이다.** 디자인의 핵심이자 예술의 핵심이 바로 그것이다. 삶도 마찬가지다. 기복이 없는 삶은 흐름이 없다. 내가 겪는 고난과 침체, 그것들이 내 삶의 역동성을 만들어낸다. 디자인이 뭔지 아직 잘 모르겠다고 할 수 있다. 그렇다면 자꾸 해봐야 한다. 이걸로 해서 나는 무엇을 표현하고 싶은가, 상대방이 원하는 것은 무엇인가, 그 사람이 지금 추구하는 가치는 무엇인가 — 이런 것들을 자꾸 연습해주면서 해보다 보면, 뇌의 연결 회로가 형성된다.\n\n---\n\n#### **하기 싫다는 것은 지금 성장", "source": "essay"}, {"id": "essay_45_05194d0745", "text": "무엇인가, 그 사람이 지금 추구하는 가치는 무엇인가 — 이런 것들을 자꾸 연습해주면서 해보다 보면, 뇌의 연결 회로가 형성된다.\n\n---\n\n#### **하기 싫다는 것은 지금 성장하고 있다는 것이다**\n\n어렵고 잘 안 되고, 이게 맞는 건지도 모르겠다. 그럴 때가 있다. 맨날 하던 것과 비슷하게 하게 되고, 어딘가에서 찾아다 쓰다 보니 뭔가 아닌 것 같다는 생각이 든다. 그게 바로 **지금 깨어나고 있다는 신호다.** 뇌가 가장 중심적으로 여기는 것은 에너지를 효율적으로 쓰는 것이다. 그래서 뇌는 에너지를 많이 쓰는 것을 싫어한다. '하기 싫다'고 느끼는 것이다. 그런데 그것을 안 하면 에너지 분배는 좋지만 더 이상 성장이 안 된다. 지금 그때 새로운 시냅스 연결 통로가 만들어지고 있는 것이다. 기존 통로도 더 강화되고. 책 읽는 것이 힘든 이유가 바로 그것이다. 새로운 연결 통로를 만들기 때문에 힘든 것이다. 그것을 자꾸 해놓으면 그다음에는 힘들었던 것이 힘이 안 들어지고, 그다음 단계가 또 힘들어진다. 그러면서 계속 발전한다. 아랫 단계들은 이제 나중에는 쉽게 되어버리는 것이다. 힘들면 그만두는 것이 습관이 되면 안 된다. 포기해버리면 뇌는 '이게 해소됐구나' 하고 그냥 넘어가버린다. 새로운 시도나 어려운 것을 해보는 것도 습관이 되면, 나중에는 그런 도전이 더 쉬워진다.\n\n---\n\n#### **화두처럼 염두에 두면 뇌가 알아서", "source": "essay"}, {"id": "essay_46_5cdba480f1", "text": "구나' 하고 그냥 넘어가버린다. 새로운 시도나 어려운 것을 해보는 것도 습관이 되면, 나중에는 그런 도전이 더 쉬워진다.\n\n---\n\n#### **화두처럼 염두에 두면 뇌가 알아서 찾는다**\n\n어떤 문제를 해결해야 한다면, 그것을 염두에 두고 방법을 찾는 사람과 그냥 흘려버리는 사람은 다르다. 어떤 맥락을 파악하거나 의미가 무엇인가를 항시 생각하면서 하는 사람과 그렇지 않은 사람은 결과가 많이 다르다. 한 꼭지를 항시 걸어두고 있으면 뇌는 계속 방법을 찾는다. 빨리 해결해야 뇌가 편한 상태가 되고 에너지를 아낄 수 있기 때문에, 뇌가 알아서 찾는 것이다. 놓지만 않으면 된다. 명상 수행에서 화두가 있다. '뜰 앞에 잣나무.' 밥 먹을 때도, 잠들 때도 계속 그것을 생각하게 한다. 그러면 어느 순간 뇌가 그것을 탁 터트린다. **그게 수행의 기본 방법이자 학습의 기본이다.** 어렵고 안 읽히는 책도 일부러 자꾸 읽어보고, 내 단계에서 한두 단계 더 높은 것을 읽어보고 — 이런 식으로 해 나가야 한다.\n\n---\n\n#### **표현 수단을 갖는다**\n\n중요한 것은 **자신의 표현 수단을 갖는 것이다.** 글이 될 수도 있고, 디자인이 될 수도 있고, 음악이 될 수도 있다. 김연아는 얼음판 위에서 자유롭다. 스케이트라는 수단이 있기 때문이다. 자기 표현을 마음대로 할 수 있다. 지금 당장 무엇을 하고 싶은지 몰라도, 표현 수단을 열심히 닦아놓", "source": "essay"}, {"id": "essay_47_c6e7e50765", "text": "있다. 김연아는 얼음판 위에서 자유롭다. 스케이트라는 수단이 있기 때문이다. 자기 표현을 마음대로 할 수 있다. 지금 당장 무엇을 하고 싶은지 몰라도, 표현 수단을 열심히 닦아놓으면 나중에 하고 싶은 것이 생겼을 때 이것을 이용할 수 있다. 표현 수단은 하나만이어서는 안 된다. 디자인을 한다가 아니라 **디자인도 한다** 가 되어야 한다. 음악으로 해소하면서 그것이 디자인으로 녹아 들어가고. 앞으로는 통섭적인 시각이 필요하다. 세상이 빠르게 변하는 만큼, 그때그때 적용하고 선도해 나가려면. 어떤 단정한 디자인을 하는 사람이 취미로는 알록달록한 그림을 그리며 해소하는 것처럼, 한쪽에서 해소가 또 다른 쪽을 살찌운다. 디자인의 가장 근본도 결국은 사람이다. 파헤쳐보면 결국 사람이 편안하게, 사람의 욕구와 니즈를 충족시켜주는 것이다. 사람의 느끼는 가치를 만족시켜 주는 것이다. 그러니 **사람에 대한 이해** 가 있어야 한다.\n\n---\n\n#### **의미는 부여하는 것이고, 가치는 만드는 것이다**\n\n지금 열심히 한다는 것 자체에 의미를 두면 된다. **의미는 자꾸 하면서 만들어 나가면 된다.** 내가 부여하는 것이다. 찾는 것이 아니다. 가치는 만들고 찾는 것이다. 의미는 나에게 더 가까운 것이고, 가치는 타인과 외부를 향하는 것이다. 나한테는 가치 있어도 남한테는 전혀 가치가 없을 수 있다. 의미는 나한테만 의미 있으면 살아갈 이유가", "source": "essay"}, {"id": "essay_48_af06e9340f", "text": "이다. 의미는 나에게 더 가까운 것이고, 가치는 타인과 외부를 향하는 것이다. 나한테는 가치 있어도 남한테는 전혀 가치가 없을 수 있다. 의미는 나한테만 의미 있으면 살아갈 이유가 된다. 그러나 가치는 다른 사람한테도 가치가 있어야 그것으로 살아갈 수 있다. 둘 다 있어야 한다.\n\n\\#고난과성장 \\#디자인 \\#하기싫음의신호 \\#표현수단 \\#의미와가치\n\n**\\--- (구분선)**\n\n\\[파일명: 고민거리치우기\\_삶의선물\\_수필.md\\]\n\n### **고민거리치우기\\_삶의선물\\_수필**\n\n#### **손님이 오기 전에 할 일**\n\n손님이 집에 오기로 했다. 이것저것 치우고 음식도 마련해야 한다. 그런데 눈에 거슬리는 물건이 하나 있다. 저걸 어떻게 해야 하지. 그 고민에 매달려 있다. 점점 손님이 올 시간은 가까워지는데, 계속 그 물건을 붙들고 있으면 손님을 맞이할 준비가 하나도 안 된다. 손님이 무슨 선물을 갖고 올지 모른다. 그런데 선물을 받을 준비는 안 하고, 물건을 어떻게 치울까 고민만 하고 있는 것이다. 손님이 왔다가 그냥 가버릴 수도 있다. 이것은 비유다. 마음속에 고민되는 것, 신경 쓰이는 일, 누군가와 다퉜던 일, 안 좋은 말을 들었던 일. 그것을 계속 붙들고 있다는 것은, 눈에 거슬리는 물건을 안 치우고 계속 거기에 매달려 있는 것과 같다.\n\n---\n\n#### **고민에 자꾸 뭔가를 붙인다**\n\n더 문제인 것이 있다. 그 고", "source": "essay"}, {"id": "essay_49_0ac0f276ee", "text": "속 붙들고 있다는 것은, 눈에 거슬리는 물건을 안 치우고 계속 거기에 매달려 있는 것과 같다.\n\n---\n\n#### **고민에 자꾸 뭔가를 붙인다**\n\n더 문제인 것이 있다. 그 고민을 그냥 두는 것이 아니라, 거기다 자꾸 뭔가를 **붙인다** 는 것이다. 위안 삼아 '이건 이래서 이런 거야'를 갖다 붙이고, 변명을 붙이고, '이랬을 것이다 저랬을 것이다'를 붙인다. 파헤치고, 생각하고, 또 생각한다. 그것은 해결책이 아니다. 오히려 그 고민을 가지고 노는 것이다. 치워야 한다는 것을 너무 잘 알면서도, 한편으로는 계속 붙들고 있고 싶어 한다. 그래서 계속 붙들고 있는 것이다. '저걸 어떻게 치울까, 차를 불러야 되나, 사람을 불러야 되나, 기다려볼까.' 그렇게 고민한다고 해서 치워지는 것이 아니다. **가장 해결책은 그냥 치워버리는 것이다.** 내 머릿속에서.\n\n---\n\n#### **시선을 옮기는 것이 치우는 것이다**\n\n물론 안 치워진다. '이걸 잊어야지, 생각하지 말아야지' 한다고 생각이 안 되는 것이 아니다. 그런데 거기서 벗어나는 방법이 있다. **내가 지금 고민하는 것보다 훨씬 더 큰 것이 내 삶이라는 것을 아는 것이다.** 지금 고민거리는 그 큰 삶의 일부일 뿐이다. 더 의미 있는 일, 지금 해야 할 일 쪽으로 **시선을 옮기는 것이다.** 그러면 그 고민거리지가 있어도 문제가 되지 않는다. 거기다 계속 덧붙이지 않고, 시", "source": "essay"}, {"id": "essay_50_0182ab45c5", "text": "삶의 일부일 뿐이다. 더 의미 있는 일, 지금 해야 할 일 쪽으로 **시선을 옮기는 것이다.** 그러면 그 고민거리지가 있어도 문제가 되지 않는다. 거기다 계속 덧붙이지 않고, 시선을 뺏기지만 않는다면, 굳이 치울 필요도 없다. 내 시야에서 벗어난 것이 곧 치운 것이다. 그 고민이 내 관심과 시간을 가져가지 못하게 된다. **삶 자체가 선물이다.** 그 선물을 맞이하지 못하게 되는 것이 진짜 문제다. 고민거리를 붙들고 있는 사이, 손님이 왔다 그냥 가버린다.\n\n\\#고민치우기 \\#시선이동 \\#삶의선물 \\#붙들지않음\n\n**\\--- (구분선)**\n\n\\[파일명: 고통과지혜\\_삶의연금술\\_수필.md\\]\n\n### **고통과지혜\\_삶의연금술\\_수필**\n\n#### **식(識)이 지혜가 되는 순간**\n\n불성(佛性)에는 다섯 가지 지혜가 있다. 성소작지(成所작智), 묘관찰지(妙觀察智), 평등성지(平等性智), 대원경지(大圓鏡智), 그리고 전식득지(轉識得智). 이것이 불성의 다섯 가지 측면이다. 우리가 그냥 식(識), 의식에 머물러 있으면 그냥 아는 것에 그친다. 거기서는 지혜가 생기지 않는다. 지혜는 어떻게 생기는가. 고통을 겪으면서, 어려움을 통과하면서, 그 안에서 '내가 왜 이 땅에 태어났고, 앞으로 어떻게 살아가야 하고, 무엇을 기준으로 삼고 성장해 나가야 하는가'를 알게 될 때다. **소명과 사명** 을 알게 되는 것이다. 식을 **지혜** 로", "source": "essay"}, {"id": "essay_51_044e7a19bf", "text": "이 땅에 태어났고, 앞으로 어떻게 살아가야 하고, 무엇을 기준으로 삼고 성장해 나가야 하는가'를 알게 될 때다. **소명과 사명** 을 알게 되는 것이다. 식을 **지혜** 로 바꾸는 것, 이치를 아는 것이 지혜다. 전식득지가 바로 그것이다.\n\n---\n\n#### **고통을 거름으로 삼는다**\n\n고통이 고통으로만 끝나면 너무 억울하다. 괴로움을 받을 수밖에 없는 삶인데, 그것이 그냥 괴로움으로 끝난다면. 그래서 고통을 통해 **자양분** 을 얻어야 한다. 어려움을 **거름으로 삼아서** 영적 성장의 밑거름이 되게 해야 억울하지 않다. 고통 속에서 지혜를 건져내는 것이다. 그렇게 점점 더 차원 높은 지혜로 확장해 나간다. 내가 지혜를 활짝 필 때, 우주의 한 부분으로서 밝게 빛나게 된다. '세계일화(世界一花)', 우주가 하나의 꽃이라면, 나는 그 꽃의 한 부분이다. 내가 밝아지면 우주가 밝아지는 것이다. 그것을 사람들한테 알려줘야 한다.\n\n---\n\n#### **삶으로 깊이 들어간다**\n\n회피가 아니다. **적극적으로 끌어안는 것이다.** 고통을 수용하는 것이다. 삶을 피하는 것이 아니라 **삶으로 깊이 들어가는 것이다.** 많은 일들을 경험하는 그 속에서 지혜가 점점 밝아진다. 그것이 우주가 바라는 것이고, 내가 이 땅에 온 이유다. 지혜가 성숙되도록 고통을 온전히 끌어안는다. 그 속에 충분히 머문다. 그러면 고통은 더 이상 고통으로만", "source": "essay"}, {"id": "essay_52_bee176e96c", "text": "가 점점 밝아진다. 그것이 우주가 바라는 것이고, 내가 이 땅에 온 이유다. 지혜가 성숙되도록 고통을 온전히 끌어안는다. 그 속에 충분히 머문다. 그러면 고통은 더 이상 고통으로만 있지 않는다.\n\n\\#고통과지혜 \\#불성 \\#전식득지 \\#거름과자양분 \\#삶으로들어가기\n\n**\\--- (구분선)**\n\n\\[파일명: 과거사건과나를분리\\_글쓰기치유\\_수필.md\\]\n\n### **조건지어짐해소\\_글쓰기와분리\\_수필**\n\n#### **생각은 실체가 아니다**\n\n지난날 누군가 생각이 나면 화가 난다. 그런데 그것은 생각일 뿐이다. 뇌에서 나올 때는 이미지도 같이 떠오르고 감정도 같이 올라온다. 감각이 여러 개 동원되면 힘이 세진다. 리얼리티가 확장된다. 더 생생해진다. 그때의 얼굴까지 떠오르고 감정이 솟구치면서 아드레날린까지 나온다. 생각할 때마다 속이 상하고 불안하고 분한 이유가 거기 있다. **생각이 실체화되어 버리는 것이다.**\n\n---\n\n#### **글로 쓰면 객관화된다**\n\n그것을 글로 써보면 어떻게 되는가. 한 발짝 물러선다. 나와 그 사건 사이에 거리가 생긴다. 글에는 감정이 덜하다. 기승전결이 생긴다. 단락이 끊어진다. 뇌 속에서 기승전결도 없이 뒤죽박죽 이어지던 것이, 글이 되면 윤곽이 잡힌다. **'이거는 그냥 스토리였구나. 내가 이 스토리에 왜 이렇게 얽매였지?'** 그렇게 나와 사건을 분리시킨다. 사건이 없었다는 것이 아니다. 그", "source": "essay"}, {"id": "essay_53_f6d633d788", "text": "던 것이, 글이 되면 윤곽이 잡힌다. **'이거는 그냥 스토리였구나. 내가 이 스토리에 왜 이렇게 얽매였지?'** 그렇게 나와 사건을 분리시킨다. 사건이 없었다는 것이 아니다. 그것은 단지 나에게 벌어졌던 하나의 이벤트였을 뿐이고, **지금 내가 그것 때문에 굳이 고통받을 필요는 없다** 는 것이다. '잊어'라고 하면 잊어지지 않는다. 오히려 강화된다. 위로한답시고 \"다 지난 일이잖아\"라고 해도 그 사람에게는 여전히 생생하다. 잊으라는 것이 아니다. **기억을 놔주라는 것이다.** 사람을 놔주라는 것이 아니라.\n\n---\n\n#### **피해자 코스프레와 인정 욕구**\n\n사람들이 그 기억을 잊고 싶지 않기도 한다. 괴로운데도 그게 자기라고 믿는다. 자기의 역사, 자기 삶이라고 믿는다. '나는 이렇게 피해를 많이 본 사람이고 억울한 사람이야.' 그렇게 피해자 코스프레를 하면서 인정 욕구를 채운다. 자꾸 상기시키고 에너지를 넣어주면서 스스로 강화시킨다. 그래서 10년 20년이 지나도 옛날 이야기를 계속 하는 것이다. 그 사람에게 필요한 것은 반박이 아니다. **인정이다.** '그래, 그건 네가 당한 거니까. 네가 그땐 참 힘들었겠구나. 맞아, 너 힘들었어.' 인정이 먼저 들어가야 한다. 그래야 다음이 열린다.\n\n---\n\n#### **조건 지어짐으로부터의 자유**\n\n불교에서 말하는 니르바나, 열반이 그것이다. 어디 죽어서 불국토에 가는 것이", "source": "essay"}, {"id": "essay_54_6c096a0a7c", "text": "먼저 들어가야 한다. 그래야 다음이 열린다.\n\n---\n\n#### **조건 지어짐으로부터의 자유**\n\n불교에서 말하는 니르바나, 열반이 그것이다. 어디 죽어서 불국토에 가는 것이 아니다. **조건으로부터의 자유다.** 내가 이런 조건에 매여 있었다는 것을 아는 것. 그게 정견(正見)이다. 지혜다. 하지만 그 힘듦을 지금까지 계속 끌고 올 필요는 없다. 왜냐하면 **너는 그것보다 훨씬 더 많은 삶을 살아내야 하기 때문이다.** 앞으로 무수한 관계, 무수한 선택지, 열려 있는 넓은 삶이 기다리고 있다. 거기로 가기 위해 기억을 놔줘야 한다. 이것이 자기 돌봄이다. 연민이다. 용서는 내 선택이다. 하고 싶으면 하고, 하기 싫으면 안 해도 된다. 그러나 **조건 지어짐은 내가 풀어줘야 한다.** 나를 위해서.\n\n---\n\n#### **의식은 무한하다**\n\n과거의 기억, 미래의 불안. 이런 것들이 조건으로 강화되고 실체화되면 인식의 범위가 좁아진다. 그 좁아진 인식을 나라고 느낀다. 그런데 의식은 무한하다. 수백 광년 떨어진 별도 우리가 본다. 우주 끝까지도 닿는다. **의식은 그렇게 넓다.** 그 넓은 의식이 나인데, 조건 지어진 좁은 인식만을 나라고 여기는 것이다. 인식의 범위를 확장시키는 것. 조건 지어짐을 풀어주는 작업. 그것이 글쓰기로도, 명상으로도, 코칭으로도 이루어진다. \\#조건지어짐 \\#글쓰기치유 \\#분리 \\#인정 \\#의식은무한", "source": "essay"}, {"id": "essay_55_962c66421d", "text": "인식의 범위를 확장시키는 것. 조건 지어짐을 풀어주는 작업. 그것이 글쓰기로도, 명상으로도, 코칭으로도 이루어진다. \\#조건지어짐 \\#글쓰기치유 \\#분리 \\#인정 \\#의식은무한\n\n**\\--- (구분선)**\n\n\\[파일명: 과거재해석\\_성장의밑거름\\_수필.md\\]\n\n### **과거재해석\\_성장의밑거름\\_수필**\n\n#### **경험은 사실이고, 해석은 내가 붙인 것이다**\n\n과거의 경험을 바꿀 수는 없다. 그러나 **해석을 바꿀 수 있다.** 어떤 일이 있었다는 것, 그것은 진술이다. 사실이다. 그런데 거기다 내가 해석을 붙인다. '그때가 안 좋았다', '나는 그때 상처를 받았다'. 그 해석을 잘못 붙이면 과거 때문에 계속 고통을 받는다. 해석이 고통의 원인이 되는 것이다. 상처면 상처가 없었다고 우길 수 없다. 아픔이면 아프지 않았다고 할 수 없다. 그것은 사실이다. 그러나 그것을 통해 내가 어떤 **통찰을 얻었다면** , 그것이 나의 **디딤돌이 됐다면** , 나를 **성장시키는 밑거름이 됐다면** , 그 과거의 기억을 **새롭게 해석** 할 수 있다. 지금의 입장에서.\n\n---\n\n#### **해석이 바뀌면 과거가 바뀐다**\n\n내면의 아이, 과거의 나와 지금의 내가 화해한다는 말이 있다. 감성적으로는 그렇다. 그런데 실제로 더 유효한 것은 **해석을 바꾸는 것** 이다. 과거에 겪었던 사건 자체를 바꾸기는 어렵지만, 해석은 내가 바꿔", "source": "essay"}, {"id": "essay_56_00c73c6f25", "text": "의 내가 화해한다는 말이 있다. 감성적으로는 그렇다. 그런데 실제로 더 유효한 것은 **해석을 바꾸는 것** 이다. 과거에 겪었던 사건 자체를 바꾸기는 어렵지만, 해석은 내가 바꿔줄 수 있으니까. 해석을 다르게 붙이는 순간, 과거는 더 이상 나를 발목 잡지 않는다. 오히려 **성장의 동력** 이 된다. 미래를 향해 나아갈 수 있게 된다.\n\n\\#과거재해석 \\#성장밑거름 \\#해석의힘 \\#트라우마 \\#디딤돌\n\n**\\--- (구분선)**\n\n\\[파일명: 관계맺음\\_진정한나찾기\\_수필.md\\]\n\n### **관계맺음\\_진정한나찾기\\_수필**\n\n#### **나를 위해서가 아니라 기여하는 쪽으로**\n\n다 나 아닌 것이 없고, 조건 지어짐으로부터 자유롭다면 그냥 되는 대로 살면 되는 것 아닌가. 무아로서. 그런데 그게 아니다. 조건 지어진 속에서 새롭게 관계 맺음을 하면서, 결국 남들이 잘 되게 하는 것이 나 자신이 잘 되는 길이다. 둘이 아니니까. 대승적인 차원에서 이타적인 삶을 사는 것이 결국 내가 잘 사는 길이다. 그러니까 **방향 전환** 이 필요하다. 세상이 나를 위해 뭔가 해주기를 바라는 것에서, **내가 세상에 기여하는 쪽으로.** 세상을 바꾼다거나 거창한 것이 아니다. 둘이 아니기 때문에, 내가 세상에 기여하는 것이 새로운 관계 맺음이고, 진정한 얽힘의 풀림이다. 그게 **해방이고 해탈이고 자유** 다. 유튜버든 누구든 세상에 나와서 진", "source": "essay"}, {"id": "essay_57_21fed75760", "text": "아니다. 둘이 아니기 때문에, 내가 세상에 기여하는 것이 새로운 관계 맺음이고, 진정한 얽힘의 풀림이다. 그게 **해방이고 해탈이고 자유** 다. 유튜버든 누구든 세상에 나와서 진리를 나누고 세상을 조금씩 이롭게 하는 사람들이 다 지금 보살행을 하고 있는 것이다. 본인들이 어떻게 생각할지 모르지만. **관계 속에서 드러날 수밖에 없다면** , 이 관계가 얼마나 중요한가.\n\n---\n\n#### **나를 깊이 들어가면 세상이 나온다**\n\n지금 핵 개인화가 돼 있다. 엄청나게. 자기 위주의 삶이 더 중요하다고 생각한다. 그런데 핵 개인화를 확 뒤집어보면 속에는 우주가 들어있다. 가장 나를 나로 살기 위해 나에게 집중해서 안으로 깊이 들어가보면, 결국에는 **세상** 이 나온다. 나의 알맹이가 따로 있는 게 아니다. 나를 탁 들여다보고 들어오면 세상이 나온다. 세상과 만나게 된다. **전체가 통으로 나** 라는 것을 받아들이면서 사는 것이 나로 사는 것이다. 에고의 나를 나라고 생각하는 것이 나를 사는 게 아니다. 사람들이 '나로 산다', '나답게 산다'고 할 때 그 나가 에고의 나일 수 있다. '내 맘대로 산다', '내 뜻대로 산다'고 할 수 있지만, 그 나가 사실은 나가 아닌 것이다.\n\n---\n\n#### **나는 관계의 매듭이다**\n\n양자역학에서 나를 **관계의 맺음** 으로 본다. 당신은 당신이라는 **매듭** 이고, 나는 나라는 매듭이", "source": "essay"}, {"id": "essay_58_473be1f7f7", "text": "은 나가 아닌 것이다.\n\n---\n\n#### **나는 관계의 매듭이다**\n\n양자역학에서 나를 **관계의 맺음** 으로 본다. 당신은 당신이라는 **매듭** 이고, 나는 나라는 매듭이다. 매듭이 뭉쳐졌다는 것은 얽혔다는 것이고, 그 얽힘에 맞게 조건이 지어져 딱 묶여있는 것이다. 아주 적절한 비유다. 매듭이 풀린다고 보면 결국에는 **관계** 밖에 안 남는다. 어떤 관계 속에서의 **상호작용** 밖에 없다. 개별적인 개아가 있는 것이 아니고, 지금 여기 있는 그대로 이것밖에 없는 것이다.\n\n---\n\n#### **내용물은 다르지만 일어나는 건 똑같다**\n\n나는 내 육신 안에 있다고 생각하고, 당신은 당신 육신 안에 있다고 생각한다. 그런데 생각해보자. 지금 손에 닿는 느낌도 있고, 엉덩이에 닿는 느낌도 있고, 기억이 떠오르고, 생각이 떠오르고, 보이고 들린다. 이런 것들이 자기 육신을 중심으로 벌어지니까 나라고 아는 것 아닌가. 나도 똑같이 그렇게 떠오른다. 당신이 떠오르는 것과 내가 떠오르는 것은 똑같다. **내용물만 다를 뿐이다.** 당신은 저쪽 사람을 보고 있을 수 있고, 나는 뒤에 건물을 보고 있을 수 있다. 당신은 엉덩이 닿는 느낌을 느끼고, 나는 손에 닿는 느낌을 느끼고 있다. 당신은 지나간 과거를 떠올리고, 나는 미래의 것을 걱정하면서 생각하고 있을 수 있다. **내용이 다르다. 그러나 일어나는 건 똑같다.**\n\n---\n\n##", "source": "essay"}, {"id": "essay_59_d772e3cf82", "text": "닿는 느낌을 느끼고 있다. 당신은 지나간 과거를 떠올리고, 나는 미래의 것을 걱정하면서 생각하고 있을 수 있다. **내용이 다르다. 그러나 일어나는 건 똑같다.**\n\n---\n\n#### **나라는 느낌은 누구나 똑같다**\n\n기억의 맥락이 이어지기 때문에 나라는 주체가 느껴진다. 내가 살아온 기억의 맥락이 쭉 이어질 것으로 예상되니까, 지금 이 맥락 속에 있는 현재의 것을 나라고 느끼는 것이다. 만약 내가 자고 있는 사이에 누군가 당신의 기억을 내 안에 심어놨다면, 나는 그것을 나라고 생각할 것이다. 당신이 지금 당신이라고 느끼는 것을, 나는 그걸 나라고 느낄 것이다. 치매 환자는 그 맥락이 끊긴다. 옛날 것을 모르는 게 아니라, 맥락적으로 끊기는 것이다. 10살 때 기억이 났다가, 갑자기 5살 때 기억이 났다가. 이어지지 않으니까 나라는 주체의 일관성이 없어진다. 그런데 나라는 느낌 자체는 **내부 고유 감각** 에서 올라오는 것이다. 지금 엉덩이에 뭔가 닿고 있고, 보고 있고, 듣고 있고 — 이 시점에서 이것을 나라고 그냥 느끼는 것이다. 멍하게 보고 있을 때는 거기에 나라는 느낌이 없다. 잠잘 때도 이 느낌이 없다. 나라고 생각하니까 나라는 느낌이 있는 것이다. 세 살 때도 느낌은 고대로 있었다. 열흘 전에도, 10년 후에도 고대로 있을 것이다. 기억은 없어도 **느낌은 똑같이** 있다. 다음 생에 뿅 하고 태어나도, 지금의 나라는", "source": "essay"}, {"id": "essay_60_f447f52d9f", "text": "이다. 세 살 때도 느낌은 고대로 있었다. 열흘 전에도, 10년 후에도 고대로 있을 것이다. 기억은 없어도 **느낌은 똑같이** 있다. 다음 생에 뿅 하고 태어나도, 지금의 나라는 느낌과 그때의 나라는 느낌이 다르겠는가. 같을 것이다. 전생에도 똑같이 있었을 것이다. **나라는 느낌은 누구나 다 똑같다.** 내가 느끼는 나나, 당신이 느끼는 나나, 나라는 느낌은 똑같은 것이다. 분리된 게 아니다. 내용물은 맨날 바뀐다. 지금은 산을 보고 있다가, 조금 있으면 건물을 볼 수도 있다. 지금 손의 느낌이 있지만, 곧 엉덩이 느낌을 느낄 수 있다. 당신도, 나도 내용물은 그렇게 계속 바뀐다. 그런데 그 내용물을 지금 느끼고 있다는 **느낌** 은 지금 여기에 있다. 나도 똑같이 느낀다. 기계적으로 느끼는 것이 아니다. 나라는 것은 똑같다는 거다. 그러니까 나라는 느낌이 **모든 것에 다 있다** . 다른 존재들에게도 나라는 느낌이 다 있을 것이다. 그 나라는 느낌이 하나다. 그것은 분리된 것이 아니다.\n\n---\n\n#### **온통 나다**\n\n내용물은 바뀐다. 보고 듣고 냄새 맡은 것들이 쌓인 것이 기억이다. 내 시점에서 본 것뿐이다. 내용물이 다르다고 해서 '이건 나다, 아니다' 말할 수 없다. 나도 계속 내용물이 바뀌고 있으니까. 살아오면서 내용은 계속 바뀌었다. 그것을 내가 일관성 있게 알고 있느냐 모르느냐의 차이일 뿐이다. 나라는 것이", "source": "essay"}, {"id": "essay_61_f6935df2d9", "text": "나다, 아니다' 말할 수 없다. 나도 계속 내용물이 바뀌고 있으니까. 살아오면서 내용은 계속 바뀌었다. 그것을 내가 일관성 있게 알고 있느냐 모르느냐의 차이일 뿐이다. 나라는 것이 이 모든 것에서 드러나고 있다. 나한테서 드러나는 당신, 나한테서 드러나는 이 육신, 구름도, 세상의 모든 것이 나한테서 드러난다. 세상에 70억 명이 있으면 **70억 개의 나만 있는 것이다.** 이것을 재생하고 있는 사람은 나니까. 내 세상에서는 사실 나밖에 없는 것이다. 물질이면 물질, 하늘의 별이면 별까지 **확장해서 본다면** , 그것들이 온통 다 **나** 가 되는 것이다. 그게 온통 나다.\n\n\\#관계맺음 \\#대승이타행 \\#나라는느낌 \\#매듭비유 \\#온통나\n\n**\\--- (구분선)**\n\n\\[파일명: 관계속의나\\_연기성\\_가변성\\_수필.md\\]\n\n### **관계속의나\\_연기성\\_가변성\\_수필**\n\n#### **나는 가변적이다**\n\n나라는 좌표 자체를 없애야 된다는 게 아니다. 완전히 없애고 무아(無我)로 해서 우주적인 관점을 얻어야 된다는 것이 아니다. **나는 나가 분명히 있고 너는 너가 분명히 있다.** 그냥 '너가 나이고 난 너이고 아무것도 아니다'가 아니다. 그런데 **나라는 것이 가변적** 이라는 거다. 때에 따라서는 내가 너의 관점을 취할 수도 있고, 너도 나의 관점을 취할 수도 있다. 우주가 팽창한다고 할 때 — 한 점이 터지는 게 아", "source": "essay"}, {"id": "essay_62_005d0415e8", "text": "**나라는 것이 가변적** 이라는 거다. 때에 따라서는 내가 너의 관점을 취할 수도 있고, 너도 나의 관점을 취할 수도 있다. 우주가 팽창한다고 할 때 — 한 점이 터지는 게 아니라 공간 자체가 점점 사이가 멀어지는 거다. 풍선에 점이 찍혀 있을 때 바람이 불면 점들이 서로 멀어지듯이. 나에서부터 너가 멀어지는 게 아니라, 서로 같이 멀어지고 있는 거다. 나만을 중심으로 보는 것과 다르다.\n\n#### **관계 속에서 파악된다**\n\n바람도 바람이 부니까 바람이 분다 하는 걸 느끼는 거지, 가만히 있다면 바람을 어떻게 느끼겠는가. **삶은 동적인 형태로서 느껴지는 거다.** 딱 고정된 것으로는 느낄 수가 없다. 삶을 명사로 딱 고정시켜서 바라보니까 잘 와닿지 않는 거다. **관계 속에서 파악되고, 다름 속에서 파악된다.** 이 세상이 전부 빨갛다면 빨간 꽃을 어떻게 인식하겠는가. 꽃이 아닌 다른 많은 색들이 있으니까 꽃을 비로소 꽃으로서 인식한다. **다르다는 거는 배격해야 될 게 아니다.** 나랑 같은 색으로 만들어야 되는 게 아니다.\n\n#### **타자와 나는 둘이 아니다**\n\n얘가 컵이 되려면 내가 얘를 이용해서 물을 마시는 관계가 이루어져야 한다. 내가 여기다 물을 따라 먹지 않는다면 이건 컵도 아니고 아무것도 아니다. **관계 맺음이 일어날 때 비로소 얘는 컵이 되고, 나는 물 마시는 사람이 된다.** 불교에서 연기(緣起)적으", "source": "essay"}, {"id": "essay_63_988a00c29a", "text": "여기다 물을 따라 먹지 않는다면 이건 컵도 아니고 아무것도 아니다. **관계 맺음이 일어날 때 비로소 얘는 컵이 되고, 나는 물 마시는 사람이 된다.** 불교에서 연기(緣起)적으로 — '이것이 있으면서 저것이 있고, 저것이 있으면서 이것이 있다.' 관계가 없다면, 상호작용이 없다면 서로 있어도 그만 없어도 그만이다. 상호작용이 일어날 때 비로소 나는 당신의 남편이고, 당신은 나의 부인인 관계가 드러난다. **대상이 없으면 나도 존재할 수가 없다.** 서양 철학의 이원론적 존재론에서는 존재를 개별적으로 규정 지으려 하니까 답을 못 찾는다. 꽃이 꽃이 되려면 꽃이 아닌 부분이 있기 때문에 꽃으로 드러나는 거다. 그걸 꽃임을 알아보는 뭔가 있으니까 꽃으로 규정 지어진다. 관계로 파악해야 한다.\n\n\\#연기성 \\#관계 \\#가변성 \\#무아 \\#올셀프 \\#타자\n\n**\\--- (구분선)**\n\n\\[파일명: 관점선택\\_보살로대하기\\_수필.md\\]\n\n### **관점선택\\_보살로대하기\\_수필**\n\n#### **먼저 선택해버리는 것**\n\n어떤 상황이 닥친다. 나를 불편하게 만드는 사람이 있다. 나한테 안 좋게 대하는 사람이 있다. 그 사람도 보살이다, 저 사람도 천사다. **내가 그것을 먼저 선택해버리는 것이다.** 그렇게 선택하면, 그 사람이 나에게 안 좋게 대하는 것에서 다른 쪽의 긍정적인 요소가 보이기 시작한다. 직장 상사가 자꾸 못살게 군다. 보살", "source": "essay"}, {"id": "essay_64_61c635e8ca", "text": "그것을 먼저 선택해버리는 것이다.** 그렇게 선택하면, 그 사람이 나에게 안 좋게 대하는 것에서 다른 쪽의 긍정적인 요소가 보이기 시작한다. 직장 상사가 자꾸 못살게 군다. 보살로서 작용한다면 이렇다. '너 여기 있지 말고 네가 할 것을 찾아가라.' 나를 못살게 구는 것이, 직장에 못 있게 만드는 것이 새로운 길을 찾아가게끔 하는 메시지가 된다. 그 **메시지를 읽기 위해서는 그 사람을 보살로 봐야 한다.** 그게 내가 선택하는 것이다.\n\n---\n\n#### **무엇을 원하느냐에 따라 관점이 달라진다**\n\n돈을 벌고 싶다면 만나는 사람을 고객으로 대해야 한다. 어떤 사람이든 고객으로 대하면 돈을 벌 수 있다. 많이 배우고 싶다면 만나는 사람을 선생으로 대해야 한다. 보는 사람마다 선생으로 보면 사람들이 배움의 길로 인도해준다. 나쁜 것을 보여주는 사람은 나쁜 것대로 가르침을 주는 것이고, 좋은 것을 보여주는 사람은 좋은 것대로 가르침을 준다. 나에게 나쁘게 한 것에서도 배울 것을 찾는다. 그것이 **삶을 내가 선택해서 사는 방법이다.** 별것 아닌 것 같지만, 이 **관점 전환** 이 삶을 전혀 다른 방향으로 살게 하는 키포인트가 된다.\n\n---\n\n#### **밀리는 쪽을 보라**\n\n그 사람이 나를 밀어낸다. 그때 밀리는 쪽을 봐야 한다. 밀리는 쪽에 새로운 길이 보일 수도 있다. 그런데 밀리지 않으려고 버티고 저항하면, 새로운 방향", "source": "essay"}, {"id": "essay_65_7554c1bfeb", "text": "**밀리는 쪽을 보라**\n\n그 사람이 나를 밀어낸다. 그때 밀리는 쪽을 봐야 한다. 밀리는 쪽에 새로운 길이 보일 수도 있다. 그런데 밀리지 않으려고 버티고 저항하면, 새로운 방향을 볼 힘도 없어지고 상황에 매여버린다. 지금 상황이 마음에 안 들고 그 사람이 압박을 가한다. 그 상황을 벗어나야 한다. 그런데 안 벗어나겠다고 오히려 저항하면, 다른 길을 찾으라고 밀어내는데 거기서 힘만 빼고 있는 것이다. 누가 알겠는가. 밀어내는 쪽에 새로운 방향이 있는지. 생각이 나면 이렇게 바꾼다. '맞아, 그 사람은 보살이지. 이 보살이 나한테 뭘 가르쳐 주려는 걸까?' **생각의 전환** 을 자꾸 그렇게 해야 한다. 지금 상황을 내가 어떻게 볼 것인가는 내가 선택할 수 있다. 그렇게 선택한 것이 나의 새로운 방향성을 스스로 결정하게 한다. \\#관점선택 \\#보살로대하기 \\#생각의전환 \\#밀리는쪽 \\#삶의주도성\n\n**\\--- (구분선)**\n\n\\[파일명: 관점의확장\\_파도를통과하는여정\\_수필.md\\]\n\n### **관점의확장\\_파도를통과하는여정\\_수필**\n\n#### **파도를 갈아타는 것이 아니다**\n\n삶의 여정을 파도라고 본다면, 지금 나는 파도를 타고 가고 있다. 원하는 쪽으로 갈아타기가 쉽지 않다. 내 운명을 바꾼다, 내 삶의 여정을 바꾼다, 고정된 틀에서 트랙을 바꿔 탄다 — 이것이 쉽지 않을 때, 가장 옳은 방법은 '나'라는 틀에서 벗어나서 *", "source": "essay"}, {"id": "essay_66_30a787f943", "text": "으로 갈아타기가 쉽지 않다. 내 운명을 바꾼다, 내 삶의 여정을 바꾼다, 고정된 틀에서 트랙을 바꿔 탄다 — 이것이 쉽지 않을 때, 가장 옳은 방법은 '나'라는 틀에서 벗어나서 **우주적인 시각으로 통으로 보는 것** 이다. 그렇게 보면 트랙이 전부 우주에 다 놓인 것이나 마찬가지다. 지금 이 여정이 문제가 있다고 느껴지는 것은 비교하고 판단하기 때문이다. 그냥 지금 **파도의 낮은 부분을 통과하고 있는 것** 뿐이다. 그것도 사실 우리 생각이다. 전쟁하는 나라, 굶는 사람들에 비하면 우리는 천국에 있는 것이다. 류이치 사카모토. 70세에 직장암 판정을 받은 세계적인 음악가. 그 사람은 부도 있고 명성도 있다. 그러나 그 삶과 내 삶을 바꿀래 하면 — 안 바꾼다. 지금 내가 아무리 찌질하고 괴로워도. 그러니까 이 자체로 우리는 어떤 **한 시점을 통과하고 있는 것** 뿐이다. 좋은 태이고 나쁜 태이고 그건 아니다.\n\n---\n\n#### **사과를 한 컷씩 보는가, 전체로 보는가**\n\n2차원에서 사과를 한 컷씩만 본다면, MRI처럼 한 장면씩만 보인다. 그런데 시야를 더 넓히면 사과의 한 부분이 보이고, 더 넓히면 사과 전체가 보인다. 지금 이 상황도 마찬가지다. 전체적인 시야로 보면, **내가 지금 어느 사과의 일부분을 보고 있는 시점을 통과하고 있는 것** 뿐이다. 이것은 좋은 것도 아니고 나쁜 것도 아니다. 그냥 통과하고 있는 것인", "source": "essay"}, {"id": "essay_67_95b3376570", "text": ". 전체적인 시야로 보면, **내가 지금 어느 사과의 일부분을 보고 있는 시점을 통과하고 있는 것** 뿐이다. 이것은 좋은 것도 아니고 나쁜 것도 아니다. 그냥 통과하고 있는 것인데, 거기다 온갖 시나리오를 붙이고 울고 웃는 것이다. 그러니까 중요한 것은 트랙을 바꿔 타는 것이 아니다. **시야를 확장하는 것이 중요하다. 관점을 확장하는 것.** 그게 사실은 트랙을 바꿔 타는 것이다.\n\n---\n\n#### **낙엽이 돼서 떨어질 수 있다**\n\n마음이 약해질 때가 있다. '낙엽 하나에 곧 바삭바삭 말라비틀어지고 인생의 끝'인 것 같은. 그럴 때도 전체를 놓지 않고 갈 필요가 있다. 잠재태에 다 있기 때문에, 내가 먹었던 생각, 가졌던 마음, 하루하루 살았던 것들이 다 어딘가에 그대로 있다. 내가 먹었던 삶, 가졌던 마음, 이 패턴이 내가 아닐지언정 누군가 이 패턴을 물려받는다. 나무에 새싹이 나듯이. 그래서 **둘이 아니라고 봐야 한다.** 그래야 내가 기꺼이 낙엽이 되어 떨어질 수 있다. 새로 태어난 이파리와 지금 바삭바삭해지는 나는 둘이 아니다. 죽어서 양분이 되고, 그 양분이 다시 태어나는 것이다. 옆의 이파리도 나랑 둘이 아니다. 지금 잘 나가는 것 같고 부자 같아 보이는 이파리도, 언젠가는 떨어진다. 구멍이 숭숭 뚫린 이파리를 욕해서도 안 된다. 시간이 지나면 나도 저렇게 된다. 하나의 나무로 연결되어 있기 때문에 둘이 아니다.", "source": "essay"}, {"id": "essay_68_1cf638c39c", "text": "부자 같아 보이는 이파리도, 언젠가는 떨어진다. 구멍이 숭숭 뚫린 이파리를 욕해서도 안 된다. 시간이 지나면 나도 저렇게 된다. 하나의 나무로 연결되어 있기 때문에 둘이 아니다. **전체성을 회복하는 것이 이치다.**\n\n---\n\n#### **이치가 드러나는 과정이다**\n\n이치를 깨닫는다기보다는 이치가 실현되는 것이다. **이치가 드러나는 것이다.** 우주 자체가 이치로 이루어져 있다. 미생물에서부터 진화해 인간의 모습으로 살면서, 인공지능을 만들고, 영적으로 수행하면서 — 왜 인간은 이렇게 사는가. 동물은 이치를 모른다. 동물의 세계는 이치를 실현할 수 있는 세계가 아니다. 인간처럼 종이 진화하고 개화되는 것은, 우주에 원래 있던 이치가 자기 자신을 드러내는 과정이다. 새로 아는 것이 아니다. 원래 우주가 이치로 이루어져 있기 때문에, 이치대로 진화하여 이 여정을 살아나가고 있는 것이다. 영성과 지성과 감성이 이치로 하나로 묶여야 한다.\n\n\\#관점확장 \\#파도통과 \\#이치 \\#전체성 \\#둘이아님\n\n**\\--- (구분선)**\n\n\\[파일명: 관조와성찰\\_코칭의본질\\_수필.md\\]\n\n### **관조와성찰\\_코칭의본질\\_수필**\n\n#### **관조가 있어야 성찰이 일어난다**\n\n그냥 보는 것으로는 성찰이 일어나지 않는다. 피상적으로 보는 것이기 때문이다. **관조** 가 되어야 비로소 거기서 **성찰** 이 일어난다. 코칭에서도 마찬가지다", "source": "essay"}, {"id": "essay_69_e3ba065298", "text": "일어난다**\n\n그냥 보는 것으로는 성찰이 일어나지 않는다. 피상적으로 보는 것이기 때문이다. **관조** 가 되어야 비로소 거기서 **성찰** 이 일어난다. 코칭에서도 마찬가지다. 고객이 말할 때 그 말 끝에는 사람의 기본적인 욕구가 숨어 있다. 사람이 얘기하고자 하는 것은 사실 자기 자신의 욕구다. 그것을 보려면 사람의 말 이면에 그것을 **관조** 할 수 있어야 한다. 코치에게 그런 감각이 있어야 한다. 그게 **코칭 프레즌스** 다. 코칭 프레즌스가 일어나야지만 비로소 고객이 자기 언어를 코치에게 비춤으로써, 그 언어를 통해 자기 자신을 성찰하게 된다. 자기 자신에 대한 성찰이 일어나는 것이다. 자기 자신을 관조하고, 거기서 일어난 성찰을 **시적 언어** 로 표현함으로써 다시 알아차림이 일어난다. 관조 → 성찰 → 시적 표현 → 알아차림. 이 순서로 이어진다.\n\n---\n\n#### **성찰을 통해 진정한 앎이 일어난다**\n\n관조를 통해 일어난 성찰. 그 성찰을 통해 비로소 **진정한 앎** 이 일어난다. 우리의 본성이 앎이다. 이 세상 온통이 다 앎이다. 어느 한 곳에도 빠짐없이 앎이 들어있다. 그러니 이렇게 그냥 보이는 것이다. 드러나서 알게 된다. 그런데 왜 이렇게 알려지는 것일까. **사랑** 이기 때문이다. 이것이 나에게 드러나게 된다는 것은, 앎으로써 드러나는 것은, 이 존재 자체가 사랑이기 때문이다.\n\n---\n\n##", "source": "essay"}, {"id": "essay_70_c7f138db77", "text": "그런데 왜 이렇게 알려지는 것일까. **사랑** 이기 때문이다. 이것이 나에게 드러나게 된다는 것은, 앎으로써 드러나는 것은, 이 존재 자체가 사랑이기 때문이다.\n\n---\n\n#### **주관과 객관은 원래 분리된 적이 없다**\n\n주관과 객관이 항시 통으로 드러난다. 따로 분리된 적이 한 번도 없다. 양자물리학에서도 관찰하지 않으면 존재하지 않는다고 한다. 원래 분리가 되지 않은 것이다. 주관이 없으면 객관이 없고, 객관이 없으면 주관이 없다. 분리 속에서는 사랑이 없다. 분리되는데 어떻게 사랑을 하겠는가. **그것을 깨닫는 것이 올셀프를 깨닫는 것이다.**\n\n\\#관조와성찰 \\#코칭프레즌스 \\#앎 \\#주객불이 \\#올셀프\n\n**\\--- (구분선)**\n\n\\[파일명: 괴로운나는없다\\_상황과생각의분리\\_수필.md\\]\n\n### **괴로운나는없다\\_상황과생각의분리\\_수필**\n\n#### **빚이 몇천인 '나'가 있는가**\n\n예를 들어 이런 상황이 있다고 하자. 빚이 몇천 있고, 일거리도 없고, 가족도 다 어려운 처지에 있다. 그렇다면 그 상황 속에 '빚이 몇천인 나'가 있는가. 상황은 있다. 그런데 그 상황들을 엮어서 선을 그었더니 **괴로운 나, 불안한 나** 가 생긴 것이다. 그 상황이 없다는 게 아니다. 그것들을 내가 '괴로운 선'으로 묶어서 괴로운 나라고 규정 지은 것이다. 그 일은 있지만, **그런 나는 없다** .\n\n---\n\n####", "source": "essay"}, {"id": "essay_71_bbc5a12ccc", "text": "것이다. 그 상황이 없다는 게 아니다. 그것들을 내가 '괴로운 선'으로 묶어서 괴로운 나라고 규정 지은 것이다. 그 일은 있지만, **그런 나는 없다** .\n\n---\n\n#### **괴로운 나가 아니라 괴로운 생각이다**\n\n상황을 인식하는 것은 있다. 그런데 그것들을 이어서 연결하고, 그것들로부터 고통을 받아야 하는 '나'라는 것은 실체하지 않는다. 고정된 실체가 없다. '내가 괴롭다'고 하지만, 내가 괴로운 것이 아니다. **괴로운 생각이 있는 것이다.** 그 생각들을 이어놓고는 괴로워하는 나가 있다고, 말은 안 해도 느낌상으로 그렇게 느끼는 것이다. 그렇게 어떤 비련의 주인공이 있다고 생각하고, 그 인물과 나를 자꾸 동일시한다. 그렇게 딱 규정 지어져 버리면, 그다음에 내 눈에 인식되는 것들은 그 규정을 합리화시켜 줄 수 있는 것들뿐이다. 의식은 통으로 있지만 인식은 내가 선택하는 것인데, 그 선택이 이미 규정된 방향으로만 간다.\n\n---\n\n#### **괴로움조차 규정 지은 것이다**\n\n괴롭다는 것도 실은 막연하다. 괴로움의 실체가 따로 있어서 나를 목 조르는 것이 아니다. '이런 상황이 있으면 괴로워야 돼'라고, 그 개념을 내가 받아들인 것이다. 그 상황에 괴로움을 내가 엮은 것이다. 지금 이 순간, 괴로움이 어디 있는가. 앞서 '괴로운 나'가 실체하지 않았듯이, **그 괴로움도 없다** . 내가 그냥 선을 그은 것이다. 그어놓", "source": "essay"}, {"id": "essay_72_1cbc5ea599", "text": "황에 괴로움을 내가 엮은 것이다. 지금 이 순간, 괴로움이 어디 있는가. 앞서 '괴로운 나'가 실체하지 않았듯이, **그 괴로움도 없다** . 내가 그냥 선을 그은 것이다. 그어놓고 '이건 괴로움이다'라고 규정 지은 것이다. 그리고 그렇게 선을 그은 다음에는, 그 행로를 따라가야 하니까, 괴로워야 될 증거를 스스로 수집한다. 엄청나게 다른 많은 일들이 있는데도 불구하고, 그것들 중에서 특정한 것들을 부각시켜 괴로움이라고 규정 짓는 것이다.\n\n---\n\n#### **선을 다르게 그을 여지는 어마어마하게 많다**\n\n같은 상황도 다르게 볼 수 있다. 사업이 완전히 망하거나, 사채업자에게 쫓기거나, 가족이 아픈 것에 비하면, 지금은 그것들이 없다. 누가 크게 아픈 것도 아니고, 대단히 속을 썩이는 것도 아니다. 그것도 어떻게 보면 행복한 것이다. 그것도 물론 '행복'이라고 선을 그어 규정 짓는 것이지만 — 어쨌든 **선을 다르게 그을 여지가 어마어마하게 많이 있다** 는 것이다. 지금 여기 존재하는데, 그 존재 안에서 어디에 선을 긋느냐. 그것이 괴로운 나를 만들기도 하고, 괴로운 나를 지우기도 한다. \\#괴로운나는없다 \\#상황과생각 \\#규정짓기 \\#올셀프 \\#붙들지않음\n\n**\\--- (구분선)**\n\n\\[파일명: 궁리\\_모름과앎의순환\\_수필.md\\]\n\n### **궁리窮理\\_모름과앎의순환\\_수필**\n\n#### **궁리란 무엇인가**\n\n성찰을 다", "source": "essay"}, {"id": "essay_73_ff9f8cbbf5", "text": "않음\n\n**\\--- (구분선)**\n\n\\[파일명: 궁리\\_모름과앎의순환\\_수필.md\\]\n\n### **궁리窮理\\_모름과앎의순환\\_수필**\n\n#### **궁리란 무엇인가**\n\n성찰을 다른 언어로 정리해보면 \\*\\*궁리(窮理)\\*\\*가 된다. 궁(窮)의 이치를 생각하는 것이다. 궁리라는 것은 **움** 이기도 하고 \\*\\*공(空)\\*\\*이기도 하다. 궁의 자리가 **공의 자리** 이기도 하고 **모름의 자리** 이기도 하다. **심심함** 의 자리이기도 하다. 그런데 그 자리가 바로 **모든 가능성이 내포돼 있는 자리** 다. **모름이 있기 때문에 앎으로 나아갈 수 있는 것이다.**\n\n---\n\n#### **알아버리면 다시 궁리해야 한다**\n\n비로소 뭔가 딱 알아졌다 하면, 이미 알아버렸으니까 더 이상 확장이 안 된다. **개념화** 가 되어버린 것이다. 그러면 다시 궁리해야 한다. 그 개념으로부터 다시 풀려나야 하기 때문이다. 궁의 이치를 깨닫고자 하는 것이 궁리다. 알면 다시 모름으로 돌아가고, 모름에서 다시 앎으로 나아가고. 그 순환이 궁리다.\n\n\\#궁리 \\#모름과앎 \\#공 \\#성찰 \\#순환\n\n**\\--- (구분선)**\n\n\\[파일명: 권위뒤에숨지말라\\_발밑을보라\\_수필.md\\]\n\n### **권위뒤에숨지말라\\_발밑을보라\\_수필**\n\n#### **초월 뒤에 숨으려 하지 마라**\n\n초월이나 추상이 자신의 권위를 세우는 비장의 무기가 되어서는", "source": "essay"}, {"id": "essay_74_b8a4013117", "text": "라\\_수필.md\\]\n\n### **권위뒤에숨지말라\\_발밑을보라\\_수필**\n\n#### **초월 뒤에 숨으려 하지 마라**\n\n초월이나 추상이 자신의 권위를 세우는 비장의 무기가 되어서는 안 된다. **초월 뒤에 숨으려 하지 마라. 초월로 숨기려 하지 마라.** 예술가도 마찬가지다. 추상 뒤에 숨으려 하지 말고, 추상으로 숨기려 하지 마라. 진리리는 누구나 접근 가능해야 한다. 너무나 쉬워서 손을 뻗어 코를 만지듯이 알 수 있어야 진짜 진리다. 그것을 넘어서는 무언가는 진리라고 할 수 없다.\n\n---\n\n#### **특수한 것을 보편화시킨 역사**\n\n저마다 가슴속에 있는 신은 다 다른 신일 수 있다. 권위적으로 들은 말을 빼고, 정말 자신 안에서 만나는 신이 누구에게나 통할 수 있는 보편적인 신인가. 그것을 한번 물어봐야 한다. 일신이라는 것은 굉장히 특수한 것이다. **그 특수한 일신을 보편화시키는 과정** 이 중세의 전반적인 흐름이었다. 특수한 것을 보편이라고 강제하는 과정에서 십자군 전쟁도 일어나고, 이단 싸움도 일어났다.\n\n---\n\n#### **발밑을 보라**\n\n불교에서 말한다. 조고각하(照顧脚下). 발밑을 살펴라. 하늘의 별을 보지 말고 내 발밑을 보라. 나 스스로도 살면서 이것을 늘 견제한다. 초월이나 추상 뒤에 숨고 싶어지는 마음을. 높은 것을 말하고 싶은 마음을. 그때마다 발밑으로 눈을 돌린다. 지금 서 있는 이 자리로. \\#권", "source": "essay"}, {"id": "essay_75_02ab7e5727", "text": "스스로도 살면서 이것을 늘 견제한다. 초월이나 추상 뒤에 숨고 싶어지는 마음을. 높은 것을 말하고 싶은 마음을. 그때마다 발밑으로 눈을 돌린다. 지금 서 있는 이 자리로. \\#권위뒤에숨지말라 \\#조고각하 \\#발밑 \\#특수의보편화 \\#진리의접근가능성\n\n**\\--- (구분선)**\n\n\\[파일명: 그냥알고받아들임\\_나무와경계\\_수필.md\\]\n\n### **그냥알고받아들임\\_나무와경계\\_수필**\n\n#### **두 가지 마음, 하나의 작동**\n\n우리 마음에는 두 가지 측면이 있다고 말해왔다. **그냥 아는 마음** 과 **온전히 받아들이는 마음** . 그런데 이 둘은 별개가 아니다. 한 마음의 두 가지 측면이다. 창밖에 나무가 있다. 그 나무를 본다. 애써서 보려 하지 않아도 나무가 저기 있구나, 하고 **그냥 알아진다** . 그리고 그 나무의 형태 그대로가 나에게 드러난다. 그 모습 그대로 받아들여지고 있다는 것이다. 그것이 **온전히 받아들여짐** 이다. 이 두 가지는 바깥에 있는 나무를 볼 때만 작동하는 것이 아니다.\n\n---\n\n#### **안에서 올라오는 것도 마찬가지다**\n\n내 안에서 화가 올라왔다. 두려움이 올라왔다. 그것이 올라왔다는 것을 나는 안다. **그냥 안다.** 애쓰지 않아도, 막으려 하지 않아도, 이미 알아진다. 그리고 화면 화, 두려움이면 두려움, 그 모습 그대로 나에게 드러난다. 이미 내가 거부하거나 취하려 하기 이전", "source": "essay"}, {"id": "essay_76_b19cad7594", "text": "그냥 안다.** 애쓰지 않아도, 막으려 하지 않아도, 이미 알아진다. 그리고 화면 화, 두려움이면 두려움, 그 모습 그대로 나에게 드러난다. 이미 내가 거부하거나 취하려 하기 이전에, 그것이 드러났다는 것 자체가 두 가지 마음이 작동하고 있다는 증거다. 그다음에 이 생각은 싫어, 이 감정은 안 느끼고 싶어, 하는 것은 그 차후의 얘기다. 내가 무슨 의도를 내서 이 생각을 하지 말아야지, 하더라도 그것으로 이미 드러난 것이 사라지거나 바뀌지는 않는다. **그냥 알고 온전히 받아들이는 것, 그것은 이미 일어나고 있다.**\n\n---\n\n#### **경계조차도 그 안에 있다**\n\n방 안을 둘러본다. 컵이 있고, 그릇이 있고, 책상이 있다. 그것들이 그냥 보여진다. 온전히 받아들여지고 있다. 집 밖으로 나가면 산의 나무도, 저 머나먼 하늘의 별도 그냥 알아지고 온전히 받아들여진다. 왜 그럴까. 그것들도 **우리 마음 안에서 일어나고 있기 때문이다.** 만약 우리 마음과 전혀 관계가 없다면 그것들이 어떻게 그냥 알아지겠는가. 더 놀라운 것은 여기서부터다. 내가 안이라고 생각했던 그 경계, 즉 육체조차도 그냥 알고 온전히 받아들여지고 있다. 차가운 것을 감각했다는 것은 차가움을 알고 온전히 받아들인 것이다. 통증이 일어났다는 것도 그렇다. **안과 밖을 나누는 그 경계조차도 이 마음 안에서 드러나고 있다.**\n\n---\n\n#### **나타났다 사라지", "source": "essay"}, {"id": "essay_77_4bab560340", "text": "가움을 알고 온전히 받아들인 것이다. 통증이 일어났다는 것도 그렇다. **안과 밖을 나누는 그 경계조차도 이 마음 안에서 드러나고 있다.**\n\n---\n\n#### **나타났다 사라지는 것들, 그리고 안 사라지는 것**\n\n생각도 일어났다 사라진다. 감정도, 느낌도, 통증도 일어났다 사라진다. 자동차가 지나가는 것도 나타났다 사라지는 연속이고, 별빛이 깜빡이는 것도 내 안에서 나타났다 사라진다. 어제도 내 안에서 나타났다 사라졌고, 오늘도 그렇다. 내일이 있다면 내일도 그럴 것이다. 그렇다면 유일하게 안 사라지는 것은 무엇인가. **그걸 아는 것.** 그냥 아는 마음과 온전히 받아들여지는 그 마음. 그것은 항시 그냥 있다. 그것이 우리의 본성이다. 우주조차 거기서 나타났다 사라진다. 깊은 잠에 들면 내가 없어진다. 그러다 아침이 되면 세상도 나타나고 나도 나타난다. 그렇게 나타날 때, 그것은 어떻게 나타나는가. **그냥 알아지고 온전히 받아들여지고 있다는 그 상태 위에서 나타난다.**\n\n---\n\n#### **이미 베이스로 깔려 있다**\n\n우리가 그 상태를 얻으려고 애쓰지 않아도, 그것은 이미 베이스로 깔려 있다. 따로 노력하지 않아도, **그냥 아는 마음과 온전히 받아들이는 마음은 이미 작동하고 있다.** 그러니 안심할 수 있다. 나는 온전히 받아들여지고 있다. 내 안에서 올라오는 모든 것도 다 온전히 받아들여지고 있다. 내가 짜증을 내거", "source": "essay"}, {"id": "essay_78_f7062809a0", "text": "받아들이는 마음은 이미 작동하고 있다.** 그러니 안심할 수 있다. 나는 온전히 받아들여지고 있다. 내 안에서 올라오는 모든 것도 다 온전히 받아들여지고 있다. 내가 짜증을 내거나, 화를 내거나, 욕을 하거나, 아무리 난리를 쳐도, 그것은 그대로 알아진다. 만약 온전히 받아들이지 않는다면, 화를 냈는데 기쁜 모습으로 받아들여지는 일이 벌어질 것이다. 그런데 그렇지 않다. 화는 화 그대로 지금 여기서 온전히 드러나고 있다. **이미 우리가 이것을 베이스로 쓰고 있다는 것, 그것이 진짜 안심이다.** \\#그냥아는마음 \\#온전히받아들임 \\#올셀프 \\#본성 \\#SSF\n\n**\\--- (구분선)**\n\n\\[파일명: 기본값\\_흐름의이해\\_수필.md\\]\n\n### **기본값\\_흐름의이해\\_수필**\n\n#### **비어 있음이 기본값이다**\n\n비어 있음을 우리 삶의 **기본값** 으로 받아들이면, 우울함이나 공허함이 와도 두려워할 필요가 없다. 이상한 상태가 아니기 때문이다. 기본값이라는 것은 당연한 것이다. 우리는 비어 있음을 이상한 상태라고 느끼기 때문에 왜곡되게 생각한다. 거기서 우울증 같은 것들이 생긴다. '이런 것은 당연한 거야'라고 받아들일 수 있다면, 그것이 와도 맞이할 수 있다. **모호함** 도 마찬가지다. 뭔가 확실하길 바라고, 답이 있기를 바라지만, 삶에 딱 떨어지는 답은 없다. 바람이 가는 곳이 어디 있는가. 바람이 머무는 곳이 어", "source": "essay"}, {"id": "essay_79_ed6ffb7dd5", "text": "맞이할 수 있다. **모호함** 도 마찬가지다. 뭔가 확실하길 바라고, 답이 있기를 바라지만, 삶에 딱 떨어지는 답은 없다. 바람이 가는 곳이 어디 있는가. 바람이 머무는 곳이 어디 있는가. 바람은 그냥 계속 흐르는 것이고, 물도 계속 순환한다. **삶 자체가 흐름의 연속이다.** 고정된 나의 모습, 확실한 나의 위치, 변하지 않는 재산. 그것들이 딱 있기를 바라지만, 그렇게 될 수 없다.\n\n---\n\n#### **역동의 원천이 비어 있음이다**\n\n흐름의 연속이고 끊임없이 역동적으로 변한다는 것을 받아들이면 이렇게 된다. **역동이 일어나게 하는 원천이 비어 있음** 이라는 것이 보인다. 빔이 있기 때문에 차이가 발생한다. 차이 때문에 움직임이 생기고, 삶의 역동이 생긴다. 그래서 **비어 있음이 곧 신의 사랑** 이라고 할 수 있다. 빔이 없으면 차이도 없고, 차이가 없으면 역동도 없다. 삶이 흐르지 못한다. 그것을 받아들이지 않으니 고립감을 느끼고, 외로움이나 우울함이 찾아오는 것이다. 비어 있음을 두려운 것, 잘못된 것으로 볼 때, 우리는 삶의 흐름과 싸우게 된다. \\#기본값 \\#비어있음 \\#흐름 \\#역동성 \\#신의사랑\n\n**\\--- (구분선)**\n\n\\[파일명: 기억과감정\\_분리\\_수필.md\\]\n\n### **기억과감정\\_분리\\_수필**\n\n#### **지금 느끼고 있느냐가 중요하다**\n\n생각과 기억과 감정은 분리해야 한다. 기억이", "source": "essay"}, {"id": "essay_80_160c2cdd27", "text": "파일명: 기억과감정\\_분리\\_수필.md\\]\n\n### **기억과감정\\_분리\\_수필**\n\n#### **지금 느끼고 있느냐가 중요하다**\n\n생각과 기억과 감정은 분리해야 한다. 기억이 떠올랐을 때, **지금 내가 그것을 느끼고 있느냐 아니냐** — 그 지금의 상태가 중요한 것이다. 코칭에서도 마찬가지다. 지금 무엇을 느끼고 있는가가 중요하다. 과거의 스토리가 중요한 것이 아니다. 스토리 내용은 얼마든지 교체될 수 있다. 내가 본 것은 사건의 일면이고, 다른 사람이 보면 또 다르게 볼 수 있다. 그러니 스토리 내용이 아니라 **지금 이 순간의 기분 상태, 마음 상태, 감정** 이 중요하다.\n\n---\n\n#### **과거의 스토리를 달리 하려 하지 않는다**\n\n'그때 네가 그렇게 생각한 건 잘못한 거야', '그때 네 판단은 틀린 거야', '그때 사과했어야지'. 이런 것은 아무 소용이 없다. 스토리의 해석은 보는 사람마다 다르다. 당사자도 생각 하나 바뀌면 그게 그렇게 큰 일이 아닐 수 있다. 그것만이 정석인 해석이 아니기 때문에, 굳이 '그거가 맞다 틀리다' 혼자 끙끙댈 필요도 없고, 상담을 받아 옳고 그름을 따질 필요도 없다. 상담을 받는다는 것 자체가 과거의 생각과 감정에 끄달리고 있다는 뜻이다. 그로부터 벗어나기 위해 타당성이나 위로를 찾으려 시간과 노력을 들이지 말고, 그냥 지금 이 떠오르는 생각과 감정을 바라보면 된다. 이 생각은 없어", "source": "essay"}, {"id": "essay_81_3c43601ef2", "text": "감정에 끄달리고 있다는 뜻이다. 그로부터 벗어나기 위해 타당성이나 위로를 찾으려 시간과 노력을 들이지 말고, 그냥 지금 이 떠오르는 생각과 감정을 바라보면 된다. 이 생각은 없어지지 않으면 그냥 남아 있는 것이고, 감정은 그때 느낀 것인데 **지금의 내가 이 감정을 가지고 있을 필요가 있나 없나** — 그렇게 바라보는 것이다.\n\n---\n\n#### **감정의 찌꺼기를 다시 담지 않는다**\n\n지금 느끼고 있는 감정에다가 옛날에 느꼈던 감정의 찌꺼기를 다시 담을 필요가 없다. **지금 내 감정에 과거 감정을 올려놓지 않는 것이다.** 좋았던 기억은 상큼한 과일을 받은 기분으로 받아도 된다. 그러나 안 좋은 감정은 냄새나는 물건이다. 굳이 가지고 있지 말고, 지나가게 두면 된다. 분리시키면 저절로 사라진다. **감정은 흐르는 것이다.** 흐르는 에너지를 주지 않으면 자연적으로 사라진다. 붙들지 않으면 흘러간다.\n\n\\#기억과감정 \\#분리 \\#지금이순간 \\#감정은흐른다 \\#놓아두기\n\n**\\--- (구분선)**\n\n\\[파일명: 기준점과지족\\_이만하면됐다\\_수필.md\\]\n\n### **기준점과지족\\_이만하면됐다\\_수필**\n\n#### **기준점을 픽스하면 불만족이 대부분이다**\n\n내가 기준을 딱 고정해 놓으면 어떻게 되는가. '나는 이 정도는 돼야 행복한데.' 그런데 삶의 조건은 내 기준점과 일치하는 순간이 극히 드물다. 외부 조건과 환경은 출렁거리는", "source": "essay"}, {"id": "essay_82_aa52a91db0", "text": "*\n\n내가 기준을 딱 고정해 놓으면 어떻게 되는가. '나는 이 정도는 돼야 행복한데.' 그런데 삶의 조건은 내 기준점과 일치하는 순간이 극히 드물다. 외부 조건과 환경은 출렁거리는데, 내 기준점은 고정돼 있다. 그 둘이 크로스되는 순간은 잠깐이다. 나머지 대부분의 시간은 불만족이다. 행복해지고 싶다면 방법은 두 가지다. 기준점을 아예 없애버리거나, 아니면 수시로 기준점을 바꿀 수 있어야 한다. 상황이 안 좋을 때, 상대방이 기대에 못 미칠 때, 기준을 오히려 낮추면 다시 행복해진다. **기준점이 고정될수록 이길 수 없는 싸움을 계속하는 것이다.**\n\n---\n\n#### **주장자를 놨다 잡았다 할 수 있어야 한다**\n\n선방에서 스님이 주장자를 든다. 하지만 잠잘 때는 내려놓는다. 놨다 잡았다를 마음대로 할 수 있어야 한다. 불만족을 동기로 삼을 수 있다. 그 불만족이 자기계발의 연료가 된다. 그러나 거기에 매여버리면 안 된다. 통 안에도 들어갈 수 있고, 통 바깥으로 나올 수도 있어야 한다. 통 안에서 통을 키우는 것만이 행복이라고 고정해서는 안 된다. **기준점을 가지고 세상을 재단하고 잣대를 들이밀면, 그 안경을 쓰고 세상을 바라보는 것이다.** 고정불변하게 붙들고 있으니까 싸움이 끝나지 않는 것이다.\n\n---\n\n#### **이만하면 됐다 — 지족(知足)**\n\n결국 행복은 여기에 닿는다. **지족(知足).** 족함을 아는 것. 만족", "source": "essay"}, {"id": "essay_83_f160beb835", "text": "게 붙들고 있으니까 싸움이 끝나지 않는 것이다.\n\n---\n\n#### **이만하면 됐다 — 지족(知足)**\n\n결국 행복은 여기에 닿는다. **지족(知足).** 족함을 아는 것. 만족스럽다는 것은 내 기준에 만족스럽다는 것이다. 불만족이 생길 때도 '아, 이만하면 됐다'고 할 수 있는 것. 집도 없던 시절에 비하면, 지금 이만하면 된 것 아닌가. 기준을 그리로 옮기면 된다. 이것은 포기가 아니다. 기준점을 자유롭게 다루는 것이다. 놨다 잡았다. 높였다 낮췄다. 그 유연함이 삶을 이길 수 없는 싸움에서 건져낸다.\n\n\\#지족 \\#기준점 \\#행복 \\#주장자 \\#조건지어짐\n\n**\\--- (구분선)**\n\n\\[파일명: 깎는명상\\_결핍에서온전함으로\\_수필.md\\]\n\n### **깎는 명상, 결핍에서 온전함으로**\n\n#### **결핍을 전제로 한 삶**\n\n요즘 젊은 사람들이 많이 힘들다. 그 원인 중 하나는 자기 자신을 결핍된 상태로 인식하기 때문이다. 뒤처져 있다, 부족하다, 제대로 성장하지 못했다 — 그래서 지금의 상태가 아닌 다른 상태가 되기를 추구한다. 그런데 결핍을 전제로 하면 어떤 조건이 채워져도 결핍이 해소되지 않는다. 이게 채워지면 저게 또 비어 보인다. 남과 비교하면 완벽할 수 없다. 좋은 차를 타는 사람을 자전거로 쫓아가려 하면 영원히 따라잡을 수 없다. **그런데 자전거는 차가 갖지 못한 것이 있다.** 차가 들어갈 수 없는 골목길을", "source": "essay"}, {"id": "essay_84_b26ba643c4", "text": "교하면 완벽할 수 없다. 좋은 차를 타는 사람을 자전거로 쫓아가려 하면 영원히 따라잡을 수 없다. **그런데 자전거는 차가 갖지 못한 것이 있다.** 차가 들어갈 수 없는 골목길을 갈 수 있고, 체력이 단련된다. 그것이 결핍이 아니라 자전거만의 가능성이다. 예민하다는 것도 마찬가지다. 강한 쪽과 비교하면 결여처럼 보이지만, 섬세함을 다루는 쪽에서는 오히려 강한 사람보다 나을 수 있다. **메워야 하는 구멍이 아니라 펼쳐나갈 가능성이다.**\n\n---\n\n#### **온전함은 완전함이 아니다**\n\n내 안에서 올라오는 것, 나를 둘러싼 이것에 온전함이 있다는 것을 확인하게 되면 자신감이 생긴다. 여기서 온전하다는 것은 완전하다는 것이 아니다. 내가 예민해, 좀 약해 — 그거 자체가 온전한 것이다. **온전하게 예민한 것이지, 강함에 대한 결핍이 아니다.** 화가 올라오면 이거는 나쁜 것이다, 수행을 했는데 아직도 화가 올라오네 이러면 안 되는 거 아니야 — 이 전제 자체가 잘못됐다. 내 안에서 올라오는 뜨거운 에너지일 수 있다. 기분이 나쁠 때 올라오면 화로 느껴지고, 기분이 좋을 때 같은 에너지가 올라오면 다르게 느껴진다. 상황에 따라 올라온 것이니 상황이 바뀌면 사라진다. 그런데 그것을 화라고 규정 짓고 이유를 찾고 방법을 찾으면, 그 명칭이 떠오를 때마다 다시 올라온다. **명칭을 상대하고 있는 것이다.** 외로움도 마찬가지다. 올라오", "source": "essay"}, {"id": "essay_85_53c0819fe9", "text": "사라진다. 그런데 그것을 화라고 규정 짓고 이유를 찾고 방법을 찾으면, 그 명칭이 떠오를 때마다 다시 올라온다. **명칭을 상대하고 있는 것이다.** 외로움도 마찬가지다. 올라오는 느낌을 그냥 느껴버리면 통과한다. 화가 나를 통과해서 간다. 에너지 흐름이기 때문에 잡을 수 없다. 고통받는 사람은 그 에너지를 잡고 있는 것이다. 그 상황을 계속 상기하고, 화라는 명칭을 기억에 덧붙여서 에너지를 계속 쏟고 있는 것이다.\n\n---\n\n#### **강한 감정이 기억을 강화시키는 이유**\n\n호랑이를 만났을 때 아드레날린이 솟구쳐야 싸우거나 도망가는 결정을 내릴 수 있다. 그 강렬한 감정이 기억을 강화시킨다. 다음에 호랑이를 만났을 때 살아남기 위해서다. 반면 길을 가다 고양이를 만나면 강하게 기억할 필요가 없다. 그냥 넘어간다. **강한 감정은 기억을 강화시키기 위한 생존 메커니즘이다.** 그런데 그 메커니즘이 일상의 관계에서도 작동하면 문제가 된다. 화를 낼수록 그 기억이 더 강력해진다. 그래서 자꾸 떠오른다. 그런데 그것을 화라고 규정 짓고 나는 이러면 안 되는 사람인데 하고 자책하면, 그 규정이 나를 더 묶는다.\n\n---\n\n#### **과거의 규정에서 벗어나기**\n\n부모가 한 말, 선생님의 평가, 직장 상사의 판단 — 이것들이 나의 본모습일 수 없다. 그때 그 일면을 본 것이지 전체을 아는 것이 아니다. 그런데 그것을 내가 인정해버리면", "source": "essay"}, {"id": "essay_86_b6a07a4215", "text": "*\n\n부모가 한 말, 선생님의 평가, 직장 상사의 판단 — 이것들이 나의 본모습일 수 없다. 그때 그 일면을 본 것이지 전체을 아는 것이 아니다. 그런데 그것을 내가 인정해버리면 앞으로 나아가는 것이 그 이상을 벗어날 수 없다. 나를 그렇게 규정 지은 것들이 나를 묻고 있었다. 사회적 기준, 남들의 평가, 스스로 만든 규정 — 이것들이 쌓여서 지금의 내가 그 이상이 될 수 없다고 생각하게 만든다. **그런데 그거 이외에 나는 엄청나게 많은 일면이 있다.** 그걸 보는 것이 깎는 명상을 통해서 가능하다. 있는 그대로의 진실을 받아들이지 못했기 때문에 과거의 것을 끌어다 지금과 미래에 투영한다. 깎는 명상의 행위가 과거에 묶였던 관념을 풀어내는 것이다. 지금 여기에 머물면서 그냥 알아지는 마음과 온전히 받아들이는 마음이 함께 작동하면, 과거에 끄달리지 않게 된다. **결핍을 메우려는 삶이 아니라 이미 있는 온전함을 바탕으로 펼쳐나가는 삶 — 깎는 명상은 그 전환의 방편이다.** \\#깎는명상 \\#결핍에서온전함으로 \\#화와감정 \\#과거의규정 \\#온나코칭\n\n**\\--- (구분선)**\n\n\\[파일명: 깎는명상\\_행위자체가명상이다\\_수필.md\\]\n\n### **깎는 명상, 행위 자체가 명상이다**\n\n#### **깎는 행위 자체가 결과다**\n\n깎는 명상을 하면서 잘 깎았네 못 깎았네를 따지면 또 다른 조건 지어짐으로 가는 것이다. 소질이 있네 없네,", "source": "essay"}, {"id": "essay_87_9391262417", "text": "행위 자체가 명상이다**\n\n#### **깎는 행위 자체가 결과다**\n\n깎는 명상을 하면서 잘 깎았네 못 깎았네를 따지면 또 다른 조건 지어짐으로 가는 것이다. 소질이 있네 없네, 재능이 있네 없네 — 이런 식이 된다. 그런데 **깎는 행위 그 자체가 이미 결과다.** 어떤 결과물을 얻으려고 만드는 것이 아니고, 깎는 행위 자체가 결과가 되면 실수라는 것이 없어진다. 칼을 너무 힘을 줬더니 푹 패였다. 이거 잘못했네가 아니다. 칼을 이렇게 잡고 이렇게 힘을 주니까 많이 패이는구나 — 그냥 그렇게 받아들이면 된다. 다음에는 힘과 각도를 조절하면 된다. **이것이 깊어지면 삶을 대하는 태도가 바뀐다.** 발을 헛디뎌서 넘어졌을 때 바보같이 또 넘어졌다고 자책하는 것이 아니라, 넘어졌네 일어나서 옷 털고 걸어가면 된다. 어떤 행동의 결과가 내 마음에 안 들었을 때 나를 자책하거나 움츠러들지 않고, 이런 결과가 나왔네 다음엔 다르게 해볼까 — 이렇게 받아들이는 것이다. 깎는 명상을 통해 그 자세를 몸으로 익히는 것이다.\n\n---\n\n#### **조건 지어짐으로부터 이미 자유롭다**\n\n깎는 명상을 하다 보면 나는 조건과 관계없다는 것을 경험하게 된다. 조건 지어지지 않으려고 애쓰는 것이 아니다. **이미 자유로운 존재임을 알게 된다.** 조건 지어짐으로부터 자유로워지는 것이 아니라, 원래 조건과 관계없었음을 보게 된다. 매일 매일 새롭고, 나는", "source": "essay"}, {"id": "essay_88_32fec77293", "text": "려고 애쓰는 것이 아니다. **이미 자유로운 존재임을 알게 된다.** 조건 지어짐으로부터 자유로워지는 것이 아니라, 원래 조건과 관계없었음을 보게 된다. 매일 매일 새롭고, 나는 그것에 매이는 나가 아니었다. 그런데 생각으로 붙잡고 있었다. 그 생각이 허구였다는 것이 보인다. 나는 그 조건보다 훨씬 크다는 것이 경험된다. AI 시대일수록 얼마나 화려한 경험이 아니라 **얼마나 독특한 경험과 관점이 있느냐** 가 중요해진다. 깎는 명상을 통해 나만의 독특한 관점과 체험을 얻을 수 있다.\n\n---\n\n#### **몸과 마음이 둘이 아니다**\n\n깎는 명상이 강력한 또 다른 이유가 있다. 잘못하면 베인다. 그러니까 손은 깎고 있는데 생각이 딴 데 가 있으면 안 된다. **깎는 행위와 몸과 마음이 항시 함께 있어야 한다.** 그러면 저절로 지금 여기에 현존하게 된다. 아이들이 놀 때를 보면 안다. 놀면서 딴 생각을 하지 않는다. 눈이 반짝반짝 빛난다. 몸과 마음이 지금 여기에 함께 있는 상태다. 온전하다는 것이 그것이다. 그런데 어른들은 지금 하는 행위를 자꾸 목적과 결과로 연결시킨다. 목적과 맞지 않으면 지금을 결핍으로 본다. 태권도 학원에서 스트레스를 많이 받은 아이가 나무를 깎고 나서 스트레스가 다 풀렸다고 했다. 해야 한다는 압박에서 벗어나 그냥 편안하게 깎아보라 하니까 마음의 편안함을 느낀 것이다. **생각을 접어놓고 행위 자체에 몰입", "source": "essay"}, {"id": "essay_89_7f6f6d8667", "text": "이가 나무를 깎고 나서 스트레스가 다 풀렸다고 했다. 해야 한다는 압박에서 벗어나 그냥 편안하게 깎아보라 하니까 마음의 편안함을 느낀 것이다. **생각을 접어놓고 행위 자체에 몰입하면 정신적 스트레스에서 벗어나는 시간이 된다.** 결을 잘 봐야 하고, 힘 조절을 하고, 각도 조절을 하고, 모양을 생각하면서 — 이 행위 자체가 마음을 지금 여기에 계속 데려온다. 마음이 딴 데 배회하면 삶을 제대로 살 수 없다. 깎는 명상은 몸과 마음이 둘이 아님을 경험하는 가장 구체적인 방법이다. 도시에서 지친 사람들이 도끼를 잡고 나무를 깎는 경험을 일상에서 어떻게 하겠는가. 명상적 효과를 넘어 힐링으로서만으로도 충분히 가치가 있다. **깎는 행위 자체가 명상이다. 지금 여기, 몸과 마음이 하나로 있는 이 상태가 온전함이다.** \\#깎는명상 \\#행위자체가명상이다 \\#몸과마음의일치 \\#현존 \\#온나코칭\n\n**\\--- (구분선)**\n\n\\[파일명: 깨어있음\\_자기성찰\\_수필.md\\]\n\n### **깨어있음\\_자기성찰\\_수필**\n\n#### **말에 조종당하는 시대**\n\n지금 세상은 말에 조종당하고, 개념에 조종당하고, 이념에 이용당하고, 광고와 선전과 선동에 조종당한다. 나는 내 뜻대로 판단하고 결정하는 것 같지만, 그 안에는 나도 모르게 무의식적으로 들어온 말들, 개념들, 봐왔던 것들, 편 가르기에 어느새 한쪽 편이 되어버린 것들이 섞여 있다. 이것들이 올", "source": "essay"}], [{"id": "essay_90_ad3f3635ad", "text": "대로 판단하고 결정하는 것 같지만, 그 안에는 나도 모르게 무의식적으로 들어온 말들, 개념들, 봐왔던 것들, 편 가르기에 어느새 한쪽 편이 되어버린 것들이 섞여 있다. 이것들이 올바른 판단을 막는다. 그래서 **깨어있는 정신** 이 중요하다. 너무 많은 정보에 노출되고, 너무 많은 의견과 개념들이 쉴 틈 없이 옥죄어 오는 지금 이 시대에는 특히 더 그렇다.\n\n---\n\n#### **이치에 맞는 말인가**\n\n말이라는 것은 이치다. 이치에 맞는 말이라야 법이고 진리다. 그런데 우리는 말의 내용보다 말을 한 사람을 본다. 권위 있는 학자가 했으니까, 힘을 가진 정치가가 했으니까, 내가 지지하는 사람이 했으니까—그것만으로 그 말을 옳다고 받아들인다. 내가 지지하는 사람이라도 진리에 어긋난 말을 하면 지적할 수 있어야 한다. 어떻게 한 사람의 모든 것을 지지할 수 있겠는가. 정당도, 학문도 마찬가지다. 옛말에 훌륭한 제자는 스승을 넘어서야 한다고 했다. 내가 지지하는 정치인의 일거수일투족까지 다 옳다고 해버리면, **그게 맹신이 된다** . 맹신은 지지하는 사람도 망치고, 나 자신도 잘못된 판단으로 피해를 입고, 우리가 함께 이루는 공동체에도 그대로 피해가 간다. 그래서 판단할 때 제삼, 제사 숙고하면서 **내가 쓰는 언어, 내가 봐왔던 정보, 믿었던 것들을 계속 검증하는 작업이 필요하다** . 정보가 난무하고 주장과 의견이 넘쳐나는 세상에서는", "source": "essay"}, {"id": "essay_91_d507d366f3", "text": "서 판단할 때 제삼, 제사 숙고하면서 **내가 쓰는 언어, 내가 봐왔던 정보, 믿었던 것들을 계속 검증하는 작업이 필요하다** . 정보가 난무하고 주장과 의견이 넘쳐나는 세상에서는 더욱더 그렇다.\n\n---\n\n#### **성찰이란 무엇인가**\n\n깨어있다는 것은 \\*\\*성찰(省察)\\*\\*이다. 살필 성(省), 살필 찰(察). 내가 알고 있는 것, 믿고 있는 것에 자꾸 되물어보는 것이다. '이게 맞나? 이게 진리에 부합하는가? 객관적인 사실인가?' 그리고 '이 사람의 얘기가 어느 한 편의 얘기가 아니라, 세상을 이끌어가는 데 있어서의 바른 진리인가?' 편을 넘어선 관점이 필요하다. 우리가 대표로 뽑는 사람은 편을 넘어선 사람이어야 한다. 편을 가르는 사람이 어떻게 전체의 대표가 될 수 있겠는가. 이 사람이 편을 가르는 사람이냐, 편을 넘어선 사람이냐—그것이 아주 명확한 기준이 되어야 한다. 그런데 여기서 중요한 것이 있다. **깨어있는 시민의식이란 남이 옳으냐 그르냐를 따지는 것이 아니다.** 먼저 **나 자신에 대한 성찰** 이어야 한다. 내가 세우는 기준에 대해서도 다시 성찰해봐야 한다. 나는 성찰 안 하고 다른 것만 비판적으로 간다—이것은 아니다. **선입관이나 편견 없이** 나의 생각과 관념, 외부에서 들어오는 정보들을 되짚어보고 또 되짚어보는 것. 그게 깨어있는 것이다. **성찰을 하느냐 못 하느냐, 그걸 보면 된다.** 깨어있지", "source": "essay"}, {"id": "essay_92_0d8bd50724", "text": "이나 편견 없이** 나의 생각과 관념, 외부에서 들어오는 정보들을 되짚어보고 또 되짚어보는 것. 그게 깨어있는 것이다. **성찰을 하느냐 못 하느냐, 그걸 보면 된다.** 깨어있지 못한 사람은 성찰이 안 된다.\n\n---\n\n#### **추종자들이 역사를 망친다**\n\n비판 의식이 없다면 그것은 추종의 무리일 뿐이다. 역사를 망친 것들이 다 그런 사람들이었다. 히틀러도, 공산주의도—일개인이 그것을 혼자 바꾼 것이 아니다. **추종자들 때문에 망가지는 것이다.** 따라주는 무리가 있었기 때문이다. 결국 **무리들의 반영이 독재자** 다. 이것이 자기 성찰이 무엇보다 앞서야 하는 이유다. 성찰하지 않는 개인이 쌓이면, 성찰하지 않는 공동체가 된다. \\#깨어있음 \\#자기성찰 \\#편견과맹신 \\#시민의식 \\#비판적사고\n\n**\\--- (구분선)**\n\n\\[파일명: 끌어당김의한계\\_균형과행동\\_수필.md\\]\n\n### **끌어당김의한계\\_균형과행동\\_수필**\n\n#### **끌어당김의 법칙을 따르는 사람들**\n\n요즘 끌어당김의 법칙을 추구하는 사람들이 많다. 그런데 들여다보면 이상한 구조가 보인다. 끌어당김의 법칙을 전파하고 가르치는 사람들은 그것을 통해 실제로 부를 이루고 있다. 그런데 그것을 따라 하는 사람들은 과연 그렇게 되고 있는가. 부를 끌어당긴다고 하면서 아무런 노력 없이 확언을 하고 감사 일기를 쓴다고 해서 그 부가 따라오겠는가. 확언은 한편으", "source": "essay"}, {"id": "essay_93_d3827085fd", "text": "그런데 그것을 따라 하는 사람들은 과연 그렇게 되고 있는가. 부를 끌어당긴다고 하면서 아무런 노력 없이 확언을 하고 감사 일기를 쓴다고 해서 그 부가 따라오겠는가. 확언은 한편으로 보면 그냥 목표다. '한 달에 생각지 않은 돈 천만 원씩 매달 들어온다'—이것은 내가 그러고 싶다는 바람이고 목표를 세우는 것이다. 목표를 잊지 않는 것은 좋다. 그런데 목표를 세웠으면 목표를 향해 어떤 액션을 취해야 한다. 산을 오르고 싶으면 산에 올라야 한다는 것을 잊지 말아야 한다. 산이 끌어당겨져서 내 발밑에 딱 놓이는 것은 아니다.\n\n---\n\n#### **끌어당겼다 한들**\n\n설사 끌어당겼다 해도 그것이 어떤 영향을 미칠지는 아무도 모른다. 정말 그렇게 해서 어마어마한 돈을 벌었다 해도, 그것이 나의 삶의 질이나 행복으로 연결된다는 보장은 아무것도 없다. 인생 새옹지마다. 끌어당김으로 부를 얻었는데, 그 부를 관리할 능력이 없어서 오히려 더 나쁜 나락으로 떨어질 수도 있다. 삶은 어떤 한 단면만으로 행복해질 수 없다. 지성, 감성, 영성—이런 부분들이 골고루 균형을 이루는 삶이 되어야 한다. 부라는 것도, 만약 내가 평생에 걸쳐 받아야 할 부가 있는데 일순간에 확 끌어당겨 버리면, 설사 끌어당겨졌다 한들 나중에 또 그것을 못 받을 수도 있다. 놀이터에서 바이킹을 탔는데 너무 좋았다. 그러면 하루 종일 백 번 천 번 타고 싶어진다. 그러면 그게 과", "source": "essay"}, {"id": "essay_94_d5a0449dd6", "text": "겨 버리면, 설사 끌어당겨졌다 한들 나중에 또 그것을 못 받을 수도 있다. 놀이터에서 바이킹을 탔는데 너무 좋았다. 그러면 하루 종일 백 번 천 번 타고 싶어진다. 그러면 그게 과연 행복한가. 바이킹을 한 번 탔으면 다른 것도 해봐야 한다.\n\n---\n\n#### **더 소중한 것**\n\n중요한 것은 삶을 통해서 내가 무엇을 경험하고, 그 안에서 어떤 배움을 일으키고 성장하느냐 하는 부분이다. 어떤 생각으로 끌어당긴다 해서 그것이 나의 성장과는 관계가 없다. 목표를 잃지 않고 가는 도중에는 엄청나게 많은 시련과 어려움이 있다. 그런데 어려움을 극복하는 과정에서 나의 힘이 더 길러지는 것이고, 능력치가 올라가는 것이다. 어려움을 극복하는 방법을 통해서 내가 성장한다. 그렇게 액션을 하면서 균형점을 잃지 않고 밸런스를 유지하며 가는 것, 그게 소중한 것이다. 우드카빙으로 나무를 깎아서 다리 세 개를 만드는 것을 상상해보라. 하나는 영성, 하나는 지성, 하나는 감성. 이것들이 올바르게 서야 나의 삶이 완성된다. 어느 한 다리가 길면 제대로 서지 못한다.\n\n---\n\n#### **근력은 운동으로만 생긴다**\n\n힘들게 운동을 왜 하는가. 가만히 있으면서 '나의 근육이 붙어라' 하고 끌어당길 수도 있다. 어떻게 해서 조금은 당길 수 있을지 모른다. 그렇다고 해서 그게 체력이나 근력이 늘어나는 것은 아니다. 체력과 근력을 머릿속으로 생각하면서 끌어당길", "source": "essay"}, {"id": "essay_95_a3e095ef81", "text": "' 하고 끌어당길 수도 있다. 어떻게 해서 조금은 당길 수 있을지 모른다. 그렇다고 해서 그게 체력이나 근력이 늘어나는 것은 아니다. 체력과 근력을 머릿속으로 생각하면서 끌어당길 시간에 **운동을 한 번 더 하는 것이 더 합리적이다.** 체력이 좋아지길 원하는데 머릿속으로만 하는 사람은 없다. 지금 끌어당긴다는 것도 그것과 같다. 몸 근력을 키우려면 운동을 하듯이, 마음 근력은 수행을 해야 하고, 지식 근력은 공부를 해야 하고, 지혜의 근력은 직접 노력해야 한다. **그렇게 해서 나의 힘이 커지는 것이 중요한 것이지** , 머리로 무언가를 끌어당기는 것이 중요한 것이 아니다. 행동 없이 끌어당기기만 하는 것은 망상일 가능성이 크다. **불확실한 것에 나의 에너지와 시간을 쏟을 필요가 없다.** 그냥 무작정 끌어당기기만 해서 삶이 행복해질 수는 없다. \\#끌어당김의법칙 \\#행동의중요성 \\#균형잡힌삶 \\#성장 \\#확언의한계\n\n**\\--- (구분선)**\n\n\\[파일명: 끌어당김의함정\\_에고와좌뇌\\_수필.md\\]\n\n### **끌어당김의함정\\_에고와좌뇌\\_수필**\n\n#### **끌어당김의 메커니즘**\n\n끌어당김의 법칙은 구조적으로 보면 이렇다. **좌뇌를 강력하게 강화시켜서** 우뇌에 입력하는 방식이다. 좌뇌가 강하게 시키면 우뇌가 그것을 실체처럼 받아들인다. 화가 났을 때 그 느낌을 생생하게 떠올리면 실제로 아드레날린이 솟고 호르몬이 나오듯이", "source": "essay"}, {"id": "essay_96_c7d846dd1f", "text": "시켜서** 우뇌에 입력하는 방식이다. 좌뇌가 강하게 시키면 우뇌가 그것을 실체처럼 받아들인다. 화가 났을 때 그 느낌을 생생하게 떠올리면 실제로 아드레날린이 솟고 호르몬이 나오듯이, 원하는 것을 이미 가졌다고 느끼게 하면 뇌가 그것을 실제처럼 반응한다는 원리다. 그런데 이 메커니즘에는 심각한 함정이 있다.\n\n---\n\n#### **좌뇌가 주인이 되면**\n\n수행이라는 것은 거꾸로 간다. 좌뇌가 생각하는 것들이 실체가 아니라는 것을 알아가는 과정이다. 그런데 끌어당김의 법칙은 반대다. 좌뇌를 강화시키고, 좌뇌가 생각하는 것이 실체라고 우뇌까지 믿게 만든다. 그렇게 되면 **주도권이 좌뇌한테 가버린다.** 좌뇌는 자기한테 유리한 쪽으로 생각한다. 그것이 에고다. 좌뇌가 강화되고 우뇌까지 그것을 따라버리면, 결국 **에고가 강화** 되는 것이다. 끌어당김의 법칙을 적용해서 원하는 방향으로 행동이 이어진다 해도, 좌뇌가 잘못된 방향을 제시하면 우뇌가 그냥 따라버리게 된다. 그러면 그것은 세상의 질서나 자비심이나 지혜로운 행동이 아닌, 탐욕과 어리석음의 행동으로 쓰이는 것이다.\n\n---\n\n#### **내가 신이 아니고 신이 나다**\n\n끌어당김의 법칙을 극단으로 밀면 이런 생각에 이른다. 내가 생각한 대로 다 된다면, 나는 신이다. 내가 끌어당기면 자동차가 나타나고, 돈이 생긴다. 그렇게 현실화된다면 나는 신이다. 그런데 진리는 그 반대다. **내", "source": "essay"}, {"id": "essay_97_ae273dd0eb", "text": "생각에 이른다. 내가 생각한 대로 다 된다면, 나는 신이다. 내가 끌어당기면 자동차가 나타나고, 돈이 생긴다. 그렇게 현실화된다면 나는 신이다. 그런데 진리는 그 반대다. **내가 신이 아니고 신이 나인 것이다.** 내가 먼저 앞서면 안 된다. 깨달음 속에 우리가 있는 것이고, 신 속에 우리가 있는 것이다. 나는 신의 부분이고, 신의 일면이다. '내가 깨달았다'고 할 때도 마찬가지다. 거기서 '내가' 주체가 되는 순간, 좌뇌가 주인 노릇을 하는 것이다. 그것은 생각이다. 만약 모든 사람이 각자 신이 되어서 자기한테 유리한 대로만 다 끌어당기면 세상이 어떻게 되겠는가. 이 부작용을 끌어당김의 법칙을 가르치는 사람들도 안다. 그래서 거기에 '사랑'을 넣는다. 그런데 **그 사랑도 좌뇌의 개념적 사랑이 된다.** 좌뇌를 강화시키기 위한 사랑. '나는 이런 사랑을 하는 사람이야'—이렇게 되어버린다. 끌어당김이라는 방식을 쓰는 한, 좌뇌 쪽을 쓰는 것이기 때문에 에고가 강화될 수밖에 없다. 아무리 사랑을 얘기해도.\n\n---\n\n#### **우뇌가 주인일 때**\n\n우뇌가 주인 노릇을 하면 그냥 다 사랑이 된다. 그것도 지혜롭게. 좌뇌를 통해서 사랑이라는 개념을 강화하는 것이 아니라, 우뇌가 중심에 있을 때 사랑은 개념이 아니라 상태가 된다. 끌어당김의 법칙이 제대로 작동하지 않는 근본적인 이유가 여기에 있다. 그것은 메커니즘 자체가 에고를 강화", "source": "essay"}, {"id": "essay_98_b34356600d", "text": "것이 아니라, 우뇌가 중심에 있을 때 사랑은 개념이 아니라 상태가 된다. 끌어당김의 법칙이 제대로 작동하지 않는 근본적인 이유가 여기에 있다. 그것은 메커니즘 자체가 에고를 강화하는 방향으로 설계되어 있다. 좌뇌를 강하게 할수록 좌뇌가 잘못된 방향을 제시했을 때 그것을 걸러낼 수 없게 된다. \\#끌어당김의법칙 \\#에고강화 \\#좌뇌와우뇌 \\#신이나 \\#수행과의차이\n\n--- (구분선)\n\n[파일명: 나는고정되어있지않다_관계속변화_수필.md]\n\n### **나는고정되어있지않다_관계속변화_수필**\n\n#### **게으른 나, 부지런한 나**\n\n우리는 가끔 스스로를 규정짓는다. 아픈 날이 며칠 이어지면 나는 약한 사람이 되고, 늦게 일어난 아침이 겹치면 나는 게으른 사람이 된다. 그런데 아플 때는 아픈 나지만, 안 아플 때는 안 아픈 나다. 바쁜 날은 일찍 일어나 엄청나게 움직이는 나다. 피곤해서 더 누워 있고 싶은 날, \"이럼 안 되는데, 나는 왜 이렇게 게으르지?\" 하고 자책하는 것은 — 그 찰나의 상태를 영구적인 정체성으로 못 박는 일이다. **나를 고정된 어떤 것으로 규정짓지 않아도 된다.**\n\n---\n\n#### **찰나찰나 바뀌는 나**\n\n내가 고정되어 있지 않다는 것은 어렵지 않게 확인된다. 보는 것이 매 순간 바뀐다. 듣는 것도 매 순간 바뀐다. 좋은 소리를 들을 때는 좋은 소리가 나고, 나쁜 소리를 들을 때는 나쁜 소리가 나다. 먹", "source": "essay"}, {"id": "essay_99_7bfd883e67", "text": "다는 것은 어렵지 않게 확인된다. 보는 것이 매 순간 바뀐다. 듣는 것도 매 순간 바뀐다. 좋은 소리를 들을 때는 좋은 소리가 나고, 나쁜 소리를 들을 때는 나쁜 소리가 나다. 먹고 체했을 때는 체한 것이 나고, 배고플 때는 배고픈 것이 나다. 아내를 볼 때의 나와 나무를 깎을 때의 나가 같은 상태로 고정된 채 있지 않다. 봄이 '나'라며, 들음이 '나'라며 — 보는 것이 나이고 듣는 것이 나라면, 보는 것과 듣는 것이 매 순간 바뀌니 나도 매 순간 바뀌는 것이다. **찰나찰나 내가 계속 바뀌고 있다.** 내가 없다는 것이 아니다. 고정된 하나의 나가 있다는 것도 아니다. 무엇에 의해서 바뀌는가. 환경에 의해서, 관계에 의해서.\n\n---\n\n#### **관계의 나**\n\n나를 둘러싼 주변 환경, 만나는 사람, 내가 접하는 것들, 그리고 내 안에서 일어나는 생각·감정·느낌과 바깥에서 일어나는 모든 것들이 서로 관계를 맺으면서 **'나'라는 것이 형성된다.** 그래서 나는 관계의 나다. 내가 있어야 상대가 부인이 된다. 이 집이 있어야 이 집의 여주인이 있다. 배경을 빼고는 내가 없고, 나를 빼고는 당신이 없다. 매 순간 나는 그 관계 속에서 생겨나고 있다. 고정된 나가 어디 있겠는가. 고정된 나를 붙들려 할수록 지금 이 순간의 나를 놓친다.\n\n---\n\n#### **삶의 신비, 축복**\n\n매 순간 바뀐다는 것은 불안한 일이 아니다. **그것", "source": "essay"}, {"id": "essay_100_b
