계속 갖고 있으면 그것은 복수하자는 것밖에 안 된다.** 새로운 억울함이 또 생길 뿐이다.\n\n#### **직면이 곧 분리다**\n\n**생각과 감정을 분리한다는 것은, 그것을 직면하는 것이다.** 기억은 기억이고, 감정은 그때의 감정이다. 지금까지 그 감정을 그대로 갖고 있을 필요는 없다. 그때의 감정이니까. 그렇게 딱 직면하는 것이 분리를 한다는 것이다. 기억이 떠오르면서 감정도 함께 떠오를 수 있다. 그때 그 감정을 그대로 느껴버리면, 그 감정에 또 휘말리면, 감정의 힘이 오히려 더 강화된다. **내가 다시 그때 감정을 똑같이 더하면 감정이 더 강화되는 것이다.** 그것은 해결이 아니라 반복이다.\n\n#### **지금은 감정을 선택할 수", "source": "essay"}, {"id": "essay_307_921faaa87c", "text": "감정의 힘이 오히려 더 강화된다. **내가 다시 그때 감정을 똑같이 더하면 감정이 더 강화되는 것이다.** 그것은 해결이 아니라 반복이다.\n\n#### **지금은 감정을 선택할 수 있다**\n\n기억과 그때의 감정이 떠올랐을 때, 이렇게 바라볼 수 있다. \"그때 기억은 기억이고, 이 감정은 그때의 감정이구나. 지금의 감정은 아니구나.\" 그렇게 바라보는 순간, 선택의 여지가 생긴다. 지금 다시 그 감정을 강화시킬 것인지, 냉정하게 바라볼 것인지. **지금은 내가 감정을 선택할 수 있다는 것을 자각하는 것이다.** 나를 위해서 어느 쪽이 유리한지, 그것은 본인이 선택할 수 있다. 그때의 감정을 지금 또 느끼고 있는 것이 좋은지, 아니면 감정은 그때의 감정이라고 받아들이고 지금 여기에 있는 것이 좋은지. **선택할 자유가 있다.** #생각감정분리 #해결책 #기억 #선택 #자유\n\n--- (구분선)\n\n[파일명: 생각은저절로일어난다_두가지구조_수필.md]\n\n### **생각은 저절로 일어난다**\n\n#### **생각이 일어나기 전에는 모른다**\n\n우리는 생각이 일어나기 전에 무슨 생각을 할지 모른다. 걱정이 올라오는 것도 내가 걱정하려고 해서가 아니다. 저절로 떠오른다. 떠오르고 나서야 비로소 *아, 내가 이런 것을 걱정하고 있구나* 하고 알게 된다. 보이는 것도 저절로 보이고, 들리는 것도 저절로 들린다. 생각도 감정도 마찬가지다. 그냥 왔다가 간다", "source": "essay"}, {"id": "essay_308_cf65c368ee", "text": "르고 나서야 비로소 *아, 내가 이런 것을 걱정하고 있구나* 하고 알게 된다. 보이는 것도 저절로 보이고, 들리는 것도 저절로 들린다. 생각도 감정도 마찬가지다. 그냥 왔다가 간다. 촛불을 생각해보면 안다. 촛불은 계속 타오르지만 어느 한 지점을 딱 잡아서 *이것이 촛불이다* 할 수 없다. 잡는 순간 꺼진다. 생각도 그렇다. 계속 변하고 흘러간다. **실체가 없다.** 작용은 하지만 잡을 수 없다. 실제가 아니다.\n\n#### **두 가지 구조**\n\n그런데 우리는 두 가지 착각을 동시에 한다. 하나는 **내가 그 생각을 일으켰다** 는 것이다. 또 하나는 **그 생각의 내용이 사실이다** 는 것이다. 이 두 가지가 함께 작동하기 때문에 눈치채기가 쉽지 않다. 생각이 실제하지 않는다는 것만 얘기하거나, 내가 일으킨 것이 아니라는 것만 얘기하면 절반이다. 두 가지가 동시에 성립해서 맞물려 돌아가고 있다는 것을 봐야 한다. 내 생각이라면 내 마음대로 되어야 한다. 올라오지 않았으면 좋겠으면 안 올라와야 한다. 그런데 안 된다. 올라온다. 괴롭지 않았으면 좋겠는데 감정도 올라온다. 이것이 이미 그 생각이 내 것이 아니라는 증거다. **내가 일으킨 것도 아니고, 사실도 아닌데** — 내 생각이라 여기고 사실이라 믿으니 괴로운 것이다.\n\n#### **진달래가 흔들리는 것처럼**\n\n진달래꽃이 바람에 흔들린다. 만약 진달래가 *나는 안 흔들리고 싶은", "source": "essay"}, {"id": "essay_309_bd77f1ec5a", "text": "아닌데** — 내 생각이라 여기고 사실이라 믿으니 괴로운 것이다.\n\n#### **진달래가 흔들리는 것처럼**\n\n진달래꽃이 바람에 흔들린다. 만약 진달래가 *나는 안 흔들리고 싶은데 왜 이렇게 흔들리지?* 하며 괴로워한다면 어리석다. 바람이 불어서 흔들리는 것이지, 진달래가 흔들리는 것이 아니다. 그런데 거기에도 두 가지 구조가 있다. **흔들린다** 는 것과 **내가** 흔들린다는 것. 그냥 흔들리기만 하면 아무 문제없다. 거기에 *내가* 가 붙는 순간, 나는 안 흔들리고 싶은데 흔들리는 것과 내가 같이 묶여버린다. 그때부터 괴롭다. 사람이나 나무나 자연 상태에서는 다를 것이 없다. 사람이 생각을 조금 더 한다는 것뿐이다. 그 생각하는 능력을 쓰고 살다 보니 어느새 **전도몽상** 이 되어버렸다. 바람이 불면 흔들리는 것이 살아있음이듯, 생각이 저절로 일어나는 것도 살아있음이다. 그것을 내가 일으켰다고, 그것이 사실이라고 믿는 순간부터 괴로움이 시작된다. **생각은 저절로 일어난다. 내가 일으킨 것도 아니고, 사실도 아니다. 그 두 가지 구조를 동시에 꿰뚫어 보는 것이 괴로움에서 벗어나는 길이다.** #생각의구조 #전도몽상 #그냥아는마음 #저절로일어남 #올셀프\n\n--- (구분선)\n\n[파일명: 생각은저절로일어난다_존재증명_수필.md]\n\n### **생각은저절로일어난다_존재증명_수필**\n\n#### **생각을 어떻게 해보려는 그 생각이 방", "source": "essay"}, {"id": "essay_310_d25e99b7b7", "text": "셀프\n\n--- (구분선)\n\n[파일명: 생각은저절로일어난다_존재증명_수필.md]\n\n### **생각은저절로일어난다_존재증명_수필**\n\n#### **생각을 어떻게 해보려는 그 생각이 방해물이다**\n\n올셀프(All-Self)를 하다가 생각이 올라오면 어떻게 할 것인가. 많은 수행자들이 이렇게 접근한다. '이 생각이 또 올라왔네, 알아차려야지.' 그런데 알아차리면 생각이 없어질 거라는 기대를 하면, 계속 알아차리려고 용을 쓰게 된다. 생각은 저절로 나오는 것인데, 그것을 어떻게 처리하려는 또 다른 생각을 만들어내는 것이다. 생각이 올라올 때마다 이것을 어떻게 해야 된다고 생각하는 것. **생각이 방해물이라고 생각하는 그 생각이 방해물이다.** 그러니 생각이 거추장스럽고 복잡해진다. 알아차리고, 놓쳤다, 다시 알아차리고, 이러면서 생각에 계속 끌려다니게 된다.\n\n#### **생각은 내가 있음을 증명해 준다**\n\n방향을 완전히 바꿔야 한다. 생각을 적으로 삼지 말고, **우군으로 삼아야 한다.** 저기서 소리가 들리면 '소리 아는 나를 증명해 주는구나.' 생각이 올라오면 '생각을 아는 나를 증명해 주는구나.' 바닥에 닿는 느낌, 보이는 것, 들리는 것, 이것이 다 '내가 지금 있음을 증명해 준다.' 내가 깨어 있을 때는 항시 이것들이 나랑 같이 있는 것이다. 이 공간은 있는데, 내가 없을 수는 없다. **생각이 올라오는 것도 내가 있음을 증명해", "source": "essay"}, {"id": "essay_311_66ff311042", "text": "지금 있음을 증명해 준다.' 내가 깨어 있을 때는 항시 이것들이 나랑 같이 있는 것이다. 이 공간은 있는데, 내가 없을 수는 없다. **생각이 올라오는 것도 내가 있음을 증명해 주는 것이다. 그러니 이 생각도 나다.** 잡념이 일어날 때도 마찬가지다. 감정이 일어날 때도, 느낌이 일어날 때도 마찬가지다. 항시 그것들이 다 내가 있음을 증명해 준다. 그것들은 내가 어떻게 처리해야 할 방해물들이 아니다.\n\n#### **잡념을 거름으로**\n\n**잡념을 뽑아버릴 생각을 하지 말고, 잡념을 거름으로 만들어야 한다.** 잡념을 제거해야 할 대상으로 보는 순간, 나는 끊임없이 그것과 싸우는 자리에 서게 된다. 그러나 잡념이 올라올 때마다 '내가 있구나'로 받아들이면, 그 잡념은 나의 수를 놓치지 않게 해주는 것이 된다. 잡념이 보배가 된다. 거름이 된다. 생각을 어떻게 하려 하지 말고, 생각이 올라오는 그 자체가 나를 증명하고 있음을 알면 된다. #올셀프 #잡념 #존재증명 #알아차림 #수행\n\n--- (구분선)\n\n[파일명: 생각의책임_철쭉꽃_수필.md]\n\n# **생각의책임_철쭉꽃_수필**\n\n## 내가 일으키지 않은 것\n\n나쁜 생각이 올라오면 괴롭다. 그러니까 좋은 생각을 하려 한다. 그런데 좋은 생각을 해서 기분이 좋아진다는 것은, 언제든 나쁜 생각이 올라오면 다시 나빠질 수 있다는 뜻이기도 하다. **좋은 생각을 믿는 만큼 나쁜 생각도 그만큼", "source": "essay"}, {"id": "essay_312_dc708c0914", "text": "하려 한다. 그런데 좋은 생각을 해서 기분이 좋아진다는 것은, 언제든 나쁜 생각이 올라오면 다시 나빠질 수 있다는 뜻이기도 하다. **좋은 생각을 믿는 만큼 나쁜 생각도 그만큼 강력하게 믿게 된다.** 결국 그 생각을 따라가고, 그 생각이 진실이라고 믿으면 믿는 만큼 휘둘리고, 어려운 상황을 맞이하게 된다.\n\n그런데 잠깐, 그 생각이 내가 일으킨 것인가.\n\n좋은 생각을 하거나 나쁜 생각을 하려고 애쓴 게 아니다. 그냥 떠오른 것이다. 내가 떠올린 게 아니고, 그냥 떠오른 것이다. 그러면 그것은 내가 일으킨 게 아니지 않은가. 내가 한 것이 아닌데 내가 책임질 이유가 없다. 내가 일으키지 않았다면, 애초에 나쁜 생각은 안 일으킬 수 있어야 한다. 그런데 그게 아니잖아. 나는 안 일으키고 싶은데 생각이 그냥 떠오른 것이다.\n\n거기다 대고 **이것이 내 생각이라고 믿고 책임을 져버리면**, 그건 그냥 그 생각의 프레임에 휩쓸려 자기 스스로를 괴롭히는 일이다.\n\n---\n\n## 연기와 성기: 차이가 드러낼 뿐\n\n아내가 물었다. 그 생각도 인연법에 의해 올라온 것 아니냐고.\n\n맞다. 연기라는 것은 이것이 있으면 저것이 있다는 상대적인 관계다. 삶이 역동적으로 펼쳐지는 하나의 차이인 것이다. 차이에서 발생하는 서로의 드러남. 나무와 구름은 서로 차이가 있으니까 이건 나무다, 저건 구름이다 아는 것이다. 차이가 없으면 그걸 모른다. 그런데 그 차", "source": "essay"}, {"id": "essay_313_5c76b8954d", "text": "하나의 차이인 것이다. 차이에서 발생하는 서로의 드러남. 나무와 구름은 서로 차이가 있으니까 이건 나무다, 저건 구름이다 아는 것이다. 차이가 없으면 그걸 모른다. 그런데 그 차이는 어느 게 좋다 어느 게 나쁘다가 아니다. 단순히 그냥 차별성으로 현상이 드러나는 것뿐이다.\n\n그리고 그 하나하나 안에 불성이 드러나고 있다.\n\n지금 눈앞에 철쭉꽃이 저렇게 예쁘게 피어 있다. 철쭉꽃이 지가 핀 게 아니다. 여러 가지 인연 연기에 의해서 저것이 나한테 철쭉꽃으로 보이는 것이다. 쟤는 자기가 철쭉꽃인지 알겠는가. 모른다. 그냥 나한테 철쭉꽃으로 보인 것이다. 그렇게 드러나고, 내가 그걸 알고 하는 것, 다 어떤 신성이면 신성, 불성이면 불성의 표현인 것이다.\n\n그런데 그것을 하나하나 개별적으로 따지면 연기를 말할 수 있지만, **통으로 보면 그냥 통째로 있는 그대로 늘 이렇게 드러나고 있는 것이다.** 드러난 새가 없다. 드러났지만 드러난 새가 없으니까 또 드러난다. 또 다른 모습으로 또 드러날 것 아닌가. 다 고정돼 버리면 스톱이다. 그러니까 매 순간 찰나찰나 새롭게 드러난다. 이것은 연기라고 볼 수도 없다. 통째로 드러나는 것은 성기(性起)로 봐야 한다. 온 우주 자체가 다 하나하나, 돌 하나 나무 하나, 이것도 다 불성의 표현이다.\n\n---\n\n## 그냥 아는 마음, 온전히 받아들이는 마음\n\n그렇다면 생각도 마찬가지다. 생각이 나한테 드", "source": "essay"}, {"id": "essay_314_a74155b20f", "text": "주 자체가 다 하나하나, 돌 하나 나무 하나, 이것도 다 불성의 표현이다.\n\n---\n\n## 그냥 아는 마음, 온전히 받아들이는 마음\n\n그렇다면 생각도 마찬가지다. 생각이 나한테 드러났는데 내가 그걸 안다. 아는 것처럼, 그냥 이렇게 보여주고 들려주고 있는 그대로 받아들여지고 있다. 꽃이 꽃으로 보인다. **그냥 아는 마음과 온전히 받아들이는 마음이, 항시 그냥 이렇게 작동하고 있는 것이다.** 그 마음을 이름하여 불성이다, 일심이다, **올셀프**다 이렇게 표현하는 것이다.\n\n나라는 것도 그렇다. 여기서 드러나는 것이고, 당신은 여기서 드러나는 것이다. 저 철쭉꽃 한 송이 한 송이는 다 개별 꽃송이지만, 저 꽃의 성품으로 보면, 철쭉이라는 하나의 성품이 저걸로 표현되고 얘로 표현되는 것뿐이다. 거기에 나라는 게 있고 남이라는 게 있나. 그냥 생각으로 분별하는 것뿐이다.\n\n이 보는 성품이 지금 나로서 드러나면서 온 우주를 보고, 철쭉꽃을 보고, 이렇게 보는 것이다. 봄이 따뜻하고 온도가 맞으면 철쭉꽃이 피듯이, 나를 통해서 지금 이렇게 신성이 작용하고 있는 것이다. 신성이 철쭉꽃으로 작용하면서 향기도 뿜고 색깔도 예쁘게 피우듯이.\n\n저 하늘의 구름을 내가 일으키는가. 아니다. 저 하늘에 별을 내가 만들었는가. 아니다. 그냥 있는 것이다. **내 안에서 올라오는 감정, 느낌, 생각도 저 구름이나 하늘의 별이나 눈앞의 철쭉꽃처럼, 그냥 있", "source": "essay"}, {"id": "essay_315_ba7a9776cc", "text": "키는가. 아니다. 저 하늘에 별을 내가 만들었는가. 아니다. 그냥 있는 것이다. **내 안에서 올라오는 감정, 느낌, 생각도 저 구름이나 하늘의 별이나 눈앞의 철쭉꽃처럼, 그냥 있는 것이다.**\n\n---\n\n## 이 순간, 이대로\n\n생각에 내가 책임을 지지 않으면, 이 순간 이대로 온전하고 완벽하다.\n\n구름이 구름으로 보이고, 꽃이 꽃으로 보인다. 차 소리가 지나가면 차 소리로 들린다. 시끄럽다 어떻다는 벌써 두 번째 얘기고, 새 소리가 들리고, 저 앞에 쓰레기가 있으면 쓰레기가 있는 그대로, 그냥 다 알려주고 보여주는 것이다.\n\n내 안에서 떠오르는 생각도 마찬가지다. 좋은 생각이건 나쁜 생각이건, 좋은 감정이건 나쁜 감정이건, 그것도 그냥 있는 그대로 다 고대로 알려지고 있다. 좋다 나쁘다는 벌써 두 번째 떨어진 것이고, 외로움·그리움·쓸쓸함 이런 것들도 벌써 두 번째다. 첫 번째로 올라오는 것들은 **그냥 있는 그대로 온전하다.** 슬픈 감정이 올라오는데 기쁜 감정으로 알려지지 않고, 그냥 그 느낌 그대로 다 올라온다.\n\n파도가 어떤 파도는 높으면 좋고 낮으면 나쁘고 이런 게 아니다. 그냥 그 파도의 드러남 그 자체가 그냥 있는 그대로 지금 이 순간에 진실하다. 나한테 그대로 다 알려주고 있으니까, 내가 액면 그대로 100% 알고 있다.\n\n그렇게 있는 그대로 알고, **온전히 항시 받아들이고 있다.** 100%, 내가 애쓰지 않아도", "source": "essay"}, {"id": "essay_316_19ea59ce1f", "text": "하다. 나한테 그대로 다 알려주고 있으니까, 내가 액면 그대로 100% 알고 있다.\n\n그렇게 있는 그대로 알고, **온전히 항시 받아들이고 있다.** 100%, 내가 애쓰지 않아도. 그런데 내가 거기에서 떠오르는 생각을 내 것이라 믿고, 거기에 대해서 책임을 져버리니까, 있는 그대로의 진실이 가려지는 것이다.\n\n그것뿐이다. 아주 심플하다.\n\n---\n\n## 내 것이라고 여기는 패턴\n\n따로 어떤 완전함이나 온전함을 얻기 위해 내 안에서 떠오르는 것들과 싸우고 그걸 없애서 온전해지는 게 아니다. **이미 그냥 있는 그대로 온전한데**, 내가 그것을 동일시하여 내 것이라고 여겨버리니까, 거기에 따른 책임이 자연스럽게 생겨버리는 것이다.\n\n하늘의 구름이 내 것이라고 믿으면, 저 구름이 변화무쌍한 것에 대해 내가 다 책임을 져야 된다. 구름이 없어지면 또 엄청 슬퍼해야 된다. 내 것이 아니라면, 구름이 어떤 모습으로 변하든 그냥 있는 그대로다. 진실이다.\n\n그런데 우리는 자꾸 그것을 내 것이라고 여기는 패턴이 계속 반복되고 강화된다. 그러니까 한 번 한 번, 이게 내 것이 아니네, 내가 어떻게 할 수 없으니까, 또 내가 그걸 떠올리려고 애쓰지 않아도 그냥 그게 떠오르잖아, 거기에 대해서 '아, 이거 내가 책임질 필요가 없네' 하고 찾아가는 것이다.\n\n그러면 그냥 보여주고 들려주고, 그걸 내가 수용하고 있다는 게 드러나는 것이다.\n\n이게 1~2번", "source": "essay"}, {"id": "essay_317_c7f06350eb", "text": "아, 거기에 대해서 '아, 이거 내가 책임질 필요가 없네' 하고 찾아가는 것이다.\n\n그러면 그냥 보여주고 들려주고, 그걸 내가 수용하고 있다는 게 드러나는 것이다.\n\n이게 1~2번 갖고는 안 된다. 이게 우리의 관성을 거스르는 얘기이기 때문이다. 처음엔 '뭔 소리야' 싶다가, 자꾸 자꾸 들으니까 '정말 그럴 것 같네' 까지 가는 것이다. 그래서 자꾸 줘야 된다.\n\n---\n\n## 힘듦도 온전하다\n\n근감소증으로 손이 오그라드는 것, 그 자체로 이미 진실하다.\n\n아이 셋을 돌보는 엄마의 힘듦, 육체적으로 힘에 부치는 것, 그것도 온전히 알아지는 것이다. 충실한 것이다. 그런데 그 드러나는 모습에 내가 동일시를 해버리니까, 그걸 나라고 여겨버리는 것이다.\n\n힘들다 안 힘들다는 벌써 두 번째다. 그냥 어떤 느낌이 있는 것이다. 그런데 그걸 나라고 여기고, '나는 힘든 지금 상황이고, 나는 힘듦을 겪어내고 있다'고 하는 **서사를 입히는 것**이다. 그 자체로는 그냥 온전한 것인데.\n\n그것을 옴팍 받아들이게 되면, 더 빨리 통과하게 된다. 고통이면 고통, 힘들면 힘듦을 자꾸 거부하고 밀어내니까 그거랑 싸우게 되고, 그러니까 힘듦이 오래 가는 것이다. 온전히 수용하고 받아들이면 훨씬 빨리 통과돼 버린다. 그 속에서도 삶의 진실을 오히려 더 빨리 발견할 수 있다.\n\n잔잔한 호수에서 저 끝 목적지까지 가야 할 때, 물살이 너무 잔잔하니까 한 세월이다", "source": "essay"}, {"id": "essay_318_bdada684ae", "text": "아들이면 훨씬 빨리 통과돼 버린다. 그 속에서도 삶의 진실을 오히려 더 빨리 발견할 수 있다.\n\n잔잔한 호수에서 저 끝 목적지까지 가야 할 때, 물살이 너무 잔잔하니까 한 세월이다. 막 노를 저어야 한다. 그런데 급류에 휩쓸리면 어마어마한 공포와 두려움이 엄습하지만, 금방 가버린다. 문제는 급류에 휩쓸리지 않으려고 반대 방향으로 막 몸부림을 치는 것이다. 그게 지금 이 순간의 온전함, 진실함과 투쟁을 벌이는 것이다. **옴팍 받아들인다는 것은 급류를 타버리겠다는 것**이고, 그러면 생각보다 훨씬 빨리 통과된다.\n\n기쁨도 기쁨의 방향으로 막 노를 저버리면 기쁨이 빨리 끝나버린다. 슬픔이나 느끼고 싶지 않은 것을 벗어나려고 반대 방향으로 하면 그게 길게 늘어나 버린다. 사실은 같은 건데, 같은 방향인데, 이걸 다르게 보고 반대의 헛힘을 쓰는 것이다.\n\n---\n\n## 이정표는 이정표일 뿐\n\n**생각에 대해서 책임지려 하지 말라.** 내가 하고 싶은 말은 그것이다. 생각을 믿고 자시고 문제가 아니고, 일어나는 생각에 책임을 지지 말라. 그 생각에 고통받을 필요가 없다. 그걸 해서 내가 이득이 있을 것 같으면 되는데, 열이면 여덟 아홉은 생각 때문에 힘들다. 생각 때문에 좋을 일이 없다.\n\n생각을 도구로 쓸 때는 써도 된다. 생활에서, 일에서, 필요해서 쓰는 생각은 쓰면 된다. 그런데 내가 필요해서 쓰는 생각이 아닌 것은 책임지지 말라.\n\n서", "source": "essay"}, {"id": "essay_319_33c5da3982", "text": "문에 좋을 일이 없다.\n\n생각을 도구로 쓸 때는 써도 된다. 생활에서, 일에서, 필요해서 쓰는 생각은 쓰면 된다. 그런데 내가 필요해서 쓰는 생각이 아닌 것은 책임지지 말라.\n\n서울까지 100킬로미터 남았다는 이정표가 있다. 그 이정표는 서울이 아니다. 그런데 그 이정표를 서울 그 자체로 믿어버리는 것이다. 이정표를 이정표로 알고 쓰면 괜찮다. 그런데 쓴 새 없이 그게 쓰이고 있는 것이다.\n\n생각도 그렇다. 이정표를 이정표로 알면, 그냥 그대로 쓰면 된다. 믿지 않아도 쓰인다. **그냥 아는 마음으로, 이미 그렇게 쓰이고 있다.**\n\n온전히 수용한다는 것, 그게 수행이다. 어떻게 보면 깨닫고 난 후의 수행이라고도 볼 수 있다. 지금 닥친 상황을 옴팍 100% 수용한다는 게, 마지막 깨달음 이후의 빨랫감이라고 한다. 지금 그 상태가 그대로 있는 그대로 받아들여지고 있는 상태이기 때문이다. 그것을 어떻게 내가 의도하는 대로 바꾸려 하는가. 헛힘이다. 붙잡을 수 없다. 매 순간 찰나찰라 바뀐다. 내가 바꾸려고 제스처를 쓰기도 전에 이미 바뀌어버린다.\n\n#생각 #책임 #연기 #성기 #올셀프 #온전한수용\n\n--- (구분선)\n\n[파일명: 생생함의역설_착각_수필.md]\n\n### **생생함의역설_착각_수필**\n\n#### **벗어날 수 없는 것**\n\n놀라운 사실이 하나 있다. 잡생각을 하고 있는 순간에도, 멍하니 있는 순간에도, 우리는 이 **삶의", "source": "essay"}, {"id": "essay_320_415216c8d1", "text": "### **생생함의역설_착각_수필**\n\n#### **벗어날 수 없는 것**\n\n놀라운 사실이 하나 있다. 잡생각을 하고 있는 순간에도, 멍하니 있는 순간에도, 우리는 이 **삶의 생생함으로부터 벗어날 수가 없다.** 깨어있을 때는 물론이고, 꿈속에서조차도 생생함이 있다. 꿈속에서 꿈이 생생하지 않인가. 깨어나면 별로 안 생생하지만, 꿈속에서도 삶의 생생함은 있다. 아주 깊은 잠이나 죽을 때는 없겠지만, 그때는 그것을 아는 사람이 없다. 생생하고 말고 할 게 없다. **깨어났을 때는 삶의 생생함으로부터 절대 도망칠 수 없다.** 어디든 도망칠 수가 없다.\n\n#### **굉장한 아이러니**\n\n그런데 더 놀라운 것이 있다. 이 삶의 생생함으로부터 **벗어났다고 착각을 일으킨다는 것이다.** 그리고 그 생생함을 찾아 나선다. 생생함을 느끼려면 인도로 가야 되나, 산사로 가야 되나, 명상을 해야 되나, 하면서. 벗어날 수 없는 것을 잃어버렸다고 착각하고, 잃어버린 것을 찾아 헤맨다. **이 자체가 굉장한 아이러니다.** 아무리 애를 써도 이 삶의 생생함이 없는 곳은 없다. 그런데 그것을 찾겠다고 몸부림을 친다. 참으로 신기한 노릇이다. #생생함 #착각 #아이러니 #올셀프 #지금여기\n\n--- (구분선)\n\n[파일명: 성기적관점_올셀프코칭_수필.md]\n\n### **성기적관점_올셀프코칭_수필**\n\n#### **연기(緣起)와 성기(性起): 존재를 바라", "source": "essay"}, {"id": "essay_321_fc46b1397c", "text": "셀프 #지금여기\n\n--- (구분선)\n\n[파일명: 성기적관점_올셀프코칭_수필.md]\n\n### **성기적관점_올셀프코칭_수필**\n\n#### **연기(緣起)와 성기(性起): 존재를 바라보는 두 시선**\n\n꽃 한 송이가 핀다. 물, 바람, 공기, 온도, 별빛, 이런 것들이 다 조건이 지어져서 꽃이 핀 것이다. 이것이 **연기적(緣起的) 관점** 이다. 이것이 있으니 저것이 있다. 조건들의 관계 속에서 현상이 드러난다. 그런데 한 발 더 들어가면 이렇다. 그 꽃 한 송이도 **불성(佛性)의 표현** 이다. 삼라만상, 돌 하나 나무 하나도 다 불성의 나툼이라고 보는 것이 **성기적(性起的) 관점** 이다. 번뇌즉보리, 불이(不二)의 사상이 거기서 나온다. 금강경에서는 모든 상(相)이 허망하다고 한다. 제상이 상이 아님을 알면 여래를 본다고 한다. 그런데 동시에, 상으로 드러나는 것 자체도 불성의 표현이다. 허망한 상이지만, 성기적으로 보면 그 상이 불성의 하나의 드러남이다. 그래서 보이고 들리는 것이 **있는 그대로 진실** 해진다. 산은 산이 아니다가 다시 산은 산이다로 돌아오는 것처럼. 심우도(尋牛圖)에서 저잣거리로 돌아오는 것처럼. 나로 산다, 나답게 산다는 것은 연기적 시각이다. **올셀프가 지향하는 것은 성기적 시각이다.**\n\n#### **일심(一心)이 올셀프다**\n\n성기적 관점이 가능해지는 근거는 보는 나와 보이는 대상이 **둘이 아", "source": "essay"}, {"id": "essay_322_b6d2e27db1", "text": "연기적 시각이다. **올셀프가 지향하는 것은 성기적 시각이다.**\n\n#### **일심(一心)이 올셀프다**\n\n성기적 관점이 가능해지는 근거는 보는 나와 보이는 대상이 **둘이 아니라는** 불이의 도리에 있다. 드러난 모든 현상은 결국 **일심(一心)** , 하나의 마음의 작용이다. 어떤 모습으로 드러나든 그것은 이미 일심의 표현이기에 진실하다. 그것을 우리 식으로 표현하면 **올셀프(All-Self)**다.\n\n#### **연기적 코칭과 성기적 코칭**\n\n코칭에서 고객이 이슈를 가져온다. 고객은 그것을 문제로 보고 해결하려 한다. 코치도 그 이슈에 집중해서 솔루션을 주거나 문제 해결을 돕는다. 이것이 **연기적 코칭** 이다. 코치가 고객의 말에 담긴 의미를 상대(相對)하는 순간, 코치 자신도 문제-해결의 연기적 조건 안으로 들어가게 된다. 문제가 있으니 해결해야 한다는 구조 안에 함께 갇히는 것이다. 성기적 관점에서 보면 고객의 이슈 자체도 **있는 그대로 진실하다.** 그것은 고객의 온전함이 결핍이라는 형태로 드러나는 것일 뿐, 그 사람의 결핍이나 부족함을 드러내는 것이 아니다. 고객이 문제라고 본 것은 고객의 의미 관점이다. 그런데 고객이 이야기하면서 드러내는 **모습 그 자체** 는 있는 그대로 드러난 것이다. **올셀프 관점의 코치** 라면 그 고객의 드러남을 불성의 표현으로서, **그냥 알고 온전히 받아들이는** 것이다.", "source": "essay"}, {"id": "essay_323_bcf20456c8", "text": "드러내는 **모습 그 자체** 는 있는 그대로 드러난 것이다. **올셀프 관점의 코치** 라면 그 고객의 드러남을 불성의 표현으로서, **그냥 알고 온전히 받아들이는** 것이다.\n\n#### **품: 코칭 프레즌스의 본질**\n\n그러면 고객이 이슈가 해결돼서 코칭 효과를 느끼는 것이 아니라, **온전히 자신의 존재로서 받아들여지는 경험** 을 하게 된다. 그것이 코칭 프레즌스다. 코치는 거울이 아니다. 거울은 비추는 것과 비춰지는 것이 여전히 둘이다. 올셀프 코칭의 프레즌스는 **품** 이다. 품 안에서는 안기는 것과 품는 것이 분리되지 않는다. 고객의 드러남이 코치의 앎 안에서 통으로 받아들여지는 것, 그것이 성기적 코칭의 프레즌스다. 고객은 그 품 안에서 스스로 자신의 온전함을 확인하게 된다. '원래 이게 이슈가 아니었구나. 원래 내가 부자유한 상태가 아니었구나.' 이슈는 제거 대상이 아니라 삶을 빚어내는 **자양분이자 창조성의 원천** 으로 전환된다. 그것이 진정한 하이 레벨 코칭이다. #성기적관점 #올셀프코칭 #일심 #품 #코칭프레즌스\n\n--- (구분선)\n\n[파일명: 성장강박_발현의미_수필.md]\n\n### **성장강박_발현의미_수필**\n\n#### **\"고객은 온전하다\"는 말과 성장 강박 사이의 모순**\n\n코칭 현장에서 코치들이 끊임없이 하는 말이 있다. \"고객은 온전하다.\" 고객은 이미 창조적이고, 그 안에 이미 다 있다고 한다.", "source": "essay"}, {"id": "essay_324_8a312e073e", "text": "객은 온전하다\"는 말과 성장 강박 사이의 모순**\n\n코칭 현장에서 코치들이 끊임없이 하는 말이 있다. \"고객은 온전하다.\" 고객은 이미 창조적이고, 그 안에 이미 다 있다고 한다. 그런데 동시에 성장을 해야 된다고 얘기한다. 말로는 고객이 온전하다고 하면서, 반면에 성장해야 한다고 말하는 것은 지금 뭔가 내가 부족하고 온전하지 않다는 것을 전제로 깔고 있는 것이다. **코치들 자신도 성장을 해야 된다는 강박에 시달리고 있다.** 이 모순이 코칭 현장 안에 그대로 있다. 이것은 코칭만의 문제가 아니다. 어떤 학문을 접하든, 사회를 접하든, 우리는 기본 전제로 **성장해야 된다는 배경** 을 깔고 있다. 그리고 그것이 이 사회를 더 초조하고 경쟁적으로 만들고 있다. 행복 만족도가 떨어지고, 저출산이 심해지는 것도 이 흐름과 무관하지 않다. 지금 있는 그대로의 자기 자신을 온전히 바라보고 수용할 수 있을 때, 상대방도 그렇게 온전히 바라보고 수용해줄 수 있다. 그런데 성과 유지나 성장의 관점에서 상대를 바라보면, \"저 사람은 지금 정체돼 있다\"는 판단이 나오고, 그러면 이 사람은 뭔가 잘못돼 있다, 성장을 시켜야 한다는 방향으로 가게 된다. 나 스스로도 \"내가 지금 정체돼 있어도 되나\"라는 불안 속에 있으면서.\n\n#### **성장이 아니라 발현이다**\n\n그렇다면 성장 대신 어떤 말이 더 맞는가. **발현(發現)이다.** 촛불을 켜면 빛이", "source": "essay"}, {"id": "essay_325_6a03cbfc04", "text": "금 정체돼 있어도 되나\"라는 불안 속에 있으면서.\n\n#### **성장이 아니라 발현이다**\n\n그렇다면 성장 대신 어떤 말이 더 맞는가. **발현(發現)이다.** 촛불을 켜면 빛이 나간다. 이 촛불이 성장하는 것이 아니다. 안에 있는 초가 발현되는 것이다. 원래 잠재성이 있었는데, 어떤 인연을 만나면 그것이 발현된다. 뭔가 새로운 것을 접하고 자극을 받음으로 인해서 무언가가 발현되는 것이다. 그것을 우리가 성장이라는 단어로 부르고 있었던 것은 아닌가. 성장이라는 것은 어떤 목표가 나를 끌고 가는 것이다. 나의 영향력이나 외연이 커지는 것을 성장이라고 부른다. 쉽게 말하면 **에고가 비대해지는 것이다.** 그것을 성장한다고 보는 것이다. 그런데 사실 내면의 본질적인 것은 크기가 크다 작다 말할 수 있는 것이 아니다. 나의 알맹이는 원래 고유한 범위가 있다. 그런데 **허울이 굉장히 커져버리면 그 안에 갭이 생긴다.** 호두로 비유하면, 호두 알맹이가 요만한 크기인데 껍질만 커졌다면 안에 갭이 크다. 그만큼 **공허감이 생기는 것이다.**\n\n#### **껍질만 키우면 발현될 개연성이 줄어든다**\n\n호두는 작건 크건, 알맹이와 껍질이 딱 밀착돼서 형성돼 있을 때 잘 심으면 호두나무로 발현된다. 그런데 호두 껍질만 성장시키기 위해서 **외연만 확장하고 넓히면** , 오히려 호두나무로 발현될 수 있는 개연성이 줄어드는 결과가 온다. 촛불 비유로", "source": "essay"}, {"id": "essay_326_82e0a074fc", "text": "심으면 호두나무로 발현된다. 그런데 호두 껍질만 성장시키기 위해서 **외연만 확장하고 넓히면** , 오히려 호두나무로 발현될 수 있는 개연성이 줄어드는 결과가 온다. 촛불 비유로 돌아가면, 촛불이 켜졌을 때 빛이 발현되는 것이다. 그 빛의 범위를 더 크게 하고 싶은 것, 영향력을 더 넓게 미쳐야 한다고 보는 것이 성장의 논리다. 그러려면 나의 자원을 더 태워서 더 밝게 빛나야 한다. 더 많은 것을 태워야 한다. 그렇게 하다 보면 번아웃이 온다. **내가 엄청나게 노력해서 밝혀야 되는 이상의 것이 성장이 아니다.** 지금 온전한 성품을 발현하고 있다는 것, 촛불의 밝음이라는 성품은 작고 크고를 논할 것이 아니다. 아무리 오래된 어둠도 촛불 하나 켜면 밝아진다. 그것이 촛불의 성품이다.\n\n#### **꽃은 노력해서 빨리 피우는 것이 아니다**\n\n꽃이 핀다는 것은 꽃의 성품이 꽃으로서 발현되는 것이다. 씨앗에서 자라는 것을 성장이라고 볼 수 있겠지만, 꽃이 예쁜 꽃을 피우기 위해서 엄청나게 노력하고 빨리 성장해야 한다는 것은 아니다. 시간이 지나고 인연이 닿으면 개개의 성품들이 그때에 거기에 맞게 발현되어 싹도 나고, 이파리도 나고, 꽃도 피고, 열매도 맺는다. 그런데 우리가 아이들을 키울 때도, 교육에서도 이런 말을 한다. **\"다른 애는 빨리 꽃이 폈는데 너는 왜 안 폈냐.\"** **\"다른 애는 큰 꽃이 폈는데 너는 왜 작은 꽃이 폈", "source": "essay"}, {"id": "essay_327_86513552a8", "text": "그런데 우리가 아이들을 키울 때도, 교육에서도 이런 말을 한다. **\"다른 애는 빨리 꽃이 폈는데 너는 왜 안 폈냐.\"** **\"다른 애는 큰 꽃이 폈는데 너는 왜 작은 꽃이 폈냐.\"** 이렇게 얘기하면 안 된다. 작게 타고난 성품을 가진 사람도 있고, 큰 꽃으로 태어난 성품을 가진 사람도 있다. 자기 성품이 발현될 때를 기다리면 된다. 작다고 해서 온전하지 않은 것이 아니다. 큰 꽃이건 작은 꽃이건 꽃의 성품을 온전히 발현하고 있는 것이다. **촛불도 큰 초가 됐건 작은 초가 됐건, 촛불의 성품은 온전하다.**\n\n#### **자기 페이스를 잃지 않는 것이 중요하다**\n\n그래서 더더욱 **자기 페이스를 잃지 않는 것이 중요하다.** 남들은 빨리 가는데 나는 왜 뒤처지는 것 같다며 오버페이스를 하면 안 된다. 나는 나의 속도가 있다. 자기 속도대로 가다 보면 어떤 것은 남들보다 더 빨리 발현되는 것도 있고, 어떤 것은 늦게 발현되는 것도 있다. 그렇게 돼야만 **내 삶이 오히려 충만해질 수 있다.** 정해진 결승점을 놓고 모두가 달려가는데, 일등만 성공한 것으로 치면 나머지는 다 실패한 꽃들이 되고 실패한 촛불이 된다. 그것은 **공동체 전체가 다 행복해지지 않는 원인이 된다.** 개개인도 그렇고 사회 전체도 그렇다. 성장이 아니라 발현이다. 나는 이미 그 안에 있다. #성장강박 #발현 #올셀프 #에고 #자기페이스\n\n--- (구분선)", "source": "essay"}, {"id": "essay_328_ac922969c0", "text": "않는 원인이 된다.** 개개인도 그렇고 사회 전체도 그렇다. 성장이 아니라 발현이다. 나는 이미 그 안에 있다. #성장강박 #발현 #올셀프 #에고 #자기페이스\n\n--- (구분선)\n\n[파일명: 성장성숙_씨앗발현_수필.md]\n\n### **성장성숙_씨앗발현_수필**\n\n#### **학습과 목표 달성은 촉진제다, 외부를 붙이는 것이 아니다**\n\n우리가 학습을 하고 무언가를 배우고, 목표를 달성하는 것들, 물론 성장은 해야 한다. 그런데 이것이 무엇을 하는 것인지를 정확히 봐야 한다. 외부에서 무언가를 갖다 붙이는 것이 아니라, 내 안에 있는 인자들, 소자 인자들을 깨우는 **촉진제로서의 역할** 을 해주는 것뿐이다. 씨앗이 성장하도록 외부 환경을 갖춰주는 것, 따뜻한 조건을 만들어주고 물을 주어서 발현되도록 하는 것이 그것이다. 그런데 이것을 껍질에다가 껍질을 더 크게 늘리고 잡아당기는 방식으로 하면 **씨앗의 온전한 발현을 오히려 방해할 수 있다.** 재산도 많이 모으고, 배움도 늘었고, 직급도 올라갔는데, 그런데도 **공허하다.** 껍질만 커진 것이기 때문이다.\n\n#### **돈과 명예가 궁극적으로 증명하려 하는 것**\n\n돈이나 명예를 얻었는데 나중에 보면 그것이 궁극적으로 추구하는 것은 무엇인가. 결국은 **본인이 가치 있는 사람이라는 것을 증명하는 것** 이 최종 목표다. 그런데 실제로 사람들이 행복한 순간은 따로 있다. 씨앗이건 무", "source": "essay"}, {"id": "essay_329_5304ab5291", "text": "이 궁극적으로 추구하는 것은 무엇인가. 결국은 **본인이 가치 있는 사람이라는 것을 증명하는 것** 이 최종 목표다. 그런데 실제로 사람들이 행복한 순간은 따로 있다. 씨앗이건 무엇이건 자연에 위배되지 않고, 시간을 기다리고, 환경이 맞아서 싹이 트고, 자연과 하나가 되어 자기 방식대로 커가는 자연적인 모습을 볼 때 행복한 것이다. 씨앗이 싹이 트려면 주변 환경도 맞아줘야 하지만 시간도 필요하고, 기다림도 필요하고, 자연의 순리에 위배되면 안 된다. 그런데 인간의 욕심 속에 있는 조급함이 그 순리에 어긋난 것을 원하게 만든다. 거기서 마음의 우울함, 부족함, 외로움이 온다.\n\n#### **성장만이 아니라 성숙이 필요하다**\n\n여기서 한 가지를 짚어야 한다. 씨앗이 성장하는 것만이 중요한 게 아니라는 것이다. **성숙(成熟)이 돼야 한다.** 성숙을 통해서 발현으로 가야 한다. 알맹이 없는 단순한 성장만을 취하니까, 그 갭만큼의 공허함을 느끼는 것이다. 성장도 해야 하지만 성숙의 기간을 가져야 한다. 그래서 **성장 자체가 어떤 목적이 될 수는 없다.** 일정 기간 성장을 하면 또 성숙의 시간이 필요하다. 성장과 성숙이 이렇게 반복되면서 온전한 성품이 드러난다. 그 성품은 어떤 스탠다드가 있는 것이 아니다. **저마다 다 유니크한 성품들** 이 있는 것이다. 그것이 자연의 다양성이고, 그 자체로 이미 아름다운 것이다.\n\n#### **대", "source": "essay"}, {"id": "essay_330_b93d67c2b0", "text": ". 그 성품은 어떤 스탠다드가 있는 것이 아니다. **저마다 다 유니크한 성품들** 이 있는 것이다. 그것이 자연의 다양성이고, 그 자체로 이미 아름다운 것이다.\n\n#### **대나무 마디와 나이테 — 성장과 성숙의 리듬**\n\n대나무에는 일정 부분마다 마디가 있다. 나이테는 봄·여름에 성장하고 겨울에 성숙의 시간을 갖는다. 그렇게 성장과 성숙을 거쳐서 다시 봄이 되면 왕성한 생명 활동을 할 수 있다. 그 리듬이 필요하다. 멈추는 것이 후퇴가 아니다. 성숙의 시간이 없는 성장은 껍질만 커지는 것이다. 알맹이와 껍질이 함께 자랄 때, 씨앗은 비로소 자기 성품을 온전히 발현할 수 있다. #성장 #성숙 #발현 #씨앗 #자기페이스\n\n--- (구분선)\n\n[파일명: 셀프1과셀프2의이해_온세상이기적이다_수필.md]\n\n### **셀프1과셀프2의이해_온세상이기적이다_수필**\n\n#### **셀프 1의 목소리를 믿지 않으면**\n\n**셀프 2를 따로 되려고 하거나, 그 상태를 유지하려고 하거나, 찾으려고 할 필요가 없다.** 셀프 1이 조용해지거나 힘이 없어질 때, 셀프 2가 저절로 드러나기 때문이다. 그런데 여기서 주의할 게 있다. 셀프 2가 내 마음이나 생각, 정신, 신경, 이런 몸의 무언가라고 착각하기 쉽다. 그렇지 않다. **셀프 1이 없는 상태에서는, 지금 이 들리는 소리, 보이는 풍경, 발에 닿는 땅, 그게 전부 다 셀프 2다.** 온 세상이 다", "source": "essay"}, {"id": "essay_331_4a9cc4ec87", "text": "런 몸의 무언가라고 착각하기 쉽다. 그렇지 않다. **셀프 1이 없는 상태에서는, 지금 이 들리는 소리, 보이는 풍경, 발에 닿는 땅, 그게 전부 다 셀프 2다.** 온 세상이 다 셀프 2다. 그게 우리가 말하는 올셀프다. 셀프 1은 스토리를 만든다. 과거의 기억을 끌어와 지금 여기에 실재하는 것처럼 믿게 만든다. 작년에 떨어진 벚꽃잎은 이미 없다. 근데 마음속에서는 그게 지금도 생생히 살아있다. 그리고 그걸 해결해달라고 셀프 2에 자꾸 요구한다. 셀프 1이 있어서가 아니라, **없는데 착각을 일으키는 것이다.** 그 착각이 너무 강해지면 걔가 주인이 되어버리고, 삶 전체가 그 기준으로 돌아가기 시작한다. **셀프 1의 목소리를 믿지 않으면, 나머지 몽땅 다가 셀프 2다.** 그게 핵심이다.\n\n#### **통으로 다 배경이다**\n\n셀프 1이 사라지면 어떻게 되는가. 몸과 신경망과 산하대지가 전부 다 셀프 2가 된다. **다 그냥 통으로 다 배경이다.** 거기에 '이것이 존재다' 하고 따로 집어낼 게 없다. 나무가 드러나고, 새소리가 드러나고, 자동차 소리가 드러나고, 내 몸이 드러나고, 셀프 1이라고 믿는 내 생각이 드러나고, 느낌이 드러나고, 감정이 드러난다. 다 그냥 이렇게 드러난다. 이것들이 롤록 드러난다. **이 생생한 이거를 한번 느껴봐.** 이 생생함 속에, 셀프 1의 스토리가 낄 자리가 있는가. 찾아보면 없다. 꿈 같고", "source": "essay"}, {"id": "essay_332_9b0ceec60f", "text": "다. 다 그냥 이렇게 드러난다. 이것들이 롤록 드러난다. **이 생생한 이거를 한번 느껴봐.** 이 생생함 속에, 셀프 1의 스토리가 낄 자리가 있는가. 찾아보면 없다. 꿈 같고 환상 같기 때문이다. 그 스토리가 계속 올라와도 괜찮다. 안 올라오려고 하면 안 된다. **올라오는 것조차도 올셀프를 증명한다.** 다만 그 내용을 실체화하지 않는 것이다. 사실이라고 믿지 않는 것이다. 바람이 불어온다. 벌 한 마리가 날아온다. **생각도 마찬가지다.** 좋은 바람, 나쁜 바람이 아니듯, 좋은 생각, 나쁜 생각이 따로 있는 게 아니다. 그냥 그 생각이 지나가는 것이다. 문제는 우리가 거기에 말려 들어가는 것이다. 스토리에 말려 들어간다는 것은, **지금 온전하게 생생하게 살아있는 여기를 잃고, 꿈의 세계에 사는 것이다.** 셀프 1의 스토리가 생생할수록, 과거의 분함이나 억울함이 삶 전체를 끌고 다니는 기준이 되어버린다.\n\n#### **늘 항시 지금 이것밖에 없다**\n\n꽃잎을 만졌던 그 순간은 어디 있는가. 어디도 없다. 우리 기억 속에만 있을 뿐이다. **이게 늘 이것마, 항시 지금 이거밖에 없다.** **지금 이 순간만이 진실하다.** 지나온 것은 어딘가에 있어야 하는데, 없다. 그러면 지금 이 순간도, 한 시간 뒤에 생각하면 역시 없다. 그러니 지금 이 생생함을 지금 여기서 느끼는 것뿐이다. 지금 여기의 생생함을 10억을 준다 해도 바", "source": "essay"}, {"id": "essay_333_c0bf6b9614", "text": "야 하는데, 없다. 그러면 지금 이 순간도, 한 시간 뒤에 생각하면 역시 없다. 그러니 지금 이 생생함을 지금 여기서 느끼는 것뿐이다. 지금 여기의 생생함을 10억을 준다 해도 바꿀 수 없다. 이 생생함이 사라진다면 내가 없는 것이다. **지금 이 순간이 기적이다.** 이 순간이 감사고, 이 순간이 사랑이고, 이 순간이 전부다. 매 순간순간 이 순간밖에 없다. 그런데 사람들은 이것을 놓치고 산다. 유령 같고 망령 같은 셀프 1의 목소리에 끄달리면서 하루를 보낸다. 셀프 1의 뜻대로 살려 하지만 세상에는 나만의 뜻이 있는 게 아니다. 수십억의 뜻이 있다. 어떻게 내 뜻대로만 되겠는가. 그렇기 때문에 **'지금 이 순간만이 오로지 진실하다'** 는 것이고, **어떻게 될지 모르니까 삶이 신비한 것이다.** 알아버리면 무슨 신비가 있겠는가. 매 순간이 처음 보는 것이고, 경험해보지 않았던 것이다. 배가 고프면 배고픔을 느끼고, 아프면 아픔을 느끼고, 기쁘면 기쁨을 느낀다. 몸이 있으니까 고통도 느끼는 것이다. 그것도 어떻게 보면 살아있음을 증명하는 것이다. 그렇게 살면 삶이 많이 가벼워진다.\n\n#### **셀프 1인 나를 내세워 셀프 2가 되려 하지 말고**\n\n아침에 잡생각이 들고, 셀프 1이 됐다가, 또 셀프 1이 됐다고 느끼며 그것을 몰아내려 한다면, 그 방식 자체가 셀프 1의 움직임이다. **셀프 1인 나를 내세워 셀프 2가 되려 하", "source": "essay"}, {"id": "essay_334_72c2f577b6", "text": "침에 잡생각이 들고, 셀프 1이 됐다가, 또 셀프 1이 됐다고 느끼며 그것을 몰아내려 한다면, 그 방식 자체가 셀프 1의 움직임이다. **셀프 1인 나를 내세워 셀프 2가 되려 하지 말고, 그냥 셀프 2이게 하라. 셀프 2가 나를 셀프 2이게 하는 것이다.** 내가 의도해서 되는 것이 아니다. 허리가 아플 때도 마찬가지다. '왜 아프지, 어떻게 해야 되지' 하고 방법을 찾으려는 것은 셀프 1의 움직임이다. 셀프 2가 이 상황을 어떤 방향으로든 이끌어갈 것이다. **'이 일이 어떻게 전개되는지 지켜본다.'** 그리고 **'경험하겠다'고 선언한다.** 회피하려 하니까 고통이 계속 오는 것이다. '오면 오는 대로 받겠다, 느껴볼게' 하고 그냥 두면, 생각만큼 못 견디는 것이 아니다. 그리고 이것도 셀프 2를 증명한다. 아픔도, 문제도, 어떤 사건도, 셀프 2를 증명하고 있다.\n\n#### **올셀프니까 다 내가 한 것이다**\n\n삶을 돌아보면 내가 한 것이 미미하다는 생각이 들기 쉽다. 밥상에 올라오는 것도, 집도, 옷도, 연료도, 자연이 만들고 수많은 사람이 가공하고 운반하고 조립한 것이다. 내가 한 건 극히 일부다. 서로 미미한 것들을 주고받으며 살아가는데, 나는 적게 주고 많이 받아온 것 같다는 느낌. 그런데 그 생각도 **셀프 1의 얘기다.** 올셀프니까, 여기 드러난 것은 다 내가 한 것이다. '내가 한 것이 미미하다'는 것도, '내", "source": "essay"}, {"id": "essay_335_01321706fb", "text": "적게 주고 많이 받아온 것 같다는 느낌. 그런데 그 생각도 **셀프 1의 얘기다.** 올셀프니까, 여기 드러난 것은 다 내가 한 것이다. '내가 한 것이 미미하다'는 것도, '내가 잘났다 못났다'는 것도, 셀프 1이 뒤에서 하는 말이다. 그게 실마리가 되어 야금야금 들어온다. 셀프 1은 교묘하다. **셀프 1도 54년을 살아온 것이다.** 이제 수법을 다 안다. 안 속을래도 속을 수밖에 없다. 그러니 수행을 한다는 것은 자꾸 당해보고, 또 당해보고, 확인하고, 또 확인하는 것이다. **삶이 어디로 흘러가는지 그걸 그냥 한번 지켜보는 것이다.** 어차피 흘러갈 것이고, 어차피 내 마음대로 안 된다. 그것을 억지로 되게 하려고 애걸복걸하면서 고통을 받고 결핍감을 느끼며 살 이유가 없다. 그렇게 살 수도 있지만, 그만큼 피곤하다. 그렇게 살지 않아도 된다. 지금 이 순간이 기적이다. 온 세상이 기적이다. 이 생생함 그대로가 전부다. #올셀프 #셀프1셀프2 #지금이순간 #생생함 #기적\n\n--- (구분선)\n\n[파일명: 소통의단절_은유와비유_수필.md]\n\n### **소통의단절_은유와비유_수필**\n\n#### **감정을 세밀하게 표현해도 왜 안 통하는가**\n\n코칭 강의에서 경청에 대한 이야기가 나왔다. 우리가 평상시 감정 표현을 얼마나 세밀하게 구분 지어서 해보지 않았는지에 대한 이야기였다. 몇 가지 큰 감정만 표현하다 보니 자기 감정을 자기가", "source": "essay"}, {"id": "essay_336_d174914717", "text": "서 경청에 대한 이야기가 나왔다. 우리가 평상시 감정 표현을 얼마나 세밀하게 구분 지어서 해보지 않았는지에 대한 이야기였다. 몇 가지 큰 감정만 표현하다 보니 자기 감정을 자기가 제대로 이해하지 못하게 된다는 것이다. 그래서 감정을 세밀하게 표현해 놓은 표를 보여주면서, 하나씩 읽으며 느껴보면 자기가 그것을 알게 된다고 했다. 그런데 생각해보면 세밀하게 표현을 해도 그것이 단어로 표시되면 정확히 이해할 수가 없다. 왜냐하면 사랑이라든가 이런 감정은 **흐르는 것** 이기 때문이다. 그것을 딱 고정시켜서 표현해버리면 상대방한테 잘 전달이 안 된다. 아무리 '쓸쓸함', '외로움' 이렇게 표현을 해도, 감정이라는 것은 굉장히 복합적인 것이다. 여러 가지 상황, 그때의 신체적 상태, 주변 환경 — 이것들이 복합적으로 일어나서 몸이 느끼는 어떤 반응이 올라오는 것이다. 옛날 생각을 하면 기억에 대한 몸의 반응이 올라오는 것일 수도 있고, 그것이 감정으로 느껴지는 것일 수도 있다. 그러니까 원인이 여러 가지가 복합적으로 짬뽕이 되어 하나의 감정으로 올라오는 것인데, 그것을 **단일 언어로 표현하는 것 자체가 안 된다** .\n\n#### **'이쪽'이라고 해도 상대방에게는 '이쪽'이 없다**\n\n눈을 감고 있는 사람에게 '이쪽', '저쪽'이라고 말하면 그 사람에게 '이쪽'이란 없다. 볼 수가 없으니까. '이쪽', '저쪽'이라는 것은 내가 본다는 기준", "source": "essay"}, {"id": "essay_337_64bebeef31", "text": "'이쪽'이 없다**\n\n눈을 감고 있는 사람에게 '이쪽', '저쪽'이라고 말하면 그 사람에게 '이쪽'이란 없다. 볼 수가 없으니까. '이쪽', '저쪽'이라는 것은 내가 본다는 기준, '나'라는 것이 중심이 되어버리는 말이다. 내가 지금 내 눈에 봤을 때의 왼쪽, 오른쪽이지, 눈을 감고 있다면 '이쪽'이든 '저쪽'이든 그것은 똑같은 말이다. 단일한 언어인 것이다. 그런데 눈 뜬 입장에서는 왜 상대방이 '이쪽'을 이해 못 하는지 납득이 안 된다. 그래서 다르게 표현해야 한다. '시계 방향으로 돌려 들어보세요', '새끼손가락 근처 버튼으로', '지금 만진 것에서 몇 번째를 만져보세요'. 이렇게 하면 사람들은 자기가 지금 느끼고 있는 감각이 기준이 된다. **관점이 상대방으로 넘어가는 것이다.** 내 입장에서 설명하는 것이 아니라 그 상대방 언어로 표현해 놓은 것이다. 감정을 말할 때도 마찬가지다. '내가 이렇게 슬픈데 너는 왜 몰라주냐', '내가 이렇게 너를 사랑하는데 왜...' — 이것도 다 내 입장에서이다. '내가 이렇게 슬픈데'에서 '이렇게'가 뭔지를 상대방은 모른다. '내가 이렇게 너를 사랑하는데'에서 '이렇게'가 뭔지도 모른다. 방향은 알지만 그게 어떤 것인지는 모른다. 아무리 감정 단어를 많이 늘려도 이 문제는 해결이 안 된다.\n\n#### **언어가 가난해지면서 사람도 고립된다**\n\n옛날 사람들은 언어가 훨씬 더 풍부했다. 봄의", "source": "essay"}, {"id": "essay_338_d9f2dba49f", "text": "것인지는 모른다. 아무리 감정 단어를 많이 늘려도 이 문제는 해결이 안 된다.\n\n#### **언어가 가난해지면서 사람도 고립된다**\n\n옛날 사람들은 언어가 훨씬 더 풍부했다. 봄의 시작점을 '봄머리'라고 표현했다. 바람도 '하늬바람', '높새바람' 등 이름이 엄청나게 많았다. 강물의 이름도 수십 가지였다. 물의 높이에 따라, 강 주변이냐 강심이냐에 따라 다 달랐다. 그만큼 세계를 세밀하게 느끼고 표현했다. 지금은 언어 사용 폭이 점점 줄어들고 있다. 자기를 표현할 수 있는 것이 점점 제한됨과 동시에 내 말만 하게 된다. 기쁠 때도 '대박', 슬플 때도 '대박'. 내 안에 올라오는 모든 것을 '대박' 하나로 처리해버린다. 서로 얘기하면 저쪽에서도 '대박', 이쪽에서도 '대박' — '대박'만 왔다 갔다 하는데 거기에 무슨 공감이 있겠는가. 이것이 엄청난 **소통의 부재** 다. 그러니까 서로 간에 소통이 안 되고 외로워질 수밖에 없다. 상대방하고 얘기해도 얘기가 안 통하기 때문이다. 엄마와 자녀 사이도, 친구 사이도 마찬가지다. 점점 자기 안에서만 고립된다. 예전에는 지역이라는 공동체가 있었다. 같은 공간에서 살면서 어쩔 수 없이 같은 관심을 공유해야 삶의 질이 올라간다고 생각했다. 지금은 관심사가 넓어지고 다양해졌고, 공간적 제약도 없어졌다. 서로 지향하는 것이 다 다르다. 그러니 대화가 안 되는 것이다. 여기에 물질에 대한 치중도 더", "source": "essay"}, {"id": "essay_339_8cc8c928ed", "text": "올라간다고 생각했다. 지금은 관심사가 넓어지고 다양해졌고, 공간적 제약도 없어졌다. 서로 지향하는 것이 다 다르다. 그러니 대화가 안 되는 것이다. 여기에 물질에 대한 치중도 더해진다. '나한테 이득이 되냐 손해냐', '이 시간이 낭비냐.' 이해득실을 따지다 보니 만남에서 인간적인 정이나 우정, 분위기 같은 것들이 점점 빠져버린다. 만나도 허전하다.\n\n#### **어차피 안 통한다는 전제로 떠든다**\n\n지금 우리의 대화 방식을 보면, 어차피 안 통함을 전제로 자기 얘기만 떠드는 구조가 되어 있다. '너 다 떠들었지? 나 떠들게.' 그렇게 된다. 내가 내 얘기를 상대방한테 던졌을 때 그것이 위로나 공감으로 돌아와야 충만함이 생기는데, 그게 반작용으로 오질 않고 그냥 허공에 메아리만 친다. **대화를 할수록 허전해진다.** 공감이 없기 때문이다. 내가 언어를 그렇게 쓰니까 상대방은 '쟤가 자기 얘기만 하고 있는 거야'라고 느낀다. 공감을 끌어내지 못하는 언어를 쓰고 있는 것이다.\n\n#### **연결의 언어: 비유와 은유**\n\n그렇다고 고립된 채로 살 수는 없다. 연결이 필요하다. 그 수단이 **은유와 비유** 다. 명사나 지시대명사가 아니라 **동사적으로 표현** 해야 한다. **상황을 설명하는 쪽** 으로. 그것이 시적인 표현이다. '오늘 기분이 꿀꿀해'보다 **'물에 푹 젖은 수세미 같아'**라고 하면 상대방도 '아, 그런 기분이었", "source": "essay"}, {"id": "essay_340_02c8004326", "text": "** 해야 한다. **상황을 설명하는 쪽** 으로. 그것이 시적인 표현이다. '오늘 기분이 꿀꿀해'보다 **'물에 푹 젖은 수세미 같아'**라고 하면 상대방도 '아, 그런 기분이었겠구나' 하고 이해가 된다. '너를 보니까 **바람에 한들거리는 진달래꽃** 을 보는 것 같아.' 그러면 설렘이 와닿는다. '야 너 오늘 보니까 반가웠어'보다 훨씬 직접적으로 닿는다. 공감 안 할래야 안 할 수가 없다. 코칭에서도 마찬가지다. 고객이 '지난번에 슬펐어요'라고 할 때, 그것을 **은유와 비유와 직유로 구체적으로 표현** 해보게 한다. 그러면 본인도 자기 감정을 제대로 이해하게 되고, 코치도 이해할 수 있다. 다음에는 '오, 네가 그랬구나' 하고 진짜 공감이 가능해진다. '공감대'라는 말에서 '대(帶)'는 허리띠처럼 하나의 끈으로 묶는 것이다. 공감으로 너와 내가 같은 영역에, 같은 대에 같이 머문다는 뜻이다. 비유와 은유는 그 끈을 만든다. 공감대가 없으니까 사람들이 자꾸 소외되는 것이다. 중요한 것은 자기 자신도 자기 감정을 이해하지 못한다는 것이다. 그래서 글쓰기가 효과가 있다. 글을 쓰다 보면 그때 상황을 쓰게 되고, '내가 이래서 그랬구나' 하고 자기 감정을 이해하게 된다. 단, 제대로 써야 한다. 명사와 대명사로만 쓰면 아무리 많이 써도 소용이 없다. 그때 상황을, 비유와 은유로 써야 한다. 여자들끼리 대화할 때 그래도 상황을 잘 얘기", "source": "essay"}, {"id": "essay_341_c83c46f7b0", "text": "해하게 된다. 단, 제대로 써야 한다. 명사와 대명사로만 쓰면 아무리 많이 써도 소용이 없다. 그때 상황을, 비유와 은유로 써야 한다. 여자들끼리 대화할 때 그래도 상황을 잘 얘기한다. 그런데 그 상황에 상대방이 없었으니 상대방도 잘 모른다. 그래서 그 상황 자체보다, 누구나 공통으로 공감할 수 있는 언어 — 비유, 직유, 은유 — 가 들어가야 한다.\n\n#### **시적인 삶이 필요하다**\n\n애둘러 표현하는 것 같지만, 그것이 오히려 더 직접적인 표현이 된다. 언어에 갇히고, 개념에 갇히고, 추상성에 갇힌 삶을 현실에 가깝게 표현할 수 있게 해주는 것이 시다. 지금 우리가 바쁘고 쫓기다 보니 감정을 세밀하게 표현할 새가 없다. 상대방도 들을 준비가 안 되어 있다. 그러니 빨리 퉁 쳐버리고, 그러니 더 소통이 안 된다. 시간 낭비만 된다. 그래서 새롭게 **언어 훈련** 도 하고 **감각 훈련** 도 해야 한다. 지금 느끼는 감각, 느끼는 감정을 '이것을 지금 어떤 비유나 은유나 직유로 표현할 수 있나?' 하고 자꾸 연습해봐야 한다. 그것이 시를 쓰는 연습과 같다. **시적인 삶** 이 앞으로 필요한 이유가 거기에 있다.\n\n#소통의단절 #은유와비유 #시적언어 #공감대 #언어훈련\n\n--- (구분선)\n\n[파일명: 손톱시_카메라로찍는다는것_수필.md]\n\n### **손톱시, 카메라로 찍는다는 것**\n\n#### **손톱시의 핵심 메시지**\n\n손", "source": "essay"}, {"id": "essay_342_874420b923", "text": "#공감대 #언어훈련\n\n--- (구분선)\n\n[파일명: 손톱시_카메라로찍는다는것_수필.md]\n\n### **손톱시, 카메라로 찍는다는 것**\n\n#### **손톱시의 핵심 메시지**\n\n손톱시는 대상이 어떻게 바뀌었으면 좋겠다거나, 대상을 바라보는 나의 인식이 어떻게 바뀌었으면 좋겠다거나 하는 것을 떠난다. 그냥 당연하게 의식되어지는 것, 있는 그대로를 지금 그대로 드러내주는 것이다. **당연한 것을 당연한 그대로 내가 그냥 알고 그냥 받아들여지고 있는 그 당연함 — 이것이 손톱시의 가장 강력한 핵심적인 메시지다.** 감정이 올라오면 그 감정 자체도 넣을 수 있다. 그런데 그것을 내가 원하는 쪽으로 에고의 입장에서 보는 것이 아니라, 에고가 드러났다는 것도 인정하면서 한 발짝 뒤에서 보는 시각과 관점이 들어가는 것이다. 내 욕심과 의도가 이루어지는 것이 아니라, 아 내 욕심과 의도가 이렇게 드러났구나 — 그것도 표현할 수 있다. 감정이 됐건 생각이 됐건 의도가 됐건, 다 지금 여기서 드러나고 있으니까.\n\n#### **수채화가 아니라 카메라다**\n\n그동안 우리가 글을 쓰는 방식은 수채화와 같았다. 내가 원하는 대로 그린다. 그런데 손톱시는 카메라다. 카메라는 찰나의 순간을 딱 잡는다. 대상을 내가 바꿔서 이렇게 하겠다는 것이 아니다. 내가 보는 이 현상, 나의 생각, 나의 의도, 나의 감정 — 한 순간의 부분을 통째로 찍어서 손톱시로 표현하는", "source": "essay"}, {"id": "essay_343_3069ab6e0b", "text": "간을 딱 잡는다. 대상을 내가 바꿔서 이렇게 하겠다는 것이 아니다. 내가 보는 이 현상, 나의 생각, 나의 의도, 나의 감정 — 한 순간의 부분을 통째로 찍어서 손톱시로 표현하는 것이다. 카메라로 나무를 찍으면서 저게 꽃으로 찍혔으면 좋겠다고 바랄 수는 없다. **나무를 찍으면 나무가 찍힌다.** 그런데 자기계발 글들은 다르다. 나무를 찍으려 하면서 끌어당김의 법칙으로 저건 꽃이야, 난 꽃만 담고 싶어 하면서 셔터를 누르면 꽃으로 찍힌다는 식이다. 그것과 손톱시는 다르다.\n\n#### **찍히는 것 안에 다 있다**\n\n카메라를 찍는 행위 자체에도 어떤 의도가 들어가 있다. 이 나무를 담고 싶다는 선택이 있다. 그러니까 손톱시를 쓰면 거기에 그때 당시 당연하게 올라왔던 것들 — 감정이면 감정, 의도면 의도 — 이 다 들어가 있다. 그런데 그것을 읽는 사람에 따라 전혀 다른 맥락으로 읽힐 수 있다. 자기 관점으로 보니까. **그래도 관계없다.** 쓴 작가의 의도가 읽는 사람한테 그대로 전달될 필요는 없다. 오히려 그렇기 때문에 수행적으로 의미가 있다. 의도가 개입되지 않아도 된다는 것이다. 그냥 아는 마음과 온전히 받아들이는 마음 — 그 표현이 손톱시로 드러날 수 있다. 아무것도 아닌 것 같지만 굉장히 강력한 것이 될 수 있는 이유가 거기에 있다. #손톱시 #카메라비유 #있는그대로 #그냥아는마음 #온전히받아들이는마음\n\n--- (구분선)", "source": "essay"}, {"id": "essay_344_8c06e4e0f3", "text": "있다. 아무것도 아닌 것 같지만 굉장히 강력한 것이 될 수 있는 이유가 거기에 있다. #손톱시 #카메라비유 #있는그대로 #그냥아는마음 #온전히받아들이는마음\n\n--- (구분선)\n\n[파일명: 손톱시와동화_그냥보기_수필.md]\n\n### **손톱시와동화_그냥보기_수필**\n\n[보완 가능 단락 — 손톱시 관련 파일에 합칠 것]\n\n#### **동화(動畵) — 움직이는 그림**\n\n동화(童話)는 아이 동(童) 자가 아니다. 움직일 동(動) 자다. **동화는 움직이는 그림이다.** 어른 것과 아이 것의 구분이 아니라, 살아있음의 문제다. 글도 동사를 많이 쓰면 살아있게 된다. 시도 동적으로 표현하면 좋다. 그림도 마찬가지다. 한 장에 고정된 그림이라도 움직임이 있으면 동화다. 영상이 재미있는 이유가 움직이기 때문이듯, 그림에도 그 움직임이 있다. 나는 앞으로 동화를 그렇게 어필할 것이다. 움직이는 그림을 파는 것이다.\n\n#### **그림은 그냥 보면 안다**\n\n글과 말은 받아들이는 사람에 따라 다 달라진다. 사회적 규약은 있지만 각자 메이는 방향이 다르다. 그런데 그림은 딱 보여줬을 때 그 모순이 덜하다. **그냥 보면 그냥 안다.** 아이들은 그림책에서 어른이 보지 못하는 것을 찾아낸다. 노력해서 보는 게 아니라 그냥 보기 때문이다. 손톱시가 주장하는 것도 그것이다. 그냥 쓰자. 지금 바로 내 앞에 있는 것, 눈앞에 보이는 것, 들리는 것을 그냥", "source": "essay"}, {"id": "essay_345_d32aa1e579", "text": "것을 찾아낸다. 노력해서 보는 게 아니라 그냥 보기 때문이다. 손톱시가 주장하는 것도 그것이다. 그냥 쓰자. 지금 바로 내 앞에 있는 것, 눈앞에 보이는 것, 들리는 것을 그냥 쓰자. 추상적인 것, 개념이 들어간 것들을 쳐내자. 그림책도 그런 의미에서 손톱시와 같은 방향이다.\n\n#### **맥락을 바꾸면 스토리가 바뀐다**\n\n손톱시를 쓸 때 배경을 바꿔보면 새로운 관점이 생긴다. 같은 시를 새로운 관점에서 보는 것이다. 아이들이 학원 얘기만 하는 것은 맥락이 학원뿐이기 때문이다. **맥락을 바꾸면 전혀 다른 스토리가 전개된다.** 만나는 사람을 바꾸고, 환경을 바꾸고, 보고 듣는 것을 넓혀야 시야가 넓어진다. #손톱시 #동화動畵 #그냥보기 #맥락바꾸기 #보완가능단락\n\n--- (구분선)\n\n[파일명: 수준에내려가기_끌어올림의원리_수필.md]\n\n### **수준에내려가기_끌어올림의원리_수필**\n\n#### **영성과 비전은 맨 꼭대기에 있다**\n\n사람의 의식 수준에는 층위가 있다. 행동, 능력, 가치관과 신념, 그리고 그 위에 영성과 비전. 이것이 신경 논리 수준의 구조다. 맨 꼭대기에 영성과 비전이 있다. 심리치료사든, 코치든, 상담사든 — 어떤 라인을 탔든 간에 — 결국 그 사람들이 향하는 최상위 목표는 같다. 영성과 비전. 그것이 그들이 가고자 하는 곳이다.\n\n#### **먼저 내려가야 끌어올릴 수 있다**\n\n그런데 대번에 영성과 비전", "source": "essay"}, {"id": "essay_346_efa379bc9b", "text": "— 결국 그 사람들이 향하는 최상위 목표는 같다. 영성과 비전. 그것이 그들이 가고자 하는 곳이다.\n\n#### **먼저 내려가야 끌어올릴 수 있다**\n\n그런데 대번에 영성과 비전만 들고 가면 안 된다. 그 가치를 모른다. 아직 거기까지 오지 않은 사람에게, 맨 꼭대기 이야기는 닿지 않는다. 그러니 먼저 내려가야 한다. **상대방이 있는 수준으로.** 행동을 중시하는 사람에게는 행동으로 내려간다. 능력을 키우려는 사람에게는 능력으로 내려간다. 가치관과 신념을 중시하는 사람, 종교적 신념을 가진 사람에게는 그 언어로 내려간다. 그렇게 만나서, 거기서부터 끌어올리는 것이다. 이것은 전략이 아니다. 존재 방식이다. 상대가 있는 곳으로 가는 것, 그것이 만남의 시작이다.\n\n#### **그릇을 준비하고 기다린다**\n\n어느 정도 뭉쳐지면, 사람들은 저절로 더 높은 곳을 바라보게 된다. 자기가 원하는 방향성을 잡고, 담을 그릇만 준비되어 있으면, 사람들은 스스로 그쪽으로 온다. 억지로 끌어당기는 게 아니다. 그릇을 준비하고 있는 것이다. **수준에 맞게 내려가는 것이 곧, 더 높은 곳으로 가는 지름길을 함께 여는 일이다.** #신경논리수준 #영성 #끌어올림 #코칭 #안내자\n\n--- (구분선)\n\n[파일명: 수행의오해_당연함을당연하게_수필.md]\n\n### **수행의 오해, 당연함을 당연하게**\n\n#### **수행하면 뺨을 맞아도 안 아파야 하나**", "source": "essay"}, {"id": "essay_347_6dbcf78420", "text": "자\n\n--- (구분선)\n\n[파일명: 수행의오해_당연함을당연하게_수필.md]\n\n### **수행의 오해, 당연함을 당연하게**\n\n#### **수행하면 뺨을 맞아도 안 아파야 하나**\n\n수행을 하면 어떻게 되어야 한다는 이상한 기대가 있다. 수행했는데 왜 화를 내냐, 수행했는데 왜 감기에 걸리냐, 수행했는데 왜 그렇게 살고 있냐 — 이런 말들이다. 그런데 이것은 말이 안 된다. 뺨을 맞으면 아프다. 당연하다. 수행을 했다고 안 아파야 한다는 것은 정신 승리다. 겨울에 추운 것은 당연하다. 수행을 했다고 추위를 안 타고 감기도 안 걸리는 초인간이 되어야 한다는 것은 당연한 것을 당연하지 않게 바꾸고 싶은 것이다. 그러니까 그 수행만큼의 고통이 따른다. **재단한 만큼의 고통이 자연스럽게 따르는 것이다.** 수행은 당연한 것을 당연하게 받아들이는 연습이다. 당연한 것을 당연하지 않게 받아들이고 싶은 마음을 알아채는 것이다.\n\n#### **화라는 이름을 붙이는 순간**\n\n내 안에서 무언가가 올라온다. 그것은 당연하게 올라온 것이다. 그런데 거기에 화라는 이름을 붙이는 순간 문제가 시작된다. 화라는 단어 하나로 그 상황과 맥락을 퉁치는 것이다. 굉장히 복합적인 요소가 드러나서 올라온 것인데, 각자의 삶과 경로가 달라서 올라온 것인데, 사회에서 규정한 화, 외로움, 슬픔으로 한 단어로 규정 지을 수 없다. **그런데 화라고 이름을 붙이면 화가 있는", "source": "essay"}, {"id": "essay_348_529a340d47", "text": "러나서 올라온 것인데, 각자의 삶과 경로가 달라서 올라온 것인데, 사회에서 규정한 화, 외로움, 슬픔으로 한 단어로 규정 지을 수 없다. **그런데 화라고 이름을 붙이면 화가 있는 거다. 화가 있으니 이렇게 해야 된다가 자동으로 따라붙는다.** 화를 없애야 한다, 보복해야 한다, 다음에는 이런 상황에서 이렇게 해야 한다 — 의미 갖고 싸우고 있는 것이다. 당연하게 올라온 느낌이나 감각은 밀쳐버리고, 내가 부여한 의미를 가지고 공상망상을 펴는 것이다.\n\n#### **솔루션이 오히려 더 씌운다**\n\n상담가, 자기계발서, 해결사 — 이들이 주는 것은 대부분 둘 중 하나다. 대상을 바꾸려고 노력하거나, 그것을 다르게 보거나. 솔루션을 주는 것이다. 그런데 그 솔루션이 근본적인 해결이 아니라 오히려 더 씌우는 경향이 있다. 설령 그 방법이 통했다 해도 그 상황에서만 통하는 것이다. 다른 맥락에서 비슷한 것이 올라오면 또 다른 방법을 배워야 한다. 매번 그게 필요해진다. **근본적인 해결이 안 되는 것이다.** 사실 얼마나 간단한 일인가. 당연한 것을 당연하게 받아들이면 된다. 배고프면 밥을 먹으면 된다. 추워서 감기에 걸렸으면 감기에 걸린 것이다. 감정도 올라왔다가 바뀐다. 생각도 그렇다. 그냥 지켜만 봐도 다른 것으로 바뀐다. 그런데 우리는 화라고 이름 붙였기 때문에, 그 이름을 붙인 것과 계속 씨름하고 있는 것이다. 바꾸려는 의도 때문에", "source": "essay"}, {"id": "essay_349_2c2f807849", "text": "바뀐다. 생각도 그렇다. 그냥 지켜만 봐도 다른 것으로 바뀐다. 그런데 우리는 화라고 이름 붙였기 때문에, 그 이름을 붙인 것과 계속 씨름하고 있는 것이다. 바꾸려는 의도 때문에 오히려 못 바꾸고 계속 끌고 가는 것이다.\n\n#### **꽃길만 걷기를 바란다는 것**\n\n꽃길만 걷기를 바란다는 것은 꽃이 지지도 않고 그대로 있어야 한다는 것이다. 그런데 꽃은 피고 지는 것이 당연한 자연의 이치다. 꽃길만 걷는다면 진짜 꽃이 아니어야 한다. 조화가 꽂혀 있어야 한다. 진짜 꽃은 변한다. 거기다 꽃이 있으려면 꽃 아닌 것들이 있어야 한다. 흙이 있어야 하고, 지렁이도 있어야 하고, 자갈도 있어야 하고, 비도 와야 한다. **나 자신이 꽃이 아니어야 꽃으로 인식한다.** 꽃길만 걷는 나라는 것은 상상 속에서나 존재한다. 꽃길만 걷는 나의 사진을 딱 찍으면 그것은 고정된 것이다. 흐름이 아닌 멈춰진 것이다. 삶이 아니다. 세월이 지나면 그 사진도 바랜다. 그런데 우리는 그 고정된 꽃길을 좋은 삶으로 바라는 것이다. 방송이, 사회적 분위기가, 상업성이, 교육이 짬뽕 돼서 나의 사고를 그렇게 만들어왔고 나도 모르게 젖어들어간 것이다.\n\n그냥 아는 마음과 온전히 받아들이는 마음은 수행을 해서 얻는 것이 아니다. **당연한 것을 당연하게 받아들이는 것, 그것이 두 가지 마음을 가장 잘 설명하는 것이다.** #수행의오해 #당연함을당연하게 #이름붙이기의함", "source": "essay"}, {"id": "essay_350_c85af964a3", "text": "마음은 수행을 해서 얻는 것이 아니다. **당연한 것을 당연하게 받아들이는 것, 그것이 두 가지 마음을 가장 잘 설명하는 것이다.** #수행의오해 #당연함을당연하게 #이름붙이기의함정 #꽃길비유 #그냥아는마음\n\n--- (구분선)\n\n[파일명: 순수의식비판_성기와올셀프_수필.md]\n\n## 순수의식비판_성기와올셀프_수필.md\n\n## 순수 의식을 보는 것이 의식인데, 누가 보는가\n\n프란시스 루실은 탐구를 통해 생각이 멈춘 자리에서 드러나는 순수한 의식을 보게 된다고 한다. 그런데 여기서 한 가지 맹점이 있다. 의식 보는 것이 의식인데, 순수한 의식을 누가 보냐는 것이다.\n\n순수 의식이 따로 있다고 보는 것이다. 기독교적으로 표현하면 크리스토의 식이라든가 하느님의 영 같은 것으로. 그런데 **의식이라는 것이 뭔가 따로 있다**고 보면, 현상을 떠난 의식이 따로 있는 게 아니잖아. 불이적인 관점에서 보면 현상이 곧 의식이다. 눈에 보이는 이것들이 다 사실은 의식인 것이다. 이것을 떠난 어떤 따로의 의식이 있어 가지고 이것들을 알아차리고 하는 것이 아니라는 거다.\n\n의식 자체를 알 수는 없다. 지금 보여지고 들려지는 것으로서 확인될 뿐이다. 그 자체를 스스로가 알 수는 없다는 것이다. **드러남으로써 우리가 보는 것**이다. 한 물건도 없다 할 때, 그 의식 자체도 따로 없다는 것이 그 말이다.\n\n## 주장자의 드러남이 의식이다\n\n선사들이 주장자를", "source": "essay"}, {"id": "essay_351_02e887408b", "text": "다는 것이다. **드러남으로써 우리가 보는 것**이다. 한 물건도 없다 할 때, 그 의식 자체도 따로 없다는 것이 그 말이다.\n\n## 주장자의 드러남이 의식이다\n\n선사들이 주장자를 들어 올리거나, 주장자로 탁탁 쳐서 소리를 낸다. 그것이 의식이다. 주장자를 바라보는 어떤 것이 따로 있는 것이 아니고, 소리를 듣는 어떤 것이 따로 있는 것이 아니다. **주장자의 드러남, 소리의 드러남, 이것 자체가 의식**이다.\n\n불교에서는 그것을 불성이라 표현할 수도 있다. 그런데 불성이라고 하면 또 어떤 한 물건이 돼버린다. 화엄경 쪽으로 얘기하면 그게 일심이 드러나는 것이고, **성기**로 표현할 수 있는 것이다.\n\n## 똥 막대기 — 글자 하나하나가 이미 성기다\n\n선사가 불성이 무엇이냐는 물음에 '똥 막대기'라 답한다. 이것을 순차적으로 이어서 '똥막대기'라는 하나의 개념으로 받아들이면, 사람들은 또 '똥막대기가 불성인가?'라는 착각을 일으킨다.\n\n그런데 이렇게 생각해볼 수 있다. 오늘은 똥이라 하고, 내일은 막이라 하고, 모레는 대, 그다음엔 기. 하나하나 따로 얘기하면 아무것도 아닌 것들이다. 그게 순차적으로 나열되어 관계적으로 엮이면 **똥막대기라는 의미**가 돼버리는 것이다. 이게 연기다.\n\n그런데 똥 할 때 그 똥 하는 소리, 막 할 때 막 하는 그 소리, 글자 하나하나의 일어남은 그야말로 **성기**다. 우주의 드러남이다. 그러니까", "source": "essay"}, {"id": "essay_352_9537747648", "text": "버리는 것이다. 이게 연기다.\n\n그런데 똥 할 때 그 똥 하는 소리, 막 할 때 막 하는 그 소리, 글자 하나하나의 일어남은 그야말로 **성기**다. 우주의 드러남이다. 그러니까 똥이 불성이고 일심이고, 막이 일심이다. 한 글자 한 글자가 이미 성기인 것이다.\n\n선사가 똥막대기라고 한 것이 어떤 반어법으로서가 아니다. 착각을 깨기 위한 방편이기도 하지만, 그 자체로서 이미 진리를 표현하고 있다. 똥 할 때 똥이 진리인 것이고, 막 할 때 막이 진리인 것이다. **그것이 드러남이다.**\n\n## 드러난 것은 하나도 버릴 게 없다\n\n이렇게 보면 이 세상에 드러난 어떤 것이든, 그것이 아무리 하찮은 것이고 더러운 것이라 해도, 그 전에 이미 그 자체로서 진실하다. 그것이 나한테 드러났다는 것은 그 자체로서 이미 진리를 표현한 것이다.\n\n더럽고 하찮고 미천하니까 진리가 아니고, 고결하고 순수한 연꽃은 진리를 표현한다는 것이 아니다. **있는 그대로가 드러나는 것이 온전히 그냥 알아지는 상태**다. 그것이 그 자체로서 진리의 표현이고 진리의 드러남이다. 이럴 때 이게 그야말로 불이(不二)라고 할 수 있는 것이다.\n\n사실은 진리 아닌 게 없고, 버릴 게 없다. 이렇게 따지면.\n\n## 부정이 아닌 절대 긍정 — 올셀프\n\n프란시스 루실이나 바이런 케이티는 제거를 통해, 혹은 반어법을 통해 진리로 간다. 일종의 방편이다. 더 깊이 들어가면 그들도 결국", "source": "essay"}, {"id": "essay_353_c3520313b5", "text": "지면.\n\n## 부정이 아닌 절대 긍정 — 올셀프\n\n프란시스 루실이나 바이런 케이티는 제거를 통해, 혹은 반어법을 통해 진리로 간다. 일종의 방편이다. 더 깊이 들어가면 그들도 결국 같은 것을 말하는 것 같다. 모든 것을 제거하고 나면 어떤 남는 순수 의식인 것이 아니고, 그냥 눈앞에 펼쳐지는 이것이다. 바이런 케이티도, 프란시스 루실도, 루퍼드 스파이라도 결국 그것을 얘기하는 것이 아닌가 싶다.\n\n나는 **긍정을 통해서** 간다. 드러난 모든 것들이 다 결국 나의 드러남이다. 그것을 나라고 할 수 있으니까, **올셀프**라고 표현하는 것이다. 있는 그대로 드러난 모든 것들이 다 긍정될 수 있는 것이다.\n\n물론 방편으로서 언어의 추상성, 그 허점을 발견하게 하는 작업은 있다. 사랑이 무엇이냐, 컵이라고 부르지만 그 컵이라는 것은 우리 관념의 컵이다. 컵이라는 글자를 떼고 이것을 표현해보라 하면 말문이 막힌다. 그런 방편을 쓸 수는 있다. 그러나 근본적으로 나는 **절대 긍정, 올셀프**라는 것으로 사람들에게 전하고 싶은 것이다.\n\n## 가시 자체도 올셀프의 드러남이다\n\n나 같은 경우에는, 가시 자체도 불성의 표현이다. 가시를 빼고 남은 어떤 것이 아니다. 가시로도 드러나고, 상처로도 드러나고, 아픔으로도 드러나고, 고통으로도 드러나고, 물론 행복이나 평화로도 드러나지만. 어떤 것을 제거하거나 해서 얻어지는 것이 아니다. **지금 일어나", "source": "essay"}, {"id": "essay_354_1c26bef5b0", "text": "로도 드러나고, 상처로도 드러나고, 아픔으로도 드러나고, 고통으로도 드러나고, 물론 행복이나 평화로도 드러나지만. 어떤 것을 제거하거나 해서 얻어지는 것이 아니다. **지금 일어나고 있는 그 자체가 온전히 올셀프임을 증명하는 것**이다.\n\n생각이나 망상도, 지금 그것이 일어나고 있다는 그 자체가 올셀프의 드러남이다. **망상을 따로 없애서 깨끗한 것을 얻는 게 아니고, 망상 자체가 성기임을 드러낸다.** 그래서 이것은 연기적인 수행이 아니다. 그냥 바로, 즉시, 그 드러남이다.\n\n여기서 한 가지를 분명히 해야 한다. 망상의 **일어남** 자체는 문제가 없다. 문제는 그 망상의 **의미를 실제라고 착각하는 것**이다. 망상이나 느낌, 감정은 있는 그대로 온전하다. 그런데 거기에 어떤 의미를 붙여서 그 의미에 매여버린다. 바다에서 파도가 이는 것은 당연하다. 파도를 없애려 하거나, 파도를 더 그럴듯한 파도로 바꾸려 하는 것이 헛힘이다. 망상 자체가 성기라는 것은, 파도가 바다임을 보는 것이다.\n\n그래서 수행이 필요 없는 것이 아니다. 수행의 성격이 달라지는 것이다. 뭔가를 없애거나 얻으려는 것이 아니라, **이미 갖추어진 것을 확인하는 것**이다. **그냥 아는 마음**과 **온전히 받아들이는 마음**, 이 둘은 한마음의 두 측면이다. 이것이 우리에게 본래 갖추어진 본성이다. 따로 얻을 수도 잃을 수도 없다. 수행이란 이것을 확인하는 것", "source": "essay"}, {"id": "essay_355_14a0ea8074", "text": "마음**과 **온전히 받아들이는 마음**, 이 둘은 한마음의 두 측면이다. 이것이 우리에게 본래 갖추어진 본성이다. 따로 얻을 수도 잃을 수도 없다. 수행이란 이것을 확인하는 것, 안목을 갖추는 것이다. 의미를 떠나서.\n\n이것이 올셀프의 단편이라 할 수 있다.\n\n#순수의식비판 #성기 #올셀프 #절대긍정 #불이\n\n--- (구분선)\n\n[파일명: 스토리를아는것도스토리_바다와파도_수필.md]\n\n### **스토리를 아는 것도 스토리다**\n\n#### **빠져나온 것도 또 하나의 파도다**\n\n스토리에 휩쓸리다가 아 이거는 스토리일 뿐이구나 하고 아는 순간이 있다. 그런데 그 아는 것도 스토리다. 스토리가 전개되면서 아 이거는 나만의 생각이구나 하고 빠져나온 그것도, 앞에 스토리가 있었기 때문에 생겨난 또 하나의 스토리다. 원래는 그것이 없었다. 그때 나타난 것이다. 그러니까 스토리에서 빠져나왔다고 생각하는 그 나도, 앞의 스토리가 없었으면 없었을 나다. **생각으로 지어낸 나다.** 스토리에 빠져 있던 패턴이 스토리를 알아채는 패턴으로 바뀐 것뿐이다. 교묘하게. 그러면서 점점 짧아진다. 그러다 또 다른 인식으로 넘어간다.\n\n#### **바다는 자기를 알 수 없다**\n\n스토리에 빠져 있다가 빠져나오는 것도 인식이고, 그 전체가 다 파도다. 파도가 일어났다 사라지는 것이다. 그 파도를 통해 바다가 있음이 증명된다. 보이는 것도 파도고, 들리는 것도", "source": "essay"}, {"id": "essay_356_59dfcc41a8", "text": "스토리에 빠져 있다가 빠져나오는 것도 인식이고, 그 전체가 다 파도다. 파도가 일어났다 사라지는 것이다. 그 파도를 통해 바다가 있음이 증명된다. 보이는 것도 파도고, 들리는 것도 파도고, 생각하는 것도 파도다. 그런데 **바다는 자기가 바다인 줄 알 수 없다.** 의식이 자기를 의식할 수 없는 것과 같다. 의식은 전체다. 지금 이 생각을 할 때도 이미 눈앞에 풍경이 펼쳐져 있고, 소리는 이미 들리고 있고, 몸의 감각도 느껴지고 있다. 그 전체가 의식이다. 인식은 그 의식 중에서 특정 부분을 딱 붙잡은 것이다. 초점이 잡아진 것이다. 커피를 마셔야겠다고 생각하니까 컵이 나한테 컵으로 인식된다. 항시 의식 상태에서 다 있었는데 인식이 안 됐을 뿐이다. 깜깜한 방에 있다고 해서 방 밖이 없는 것이 아니다. 내 인식이 그 안에서만 머무니까 그것밖에 안 보이는 것이다. 나가면 바깥이 다 보인다. 그때 인식이 넓어진 것이지 의식이 넓어진 것이 아니다. 의식은 넓고 좁고가 없다. **항시 이미 통으로 있는 것이다.**\n\n#### **불깡통을 돌리면 원이 보인다**\n\n위빠사나 수행을 깊이 하면 순간순간 생각이 일어났다 사라지고, 느낌이 일어났다 사라지고, 소리가 들렸다 사라지는 것이 보인다. 찰나찰나 잘라 잘라 일어나는 것이 보인다. 그러면 이 사람들이 딱 본다. **내가 없네.** 고정된 내가 없네. 불깡통을 잡아 돌리면 마치 불붙은 원이 있는", "source": "essay"}, {"id": "essay_357_4fdc45a22f", "text": "사라지는 것이 보인다. 찰나찰나 잘라 잘라 일어나는 것이 보인다. 그러면 이 사람들이 딱 본다. **내가 없네.** 고정된 내가 없네. 불깡통을 잡아 돌리면 마치 불붙은 원이 있는 것처럼 보인다. 그런데 사실 원은 없다. 너무 빨리 일어나니까 우리 인식이 쫓아가지 못해서 고정된 나가 있는 것처럼 보였던 것이다. 엉덩이의 닿는 느낌을 느끼는 것뿐인데, 그것을 느끼는 내가 따로 있다고 생각했던 것이다. 의식이 예민해지면 찰나찰나 일어나는 것이 보이고, 그 사이사이 틈이 보인다. 아 이것이 실재하는 것이 아니구나. 찰나생 찰나멸일 뿐이구나. 무상하다는 것은 대상이 무상한 것이고, 무아라는 것은 그것을 아는 나도 역시 고정되지 않는다는 것이다. 없다는 게 아니다.\n\n#### **알아차리는 나도 잡을 수 없다**\n\n수행을 하다 보면 함정이 있다. 아 이거는 스토리구나 하고 알아차리는 나가 생긴다. 그것을 잡으려 한다. 아 나는 이런 수행자다 하고. 그런데 그 생각도 유지될 수 없다. 앞의 조건에 의지해서 생겨난 것이기 때문에 다른 것으로 바뀐다. 엉덩이가 불편해지면 의식이 거기로 간다. 누가 부르면 또 거기로 간다. 잘라 잘라 잘라 일어나는 파도처럼. **나라는 것은 고정할 수 없다.** 지금 이렇게 말을 하는데 이 말의 한 토막을 딱 잡아보라. 잡을 수 없다. 촛불을 딱 끊어서 잡을 수 없는 것처럼. 내가 알고 있는 나의 모습, 느낌, 생각", "source": "essay"}, {"id": "essay_358_185a4652d0", "text": "고정할 수 없다.** 지금 이렇게 말을 하는데 이 말의 한 토막을 딱 잡아보라. 잡을 수 없다. 촛불을 딱 끊어서 잡을 수 없는 것처럼. 내가 알고 있는 나의 모습, 느낌, 생각 — 이것들은 다 현상이다. 그것을 딱 잡아서 이것이 나라고 할 수 없다. 파도의 모습이 어떻든, 내가 스토리에 빨려 들어가든 나왔든, 이미 다 받아주고 있는 바다가 있다. 파도는 쳐야 파도이고, 파도가 쳐야 바다가 살아있는 것이다. 출렁출렁 출렁거리는 전체에서 내가 원하는 어떤 모습을 잡으려 하지만, 흐름이 끊기면 잡을 수 없다.\n\n#### **돌아가셨다는 말**\n\n죽으면 돌아간다고 한다. 죽은 것은 인식이다. 의식은 어디 가는 것이 아니다. 항시 있는 것이다. **의식으로 다시 돌아가는 것이다.** 옛날 사람들이 그것을 알았기 때문에 그런 말을 쓴 것이다. 영어로는 그냥 died라고 하지만 우리말은 돌아가셨다고 한다. 괜히 쓰는 말이 아니다. 이 의식에서 나라고 인식이 되고 있다. 지금 내가 있다는 것이 확실하다. 이것이 더 선험적인 나다. 여기서 드러나고 있으니까. 죽어도 내 인식이 죽는 것이지 의식은 항시 있는 것이다. 스토리를 아는 것도 스토리다. 그러나 그 파도들이 출렁이는 바다는 항시 있다. #바다와파도 #스토리를아는것도스토리 #위빠사나 #찰나생찰나멸 #돌아가셨다\n\n--- (구분선)\n\n[파일명: 스토리와자유_연기와손톱시_수필.md]\n\n### **", "source": "essay"}, {"id": "essay_359_8140d54a71", "text": "는 바다는 항시 있다. #바다와파도 #스토리를아는것도스토리 #위빠사나 #찰나생찰나멸 #돌아가셨다\n\n--- (구분선)\n\n[파일명: 스토리와자유_연기와손톱시_수필.md]\n\n### **스토리와 자유**\n\n#### **우리는 서로의 스토리를 만난다**\n\n나는 나를 인식할 때도 스토리로 인식한다. 머릿속에서 이러이러하다고 이야기를 엮어 나를 알아간다. 상대방을 만날 때도 마찬가지다. 내가 그 사람을 직접 만난다고 생각하지만 사실은 그 사람의 스토리를 만나고 있는 것이다. 그 사람의 모습, 이름, 말, 생각 — 그것들이 전부 스토리다. 나라는 스토리와 그 사람의 스토리가 만나서 또 다른 스토리가 쓰여지고 있는 것이지, **직접적으로 그 사람 자체를 만나는 것이 아니다.** 그래서 소통이 안 된다고 느끼는 것이다. 스토리를 통해 하니까 그 스토리가 의미하는 바가 서로 다르다. 내가 너는 이런 사람이야 하면 상대방은 나는 그렇지 않은데 한다. 이 사람이 얘기를 해도 저 사람은 자기 스토리로 받아들인다. 말로 다 전달했어도 100% 전달이 안 된다. A라는 사람의 스토리를 B가 들어도 A의 스토리 그대로 전달되지 않는다. A 자신도 그 스토리를 고정 지을 수 없다. 그때 그 생각이 있었던 것뿐이다. 그런데 그 스토리 이전에, 우리는 **이미 온전하게 통으로 만나고 있다.** 스토리를 벗어난 그것은 뭐라 규정 지어지지 않는다. 그런데 이미 만나 있는", "source": "essay"}], [{"id": "essay_360_54917a171e", "text": "생각이 있었던 것뿐이다. 그런데 그 스토리 이전에, 우리는 **이미 온전하게 통으로 만나고 있다.** 스토리를 벗어난 그것은 뭐라 규정 지어지지 않는다. 그런데 이미 만나 있는 것이다. 우리가 그것을 놓치고 자꾸 스토리를 조정하고 조정하려 한다.\n\n#### **자유의지는 착각이다**\n\n나도 내 뜻대로 안 된다. 내 뜻이라는 것 자체가 스토리이기 때문이다. 내 스토리대로 안 되는데 상대방이 내 스토리대로 될 리 없다. 세상도 마찬가지다. 자식이 잘 살았으면 좋겠고, 교육을 시켜 훌륭한 사람으로 키우고 싶다는 것도 스토리다. 그 스토리가 연기적으로 서로 얽혀 돌아가는 이 흐름을 쉽게 바꿀 수 없다. 내일 소풍을 가야 하는데 비가 안 왔으면 좋겠다고 일기에 썼다. 내일 정말 비가 안 왔다. 그렇다고 내가 그렇게 써서 비가 안 온 것이 아니다. 비가 안 올 것이었는데 내가 그렇게 쓴 것이다. **연기적으로 돌아가는 원리가 내 생각과 맞아떨어진 것이지, 내 생각대로 연기가 돌아간 것이 아니다.** 뇌과학적으로도 그렇다. 내가 어떤 의지를 인지하기 몇 초 전에 이미 뇌는 결정을 내리고 있다. 내가 인지하기 전에 이미 결정이 일어나고 있다는 것이다. 내가 어떤 생각을 하는 것도 과거에 배우고 듣고 경험한 것들이 쌓여서 그 생각이 떠오르는 것이다. **내 조건 지어진 패턴 그 이상을 뛰어넘는 생각을 우리는 할 수 없다.** 그것이 생각의 한계다.", "source": "essay"}, {"id": "essay_361_fae74c7d14", "text": "하는 것도 과거에 배우고 듣고 경험한 것들이 쌓여서 그 생각이 떠오르는 것이다. **내 조건 지어진 패턴 그 이상을 뛰어넘는 생각을 우리는 할 수 없다.** 그것이 생각의 한계다. 자유의지가 있다 없다 하는 것 자체가 ego가, 스토리가 느끼는 자유다. 스토리대로 마음대로 쓰여야 되는 게 자유가 아니다. 연기적으로 돌아가는 그것이 자유다.\n\n#### **이미 자유롭다**\n\n나무가 바람에 흔들린다. 바람이 부니까 흔들리는 것이다. 그런데 나는 안 흔들리고 싶다며 열심히 노력해서 흔들리지 말아야지 한다면 그렇게 될 수 없다. 바람으로부터 자유로워지고 싶은 게 자유가 아니다. **바람에 흔들리는 것이 자유다.** 시계 안에는 수많은 태엽과 기어가 서로 맞물려 돌아간다. 어느 특정 기어가 나는 좀 빨리 돌고 싶다 한다고 빨리 돌 수 없다. 나만의 특별한 의지가 발현되거나 의도가 관철되기를 원하기 때문에 자유롭지 못해지는 것이다. 연기적으로 맞물려 돌아가는 것이 전체적으로 볼 때 자유다. 우리가 경제적 조건에서 자유롭고 싶어 돈을 벌려 하고 자식도 잘 됐으면 하는 그 이면에는 자유롭게 살고 싶은 것이다. 그런데 그 스토리를 떠나면 **이미 우리는 자유롭다.** 특정 조건이 갖춰져야 자유롭다고 생각하는 그것 때문에 부자유해지는 것이다. 이 흐름에 거슬르지 않으면, 연기적으로 맞물려 돌아가는 것 그 자체가 자유다.\n\n#### **손톱시가 가리키는", "source": "essay"}, {"id": "essay_362_f12b8dd0bc", "text": "조건이 갖춰져야 자유롭다고 생각하는 그것 때문에 부자유해지는 것이다. 이 흐름에 거슬르지 않으면, 연기적으로 맞물려 돌아가는 것 그 자체가 자유다.\n\n#### **손톱시가 가리키는 것**\n\n손톱시는 그래서 나온 것이다. 어떤 대상을 만나거나 상황을 접할 때 나의 의도와 의미를 덜어내고 보면, 직접적으로 대상의 본질에 가까워질 수 있다. 본질을 직접 나타낼 수는 없다. 그러나 **본질을 가리킬 수는 있다.** 손톱시가 씌워진 그 자체, 글씨가 드러난 그 자체가 이미 본질을 드러내고 있다. 사람들이 그것을 눈치채지 못할 뿐이다. 손톱시는 현대적인 선의 언어로서 본질을 가리키는 역할을 한다. 뜰 앞의 잣나무라는 화두처럼, 선사들이 손가락으로 달을 가리키듯. 나라는 것이 있어서 특정한 의지나 의도를 일으키는 것이 아니다. 살아오면서 일으켜온 의지와 의도들의 무더기, 연기적으로 조건 지어져 툭툭 튀어나오는 것들의 무더기를 나라고 생각하고 있는 것이다. 그 이면에 나라는 것이 있어서 일으킨다는 것이 착각이다. 의지와 의도가 나오는 것은 사실이다. 그런데 그 이면에 나라는 고정된 무언가가 있어서 일으키고 있다는 것, 그것이 **비어있다.** 스토리를 벗어나면 나라는 것을 일으키는 이면에 나가 없다. 일어난 것들로 나는 나를 알 수밖에 없는데, 그 이면에 없는 것을 괜히 붙들고 내 의도대로 됐으면 좋겠다 안 됐다 속상하다 한다. 그게 너무 미묘해서", "source": "essay"}, {"id": "essay_363_cfaee1322c", "text": "일으키는 이면에 나가 없다. 일어난 것들로 나는 나를 알 수밖에 없는데, 그 이면에 없는 것을 괜히 붙들고 내 의도대로 됐으면 좋겠다 안 됐다 속상하다 한다. 그게 너무 미묘해서 알기가 쉽지 않다. 그것을 딱 아는 것을 **깨달았다** 고 하는 것이다. #스토리와연기 #자유의지 #이미자유롭다 #손톱시 #올셀프\n\n--- (구분선)\n\n[파일명: 시련_인생시험문제_수필.md]\n\n### **시련_인생시험문제_수필**\n\n#### **왜 나한테만 이렇게 힘든 일이 생길까**\n\n\"왜 나는 이렇게 힘들게 살까.\" 누구나 한번쯤 이런 생각을 한다. 하느님이, 혹은 하늘이 0.1초도 나를 한눈팔지 않고 돌봐주고 있다는데, 그렇게 돌봐주면서 왜 이런 시련을 주냐고. 그러면 참 못된 것 아니냐고. 그런데 그렇지가 않다.\n\n#### **시련은 시험 문제다**\n\n아이를 훌륭하게 키우려면 어떻게 해야 하는가. 맛있는 것만 주고 마음껏 놀게 하면 안 된다. 달리기도 시켜야 하고, 수학 문제도 풀게 해야 한다. 아이는 풀기 싫어하고 놀고 싶어하지만, 그렇게 해서는 성장할 수 없다. 우리한테 주어지는 시련도 마찬가지다. **시험 문제를 주는 것이다.** 그것을 통해서 단련을 시키려는 것이다. 그 문제를 풀기 싫다고 계속 피해 다니면 **유아기적인 마인드** 로 살 수밖에 없다.\n\n#### **문제를 많이 풀수록 도인이 된다**\n\n어렵게 사신 분들이 오십, 육십이", "source": "essay"}, {"id": "essay_364_daff6d11e1", "text": "다. 그 문제를 풀기 싫다고 계속 피해 다니면 **유아기적인 마인드** 로 살 수밖에 없다.\n\n#### **문제를 많이 풀수록 도인이 된다**\n\n어렵게 사신 분들이 오십, 육십이 되어 보면 대부분 도인처럼 보인다. 이유가 있다. **문제를 그만큼 많이 풀었기 때문이다.** 삶이 던져주는 시험 문제들을 피하지 않고 정면으로 마주해온 것이다. 반대로 문제를 안 풀고 오십, 육십이 됐다면 나이는 먹었지만 철이 들지 않은 것이다. 하늘의 뜻을 모르는 것이다. 나이가 사람을 성숙하게 만드는 것이 아니라, **문제를 푼 횟수가 사람을 성숙하게 만든다.**\n\n#### **믿음으로 풀어야 제대로 풀린다**\n\n시련을 대하는 태도가 결과를 가른다. '괜히 나한테 이런 시련을 줄 리가 없어. 이것은 나를 성장시키기 위해서 주는 것이야.' 이런 **믿음** 을 가지고 문제에 임해야 한다. 그 믿음이 있을 때 비로소 문제를 제대로 풀 수 있다. 내가 원하는 방향으로만 문제를 풀려 하면 거기에 또 고통이 따른다. 점을 봐서 살짝 피하는 방법은 없나, 어디 답지가 없나, 컨닝은 안 되나 — 그렇게 이리저리 피해 다니거나 외부의 도움으로 슬쩍 넘어가면 어떻게 되는가. 당장은 모면한 것 같아도 **나중에 삶 자체에서 많은 것을 놓치고 사는 것이다.** 그 자체로 이미.\n\n#### **달게 수용하면 삶의 근력이 생긴다**\n\n'이것이 내가 성장하는 데 정말 필요하겠구", "source": "essay"}, {"id": "essay_365_21d9470c09", "text": "같아도 **나중에 삶 자체에서 많은 것을 놓치고 사는 것이다.** 그 자체로 이미.\n\n#### **달게 수용하면 삶의 근력이 생긴다**\n\n'이것이 내가 성장하는 데 정말 필요하겠구나.' 그렇게 달게 수용하고, 방법을 찾고, 계속 풀다 보면 **삶의 근육이, 삶의 근력이 튼튼해진다.** 문제를 많이 풀수록 근력이 쌓인다. 굉장히 좋은 일이다. 시련은 나를 못살게 구는 것이 아니다. 나를 키우려는 것이다. #시련 #성장 #믿음 #삶의근력 #수용\n\n--- (구분선)\n\n[파일명: 시뮬레이션_삶의주인_수필.md]\n\n### **시뮬레이션_삶의주인_수필**\n\n#### **생각이 꼬리를 물고 올라올 때**\n\n머릿속에서 생각들이 꼬리에 꼬리를 물고 올라온다. 관념들, 스토리들. 그리고 우리는 그것과 동일시돼버리면 **생각이 나인 줄 알고 산다.** 그런데 그 스토리들은 내가 선택한 것이 아니다. 어디서 들었거나, 누가 옳다 그르다 했거나, 학교에서 배웠거나, 매스컴을 통해 들었거나, 부모에게 그런 식으로 양육을 받았거나, 친구들이나 주변 사람들로부터 \"이렇게 살아야 된다, 저렇게 살아야 된다\" 해서 쌓이고 쌓인 것들이 의식 저변에서 물결치듯 올라오는 것이다. 내가 만든 스토리가 아니라 외부에서 주입된 스토리 라인이다. 그것과 나를 동일시해버리면 **시뮬레이션 안에 갇히는 것이다.** 사회적인 시뮬레이션일 수도 있고, 현대 산업사회의 일꾼을 키워내기", "source": "essay"}, {"id": "essay_366_70c6b86a78", "text": "리가 아니라 외부에서 주입된 스토리 라인이다. 그것과 나를 동일시해버리면 **시뮬레이션 안에 갇히는 것이다.** 사회적인 시뮬레이션일 수도 있고, 현대 산업사회의 일꾼을 키워내기 위해 서구에서 설계한 학제의 틀일 수도 있다. 그 틀에 맞춰서 우리가 배웠고, 그 시뮬레이션 틀을 벗어나지 못한 채 살고 있는 것이다. 다양한 프레임 속에 갇혀 평생을 살아도 그것은 나의 삶이 아니다.\n\n#### **시뮬레이션에서 빠져나오는 방법**\n\n시뮬레이션에서 빠져나오려면 먼저 알아야 한다. 지금 올라오는 이 생각들이 **검토되지 않고 주입된 것임을** , 외부로부터 형성된 사회적 편견이자 습관적 반응임을. 그리고 그것이 올라올 때마다 **알아차림을 해야 한다.** \"이것이 시뮬레이션이구나. 인연 따라 툭툭 튀어나오는 것이구나. 여기에 계속 동일시돼서 빠져 살 필요가 없구나.\" 그렇게 알아차리고 빠져나와야 내 나름의 새로운 선택지를 찾고, 선택을 하고, 나의 삶을 살 수 있다. 이것이 명상과 연결되는 지점이다. 명상은 올라오는 많은 생각들을 바라보는 것이다. 알아차리고 바라보되, 거기에 동요되거나 따라가지 않는 것. 그렇게 내가 나를 객관화하고, 잠재의식 속에 쌓여있는 것들을 바깥으로 꺼내 볼 수 있게 된다.\n\n#### **나쁜 생각도 메시지다**\n\n잠재의식은 생각들이 모인 것이다. 그것이 나쁜 것만은 아니다. 좋은 경험도 있고 나쁜 경험도 있고, 좋은", "source": "essay"}, {"id": "essay_367_88b303d877", "text": "바깥으로 꺼내 볼 수 있게 된다.\n\n#### **나쁜 생각도 메시지다**\n\n잠재의식은 생각들이 모인 것이다. 그것이 나쁜 것만은 아니다. 좋은 경험도 있고 나쁜 경험도 있고, 좋은 생각도 있고 나쁜 생각도 있다. 그것들이 다 나로 사는 것에 대한 **메시지일 수 있다.** 나쁜 경험이나 괴로운 감정이 올라올 때, 그것은 \"여기 갇혀 있구나\"를 알려주는 **나침반이 된다.** 괴롭기 때문에 탈출하려 하고, 그 괴로움이 깨달음의 계기가 된다. 나쁜 생각을 했더니 나쁜 결과가 왔다면, 나쁜 생각이 나쁜 결과로 이어진다는 것을 알게 되는 것이다. 좋고 나쁨이 아니라, 내가 기준을 갖고 보는 것이다. **내 안에 올라오는 모든 것들은 다 이유가 있어서 올라오는 것이다.** 그것이 주는 메시지들을 살려 쓸 수 있어야 한다.\n\n#### **좋은 것만 원하는 것이 괴로움의 원인이다**\n\n생각이나 감정 중에 기분 좋은 것만 느끼고 싶고, 나쁜 것은 느끼고 싶지 않다. 그것이 괴로움의 원인이다. 좋은 것과 나쁜 것을 통째로 끌어안아야 한다. 좋은 것은 좋은 것대로, 나쁜 것은 나쁜 것대로 쓸 수 있어야 한다. 칼이 좋고 나쁨이 아니듯이. **어떻게 쓰느냐에 따라** 요리도 하고 베기도 하듯이, 생각도 그렇게 마음대로 부리고 쓸 수 있어야 한다. 생각 안 하고 살 수는 없다. 그러나 생각이 나를 지배하는 것이 아니라 **내가 생각을 세우고 선택해서 쓸", "source": "essay"}, {"id": "essay_368_00061fa7d7", "text": "고 베기도 하듯이, 생각도 그렇게 마음대로 부리고 쓸 수 있어야 한다. 생각 안 하고 살 수는 없다. 그러나 생각이 나를 지배하는 것이 아니라 **내가 생각을 세우고 선택해서 쓸 수 있어야 한다.**\n\n#### **나를 부정하지 않을 때 세계 수용이 된다**\n\n이 모든 것이 가능해질 때 어떻게 되는가. **내가 나를 부정하지 않게 된다.** 내 삶을 온전히 수용하게 된다. 그리고 나를 온전히 수용할 때 비로소 타인 수용이 된다. 타인 수용이 됐을 때 이 사회와 세계를 수용할 수 있게 된다. 그렇게 됐을 때 **온나(온통나)가 드러난다.** 시뮬레이션을 조정하는 것이 아니라, 나의 삶의 주인이 되는 것이다. #시뮬레이션 #동일시 #알아차림 #명상 #온나 #삶의주인\n\n--- (구분선)\n\n[파일명: 시쓰기와명상과코칭_무의식의의식화_수필.md]\n\n### **시쓰기와명상과코칭_무의식의의식화_수필**\n\n#### **시 쓰기는 무의식을 의식으로 올리는 작업이다**\n\n시를 쓰는 것은 무의식 속에 있는 어떤 감정이나 느낌을 단어로, 문장으로 표현해 보는 것이다. 그러면 그게 코칭이나 명상에서 말하는 **무의식을 의식화하는 방법** 이 된다. 무의식이 의식화돼 있다면, 그걸 내가 명확히 아니까 거기에 상처를 안 받을 수 있다. 위험이 있으면 피해가고 그렇게 할 수 있다. 의식적으로 아니까. 그런데 무의식적으로 이것이 우리한테 작용을 하기 때문에, **", "source": "essay"}, {"id": "essay_369_1ba9963603", "text": "내가 명확히 아니까 거기에 상처를 안 받을 수 있다. 위험이 있으면 피해가고 그렇게 할 수 있다. 의식적으로 아니까. 그런데 무의식적으로 이것이 우리한테 작용을 하기 때문에, **우리가 왜 그런지도 모르고 계속 당하고 사는 것이다.** 그것들이 의식으로 올라오지 않으니까.\n\n---\n\n#### **모호함 속에 머문다는 것**\n\n모호하다는 것이 말하자면 무의식이다. 의식은 선명하잖아. 그래서 그 모호함 속으로 들어가야 되는 것이다. 모호함에 머무르면 그게 무의식에 머무른다는 것이다. 어떤 답을 하나를 선명하게 '이게 정답이구나' 하고 딱 규정을 지어버리면, 이외의 탐색할 가능성이 없어진다. 그래서 한편으로 보면 **모름 속에 있는 게 더 나은 것이다.**\n\n따지고 보면, 안다는 것이 뭘 딱 안다고 규정 지을 수가 없는 것이다. 어떤 단어건 뭐건 그런 것을 어떻게 우리가 100% 알겠는가. 어쨌든 그걸 안다고 딱 규정을 지어버리면, **안다고 하는 것 속에 내 스스로가 거기에 매이는 것이다. 조건 지어져 버리는 것이다.**\n\n---\n\n#### **남이 만든 언어로 나를 규정하는 것**\n\n그건 내가 조건 지은 것이다. 더군다나 조건 지은 언어 자체가 내가 규정한 언어가 아니고 남이 만든 언어를 가지고, 나 스스로를 또 규정 지으면서, 내 의식이 됐건 무의식이 됐건 그런 것들을 규정 지으면서 나 자신을 조건화시켜서 속에 매이는 것이다. 갇히는", "source": "essay"}, {"id": "essay_370_8963c8e553", "text": "어가 아니고 남이 만든 언어를 가지고, 나 스스로를 또 규정 지으면서, 내 의식이 됐건 무의식이 됐건 그런 것들을 규정 지으면서 나 자신을 조건화시켜서 속에 매이는 것이다. 갇히는 것이다. 그러니까 그것을 글쓰기 작업이나 명상할 때도 마찬가지다. 명상도 무의식이 올라온다. 생각지도 못한 이런 것들이 무의식에서 올라오는 것이다.\n\n---\n\n#### **글쓰기, 코칭, 명상 — 세 가지가 하는 일**\n\n시 쓰기나 글쓰기도 이렇게 해서 안에서 잠재해 있으면서 우리한테 많은 영향을 끼치는, 해소되지 않은 감정들, 느낌들, 정서들, 이런 것들이 글쓰기나 이런 작업을 하면 **의식화로 올라온다.** 그러면서 이것이 이제 **조건 지어짐으로부터 해방될 수 있는 계기가 마련되는 것이다.** 그것을 끌어내는 작업이 글쓰기이고, 코칭이고, 명상이다. #시쓰기 #무의식의의식화 #모호함 #조건지어짐 #글쓰기와명상과코칭\n\n--- (구분선)\n\n[파일명: 시쓰기와언어의재정의_관조와앎의여정_수필.md]\n\n### **시쓰기와언어의재정의_관조와앎의여정_수필**\n\n#### **시를 쓴다는 것은 언어를 재정의하는 것이다**\n\n시를 쓴다는 것은 **언어에 대한 재정의** 를 하는 것이다. 내 스스로. 시의 주제가 있잖아. 예를 들어 사랑이면 사랑, 그리움이면 그리움. 그것에 대해서 쭉 써나가면, 그때 비로소 내가 그 언어에 대한 새로운 정의를 내리고 있는 것이다. 그리움", "source": "essay"}, {"id": "essay_371_891fdfe5c4", "text": "스로. 시의 주제가 있잖아. 예를 들어 사랑이면 사랑, 그리움이면 그리움. 그것에 대해서 쭉 써나가면, 그때 비로소 내가 그 언어에 대한 새로운 정의를 내리고 있는 것이다. 그리움에 대한 나만의 재해석이 들어가는 것이다. 내가 경험한 것으로. 그러면 이제 그게 내 언어가 된다. **재해석** 이라는 부분이 굉장히 중요하다. 내가 과거에 겪었던 상황에 대한 재해석이 들어갈 수도 있는 것이고. 비로소 내가 이 언어를 스스로 재해석을 내릴 줄 알아야 언어로부터 자유로워지는 것이다. 하이데거가 얘기했다. '언어는 존재의 집'이라고. 그런데 재해석이 내려지지 않으면, **언어는 존재의 감옥이 돼버린다.** 거기 갇히는 것이다. 남이 규정해 준 언어의 개념에 내가 갇혀서, 그 이상 생각을 못 하고 거기서 헤어나오질 못하는 것이다. 그래서 언어로부터 자유로워지려면 내가 얼마든지 마음대로 언어를 재해석하고 재정의를 내려줘야 한다. 언어에 대한 성찰, 그게 필요하다. 그 작업으로서의 시다.\n\n---\n\n#### **코칭과 시의 접점, 비유와 은유**\n\n코칭 강의에서도 코치가 비유와 은유를 써서 고객의 감정이나 상태를 표현해 줘야 한다고 한다. 언어의 은유와 비유, 재정의를 잘 사용할 수 있으면 코치로서 역량이 강화된다. 코칭 강의 안에서 시를 살짝 맛보기로 다루고, 시 강의는 따로 열어서 더 깊이 들어오게 할 수 있다.\n\n---\n\n#### **관조,", "source": "essay"}, {"id": "essay_372_708c393ead", "text": "사용할 수 있으면 코치로서 역량이 강화된다. 코칭 강의 안에서 시를 살짝 맛보기로 다루고, 시 강의는 따로 열어서 더 깊이 들어오게 할 수 있다.\n\n---\n\n#### **관조, 현상 너머를 보는 것**\n\n시를 자꾸 쓰다 보면 대상이나 사물이나 자기 자신에 대해서 **관조** 를 안 할 수가 없다. 관조가 뭔가. 계속 그것을 깊이 있게 바라보는 것이다. 볼 '관'자에 비출 '조'자. **현상 너머를 보는 것이다.** 이면을, 본질을 꿰뚫어 보는 것이다. 그냥 볼 '견'자는 피상적으로 보는 것이다. 그런데 피상적으로 보이는 것이 전부 다 올셀프를 나타내고 있구나, 그게 또 관조이기도 하다. 올셀프가 다 통하는 것이다.\n\n나태주 시인이 썼다. '자세히 보아야 이쁘다'고. **자세히 보게 된다는 것, 그게 관조고 그게 사랑이다.** 그렇게 돼야 비로소 그 대상과 내가 **둘이 아님** 을 확인하게 된다. 그러니까 시를 쓴다는 게 작은 일이 아니다. 동양학에서도 시경이 철학의 마지막이다. 그리스 철학에도 시학이라는 게 굉장히 중요한 부분이다. 옛날 과거시험에서도 다 시를 써서 했다. 성균관. 그만큼 시가 중요한 것이다.\n\n---\n\n#### **시가 나한테 온 이유**\n\n우리가 지금 너무 시를 멀리해서 감성이나 성찰 부분이 너무 메말라 버린 것이다. 그래서 시가 굉장히 필요하다. 그래서, 시가 나한테 왔구나. 내가 그것을 또 각성하게 된 것이", "source": "essay"}, {"id": "essay_373_bd9f036806", "text": "*\n\n우리가 지금 너무 시를 멀리해서 감성이나 성찰 부분이 너무 메말라 버린 것이다. 그래서 시가 굉장히 필요하다. 그래서, 시가 나한테 왔구나. 내가 그것을 또 각성하게 된 것이다. #시쓰기 #언어의재정의 #관조 #올셀프 #존재의집\n\n--- (구분선)\n\n[파일명: 시쓰기워크숍_단계별프로그램_메모.md]\n\n### **시쓰기워크숍_단계별프로그램_메모.md**\n\n#### **작성 맥락**\n\n대화 중 나온 시 쓰기 워크숍 프로그램 구상 메모. 강의안·수업 설계 참고용.\n\n#### **프로그램 단계**\n\n**1단계 — 단어 연상**\n\n- 주제를 정한다 (예: 엄마, 학교, 자연 등)\n- 그 주제에서 떠오르는 단어를 무의식적으로 10개 써본다 **2단계 — 숙고**\n- 올라온 단어들을 보며 '왜 이 단어가 올라왔을까' 생각하는 시간을 갖는다\n- 어떤 느낌이라서 이것이 떠올랐는지 살펴본다\n- 가장 대표적인 주제 하나를 고른다 **3단계 — 왼손으로 연결선 긋기**\n- 단어들 사이에 왼손으로 선을 그어 무의식적으로 연결시켜 본다\n- 왜 이것들이 연결됐는지 다시 숙고한다 **4단계 — 스토리 라인 잡기**\n- 연결선에 따라 스토리 라인을 만든다 **5단계 — 글 써 내려가기**\n- 위의 단어가 들어가도 되고 안 들어가도 된다\n- 쓰고 싶은 글을 자유롭게 써 내려간다\n\n#### **변형 버전 — 좋아하는 단어 / 싫어하는 단어**\n\n자유 글쓰기 수업", "source": "essay"}, {"id": "essay_374_7fce71fcc9", "text": "기**\n- 위의 단어가 들어가도 되고 안 들어가도 된다\n- 쓰고 싶은 글을 자유롭게 써 내려간다\n\n#### **변형 버전 — 좋아하는 단어 / 싫어하는 단어**\n\n자유 글쓰기 수업에서 활용 가능한 변형 방식.\n\n1. 좋아하는 단어 5개를 적는다\n2. 평소 혐오하거나 싫어하는 단어 5개를 적는다\n3. 두 목록을 연결해 본다\n4. 내가 어느 쪽에 걸림이 있는지, 나를 파악하는 단서로 삼는다\n5. 이것을 가지고 글을 써 내려간다 → 다짜고짜 글을 쓰라고 하면 어려워하는 사람에게 효과적인 도입 방식.\n\n#### **치유적 시 쓰기 vs 코칭적 시 쓰기**\n\n**치유적 시 쓰기** — 과거의 응어리를 풀어 헤치는 것. 내면 아이를 현재로 불러내는 작업. 무의식을 의식화. 왜곡된 안경을 벗는 것. **코칭적 시 쓰기** — 치유된 이후, 새로운 안경을 쓰는 것. 지금 현재에 맞는, 왜곡되지 않은 시선으로 미래를 바라보는 것. 성장과 성숙의 시. → 시 쓰기 하나로 두 가지를 다 할 수 있다. **핵심 원리** : 글을 쓸 때 과거를 떠올리면서 지금 일어나는 느낌과 감정이 더 중요하다. 단 한 개의 사건이 아니라 많은 것들이 섞여 지금의 패턴이 형성됐다.\n\n#### **같은 제목으로 두 편 쓰기**\n\n1. 시 제목 하나를 정한다\n2. 내면에 있는 것을 꺼내는 시를 쓴다 (치유)\n3. 같은 제목으로 되고 싶은 것, 원하는 쪽으로 다시 쓴다 (성장)", "source": "essay"}, {"id": "essay_375_235e0a4f94", "text": "같은 제목으로 두 편 쓰기**\n\n1. 시 제목 하나를 정한다\n2. 내면에 있는 것을 꺼내는 시를 쓴다 (치유)\n3. 같은 제목으로 되고 싶은 것, 원하는 쪽으로 다시 쓴다 (성장) → 쭈그러진 안경을 벗고 새 안경을 쓰는 과정을 시로 경험하게 한다.\n\n#### **활용 사례 아이디어**\n\n- 갱년기 극복 사례를 시로 담은 전자책\n- 내면 아이 작업과 시 쓰기 연계 프로그램\n\n단어들을 선으로 연결할 때 삼각형, 사각형 등의 도형이 생긴다. 그 안의 **빈 공간** 에 주목한다.\n\n- 삼각형으로 연결된 세 단어의 공통된 것은 무엇인가\n- 그 빈 공간 안에서 무엇이 떠오르는가 — 부모, 자식, 어떤 관계 등\n- 이것이 무의식을 여는 문고리다. 태그(꼬리표)를 잡고 거대한 코끼리 같은 무의식을 탐험하는 것 **선을 그은 이유를 성찰한다** : 왜 이 단어와 이 단어를 연결했는가. 좋아하는 단어와 싫어하는 단어 사이에 어떤 관계가 있는가. 싫어하는 단어끼리는 어떤 연관성이 있는가.\n\n#### **확장 — 카드 활용**\n\n타로 카드, 그림 카드 등을 뽑아 시 쓰기의 재료로 삼는다.\n\n- 카드에서 눈에 들어오는 것 — 색깔, 하트, 왕관, 컵 등\n- 그 상징에서 연상되는 것들로 시를 쓴다\n- 내 안에 있는 것을 꺼내는 방편 **자체 제작 가능성** : 나름대로의 그림 카드 제작, 나무로 깎은 인물 피규어 활용(관계 코칭 연계).\n\n#### **잠", "source": "essay"}, {"id": "essay_376_afdb6d919e", "text": "것들로 시를 쓴다\n- 내 안에 있는 것을 꺼내는 방편 **자체 제작 가능성** : 나름대로의 그림 카드 제작, 나무로 깎은 인물 피규어 활용(관계 코칭 연계).\n\n#### **잠재의식 외재화 원리**\n\n- **무의식 vs 잠재의식** : 무의식은 없는 것이 아니라 아직 활성화되지 않은 상태. TV 화소 비유 — 불이 꺼져 있지만 언제든 켜질 수 있는 화소. '무의식'보다 '잠재의식'이 더 정확한 표현.\n- 단어를 툭툭 써내는 것 = 잠재의식을 의식으로 끌어올리는 작업\n- 왼손으로 연결선 긋기 = 무의식적 연결 탐색\n- 말이 되게 엮기 = 잠재의식의 외재화 + 정돈\n- **꺼내기만 하고 정돈이 안 되면 안 된다** — 시로 옮기는 작업이 정렬의 역할\n\n#### **치유 원리**\n\n- 시는 논리를 떠나 있다 — 말이 안 돼도 된다\n- 남이 이해 못 해도 된다 — 내가 쓰면서 치유되면 된다\n- 감정은 논리가 아니다 — 감정과 관련된 단어를 꺼내 의식화하는 것이 핵심\n- 혼란스럽다는 반응이 나오면 → 정돈해서 쓰는 작업 추가 필요\n\n#### **활용 아이디어**\n\n- 아이들과 함께 해볼 수 있다\n- 코칭+시 쓰기 연계 프로그램으로 발전 가능\n- 글쓰기 강사 과정, 치유 프로그램과 접목 가능\n- 카빙(우드카빙) 세션과 연계 가능\n\n--- (구분선)\n\n[파일명: 시쓰기워크숍_단계별프로그램_수필.md]\n\n### **시쓰기워크숍_단계별프로그램_수", "source": "essay"}, {"id": "essay_377_6bebfd0ddd", "text": "치유 프로그램과 접목 가능\n- 카빙(우드카빙) 세션과 연계 가능\n\n--- (구분선)\n\n[파일명: 시쓰기워크숍_단계별프로그램_수필.md]\n\n### **시쓰기워크숍_단계별프로그램_수필**\n\n#### **단어 연상에서 시까지, 순서가 있다**\n\n예를 들어 엄마에 대한 시를 쓰고 싶다. 그러면 엄마에 대해서 떠오르는 단어들을 써보는 것이다. 어떤 사람은 학교에 대해서 쓸 수도 있고, 무의식적으로 10개를 썼으면 거기에서 가장 대표적인 주제를 하나 정하는 것이다. 올라온 것 중에서. 그것을 보고 그냥 넘어가면 안 된다. **왜 이 단어가 올라왔나를 숙고하는 시간을 가져야 한다.** 왜 이게 올라왔나. 어떤 느낌이라서 이게 떠올랐나. 그 글들을 보고 왜 내가 이런 단어가 나왔을까 생각해 보는 시간이 필요하다. 순서가 있다. 처음에 생각나는 단어를 써보게 하고, 그것을 숙고해 보고, 그다음에 **왼손으로 선을 그어보게 한다.** 무의식적으로 연결시켜 보는 것이다. 그리고 왜 이게 이렇게 연결이 됐나를 또 숙고해 보게 한다. 그러고 나서 연결선에 따라서 어떤 **스토리 라인을 잡아가는 것이다.** 그다음에 내가 그때 쓰고 싶은 주제를 정해서 쓰고 싶은 글을 써 내려가는 것이다. 단어가 들어가도 되고 안 들어가도 된다. 이렇게 몇 번 해보면 뭔가 작품이 하나 나올 것 같다. 이 프로그램이 나올 것 같다.\n\n---\n\n#### **좋아하는 단어와 싫어", "source": "essay"}, {"id": "essay_378_ffa2b7c99e", "text": "것이다. 단어가 들어가도 되고 안 들어가도 된다. 이렇게 몇 번 해보면 뭔가 작품이 하나 나올 것 같다. 이 프로그램이 나올 것 같다.\n\n---\n\n#### **좋아하는 단어와 싫어하는 단어를 연결한다**\n\n좋아하는 단어나 싫어하는 단어 5개를 각각 써놓고 이것을 서로 연결을 짓는다. 연결 지을 때 좋아하는 단어하고 싫어하는 단어를 연결할 수도 있고, 싫어하는 단어끼리 연결할 수도 있고, 아니면 그냥 툭툭 떠오르는 단어도 적고 해서 서로 연결을 짓는 것이다. 선을 그었는데, 그것이 왜 선으로 이어졌는지를 성찰해 봐야 한다. 이것들과의 관계가 어떻게 연결돼 있나. **좋아하는 단어와 싫어하는 단어에 어떤 서로 관계가 있나,** 또 좋아하는 단어끼리, 싫어하는 단어끼리의 어떤 연관성이 있나 이런 것을 고찰해 보면서 자기 자신의 잠재의식을 탐험해 보는 것이다. 탐색을. 그러다 보면 그것이 어떤 **문고리 역할을 하는 것이다.** 무의식을 여는 실마리. 꼬리표를 봐 보고 거대한 코끼리 같은 그런 잠재의식을 탐험할 수 있게 되는 것이다. 거기서 어떤 관계가 분명히 드러날 것이다.\n\n---\n\n#### **삼각형, 사각형으로 연결된 것들**\n\n선을 긋다 보면 연관된 어떤 것이 떠오를 것 같다. 예를 들어서 **삼각형으로 그어졌으면,** 삼각형의 세 가지의 공통된 어떤 것이 있을 수 있다. 빈 공간이 생긴다. 단어와 단어를 삼각형으로 연결했다. 경우", "source": "essay"}, {"id": "essay_379_ff2a8152ec", "text": "것이 떠오를 것 같다. 예를 들어서 **삼각형으로 그어졌으면,** 삼각형의 세 가지의 공통된 어떤 것이 있을 수 있다. 빈 공간이 생긴다. 단어와 단어를 삼각형으로 연결했다. 경우에 따라서는 사각형으로 될 수도 있다. 그러면 그 안에 빈 공간에, 이 세 가지의 공통적으로 떠오르는 것들이 예를 들어서 사람, 미래, 이런 세 가지가 연결돼 있으면, 그 속에서 이것이 무엇을 도대체 말하려고 하는 것인지를 보는 것이다. 그것이 예를 들어서 부모일 수도 있고, 자식일 수도 있고, 뭔가 이렇게 나올 것이다. 이런 것들과의 연결성이 있는 것이구나, 이렇게 파악할 수 있다.\n\n---\n\n#### **타로 카드, 그림 카드로도 해볼 수 있다**\n\n타로 카드나 그림 카드가 있잖아. 그런 걸로 탁탁탁탁 뽑으면 나올 것이다. 그러면 거기서 내가 나한테 들어오는 느낌이 있다. 예를 들어 빨간색이라든가, 거기에 하트가 보였다든가, 왕관이 보였다든가, 컵이 보였다든가. 그러면 그것에 내가 연상되는 것들로 시를 또 써보는 것이다. 카드를 뽑고 그런 것도 재밌을 것 같다. 어쨌든 내 안에 있는 것을 꺼내는 어떤 방편이 필요한 것이다. 이런 것을 우리가 지금 처음이라서 그런데, 이게 한두 가지 모델만 딱 나오면 여기서 엄청나게 많은 것을 뽑아낼 수 있다. 카드 같은 것도 있잖아. 그림 카드. 그런 것도 제작해서, 우리 나름대로의 카드를 제작할 수도 있다. 관계 코칭할", "source": "essay"}, {"id": "essay_380_ecf32275d8", "text": "지 모델만 딱 나오면 여기서 엄청나게 많은 것을 뽑아낼 수 있다. 카드 같은 것도 있잖아. 그림 카드. 그런 것도 제작해서, 우리 나름대로의 카드를 제작할 수도 있다. 관계 코칭할 때 나무로 사람을 세워서 이렇게 하는 그런 것도 있다. 그런 것도 직접 와서 제작해서 본인들이 깎아보고 그런 것도 할 수 있다. 그리고 4차 프로그램을 만들어야 한다. #시쓰기워크숍 #단계별프로그램 #단어연상 #잠재의식탐색 #그림카드활용\n\n--- (구분선)\n\n[파일명: 시쓰기워크숍_잠재의식의외재화_수필.md]\n\n### **시쓰기워크숍_잠재의식의외재화_수필**\n\n#### **무의식이라는 말은 사실 넌센스다**\n\n우리가 무의식이라고 하는데, 사실 무의식을 알 수가 없다. 의식이 없는데 무의식인지 아닌지를 어떻게 알겠는가. 그러니까 **무의식이라는 말이 사실 굉장히 넌센스인 것이다.** 의식이 없는 상태를, 의식이 없는데 그것을 어떻게 알 수 있냐는 말이다. '무'라는 것도, 없다는 것도 어떻게 정의할 수가 없는 것이다. 모른다는 것도 마찬가지다. 모른다는 것은 아는 것에 전제해서 모른다는 것이지, 뭘 모르는지 어떻게 알겠는가. 의식이 있다는 것에 없는 것인데, 의식이 없는 그것을 어떻게 알 수 있겠는가. 무의식은 모르는 것이다. NLP에서 하는 사람들도, 우리나라 최고 NLP 전문가를 하는 사람도 **'무의식은 좀 약간 잘못된 표현입니다'** 라고 한다. 하여", "source": "essay"}, {"id": "essay_381_20b29398f2", "text": "게 알 수 있겠는가. 무의식은 모르는 것이다. NLP에서 하는 사람들도, 우리나라 최고 NLP 전문가를 하는 사람도 **'무의식은 좀 약간 잘못된 표현입니다'** 라고 한다. 하여튼 맞는 말은 **잠재의식** 이다. 잠재의식은 아직 활성화되지 않은 의식이라는 것이다. 잠재태로 있는 것이다. 예를 들어서 TV 화면에 부분적으로 불이 들어올 것이다. 아직 불이 들어오지 않은 화소들, 그것은 언제든지 전기가 통하면 불이 들어온다. 그 상태가 소위 말하는 무의식인 것이다. **잠재의식이라는 말이 더 맞다.** 그것은 언제든지 의식이 확장되거나, 의식으로 수면 위로 올라오면, 또는 우리가 잠재의식 속으로 들어가면 드러날 수 있는 것이다.\n\n우리 몸도 어느 때는 의식을 못 한다. 그런데 의식을 하면 부분적으로 의식이 된다. 심장이 뛰고 있구나, 어디 닿고 있구나, 차가운 느낌이 드는구나. 그러니까 잠재돼 있다가 여느 때 모르다가 드러나는 것이다. 생각도 마찬가지다. 생각은 자주 의식으로 올라오니까 의식적인 활동이다 생각하지만, 잠재의식 속에서 그냥 끊임없이 올라오는 것이다. 일상에서 보는 것도, 의식으로 딱딱 인식하는 것이 얼마나 되겠는가. 그냥 무의식적으로 다 스쳐 지나가는 것이다.\n\n---\n\n#### **의식으로 올라오는 단어를 써보는 작업**\n\n그러니까 카빙이나 시 작업 같은 것을 해본다면 이런 식으로 해볼 수 있다. 명상을 잠깐 하든가", "source": "essay"}, {"id": "essay_382_03b81f9016", "text": "지나가는 것이다.\n\n---\n\n#### **의식으로 올라오는 단어를 써보는 작업**\n\n그러니까 카빙이나 시 작업 같은 것을 해본다면 이런 식으로 해볼 수 있다. 명상을 잠깐 하든가 아니면 가만히 있다가, **의식으로 올라오는 단어** , 의미가 있든 없든 그냥 그것을 몇 개 써보는 것이다. 의식적으로 있다 보면 그냥 생각나는 단어를 툭툭 아무렇게나 써보는 것이다.\n\n그리고 그것을 **왼손으로 연결하라 한다.** 선을 그으라는 것이다. 손 가는 대로 선을 그어보면, 이 단어하고 이 단어하고 연결도 해보고 이렇게도 연결해 보고. 그래서 연결된 요소를 가지고 말이 되게 글을 써보는 것이다. 그러면 툭툭 올라왔던 말들의 어떤 관계를 파악하면서 그것이 하나의 글이 되면, 자기가 의식적으로 '내 잠재의식 속에 이런 생각들이 있었구나', '이게 이렇게 연결을 지어줄 수 있겠구나' 하고 그것을 의식화시켜서 볼 수 있게 된다. **잠재의식, 잠재된 세계를 자기가 내재화된 어떤 잠재의식을 외재화시키는 것이다.** 외재화시켜서 '내 안에 이런 게 있었구나' 하는 것이다.\n\n---\n\n#### **좋아하는 단어, 싫어하는 단어**\n\n글쓰기 강사 수업, 자유 글쓰기 수업을 할 때 이렇게 했다. **'자기 좋아하는 단어 5개를 적어봐라.'** 그러면 항상 좋아하는 5개를 적고, 또 한쪽에 **내가 싫어하는 단어, 평상시에 혐오하는 단어들** 이런 것도 적게 한다", "source": "essay"}, {"id": "essay_383_fe16a9d9c3", "text": "게 했다. **'자기 좋아하는 단어 5개를 적어봐라.'** 그러면 항상 좋아하는 5개를 적고, 또 한쪽에 **내가 싫어하는 단어, 평상시에 혐오하는 단어들** 이런 것도 적게 한다. 그렇게 해서 그것을 연결도 지어보는 것이다. 그러면 내가 어떤 쪽에 걸림이 있고, 나를 파악해 볼 수 있다. 처음에 다짜고짜 글을 써라 하면 쉽지가 않으니까.\n\n그렇게 해서 글을 쓰면, 그것을 누가 평가할 것은 없다. 왜냐하면 그게 잠재의식에서 올라오는 것이기 때문에 논리적이거나 합리적인 글은 분명히 안 된다. 감정이 논리적이겠는가. 내가 상대방을 좋아하는데 그 좋아하는 마음이 논리적이겠는가. 논리를 떠나는 것이다. 감정과 관련된 단어를 쓰면 좋다. 그것을 연결해서 써보면 잠재의식에 내재된 것을 의식적으로 꺼내서 나열해 보면서 의식화시켜 볼 수 있다. 잠재의식과 지금 현재의식을 다 살펴볼 수 있는 것이다. **시는 꼭 말이 안 돼도 된다.** 시라는 것은 논리를 떠나 있는 것이기 때문에, 나의 감정의 흐름이라든가 이런 것을 파악하면 되는 것이고, 드러나면 되는 것이다. 남이 말이 안 된다면 어때, **쓰면서 치유가 되면 되는 것이다.**\n\n---\n\n#### **꺼내기만 하고 청소가 안 되면 안 된다**\n\n그렇게 했다가 더 혼란스럽다거나 무슨 의미인지 모르겠다는 반응이 오면, 그것을 **정돈해서 쓰는 작업이 필요하다.** 그냥 선만 긋고 나서 끝 이러면 의", "source": "essay"}, {"id": "essay_384_bccbb0884f", "text": "가 안 되면 안 된다**\n\n그렇게 했다가 더 혼란스럽다거나 무슨 의미인지 모르겠다는 반응이 오면, 그것을 **정돈해서 쓰는 작업이 필요하다.** 그냥 선만 긋고 나서 끝 이러면 의미가 없다. 이것을 의식적으로 말이 되게 엮어보면 그건 글감이 된다.\n\n사람들이 도대체 뭘 써야 될지를 모른다. 주제를 못 찾는다는 얘기다. 그런데 여기에 내가 의도하지 않은 단어들, 감정과 관련된 단어가 나오면, 그것을 가지고 말을 붙이면서 나만의 **의미를 거기서 담는 작업을 하는 것이다.** 말이 되든 안 되든 관계없다. 일단 내 것을 꺼내서 내가 봤다는 게 중요한 것이다. 꺼내는 작업이. 그런데 꺼내기만 하고 청소가 안 되면 안 된다. 그러니까 **시로 옮겨보는 작업** 이 어떻게 정렬을 하는 것이다. 글쓰기 작업하고 이것하고 연결시켜 보면, 이것을 어떻게 과연 **치유로 연결시키느냐** , 그 방법을 찾는 것이다. 거기서 아이디어를 얻을 수 있다. #잠재의식의외재화 #시쓰기워크숍 #단어연결작업 #치유로서의시 #무의식과잠재의식\n\n--- (구분선)\n\n[파일명: 시의진솔함_층위에서퍼올린공감의울림_수필.md]\n\n### **시의진솔함_층위에서퍼올린공감의울림_수필**\n\n#### **시의 진입 장벽을 낮추면 된다**\n\n시골 할머니를 생각한다. 여기도 시, 저기도 시, 온통 시가 천지빼깔이다. 사람의 시야만 열어주면 된다. 자기 삶에서 어떤 애환이 됐건, 아주 작", "source": "essay"}, {"id": "essay_385_84a9e62247", "text": "의 진입 장벽을 낮추면 된다**\n\n시골 할머니를 생각한다. 여기도 시, 저기도 시, 온통 시가 천지빼깔이다. 사람의 시야만 열어주면 된다. 자기 삶에서 어떤 애환이 됐건, 아주 작은 깨달음이 됐건, 자기만의 감성이 됐건, 이것이 상대방한테 울림을 줄 수 있느냐가 문제다. 무슨 문자를 써서 어렵게 하려 하면 시가 굉장히 어려워지는데, 자기 삶의 얘기를 간결하게 추려서 쓰면 그것도 시가 될 수 있다. **시에 대한 진입 장벽을 낮춰주면** 자꾸 써보게 되고, 그러면 시가 되는 것이다. 각자의 독특한 **공감 포인트** , 내 안에 있는 그것을 꺼집어내서 전달할 수 있으면 된다. 기성 시인들은 대부분 국문학을 전공한 사람들이다. 그러니까 사람들은 학문적으로 시를 접근하고, 일반인들이 거기 쫓아가서 쓰기가 힘든 것이다. 그 사람 얘기 자체도 잘 이해가 안 된다.\n\n---\n\n#### **저마다의 삶의 층위**\n\n저마다 자기 삶을 살아온 층위가 있다. 나는 1층에 살았고, 어떤 사람은 5층에 살았고, 어떤 사람은 지하에도 살아봤고, 지하에 살다가 3층에 가서 살기도 하고, 3층에 살다가 지하 2층 가서 살기도 하고. 이런 **저마다의 삶의 층위가 있다.** 그런 층에서 어떤 **시선** 이 생긴다. 3층에 살던 사람은 3층의 시선이 생기고, 지하에 살던 사람은 지하의 시선이 생긴다. 그 시선을 여러 각도에서 얘기해 주면 되는 것이다. 그게 **", "source": "essay"}, {"id": "essay_386_04916b67ac", "text": "어떤 **시선** 이 생긴다. 3층에 살던 사람은 3층의 시선이 생기고, 지하에 살던 사람은 지하의 시선이 생긴다. 그 시선을 여러 각도에서 얘기해 주면 되는 것이다. 그게 **나만의 시선** 이니까. 그런데 전문가들은 저기 50층의 시선에서 '야, 너희들 이렇게 쓰면 나처럼 돼' 얘기하고 올라올 수 있다. 지금 1층에서 서성거리고 있는 사람들한테는 **너무나 먼 얘기다.** 시의 이론이라든가 작법이라든가 아무리 배워봤자 나한테 현실적으로 다가오지가 않는 것이다. 지하 2층에서 쓰든 1층에서 쓰든, 그것은 그야말로 내가 겪어낸 현장감 있는 진실함, **진솔함** 이 담겨 있다. 그게 더 공감대 형성하기도 좋다.\n\n---\n\n#### **같은 층의 공명**\n\n모든 독자를 다 만족시킬 필요는 없다. 내가 지금 1층의 시선에서 쓴 시를, 누군가는 1층에서 보고 있을 것이다. 1층에 있는 사람들은 50층에서 쓴 사람의 시는 그냥 '시는 시 쓰는 사람이 쓰나 봐'가 되는 것이다. 같은 1층에서 쓴 시를 보면 '맞아, 그래, 나도 저래, 맞아' 하고 공감대를 더 많이 형성한다. 그래서 더 많이 서로 교류할 수 있고, 더 많은 영향력을 줄 수 있다. **공감대가 있어야 거기서 울림이 생기는 것이다.** 공명 현상이 일어나는 것이다. 글을 읽는 사람한테 자연스럽게 동조 현상, 공명 현상이 일어난다. 시를 썼던 사람의 1층에서 봤던 시선에 떨렸던 마", "source": "essay"}, {"id": "essay_387_733a96d3df", "text": "거기서 울림이 생기는 것이다.** 공명 현상이 일어나는 것이다. 글을 읽는 사람한테 자연스럽게 동조 현상, 공명 현상이 일어난다. 시를 썼던 사람의 1층에서 봤던 시선에 떨렸던 마음이 나한테 고스란히 전달되는 것이다. **주파수가 같으니까.** 그 상황에서 우리가 어떻게 생각하고, 어떻게 앞으로 나아가야 되는지, 어떻게 받아들여야 되는지, 그걸 따뜻한 말로 해주면 사람들한테 얼마나 영향력을 주겠는가. 꼭 나아가거나 이러지 않아도 된다. 그냥 '같은 층에서, 그 순간에 떨었구나, 이 시를 쓴 사람도' 그것만 알아도 굉장히 위로가 된다. 공감대라는 게 그런 것이다.\n\n'나만 모자라고, 나만 못나서 내가 거기서 그렇게 떨었던 게 아니고, **같은 층에 있는 사람들은 그렇게 떨었을 것이구나.** ' 그런 공감대가 형성되는 것이다. 그게 **진정한 울림이 있는 시** 다. 지금 기성 시인들이 너무 학문적으로 시를 쓰니까 독자들과의 삶의 괴리가 너무 크다. 그러니까 시를 읽어도 **감동이 없다.** 너무 차원지 50층, 100층에서 얘기를 하고 있으니까 1층인 사람은 '이게 뭔 얘기야'가 되는 것이다. 점점 책하고 멀어지고, 시집하고 멀어진다. 그들만의 시간대가 되는 것이다. **시라는 게 삶에서 길어져야 되는 것이다. 삶에서 퍼 올려져야 된다.** 그래야 내가 그것을 마시지. 실질적으로 갈증이 해소된다. 너무나 먼 세계의 형이상학적인, 전혀", "source": "essay"}, {"id": "essay_388_184602f815", "text": "것이다. **시라는 게 삶에서 길어져야 되는 것이다. 삶에서 퍼 올려져야 된다.** 그래야 내가 그것을 마시지. 실질적으로 갈증이 해소된다. 너무나 먼 세계의 형이상학적인, 전혀 나의 갈증을 해소시켜 줄 수 없을 것 같은 얘기들이 내려오면 거기서 어떻게 공감을 얻겠는가.\n\n---\n\n#### **그럴듯한 말의 나열은 공감이 안 된다**\n\n시인이 되고 싶은 사람들 중에 자기 시선이 시에 담겨 있지 않은 경우가 있다. 그냥 시처럼 보이게 쓰려 하니까 **공감대가 형성이 안 되는 것이다.** 자기가 경험해보고 느껴본 게 아니라 그냥 시는 이렇게 쓰는 건가 하고 단어만 멋지게 나열한다. 이쁜 말의 나열, 그럴듯한 말의 나열. 그러니까 전혀 공감이 안 된다. 느꼈던 감정이라든가 체험이 느껴지지 않으니까. 내가 1층에 살면서 1층의 시선으로 세상을 살고 있는데, 10층 20층의 얘기를 1층에서 풀어 쓰고 있으니까 아귀도 안 맞고, 무슨 말인지도 모른다. 한 단어 하나하나는 그럴듯해 보이는데, 그게 의미하는 바가 가슴에 전혀 울림이 없다. 우리가 시를 읽는다는 것은 시를 보고 내가 뭔가 위로를 얻고자 하는 마음이 큰 것이다. 그러면 최소한 그 시에, 시를 쓴 사람의 아픔이 됐건, 애환이 됐건, 슬픔이 됐건, 뭔가 그런 사람의 **삶이 녹아져 있어야지만** 그것을 보고 내가 위로를 갖든, 감동을 받든 하는 것이다. 그런데 **'나는 이런 멋진 단어를", "source": "essay"}, {"id": "essay_389_940ee45e54", "text": "됐건, 애환이 됐건, 슬픔이 됐건, 뭔가 그런 사람의 **삶이 녹아져 있어야지만** 그것을 보고 내가 위로를 갖든, 감동을 받든 하는 것이다. 그런데 **'나는 이런 멋진 단어를 알아', '멋진 이런 거를 봤어'** 이런 **자기 자랑식의 것** 을 쓰면, 위로를 받고 싶은 사람이 자기가 잘났다는 글을 보면 위로가 되겠는가.\n\n시를 읽는 독자들이 **왜 시를 읽는지, 왜 시를 읽고 싶어 하는지** 그것을 생각해야 한다.\n\n---\n\n#### **솔직함이 가장 강력한 힘이다**\n\n우선은 자기가 시를 쓰는 과정 속에서 **자기 스스로가 위로를 받아야 한다.** 남을 위로시키려고 하지 말고. 내가 시를 쓰면서 내 스스로가 공감할 수 있어야 한다. 최소한 감동은 못해도 나의 **응어리진 것들이 풀려나가야 한다** , 시를 쓰면서. 시를 쓰면서 뭔가 풀려나가는 가장 강력한 힘이 뭔가. **솔직함이다, 진솔함이다.** 내 안에 있는 실질적인 것들이 풀려나가야 하니까. 거짓으로 하면 그게 풀려나가겠는가. 내가 경험했고, 나의 아픔이 됐건, 슬픔이 됐건, 그것들이 종이에 하나하나 써지면서 푸는 과정이 된다. 살풀이가 됐든, 굿판이 됐든, 어떤 행위가 됐든. 그런 식으로 풀려나가는 의식이 될 때, **그것을 보는 사람한테 또 그게 전이가 되고 감동으로 다가오는 것이다.**\n\n그러니까 시를 쓰건 글을 쓰건 간에 **지금 나의, 내 층위에서의 글을 써야", "source": "essay"}, {"id": "essay_390_ef0bb70c7e", "text": "려나가는 의식이 될 때, **그것을 보는 사람한테 또 그게 전이가 되고 감동으로 다가오는 것이다.**\n\n그러니까 시를 쓰건 글을 쓰건 간에 **지금 나의, 내 층위에서의 글을 써야 한다.** 나의 층위에서 벗어난 다른 얘기를 써버리면 공감대가 형성이 안 된다. 지금 내 삶, 내 현재의 감성이 됐건, 직관이 됐건, 소망 기도가 됐건. 나랑 같은 층의 대상, 또는 그냥 나한테 쓴다고 생각하면 된다. **내 자신한테 시를 쓰는 것이다.**\n\n---\n\n#### **층을 겪어온 사람들은 다 안다**\n\n내가 진솔하게 나의 경험을 쓰면, 다른 층에 있는 사람들도 같은 층의 사람들을 더더욱 잘 이해할 수 있다. 그것을 왜 이해하느냐면, 그 사람들도 그 층을 겪고 왔기 때문이다. 겪고 다른 층으로 또 갔기 때문에 공감대가 되는 것이다. 층을 경험해 보지 않은 사람들은 모른다. 50층 갔던 사람도 2층, 3층, 지하 이런 것을 다 경험해 봤다. '맞아, 나 옛날에 저랬어.' 그렇기 때문에 같은 층의 사람들한테 공감대를 주는 것 같지만, 층을 겪어온 사람들은 어떤 층이든 다 공감대가 될 수 있는 것이다.\n\n층을 경험해 보지 않은 사람은 사과 맛을 먹어보지 않은 사람과 같다. 아무리 설명을 해도 모른다. 사과를 먹어봤던 사람들은 맛을 얘기하면 알 수 있는 것이다. 그냥 1층에서 바로 에스컬레이터 타고, 맨날 50층을 엘리베이터 타고 왔다 갔다 하는 사람들", "source": "essay"}, {"id": "essay_391_3b62f62efd", "text": "무리 설명을 해도 모른다. 사과를 먹어봤던 사람들은 맛을 얘기하면 알 수 있는 것이다. 그냥 1층에서 바로 에스컬레이터 타고, 맨날 50층을 엘리베이터 타고 왔다 갔다 하는 사람들은 중간층의 것을 모른다. 내가 같은 층위의 사람들한테 써도, 모든 층위에 있는 사람들한테 다 공감대를 형성할 수 있는 개연성이 충분히 된다. #시의진솔함 #삶의층위 #공명과공감 #삶에서퍼올린시 #내자신한테쓰는시\n\n--- (구분선)\n\n--- (구분선)\n\n[파일명: 시철학코칭_사랑_수필.md]\n\n### **시철학코칭_사랑_수필**\n\n#### **시와 철학의 공통점을 묻다**\n\n코치들과 철학을 주제로 이야기를 나눈 자리에서 이런 질문이 나왔다. \"시와 철학은 어떤 연관성이 있는가?\" 나는 그 자리에서 시와 철학의 공통점을 **사랑** 이라고 말했다. 처음엔 뜬금없이 들릴 수 있다. 그러나 천천히 풀어가다 보면 이것이 억지스러운 연결이 아니라는 것을 알게 된다.\n\n#### **공자의 인(仁), 맹자의 측은지심, 순자의 성악설 — 셋을 관통하는 것**\n\n공자가 말한 인(仁)이라는 글자를 보면, 사람 인(人) 자에 두 이(二) 자다. 두 사람 사이의 관계가 인이다. 공자는 인이 무엇이냐는 물음에 \"다른 사람을 사랑하는 것\"이라고 했다. **어질다는 것은 타인을 사랑하는 것이 곧 나를 사랑하는 것임을 아는 것이다.**\n\n한 사람만 있으면 인이 성립되지 않는다. 두 사람", "source": "essay"}, {"id": "essay_392_fbf5fd6c99", "text": "음에 \"다른 사람을 사랑하는 것\"이라고 했다. **어질다는 것은 타인을 사랑하는 것이 곧 나를 사랑하는 것임을 아는 것이다.**\n\n한 사람만 있으면 인이 성립되지 않는다. 두 사람이 있어야, 관계가 있어야 비로소 인이 드러난다. 이것은 단순한 윤리학이 아니다. 나와 너가 분리되어 있지 않다는 불이(不二)의 통찰이 이미 그 글자 안에 담겨 있는 것이다.\n\n맹자는 성선설(性善說)을 주장했다. 사람은 원래 선한 마음이 있다. 누군가 안쓰러운 것을 보면 도와주고 싶은 마음이 생기는 것, 그것을 **측은지심(惻隱之心)**이라 했다. 그런데 이 측은지심이 생기는 것은 왜인가. 상대방의 비어 있음을 볼 수 있다는 것은 **내 안에도 비어 있음이 있기 때문이다.** 내가 꽉 차 있는데 상대는 비어있다면 \"저 사람 불쌍하냐?\"가 돼버린다. 역지사지(易地思之)의 마음이 생기는 것도 마찬가지다. 나한테도 그런 모습이 있기 때문에 역지사지가 되는 것이다. 순자는 성악설(性惡說)을 말했다. 사람은 본성적으로 악한 마음이 있다. 배가 고프면 남의 것을 빼앗아서라도 먹으려 하고, 더 가지려 한다. 그렇기 때문에 교육과 가르침으로 다스려야 한다고 했다. 성선설도 일면 맞고 성악설도 맞다. 그런데 여기서 악하다는 것이 무엇인지를 짚어야 한다. **악함은 나약함이다.** 악을 행하는 사람을 보면 굉장히 강한 것 같지만, 그것은 나약함 때문에 반대 작용으로 강한 것처", "source": "essay"}, {"id": "essay_393_3090fc2482", "text": ". 그런데 여기서 악하다는 것이 무엇인지를 짚어야 한다. **악함은 나약함이다.** 악을 행하는 사람을 보면 굉장히 강한 것 같지만, 그것은 나약함 때문에 반대 작용으로 강한 것처럼 하는 것이다. 내면의 결핍, 결여된 부분이 크기 때문이다. 그러니까 그런 사람들도 결국 사랑으로 그 성품을 순화시켜야 한다는 것이다. 공자, 맹자, 순자. 이 세 가지를 관통하는 것이 **사랑** 이다.\n\n#### **시가 닿는 곳 — 비어있는 가슴**\n\n시는 어디로 들어가는가. 시가 닿는 곳은 사람들의 **비어있는 가슴** 이다. 마음이 꽉 차 있는 사람한테는 시가 들어가지 않는다. 꽉 찬 시도 들어가지 않는다. 시를 덜어내고, 잘라내고, 덜어낼 대로 다 덜어낸 것, **본질만 남았을 때** 그것이 비어있는 가슴으로 들어간다. 군더더기를 다 덜어내야 한다. 군더더기가 있으면 그건 산문을 쓰는 것이다. 산문도 가슴에 닿는 경우가 있는데, 그것은 이미 산문이 시적으로 표현된 것이다. 시를 쓰는 것은 가슴을 울리기 위해서다. 비어있는 가슴을 채우기 위해서 들어가는 것이다. 그것도 사랑이다.\n\n#### **철학 — 필로소피아, 비어 있음을 아는 사랑**\n\n철학(哲學)이라는 말의 서양어 어원인 **필로소피아(philosophia)**를 보면, **필로스(philos)**는 사랑한다, 구한다는 뜻이고 **소피아(sophia)**는 지혜다. 지혜를 사랑한다는 것,", "source": "essay"}, {"id": "essay_394_a8118b8b01", "text": "어원인 **필로소피아(philosophia)**를 보면, **필로스(philos)**는 사랑한다, 구한다는 뜻이고 **소피아(sophia)**는 지혜다. 지혜를 사랑한다는 것, 지혜를 구한다는 것은 내 안에 지금 지혜가 없음, **비어 있음** 을 내가 안다는 것이다. 내 안에 비어 있음으로 지혜가 들어오기를 바라는 것이다. 내가 완벽하면 구하지 않는다. 모른다는 것을 알기 때문에 철학을 사랑하는 것이다. 시가 비어있는 가슴으로 들어가는 것이나, 철학이 비어 있음 속에서 지혜를 구하는 것이나 같은 구조다. 그것도 역시 사랑이다. **사랑과 지혜는 둘이 아니다. 지혜가 곧 사랑이고, 사랑이 곧 지혜다.**\n\n#### **바람은 기압이 낮은 곳으로 간다**\n\n바람이 불면 기압이 높은 곳에서 낮은 곳으로 간다. 기압 차이 때문이다. 사랑도 마찬가지다. 어딘가에 비어있는 가슴들이 있고, 어딘가에 모름이 있으니까 사랑이 움직이는 것이다. 지혜가 움직이는 것이다. 동양의 공자·맹자·순자가 왜 그 이야기를 했는가. 서양 그리스 철학에서 왜 그것을 필로소피아라고 했는가. 코칭도 그렇다. **코칭도 질문을 통해서 코치가 비어있는 공간을 마련해줘야 한다.** 그래야 고객의 니즈가 그 안으로 들어온다. 그것도 역시 사랑의 표현이다. 동양의 사상이나 서양의 철학이나 코치가 코칭을 하는 행위나, 이 전부를 관통하는 것이 **사랑** 이다.\n\n#### **", "source": "essay"}, {"id": "essay_395_bd65389ae2", "text": "니즈가 그 안으로 들어온다. 그것도 역시 사랑의 표현이다. 동양의 사상이나 서양의 철학이나 코치가 코칭을 하는 행위나, 이 전부를 관통하는 것이 **사랑** 이다.\n\n#### **사랑은 비어 있음이다**\n\n**사랑은 비어 있음이다.** 사랑 자체가 그 비어 있음이다. 우리 존재도 비어 있음이고, 존재 자체가 사랑이다. 시도, 철학도, 코칭도, 결국 같은 곳을 향하고 있다. 비어있는 가슴으로 들어가는 것. 비어 있음을 아는 것. 비어있는 공간을 마련해 주는 것. 그것이 사랑이다. #사랑 #시 #철학 #코칭 #비어있음 #올셀프\n\n--- (구분선)\n\n[파일명: 신경논리수준_정체성확장_수필.md]\n\n### **신경논리수준_정체성확장_수필**\n\n#### **피라미드의 구조**\n\n로버트 딜츠의 신경논리 수준(Neuro-Logical Levels)은 인간이 어떤 단계로 사고하고 행동하는지를 뇌 작동 관점에서 설명한다. 맨 아래부터 환경, 행동, 능력, 가치·신념, 정체성, 그리고 맨 위에 영성·비전이 있다. 비전은 나를 넘어선 사회적 차원이고, 영성은 우리 모두가 공통으로 갖고 있는 것이다. 촛불의 빛으로 비유하면 이렇다. 어느 초든 빛난다는 것은 똑같다. 나의 초에서 빛나는 것은 나의 빛이지만, 빛의 성질은 다 같다. **영(靈)**이 그런 것이다. 의식이 환하게 비출 때 아는 것이 있다. 그 아는 성분, 그것이 영이다.\n\n#### **환경에서", "source": "essay"}, {"id": "essay_396_42b3cd36d8", "text": "빛나는 것은 나의 빛이지만, 빛의 성질은 다 같다. **영(靈)**이 그런 것이다. 의식이 환하게 비출 때 아는 것이 있다. 그 아는 성분, 그것이 영이다.\n\n#### **환경에서 능력까지: 시대가 지나온 길**\n\n산업사회는 피라미드의 맨 아래, 환경을 확장해 왔다. 좋은 물건을 대량 생산하고, 대량 광고하고, 대량 소비했다. 그다음 행동의 단계에서 자동화가 이루어졌다. 공장 자동화, 기계가 사람의 힘을 넘어선 것이다. 지금은 능력의 단계에서 AI가 인간의 능력을 대신하고 있다. 환경이 데이터라면, 행동은 정보다. 능력은 지식이다. 기존에 번역이나 법률 문서 검색처럼 정보를 맥락 있는 지식으로 바꾸는 데 사람의 품이 엄청나게 들었다. 그 작업을 이제 AI가 해준다. 능력 있는 사람은 잉여 시간을 창출하고, 그 시간이 곧 부로 이어진다. 없던 시간이 새로 생겨나는 것이다.\n\n#### **신념이 나인 줄 아는 착각**\n\n환경, 행동, 능력이 받쳐지면 사람들은 더 높은 층위로 올라갈 수밖에 없다. 먹고살기 바쁠 때는 신념이나 가치가 사치였다. 그냥 시키는 대로 했다. 그런데 지금 세대는 다르다. 자기가 가치 없다고 생각하면 회사에서 나온다. 가치와 신념이 점점 더 삶의 중심으로 올라오고 있다. 문제는 사람들이 **신념을 자기 정체성으로 착각** 한다는 것이다. 신념을 모은 것이 나인 줄 안다. 그러나 신념이 없어도 나는 있다. 특정 종교를", "source": "essay"}, {"id": "essay_397_db4cf712c8", "text": "삶의 중심으로 올라오고 있다. 문제는 사람들이 **신념을 자기 정체성으로 착각** 한다는 것이다. 신념을 모은 것이 나인 줄 안다. 그러나 신념이 없어도 나는 있다. 특정 종교를 믿는다는 신념이 바뀌어도, 포기해도 내가 없어지는 것이 아니다. 신념은 나를 포함하는 것이 아니라 내가 포함하는 것이다. **신념보다 넓은 존재가 나다.** 그런데 그것을 모르고 신념을 나라고 믿으면, 정체성이 그만큼 제한된다.\n\n#### **신념의 충돌과 암세포**\n\n가치와 신념이 삶의 중심으로 올라올수록, 필연적으로 충돌이 커진다. 종교적 신념, 정치적 신념, 조직의 신념들이 극단적으로 부딪히는 것이 지금 세계 곳곳에서 일어나는 일이다. 제한된 신념을 자기 정체성으로 삼으면, 다른 신념과 만날 때 싸울 수밖에 없다. 가치도 제로섬이 된다.\n\n**그렇다면 제한된 신념을 가진 채 정체성을 확장해 나가면 어떻게 되는가. 암세포가 무한정으로 자기만 커져서 숙주인 인간 자체를 망가뜨리는 것처럼 된다. 자기가 포함된 조직 자체를 다 파괴하는 것이다. 그러고 나면 암세포 자신도 살 수 없다. 이기적인 확장이 결국 자기 파멸로 이어지는 것이다.**\n\n#### **그래서 신념과 신념이 서로 싸우는 것이 아니라, 상대방의 신념을 허용하고 수용할 때 우리는 더 큰 신념을 가질 수 있다. 제한된 신념이 아니라 열린 신념이 된다. 내 신념을 완전히 포기하는 것이 아니다. 나의", "source": "essay"}, {"id": "essay_398_8e16878205", "text": "우는 것이 아니라, 상대방의 신념을 허용하고 수용할 때 우리는 더 큰 신념을 가질 수 있다. 제한된 신념이 아니라 열린 신념이 된다. 내 신념을 완전히 포기하는 것이 아니다. 나의 신념도 지키지만 상대방의 신념도 내 신념 안에 포함시키는 것이다. 그렇게 될 때 우리는 더 자유로워진다. 신념과 신념이 부딪쳐 새로운 신념이 창출되고, 가치와 가치가 융합되어 새로운 문명이 만들어진다. 이것이 열린 신념이다.**\n\n#### **나는 신념보다 넘어선 존재다. 신념이 없어도 나는 나다. \"나는 특정 종교인\"이라는 신념을 포기해도 내가 없어지는 것이 아니다. 그런데 신념을 포기하면 나가 없어진다고 생각하는 사람들이 대부분이다. 그러니까 제한된 신념을 가지면 안 된다. 종교를 믿는다는 것보다 영성을 추구해야 한다. 종교의 본질, 종교가 지향하는 영성. 그것을 추구할 때 비로소 정체성이 확장된다.**\n\n#### **영성과 비전으로 정체성을 세운다**\n\n방법은 하나다. **정체성의 기반을 신념이 아니라 영성과 비전에 두는 것** 이다. 종교를 믿는 것이 아니라 종교가 지향하는 영성을 추구하는 것, 나의 관점이 옳다는 것을 인정하면서도 상대방의 관점에도 옳은 점이 있다는 것을 받아들이는 것이다. 신념과 신념이 서로 싸우는 것이 아니라 융합될 때, 새로운 신념이 창출된다. 나의 신념을 완전히 포기하는 것도 아니고, 상대방의 신념만 받아들이는 것도 아니다.", "source": "essay"}, {"id": "essay_399_30b7569448", "text": "받아들이는 것이다. 신념과 신념이 서로 싸우는 것이 아니라 융합될 때, 새로운 신념이 창출된다. 나의 신념을 완전히 포기하는 것도 아니고, 상대방의 신념만 받아들이는 것도 아니다. **나의 신념 안에 상대방의 신념을 포함시키는 것** 이다. 그렇게 신념이 확장될 때 나도 확장된다. 정체성을 사명과 소명으로 잡아야 한다. 나를 넘어선 무언가, 인류 전체, 사회 전체를 향한 방향성이 정체성의 뿌리가 될 때, 개인도 조직도 인류 역사도 멈추지 않고 발전할 수 있다. 제한된 신념이 제한된 나를 만들고, **열린 신념이 확장된 나를 만든다.** #신경논리수준 #정체성확장 #신념충돌 #영성 #올셀프\n\n--- (구분선)\n\n[파일명: 신경논리회로_영성확장_수필.md]\n\n### **신경논리회로_영성확장_수필**\n\n#### **나는 삼각형이다**\n\n로버트 딜츠의 신경 논리 회로(Neuro-Logical Levels)에는 피라미드 구조가 있다. 내가 딛고 있는 **환경** , 내가 하는 **행동** , 내가 가진 **능력** , 내가 가진 **가치와 신념** , 그리고 그것들을 통틀어 이루어지는 **정체성** . 이 삼각형 전체가 나다. 우리는 이 삼각형으로 자기를 안다. 내가 어떤 환경에 있고, 어떻게 행동하고, 무엇을 할 수 있고, 무엇을 믿는지로 '나'를 규정한다. 관념이나 신념이 정체성을 만드는 것이 아니라, 이 층위들이 중첩되면서 자기라는 것이", "source": "essay"}, {"id": "essay_400_92e2f142b2", "text": "어떤 환경에 있고, 어떻게 행동하고, 무엇을 할 수 있고, 무엇을 믿는지로 '나'를 규정한다. 관념이나 신념이 정체성을 만드는 것이 아니라, 이 층위들이 중첩되면서 자기라는 것이 형성된다.\n\n#### **우리는 상대의 삼각형 사이즈를 재고 있다**\n\n그런데 우리는 남을 볼 때도 같은 방식으로 본다. 상대방의 환경이 어떤지, 행동이 어떤지, 능력이 어떤지를 보고 그 사람의 삼각형을 그린다. 그 삼각형은 물론 내 기준의 눈으로 본 것이다. 환경이라 함은 그 사람을 둘러싼 배경이다. 아는 사람이 많은지, 비싼 차를 가졌는지. 행동은 평상시에 어떤 말을 하고 어디를 자주 가는지. 능력은 학벌이 어떤지, 직장이 무엇인지, 영어를 잘 구사하는지, 어떤 기술이 있는지. 이런 것들을 종합해서 **그 사람의 전체 삼각형 사이즈** 를 정한다. \"저 사람은 나보다 큰 삼각형이다\", \"저 사람은 나보다 작은 삼각형이다.\" 그렇게 키재기를 한다. 상대가 나보다 크면 위축되고, 나보다 작으면 우월감을 갖는다. 서로가 서로의 삼각형을 재단한다.\n\n#### **삼각형 위에 또 다른 층위가 있다**\n\n그런데 이 삼각형의 맨 위에는 또 다른 층위가 있다. **비전** 이다. 영적인 층위다. 하부의 삼각형들은 서로 다르다. 환경도 다르고, 능력도 다르고, 가치신념도 다르다. 그래서 키재기가 가능하다. 그런데 그 위의 층위, 비전과 영성의 층위에서는 **너와 내가", "source": "essay"}, {"id": "essay_401_187d59fa1a", "text": "다. 하부의 삼각형들은 서로 다르다. 환경도 다르고, 능력도 다르고, 가치신념도 다르다. 그래서 키재기가 가능하다. 그런데 그 위의 층위, 비전과 영성의 층위에서는 **너와 내가 없다.** 거기는 모두가 공유하고 있는 것이다. 무수히 많은 삼각형들이 모여서 전체의 영성이 나온다. **영성은 누구의 영성도 아니다.** 하부만 보면서 \"나보다 삼각형이 높네, 낮네\" 하는 것은 공유된 층위를 보지 못하는 것이다.\n\n#### **에고의 가치신념을 비전과 사명으로 대체해야 한다**\n\n물론 가치신념이 없으면 세상을 살아갈 수 없다. 그것이 필요하다는 것을 부정하는 것이 아니다. 그런데 그 가치신념이 에고에서 나오는 것이냐, 비전과 사명에서 나오는 것이냐는 다른 문제다. **에고의 가치신념을 비전과 사명으로 대체해야 한다.** 그렇게 됐을 때 그것은 더 이상 에고의 가치신념이 아니다. 나의 삼각형이 아니라 공유된 층위에서 움직이는 것이 된다. 타자와의 관계에서도 이 확장된 모델로 보면 달라진다. 상대의 삼각형 사이즈를 재는 것이 아니라, 그 사람의 삼각형 위에 있는 층위, 우리가 함께 공유하는 그 층위에서 만날 수 있게 된다. 그것이 진정한 관계의 시작이다. #신경논리회로 #정체성 #영성 #비전 #에고 #올셀프\n\n--- (구분선)\n\n[파일명: 신념덩어리_정체성전환_수필.md]\n\n### **신념덩어리_정체성전환_수필**\n\n#### **신념의 덩어리", "source": "essay"}, {"id": "essay_402_5acf30ba09", "text": "로 #정체성 #영성 #비전 #에고 #올셀프\n\n--- (구분선)\n\n[파일명: 신념덩어리_정체성전환_수필.md]\n\n### **신념덩어리_정체성전환_수필**\n\n#### **신념의 덩어리가 나라고 규정돼버린다**\n\n신념을 바꾼다는 것은 코치들도 굉장히 어려워한다. 왜냐하면 에고를 뒤흔들어야 하는 문제이기 때문에 고객들의 저항이 굉장히 세다. 어릴 때부터 살아가면서 계속 주입받는다. \"너는 이런 사람이야, 저런 사람이야.\" 스스로도 \"맞아, 나는 그렇지\"라고 받아들이면서 잘못된 신념을 쌓아간다. 그 신념의 덩어리가 결국에는 나라고 규정돼버린다. 그것이 **에고** 다. 그런데 그 신념의 덩어리는 사실 **생각의 덩어리인 것뿐이다. 그림자다.** 그것이 삶의 주인공이 돼버려서 신념이 내 삶을 끌고 간다. 그런데 사실 그 신념이 없어도 나는 나다. \"나는 시도를 잘 못한다\"는 신념이 없어도 나는 나인 것이다.\n\n#### **신념을 신념으로 바꾸는 것의 한계**\n\n신념을 바꾸는 방법에는 여러 가지가 있다. 하위 단계인 환경이나 능력으로 바꾸는 방법이 있다. 기독교인을 불교로 바꾸려 할 때 불교를 믿으면 병도 낫고 사업도 잘 된다고 기적을 보여주는 식이다. 될 수 있다. 그런데 그것은 외적인 요인이고 엄청나게 오랜 시간이 걸린다. 신념을 신념으로 바꾸는 것도 저항이 강하다. 기독교인한테 \"불교 신념이 더 옳으니까 바꿔야 돼\" 하는 것과 마찬가지다.", "source": "essay"}, {"id": "essay_403_d60e23d1d2", "text": "런데 그것은 외적인 요인이고 엄청나게 오랜 시간이 걸린다. 신념을 신념으로 바꾸는 것도 저항이 강하다. 기독교인한테 \"불교 신념이 더 옳으니까 바꿔야 돼\" 하는 것과 마찬가지다. 코칭에서도 그렇다. 고객들은 신념을 바꿔주려 하면 \"네가 뭔데 내 신념을 함부로\"라고 반응한다. 자기 정체성을 바꾸려는 것으로 오해하는 것이다. 실제로 어느 코치는 신념을 바꾸는 데 2년을 쫓아다녔다고 했다. 그만큼 힘든 것이다.\n\n#### **정체성을 바꾸는 것이 핵심이다**\n\n그렇다면 어떻게 해야 하는가. **정체성을 바꾸는 것이다.** 새로운 정체성을 획득하는 것이다. 나다운 나가 아니라 **원래 나로 거듭나는 것이다.** 그렇게 됐을 때 가치와 의미는 내가 선택할 수 있게 된다. **가치는 내가 부여하는 것이고, 의미도 내가 부여하는 것이다.** 사회적인 가치 — 얼마만큼 돈을 벌어야 능력자다, 체력이 좋아야 인정받는 사람이다 — 이것은 내 가치가 아니다. **가치는 찾는 것이고, 의미는 부여하는 것이다.** 내 안에 있는 숨은 가치를 찾는 것이다. 남이 인정 안 해도 된다. 그리고 카테고리적인 신념도 내 것이 아닐 수 있다. \"부모이기 때문에 가져야 되는 신념\", \"대한민국 사람이기 때문에 가져야 되는 신념\", \"기독교인이기 때문에 가져야 되는 신념\" — 이것들이 아니고, **온전한 나로서의 새로운 신념을 내가 선택하는 것이다.**\n\n#### **결", "source": "essay"}, {"id": "essay_404_008e6636be", "text": "사람이기 때문에 가져야 되는 신념\", \"기독교인이기 때문에 가져야 되는 신념\" — 이것들이 아니고, **온전한 나로서의 새로운 신념을 내가 선택하는 것이다.**\n\n#### **결과를 당겨오면 신념이 강화된다**\n\n신념이 패턴화되면 어떤 일이 생길 때마다 그 패턴으로 생각하고 상황을 본다. 그리고 결과를 자꾸 지금 현재로 당겨온다. 지금 자원은 없는데 거기다 결과를 붙이면 **결과가 초라하게 보일 수밖에 없다.** 16년의 세월을 6개월에 붙이니까 내가 너무 초라해 보이는 것이다. 그러면 \"역시 이건 힘든 일이야, 이게 될까\" 하면서 잘못된 신념을 다시 강화시킨다. **패턴이 반복된다.** 결과는 좋게 나오고 싶고 중간의 과정은 다 생략하고 결과만 짧은 기간에 당겨버린다. 해보지도 않고 안 된다고 단정한다.\n\n#### **시간도 신념이다**\n\n시간에 대한 이야기를 해야 한다. 시간은 전 세계인이 공유하는 강력한 신념이다. 과거에서 현재에서 미래로 흘러간다는 것, 이것은 너무 강력한 신념이라서 시계라는 장치를 만들어서 서로 강력하게 믿자고 한 것이다. **시계는 그 신념이 흐트러지지 않도록 만든 장치다. 시간도 신념인 것이다.** 그런데 실제로 사랑하는 사람과 있으면 시간이 너무 빨리 간다. 다니기 싫은 직장에서는 하루가 한 달처럼 지겹다. **시간은 굉장히 상대적이다.** 절대적인 시간이라는 것도 사실 절대는 아니다. 우주에서 봤을", "source": "essay"}, {"id": "essay_405_ffa70513fe", "text": "있으면 시간이 너무 빨리 간다. 다니기 싫은 직장에서는 하루가 한 달처럼 지겹다. **시간은 굉장히 상대적이다.** 절대적인 시간이라는 것도 사실 절대는 아니다. 우주에서 봤을 때는 항상 지금 여기다. 아인슈타인의 상대성 이론도 그런 것이다. 우주선 타고 가는 사람과 가만히 있는 사람의 시간은 엄청나게 차이가 난다. 내가 컨트롤할 수 있는 시간과 없는 시간을 구분해야 한다. 불안하고, 조급하고, 쫓기는 것 같고, 초조한 이 시간은 **내가 컨트롤할 수 있는 시간이다.** 내가 시간에 의미를 부여한 것이기 때문이다. 명상을 해보면 알게 된다. 늘 지금 여기다. 변하지 않는다. 과거를 생각해도 지금 여기, 미래를 생각해도 지금 여기다. 나는 과거에 끌려다녔다고 생각하지만 사실 **여기를 한 번도 떠난 적이 없는 것이다.** 작년에 떨어진 벚꽃이나 올해 떨어진 벚꽃이나 항상 그 자리다. 그 자리가 마음자리, 지금 여기인 자리다. 그래서 해석을 바꾸면 과거를 바꿀 수 있다.\n\n#### **엄마의 이야기 — 신념이 무너진 것이지 삶이 무너진 것이 아니다**\n\n자식에게 모든 가치를 건 엄마가 있다. 애들이 전부야. 나의 인생의 가치와 의미를 거기다가 다 건 것이다. 그런데 자식이 커서 엄마를 거부하고 떠나려 한다. 이 사람의 삶이 와르르 무너지는 것 같다. 그런데 **애가 떠났다고 해서 내가 무너진 건 아니다.** 나의 생각이 무너진 것이다.", "source": "essay"}, {"id": "essay_406_0e533afaad", "text": "그런데 자식이 커서 엄마를 거부하고 떠나려 한다. 이 사람의 삶이 와르르 무너지는 것 같다. 그런데 **애가 떠났다고 해서 내가 무너진 건 아니다.** 나의 생각이 무너진 것이다. 애들에 대한 기대치, 가치, 의미가 무너진 것이다. 내가 부여했던 의미가 무너진 것이지 내 삶이 무너진 것이 아니다. 엄마다운 게 나인 줄 알았다. 그래서 엄마다움을 쌓았는데, 그것을 넘어선 나가 있었다. **본질적인 나가 있었던 것이다.** 신념을 거부해도 내가 사라지는 건 아니다. 그것을 알면 애들에 대한 집착의 가치를 내려놓고, **인간 나로서 새로운 가치를 찾을 수 있다.** 그때 비로소 집착했던 엄마로서의 관계가 아니라 나로서 자식들과 새로운 관계 맺음이 가능해진다.\n\n#### **과거를 자양분으로 — 비전과 연결할 때 싹이 튼다**\n\n과거를 부정하는 것이 아니다. 애들을 키우고 헌신했던 노하우, 그 과정에서 잘못된 신념으로 고통받았던 경험 — 이것을 **새로운 비전의 자양분으로 쓰는 것이다.** \"나는 육아를 하고 애들을 키웠던 노하우를 가지고, 같은 고통을 받는 사람들을 도와줄 거야.\" 그것이 비전이다. 나보다 더 큰 사회에 기여하는 것이다. **새로운 해석을 비전과 연결하는 것이다.** 그 순간 새로운 싹이 튼다. 나로 사는 싹이 거기서 트는 것이다. 직장 상사의 경우도 같다. 부하 직원을 가르쳤더니 배신하고 이직해버렸다. 그때 \"역시 사람은", "source": "essay"}, {"id": "essay_407_3bd7c1cca9", "text": "연결하는 것이다.** 그 순간 새로운 싹이 튼다. 나로 사는 싹이 거기서 트는 것이다. 직장 상사의 경우도 같다. 부하 직원을 가르쳤더니 배신하고 이직해버렸다. 그때 \"역시 사람은 고쳐 쓰는 게 아니야\"라는 잘못된 가치를 강화시킨다. 새로운 신입사원이 와도 냉대하고, 관계 맺음이 계속 나쁜 방향으로 반복된다. 이때 필요한 것은 신입사원을 컨트롤하려는 것에서 **나에게 집중하는 것으로의 전환이다.** 내 실력을 쌓고 인격을 쌓는 데 집중하면, 그 과정에서 쌓인 노하우가 교육이 되고, 강의가 되고, 책이 된다. 새로운 비전이 열린다. **비전을 통해서 신념을 바꾸는 것이 가장 확실한 방법이다.** #신념 #에고 #정체성 #비전 #가치 #시간\n\n--- (구분선)\n\n[파일명: 신호등_선택지확장_수필.md]\n\n### **신호등_선택지확장_수필**\n\n#### **파란불이 좋고 빨간불이 나쁜 것이 아니다**\n\n신호등 앞에 서면 파란불은 좋고 빨간불은 나쁜 것처럼 느껴진다. 파란불이면 갈 수 있으니 좋은 거고, 빨간불이면 나를 제지하니 나쁜 것처럼 보인다. 그런데 파란불도 빨간불도 결국 하는 일은 같다. **내가 어떻게 행동해야 할지를 알려주는 것이다.** 좋은 상황이건 나쁜 상황이건, 그것은 다 내가 가야 할 방향성을 제시하고 있다. 그것을 올바르게 해석하는 것이 중요하다.\n\n#### **해석의 방향을 바꿔야 한다**\n\n\"저 사람은 나한테 잘해주", "source": "essay"}, {"id": "essay_408_5e1f4d5c74", "text": "나쁜 상황이건, 그것은 다 내가 가야 할 방향성을 제시하고 있다. 그것을 올바르게 해석하는 것이 중요하다.\n\n#### **해석의 방향을 바꿔야 한다**\n\n\"저 사람은 나한테 잘해주니까 좋은 것이다\", \"나를 나쁘게 대하니까 나쁜 것이다\" — 이렇게 단정해버리면 **프레임에 갇혀버린다.** 해석의 방향을 바꿔야 한다. \"지금 이 상황이, 이 사람이 나한테 이렇게 대하는 것이, 나한테 어떻게 행동하라고 가르쳐주려는 것인가?\" 이렇게 묻는 것이다. 좋다 나쁘다의 이분법이 아니라, 이 상황이 나한테 무엇을 가리키고 있는가를 보는 것이다.\n\n#### **선택지는 두 개가 아니다**\n\n파란불이면 가고 빨간불이면 멈춘다. 이렇게 보면 선택지는 두 개뿐이다. 좋은 것이냐 나쁜 것이냐, 가느냐 멈추느냐. **딱 그것밖에 안 된다.** 그런데 실제 교차로에서는 그렇지 않다. 빨간불 앞에서도 **우회전을 할 수 있다.** 상황에 따라서는 **좌회전도, 유턴도 할 수 있다.** 직진만이 전부가 아니다. 멈춰서 다른 방향을 선택할 수 있는 것이다. 삶도 그렇다. 상황이 나를 두 가지 선택지 중 하나로 몰아넣는 것처럼 보이지만, 새로운 해석을 가져오면 선택지가 열린다. 우회할 수도 있고, 방향을 완전히 바꿀 수도 있고, 왔던 길을 되돌아갈 수도 있다. **상황이 나를 선택으로 몰가는 것이 아니라, 내가 상황에 새로운 해석을 가져옴으로써 나의 선택지를 넓히는", "source": "essay"}, {"id": "essay_409_43ec906ff8", "text": "있고, 방향을 완전히 바꿀 수도 있고, 왔던 길을 되돌아갈 수도 있다. **상황이 나를 선택으로 몰가는 것이 아니라, 내가 상황에 새로운 해석을 가져옴으로써 나의 선택지를 넓히는 것이다.** 그것이 내가 상황의 주인이 되는 방식이다. #신호등 #선택지 #해석 #프레임 #방향성\n\n--- (구분선)\n\n[파일명: 씨앗의온전함_결핍이아닌가능성_수필.md]\n\n### **씨앗의 온전함, 결핍이 아닌 가능성**\n\n#### **꽃이 핀 것만 꽃이 아니다**\n\n옆에 아주 예쁘게 꽃을 피운 꽃이 있다. 나는 아직 꽃을 못 피웠다. 저 사람은 결과물을 저렇게 잘 내는데 나는 뭔가 부족한 것 같은 생각이 든다. 그런데 꽃이 핀 것만 꽃이 아니다. 씨앗일 때도 꽃이다. 줄기일 때도 꽃의 줄기다. 매 순간 그 꽃의 여정을 가고 있는 것이다. 꽃이 떨어져도 꽃이다. 씨앗에서부터 꽃이 피고 떨어지고 열매가 맺고 열매도 떨어지는 그 전체의 과정이 꽃의 여정이다. **그것이 결핍이 아니다.** 씨앗이 없으면 꽃도 없다. 줄기가 없으면 꽃이 없다. 씨앗이 꽃의 결핍이라고 본다면 씨앗은 다 퇴출되어야 한다. 그러면 결과적으로 꽃도 없다. 씨앗은 꽃의 결핍이 아니다. 과정 중의 하나일 뿐이다. 여정이다.\
