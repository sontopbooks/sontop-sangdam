사라지면 배경이 된다.** 그러니까 내가 특별하게 '소나무다' 하고 인식할 때 저기 소나무라는 상이 포착되는 거지, 그러지 않을 때는 그냥 배경이다. 그런데 나무는 그냥 있다. 소리도 그냥 들리는 건 사실이다. **그것들은 다 실상이다.** 지금 여기에 온전하게 있는 거다. 실상이 무상하다는 게 아니다. **내용물, 그 개념들이 무상한 거다.** 그러니까 버리라는 게 아니다. **그 개념들, 순간순간 인식할 때 드러나는 것들로부터 자유로워야 한다.** 집착을 하면 이미 사라져버린 것에 한 번 더 굴려서 허상을 만들어 놓고, 거기다가 2차·3차 화살을 계속 날리게 된다. 이미 다 지나가버렸는데 '그 소리가 왜 나를 이렇게 괴롭힐까' 하면서. 그래서 더 괴로워지는 거다. 편견과 오래된 기억을 대상에 적용시키면 거기에 내용물이 입혀지면서 시야와 주의 집중을 다 빼앗긴다. 그냥 있는 그대로의 현실을 그냥 느끼", "source": "essay"}, {"id": "essay_514_48c0198c72", "text": "까' 하면서. 그래서 더 괴로워지는 거다. 편견과 오래된 기억을 대상에 적용시키면 거기에 내용물이 입혀지면서 시야와 주의 집중을 다 빼앗긴다. 그냥 있는 그대로의 현실을 그냥 느끼면 되는데, 색안경을 끼고 모든 것을 물들여버린다. **특정 상에 집착해서 사로잡히면, 그만큼 좁아진다.** 전체성에서 멀어진다. 올셀프에서 멀어진다.\n\n#### **탁 쉬어진다**\n\n알아차린다는 말은 사실 이 현실과 동떨어진 어떤 나가 따로 있어야 한다는 뜻이다. 그래서 그게 계속 알아차려야 하니까 긴장을 하게 된다. 상기가 된다. 그런데 지금 일어나고 있는 것이 전부 통째로 다 나라고 생각한다면 — **탁 쉬어지게 된다.** 나는 어디 갈 데도 없다. 여기서 벗어날 길이 없다. 다 올셀프인데, 다 나인데. 그러니까 굳이 나를 찾으러 애쓰고, 알아차리려 애쓰고, 나를 찾으려 애쓸 필요가 없다. **내용물은 딴 걸로 얼마든지 대체가 되지만, 내용물이 일어나고 있는 지금 이 현실 — 이건 진실이다.** 여기에 그냥 있으면 된다. #올셀프 #내용물 #이데아 #무상 #실상 #쉬어짐\n\n**--- (구분선)**\n\n[파일명: 올셀프의인식_관계적드러남_수필.md]\n\n### **올셀프의인식_관계적드러남_수필**\n\n#### **나무는 나무 아닌 것들이 있어야 나무다**\n\n풍경화 한 점을 본다. 나무 한 그루가 서 있고, 꽃이 있고, 뒤에 배경으로 산이 있다. 나무 하나가 따", "source": "essay"}, {"id": "essay_515_be67e50b7f", "text": "드러남_수필**\n\n#### **나무는 나무 아닌 것들이 있어야 나무다**\n\n풍경화 한 점을 본다. 나무 한 그루가 서 있고, 꽃이 있고, 뒤에 배경으로 산이 있다. 나무 하나가 따로 존재해 있는 것 같지만, 나무 자체로서 있는 건 아니다. **나무 아닌 것들이 있으니까 나무가 되는 거다.** 온 세상에서 뭘 딱 떼어서 그것을 온전히 '이것이다'라고 할 만한 것은 없다. 갈대가 바람에 흔들리지만, 바람이나 공간이나 뒤의 산이나 이런 것 없이 갈대 혼자 존재할 수 있는가. 뭔가 또 누군가 바라봐 줘야 한다. **연기적으로 관계가 다 서로 맺어져 있는 거다.** 그래서 올셀프라고 할 수밖에 없다. 나 자신도 그렇다. 내가 바라보는 세상이 연기적으로 묶여 있지만, 나 자신도 역시 그 속에서 드러나는 하나의 대상인 것뿐이다. 지금 내가 느끼고 있는 것은, 저기 바람에 흔들리는 갈대나, 지금 내 손을 보고 있는 것이나 — **보인다는 것에서는 같다.** 내 안에서 느낌이 일어나는 거나 갈대가 흔들리는 거나, 드러나서 내가 알아진다는 것에서는 같다는 거다.\n\n#### **내가 감각하는 것은 전부 내 세상이다**\n\n내 생각도 그렇고, 감정도 그렇고, 보이는 것, 들리는 것, 냄새 맡아지는 것, 이런 감각되어지는 모든 것들이 결국에는 다 **내 안에서 지금 일어나고 있는 거다.** 그래서 올셀프라는 거다. 내 눈이 어떻게 되어 세상이 전부 빨갛게 보", "source": "essay"}, {"id": "essay_516_cd843e461c", "text": ", 냄새 맡아지는 것, 이런 감각되어지는 모든 것들이 결국에는 다 **내 안에서 지금 일어나고 있는 거다.** 그래서 올셀프라는 거다. 내 눈이 어떻게 되어 세상이 전부 빨갛게 보이면, 나는 세상이 빨간 것으로 다 인식된다. 빨간 선글라스를 껴도 그렇다. 그러면 나한테는 세상과 내가 빨간 속성이라는 것으로 관계가 맺어져 버리는 거다. 남들은 그렇게 안 느껴지지만 내가 보는 세상은 그렇게 느껴지는 거다. **그거는 내 세상인 거다. 내가 감각하는 것은 전부 내 바운더리 안에 있는 거다. 내 세상인 거다.** 아는 그것에서 대상이 왔다가 사라지고, 왔다가 사라진다. 그런데 앎은 대상과 항시 붙어있다. 뭔가 드러났다 하면 거기에 나의 인식이 다 들어가 있는 거다. 저기 산에 파란 소나무가 있다. 저게 파랗게 드러났다는 것은 저게 **의식화됐다** 는 얘기다. 내가 파랗다는 것을 인식하는 거다. 지금 보이는 모든 것들이 그대로 다 **내 의식인 거다.** **내 의식을 벗어나서 인식될 수 있는 것은 하나도 없다.**\n\n#### **알아차리려고 애쓸 필요가 없다**\n\n따로 앎이 있고, 대상이 따로 있고 이렇지 않다. 이미 분리되어서 알려질 수가 없다. 그런데 굳이 알아차림을 할 이유가 없는 거다. 이미 다 앎이 다 있는 건데. 내가 알아차림을 한다는 건 **의식을 내 육체 안에 있는 것으로 한정 지었기 때문에** 알아차림을 하려고 애쓰는 거다", "source": "essay"}, {"id": "essay_517_6211d8ee3a", "text": "아차림을 할 이유가 없는 거다. 이미 다 앎이 다 있는 건데. 내가 알아차림을 한다는 건 **의식을 내 육체 안에 있는 것으로 한정 지었기 때문에** 알아차림을 하려고 애쓰는 거다. 근데 이미 통으로 다 알아차림이다. 알아차림이 없는 것이 없다. 지금 이 우주에. **온 우주에 나의 앎이 꽉 차 있는 거다.** 저 하늘에 있는 별도 내가 알아차리는 거다. 그래서 온 우주가 신이 가득 차 있고, 신이 곧 앎이다. 그 앎으로 내가 아는 게 아니고 **우주가 아는 거다.** 우주가 나를 통해서 자신을 보고 있는 거다. #올셀프 #연기 #의식 #앎 #알아차림 #우주\n\n**--- (구분선)**\n\n[파일명: 올코칭_비분리성과네가지조화_수필.md]\n\n### **올코칭_비분리성과네가지조화_수필**\n\n#### **자각이 먼저다 — 세상과 내가 둘이 아니라는 것**\n\n올셀프가 지향하고, 올코칭이 지향해야 하는 것이 있다. **나와 세상이 따로 분리되지 않았다는 자각이 중요하다.** 그 자각이 일어나야지만 거기서 세상과 내가 상호작용이 일어난다. 온통 나이니까. 세상에 벌어지는 현상이나 일에 대해서 내가 **책임** 을 져야 되는 부분이 생기는 거다. 세상도 잘 살아야 되는 거고, 나도 잘 살아야 된다. **세상을 잘 되게 하는 게 곧 내가 잘 사는 길이고, 내가 잘 사는 게 세상을 잘 살게 하는 일이다.** 세상과 내가 둘이 아니기 때문에, 거기서 당", "source": "essay"}, {"id": "essay_518_62ee6aaad8", "text": "고, 나도 잘 살아야 된다. **세상을 잘 되게 하는 게 곧 내가 잘 사는 길이고, 내가 잘 사는 게 세상을 잘 살게 하는 일이다.** 세상과 내가 둘이 아니기 때문에, 거기서 당연히 세상 일에 내가 더 기여를 하고, 세상이 좋은 쪽으로 잘 돌아가도록 하고자 하는 **열망** 이 생긴다.\n\n#### **양극단을 피하는 중도**\n\n지금 명상 수행을 하는 사람들은 너무 한쪽으로 치우친다. 무아라든가, 탈속적인 어떤 세속을 등지는 쪽으로. 또 나머지 세상 사는 사람들은 너무 **물질** 을 추구한다. **이 양극단에서 중도를 찾자는 거다. 중용을 찾자.** 너무 정신을 추구하는 것으로부터도, 너무 물질을 추구하는 것으로부터도 벗어나서 **정신과 물질이 같이 공존** 할 수 있는 길. 그게 올코칭의 이념이 되는 것이다.\n\n#### **지성·감성·영성·이성 — 네 가지의 조화**\n\n그런 의미에서 올코칭이 추구해야 하는 것은 **지성, 감성, 영성, 이성이 골고루 조화롭게** 되는 것이다. 둘이 아닌가? 너무 지성적으로 치우쳐 거나 너무 영성적으로 치우쳐 버리면 극단적이 되면서 **균형을 잃는다.** 그래서 코칭을 할 때에도 이 밸런스가 깨졌나 안 깨졌나를 점검하는 과정이 필요하다. 이 네 가지가 조화롭게 될 때에 **조화로운 삶** 이 영위될 수 있다. 어느 것 하나가 너무 치우쳐 버리면 삶에 분명히 어떤 어려움이나 문제점이 생긴다. 그래서", "source": "essay"}, {"id": "essay_519_1f9651c9d5", "text": "정이 필요하다. 이 네 가지가 조화롭게 될 때에 **조화로운 삶** 이 영위될 수 있다. 어느 것 하나가 너무 치우쳐 버리면 삶에 분명히 어떤 어려움이나 문제점이 생긴다. 그래서 많은 것은 덜어주고, 부족한 것은 채워준다. 본인 스스로 '내가 어느 부분이 너무 치우쳤구나' 하는 것을 **자각** 하게 코칭으로 도와줘야 한다. '온전한 나(온나)'를 구현하기 위해서는 이 네 가지 성품들이 조화를 이루어줘야 하는 부분이 있다. 그래서 올코칭이라는 말도, 올 성품이라는 말도 뜻이 괜찮다.\n\n#### **올코칭의 큰 틀**\n\n코칭도 있고, 교육도 있고, 명상도 들어갈 수 있다. 지향점은 하나다. **세상과 내가 둘이 아니라는 자각을 토대로, 균형적으로 세상과 내가 상호작용을 일으키면서 서로를 이롭게 하는 것.** 나의 발전이 세상을 위해서 쓰이고, 세상의 발전이 또 나의 성장으로 환원될 수 있는. 그런 쪽으로 향해가는 것이다. #올코칭 #온나코칭 #지성감성영성이성 #중도 #비분리성 #자각\n\n**--- (구분선)**\n\n[파일명: 왜곡된신념_인류보편가치_수필.md]\n\n### **왜곡된신념_인류보편가치_수필**\n\n#### **신념에 가치 매김이 들어가면 오염된다**\n\n우리의 신념은 대부분 이렇게 생겼다. 내가 가치 있다고 생각하는 것에는 **집착하는 마음** 이 있고, 가치 없다고 생각하는 것에는 **혐오하는 마음** 이 있다. 나의 경험에다가", "source": "essay"}, {"id": "essay_520_7b2ef9be7d", "text": "리의 신념은 대부분 이렇게 생겼다. 내가 가치 있다고 생각하는 것에는 **집착하는 마음** 이 있고, 가치 없다고 생각하는 것에는 **혐오하는 마음** 이 있다. 나의 경험에다가 가치를 부여하는 거다. '오, 이거는 가치 있는 거네', '이건 쓸데없는 거네', '이 사람은 나한테 필요한 사람이야', '이 사람은 필요가 없는 사람이야' — 이렇게 이원적으로 가치 매김을 한다. 혐오하는 것은 완전히 **마이너스 가치를 부여** 해버리는 거다. **내 왜곡된 신념에 가치 매김이 들어가면 오염된 신념이 된다.** 그런 신념에 따라서 살다 보면 세상 사는 데 부침이 많다. 나만 그렇게 사는 게 아니고 사람들이 다 그렇게 살기 때문이다. 그러면 **가치가 충돌한다.** 나는 이것이 가치 있으니까 가지려 하는데, 남들도 그걸 가치 있게 본다. 내가 하기 싫은 거는 던져버리면 '왜 이 더러운 걸 나한테 던졌어?' 하고 사람들도 나한테 던진다. **내가 매긴 가치에 따라 살면 충돌을 일으키는 삶을 살 수밖에 없다.** 누가 그렇게 한 것도 아닌데 우리가 스스로 만들어서 그렇게 하는 거다.\n\n#### **인류 보편의 가치를 신념으로 가져와야 한다**\n\n그러면 어떤 삶을 살아야 되는가. 내가 매긴 가치가 아니고 **인류 보편의 가치** — 지구면 지구, 우주면 우주, 이 전체적인 것을 **나의 신념으로 갖고 와야 한다.** 세상을 이롭게 하는 거기에 가", "source": "essay"}, {"id": "essay_521_5271db4f77", "text": "되는가. 내가 매긴 가치가 아니고 **인류 보편의 가치** — 지구면 지구, 우주면 우주, 이 전체적인 것을 **나의 신념으로 갖고 와야 한다.** 세상을 이롭게 하는 거기에 가치를 둬야 한다. **'나'가 중심이 되어서는 안 된다.** 내가 경험하면서 혐오하고 집착했던 그것이 가치 기준이 되면 안 된다. 인류가 그동안 종교면 종교, 철학이면 철학을 통해서 '사람은 어떻게 살아야 한다', '그래야 인간답게 사는 거다' 하고 쌓아온 **인류의 공통의 가치** — 그것이다. **남을 잘 되게 해야 내가 잘 된다는 공동의 가치를 내 신념 체계로 가져와야 한다.** 그것을 제일의 가치로 두고 살아야 한다. 내가 세상을 내 입맛에 맞춰서, 내 가치관에 맞춰서 재단해서, 나한테 이로운 것만 가져오고 해로운 건 치워버리려 하는 그런 가치에서 벗어나야 한다. **내가 세상을 위해서 어떤 일을 해야 될 것인가.** 이것을 찾고 발현하면서, **내가 가지고 있는 것 중에서 세상을 위해서 펼칠 게 뭐가 있을까를 자꾸 생각해봐야 한다.**\n\n#### **꽃을 던지면 꽃이 튕겨 나온다**\n\n그렇게 살다 보면 분명히 세상이 우리를 돕게 된다. **작용 반작용의 법칙** 에 의해서 내가 세상에 그런 것을 던지면 세상이 또 그것을 돌려준다. 꽃을 던지면 꽃이 튕겨 나오고, 오물을 던지면 오물이 튄다. 그런 삶을 살아야 한다. #신념 #가치매김 #인류보편가치 #", "source": "essay"}, {"id": "essay_522_b74070d25a", "text": "내가 세상에 그런 것을 던지면 세상이 또 그것을 돌려준다. 꽃을 던지면 꽃이 튕겨 나오고, 오물을 던지면 오물이 튄다. 그런 삶을 살아야 한다. #신념 #가치매김 #인류보편가치 #올셀프 #작용반작용 #오염된신념\n\n--- (구분선)\n\n[파일명: 외로움_존재와관계_수필.md]\n\n### **외로움극복_존재가아닌관계_수필**\n\n#### **나를 존재로 보기 때문에 외롭다**\n\n사람들이 외로움을 느끼는 것은 자기 자신을 **존재** 로 보기 때문이다. 이것을 존재로 보지 말고 **관계** 로 봐야 한다. 사실 존재라는 게 딱 하나의 동떨어진 존재라는 건 없다. 나무 하나가 그냥 통째로 개별적인 존재로 있을 수 있는가. 나무가 하나 존재하려면 배경도 있어야 되고 땅도 있어야 된다. **무언가가 있다면 그것은 이미 관계 속에서 존재하고 있는 거다.** 나를 존재로 인식하면 대상이나 주변 환경하고 나는 전혀 관계가 없는 사람이 돼버린다. 독립된 존재니까. 그러니까 외로울 수밖에 없다. 그런데 그것을 **관계로 인식하면** 나는 이미 지금 여기에 있다는 것 자체가 엄청난 관계 속에 있다는 거다. 관계가 이미 전제가 돼 있는 거다.\n\n#### **태양도 태양 아닌 것들과의 관계 속에 있다**\n\n나만 그러냐 하면 세상의 모든 것들이 다 그렇다. 다 관계 속에서 이루어져 있다. 뭐 하나 딱 동떨어져서 '이것이다' 하고 얘기할 수 있는 게 없다. 하늘에 태", "source": "essay"}, {"id": "essay_523_4643319930", "text": "계 속에 있다**\n\n나만 그러냐 하면 세상의 모든 것들이 다 그렇다. 다 관계 속에서 이루어져 있다. 뭐 하나 딱 동떨어져서 '이것이다' 하고 얘기할 수 있는 게 없다. 하늘에 태양이 있는 것도 '태양이 아닌 것'도 있으니까 태양이 있는 거 아닌가. **태양이 있다는 것은 이미 태양 아닌 것들과의 관계 맺음이 전제로 내포돼 있다는 거다.** 세상 모든 사람들이나 만물들은 이미 관계 맺음 속에 있다. 그것을 벗어날 수가 없다.\n\n#### **새로운 관계를 만들 필요가 없다**\n\n외로움을 극복하는 것은 새로운 관계를 특별하게 맺으려 하는 것보다, **내가 기존에 이미 관계 맺고 있다는 사실을 인식하는 것** 이다. 관계 맺음을 새롭게 발견하고 확인하면서 살아야 한다. 그 관계가 꼭 사람이 아니어도 된다. 물건이 됐든, 어떤 공간이 됐든. 나라는 게 존재하기 위해서는 무수히 많은 관계들로 이루어져 있다는 것을 성찰해야 한다. 내가 맺고 있는 관계가 어떤 것이 있나 — 이것을 들여다보는 것. **나를 이미 밀접하게 둘러싼 관계들과의 소통을 잘 하려 하다 보면, 외로움은 그렇게 극복될 수 있다.**\n\n#### **외로움조차도 외롭지 않음을 전제한다**\n\n외롭다는 거는 관계 맺음이 결여된 거다. 내가 혼자 뚝 떨어져 있다, 아무것도 관계 맺음 된 게 없다 — 이렇게 생각하니까 외로움을 느끼는 거다. 그런데 그 외로움조차도 — **외롭지 않음이", "source": "essay"}, {"id": "essay_524_bce705ae84", "text": "관계 맺음이 결여된 거다. 내가 혼자 뚝 떨어져 있다, 아무것도 관계 맺음 된 게 없다 — 이렇게 생각하니까 외로움을 느끼는 거다. 그런데 그 외로움조차도 — **외롭지 않음이 있기 때문에 외로움이 드러나는 거다.** 오로지 외롭기만 하면 외로움이라는 걸 모른다. 내 안에 베이스로 외롭지 않은 부분이 있기 때문에 그것이 외로움으로 드러나는 거다. 외로움조차도 이미 외롭지 않음과 관계 맺음을 하고 있다.\n\n**외롭다고 느끼면 관계성을 회복하라는 신호로 받아들여야 한다.** 꼭 타인이 아니더라도 내 안의 소외된 부분과의 연결을 시도해야 한다. #외로움 #존재와관계 #연기 #올셀프 #관계맺음 #소통\n\n--- (구분선)\n\n[파일명: 외로움과우울_관계맺음_에너지파동_수필.md]\n\n### **외로움과우울_관계맺음_에너지파동_수필**\n\n#### **외로움은 인식이 향할 대상이 없는 것이다**\n\n외롭다는 거는 **인식이 어디로 향할 대상이 없다는 거다.** 뭔가 대상과 관계 맺음이 일어나야 되는데, 관계 맺음을 한다는 건 내 인식이 관계 맺은 것에 향한다는 거다. 인식이 어딘가에 지향을 하고 있어야 **존재감** 이 느껴진다. 인식의 지향성. 그런데 인식이 어디에도 향하지 못하고 방황하면, 주체성 없이 이리저리 끌려다니면 — 그게 우울감이다. 명상을 할 때조차도 코끝이나 단전이나 특정 단어에 인식을 한 곳에 **묶어둔다.** 그러다 보면 잡념이", "source": "essay"}, {"id": "essay_525_6a310f377a", "text": "지 못하고 방황하면, 주체성 없이 이리저리 끌려다니면 — 그게 우울감이다. 명상을 할 때조차도 코끝이나 단전이나 특정 단어에 인식을 한 곳에 **묶어둔다.** 그러다 보면 잡념이 일다가도 다시 자리로 돌아온다. 그런 게 없으면 정처 없이 헤매거나 잡생각에 끌려다닌다.\n\n#### **주체성 상실이 우울감의 근원이다**\n\n내가 우습게 느껴지면 생각이 끌리고, 생각에 휩쓸린다. 특정 자극에 중독성으로 끌려다니면 그때 우울감이 확 온다. 거기 **내 주체성이 없기 때문이다.** 주체성이 상실되니까 외롭고 우울한 거다. 반대로 혼자 있어도 **내 주체성이 명확히 있으면, 내 존재감이 있으면** 외롭지 않다. 우울해지지 않는다.\n\n책을 재미있게 보고 있으면 우울한 감정이 없다. 책을 안 볼 때도 '집에 가서 책 읽어야지' 하면 우울함이 없다. 내 관심과 에너지가 **책과 연결되어 있기** 때문이다. **관계 맺음이 된 거다.**\n\n#### **관계 맺음과 관계 묶임은 다르다**\n\n**관계 맺음** — 내가 주체적으로 관계를 맺는 것이다. 거기서 상호작용이 일어난다. 서로 주고받으면서 에너지가 상승된다. **관계 묶임** — 내 의지와 상관없이 관계에 묶여버리는 것이다. 중독이 됐건, 집착이 됐건, 구속이 됐건. 그건 내가 주체적으로 관계 맺은 게 아니기 때문에 상호작용이 아니다. 일방적인 작용이다. 외부에서 오는 강한 자극에 거부하거나 회피하거", "source": "essay"}, {"id": "essay_526_91b0676cd7", "text": "중독이 됐건, 집착이 됐건, 구속이 됐건. 그건 내가 주체적으로 관계 맺은 게 아니기 때문에 상호작용이 아니다. 일방적인 작용이다. 외부에서 오는 강한 자극에 거부하거나 회피하거나 — **수동적으로 끌려다니는 거다.** 그렇게 되면 나라는 것이 수동적이 되어버리니까 주체성이 없어진다. 나약해지고, 갈대처럼 흔들리고, 미약하게 느껴진다. 그러니까 우울해질 수밖에 없다. 에너지가 다운되는 거다.\n\n#### **에너지는 파동이다 — 단차가 있어야 한다**\n\n에너지 자체가 고갈됐다기보다 **정체된 거다.** 에너지라는 것은 파동이다. 높낮이 단차가 있어야 한다. 그런데 이게 그냥 밋밋하다. 파동이 없다. **단차가 없으면 우울한 거다.**\n\n좋음과 나쁨의 단차. 좋을 때는 좋고, 나쁠 때는 나쁘고 — 이걸 그냥 받아들이면 단차가 생긴다. 그러면서 에너지가 생긴다. 좋은 것도 없고 나쁜 것도 없고 그냥 밋밋하면 — 착 가라앉는다. **침잠(沈潛)한 상태.** 그게 우울감이다.\n\n#### **단차를 스스로 만들어야 한다**\n\n그러니까 **단차를 내 스스로 만들어야 한다.** 힘든 것을 경험해야 한다. 내가 힘들면 거기서 괴로움이 발생하고 밑으로 내려간다. 그 괴로움을 견뎌내거나 해결하면 다시 상승 곡선을 그리면서 즐거움이 생긴다. 단차가 생긴다. 사이클이 이루어지는 거다. 이것을 자꾸 경험하다 보면 힘든 것에 부딪쳤을 때, 이걸 딛고 일어서서", "source": "essay"}, {"id": "essay_527_324508baf9", "text": "견뎌내거나 해결하면 다시 상승 곡선을 그리면서 즐거움이 생긴다. 단차가 생긴다. 사이클이 이루어지는 거다. 이것을 자꾸 경험하다 보면 힘든 것에 부딪쳤을 때, 이걸 딛고 일어서서 해결하면 기분이 좋아진다는 걸 안다. 그 앎이 다음 번의 힘듦을 견디게 한다. 반대로 쾌락만 추구하거나, 모든 관계 맺음을 다 끊어버리면 에너지의 활성도가 떨어지고 당연히 우울해진다. 나이가 들수록 뭔가를 배우러 다니고, 모임에 가고, 운동을 하라는 이유가 여기에 있다. 단차를 만들기 위해서다. #외로움 #우울 #관계맺음 #주체성 #에너지파동 #단차\n\n--- (구분선)\n\n[파일명: 욕망과생각_내용물동일시_주인되기_수필.md]\n\n### **욕망과생각_내용물동일시_주인되기_수필**\n\n#### **욕망과 욕망의 내용물은 다르다**\n\n내가 어떤 욕망이 올라온다. 뭔가를 갖고 싶다. 그런데 '뭘 갖고 싶다'는 그거는 욕망의 대상이다. 내용물이다. 그거는 바뀔 수 있다. 지금 이걸 가지고 싶다가도 저걸 가질 수도 있다. 다른 걸로 대체할 수 있다. 그런데 '나는 그것만 가져야 돼' 하면 내용물에 집착하는 거다. 집착이 되면 힘들어진다. **욕망이 올라왔다는 거는 사실이다.** 욕망 자체가 나한테 올라왔다는 거는 나를 증명하는 거다. 그건 인정해줘야 한다. 내용물은 바뀔 수 있다. 내용물이 바뀔 수 있다는 것을 인정하면, 이 욕망 에너지를 다른 쪽으로 쓸 수도 있다.", "source": "essay"}, {"id": "essay_528_4973380278", "text": "한테 올라왔다는 거는 나를 증명하는 거다. 그건 인정해줘야 한다. 내용물은 바뀔 수 있다. 내용물이 바뀔 수 있다는 것을 인정하면, 이 욕망 에너지를 다른 쪽으로 쓸 수도 있다. 내가 가질 수 없는 것을 욕망할 때 — 그럴 때 **욕망과 욕망의 내용물을 분리해버리면 거기서 덫에서 얼른 빠져나올 수 있다.** 욕망하는 것 자체가 잘못된 건 아니다. 대상을 전환해도 된다. 욕망이라는 게 올라왔다는 건 나의 성취하고자 하는 욕구다. 그걸 억누르려 하면 안 된다.\n\n#### **욕망을 억누르면 더 큰 문제가 된다**\n\n내용물이 잘못돼서 혼란을 일으키고 힘든 거지, 욕망 자체가 잘못돼서 힘든 게 아니다. 그런데 우리는 두 개를 하나로 보기 때문에 다루는 걸 어려워한다. '내가 이런 걸 욕망하면 안 되지' 하고 욕망 자체를 눌러버리려 한다. 욕망은 에너지다. 욕망 자체를 눌러버리면 우울증이 되거나, 의욕이 상실되거나, 눌렸던 욕망이 다른 쪽으로 나오면 **폭력성** 이 되어버린다. 왜곡된 에너지가 폭력적인 언사나 행동으로 터져 나오는 거다. 사랑도 마찬가지다. 어떤 사람을 사랑하지 못한다고 해서 사랑 자체를 포기해야 되는 건 아니다. '나는 사랑에 소질이 없나 봐'가 아니다. 내용으로 바꾸면 된다.\n\n#### **생각 자체가 문제가 아니라 내용물에 동일시되는 것이 문제다**\n\n명상을 할 때도 이 생각을 없애려 하고, 생각을 스톱하려 하고, 알아", "source": "essay"}, {"id": "essay_529_38271d535e", "text": "아니다. 내용으로 바꾸면 된다.\n\n#### **생각 자체가 문제가 아니라 내용물에 동일시되는 것이 문제다**\n\n명상을 할 때도 이 생각을 없애려 하고, 생각을 스톱하려 하고, 알아차려서 어떻게 해보려 한다. 그런데 **생각 자체가 잘못된 건 아니다.** 생각을 써야지, 생각을 없애야 되는 게 아니다. 명상이 생각이 없는 맑고 투명한 상태를 추구한다면 그건 명상을 잘못하고 있는 거다.\n\n생각이 올라오는 거는 내가 생각하는 존재라는 것을 증명하고 있다. **생각의 내용물이 문제인 거다.** 내용물에 자꾸 동일시되면서 현실화시키는 게 문제다. 뭘 먹고 싶다 하면 벌써 침이 돌고 식당에 가 있고 메뉴를 고르고 있는 거다. 이미 지금 여기를 벗어난 거다. 생각이 올라오면 '생각이 올라오고 있구나' — 근데 내용은 쫓아가지 않으면 된다. 생각이 나를 지금 여기로 가져오는 거다. 내가 지금 잡념을 해도 지금 여기서 잡념하잖아. **생각도, 감정도, 느낌도 — 다 지금 여기에 내가 존재한다는 걸 증명해주는 거다.**\n\n#### **생각이 도구로 쓰일 때 내가 주인이다**\n\n생각을 현실화시키지 않으면 얼마든지 생각을 마음대로 쓸 수 있다. 그때 **생각이 도구로 쓰이는 거다.** 생각을 너무 리얼하게 느껴버리면 생각에 빠지고, 생각이 주인이 되고 내가 종이 돼버린다. **생각의 주인으로 살려면 생각의 내용물에 빠지지 않으면 된다.** 그러면 내가 생", "source": "essay"}, {"id": "essay_530_07ca8f1b79", "text": ".** 생각을 너무 리얼하게 느껴버리면 생각에 빠지고, 생각이 주인이 되고 내가 종이 돼버린다. **생각의 주인으로 살려면 생각의 내용물에 빠지지 않으면 된다.** 그러면 내가 생각의 주인이 될 수 있다. #욕망 #생각 #내용물 #동일시 #주인되기 #올셀프\n\n--- (구분선)\n\n[파일명: 우드카빙코칭_현대적화두_수필.md]\n\n### **우드카빙 코칭, 현대적 화두**\n\n#### **코칭 질문은 현대적 화두다**\n\n불교 수행에 화두 수행이 있다. 화두는 사람이 원래 가지고 있는 불성, 본성을 드러내는 방편이다. 그런데 코치들이 고객에게 던지는 질문도 결과적으로는 고객이 원하는 삶을 현실화시키는 화두적인 방법이다. **코칭적 질문은 현대적 화두다.** 그래서 우드카빙을 코칭적 질문과 연결시키고 싶었다. 뜰 앞의 잣나무라는 화두를 모티브로 해서, 그 주제 자체가 하나의 코칭적 질문이 되는 것이다. 예를 들어 *당신이 당신 삶에서 덜어내고 싶은 것은 무엇입니까* 라는 질문이 하나의 현대적 화두가 되어, 그것을 하나 가지고 나무를 느끼면서 깎아나가는 것이다. 입체적인 명상이다.\n\n---\n\n#### **언어는 저마다 다른 의미로 받아들여진다**\n\n깨달음의 흐름을 전달할 때 대부분 말로 한다. 선사들도, 명상 스승들도, 현대의 영적 스승들도 언어로 전달한다. 그런데 언어는 저마다 다른 의미로 받아들여진다. 선사들이 이런 의미로 전달해도 받아들이는", "source": "essay"}, {"id": "essay_531_f1d19c6ef8", "text": "때 대부분 말로 한다. 선사들도, 명상 스승들도, 현대의 영적 스승들도 언어로 전달한다. 그런데 언어는 저마다 다른 의미로 받아들여진다. 선사들이 이런 의미로 전달해도 받아들이는 사람은 또 다른 의미로 생각한다. 그래서 잘 안 된다.\n\n그래서 옛날 선사들은 말 대신 액션을 취했다. 멱살을 잡거나, 등짝을 후려치거나, 물에 빠트리거나. **그것이 강력한 이유는 실제로 일어나는 일이기 때문이다.** 아프다는 느낌은 누구나 공통적이다. 그것은 언어가 필요 없다. 깎는 것도 마찬가지다. 칼을 만지고 나무를 깎는 것, 그 자체가 지금 여기에서 실제로 일어나는 일이다. 지금 바로 접하고 있는 것이다. 이것이 현대적 의미에서의 액티브 화두이고, 액티브 명상 코칭이 될 수 있다.\n\n---\n\n#### **관념적 명상을 넘어서**\n\n화두가 나온 것도 그냥 일반 좌선 명상이 잘 안 먹히니까였다. 평온한 것만 찾으니까 선사들이 화두를 내린 것이다. 지금도 마찬가지다. 관념적인 명상에 빠질 수 있다. 그것을 코칭적인 강력한 질문을 통해서 자신의 삶에서 걸리는 것들, 장애, 조건 지어짐으로부터 풀려나게 하는 것이다. 그 질문에 대한 해답은 지금 여기에 있다. 지금 여기로 올 수 있는 가장 강력한 방편으로서 깎는 명상이 힘을 발휘할 수 있다.\n\n**명상과 코칭과 우드카빙, 이 세 가지를 입체적으로 결합한 프로그램** — 뜰 앞의 잣나무, 삶의 주장자 — 이것", "source": "essay"}, {"id": "essay_532_d1ace1830a", "text": "는 가장 강력한 방편으로서 깎는 명상이 힘을 발휘할 수 있다.\n\n**명상과 코칭과 우드카빙, 이 세 가지를 입체적으로 결합한 프로그램** — 뜰 앞의 잣나무, 삶의 주장자 — 이것이 그런 취지에서 기획된 것이다. #우드카빙코칭 #현대적화두 #뜰앞의잣나무 #액티브명상 #온나코칭\n\n--- (구분선)\n\n[파일명: 우리말_움_생명과비움_수필.md]\n\n### **우리말_움_생명과비움_수필**\n\n#### **움이 트다**\n\n'움'이라는 시를 썼다. '서두르지 않고 애쓰지 않고.' 움이란 가지에서 새싹이 돋아나는 것이다. 나무를 자르면 자른 데서 싹이 돋아나는 것, 그것을 움이라 한다. 움이 트였다. 새순이 올라올 때 벌어지면서 — **움이 터지는 것을 움텄다고 한다.** 움막. 이게 웅덩이라는 뜻이다. 뭔가를 저장해 주는 것이 움이다. 옛날에 김치를 웅덩이에 파서 묻어놓고 얼지 말라고 덮어놓던 것. 나무에, 꽃에 **생명력이 응축되고 쌓이고 쌓이면 그게 툭 터져서 움이 되는 거다.** 새싹으로 나오는 거다.\n\n#### **움으로 읽는 우리말**\n\n그리움. 그리는 것이 자꾸 쌓이고 쌓이면 그게 움이 되어 그리움으로 탁 터지는 거다. 설움. '설다'는 서러움. 슬픔 같은 것이 쌓이고 쌓이다 보면 움이 되는 거다. 배움. 아는 것이 자꾸 배가 된다. 전보다 더 많이 알아지고, 더 알아지게 되고 — 이게 쌓인 거다. 키움은 움을 키운 거다. 채움은 움", "source": "essay"}, {"id": "essay_533_1f05fad2ad", "text": "것이 쌓이고 쌓이다 보면 움이 되는 거다. 배움. 아는 것이 자꾸 배가 된다. 전보다 더 많이 알아지고, 더 알아지게 되고 — 이게 쌓인 거다. 키움은 움을 키운 거다. 채움은 움을 채우는 거다. 비움은 움을 비우는 거다. 움푹은 움이 패였다는 거다. 더러움은 더러더러 뭔가 쌓인 거다. 괴로움은 고(苦)가 뭉쳐진 것이다. 아름다움은 아름다운 것들이 쌓이고 모인 것이다. 사내다움은 사내의 것들이 쌓이고 쌓여야 된다. 여성다움도, 고움도 마찬가지다.\n\n**우리말에 움이 들어간 말이 그냥 있는 게 아니다.**\n\n#### **움은 영혼을 담는 그릇이다**\n\n움은 영혼을 담는 그릇이다. 웅덩이처럼. 웅덩이의 효용성은 비어 있게 하기 위해서 만드는 거다. **비어 있음 — 그것은 채움을 전제로 한 비움이다.** 있음을 위한 없음이다. 그냥 허공에 아무것도 없는 무(無)가 아니라는 거다. 영은 온 우주에 꽉 차 있다. 그것이 움에 담기면 혼이 된다. '움직인다'고 하잖아. 움을 죽인다는 거다. 움을 옮기면 움이 죽는다. 그래서 움직인다고 하는 거다. **실체가 없는 곳에서 현상적으로 드러나게 해주는 그 자리가 바로 움이다.** 인체로 보면 거기가 자궁이다. 노자 도덕경의 곡신(谷神) — 계곡 곡(谷), 거기서 모든 게 태어난다고 본다. 그게 움이다. 우리나라 말에 이 움이 많이 들어가는 게 괜히 그런 게 아니다. **움 자 하나를 알아도 굉장히", "source": "essay"}, {"id": "essay_534_d20902dff3", "text": "곡신(谷神) — 계곡 곡(谷), 거기서 모든 게 태어난다고 본다. 그게 움이다. 우리나라 말에 이 움이 많이 들어가는 게 괜히 그런 게 아니다. **움 자 하나를 알아도 굉장히 많은 것을 얘기할 수 있다.** #우리말 #움 #순우리말 #비움과채움 #생명 #곡신\n\n--- (구분선)\n\n[파일명: 우울함_비어있음_직면_수필.md]\n\n### **우울함_비어있음_직면_수필**\n\n#### **우울함은 비어 있음을 외면하는 것이다**\n\n우울하고 침잠된 사람들이 있다. 그런데 그 상태는 비어 있음을 **적극적으로 수용한 게 아니다.** 직면한 게 아니다. 비어 있음을 직면하지 않고 **외면하는 거다.** 그렇기 때문에 비어 있음을 활용하지 못하고 있는 거다. 비어 있음을 외면하면, 반면에 **추구하고자 하는 마음이 더 많아진다.** 그런데 그게 충족이 되지 않으니까 — 비어 있음도 외면하고, 추구는 커지는데 채워지지도 않는 악순환이 생기는 거다.\n\n#### **왜곡된 추구심이 우울을 만든다**\n\n아무것도 욕망이 없는 상태가 아니다. 그게 **왜곡된 추구심의 한 면** 인 거다. 추구심이 타인에 의한 강요일 수도 있다. '너는 왜 그거밖에 못 해?' — 부모들이 그런 식으로 나올 수 있다. 또 자기 자신이 '나는 이거밖에 안 되나?' 하면서 스스로를 압박할 수도 있다. 그러니까 비어 있음을 적극적으로 수용하고 직면한 상태가 아닌 것 — 그게 우울이", "source": "essay"}, {"id": "essay_535_b32eac6343", "text": "로 나올 수 있다. 또 자기 자신이 '나는 이거밖에 안 되나?' 하면서 스스로를 압박할 수도 있다. 그러니까 비어 있음을 적극적으로 수용하고 직면한 상태가 아닌 것 — 그게 우울이나 침잠이다.\n\n#### **비어 있음을 직면할 때 활력이 온다**\n\n우울이 아니고 **비어 있음을 직면할 때에** 거기서 새로운 삶의 **활력** 을 찾을 수 있다. 회복할 수 있다.\n\n비어 있음은 채움을 전제로 한 비움이다. 움을 파는 것이 새싹을 위한 자리를 만드는 것이듯 — 직면한 비어 있음이 새로운 시작의 자리다. 외면한 비어 있음은 그 자리가 되지 못한다. #우울 #비어있음 #직면 #추구심 #활력 #올셀프\n\n--- (구분선)\n\n[파일명: 우주적시선_창조성_수필.md]\n\n### **우주적시선_창조성_수필**\n\n#### **여기도 우주다**\n\n지금 이 공간을 보고 있다. 학곡리 작업실 안이다. 식탁이 있고, 컵이 있고, 불빛이 있다. 그런데 이것도 우주다. 우주를 보려고 밖으로 나갈 필요가 없다. 학곡리도, 대한민국도, 지구도 전부 우주 안에 있다. 그러니 지금 내가 보고 있는 이 시선 자체가 이미 우주의 한 부분을 보고 있는 것이다. 내가 우주로 나가서 우주를 봐야만 우주를 보는 것이 아니다. 지금 여기서 컵을 바라보는 이것도 **우주적인 시선** 이다. 내가 표현하는 것이 아니라, 우주가 이 시선을 통해 자신을 드러내는 것이다. 망원경으로 별을 봐", "source": "essay"}, {"id": "essay_536_ac3681157a", "text": "보는 것이 아니다. 지금 여기서 컵을 바라보는 이것도 **우주적인 시선** 이다. 내가 표현하는 것이 아니라, 우주가 이 시선을 통해 자신을 드러내는 것이다. 망원경으로 별을 봐야 우주를 보는 것이 아니다. 내가 지금 식탁의 컵을 바라보고 있어도, 이것도 우주를 바라보는 것이다. 아무리 좁은 소견으로 세상을 본다 해도, 그 소견 안에는 이미 **우주적인 의식과 우주적인 시선** 이 들어가 있다. 내 마음이 옹졸하고 작은 것 같아도, 아무리 미세한 것을 보고 있다 해도, 그것은 우주에서 벌어진 일이다. 우주를 떠나서 어떤 시선이 있을 수 없다.\n\n---\n\n#### **차별 없는 반짝임**\n\n저 하늘의 큰 별이 반짝이는 것이나, 컵에 반사되는 작은 불빛을 보는 것이나, 크기만 다를 뿐이다. 그것은 **동일한 사건** 이다. 동일한 반짝임, 동일한 비춰짐, 우주의 드러남이며 표현인 것이다. 큰 별만이 대단한 우주가 아니다. 아주 작은 개미를 하나 보든, 방 안에서만 보고 있든, 시선의 크기 차이일 뿐이다. 그런 것들이 복합적으로 우주다. [⚠️세계관 확인] 원본에서 이 우주를 '불성(佛性)' 또는 '하느님'으로 표현함. 세계관 참조 문서의 언어 사용 원칙(종교 용어 대신 존재 경험 언어 사용)과 부분적으로 다름. 박의섭이 이 표현을 그대로 쓸지, 온나식 언어로 바꿀지 확인 필요. 원본의 논리를 살리면: 하느님이 이 세상을 만들었다면 이", "source": "essay"}, {"id": "essay_537_842bc997d1", "text": "용어 대신 존재 경험 언어 사용)과 부분적으로 다름. 박의섭이 이 표현을 그대로 쓸지, 온나식 언어로 바꿀지 확인 필요. 원본의 논리를 살리면: 하느님이 이 세상을 만들었다면 이 세상도 하느님 안에 있을 것이고, 그 안에서 일어나는 모든 일은 다 그 전체성의 표현이다. 내 안에서 찌질함이 올라오거나 불안함이 올라오는 것도, 그 전체 안에서 일어난 것이다. 그것도 **전체성의 표현** 이다. 내가 왜 이렇게 좁아터진 마음이 일어났지, 왜 이렇게 불안하지 하는 것도, 우주 안에서 일어난 일이다.\n\n전체성이 온 우주에 꽉 차 있다면, 그것과 분리된 나만의 사건이라는 것은 있을 수 없다. 물고기가 바다를 떠나 물고기만의 경험이 있을 수 없듯이. 물고기가 경험하는 모든 것은 다 바다를 경험하는 것이다. 피라미가 경험하든 고래가 경험하든, 멸치 새끼가 경험하든, 그것은 다 그 바다의 전체적인 경험이 일어나고 있는 것이다. 그렇게 따지면 **소중하지 않은 경험이 없다**.\n\n---\n\n#### **창조성은 참여다**\n\n인간의 시각으로 보면 좋고 나쁨이 있고, 잘 만든 것과 못 만든 것이 있다. 그러나 **우주적인 차원에서 보면 차별이 없다**. 큰 별이 반짝거리는 것이나 반딧불이 반짝거리는 것이나, 우리가 보는 것은 전부 빛이다. 심지어 어둠도 빛이다. 어둠이 어둠이기에 보인다. 빛의 부재를 악으로, 밝은 것을 선으로 보는 것은 인간의 시각이다.", "source": "essay"}, {"id": "essay_538_f0de4abd16", "text": "반딧불이 반짝거리는 것이나, 우리가 보는 것은 전부 빛이다. 심지어 어둠도 빛이다. 어둠이 어둠이기에 보인다. 빛의 부재를 악으로, 밝은 것을 선으로 보는 것은 인간의 시각이다. 우주적인 차원에서 보면 그것은 **조화(Harmony)**다. 높낮이가 있어야 음악이 나오듯, 좋음과 나쁨이 있어야 인생이 창조되듯, 그 차별성은 **창조력의 원천** 이다.\n\n그러니까 나를 표현해 본다는 것은 단순히 나를 표현하는 것이 아니다. **우주적인 표현** 이다. 그것을 표현해 보는 것이 중요한 이유가 여기에 있다. 그것이 나의 좁은 시각이 아니라 우주의 시각이기 때문이다. 드러나지 않으면 모른다. 내 생각도 내가 생각해 보지 않으면 내 안에 무슨 생각이 있는지 나도 모르는 것과 같다. 이렇게 표현했다, 저렇게 표현했다 해서 기죽을 필요가 없다. 모든 것이 다 우주적인 사건이기 때문이다. 어떤 이벤트는 대형으로 크게 일어날 수도 있고, 어떤 것은 작게 일어날 수도 있을 뿐이다. 이것이 좋은 이벤트이고 나쁜 이벤트고 하는 것은 없다. 표현해 본다는 것은 내가 **우주적인 이벤트에 참여** 하는 것이다. 우주의 축제에 나도 하나의 참여를 하고 기여를 하는 것이다. 시를 쓰는 것도, 미술을 그리는 것도, 사진을 찍는 것도 다 그런 것이다. 예술을 소중하다고 여기는 이유가 그것이다. 그것이 다 우주적인 표현이기 때문이다.\n\n---\n\n#### **시줄과 날", "source": "essay"}, {"id": "essay_539_e280809c8e", "text": "것도, 미술을 그리는 것도, 사진을 찍는 것도 다 그런 것이다. 예술을 소중하다고 여기는 이유가 그것이다. 그것이 다 우주적인 표현이기 때문이다.\n\n---\n\n#### **시줄과 날줄**\n\n때로는 행복함을 느낄 때도 있고, 때로는 불안함을 느낄 때도 있다. 그것들이 나의 **시줄과 날줄** 이 되어 내 삶을 직조해 나간다. 찰나찰나 계속 변하는 그 창조성에 동참해 보는 것이다. 그 직조된 것을 표현해 보면 그게 시가 될 수 있고, 사진이 되고, 음악이 되고, 미술이 된다. 어떤 것도 소중하지 않은 경험이 없다. 그리고 어떤 표현도 우주 밖에서 일어난 일이 없다. #우주적시선 #창조성 #전체성 #표현 #올셀프\n\n--- (구분선)\n\n[파일명: 움직이면움죽는다_숙성의시간_수필.md]\n\n### **움직이면움죽는다_숙성의시간_수필**\n\n#### **움직이면 움이 죽는다**\n\n'나다움'에는 많은 것들이 담겨야 한다. 나의 경험, 나의 실패, 나의 배움, 나의 시간. 그것들이 켜켜이 쌓여야 한다. '코치다움'이면 코치로서의 모든 것이 거기에 담겨야 한다. 그런데 미처 숙성되기 전에 움을 옮겨버리면 어떻게 되는가. 코치다움이었다가 다른 다움으로 딱 옮겨버리면, 그동안 쌓인 코치다움이 발현되지 못하고 사라진다. **움직이면 움이 죽는다.**\n\n---\n\n#### **한 우물을 파라는 말의 뜻**\n\n\"한 우물을 파라\"는 말이 있다. 그것이 꼭 한 가지만", "source": "essay"}], [{"id": "essay_540_371841cad0", "text": "코치다움이 발현되지 못하고 사라진다. **움직이면 움이 죽는다.**\n\n---\n\n#### **한 우물을 파라는 말의 뜻**\n\n\"한 우물을 파라\"는 말이 있다. 그것이 꼭 한 가지만 고집하라는 뜻이 아니다. **발현될 때까지 숙성의 기간을 줘야 한다는 것이다.** 움이 터지기 전까지는 수련 과정이 필요하다. 정말 나로 살기 위해서는 많은 '나'가 그 움 안에 쌓여 있어야 한다. 그것이 숙성되고 발현될 때까지는 움직이면 안 된다. 움이 죽으니까.\n\n---\n\n#### **모든 게 나구나, 하는 순간**\n\n그런데 이 숙성의 과정은 무언가를 버리고 고르는 것이 아니다. 오는 것에서 오는 것을 버리고 남기는 것이 아니다. **'모든 게 이게 나구나'** 하는 것을 딱 알았을 때, 비로소 나의 움이 탁 트인다. 전체로서의 나. 올셀프로서 사는 나. 그것은 골라낸 나가 아니라 전부를 품은 나다. 숙성의 끝은 선택이 아니라 수용이다. #움 #나다움 #숙성 #한우물 #올셀프\n\n--- (구분선)\n\n[파일명: 원천기술_점드립마케팅_수필.md]\n\n### **원천기술_점드립마케팅_수필**\n\n#### **미술이 툴이 될 때**\n\n미술은 원천 기술이 될 수 있다. 색감, 구도, 이런 것들이 그것이다. 그런데 화가들에게 그것은 이미 툴(tool)이다. 툴을 가지고 무언가를 표현하려면 또 다른 원천이 필요하다. 시를 배우거나, 문학 작품을 읽거나, 음악을 듣거나. 그", "source": "essay"}, {"id": "essay_541_6cd357de86", "text": "이 그것이다. 그런데 화가들에게 그것은 이미 툴(tool)이다. 툴을 가지고 무언가를 표현하려면 또 다른 원천이 필요하다. 시를 배우거나, 문학 작품을 읽거나, 음악을 듣거나. 그렇게 해서 미술이 툴로 쓰일 때 비로소 표현이 가능해진다. 디자이너에게는 반대다. 디자인을 하는 데 있어서 미술이 원천 기술이 된다. 거기서 색감을 얻고, 최고의 작품을 모사하다 보면 위대한 작가들의 시선과 틀, 사물을 보는 관점이 내 안에 장착된다.\n\n---\n\n#### **조합이 창조를 만든다**\n\n한 사람의 것만 장착하면 모사가 된다. 카피가 된다. 그러나 **여러 사람의 것을 장착하면 전혀 새로운 것이 된다.** 세상에 위대한 작가들이 엄청나게 많다. 모네와 고흐를 조합하면 하나의 것이 나오고, 피카소와 다른 누군가를 조합하면 또 다른 것이 나온다. 조합은 무한에 가깝게 만들어낼 수 있다.\n\n---\n\n#### **점드립 마케팅**\n\n많은 사람에게 마케팅을 하지 않아도 되는 이유가 있다. 소수와의 상호작용이 일어나면, 그 소수들이 자기와 관련된 사람들에게 또 상호작용을 일으킨다. **점드립** 처럼이다. 물방울을 뚝뚝 떨어뜨려서 천천히 흘려 엑기스, 진한 것을 뽑아낸다. 거기서 나온 것은 나중에 확산이 훨씬 쉽다. 물을 왕창 부어서 맑은 물도 나오게 하면 밍밍한 맛이 나온다. **밍밍한 마케팅이 되는 것이다.** 소수만을, 그 사람들만 적시는 것이 점드립", "source": "essay"}, {"id": "essay_542_8b0e903b04", "text": "나온 것은 나중에 확산이 훨씬 쉽다. 물을 왕창 부어서 맑은 물도 나오게 하면 밍밍한 맛이 나온다. **밍밍한 마케팅이 되는 것이다.** 소수만을, 그 사람들만 적시는 것이 점드립이다. 대량 매스미디어 시대가 아닌 지금이기 때문에 가능한 방식이다. #원천기술 #조합과창조 #점드립마케팅 #소수확산 #미술\n\n--- (구분선)\n\n[파일명: 육신과앎_카메라촛불비유_수필.md]\n\n### **육신과앎_카메라촛불비유_수필**\n\n#### **카메라가 아는 게 아니다**\n\n사람을 카메라에 비유해보자. 카메라는 세상을 비추지만 카메라가 아는 건 아니다. 카메라가 우리 육신이라고 본다면, 그 육체를 통해서 보는 뭔가가 있는 거다. TV를 켜면 영상이 나온다. 그런데 그 영상이 TV 안에 있는 게 아니다. 단지 주파수를 잡아서 영상이 전개되는 거다. 그러면 **카메라를 들이대고 세상을 보는 그것이 과연 무엇인가.** 그거를 알려고 하는 건 — TV 수상기에서 '이 영상이 어디서 나오는 거지?' 하는 거랑 같다. 촛불이 환하게 비추는데 **그 비추는 그것이 뭐냐** 하고 의심하는 거나 마찬가지다. 그것은 **생각으로 알 수 없다.** 그러나 지금 여기서 환하게 보고 알고 있잖아. 보고 듣고. **그냥 아는 것뿐인 거다.** 그것이 어떤 존재로서 '이것이다' 하고 얘기할 수가 없다는 거다.\n\n#### **초가 의문을 갖는 게 아니다**\n\n여기서 중요한 지적이", "source": "essay"}, {"id": "essay_543_e1bcdeb67c", "text": "보고 듣고. **그냥 아는 것뿐인 거다.** 그것이 어떤 존재로서 '이것이다' 하고 얘기할 수가 없다는 거다.\n\n#### **초가 의문을 갖는 게 아니다**\n\n여기서 중요한 지적이 있다. 촛불이 환하게 비추고 있는데, 의문을 갖는 것은 초인가, 촛불인가. **초가 의문을 갖는 건 아니다.** 촛불이 밝혀져서 환하게 빛나는 그 자체가 의문을 갖는 거다.\n\n그런데 우리는 초가 의문을 풀어야 된다고 생각한다. 육신을 갖고 있는 내가 답을 얻어야 된다고 생각한다. 초에서 불이 일어났으니까 — **초가 자기라고 생각하는 거다.** 육체의 '나'가 해답을 얻어야 한다고 생각하는 것처럼. 그게 **동일시** 다. 육신이 나라는 동일시. 거기서 모든 착각이 시작된다. 카메라가 영상을 만들어낸다고 생각하는 착각. 촛불이 초에서 나왔으니까 초가 빛의 주인이라는 착각. 그냥 아는 것 — 그것은 초도 아니고 촛불도 아니다. 그냥 비추고 있는 것 자체다. #육신 #앎 #동일시 #카메라비유 #촛불비유 #올셀프\n\n--- (구분선)\n\n[파일명: 의미와수행_꿀꿀함_상과살아있음_수필.md]\n\n### **2026_04_21_아내와의_대화__음성녹음__수필_3편**\n\n#### **꿀꿀함이라는 이름표를 떼면**\n\n꿀꿀함이라고 이름 붙였기 때문에 문제가 된다. 이름표를 떼버리면 이걸 뭐라 할 수 있겠는가. 아무 말도 할 수 없다. 이것은 아무것도 아니기 때문이다. 습관적으", "source": "essay"}, {"id": "essay_544_2925e47f07", "text": "이름표를 떼면**\n\n꿀꿀함이라고 이름 붙였기 때문에 문제가 된다. 이름표를 떼버리면 이걸 뭐라 할 수 있겠는가. 아무 말도 할 수 없다. 이것은 아무것도 아니기 때문이다. 습관적으로 꿀꿀함이라고 정의해왔는데, 그 이름을 빼면 지금 올라오는 이것을 뭐라 표현해야 할지 모른다. **뭐라 할 수 없는 것** 이다. 나라는 것도 마찬가지다. 이름, 나이, 살아온 이력, 앞으로 할 일—이 모든 것을 떼어버리면 나를 뭐라 할 수 있겠는가. 모를 뿐이다. 가방, 컵, 두려움, 불안—이 모든 것이 **의미의 놀음** 이다. 본질은 그것이 아닌데, 우리는 어릴 때부터 학습된 의미들을 무작정 받아들여 그것이 당연한 것이 되어버렸다. 내가 원해서 된 것이 아니다. 부모에게, 친구들에게, 책에서 학습된 것이다. 그런데 그걸 내가 크게 의미를 부여하니까, 그것이 나한테 큰 문제가 되는 것이다.\n\n---\n\n#### **이름 없이도 다 알고 있다**\n\n달달한 맛이라는 글자를 몰라도 맛은 안다. 빨간색이라는 이름을 몰라도 그 색은 보인다. 의미를 싹 빼도 있는 그대로 옴팍 다 알고 있다. 이것이 **그냥 아는 마음** 이다. 금강경에서 상이 상이 아닌 줄 알면 여래를 본다고 했다. 뭐라 할 수는 없지만, 분명히 지금 여기 있다. 소리를 듣고 있고, 보고 있고, 발에 닿는 감각을 느끼고 있다. 내가 듣는다고 할 수도 없다. 그냥 들린다. 내가 본다고 할 수도 없다", "source": "essay"}, {"id": "essay_545_75c8dc3c7d", "text": "할 수는 없지만, 분명히 지금 여기 있다. 소리를 듣고 있고, 보고 있고, 발에 닿는 감각을 느끼고 있다. 내가 듣는다고 할 수도 없다. 그냥 들린다. 내가 본다고 할 수도 없다. 그냥 보인다. 내 의지대로 안 느껴지게 할 수 없다. 그냥 느껴진다. 여기에는 잘 살고 못 살고도 없고, 좋고 나쁨도 없고, 춙궄 모든이거낐 자리을 있다고 마까지 않게 할 수 없다. 그것들이 전부 의미들이기 때문이다. 반야심경이 눈도 코도 귀도 아니라 하고, 무명조차 없다고 한 것은 그 이유다. 무명을 없애야 한다는 것도 또 다른 의미가 되기 때문이다. 없애야 한다는 것까지도 없애야 한다고 한 것이다. 의미가 없다는 것이 아니라, **의미가 의미일 뿐임을 아는 것** 이다.\n\n---\n\n#### **올라오는 것이 살아있음의 증거다**\n\n보이는 것, 들리는 것, 일체가 다 상(相)이다. 그런데 그 상에 속는다는 것은 거기에 특별한 의미를 부여하고 있다는 것이다. 전에는 꿀꿀하지 않았는데 지금 꿀꿀하다는 생각이 올라왔다. 그것도 상이다. 왔다가 가는 것이다. 잠잘 때는 그게 없다. 아무것도 올라오지 않는다. 지금 이렇게 깨어 있으니까 올라오는 것이다. **꿀꿀함이 올라온다는 것은 지금 살아있다는 것이다.** 바위는 꿀꿀함을 느끼지 못한다. 그것이 내 안에서 올라온다는 것은 내가 살아있다는 증거다. 그러니 그것을 없애려 할 것이 아니라 온전히 받아들일 수 있다.", "source": "essay"}, {"id": "essay_546_df44012e6c", "text": "살아있다는 것이다.** 바위는 꿀꿀함을 느끼지 못한다. 그것이 내 안에서 올라온다는 것은 내가 살아있다는 증거다. 그러니 그것을 없애려 할 것이 아니라 온전히 받아들일 수 있다. 흔들리고 요동치는 것들이 사실은 **창조성의 원천** 이다. 시인이라면 그런 기분이 올라올 때 그것을 시로 바꾼다. 그 에너지가 창조성이다. 아무 변화도 없으면 사람은 무료해서 미친다. 오히려 꿀꿀한 기분이라도 올라오는 것이 나아다. 수행으로 의미가 탈락된 자리와, 그냥 아무 결핍 없이 건조해진 자리는 다르다. 전자는 살아있음이 충만한 것이고, 후자는 그냥 비어있는 것이다.\n\n지금 여기는 늘 온전하다. 그냥 알고, 그냥 듣고, 그냥 보고 있다. 현재를 자꾸 과거의 데이터를 끌어와 끼워 맞추니까, 이미 온전한데 온전하지 않다고 생각하게 되는 것이다. 이름표를 떼고 나면 남는 것은 모를 뿐이다. 그러나 그 모름 속에서 분명히, **이렇게 있다.** #상과살아있음 #그냥아는마음 #창조성의원천 #이미그러함 #올셀프\n\n--- (구분선)\n\n[파일명: 의미와수행_꿀꿀함_코칭적용_수필.md]\n\n### **2026_04_21_아내와의_대화__음성녹음__수필_2편**\n\n#### **코칭이라는 이름의 의미 부여**\n\n코칭을 배운 사람들 대부분이 같은 패턴에 빠진다. 고객이 큰 의미를 얻어가야 코칭을 잘한 것이라고 생각한다. 그래서 더 신박한 의미, 더 좋은 프레임, 더 강력한", "source": "essay"}, {"id": "essay_547_fbffea2ad0", "text": "의미 부여**\n\n코칭을 배운 사람들 대부분이 같은 패턴에 빠진다. 고객이 큰 의미를 얻어가야 코칭을 잘한 것이라고 생각한다. 그래서 더 신박한 의미, 더 좋은 프레임, 더 강력한 질문을 찾는다. 의미를 쫓아 여기까지 달려온 사람들이다. 박사 학위, 자격증, 책 한 권—그것들이 전부 의미다. 그 의미들을 쌓아올려 이 자리까지 왔는데, 거기다 대고 의미를 버려야 한다고 하면 이 사람들은 자기 전부를 부정당하는 느낌을 받는다. 그런데 **사실 그게 잘하는 게 아니다.** 진짜 코칭은 고객이 더 좋은 의미를 얻어가게 하는 것이 아니라, 고객 스스로 자신이 의미를 부여하고 있었다는 것을 알아차리게 하는 것이다. 그 **패턴을 깨는 것** 이 제대로 된 것이다.\n\n---\n\n#### **기법을 내려놓은 자리**\n\n칼 로저스는 자기 기법을 싹 버려버린 상담가였다. 고객이 *기분이 꿀꿀해요* 하면 *아, 기분이 꿀꿀하다는 거죠* 하고 그냥 함께 있어줬다. 어떤 스킬도 쓰지 않았다. 그런데 고객은 만족스럽게 자기 문제를 해결하고 돌아갔다.\n\n이것이 강을 건너고 나서 배를 내려놓은 것이다. 기법이 의식되지 않을 만큼 몸에 배어 저절로 써질 때, 그때 비로소 기법이 없는 것처럼 보이는 자리가 된다. 처음부터 아무것도 없는 12시가 아니라, 끝까지 가보고 돌아온 12시다. 그 둘은 겉으로는 같아 보이지만 전혀 다른 자리다.\n\n---\n\n#### **의미를", "source": "essay"}, {"id": "essay_548_138643caf0", "text": "보이는 자리가 된다. 처음부터 아무것도 없는 12시가 아니라, 끝까지 가보고 돌아온 12시다. 그 둘은 겉으로는 같아 보이지만 전혀 다른 자리다.\n\n---\n\n#### **의미를 쫓는 사람을 돕는 법**\n\n어렵다. 의미를 쫓아온 사람에게 *그 의미 다 내려놔* 라고 하면 되지 않는다. 이 사람들은 새로운 의미를 제시해줄 때 움직인다. 그게 그들이 알아온 방식이다. 그래서 직접 말하기 어렵다. 1대1에서 가능하다. 함께 앉아 그 패턴 안에서 같이 들여다볼 수 있다. 그러나 대중 앞에서, 혹은 아직 그 자리까지 오지 않은 사람에게 *심신탈락* 을 이야기하면 오히려 새로운 의미로 받아들인다. 심신탈락을 해야 한다는 또 다른 의미가 되어버린다. 결국 **내가 부여한 의미임을 스스로 알게 하는 것** 이 핵심이다. 그것이 꽂히는 것이다. 새로운 의미를 주는 것이 아니라, 지금까지 자기가 의미를 쫓아왔다는 것을 보게 하는 것. 그 순간 스스로 가벼워진다. 의미를 많이 부여한 만큼 무거웠던 것이고, 그것을 알아차리는 만큼 가벼워지는 것이다.\n\n사람마다 타고난 그릇과 역할이 있다. 대중에게 법을 펼치는 사람이 있고, 1대1로 깊이 들어가는 사람이 있다. 어느 쪽이 크고 작은 것이 아니다. 자기 역할 안에서 온전히 하는 것이 전부다. #코칭과수행 #의미의패턴 #기법을내려놓음 #심신탈락 #온나코칭\n\n--- (구분선)\n\n[파일명: 의미와수행_꿀꿀함_패턴", "source": "essay"}, {"id": "essay_549_ad81ae5b81", "text": "은 것이 아니다. 자기 역할 안에서 온전히 하는 것이 전부다. #코칭과수행 #의미의패턴 #기법을내려놓음 #심신탈락 #온나코칭\n\n--- (구분선)\n\n[파일명: 의미와수행_꿀꿀함_패턴구조_수필.md]\n\n### **2026_04_21_아내와의_대화__음성녹음__수필_1편**\n\n#### **의미로 의미를 없앨 수 없다**\n\n우리는 가끔 그런 날이 있다. 특별한 이유도 없이 기분이 쫙 가라앉고, 꾸리꾸리한 생각들이 마음 위로 불쑥 올라오는 날. 아내가 그런 날을 꺼냈다. 그럴 때 어떻게 하느냐고. 대부분은 그것을 정리하려 한다. *이것도 파도 중 하나다. 생각일 뿐이다. 어차피 한 번 사는 인생인데.* 말을 바꿔가며 그 감정을 밀어내려 한다. 그런데 가만히 보면, 이것은 **생각으로 생각을 없애려는 것** 이다. 파도가 치면 그것을 가라앉히려 또 파도를 친다. 파도는 더 크게 일어날 뿐이다. 연필로 어지럽게 쓴 글씨를 지우겠다며 그 위에 또 쓰고 또 쓰는 것과 같다. 있는 그대로 보아야 한다는 것을 알면서도, 그 앎조차 다시 애씀이 된다. 있는 그대로 봐야 한다는 것 자체를 생각으로 하고 있다는 거다.\n\n---\n\n#### **말을 따라갔다는 것**\n\n감정이 올라오면 곧 생각이 따라온다. 그리고 그 생각이 마음에 들지 않는다. *이런 생각은 올라오지 않았으면 좋겠다.* 그 순간 이미 **말을 따라가 버린 것** 이다. 사랑해, 라는 말이 그냥", "source": "essay"}, {"id": "essay_550_dda590ec48", "text": "곧 생각이 따라온다. 그리고 그 생각이 마음에 들지 않는다. *이런 생각은 올라오지 않았으면 좋겠다.* 그 순간 이미 **말을 따라가 버린 것** 이다. 사랑해, 라는 말이 그냥 소리로 인식됐다면 아무 영향력도 없다. 거기에 좋다 싫다를 붙이는 순간 그 말 속으로 빠져든다. 생각이 내 의지대로 올라온 것이 아니라는 증거가 있다. 만약 내 것이라면 내가 싫은 것은 처음부터 올라오지 않게 해놨을 것이다. 그런데 올라왔다. 올라온 것 자체는 내 의지 밖이다. 그런데 그것을 싫어한다는 것은, 이미 그 생각의 내용 속으로 빠져들었다는 것이다. **말을 따라간 것** 이다.\n\n---\n\n#### **의미를 의미로 없애는 패턴**\n\n더 깊은 함정이 있다. 그 불편한 생각을 없애기 위해 또 다른 의미를 가져온다. *이거는 그냥 생각일 뿐이야. 어차피 다 죽는데 대수야.* 이것도 역시 의미다. 의미를 의미로 덮는 것이다. 결국 의미가 내가 부여한 새로운 의미로 바뀐 것뿐이고, 나는 여전히 **의미를 계속 유통** 하고 있다.\n\n이것이 **자동화된 패턴** 이다. 챗바퀴처럼 돌고, 강아지가 자기 꼬리를 무는 것처럼 계속 돈다. 커피를 마시거나, 분위기를 바꾸거나 해도 마찬가지다. 조건을 다른 조건으로 바꿨을 뿐이다. 패턴 자체가 깨지지 않는 한 도로 돌아온다. 그리고 의미에 의미를 거듭 부여할수록, 다음번에 올라오는 것에도 또 의미를 부여할 수밖에 없게", "source": "essay"}, {"id": "essay_551_92176baedd", "text": ". 조건을 다른 조건으로 바꿨을 뿐이다. 패턴 자체가 깨지지 않는 한 도로 돌아온다. 그리고 의미에 의미를 거듭 부여할수록, 다음번에 올라오는 것에도 또 의미를 부여할 수밖에 없게 된다. 패턴은 오히려 강화된다. 누가 강화한 것이 아니라 내 스스로 강화시킨 것이다.\n\n---\n\n#### **목을 지키거나, 온전히 받아들이거나**\n\n그렇다면 어떻게 할 것인가. 두 가지 방향이 있다. 하나는 **목을 지키는 것** 이다. 선사들이 길목을 지키라 했던 말이 이것이다. 내가 이것을 어떻게 해보려는 의도가 올라오는 그 순간을 예리하게 알아채는 것. *아, 내가 지금 무언가를 해보려는 의도를 쓰려 하는구나.* 그것을 딱 알고 멈추는 것이다. 반응을 멈추는 것이 아니라, 그 의도를 알아채는 것이다.\n\n또 하나는 **온전히 받아들이는 마음** 이다. 올라오는 것들을 다 올라오게 두고, 옴팍 다 받아주는 것. 그러면 지금 올라오는 것만 느껴지고, 거기서 의미로 빠져들지 않게 된다. 일상에서 살림하고 일하며 살아가는 사람에게는 이쪽이 더 현실적이다. 목을 지키는 것은 예리한 집중이 필요하지만, 온전히 받아들이는 마음은 그냥 옴팍 받아주는 것이기 때문이다. 처음에는 몇 번 의도를 써도 된다. 계급장을 떼고 *이게 뭔가* 하고 살펴보는 것. 그러나 그것도 익숙해지면 놓아야 한다. 약이 음식이 되면 독이 된다. 그 자세 자체에 또 의지하게 되면, 그것도 하나", "source": "essay"}, {"id": "essay_552_7242455681", "text": "써도 된다. 계급장을 떼고 *이게 뭔가* 하고 살펴보는 것. 그러나 그것도 익숙해지면 놓아야 한다. 약이 음식이 되면 독이 된다. 그 자세 자체에 또 의지하게 되면, 그것도 하나의 패턴이 되어 강화된다. 처음 몇 번만 쓰는 것으로 충분하다. 의미에서 벗어나는 것은 새로운 의미를 찾는 것이 아니다. **의미를 쫓는 패턴 자체를 알아채는 것** 이다. #의미와수행 #자동화된패턴 #온전히받아들이는마음 #그냥아는마음 #목을지키다\n\n--- (구분선)\n\n[파일명: 의식과인식_알아차림의구조_수필.md]\n\n### **의식과 인식, 알아차림의 구조**\n\n#### **의식은 배경이고 인식은 부분이다**\n\n의식과 인식은 다르다. 의식은 배경이다. 항시 있다. 우리가 의식을 벗어날 수 없다. 벗어났다고 하는 순간 그것조차 알려지지 않으니 아무 의미가 없다. 의식은 내가 무언가를 드러내든 드러내지 않든 관계없이 늘 작동하고 있다. 인식은 그 의식 중에서 특정 부분을 잡아쓰는 것이다. *이것이 무엇이다* 하고 분별해서 아는 것. 그러니까 **인식은 제한적이다.** 의식에서 부분적으로 가져오는 것이기 때문에 이것과 저것이 분리된다. 구분이 돼야 이것이 무엇이다 할 수 있으니까. 의식은 전체이고 인식은 그 안에서 강조된 부분이다.\n\n---\n\n#### **알아차림을 의도적으로 한다는 것**\n\n명상을 하거나 수행을 하는 사람들이 알아차림을 강조한다. 그런데 가만히", "source": "essay"}, {"id": "essay_553_9c6da0064c", "text": "은 전체이고 인식은 그 안에서 강조된 부분이다.\n\n---\n\n#### **알아차림을 의도적으로 한다는 것**\n\n명상을 하거나 수행을 하는 사람들이 알아차림을 강조한다. 그런데 가만히 보면 **알아차림은 따로 할 필요가 없다.** 의식이 곧 알아차림이기 때문이다. 의식은 항시 있고, 그 의식 안에서 모든 것이 이미 알려지고 있다. 통으로 알려지든 부분적으로 알려지든, 그것 자체가 이미 의식이 작동하고 있다는 증거다.\n\n그런데 내가 의도적으로 알아차림을 하려 한다는 것은, 의식에서 인식으로 다시 의식을 알아차리려는 것이다. 이미 있는 것을 다시 잡으려는 것. 그러니 **nonsense** 가 된다. 알아차림을 의도적으로 일으키는 순간, 거기에 의도가 들어가고 그 의도가 또 하나의 인식이 된다.\n\n---\n\n#### **의도를 내려놓으면 그냥 이것이다**\n\n코치들이 흔히 말한다. 정념에 휩쓸리지 않게 알아차려서 제어한다고. 그런데 이것은 인식을 활용해서 의식을 어떻게 해보려는 것이다. 부분으로 전체를 다루려는 것. 그게 되지 않는다. 의도를 내려놓으면 그냥 지금 이것이다. 있는 그대로. 알아차림을 하려고 하니까 거기에 의도가 들어가는 것이지, 의도를 내려놓으면 이미 의식은 작동하고 있고 모든 것은 그냥 알려지고 있다. **의식은 늘 있다. 알아차림을 의도적으로 하려는 순간, 이미 그것은 의식이 아니라 인식이다.**\n\n#의식과인식 #알아차림 #", "source": "essay"}, {"id": "essay_554_159a7aa7d5", "text": "의식은 작동하고 있고 모든 것은 그냥 알려지고 있다. **의식은 늘 있다. 알아차림을 의도적으로 하려는 순간, 이미 그것은 의식이 아니라 인식이다.**\n\n#의식과인식 #알아차림 #의도내려놓음 #그냥아는마음 #명상의구조\n\n--- (구분선)\n\n[파일명: 의식과인식_차별없는베이스_수필.md]\n\n### **의식과 인식, 차별 없는 베이스**\n\n#### **의식은 그냥 비추는 것이다**\n\n의식은 구분을 짓지 않는다. 그냥 비추는 것이다. 눈을 뜨면 대상들이 드러난다. 빨간 것, 노란 것, 초록 것 — 각각의 차이가 있지만 그냥 전체가 다 빛이다. 들리는 것도 ABCD, 가나다라 다 다르지만 그냥 소리다. **의식의 세계는 차별이 없다.** 그래서 신의 세계가 차별이 없다는 것이 의식이기 때문이다. 시아파, 수니파 — 신의 입장에서는 그게 다 소리이기 때문에 그냥 하나의 소리일 뿐이다. 그런데 인식의 세계는 다 분별이 된다. 이건 빨간색이다, 좋다 나쁘다. 자연스럽게 선호가 따라온다. 빨간색은 좋아, 파란색은 싫어. 이것이 있다 하면 이다가 되고, 이다가 되면 해야 된다가 따라온다. 너는 이래야 돼, 저래야 돼 — 나의 선호가 들어가는 것이다.\n\n---\n\n#### **여자로 태어난 것이 아니다**\n\n김혜영 코치가 자기가 여자로 태어났다고 했다. 그래서 내가 물었다. 여자로 태어났냐? 그냥 태어났는데 주위에서 여자라고 하고 남자라고 하니까 그걸", "source": "essay"}, {"id": "essay_555_18b76f1cb5", "text": "여자로 태어난 것이 아니다**\n\n김혜영 코치가 자기가 여자로 태어났다고 했다. 그래서 내가 물었다. 여자로 태어났냐? 그냥 태어났는데 주위에서 여자라고 하고 남자라고 하니까 그걸 가지고 사는 것 아니냐고. 지금 이렇게 보고 듣고 아는 이것에 여자가 어딨고 남자가 어딨냐. 지금 자기 여자로서 듣는 것이 아니다. 나도 남자로서 듣는 것이 아니다. 그냥 소리를 듣는 것이다.\n\n**의식의 바탕에서 인식들이 일어나는 것이다.** 인식도 의식을 기본으로 해서 일어난다. 의식이 비춰주니까 이게 뭔가 하고 구분이 되는 것이다. 뭐다 뭐다 하면서 뭐이기 때문에 뭐이어야 된다가 딱딱 나오게 된다.\n\n---\n\n#### **신을 인식으로 축약할 수 없다**\n\n시아파는 내가 보는 것이 옳다, 수니파는 내가 보는 것이 옳다 — 이러면 신을 나의 앎으로 한정시켜버리는 것이다. 신을 내가 옳다고 여기는 것에 축약해서 이게 신이야 할 수 있겠는가. 신은 그걸 넘어선 것이다. 신이 이렇다 하는 것은 인식인데, 신은 인식을 넘어서는 의식이다. 그러니까 인식을 쓰고 살 수밖에 없지만, **인식에 매이지 않고 그것의 바탕이 의식이라는 것을 알아야 한다.** 의식하지 않아도 그것은 저절로 항시 우리 삶의 밑바탕에 있다. 그 의식이 있으니까 이렇게 다 알아듣고 보여주고 들려주는 것이다.\n\n---\n\n#### **안심해도 된다**\n\n지금 이것이 휴대폰이야 하고 구분을 짓지만,", "source": "essay"}, {"id": "essay_556_58981fb8ae", "text": "리 삶의 밑바탕에 있다. 그 의식이 있으니까 이렇게 다 알아듣고 보여주고 들려주는 것이다.\n\n---\n\n#### **안심해도 된다**\n\n지금 이것이 휴대폰이야 하고 구분을 짓지만, 구분을 지을 때도 배경으로 이 모든 것이 동시에 드러나고 있다. 항시 이것만 드러나는 게 아니다. 그게 의식이다. 인식을 하든 못하든, 의식하든 못하든 항시 그게 베이스로 깔려 있다. 그러니까 **안심해도 된다.** 거기엔 차별성이 없으니까. 인식의 층위에서는 불만족도 있고 불안함도 있고 여러 가지 다 느껴지지만, 그것의 기본 베이스가 의식이다. 이렇게 보고 듣고 아는 이것은 물들지도 않고 스크래치도 나지 않는다. 그런데 모든 것을 두루 원만하게 다 비춘다. 거기엔 차별성이 없다. 안심하고 살아도 된다. #의식과인식 #차별없는베이스 #신과종교 #안심 #올셀프\n\n--- (구분선)\n\n[파일명: 의식전체성_우주하나_수필.md]\n\n### **의식전체성_우주가앎이다_수필**\n\n#### **그놈이 그놈이다**\n\n예전에 대행 스님께 여쭤본 적이 있다. \"생각을 일으키는 나와 그것을 아는 나가 있는데, 어느 게 진짜 나입니까?\" 스님이 대답하셨다. **\"그놈이 그놈이다.\"** 돌이켜보면 그렇다. 생각을 일으키는 것도 나고, 생각을 아는 것도 나고, 대상을 보는 것도 나고, 대상을 보고 아는 것도 나고, 대상까지도 나다. **그냥 통으로 나다.** 그러니까 그것도 그놈이고", "source": "essay"}, {"id": "essay_557_52b891ecf4", "text": "생각을 일으키는 것도 나고, 생각을 아는 것도 나고, 대상을 보는 것도 나고, 대상을 보고 아는 것도 나고, 대상까지도 나다. **그냥 통으로 나다.** 그러니까 그것도 그놈이고 그놈도 그놈이다. **올 그놈이다.** 그게 아주 투철하게 받아들여져야 한다. 하느님이 나를 통해서 보고 있다는 거다. 꽃이 진달래로도 피어나고 개나리로도 피어나고 복사꽃으로도 피어나듯이, 신성이면 신성, 우주면 우주가 나를 통해서 너를 통해서 다 이렇게 환히 비추고 있는 거다. 내가 우주를 보고 네가 우주를 보는 게 아니라는 거다. **통으로 그냥 통으로 나인 거다.** 카메라가 수십억 개가 있으면 수십억 개를 나눠서 보지만 **눈은 하나** 라는 거다. 불교에서 **세계일화(世界一花)** — **세계는 하나의 꽃** 이다. 꽃이 천차만별로 드러나는 거지. 하늘에 달이 하나지만 달빛이 천강에 비추듯이, 이 아는 마음은 하나인데 그것이 너의 눈, 나의 눈, 우리 모두의 눈으로 세상을 비춰보는 것뿐이다.\n\n#### **있다 하면 앎이 전제돼 있다**\n\n촛불이 켜지면 주위가 환하게 드러난다. 촛불이 꺼졌다고 그것들이 없는 건 아니다. '보인다' 하는 앎이 없는 거지, 그것이 없는 게 아니다. 깜깜한 밤에 걸어가다 탁자에 부딪힌다. 없는 게 아니다. 피부 감각으로 아는 거다. 내가 귀가 먹었다면 소리가 있어도 안 들린다. 그렇다고 소리가 없는 건 아니다. 빛이라는", "source": "essay"}, {"id": "essay_558_138bf6fc52", "text": "니다. 깜깜한 밤에 걸어가다 탁자에 부딪힌다. 없는 게 아니다. 피부 감각으로 아는 거다. 내가 귀가 먹었다면 소리가 있어도 안 들린다. 그렇다고 소리가 없는 건 아니다. 빛이라는 인연이 만나면 그것이 드러난다. **'있다' 하면 그것은 앎이 전제돼 있는 거다.** 빛으로 있건, 소리로 있건, 물건으로 있건, 냄새로 있건 — 있다 하면 앎이 전제돼 있다. 잠재태로서 앎은 항시 존재한다. **이 우주 통째로가 하나의 앎이다.** 우주 자체가 주관이자 객관이다. 우주가 따로 있고 그것을 아는 주관이 따로 있는 게 아니다. **우주 자체가 의식이다.** 그것이 나하고 별개가 아니다. 나도 거기서 드러나고 있는 거니까.\n\n#### **영이 나를 살리고 있다**\n\n우주가 여기까지 오기까지는 6.25도 겪고, 임진웨란도 겪고, 공룡시대도 있었다. 그 많은 역사적 업(業)과 연기(緣起)가 이루어져서 나라는 존재가 지금 태어났다. 어머니 뱃속에서 보면 물고기도 있었고 양서류도 있었다가 포유류로, 인류가 진화된 과정을 10달 만에 다 재현해버린다.\n\n안에는 아주 유구한 세월부터 겪었던 경험이 지금 내 안에 체화돼 있다. 그래서 이 땅에 지금 여기 나온 거다. **진정한 나의 모습으로 세상을 경험하기 위해서 나온 거다.** **영이 지금 우리를 살리고 있다.** 영이 우주를 만들었기 때문이다. 우주와 영이 둘이 아니다. 연필 하나로 고양이도 그리고 새", "source": "essay"}, {"id": "essay_559_4e70b012ce", "text": "모습으로 세상을 경험하기 위해서 나온 거다.** **영이 지금 우리를 살리고 있다.** 영이 우주를 만들었기 때문이다. 우주와 영이 둘이 아니다. 연필 하나로 고양이도 그리고 새도 그리고 사람도 그린다. 큰 사람도 작은 사람도 그린다. 작은 그림이 큰 그림한테 '왜 나는 작게 그렸어요?'하고 불만을 갖는 것과 마찬가지다. **통으로 다 하나의 영의 작용으로 우리가 이렇게 살고 있다.** 근데 자꾸 **내가 산다고 착각** 을 일으키는 거다.\n\n#### **전체 의식에서 서로를 이해할 수 있다**\n\n마음자리를 자꾸 전체 공간으로 가져가야 한다. 그래야 올셀프의 삶이 된다. 생각이나 감정에 매여 살면 — 올셀프인데도 불구하고 지엽적인 거기에 매달리는 거다. 그러면 굉장히 편협하게 살 수밖에 없다. 생각·감정 차원에서만 살아버리면 서로 분리돼버린다. 거기에는 이해와 소통이 일어나기가 굉장히 힘들다. 서로가 서로를 수용하고 이해하기 힘들어진다.\n\n**전체 의식에서 우리가 드러나는 부분이지만, 분명히 또 각자 구체적으로 사는 부분도 있다.** 그럴 때 서로 이해하고 포용하면서 잘 살아야 한다. 그게 이제 **마음 바탕이 하나라는 것** 에서부터 출발하면 — 각자 생각이 다르고 서로 감정으로 상처받는 부분들을 오히려 상대방을 이해하는 쪽으로 쓸 수 있다. 우주의식을 가지고 나를 넘어선 관점에서 보면 — 사람도 저렇게 할 수 있겠구나, 사람도", "source": "essay"}, {"id": "essay_560_8939763918", "text": "각이 다르고 서로 감정으로 상처받는 부분들을 오히려 상대방을 이해하는 쪽으로 쓸 수 있다. 우주의식을 가지고 나를 넘어선 관점에서 보면 — 사람도 저렇게 할 수 있겠구나, 사람도 저렇게 아파할 수 있겠구나, 자기 생각 때문에 고통받을 수 있겠구나 — 그러면 상대방을 이해할 수 있는 여지가 생기는 거다. #올셀프 #우주의식 #세계일화 #앎 #영 #대행스님 #상호이해\n\n--- (구분선)\n\n[파일명: 이너게임_좌뇌우뇌_신의방송_수필.md]\n\n### **이너게임_좌뇌우뇌_신의방송_수필**\n\n#### **인지, 선택, 신뢰 — 세 가지가 같이 돼야 한다**\n\n이너게임의 삼 요소는 인지, 선택, 신뢰다. 인지하는 것이 우뇌를 활용하는 거고, 선택은 목표를 정하는 좌뇌의 영역이다. 신뢰는 내 안에 자원이 다 있다고 보는 것 — 어떤 문제건 해결할 수 있는 능력이 있다고 보는 거다. 좌뇌와 우뇌가 협력하면 굉장히 파워풀한 퍼포먼스가 나온다. 테니스 실력이 늘든, 마케팅을 잘 하든, 사업 실적을 늘리든 — 그런 성과를 내려면 이 세 가지가 같이 돼야 한다. **목표를 설정했으면 좌뇌(셀프1)를 꺼버려야 한다.** 그리고 **우뇌(셀프2)의 잠재 능력** 이 전면에 나서서 작업을 수행하고 학습하게 해야 한다.\n\n#### **좌뇌의 잔소리를 진짜로 착각하는 게 문제다**\n\n좌뇌가 우뇌가 집중해야 할 부분을 옆에서 **계속 잔소리를 하면서 막는다.** 문", "source": "essay"}, {"id": "essay_561_893ef3efff", "text": "업을 수행하고 학습하게 해야 한다.\n\n#### **좌뇌의 잔소리를 진짜로 착각하는 게 문제다**\n\n좌뇌가 우뇌가 집중해야 할 부분을 옆에서 **계속 잔소리를 하면서 막는다.** 문제는 이 좌뇌의 지껄임을 **마치 정말인 줄 안다는 거다.** 그러니까 문제가 된다. 머릿속에서 옛날 일을 생각하면 화가 나기도 한다. 지금은 그게 아닌데, 옛날 일인 것뿐인데 — **마치 진짜인 것처럼 착각** 을 일으켜버린다. 이게 문제다.\n\n그래서 **우뇌가 주인이라는 자리를 확고하게 갖는 게** 중요하다. 그러면 좌뇌가 재잘거려도 실체감이 없어진다. 그때 좌뇌를 쓰자 — 목표 설정이나 분석에 활용하자. 사람들은 좌뇌에 너무 시달리다 보니 **좌뇌를 스톱시키는 것만이 목표** 가 돼버렸다. 아무 일도 없고 아무 생각도 없는 것만 추구한다. 그건 잘못된 수행 방법이다. 좌뇌도 우리가 세상을 살아가는 데 써야 한다.\n\n#### **내 방송국이 꺼지면 신의 방송이 나온다**\n\n우주에 어떤 법칙이 다 있다. 신의 음성이 다 있다. 그런데 우리가 그걸 잡아내질 못한다. **내 방송국의 목소리가 너무 커서다.** 내 목소리가 너무 크니까 신의 목소리가 안 나오는 거다. 없어서가 아니다. 좌뇌를 꺼버리면 — 내 방송국이 꺼지면 — **우뇌에 신과 접속된 신의 방송이 나온다.** 우리는 결국 거기서 온 거니까. 지구에 인간이 하나도 없다면 어떻게 되겠는가. 지구가 존", "source": "essay"}, {"id": "essay_562_be41052bfe", "text": "좌뇌를 꺼버리면 — 내 방송국이 꺼지면 — **우뇌에 신과 접속된 신의 방송이 나온다.** 우리는 결국 거기서 온 거니까. 지구에 인간이 하나도 없다면 어떻게 되겠는가. 지구가 존재한다는 것 자체도 모르는 거다. 우리가 이렇게 생기면서 인식이 점점 확장되고. 기술이 발달되기 전에는 자기 마을밖에 못 봤는데 지금은 전 세계를 본다. 인류가 더 발전하면 전 우주로 확장될 것이다. 그것이 **우주가 자기를 인식하는 계기** 가 된다. **우리가 이 땅에 태어난 목적이 그런 거다.**\n\n#### **지성·감성·영성이 이성으로 엮여야 한다**\n\n그러니까 서로 내 방송국이 맞다, 네 방송이 맞다 싸우면 안 된다. 우리는 사명을 받고 이 세상의 여정을 살아가는 건데. 연민을 할 수 있다. 영이면 영, 우주면 우주, 진리면 진리가 저마다의 가슴과 뇌를 관통하고 있기 때문이다. 세상을 살려면 좌뇌를 어쩔 수 없이 써야 한다. 논리적이고 이런 것들을. 그래서 학습을 같이 해야 한다. **지성과 감성과 영성이 같이 발달해서 이성으로 엮여야 한다.** 이성이 이치다. 이치가 우주다. 우주의 진리다. 그것으로 엮여서 같이 발달해야 한다.\n\n---\n\n*[⚠️세계관 확인] 셀프1/셀프2 언어는 갤웨이(이너게임)에서 차용한 것임. 최종 가공 시 올셀프 세계관 안에서 박의섭의 고유 언어로 재정의 필요.* #이너게임 #좌뇌우뇌 #셀프1셀프2 #신의방송 #지성감성영성", "source": "essay"}, {"id": "essay_563_2d02fbca4b", "text": "2 언어는 갤웨이(이너게임)에서 차용한 것임. 최종 가공 시 올셀프 세계관 안에서 박의섭의 고유 언어로 재정의 필요.* #이너게임 #좌뇌우뇌 #셀프1셀프2 #신의방송 #지성감성영성 #이성\n\n--- (구분선)\n\n[파일명: 이차화살_감정재해석_로켓_수필.md]\n\n### **이차화살_감정재해석_로켓_수필**\n\n#### **이차 화살이란 무엇인가**\n\n**상황에 대한 기억과 안 좋은 느낌과 감정이 달라붙은 것 — 그게 이차 화살이다.** 화살은 맞으면 아프다. 상황이 기억날 때마다 거기에 달라붙은 불쾌한 감정이 같이 따라온다. 상황을 바라볼 때마다 그 꼬리표가 작용한다. 생각과 느낌과 감정이 딱 붙어버렸기 때문이다. 그래서 이걸 떼내야 한다. 안 그러면 그 상황이 기억날 때마다 나를 계속 괴롭히는 원인이 된다. 내 스스로 계속 이차 화살을 갖고 다니는 거다.\n\n#### **좋은 상황에서 한번 다시 보자**\n\n그렇다면 어떻게 하는가. 감정과 느낌을 빼버리고, 내가 좋은 새로운 감정 상태에서 그걸 보는 거다. **새로운 렌즈를 끼고 보는 거다.** 새로운 감정과 느낌으로. 억지로 재해석을 좋은 쪽으로 하라는 게 아니다. **좋은 상황에서 내가 한번 보자** 이거다. 내가 목표를 이뤘다면 — 그 좋은 감정과 느낌을 갖게 하고, 그 렌즈를 통해서 과거의 상황을 새롭게 보는 거다. 좋은 감정으로 느끼면서 보면 상황이 전혀 다르게 해석될 수 있다.", "source": "essay"}, {"id": "essay_564_284005c19b", "text": "가 목표를 이뤘다면 — 그 좋은 감정과 느낌을 갖게 하고, 그 렌즈를 통해서 과거의 상황을 새롭게 보는 거다. 좋은 감정으로 느끼면서 보면 상황이 전혀 다르게 해석될 수 있다.\n\n#### **화살이 아니라 로켓이 된다**\n\n그렇게 하면 **새롭게 형성된 기억과 느낌이 좋은 쪽으로 붙어서** 나한테 화살이 아니고 **로켓으로 작용** 할 수 있다. 상황을 떠올릴 때마다 내가 추진력을 얻을 수 있다. 좋은 쪽으로 작용하게 되니까. 같은 기억인데 어떤 감정이 붙어있느냐에 따라 — 찌르는 화살이 되기도 하고, 밀어주는 로켓이 되기도 한다. #이차화살 #감정재해석 #기억 #로켓 #올셀프 #코칭\n\n--- (구분선)\n\n[파일명: 이치경영_역지사지_올셀프_수필.md]\n\n### **이치경영_역지사지_올셀프_수필**\n\n#### **이치의 가장 큰 핵심은 역지사지다**\n\n이치 경영. 앞으로 CEO가 얼마나 이치에 맞는 경영을 하느냐가 점점 더 중요해진다. 이치에 맞으니까 구성원들이 당연히 이해한다. 이치에 맞는 것을 이해하지 못한다면 그건 구성원의 자격이 없는 거다. 그러면 이치의 근본적인 핵심이 무엇인가. **역지사지다.** 내가 하기 싫은 거는 아무한테도 시키지 말고, 내가 갖고 싶은 거를 너한테 줘라. **널리 세상을 이롭게 해야지만 그것이 나를 이롭게 하는 것이다.** 이게 가장 기본적인 세상의 이치다. 동서양 철학이 다 같은 말을 한다. 내가", "source": "essay"}, {"id": "essay_565_3728492e60", "text": "갖고 싶은 거를 너한테 줘라. **널리 세상을 이롭게 해야지만 그것이 나를 이롭게 하는 것이다.** 이게 가장 기본적인 세상의 이치다. 동서양 철학이 다 같은 말을 한다. 내가 남한테 싸대기 때리면서 나한테는 맛있는 걸 주길 바라는 건 이치에 안 맞는다. 내가 성장하기 위해서는 세상을 이롭게 해야 한다. 세상을 이롭게 하지 않으면서 나만 성장하겠다고 하면 안 된다. 홍익인간. 대승 보살의 하화중생. **자리이타(自利利他)** — 나를 이롭게 해서 세상을 잘 쓰는 것. **이타자리(利他自利)** — 남을 도와줘서 나 같이 잘 되게 하는 것. 남을 깨우치게 하는 게 나를 깨우치게 하는 거다. **그게 진리다.**\n\n#### **올셀프가 근본이다**\n\n그것에 가장 근본적으로 왜 그래야 되는가. **올셀프이기 때문이다.** 내가 둘이 아니니까. 역지사지나 자리이타나 이타자리나 — 이런 개념들이 왜 있는가. 올셀프로 받아들여야 되는 이유가 되는 거다. 올셀프를 장착해서 세상에 작용으로 — 온전한 온나(온통나)로서의 삶을 살아가는 거다.\n\n#### **진리와 이치의 차이**\n\n진리는 **참된 이치** 를 말한다. 이치에는 참되고 안 되고가 따로 없다. 작용을 보고도 이치를 알 수 있고, 체(體)와 상(相)을 보고도 이치를 알 수 있다. 컵을 보면 이치를 안다. 이치의 현현이다. 물을 따라보는 작용을 보면 왜 이렇게 구성되어야 하는지 안다. 그", "source": "essay"}, {"id": "essay_566_66c813c60d", "text": "이치를 알 수 있고, 체(體)와 상(相)을 보고도 이치를 알 수 있다. 컵을 보면 이치를 안다. 이치의 현현이다. 물을 따라보는 작용을 보면 왜 이렇게 구성되어야 하는지 안다. 그러면 이건 그냥 컵이 아니고 **이치가 현현된 컵** 이 된다. 이것이 이데아다. 서양 철학에서는 완전한 이데아가 따로 있다고 보지만 — **이것이 이데아다.** 작용을 할 때의 컵이 컵이다. 작용하지 않고 그냥 있으면 종이 조각이다. #이치경영 #역지사지 #자리이타 #이타자리 #올셀프 #진리\n\n--- (구분선)\n\n[파일명: 이치경영_적중혁신_브랜딩_수필.md]\n\n### **이치경영_적중혁신_브랜딩_수필**\n\n#### **이치에 맞게 쓰는 것이 적중이다**\n\n컵을 '컵'이라고 규정 지어버리면 여기다 뭔가를 버릴 수 없다고 생각한다. **고정시켜 놓으면 매임이 생긴다.** 거기서 사람들이 자꾸 고통을 갖는다. 이 개념만 깨트려 버리면 얼마든지 다른 용도로 쓸 수 있는데. 목이 마를 때는 컵으로, 뭔가 버릴 일이 있을 때는 쓰레기통으로 — **이치에 맞게 쓰는 거다.** 그게 적중이고, 중도로서의 쓰임이다. 기존의 고정관념 틀을 깨버릴 때 거기서 새로운 **창조성** 이 나온다. **혁신** 이 거기서 나온다.\n\n#### **세상을 이롭게 하는 길이냐**\n\n경영에서 선택해야 할 때 이치를 가지고 있으면 선택이 너무나 선명해진다. **'이 세상을 이롭게 하는 길이", "source": "essay"}, {"id": "essay_567_decc8755a3", "text": "신** 이 거기서 나온다.\n\n#### **세상을 이롭게 하는 길이냐**\n\n경영에서 선택해야 할 때 이치를 가지고 있으면 선택이 너무나 선명해진다. **'이 세상을 이롭게 하는 길이냐? 우리 회사만 이롭게 하는 거냐? 나만 이롭게 할 것이냐?'** 이걸 딱 보면 어떤 걸 선택해야 하는지 CEO가 명확하게 알 수 있다. 스티브 잡스가 생각한 이치가 통한 거다. 그 이치 경영이 회사 사람들에게도 통했고, 제품이 세상에 미치는 작용이 일반 사람들에게까지 미쳐서 '맞아, 이거 필요하네' — 이치를 납득한 거다.\n\n일론 머스크가 화성에 가겠다고 할 때 '나는 화성이 좋아'라고 했으면 아무도 열광하지 않았을 거다. '인류의 번성과 존속을 위해서 화성에 가겠다' — 거기서 사람들이 열광한다. **진리와 이치가 저변에 깔려 있어야 한다.**\n\n#### **이치가 브랜딩이다**\n\n나이키는 따로 브랜딩을 안 한다. 테슬라도 마찬가지다. 미션과 비전에 담긴 메시지만 전한다. 그러면 사람들이 저절로 거기에 대한 상(相)을 형성하면서 그게 브랜드가 된다. **이치에 맞게 가치를 제공하면 사람들이 받아들이고 교환이 일어난다.** 따로 브랜딩을 설명할 필요가 없다.\n\n#### **이치는 어려운 게 아니다**\n\n이치라는 거는 세 살 먹은 아이도 알려주면 금방 알아듣는 너무나 **단순한 것** 이다. 어려운 진리가 아니다. 길거리에 서 있는 나무도 이치를 안다. 그", "source": "essay"}, {"id": "essay_568_8c1cb4a865", "text": "어려운 게 아니다**\n\n이치라는 거는 세 살 먹은 아이도 알려주면 금방 알아듣는 너무나 **단순한 것** 이다. 어려운 진리가 아니다. 길거리에 서 있는 나무도 이치를 안다. 그러니까 저렇게 서 있다. 포크도 이치를 안다. 이치에 맞게 만들어졌으니까 쓸 수 있는 거다. CEO들이 이것을 모른다는 건 말이 안 된다. **이치는 이미 모든 것 안에 현현되어 있다.** 중도 경영, 중용 경영, 이치 경영 — 말은 뭘 갖다 붙여도 다 통한다. 근본적으로 이치를 표현하는 것이기 때문이다.\n\n#이치경영 #혁신 #브랜딩 #적중 #역지사지 #올셀프\n\n--- (구분선)\n\n[파일명: 이치문리_뇌회로_올셀프_수필.md]\n\n### **이치문리_뇌회로_올셀프_수필**\n\n#### **이치는 몸에 쌓인다**\n\n이치 얘기를 반복해서 많이 듣다 보면 **몸에 이치가 쌓인다.** 반복적으로 들으면서 거기에 대해 깊이 사고를 하면 더 빨리 이치가 트이게 된다. **뇌 회로가 바뀐다.** 뇌 배선이 바뀌고 강화되어서 이런 이치를 생각할 때 팍팍 떠오르게 된다. 거기다 명상도 하고, 시도 적어보고, 사유도 깊이 하면 더 빠르다.\n\n#### **안 나는 것을 견뎌내야 한다**\n\n시를 생각하든 이치로 생각하든, 생각이 보통 잘 안 나온다. 그게 안 나온다는 건 뇌에서 계속 시냅스 연결을 나름대로 찾고 있는 거다. **안 나는 것을 견뎌내야 한다.** 그때 다른 데로 옮겨버", "source": "essay"}, {"id": "essay_569_d2ccf50874", "text": "치로 생각하든, 생각이 보통 잘 안 나온다. 그게 안 나온다는 건 뇌에서 계속 시냅스 연결을 나름대로 찾고 있는 거다. **안 나는 것을 견뎌내야 한다.** 그때 다른 데로 옮겨버리면 — 움이 움직여 버리면 움이 죽는다고 했잖아. 그냥 이게 생각이 안 나고 죽어버린다. 그런데 계속 움직이지 않고 그거에 대해서 생각을 하면 뇌 회로 배선이 다 연결되면서 **이치다움** 이 된다. 불교에서 얘기하는 '이뭣고' 화두가 그것이다. 그냥 끝없이 들고 있는 것.\n\n#### **문리가 터지면 자유자재로 활용된다**\n\n이치다움이 탁 터지면 그거를 **문리가 터졌다** 고 한다. 그러면 이치가 자유자재로 활용된다. 이미 배선이 다 끝났기 때문이다.\n\n지식에 묶여버리는 게 아직 깨닫지 못한 거다. 지식을 마음대로 활용하고, 이럴 때는 이렇게 적용하고 저럴 때는 저렇게 적용하는 것 — **공식의 원리를 깨달은 거다.** 공식의 원리를 깨달으면 어떤 숫자가 오건 다 대입하면 나온다. **문리가 터진 것이 올셀프다.** #문리 #이치 #뇌회로 #올셀프 #수행 #화두\n\n--- (구분선)\n\n[파일명: 이치에맞는삶_전전두엽_에고_수필.md]\n\n### **이치에맞는삶_전전두엽_에고_수필**\n\n#### **셀프1은 왜 제한된 신념인가**\n\n좌뇌에 셀프1이 있다. 계속 재잘거리면서 '이래야 되는 거 아니야, 저래야 되지 않나' 하면서 비교하고, 판단하고, 평가한다.", "source": "essay"}, {"id": "essay_570_14a6f5b194", "text": "*\n\n#### **셀프1은 왜 제한된 신념인가**\n\n좌뇌에 셀프1이 있다. 계속 재잘거리면서 '이래야 되는 거 아니야, 저래야 되지 않나' 하면서 비교하고, 판단하고, 평가한다. 반면 우뇌(셀프2)는 선입견 없이 주어진 환경에서 있는 그대로 받아들이면서 행동하려 한다. 셀프1의 신념이 **제한된 이유** 가 있다. 다른 감각기관과 관계없이 작동하기 때문이다. 올바른 판단을 하려면 바르게 보고 바르게 들어야 한다. 그런데 제한된 신념은 그냥 생각 자체다. 고정된 관념, 편견. 지금 여기의 감각적 정보와 관계없이 '이래라 저래라' 끼어든다. **변화하는 세상을 고정된 잣대로 댄다.** 그래서 행동이 제약되고 위축된다. 내 활동이 소극적이고 자신감이 없다면 — 지금 어떤 제한된 신념에 사로잡혀 있는지 확인해야 한다.\n\n#### **셀프1이 완전히 나쁜 건 아니다**\n\n셀프1이 모두 나쁜 건 아니다. 이정표 역할을 하기도 한다. 사회 규범도 들어가 있다. '훔치면 안 된다'는 건 이치잖아. 제한된 신념 안에도 이치에서 온 신념이 있다.\n\n판단의 기준은 하나다. **이치에 부합하는 신념이냐. 나와 남을 이롭게 하는 것이냐.** 이치에 맞는 신념은 따라야 한다. 그렇지 않은 것 — 욕망이나 과거 관습에서 온 편견 — 이건 제한된 신념이다.\n\n#### **전전두엽이 최고 사령관이다**\n\n셀프2가 셀프1의 목소리를 완전히 꺼버리면 우뇌로만 산다.", "source": "essay"}, {"id": "essay_571_420d925590", "text": "않은 것 — 욕망이나 과거 관습에서 온 편견 — 이건 제한된 신념이다.\n\n#### **전전두엽이 최고 사령관이다**\n\n셀프2가 셀프1의 목소리를 완전히 꺼버리면 우뇌로만 산다. 그러면 남의 것도 구분 없이 먹고, 중앙차선을 침범한다. 얘를 가게 하기 위해서는 가이드라인이 필요하다. 그게 사명이다. 셀프1과 셀프2를 융합하는 역할 — **전전두엽이 그 역할을 한다.** 전전두엽은 셀프2가 받아들이는 모든 정보와 셀프1의 과거 신념을 놓고, **'도' 또는 '사명'이라는 이치에 따라 선별하고 통제하는 최고 사령관** 같은 역할을 한다. 전전두엽이 욕망이 아닌 이치에 맞는 목표를 설정하면, 셀프2는 그 길을 따라 그냥 살면 된다. 끌어당김의 법칙이니 하는 건 벌써 에고의 욕망 투사다. '끌어당긴다'는 말 자체가 나한테 당긴다는 거 아닌가. **전전두엽이 욕망이 아닌 이치에 맞는 목표에 집중해야 한다.**\n\n#### **에고는 그림자다 — 싸우지 마라**\n\n셀프1이 에고다. 셀프2가 셀프1의 욕망에 귀 기울이면 그게 에고다. **에고는 실체가 있는 게 아니다.** 에고는 그림자다. 그러니까 에고를 없애거나 에고랑 싸울 게 없다. **전전두엽이 그 그림자의 정체를 명확히 파악하고, 무시하고, 이치에 맞는 방향으로 시선을 돌리는 역할을 해야 한다.** 온전한 나로서 살기 위해서는 셀프1도 필요하다. 단 그것이 이치에 맞는 방향으로 쓰여야 한다", "source": "essay"}, {"id": "essay_572_f74bf91fba", "text": "명확히 파악하고, 무시하고, 이치에 맞는 방향으로 시선을 돌리는 역할을 해야 한다.** 온전한 나로서 살기 위해서는 셀프1도 필요하다. 단 그것이 이치에 맞는 방향으로 쓰여야 한다.\n\n---\n\n*[⚠️세계관 확인] 셀프1/셀프2·전전두엽 언어가 이너게임(갤웨이)·뇌과학 언어와 혼재함. 최종 가공 시 올셀프 세계관 안에서 통합 재정의 필요.* #전전두엽 #셀프1셀프2 #에고 #이치 #사명 #올셀프\n\n--- (구분선)\n\n[파일명: 인仁의발견_비어있음에서시작되는사랑_수필.md]\n\n### **인仁의발견_비어있음에서시작되는사랑_수필**\n\n#### **인(仁)이란 다른 사람을 사랑하는 것이다**\n\n공자가 말했다. 인(仁)이란 다른 사람을 사랑하는 것이다. 그렇다면 사랑을 한다는 것은 무엇인가. 왜 사랑을 하게 되는가. 사랑이란 과연 무엇인가.\n\n---\n\n#### **비어 있음이 보일 때 마음이 움직인다**\n\n맹자는 측은지심을 말했다. 헤아리는 마음. 그런데 타자가 꽉 차 있다면 굳이 내가 헤아릴 필요가 없다. **거기서 뭔가 비어 있음을 봤기 때문에 내 마음이 그쪽으로 가는 것이다.** 순자의 성악설도 같은 맥락이다. 악이라는 것은 일면으로 보면 나약함의 표현이다. 나약함도 비어 있음이다. 약한 쪽으로 마음이 가게 되어 있다. 공자의 인, 맹자의 성선, 순자의 성악. 결국 이 모두가 사랑을 표현하는 것이다. 방향이 다른 것처럼 보이지만 뿌리는", "source": "essay"}, {"id": "essay_573_3976ebaa03", "text": "약함도 비어 있음이다. 약한 쪽으로 마음이 가게 되어 있다. 공자의 인, 맹자의 성선, 순자의 성악. 결국 이 모두가 사랑을 표현하는 것이다. 방향이 다른 것처럼 보이지만 뿌리는 같다.\n\n---\n\n#### **사랑은 움직이는 것이다**\n\n기압차가 있으면 바람이 분다. 바람이 불고 싶어서 부는 것이 아니다. 기압이 낮은 곳으로 그냥 흘러가는 것이다. **사랑도 움직이는 것이다.** 비어 있는 곳으로 흘러가는 것이다. 타자성을 느끼는 것, 그 타자성 자체에 이미 사랑이 내포되어 있다. 그것이 없다면 서로 상호작용이 일어날 수 없다. 서로의 비어 있음을 보면서, 그 비어 있음 속으로 서로 작용해서 엉켜지는 것. 그것이 사랑이다. #인仁 #측은지심 #비어있음 #타자성 #사랑은움직임\n\n--- (구분선)\n\n[파일명: 인식의세계_진공묘유_수필.md]\n\n### **인식의 세계, 진공묘유**\n\n#### **모든 것이 내 안에서 일어난다**\n\n내 안에서 생각이 일어난다. 내가 그걸 안다. 아픔이 있다. 그것도 내 안에서 일어나는 현상이다. 감정도 내 안에서 일어나는 현상이다. 그런데 바깥의 것도 지금 느끼고 있다. 소리도 느끼고 있고, 벽도 느끼고 있고, 방 안의 물건들도 인식하고 있다. 그것도 내 안에서 일어나는 것이다. 나의 인식에서 일어나고 있으니까. 방 밖으로 나가면 산도 보이고 하늘의 구름도 보이고 태양도 보인다. 그것이 다 어디서 인식되는가", "source": "essay"}, {"id": "essay_574_52bd725fa6", "text": "식하고 있다. 그것도 내 안에서 일어나는 것이다. 나의 인식에서 일어나고 있으니까. 방 밖으로 나가면 산도 보이고 하늘의 구름도 보이고 태양도 보인다. 그것이 다 어디서 인식되는가. **내 안에서 인식되는 것이다.** 이 세상 자체가 나의 인식에서 일어나고 있다.\n\n---\n\n#### **생각이 나를 작은 곳에 가둔다**\n\n나라는 육체조차도 그냥 알려지고 느껴지는 현상일 뿐이다. 그런데 그 작은 현상 안에다가 나를 가둬놓는 것이다. 나의 인식을. 생각으로 가두는 것이다. 사실은 통으로 살고 있는데, 통으로 경험하고 있는데, **생각이 분리를 시키는 것이다.**\n\n분리를 시켜버렸기 때문에 고통을 받는다. 실제로는 분리된 것이 아닌데도 불구하고, 나라는 것이 이 세상을 경험한다고 생각하는 것이다. 하지만 통으로 일어나는 하나의 현상에서 내가 특정 부분에 집중하고 있는 것뿐이다. 창문을 보면 창문 밖 바깥세상도 보이듯이, 이것들이 다 통으로 나한테서 일어나는 하나의 현상이다.\n\n---\n\n#### **고통이라는 실체는 없다**\n\n생각이 나라는 것을 여기다 가둬두고 고통받는다. 그런데 사실 고통받을 것이 없다. 나라는 것이 분리되지 않았으니까. 그 생각만 없으면 고통도 없다. **생각 스스로 고통받는 것이다.** 본래 나라는 것은 고통을 안 받는다. 고통도 실체가 따로 있는 것이 아니다. 고통도 그냥 현상이다. 어떤 특정한 현상에 우리가 고통이", "source": "essay"}, {"id": "essay_575_a62a7c7dd6", "text": "없다. **생각 스스로 고통받는 것이다.** 본래 나라는 것은 고통을 안 받는다. 고통도 실체가 따로 있는 것이 아니다. 고통도 그냥 현상이다. 어떤 특정한 현상에 우리가 고통이라는 이름을 붙인 것이다. 그것도 이름에 속는 것이다. 생각이라는 이름도 생각이고, 고통이라는 이름도 생각이다. 그냥 강한 자극일 수 있고, 다른 것과 차이가 나는 강한 느낌일 수 있다.\n\n고통이라는 실체도 없고, 그것을 느낀다고 생각하는 나도 없고, 나가 고통을 느끼는 그 나는 더더욱 없다. 그냥 하나의 드러나는 현상일 뿐이다.\n\n---\n\n#### **진공묘유**\n\n그런 것들조차도 지금 그냥 알아진다. 온전히 받아들여지고 있다. 그렇게 수용되고 있으니까 다음 장면, 다음 장면으로 이어나가고 있다. 삶의 역동성이다. 아무 실체가 없는 공(空)에서 다시 이렇게 현상적으로 드러나는 것들이 묘하다. **진공묘유(眞空妙有)** — 참으로 비어있는 곳에서 묘하게 있음이 드러난다는 것이 그래서 그런 것이다. #인식의세계 #진공묘유 #생각이분리를만든다 #고통의실체없음 #올셀프\n\n---\n\n[보완 가능 단락 — 무상·고·무아] 이렇게 현상적으로 드러난다는 것 자체가 고정된 실체가 없다는 것이다. 그래서 무상(無常)이라 하는 것이다. 그런데 그 고정된 실체를 잡으려 하고 거기에 매이는 것이 고통이다.\n\n느껴지고 알려지는 것만이 무상한 것이 아니다. **나 자체도 고정되어 있지", "source": "essay"}, {"id": "essay_576_7646980edd", "text": "래서 무상(無常)이라 하는 것이다. 그런데 그 고정된 실체를 잡으려 하고 거기에 매이는 것이 고통이다.\n\n느껴지고 알려지는 것만이 무상한 것이 아니다. **나 자체도 고정되어 있지 않다.** 그것이 무아(無我)다. 고정된 실체가 따로 없는데도 불구하고, 고정된 실체가 있다고 하면서 대상을 잡거나 취하거나 버리려 한다. 그것이 고통이다. 실체가 없는 것을 잡으려 하니까. 잡으려고 하는 그 자체도 무상하다. 그것도 실체가 없다. 꿈속에서 목이 말라 물을 마시고 갈증이 해소됐다고 느끼는 것과 같다. 꿈속의 주인공 자체도 꿈이다. 대상도 꿈이고, 한바탕 다 꿈이다. 무상·고·무아 — 이것을 현대적인 언어로 풀어보면 이렇다. 보이고 드러나는 것이 다 하나의 현상적으로 드러나는 것이고, 나라는 것조차도 현상적으로 드러나는 것뿐이다. 그런데 그것이 앎으로써 통으로 드러나고 있다. 환하게 알려지고 보여진다. **현상과 그것을 아는 주체가 따로 떨어져 있는 것이 아니다.** 그래서 아는 것이 이것을 경험한다고 볼 수 없다. 그냥 이렇게 드러나고 있는 것이다. 계속 드러나고 있는 것이다.\n\n--- (구분선)\n\n[파일명: 인식의틀_기억의재생_수필.md]\n\n### **인식의틀_기억의재생_수필**\n\n#### **삶은 기억의 재생이다**\n\n삶이라는 것은 **기억의 재생** 이다. 우리는 기억을 재생하면서 지금 이 현실을 인식하고 안다. 그런데 그 기억이 불만", "source": "essay"}, {"id": "essay_577_47ac7fe862", "text": "억의재생_수필**\n\n#### **삶은 기억의 재생이다**\n\n삶이라는 것은 **기억의 재생** 이다. 우리는 기억을 재생하면서 지금 이 현실을 인식하고 안다. 그런데 그 기억이 불만족스럽거나 원하지 않는 것들로 채워져 있다면, 지금 눈앞의 상황을 볼 때도 그 불만족의 눈으로 보게 된다. 그렇게 본 것이 다시 불만족의 기억으로 저장된다. 그러면 다음번에도 또 같은 눈으로 보게 된다. 이것이 순환이다. 기억이 인식을 만들고, 인식이 다시 기억이 된다. 그러니까 지금 이 현실을 **감사함이라는 시각** 으로 인식하는 것이 중요하다. 이것을 아내와 함께 이야기하다가, 끌어당김의 법칙이나 대행 스님의 가르침, 호오포노포노 같은 것들이 결국 같은 말을 하고 있다는 것을 확인하게 됐다. 대행 스님이 '주인공 자리에 감사하게 놓으라'고 한 것도 이 맥락이다. 기억 속 불만족이 **감사함으로 바뀔 수 있어서** , 삶이 감사한 방향으로 펼쳐질 수 있다는 것이다.\n\n---\n\n#### **내용물이 아니라 틀을 바꿔야 한다**\n\n끌어당김의 법칙을 실천한다고 할 때 많은 사람들이 하는 실수가 있다. **내용물을 끌어당기는 것** 에 집중하는 것이다. 더 좋은 차, 더 많은 돈, 더 행복한 상태. 그런데 이것이 제대로 안 되는 이유가 있다. 그것을 바라보는 **인식의 틀** 을 바꾸지 않았기 때문이다. '돈이 많았으면 좋겠다'고 생각하는 것은, 지금 돈이 없다", "source": "essay"}, {"id": "essay_578_8ba7873e24", "text": "행복한 상태. 그런데 이것이 제대로 안 되는 이유가 있다. 그것을 바라보는 **인식의 틀** 을 바꾸지 않았기 때문이다. '돈이 많았으면 좋겠다'고 생각하는 것은, 지금 돈이 없다는 것을 전제로 한다. '행복했으면 좋겠다'는 것은 지금 행복하지 않다는 것을 전제로 한다. 내가 무언가를 원한다는 것 자체가 **결핍을 전제** 하고 있는 것이다. 그것을 바깥으로 계속 투사하는 것은, 결국 **결핍을 계속 집어던지는** 것이다. 그러면 그 결핍이 다시 기억으로 저장되어 또 같은 자리로 돌아온다. 내용물을 바꾸려는 것은 **욕망의 투사** 다. 그것이 실현된다 해도, 그것이 나에게 어떻게 작용할지는 아무도 모른다. 내용은 어차피 수시로 바뀐다. 살아가면서 부딪히는 상황은 내가 통제할 수 없는 것들이다. 내가 바꿀 수 있는 것은 그것을 바라보는 시각, 곧 인식의 틀이다.\n\n---\n\n#### **파도를 어떻게 보느냐**\n\n삶은 파도 같다. 잔잔할 때도 있고 거세게 칠 때도 있다. 잔잔하면 지루하다고 느낄 수 있고, 거세면 두렵다고 느낄 수 있다. 그런데 파도가 세게 칠 때 서핑을 하는 사람은 오히려 스릴 있다고 감사해한다. 파도 자체가 문제가 아니다. 그 파도를 **어떤 관점으로 보느냐** 가 핵심이다. 인식의 틀을 바꾼다는 것은 잘못된 선입관을 지운다는 것이다. 아뢰야식—불교 유식학에서 말하는 저장식—에 무엇을 넣느냐에 따라, 그것이 다시 바", "source": "essay"}, {"id": "essay_579_af753814af", "text": "떤 관점으로 보느냐** 가 핵심이다. 인식의 틀을 바꾼다는 것은 잘못된 선입관을 지운다는 것이다. 아뢰야식—불교 유식학에서 말하는 저장식—에 무엇을 넣느냐에 따라, 그것이 다시 바깥으로 투영된다. 인간은 인간의 공업(共業)으로 세상을 보고, 개는 개의 방식으로, 박쥐는 박쥐의 방식으로 세상을 인식한다. 각자가 자신의 아뢰야식에 무엇을 저장해왔느냐가 지금 보이는 세계를 결정한다. 그러니 내가 인식의 틀에 무엇을 넣고 있는지가 중요하다.\n\n---\n\n#### **깨달음이 상황을 바꾸지는 않는다**\n\n수행을 하거나 마음공부를 하면 삶이 꽃길이 될 것처럼 생각하는 사람들이 있다. 그런데 **인식의 틀이 바뀌는 것이지, 상황과 환경이 바뀌는 것이 아니다.** 부처님도 왕국이 망하는 것을 살아있는 동안 겪었고, 상한 음식을 먹고 탈이 나기도 했다. 예수님도 십자가에 못 박혔고, 소크라테스도 누명을 쓰고 독배를 마셨다. 깨달았다고 해서 삶의 어려움을 피해가는 것이 아니다. 주변에서 '당신이 그렇게 마음공부를 했는데 왜 삶이 그래?'라고 물을 때, 그들은 **내용물을 보는 것** 이다. 재산이 얼마나 있는지, 지금 상황이 어떻고. 그런데 그것은 인식의 틀과는 다른 차원의 이야기다. 깨달음이 몸이 깨닫는 것이 아니다. 몸은 여전히 밥을 먹어야 하고 아프면 아프다. 부처님도 밥을 얻어먹고 살았다. 변한 것은 그런 것들에 **매이지 않게 된다는 것** 이", "source": "essay"}, {"id": "essay_580_0636febeb4", "text": "야기다. 깨달음이 몸이 깨닫는 것이 아니다. 몸은 여전히 밥을 먹어야 하고 아프면 아프다. 부처님도 밥을 얻어먹고 살았다. 변한 것은 그런 것들에 **매이지 않게 된다는 것** 이다. 곤궁하다, 초라하다는 것에 끄달리지 않게 된다. 그것이 인식의 틀이 바뀐 것이다. 어떤 상황이라도 감사할 일은 하나라도 있다. 숨이 넘어가는 순간에도.\n\n#인식의틀 #기억의재생 #감사함 #결핍의투사 #아뢰야식\n\n--- (구분선)\n\n[파일명: 인식의틀_삶의내용결정_수필.md]\n\n# **인식의틀_삶의내용결정_수필**\n\n## **삶은 기억의 재생이다**\n\n삶이란 **기억의 재생**이다. 우리는 재생된 기억을 통해 지금 이 현실을 인식하며 살아간다. 그런데 그 기억이 불만족스럽거나 원하지 않는 것들로 채워져 있다면, 지금 눈앞의 상황을 볼 때도 그 불만족의 눈으로 보게 된다. 그렇게 본 것이 다시 불만족의 기억으로 저장된다. 그러면 다음번에도 또 같은 눈으로 보게 된다. 이것이 순환이다. 기억이 인식을 만들고, 인식이 다시 기억이 된다.\n\n그러니까 지금 이 현실을 **감사함이라는 시각**으로 인식하는 것이 중요하다. 대행 스님이 '주인공 자리에 감사하게 놓으라'고 하신 뜻이 그것이다. 기억에 저장된 불만족스러움이 **감사함으로 바뀔 수 있어서**, 삶이 감사한 방향으로 펼쳐질 수 있다는 것이다. 끌어당김의 법칙이나 호오포노포노의 '미안합니다, 감사합니다, 사랑", "source": "essay"}, {"id": "essay_581_b82579c90b", "text": "기억에 저장된 불만족스러움이 **감사함으로 바뀔 수 있어서**, 삶이 감사한 방향으로 펼쳐질 수 있다는 것이다. 끌어당김의 법칙이나 호오포노포노의 '미안합니다, 감사합니다, 사랑합니다'도 결국 같은 말을 하고 있다. 이것들은 모두 **인식의 틀 자체를 바꾸는 행위**다.\n\n## **내용물이 아니라 틀을 바꿔야 한다**\n\n끌어당김의 법칙을 실천한다고 할 때 많은 사람들이 하는 실수가 있다. **내용물을 끌어당기는 것**에 집중하는 것이다. 더 좋은 차, 더 많은 돈, 더 행복한 상태. 그런데 이것이 제대로 안 되는 이유가 있다. 그것을 바라보는 **인식의 틀**을 바꾸지 않았기 때문이다.\n\n원하는 물건을 얻거나 돈을 많이 달라고 하는 것처럼 내용물을 바꾸는 방식으로는 안 된다. 그 물질적 내용물이 자신에게 어떤 영향을 미칠지, 설령 끌어당겼다 해도 어떻게 작용할지는 예측할 수 없다. **외부의 내용물 대신 인식의 틀을 바꾸는 것이 훨씬 중요하다.**\n\n더 깊은 문제가 있다. '돈이 많았으면 좋겠다'고 생각하는 것은, 지금 돈이 없다는 것을 전제로 한다. '행복했으면 좋겠다'는 것은 지금 행복하지 않다는 것을 전제로 한다. 내가 무언가를 원한다는 것 자체가 **결핍을 전제**하고 있는 것이다. 그것을 바깥으로 계속 투사하는 것은, 결국 **결핍을 계속 집어던지는** 것이다. 그러면 그 결핍이 다시 기억으로 저장되어 또 같은 자리로 돌아", "source": "essay"}, {"id": "essay_582_a6a19f62c5", "text": "*결핍을 전제**하고 있는 것이다. 그것을 바깥으로 계속 투사하는 것은, 결국 **결핍을 계속 집어던지는** 것이다. 그러면 그 결핍이 다시 기억으로 저장되어 또 같은 자리로 돌아온다. 내용물을 바꾸려는 것은 **욕망의 투사**다. 내용은 어차피 수시로 바뀐다. 살아가면서 부딪히는 상황은 내가 통제할 수 없는 것들이다. 내가 바꿀 수 있는 것은 그것을 바라보는 시각, 곧 인식의 틀이다.\n\n## **상황 자체에 좋고 나쁨이 없다**\n\n현재 우리에게 다가오는 대상이나 사건 자체에는 좋고 나쁨이 없다. 이는 우리의 주관적인 판단일 뿐이다. 내가 그것을 긍정적인 쪽으로 보느냐 부정적인 쪽으로 보느냐가 이후의 인식을 결정한다. 우리의 인식이 특정 방향에 맞춰져 **아뢰야식(저장식)**에 계속 저장되면, 그 저장된 내용이 다시 바깥으로 투영된다. 다가오는 상황 자체는 통제할 수 없지만, 그것을 어떻게 인식하느냐에 따라 시각이 달라진다. **바뀌는 것은 외부의 내용물이 아니라, 그것을 바라보는 시각이다.**\n\n삶은 파도 같다. 잔잔할 때도 있고 거세게 칠 때도 있다. 잔잔하면 지루하다고 느낄 수 있고, 거세면 두렵다고 느낄 수 있다. 그런데 파도가 세게 칠 때 서핑을 하는 사람은 오히려 스릴 있다고 감사해한다. 파도 자체가 문제가 아니다. **그 파도를 어떤 관점으로 보느냐**가 핵심이다. 인식의 틀을 바꾼다는 것은 잘못된 선입관을 지운다는 것이", "source": "essay"}, {"id": "essay_583_5722c0c010", "text": "는 사람은 오히려 스릴 있다고 감사해한다. 파도 자체가 문제가 아니다. **그 파도를 어떤 관점으로 보느냐**가 핵심이다. 인식의 틀을 바꾼다는 것은 잘못된 선입관을 지운다는 것이다. 대행 스님이 강조하신 것도, 호오포노포노가 말하는 것도 이것이다. 아뢰야식에 저장된 부정적인 인식을 지우고, 감사함이나 사랑과 같은 수용적인 느낌으로 삶을 바라보게 되는 것.\n\n## **깨달음은 꽃길이 아니다**\n\n수행을 하거나 마음공부를 하면 삶이 꽃길이 될 것처럼 생각하는 사람들이 있다. 그런데 **인식의 틀이 바뀌는 것이지, 상황과 환경이 바뀌는 것이 아니다.** 부처님도 왕국이 망하는 것을 살아있는 동안 겪었고, 상한 음식을 먹고 탈이 나기도 했다. 예수님도 십자가에 못 박혔고, 소크라테스도 누명을 쓰고 독배를 마셨다. 깨달았다고 해서 삶의 어려움을 피해가는 것이 아니다.\n\n주변에서 '당신이 그렇게 마음공부를 했는데 왜 삶이 그래?'라고 물을 때, 그들은 **내용물을 보는 것**이다. 재산이 얼마나 있는지, 지금 상황이 어떻고. 그런데 그것은 인식의 틀과는 다른 차원의 이야기다. 깨달음은 몸이 깨닫는 것이 아니다. 몸은 여전히 밥을 먹어야 하고 아프면 아프다. 부처님도 밥을 얻어먹고 살았다. 변한 것은 그런 것들에 **매이지 않게 된다는 것**이다. 곤궁하다, 초라하다는 것에 끄달리지 않게 된다. 그것이 인식의 틀이 바뀐 것이다.\n\n## **아뢰", "source": "essay"}, {"id": "essay_584_adf6b54cf7", "text": "밥을 얻어먹고 살았다. 변한 것은 그런 것들에 **매이지 않게 된다는 것**이다. 곤궁하다, 초라하다는 것에 끄달리지 않게 된다. 그것이 인식의 틀이 바뀐 것이다.\n\n## **아뢰야식에 무엇을 넣느냐**\n\n서양의 잠재의식 개념과 유식학의 **아뢰야식(阿賴耶識)**은 같은 방향을 가리킨다. 아뢰야식은 저장식(貯藏識)으로서 종자(種子)를 담는데, 우리가 무엇을 넣느냐에 따라 경험하는 현실이 달라진다. 인간은 인간의 공업(共業)으로 세상을 보고, 개는 개의 방식으로, 박쥐는 박쥐의 방식으로 세상을 인식한다. 각 생명체는 종(種)으로서의 아뢰야식을 공유하며, 각자의 행(行)을 계속 저장하며 그 삶을 강화시킨다. 70억, 80억 인구가 각자 저장하는 내용이 쌓이면서 공동의 업(共業)으로 발현되기도 한다.\n\n그러니 내가 인식의 틀에 무엇을 넣고 있는지가 중요하다. 어떤 상황에서든 감사할 일은 반드시 존재한다. 숨이 넘어가는 절박한 순간일지라도, 감사할 일을 찾는다면 언제나 발견할 수 있다.\n\n#인식의틀 #기억의재생 #감사함 #결핍의투사 #아뢰야식\n\n--- (구분선)\n\n[파일명: 있는그대로_자체와내용구분_수필.md]\n\n### **있는그대로_자체와내용구분_수필**\n\n#### **생각이 올라온 것과 생각의 내용은 다르다**\n\n'왜 올셀프인데 내 마음대로 돼야 되는 거 아니야?' — 이런 생각이 올라온다. '내 맘대로 하고 싶었다'는 **생각** 은", "source": "essay"}, {"id": "essay_585_cbb6aff73a", "text": "# **생각이 올라온 것과 생각의 내용은 다르다**\n\n'왜 올셀프인데 내 마음대로 돼야 되는 거 아니야?' — 이런 생각이 올라온다. '내 맘대로 하고 싶었다'는 **생각** 은 나한테서 올라온 거다. 그 생각은 맞다. 그런데 생각의 **내용** — '내 맘대로 하고 싶다' 하는 내용은 내가 아니라는 거다. 그거는 **망상** 이다. **생각이 올라온 것은 나를 증명한다. 하지만 생각이 지칭하는 내용은 망상이다.** 생각을 쫓아가면 안 된다.\n\n#### **감정과 느낌도 마찬가지다**\n\n어떤 **감정** 이 올라온다. 감정이 올라오는 것은 나를 증명하는 거다. 그런데 거기다 **의미를 부여** 한다. '이 감정은 어떻다 저떻다' — 이렇게 의미를 부여하는 것은 감정이 아니다. 감정의 에너지가 아니다. **느낌** 도 마찬가지다. 어떤 느낌이 올라오는데 거기다 '이건 외로움이다', '두려움이다', '괴로움이다' — 이렇게 붙이면 그거는 다 망상이다. 내 생각이 그렇게 의미를 부여하는 거다.\n\n#### **있는 그대로를 받아들인다는 것**\n\n**있는 그대로를 받아들이라는 것은 자체를 받아들이라는 거지, 내용을 받아들이라는 게 아니다.**\n\n내용은 내가 지어낸 거다. 내 속에서 올라온 것과 내가 거기다 붙인 것 — 이 차이를 구분할 수 있어야 한다. 생각이 올라온 것 — 그건 나다. 감정이 올라온 것 — 그것도 나다. 느낌이 올라온 것 —", "source": "essay"}, {"id": "essay_586_1f14e8d54d", "text": "다. 내 속에서 올라온 것과 내가 거기다 붙인 것 — 이 차이를 구분할 수 있어야 한다. 생각이 올라온 것 — 그건 나다. 감정이 올라온 것 — 그것도 나다. 느낌이 올라온 것 — 그것도 나다. 그냥 느낌은 느낌대로 느끼면 된다. 거기다 이름을 붙이고 의미를 부여하는 순간 내용물이 되고, 그 내용물을 쫓아가게 된다. **있는 그대로를 느끼라는 것은 자체에 머무는 것이다.** #있는그대로 #자체와내용 #망상 #올셀프 #느낌 #감정\n\n--- (구분선)\n\n[파일명: 자력_자전거_수필.md]\n\n### **자력_자전거_수필**\n\n#### **아무도 일으켜줄 사람이 없는 시대**\n\n오늘날 가족이라고 해봤자 대부분이 부부거나 1인 가구다. 부부라면 한 사람이 넘어졌을 때 다른 한 사람이 세워줄 수 있다. 그런데 혼자 사는 사람이 넘어졌다면 스스로 일어날 수밖에 없다. 아주 상황이 다급할 때는 외부 전문가의 도움을 받아야 한다. 그러나 그렇게 다급한 상황이 아니라면, 결국 나를 일으켜 줄 사람은 나밖에 없다. 공동체가 무너져 버렸기 때문이다. 부모들도 자기 살기 바쁘고, 형제들은 요즘 세상에서 서로 경쟁 관계로 보는 경우가 많다. 자기 자식들 챙기기에도 벅차다. 세상이 그런 식으로 돼 있다.\n\n---\n\n#### **일어선 나가 쓰러진 나를 일으킨다**\n\n그렇다면 어떻게 할 것인가. **일어선 나를 상정하는 것이다.** 일어났을 때의 나를 생각하면서", "source": "essay"}, {"id": "essay_587_e2bb99917f", "text": "런 식으로 돼 있다.\n\n---\n\n#### **일어선 나가 쓰러진 나를 일으킨다**\n\n그렇다면 어떻게 할 것인가. **일어선 나를 상정하는 것이다.** 일어났을 때의 나를 생각하면서, 지금 쓰러진 나를 일으켜 세워줘야 한다. 조금이라도 희망적인 나, 일어섰을 때의 나가 지금 이 나를 일으켜 줄 수밖에 없다.\n\n같이 주저앉아 있으면 아무도 일으켜줄 사람이 없다. 둘 다 넘어져 있으면 안 된다는 것이다.\n\n---\n\n#### **불안과 씨름하면 계속 넘어진 자리에 있는 것이다**\n\n불안이 나를 일으켜 세울 것 같으면 계속 불안해도 된다. 그런데 불안은 이미 내가 넘어진 자리다. 불안은 나를 일으켜 세우지 못한다. 불안을 상대하고 씨름하고 있으면 나는 계속 넘어진 위치밖에 가질 수가 없다. 불안하지 않다는 것이 아니다. **불안을 마주쳐서 그것과 씨름하고 있으면 안 된다는 것이다.** 불안의 반대 방향을 보든가, 아니면 불안을 상대하지 말고 슬쩍 옆으로 피해야 한다. 어쨌든 조금이라도 움직여야 한다. 조금이라도 앞으로 전진해 나가는 것, 그것이 불안을 이길 수 있는 방법이다.\n\n---\n\n#### **자전거는 발을 저어야 쓰러지지 않는다**\n\n자전거를 타고 가면서 넘어질까 봐 불안하다. 그 불안에 우왕좌왕해버리면 오히려 더 넘어진다. 그런데 불안해도 계속 발을 저어서 조금이라도 움직이면 속도가 붙고, 오히려 자전거가 쓰러지지 않고 간다. **삶", "source": "essay"}, {"id": "essay_588_9feb96cb71", "text": "질까 봐 불안하다. 그 불안에 우왕좌왕해버리면 오히려 더 넘어진다. 그런데 불안해도 계속 발을 저어서 조금이라도 움직이면 속도가 붙고, 오히려 자전거가 쓰러지지 않고 간다. **삶도 그렇다.** 멈추지 않는다면 발을 저어야 한다. 불안해도 발을 저어야 한다. 그리고 자전거 핸들 손잡이는 양쪽에 있다. 한 사람만 한쪽으로 틀면 안 된다. 제자리에서만 맴돌게 된다. 한 사람은 가만히 있고 한 사람만 발을 움직이면 자전거는 앞으로 나가지 못한다. 한쪽이 불안해서 안 움직이려 하고 한쪽만 페달을 밟아서는 목적지까지 갈 수 없다. **같이 발을 저어야 한다.** 한쪽이 힘을 내주면 한쪽이 따라가고, 계속 하다가 힘들면 반대쪽이 또 해주면 된다. 우리가 이 삶을 멈출 수 없다면, 그렇게 살아갈 수밖에 없다. #자력 #공동체 #불안 #자전거 #함께\n\n--- (구분선)\n\n[파일명: 자유의본질_SSF_Free_수필.md]\n\n### **자유의본질_SSF_Free_수필**\n\n#### **구름도 물도 자유롭지 않다**\n\n저 하늘의 구름이 자유로운가. 얼핏 보면 자유로울 것 같지만, 구름은 바람이나 대기의 흐름을 따르는 거다. 물이 자유로운가. 물은 중력이나 방향, 각도에 따라서 움직인다. 그러니까 **자유로움이 자연스러운 건 사실이 아니다.** 우리가 자유롭다고 생각하는 것은 자유롭지 않은 것을 전제로 하기 때문이다. 뭔가에 매여 있었으니까, 그거에서 벗", "source": "essay"}, {"id": "essay_589_fe2d3e05b3", "text": "움직인다. 그러니까 **자유로움이 자연스러운 건 사실이 아니다.** 우리가 자유롭다고 생각하는 것은 자유롭지 않은 것을 전제로 하기 때문이다. 뭔가에 매여 있었으니까, 그거에서 벗어남이 곧 자유로움인 것 아닌가.\n\n#### **진정한 자유는 초월이다**\n\n그런데 한편으로 보면 우리가 말하는 진정한 자유로움은 **자유롭다, 안 자유롭다를 떠난 것** 이다. 자유로움과 자유롭지 않음을 넘어선 것. 그것이 없는 것이 진정한 자유로움이다. 일반 사람들이 얘기하는 자유로움은 자유롭지 않음에서 벗어나는 것이다. **진정한 자유로움이라는 거는 자유롭다, 자유롭지 않다를 초월한 자유로움이다.** 우리가 자유를 뭔가에 대해서 얘기한다는 것은 이미 자유롭지 못한 것을 전제로 하고 있다. 자유민주주의를 해야 한다고 하면 벌써 자유롭지 않은 상황이 있다는 것을 전제로 한 자유다. 그 자유는 진정한 자유로움이 될 수 없다.\n\n#### **자유는 얻는 것이 아니다**\n\n우리가 추구하는 것이 느림(Slow), 단순함(Simple), 그리고 자유로움(Free)이다. 그 자유라는 것이 어떤 **매여 있음으로부터 풀려나는 것이 아니다.** 그냥 **있는 그대로일 수밖에 없다는 것** 이다. 내가 획득해야 될, 새로 얻어야 될 자유로움이 아니다. 사람들이 '아, 내가 자유를 얻어야 된다'고 생각한다. 그래서 자유롭게 한다고 내 마음대로 막 굴기도 한다. 그게 자유는", "source": "essay"}, {"id": "essay_590_fbf49477ff", "text": "내가 획득해야 될, 새로 얻어야 될 자유로움이 아니다. 사람들이 '아, 내가 자유를 얻어야 된다'고 생각한다. 그래서 자유롭게 한다고 내 마음대로 막 굴기도 한다. 그게 자유는 아니다. **자유롭다는 것은 한편으로 보면 그 관계 속에서의 결을 따르는 것일 수도 있다.** 구름이 바람을 따르고, 물이 중력을 따르듯이 — **거스르지 않는 것.** 그런 게 자유로움일 수 있다. 내 맘대로 하는 게 자유로움이 아니다. #자유 #SSF #Free #올셀프 #거스르지않음 #있는그대로\n\n--- (구분선)\n\n[파일명: 잠재태와의식_잎과나무의순환_수필.md]\n\n### **잠재태와의식_나뭇잎과나무_수필**\n\n#### **통으로 있는 잠재태**\n\n우주는 딱딱딱 고정된 것들의 집합이 아니다. **잠재태, 가능태로 존재하는 것이다.** 씨앗이 연기적인 조건을 만나면 언제든지 싹을 틔우듯, 모든 것이 그렇게 잠재적으로 있다. 어떤 씨앗이 터질지는 선택할 수 있다. 그런데 선택만으로 되는 것이 아니다. 외부적인 조건도 맞아야 한다. 그것이 운이다. 운칠기삼이라고 하는 이유가 거기 있다.\n\n---\n\n#### **시간이 흐르는 것이 아니라 변화가 있는 것이다**\n\n서양 철학은 과거에서 미래로 시간이 흐른다고 생각한다. 그런데 아니다. **변화가 있기 때문에 시간이 생기는 것이다.** 변화가 없다면 시간도 없다. 깊이 잠들 때 시간이 없게 느껴지는 이유가 그것이", "source": "essay"}, {"id": "essay_591_2457d0cf4e", "text": "미래로 시간이 흐른다고 생각한다. 그런데 아니다. **변화가 있기 때문에 시간이 생기는 것이다.** 변화가 없다면 시간도 없다. 깊이 잠들 때 시간이 없게 느껴지는 이유가 그것이다. 매 순간은 잠재태로 있다가, 우리 의식과 만나서 합일이 되면 현실 세계로 드러난다. 기쁘다, 괴롭다 하는 것은 우리가 하나의 지점을 통과하면서 보는 시점이다. 육신에서 바라보는 한 관점이다.\n\n컴퓨터 화면에서 영상이 펼쳐진다. 그런데 화면에는 지나온 장면이 없다. **늘 지금 여기 이 장면만 있다.** 특정 화소가 빨간불, 파란불, 노란불이 들어왔다 꺼지면서 나무가 나타나고 꽃이 나타난다. 꽃이 지나가는 것이 아니라, 매 순간 드러났다 사라지는 것이다.\n\n---\n\n#### **의식은 젖지 않는다**\n\n화면에 물이 나왔다. 그렇다고 화면이 젖는가? 아니다. 보고 있다는 이것은 젖지 않는다. 테이블에 물을 부으면 테이블이 젖는다. 닦으면 없어진다. 그런데 보고 있는 이것은 젖지 않았다. 닦인 것도 아니다. **항시 그렇게 있다.** 뭔가 나타났다 사라지는데, 보고 있는 이것은 그냥 있는 것이다. 컵이 나타났다가 사라지고 볼펜이 나타난다. 컵은 어디로 갔는가. 화면에서만 없어진 것이다. 의식이 없어진 것이 아니다. 개미가 보면 거대한 벽이고, 우주에서 보면 먼지다. 우리가 컵이라고 부르는 것일 뿐이다.\n\n**의식은 맛이 없다.** 그래서 모든 맛을 다 안다.", "source": "essay"}, {"id": "essay_592_a276b418f9", "text": "다. 의식이 없어진 것이 아니다. 개미가 보면 거대한 벽이고, 우주에서 보면 먼지다. 우리가 컵이라고 부르는 것일 뿐이다.\n\n**의식은 맛이 없다.** 그래서 모든 맛을 다 안다. 색이 없다. 그래서 모든 색이 드러난다. 화면에 색이 없기 때문에 모든 색을 보여줄 수 있듯이. 스피커에 소리가 없기 때문에 모든 소리가 나듯이. 의식은 공(空)이다. 없다고 할 수도 없다. 없다면 이렇게 드러나지 않으니까.\n\n---\n\n#### **별빛과 양자 얽힘**\n\n몇백 억 광년을 가야 볼 수 있는 별빛을 나는 여기서 즉각적으로 본다. 어떻게 가능한가. **그 별빛이 내 의식 안에 들어와 있으니까.** 내 의식이니까. 양자 얽힘이 그렇다. 하나를 둘로 나눠 무한히 먼 곳에 놓아도, 하나를 변화시키면 다른 하나도 즉각적으로 변한다. 시간 차가 없다. 우리 의식이 그렇다. 빛은 몇십 억 광년이 걸리지만, 의식은 즉각적이다. 과거는 사라진 것이 아니다. 잠재태로 있다. 미래도 잠재태로 있다. 모든 가능성이 다 표현될 수 있기 때문에 잠재태로 있는 것이다. 지금 내가 찌질하다고 미래도 찌질할 것이라 볼 수도 있다. 그러나 그것은 육신에 갇혀 있는 시점이다. 우리는 전체 의식이기도 하다.\n\n---\n\n#### **나뭇잎은 죽은 것이 아니다**\n\n나뭇잎이 가을에 떨어진다. 나뭇잎의 입장에서는 끝이다. '나는 떨어지면 완전히 끝이구나.' 그런데 나무의 입장에서 보면", "source": "essay"}, {"id": "essay_593_0fc4b00e91", "text": "다.\n\n---\n\n#### **나뭇잎은 죽은 것이 아니다**\n\n나뭇잎이 가을에 떨어진다. 나뭇잎의 입장에서는 끝이다. '나는 떨어지면 완전히 끝이구나.' 그런데 나무의 입장에서 보면 어떤가. 나무는 철 따라 순환한다. 떨어진 잎은 썩어서 나무의 양분이 되고, 내년 봄에 새 잎으로 나온다. 지난 가을에 떨어진 그 잎은 아니지만, 나무의 삶으로 보면 계속 이어지고 있다. **나뭇잎과 나무는 둘이 아니다.** 내가 나무임을 알면, 가을에 떨어지는 것을 받아들일 수 있다. 있는 그대로 자연스럽게. 삶을 그렇게 받아들이게 된다. 죽었다 살았다 할 수 없다. 그냥 순환이다. #잠재태 #의식은공 #나뭇잎과나무 #양자얽힘 #지금여기\n\n--- (구분선)\n\n#### [파일명: **`전체_의식과_상호_이해의_삶`**..md]\n\n음성 파일의 핵심 내용:\n\n- 올셀프는 전체 공간에 마음자리를 두는 것 / 생각·감정에 매이면 편협해짐\n- 공성(허공성), 우주의식으로 나를 넘어선 관점\n- 전체 의식을 공유하면서도 각자 구체적으로 살아감 → 상호 이해의 기반\n- 나와 타자는 가변적이지만 각자 분명히 존재함 (무아≠좌표 소멸)\n- 우주 팽창 비유(풍선의 점) → 중심은 나만이 아님\n- 관계로서 드러나는 존재 (컵·남편·부인 비유)\n- 아픔과 안 아픔의 연기적 관계 → 외로움조차 외롭지 않음을 전제\n- 관계 맺음 없이는 존재도 없음 (서양 이원론 비판)\n- 동적인 형", "source": "essay"}, {"id": "essay_594_47ba007eaa", "text": "로서 드러나는 존재 (컵·남편·부인 비유)\n- 아픔과 안 아픔의 연기적 관계 → 외로움조차 외롭지 않음을 전제\n- 관계 맺음 없이는 존재도 없음 (서양 이원론 비판)\n- 동적인 형태로서의 삶 (명사가 아닌 관계로 파악)\n\n**복원 수필:**\n\n마음을 자꾸 전체 공간으로 가져가야 한다. 생각이나 감정에 매여 살면, 올셀프임에도 불구하고 지엽적인 것에 매달리는 것이 된다. 그러면 삶이 작고 편협해질 수밖에 없다. 이미 거리가 생긴다. 올셀프에는 모두가 이 공간 안에 있다. 그런데 머릿속의 생각과 감정 차원에서만 살아버리면 서로 분리된 것이 된다. 그러니 이해와 소통이 일어나기 어렵고, 서로를 수용하기가 힘들어진다.\n\n그것을 공성(空性)이라 하기도 하고 허공성이라 하기도 한다. 우주의식으로 나를 넘어선 관점을 거기에 두어야 한다. 그러면 내 안에서 일어나는 생각들이 지혜로 쓰일 수 있다. 저 사람도 저렇게 아파할 수 있겠구나, 저 사람도 자기 생각 때문에 고통받을 수 있겠구나. 그러면 생각과 감정 차원에서 생각하면서도 상대방을 이해할 여지가 생긴다.\n\n전체 의식을 서로 공유하되, 각자 구체적으로 사는 부분도 분명히 있다. 나는 나이고 너는 너다. 그걸 없애버리고 완전히 무아로 해서 우주적 관점만 취해야 한다는 것이 아니다. 나의 좌표 자체를 없애야 한다는 것이 아니라, 때에 따라 내가 너의 관점을 취할 수도 있고 너도 나의 관점을 취할 수", "source": "essay"}, {"id": "essay_595_21b5dc7066", "text": "완전히 무아로 해서 우주적 관점만 취해야 한다는 것이 아니다. 나의 좌표 자체를 없애야 한다는 것이 아니라, 때에 따라 내가 너의 관점을 취할 수도 있고 너도 나의 관점을 취할 수도 있다는 것이다.\n\n우주는 한 점에서 터지는 것이 아니라, 공간 자체가 팽창하는 것이다. 풍선에 점을 찍어놓으면 바람이 불어감에 따라 점들 사이가 멀어진다. 나에서만 멀어지는 것이 아니라 서로가 함께 멀어지고 있다. 나만이 우주의 중심이 아니다.\n\n결국 이것은 관계다. 관계로서 내가 드러난다. 컵이 컵이 되는 것은 내가 거기에 물을 따라 마시는 관계가 이루어지기 때문이다. 그 관계 맺음 없이는 컵도 없고 나도 없다. 나는 상호작용 속에서 비로소 당신의 남편이 되고, 당신은 나의 부인이 된다. 대상이 없으면 나도 존재할 수 없다.\n\n아픔이 있기 때문에 안 아픔이 있다는 것을 안다. 외롭다는 것도 외롭지 않음을 이미 전제한다. 오로지 외롭기만 하다면 외로움이 무엇인지조차 모를 것이다. 내 안에 베이스로 외롭지 않은 부분이 있기 때문에, 그것이 외로움으로 드러나는 것이다. 그러니 외로움을 느낀다면 그것은 관계성을 회복하라는 신호다. 꼭 타인이 아니더라도, 내 안의 소외된 부분과 연결을 시도해야 한다.\n\n`#전체의식` `#공성` `#관계로드러나는존재` `#연기` `#올셀프`\n\n--- (구분선)\n\n[파일명: 전체그림_아픔과안아픔_수필.md]\n\n### **전체그림_아", "source": "essay"}, {"id": "essay_596_92213c9d58", "text": "시도해야 한다.\n\n`#전체의식` `#공성` `#관계로드러나는존재` `#연기` `#올셀프`\n\n--- (구분선)\n\n[파일명: 전체그림_아픔과안아픔_수필.md]\n\n### **전체그림_아픔과안아픔_수필**\n\n#### **한 부분만 보고 불행하다 한다**\n\n그림이 있다. 산도 있고 물도 있고 나무도 있고 새도 있다. 그런데 이 많은 것 중에서 한 부분이 거슬린다. 그러면 딱 요 한 부분만 잡고 '나는 불행하다' 이렇게 판단한다. 그 시점 이외의 많은 요소들은 보지 않는다. 몸이 아프면 아픈 그 한 곳에만 집중된다. 이빨이 아프면 이빨이 아프지 않은 나머지 부분들은 있는 것인데. 전체가 다 아프면 이빨이 아프다고는 못 느낀다. 다 아픈 거니까. **이빨이 아프다는 느낌 자체가 이미 나머지가 안 아프다는 것을 전제한다.** 관점을 조금 더 확장시켜 보면 — 지금 아픈 곳도 나머지 아프지 않은 부분이 더 많다. 하필 요 부분이 나한테 드러나는 거다. 그것도 왜 하필 드러나느냐 — 전체성을 깨닫게 하는 하나의 방편일 수 있다.\n\n#### **아픔은 안 아픔 속에서 드러난다**\n\n**아픔은 안 아픔 속에서 드러나는 거다.** 안 아픔 때문에 아픔이 드러나는 거다. 그렇다면 여기에 희망적인 메시지가 있다. 안 아픔이라는 기반 속에서 아픔이 드러났으니까, 언제고 다시 안 아픔으로 돌아갈 수 있다는 거다.\n\n아픔이 딱 고정되어 영원히 지속된다고 보면 견딜", "source": "essay"}, {"id": "essay_597_f092d0350d", "text": "기에 희망적인 메시지가 있다. 안 아픔이라는 기반 속에서 아픔이 드러났으니까, 언제고 다시 안 아픔으로 돌아갈 수 있다는 거다.\n\n아픔이 딱 고정되어 영원히 지속된다고 보면 견딜 수가 없다. 하지만 베이스가 안 아픔인데 거기서 드러난 아픔이기 때문에, 다시 안 아파질 수 있다. 그게 삶의 역동이다. 아픔과 안 아픔을 오고 가면서 앞으로 나아가는 거다. 아픔이라는 게 그러면 내가 뭘 조심해야 되겠구나 — 그런 가르침을 주는 거다. 그것을 통해서 성장이 일어나고, 배움이 일어난다.\n\n#### **아픔을 안 아픔 속으로 끌어안아야 한다**\n\n안 아픔이 따로, 아픔이 따로 존재해서 내가 아픔을 상대해야 되는 게 아니다. **이미 안 아픔 속에 아픔이 있었구나** — 그것을 받아들여 주는 거다. 촛불이 있었다는 것은 이미 베이스로 초가 있었다는 걸 아는 것처럼. 아픔이 있다는 거는 그것을 둘러싼 주위에 안 아픔이 있었다는 거다. 아픔을 따로 떨어뜨려 놓으면 아픔이라는 존재 자체도 고통스럽고, 그것을 상대하는 나 자신도 고통스럽다. 얘가 원래 있던 자리로 찾아주면 아픔도 기꺼이 견뎌낼 수 있다. 아픔이 있기 때문에 안 아픔이 있다는 것을 안다. 안 아픈 상태가 사실 굉장히 모든 행복의 원천이구나 — 그것을 아픔을 통해서 배우는 거다.\n\n물론 아주 심각한 병이나 극심한 트라우마는 예외다. 그러나 일상에서 느끼는 몸의 불편함이나 아픔은 안 아픈 많", "source": "essay"}, {"id": "essay_598_9dac376ddb", "text": "장히 모든 행복의 원천이구나 — 그것을 아픔을 통해서 배우는 거다.\n\n물론 아주 심각한 병이나 극심한 트라우마는 예외다. 그러나 일상에서 느끼는 몸의 불편함이나 아픔은 안 아픈 많은 것들이 있어야 비로소 느껴지는 것이다.\n\n몸은 억울하다. 주인이 자신을 보듬어 주기를 바라는데, 안으로든 밖으로든 스트레스만 가해진다. 몸은 편안함과 온전함 속으로 돌아가고 싶다. 그것이 자신이 나왔던 자리이기 때문이다. 몸이 보내는 아픔의 신호는 그 자리로 다시 돌아가 달라는 청이다. 그 신호를 제대로 받아들이지 않으면, 몸은 계속 아픔 속에서 맴돌 수밖에 없다.\n\n#아픔과안아픔 #전체그림 #연기 #희망 #올셀프\n\n--- (구분선)\n\n[파일명: 전체성개체성_소유의굴레_수필.md]\n\n### **전체성개체성_소유의굴레_수필**\n\n#### **잠들어도 사라지지 않는 것**\n\n잠을 자도 있다. 죽어도 있다. 아침에 눈을 뜨면 어제와 똑같이 이대로 드러나 있다. **전체성** 이란 그런 것이다. 내가 인식하든 하지 않든, 그냥 있는 그대로 있는 실상. 나의 인식이 깜빡이는 동안에도 이 배경 자체는 꺼지지 않는다. 그러니까 나라는 것은 무엇인가. 이 전체 안에서 인식이 발생하는 어떤 특정한 포인트다. 벚나무에 수천 수만 송이의 벚꽃이 피어 있는데, 그 벚꽃 하나를 나라고 생각하는 것이다. 벚꽃 하나만. 그 순간 나머지 수천 수만 송이는 전부 다 남의 것이 된다.", "source": "essay"}, {"id": "essay_599_40d5914b7c", "text": "한 포인트다. 벚나무에 수천 수만 송이의 벚꽃이 피어 있는데, 그 벚꽃 하나를 나라고 생각하는 것이다. 벚꽃 하나만. 그 순간 나머지 수천 수만 송이는 전부 다 남의 것이 된다. **전체성에서 개체성으로 이렇게 넘어와 버리는 것이다.** 통 안에 갇히는 것이다. 그런데 내가 다른 꽃송이와 별개가 아니고, 나는 전체 벚나무에 핀 벚꽃이구나, 이 통으로가 나구나, 그렇게 **전체성을 회복하면 내가 이제 통 바깥에 있게 된다.** 모양은 천차만별로 바뀌고, 이거 드러났다 저거 들었다 놨다 하지만, 그냥 있는 그대로 보면 아무 일이 없다. 나의 인식이 그냥 이거 인식됐다 저거 인식됐다 하면서 꼬리표를 붙이고 이건 잘 된 거야 못된 거야, 이러니까 온갖 가지 일이 펼쳐진다고 보는 것이지, 지금 그냥 드러나는 것 자체는 그냥 그대로다.\n\n#### **개념화와 책임**\n\n길에서 차들이 지나간다. 저것을 차라고 규정 짓지 않고 그냥 보면 어떻게 될까. 차라고 규정 짓지 않으면, 저건 그냥 보여지는 것이다. 그냥 배경이다. 내가 저거 차야, 하고 규정하는 순간 차인 것이다. 그런데 규정이 일어나는 순간 무언가가 같이 따라온다. 저것은 좋은 차, 저것은 비싼 차. 그리고 나도 저런 좋은 차를 끌어야 해. 전체성에서 특정한 것을 개념화시킨다는 상(相)을 꺼낼 때, 동시에 자기도 거기에 전체성에서 같이 떨어져 나간다. 거기에 매몰이 되면서 전체성에서 떨어", "source": "essay"}, {"id": "essay_600_8bb38febe1", "text": "저런 좋은 차를 끌어야 해. 전체성에서 특정한 것을 개념화시킨다는 상(相)을 꺼낼 때, 동시에 자기도 거기에 전체성에서 같이 떨어져 나간다. 거기에 매몰이 되면서 전체성에서 떨어져 나오는 것이다. 그리고 이것이 핵심이다. **그거를 개념화시켜서 거기에 빠져버렸으니까 책임을 내가 다 져버린다는 것이다. 그래서 힘든 것이다. 내 책임이 되는 것이다.** 차가 좋은 차가 되건 나쁜 차가 되건, 내가 규정 지어버렸기 때문에, 그거에 대한 책임이 내가 개념화시킨 나의 인식에 따라붙는다. 저 차가 좋은 차고 나쁜 차고 나하고 원래는 관계없다. 근데 이제 그렇게 사로잡히면서 차에 대한 좋고 나쁨에 괜히 책임을 지면서 나 스스로가 괴롭고 막 이렇게 되는 것이다.\n\n#### **소유는 인식이다**\n\n내가 모든 것을 다 소유할 수 없는 입장이 되다 보니까, 그렇게 사로잡히는 것이 **결핍으로 느껴질 수밖에 없다.** 내가 다 소유할 수 없으니까. 세상 모든 것을 다 가질 수 있는 부를 가졌다고 해도 온 우주를 다 가질 수는 없다. 어차피 그런 방식으로 얻어지는 만족감은 결과적으로 결핍으로 느껴질 수밖에 없다. 내가 아무리 많이 가졌다고 생각해봤자 이 실상을 다 가질 수는 없다. 그것은 내가 가지고 있다는 개념일 뿐이기 때문이다. 예를 들어 산을 가지고 있다고 하자. 근데 그것을 내가 가지고 있다고 인식을 할 때만 그게 산인 것이다. 아니면 그냥 배경", "source": "essay"}, {"id": "essay_601_46d0e2affa", "text": "다. 그것은 내가 가지고 있다는 개념일 뿐이기 때문이다. 예를 들어 산을 가지고 있다고 하자. 근데 그것을 내가 가지고 있다고 인식을 할 때만 그게 산인 것이다. 아니면 그냥 배경이다. 소유라는 것이 사실은 그런 것이다. 내가 그것을 인식할 때만 내 것으로 인식이 되는 것이다. 그러면 이제 내가 그걸 내 거라고 인식하기 위해서는 **내가 거기에 계속 그걸 개념화시켜서 거기에 사로잡혀 있어야 한다.** 그러니까 많이 가지면 많이 가질수록 오히려 삶이 더 피곤해진다. 왜냐하면 그걸 계속 내가 인식해야 하기 때문이다. 아니면 배경에 그냥 묻혀버린다. 내가 갖고 있어도 내가 갖고 있다고 인식을 해야 갖고 있는 것이다.\n\n책갈피에 2만 원이 끼어 있었던 적이 있다. 거의 10년 동안 있었는데 있다는 사실을 몰랐다. 그게 내 돈인가, 내 돈이 아닌가. **인식이 됐을 때 내 것이 된다.**\n\n#### **갑질의 구조, 프로포폴의 구조**\n\n내 거라는 것을 확인하려면 계속 확인해야 한다. 내가 사장이라면 내 거라는 걸 확인해야 한다. 직원들이 데면데면하면 안 된다. 확인하기 위해서 갑질을 하는 것이다. 계속 자기 것이라는 걸 인식되기 위해서. 그러니까 그게 엄청 피곤한 것이다. 우리가 볼 때는 자유로울 것 같은데, 엄청나게 많은 개념에 묶여 있어야 하니까 엄청 피곤하다. 이재용이 프로포폴을 쓰게 된 것도 그것이다. **인식으로부터 제발 자유로워지", "source": "essay"}, {"id": "essay_602_7be7b1a13b", "text": "것이다. 우리가 볼 때는 자유로울 것 같은데, 엄청나게 많은 개념에 묶여 있어야 하니까 엄청 피곤하다. 이재용이 프로포폴을 쓰게 된 것도 그것이다. **인식으로부터 제발 자유로워지고 싶은 것이다.** 전 세계의 공장 라인들, 전 세계 스마트폰, 전 세계 반도체, 거기에 다 자기 인식을 두어야 한다. 왜냐하면 그게 내 것이어야 하니까. 내 것이라고 내 스스로 주장해야 하고, 남들도 인정하게끔 법적으로든 어떻게든 장치를 마련해야 하고, 그것을 인정하는 사람들을 주위에 두어야 한다. 어느 날 갑자기 모두가 누구세요, 라고 해버리면 큰일 나는 것이다. 그것을 잠들 때도 놓치고 싶지 않다. 그게 자기 존재 기반이라고 생각하니까.\n\n스님들이 무소유를 얘기하는 것이 그것이다. **물건을 가지지 말라는 게 아니다. 저건 내 것이다, 하는 인식을 너무 강력하게 갖고 있으면 괴롭다는 것을 아는 것이다.** 물건 자체를 얘기하는 게 아니고, 물건에 대한 인식, 그게 집착이다. 대행 스님이 말씀하셨다. 돈을 벌지 말라는 게 아니고, 사랑을 하지 말라는 게 아니라고. 돈도 벌고 사랑도 해. 한마음으로 다 그냥 돌아가는 건데, 특정하게 이건 내 거다, 하고 꼬리표를 붙여갖고 스스로 괴롭게 생각하지 말라는 것이다. **자기가 인식한 것에 자기가 매이게 된다.** 인식하는 순간 통이 생기고, 그 통 안에 자기가 갇힌다. 올셀프를 한다는 것은 특정 인식에 매여 있", "source": "essay"}, {"id": "essay_603_8f2d9b9b3a", "text": "괴롭게 생각하지 말라는 것이다. **자기가 인식한 것에 자기가 매이게 된다.** 인식하는 순간 통이 생기고, 그 통 안에 자기가 갇힌다. 올셀프를 한다는 것은 특정 인식에 매여 있지 않다는 것이다. 어떤 감정이 됐건 생각이 됐건 느낌이 됐건, 거기에 사로잡혀 있다면 그것 자체가 또 통이다. 인식의 통, 생각의 통, 감정의 통. 그것들이 모여 하나의 통이 되고, 그 통을 나라고 생각하는 것이다. 벚나무 전체가 다 나인데, 꽃송이 하나를 나라고 잘라낸 순간부터 나머지 수천 송이는 결핍이 된다.\n\n내 것이 많다는 것은 그만큼 많은 것을 인식해야 한다는 뜻이다. 주의를 주어야 하고, 집중을 유지해야 한다. 많이 가질수록 에너지를 더 많이 빼앗기는 이유가 거기에 있다.\n\n#전체성 #개체성 #소유 #집착 #올셀프\n\n--- (구분선)\n\n[파일명: 전환여정_리더십조율_율려조율_수필.md]\n\n### **전환여정_리더십조율_율려조율_수필**\n\n#### **조율이라는 방법론**\n\n전환과 여정을 이야기했다면, 그것을 어떻게 실현할 것인가 하는 방법론적인 것이 있다. 그게 **'조율'**이다. 조화일 수도 있고, 하모니(Harmony)이기도 하다. 어울림이다. 이 하모니는 개인의 삶에서도 있어야 하고, 관계 속에서도 있어야 한다. 예를 들어 내가 리더이고 내 밑에 조직원들이 있다고 하자. 어떤 사람이 내가 생각하는 만큼 성과를 못 낸다고 해도, 하모니적인", "source": "essay"}, {"id": "essay_604_15f3b91460", "text": "삶에서도 있어야 하고, 관계 속에서도 있어야 한다. 예를 들어 내가 리더이고 내 밑에 조직원들이 있다고 하자. 어떤 사람이 내가 생각하는 만큼 성과를 못 낸다고 해도, 하모니적인 관점에서 보면 내가 그 사람과 가장 어울리는 단계로 맞춰서 내려가서 공명이 일어나게끔 내가 움직일 수 있다. 조율이 어긋난 것이지, 그 사람이 잘못된 것이 아닌 것이다. '도'라는 음이 높게 잡혀 있으면, 나머지 레, 미, 파도 그 음에 맞춰서 조율해주면 된다. '아니 너 왜 이렇게 도가 낮아?' 이렇게 얘기할 부분이 아니다. 도가 낮으면 나머지 것들을 조율해서 낮추면 된다. 하모니가 가장 잘 일어나게끔. 그러면 이제 거기에는 템포, 음의 높낮이와 박자, 리듬이 있지 않은가. 이것을 다 리더가 생각해볼 수 있는 문제다. 박자라는 것도 절대적인 빠르고 늦고가 어디 있는가. 박자는 앞 음과 그다음 음, 또 그다음 음 사이의 관계다. 프로세스나 시스템도 마찬가지다. 울림통이 필요하듯, 하모니가 일어날 수 있도록 하는 환경 자체도 조율의 영역이다.\n\n#### **율려(律呂), 창조성의 원천**\n\n왜 그러면 조율이 필요한가? 그냥 몰아치고 잘라버리면 되지 않는가. 여기서 동양 사상의 **율려(律呂)**로 들어가야 한다. 율(律)은 양적인 것이고, 려(呂)는 음적인 것이다. 낮이 있으니까 밤이 있고, 남자가 있으니까 여자가 있고, 그래서 아기가 태어나는 것 아닌가. 낮", "source": "essay"}, {"id": "essay_605_aa2c21d716", "text": "(律呂)**로 들어가야 한다. 율(律)은 양적인 것이고, 려(呂)는 음적인 것이다. 낮이 있으니까 밤이 있고, 남자가 있으니까 여자가 있고, 그래서 아기가 태어나는 것 아닌가. 낮밤이 있으니까 만물이 소생한다. 우주적인 차원에서의 음양을 율려라고 한다. 그것은 왜냐하면, **단차** 가 있기 때문이다. 음이 높은 음이 있고 낮은 음이 있다. 그 차이 때문에 조화가 발생한다. 같은 음의 높이라면 밋밋할 수밖에 없다. 거기엔 창조가 없다. 단차가 발생되니까, 그 단차에 의해서 아름다운 하모니가 울리는 창조가 일어난다. 물이 높은 곳에서 아래로 떨어지면 에너지가 발생한다. 낮은 데서 조금 떨어지면 작은 에너지, 높은 데서 크게 떨어지면 강력한 에너지. 단차가 클수록 강력한 에너지가 발생한다. **파워풀한 것도 여기서 나온다.** 크리에이티브한 것도, 파워풀한 것도. 조직의 단차는 무엇인가. 거기에 비전과 미션이 들어간다. 그것이 율려가 조직에서 작동하는 방식이다.\n\n불교의 **진공묘유(眞空妙有)**도 같은 이야기다. 진공인데 거기서 온갖 것이 다 나온다. 허공이라는 아무것도 없는 곳에서 눈 떠보니까 온갖 것이 다 드러난다. 비어 있기 때문에 오히려 온갖 조화가 나오는 것이다. 꽉 차 있으면 더 이상 나올 것이 없다. 율려를 동양적으로 풀면 진공묘유가 된다.\n\n#### **하모니 리더십**\n\n지금 우리는 율려를 잊어버렸다. 우리나라 사람들이", "source": "essay"}, {"id": "essay_606_b1254b2946", "text": "오는 것이다. 꽉 차 있으면 더 이상 나올 것이 없다. 율려를 동양적으로 풀면 진공묘유가 된다.\n\n#### **하모니 리더십**\n\n지금 우리는 율려를 잊어버렸다. 우리나라 사람들이 일할 때는 리듬과 박자가 있었다. 템포가 있었다. 그것 때문에 힘든 일도 힘들지 않게 할 수 있었다. 지금은 그것을 잊어버렸다. 몰아치기만 한다. 채찍질만 한다. 성과 안 나오면 자른다. 이 조율과 하모니를 다 잃어버린 것이다. **율려가 기업 경영에서 사라져버린 것이다.** 양이면 양만 밀어붙이는 것이 아니다. 몰아치는 것이 있으면 그에 대한 인센티브라든가 지지, 격려라든가 이런 것도 음적으로 하모니가 일어나도록 해줘야 한다. 하모니가 잘 일어나게끔 해줘야 한다. 그래야 조직원들의 에너지를 받고 공명이 일어나야 에너지가 발생된다. 한 방향으로만 가면 눈앞에 잠깐은 성과가 나는 것 같지만, 결과적으로 지속 가능성이 없다. 파워를 잃어버리기 때문이다. 비가 미친 듯이 계속 내려오면 잠겨버리듯이.\n\n리더십의 이름을 굳이 붙이자면 **'하모니 리더십'**이 될 것이다. 서번트 리더십, 코칭 리더십. 그 이름들 사이에서 율려에서 온 리더십이 있다. 조율적인 관점으로 팀을 보고, 여정이라는 눈으로 사람을 보고, 단차에서 에너지가 나온다는 것을 아는 리더십. 코칭으로 들어가면 이렇게 된다. 리더를 코칭할 때 미션 셀프나 비전 셀프로 상황을 보게 하고, 그 상태에서 말", "source": "essay"}, {"id": "essay_607_9686c75f61", "text": "눈으로 사람을 보고, 단차에서 에너지가 나온다는 것을 아는 리더십. 코칭으로 들어가면 이렇게 된다. 리더를 코칭할 때 미션 셀프나 비전 셀프로 상황을 보게 하고, 그 상태에서 말하게 해야 한다. '지금 이 사람이 어떤 여정을 가고 있는 것 같은가?' 이렇게 물으면 새로운 관점이 열린다. 지금 당장의 성과가 아니라 장기적인 시선, 여정이라는 시선으로 보게 된다. 그다음 '그렇다면 이것을 어떻게 조율하고 싶은가?'를 물으면 된다. 관계면 관계, 프로세스면 프로세스, 조직원이면 조직원을 어떻게 조율할 것인가. **비전 셀프의 눈으로 보고, 비전 셀프의 입으로 말하게** 하는 것이다. 여정을 보는 눈, 조율을 아는 손. 이것이 율려의 리더십이다. #율려 #조율 #하모니리더십 #진공묘유 #올셀프코칭\n\n--- (구분선)\n\n[파일명: 전환여정_리더십조율_전환여정_수필.md]\n\n### **전환여정_리더십조율_전환여정_수필**\n\n#### **변화가 아니라 전환이다**\n\n코칭에서는 마치 불문율처럼 고객이 원하는 대로 데려가야 하고, 무한정 성장해야 하며, 변화를 통해 지금의 내가 아닌 다른 모습이나 환경을 추구해야 한다고들 이야기한다. 하지만 올셀프 관점에서 본다면, **'변화'는 '전환'으로 바꿔야 한다.** 변화라는 것은 기존의 것을 바꿔서 새로운 모습으로 바뀌는 것이다. 그런데 **전환** 이라는 것은 기존에 있는 상태에서 관점이나 방향만 바꾸", "source": "essay"}, {"id": "essay_608_ee23dd7c85", "text": "변화'는 '전환'으로 바꿔야 한다.** 변화라는 것은 기존의 것을 바꿔서 새로운 모습으로 바뀌는 것이다. 그런데 **전환** 이라는 것은 기존에 있는 상태에서 관점이나 방향만 바꾸면 되는 것이다. 우리가 관점의 전환이라고 하지 않는가. 이것은 오히려 지금의 상태를 더 온전하게 보는 것이 전환이다. 그러니까 변화는 지금의 나를 부정하는 데서 출발하지만, 전환은 지금의 나를 온전히 받아들이는 데서 출발한다. 방향이 처음부터 다르다.\n\n#### **성장이 아니라 여정이다**\n\n또 하나, **'성장'이라는 부분은 '여정'으로 표현** 해야 한다. 내가 만약 꽃이라면, 꽃씨도 꽃이고, 꽃 줄기일 때도 꽃이고, 꽃이 피었을 때도 꽃이고, 열매를 맺었을 때도 꽃이고, 꽃이 졌을 때조차도 꽃이 꽃의 여정을 가고 있는 것이다. 내가 지금 아무리 힘들고 어려운 상황에 있을지언정, 이것은 나의 영적 삶을 살아가는 하나의 여정인 것이지, 무한정으로 막 성장해야 하는 그런 것이 아니다.\n\n그렇게 여정으로 볼 때는 잘 되고 못 되고가 없다. 왜냐하면 모든 경험이 다 내가 가는 삶의 여정의 한 부분이기 때문에, 지금의 내가 힘들고 어려운 부분이 있더라도 이것을 버리고 뭔가 새로운 변화를 취해서 바꿔야 하는 부분이 아닌 것이다. 씨앗이 싹을 틔웠다가 상황이 안 좋아서 죽을 수도 있다. 그래도 그건 실패한 삶이 아니다. 꽃의 여정을 가다가 그 갈 때까지 간 것이다", "source": "essay"}, {"id": "essay_609_13796a7dc7", "text": "를 취해서 바꿔야 하는 부분이 아닌 것이다. 씨앗이 싹을 틔웠다가 상황이 안 좋아서 죽을 수도 있다. 그래도 그건 실패한 삶이 아니다. 꽃의 여정을 가다가 그 갈 때까지 간 것이다. 꽃의 여정을 산 것이다. 꽃을 못 피웠더라도 실패한 삶이 아닌 것이다.\n\n#### **절대 수용, 절대 긍정**\n\n이렇게 여정으로 바라보게 되면, 지금 이 상황이나 자기 자신에 대해서 절대 수용과 절대 긍정을 할 수 있다. 지금 잘못돼 있고 나를 바꿔야 한다는 것이 아니다. 내 삶의 매 순간이 내가 가는 여정이라는 것이다. 그렇게 되면 조급함에서 한 발짝 물러나고 위안을 삼을 수 있다. 요즘 사람들에게는 그런 생각이 필요하다. **내 삶을 온전하게 끌어안는 사람은 다른 사람의 삶도 온전하게 끌어안을 수 있다.** 비전이나 미션이 있을 때, 그것을 향해 막 성장해 나가야 한다고 생각하기보다, 그것을 추구하는 여정이 된다면, 이루고 못 이루고는 그리 중요하지 않다. 왜냐하면 그것을 추구하면서 매일매일이 이미 그것을 이루는 삶이 되기 때문이다. 과정주의로 계속 추구하면 매일이 살아있는 여정이 된다.\n\n변화와 성장이라는 말 대신 **전환과 여정** . 이 두 단어가 코칭과 삶을 바라보는 관점을 통째로 바꿀 수 있다. #전환 #여정 #올셀프 #성장 #절대수용\n\n--- (구분선)\n\n[파일명: 점점을잇는스토리텔링_삶의허구성_수필.md]\n\n### **점점을잇는스토리텔링", "source": "essay"}, {"id": "essay_610_6b5aa828ea", "text": "관점을 통째로 바꿀 수 있다. #전환 #여정 #올셀프 #성장 #절대수용\n\n--- (구분선)\n\n[파일명: 점점을잇는스토리텔링_삶의허구성_수필.md]\n\n### **점점을잇는스토리텔링_삶의허구성_수필**\n\n#### **하늘의 별과 내 마음속 선**\n\n하늘에 별이 엄청나게 많다. 그 별들은 그냥 거기 있다. 근데 나는 마음속으로 선을 긋는다. '저건 곰자리다', '저건 국자다', '저건 호랑이다'. 그 선은 내가 그은 것이다. 별들 사이에 실제로 선이 있는 게 아니다. 그러고는 옆 사람에게 말한다. \"야, 저기 호랑이가 왜 안 보이냐?\" 그 사람은 나와는 다르게 선이 그어져 있을 수 있다. 그런데 나는 **강요** 를 하는 것이다. 내가 그은 선을 그가 보지 못한다고. 삶이 그렇다. **점점(點點)** , 과거로부터 이어진 사건이든, 기억이든, 그것들이 하늘의 별처럼 있다. 나는 그것들을 나름대로 이어 선을 긋는다. \"나는 과거에 이렇게 살았어\", \"나는 저런 사람이었어\", \"나는 호랑이였어, 쥐새끼였어.\" 그렇게 자기를 규정한다. 그 선을 가지고 지금 현재도 비교 판단하고, 미래도 \"이 선을 따라가면 그렇게 될 것이다\" 하고 판단한다. 그런데 그 선은 없다. 사실 내 마음속에 그린 것이다.\n\n그 없는 선을 붙들고 '그때 다르게 선택했더라면 어땠을까' 하고 생각한다. 그 선은 없었는데, 그 없는 선을 기준으로 후회하고 있는 거다.\n\n###", "source": "essay"}, {"id": "essay_611_3aa43a8d18", "text": "실 내 마음속에 그린 것이다.\n\n그 없는 선을 붙들고 '그때 다르게 선택했더라면 어땠을까' 하고 생각한다. 그 선은 없었는데, 그 없는 선을 기준으로 후회하고 있는 거다.\n\n#### **찰나에 일어났다 찰나에 사라진다**\n\n매 순간 실제로 벌어지는 것은 이것이다. **찰나생 찰나멸(刹那生 찰나멸)** . 찰나에 일어났다 찰나에 사라지고, 찰나에 일어났다 찰나에 사라진다. 그냥 점점, **빛나는 순간** 들만 있었을 뿐이다. 지금도 계속 일어나고 있다. 그것을 이어서 **스토리를 만드는 게 우리의 기억** 이다. 기억이 선을 긋는다. 그리고 그 선이 실제 한다고, 실제 했었다고 믿는다. 그 스토리 라인 위에서 \"지금 상황이 이렇다\", \"너는 이렇다\", \"나는 이렇다\", \"앞으로 이럴 것이다\", \"너는 이래야 된다\", \"나는 이래야 된다\"라고 이해한다. 새소리가 들린다. 저 새소리의 점점들을 이어 **스토리 라인을 만든다** . \"저 새는 짝을 못 만나서 저러나 보다.\" 그러면서 \"시끄럽네\", \"불쌍하네\" 한다. 그냥 새소리가 있을 뿐인데, 그게 이야기가 되어버린다. **이 삶이 꿈 같다고 하는 것이 달리 꿈 같다고 하는 게 아니다.** 꿈은 내용이 없다. 실제가 아니기 때문이다. 지나온 과거, 그것에 대한 내 평가, 이런 것들은 옆의 제삼자들이 볼 때는 **전혀 다르게 보일 수 있다.** 나는 나의 기억으로, 또 어디선가 주입된 관념으", "source": "essay"}, {"id": "essay_612_7c46103256", "text": "가 아니기 때문이다. 지나온 과거, 그것에 대한 내 평가, 이런 것들은 옆의 제삼자들이 볼 때는 **전혀 다르게 보일 수 있다.** 나는 나의 기억으로, 또 어디선가 주입된 관념으로 해석해낸 세상을 살고 있는 것이다.\n\n내가 그은 그 선은 애초에 근거가 없다. 근거 없이 그어놓은 것을 근거로 삼아, '지금 상황이 이렇다', '너는 이렇다', '앞으로 이럴 것이다' 하고 이해하는 거다. 스스로 그어놓은 선이 스스로를 심판한다.\n\n만약 북한에서 태어난 사람이 지금 나와 똑같이 대한민국에서 살고 있다면 얼마나 다르게 느끼겠는가. 나와 같은 상황을 전혀 다른 스토리 라인으로 해석할 것이다. 근거 없는 것이 **기준점** 이 되어버린 것이다.\n\n---\n\n#### **관념의 세계는 무한히 펼쳐진다**\n\n**아무 근거 없는 것** 을 기준으로 삼고, 그것을 점점 강화시켜 나간다. 그게 문제다. 부딪힐 수밖에 없다. 왜냐하면 **관념의 세계는 무한히 많이 펼쳐지기** 때문이다. 내가 그은 선, 내가 만든 스토리 라인, 거기서 파생되는 판단과 요구는 끝이 없다. 나의 스토리와 타인의 스토리가 만나면 당연히 부딪힌다. 서로 다른 선을 그어놓고, 서로의 선이 맞다고 주장하는 것이다. 점점들은 그냥 빛나는 순간들이다. 매 순간 찰나에 일어났다 사라질 뿐이다. 그것을 잇는 선은 내가 그은 것이다. 그 선을 기준으로 살아온 삶은 꿈의 세계 안에 있는 것이다.", "source": "essay"}, {"id": "essay_613_ae1429be02", "text": "이다. 점점들은 그냥 빛나는 순간들이다. 매 순간 찰나에 일어났다 사라질 뿐이다. 그것을 잇는 선은 내가 그은 것이다. 그 선을 기준으로 살아온 삶은 꿈의 세계 안에 있는 것이다.\n\n#올셀프 #셀프1 #스토리라인 #찰나생찰나멸 #점점 #허구성\n\n--- (구분선)\n\n[파일명: 정답강박_스토리가아닌소리로_수필.md]\n\n### **정답강박_스토리가아닌소리로_수필**\n\n#### **다음 질문을 생각하는 동안 놓치는 것**\n\n코치들에게 흔한 함정이 있다. 고객이 말하는 동안 고객을 듣는 게 아니라 **다음에 무슨 질문을 해야 하지?** 를 생각하고 있는 것이다. 회의에서 발표 순서를 기다릴 때 다른 사람 말을 듣지 않고 내가 할 말을 생각하는 것처럼. 코치도 코칭 과정에서 그렇게 한다. 고객의 언어적·비언어적 사인을 놓친다. 거기에 힌트가 있는데. 질문의 실마리가 거기에 있는데. 대신 예전에 배웠던 질문들을 머릿속에서 돌리면서 이 사람에게 맞는 것을 찾으려 한다. 그러니 안 맞는다. 고객이 원하는 것은 그게 아닌데, **코칭 프로세스라는 폼을 고객에게 주입시키려 하기 때문이다.** 스탠다드한 폼은 틀이다. 사람을 틀에 맞추려 하면 코칭이 일어나지 않는다.\n\n---\n\n#### **스토리를 따라가면 안 된다**\n\n고객은 장황하게 말한다. 울기도 하고 삼천포로 빠지기도 한다. 거기에는 스토리가 있다. 그런데 **스토리를 따라가면 안 된다.**\n\n그", "source": "essay"}, {"id": "essay_614_e02d15aa9a", "text": "#### **스토리를 따라가면 안 된다**\n\n고객은 장황하게 말한다. 울기도 하고 삼천포로 빠지기도 한다. 거기에는 스토리가 있다. 그런데 **스토리를 따라가면 안 된다.**\n\n그냥 지금 힘들다고 말하는 것이다. 그게 전부다. 코칭이든 티칭이든 컨설팅이든, 모든 자리에서 핵심은 같다. 이 사람이 지금 무엇을 느끼고 있느냐. 스토리가 아니라 그 느낌이다.\n\n스토리는 다분히 자의적이다. 고객이 자기에게 유리한 쪽으로 이야기하는 것이다. 코치가 스토리를 따라가면 스토리를 해결해 주려 한다. 스토리에 솔루션을 주려 한다. **소리에 답이 있다.** 소리에는 사람의 혼이 있다. 고객의 목소리 톤, 감정, 욕구. 그것에 집중해야 한다. 스토리가 아니라 소리를. 고객이 장황하게 이야기할 때 코치가 물어야 하는 것은 이것이다. **\"지금 당신이 원하는 게 뭐냐? 뭘 하고 싶은 거냐?\"** 욕구를 물어주는 것이다.\n\n---\n\n#### **정답 강박에서 벗어나야 한다**\n\n우리는 정답을 찾도록 훈련받았다. 부모도, 학교도, 사회도 모범 답안을 상정해 놓고 그 틀에 사람을 맞추려 한다. 코칭 교육도 그렇게 이루어진다. 그래서 코치들이 교육을 많이 받아도 코칭을 제대로 못 하는 이유가 여기 있다. **배운 대로만 하기 때문이다.** 유대인 부모는 아이에게 \"네가 생각하는 건 뭐야? 왜 그렇게 생각했어?\"라고 묻는다고 한다. 거기에는 정답이 없다. 아이가", "source": "essay"}, {"id": "essay_615_4fca33381e", "text": "이유가 여기 있다. **배운 대로만 하기 때문이다.** 유대인 부모는 아이에게 \"네가 생각하는 건 뭐야? 왜 그렇게 생각했어?\"라고 묻는다고 한다. 거기에는 정답이 없다. 아이가 스스로 생각하게 한다. 우리는 반대다. 정답을 정해 놓고 그쪽으로 이끈다. **이것은 잠재력을 깎아먹는다.**\n\n티 나지 않게 자연스럽게 바꿔나가야 한다. 대번에 바꾸면 혼란이 온다. 집중 포인트를 서서히 이동하는 것이다. 솔루션을 찾으려는 시선에서, 지금 이 사람의 감정과 욕구로.\n\n우리나라는 코칭이 스며들기 어려운 문화적 벽이 있다고 할 수 있다. 그런데 반대로 보면, 개발할 땅이 그만큼 넓다는 뜻이다. 이미 잘 되어 있는 곳에는 비집고 들어갈 틈이 없다. 아직 아무도 제대로 심지 않은 밭이 있다는 거다.\n\n코치들이 코칭을 제대로 못 하는 이유가 거기 있다. 배운 대로만 한다. 이너 게임도 알고 있다. 알고 있으면서도 학습된 대로 돌아간다.\n\n#### **내가 알고 있는 것을 내려놓아야 한다**\n\n**셀프 1이 갖고 있는 정답에 셀프 2를 자꾸 맞추는 것이다.** 우리 의식은 굉장히 넓은 존재인데, 우리가 가진 개념과 틀로 그것을 가두려 한다. **내가 알고 있던 코칭 스킬을 다 내려놓아야 한다.** 내려놓고 이 사람에게 집중할 때, 오히려 거기서 질문할 것이 나온다. 이 사람의 이야기를 잘 들었을 때가 더 질문할 게 있었다. 스킬이 아니라 집중이다. #", "source": "essay"}, {"id": "essay_616_7dc8565f8d", "text": "내려놓아야 한다.** 내려놓고 이 사람에게 집중할 때, 오히려 거기서 질문할 것이 나온다. 이 사람의 이야기를 잘 들었을 때가 더 질문할 게 있었다. 스킬이 아니라 집중이다. #정답강박 #스토리가아닌소리 #경청 #셀프1과셀프2 #코칭함정\n\n--- (구분선)\n\n[파일명: 정체성의허구_고통의뿌리_수필.md]\n\n### **정체성의허구_고통의뿌리_수필**\n\n#### **정체성을 물어보다**\n\n아내에게 물어본 적이 있다. 몇 살이냐고, 어디 사냐고, 성별은 무엇이냐고. 뭘 좋아하냐고 물으니 좋아할 것도 없다고 했다. 싫어하는 건 남편이 목욕탕을 어지르는 거라고 했다. 스스로를 소개해 보라 하니 \"그냥 세월에 떠밀려서 나이만 먹은 가정주부\"라고 했다. 그 말을 받아서 다시 물었다. 그렇다면, 세월에 떠밀려서 나이만 먹은 가정주부가 지금 이 소리를 듣고 있느냐고. 54살이라는 것, 횡성에 산다는 것, 여자라는 것, 남편이 목욕탕을 어지르는 걸 싫어한다는 것 — 그것들이 지금 보
