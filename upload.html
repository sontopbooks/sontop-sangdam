\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\n\n\\#움\n\n서두르지 않고\n\n애쓰지 않고\n\n\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\", "source": "sontop_poem"}, {"id": "sontop_poem_23_c769f3f7f9", "text": "_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\n\n\\#움\n\n서두르지 않고\n\n애쓰지 않고\n\n\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\n\n\\#아무도 읽지 않을\n\n가슴에\n\n소설 한 편\n\n막걸릿잔에\n\n시 한 수\n\n\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\", "source": "sontop_poem"}, {"id": "sontop_poem_24_df8448aaa9", "text": "_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\n\n\\#아무도 읽지 않을\n\n가슴에\n\n소설 한 편\n\n막걸릿잔에\n\n시 한 수\n\n\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\n\n\\#벚꽃 잎\n\n작년에도\n\n올해도 떨어지네\n\n그 자리\n\n\\", "source": "sontop_poem"}, {"id": "sontop_poem_25_5e14f63628", "text": "_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\n\n\\#벚꽃 잎\n\n작년에도\n\n올해도 떨어지네\n\n그 자리\n\n\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_\\_", "source": "sontop_poem"}, {"id": "sijo_0_2272e38cda", "text": "# 가을 추억\n\n가을 추억  /  박의섭\n\n갈바람 마중한다\n마른 추억 밟으며\n\n회한을 어디 두나\n하늘은 푸르른데\n\n단풍잎 사이사이로\n무너지는\n가\n을\n\n---\n\n# 가을\n\n가을  / 도목 박의섭\n\n사랑을 모를 텐데 \n저 산은 붉어지고\n\n그리운 맘 없어도 \n온 하늘 짙푸른데\n\n어째서 무심한 서리는\n저 밭에 내렸는가\n\n---\n\n# 가을걷이\n\n가을걷이 /  도목 박의섭\n\n아낙네 급한 손길 \n가을을 걷어내고\n\n들깨를 베다만 밭\n산비둘기 날아든다\n\n무정한 가을 바람에 \n헛 손짓만 훠이 훠이\n\n\n---\n\n# 간다\n\n간다  /  박의섭\n\n가진 게", "source": "sijo"}, {"id": "sijo_1_223eeac8f5", "text": "박의섭\n\n아낙네 급한 손길 \n가을을 걷어내고\n\n들깨를 베다만 밭\n산비둘기 날아든다\n\n무정한 가을 바람에 \n헛 손짓만 훠이 훠이\n\n\n---\n\n# 간다\n\n간다  /  박의섭\n\n가진 게 많으면 놓고 가기 힘들고\n없으면 놓고 가는 거까지가 힘들고\n그래도 어찌하겠는가\n갈 때까진 가야지\n\n갈 때까지 가보자 별수가 있겠는가\n내가 안 가도 세월 가고 지구도 간다\n어차피 이래저래 갈 거면\n그냥 가도 가긴 간다\n\n들고 가도 놓고 가도 앞으로 가도 뒤로 가도 \n서 있어도 막아서도 가는 곳 몰라도 \n갈 곳은 한 곳뿐인데\n애 쓰고 기 쓰고\n\n---\n\n#", "source": "sijo"}, {"id": "sijo_2_6c0670252b", "text": "이래저래 갈 거면\n그냥 가도 가긴 간다\n\n들고 가도 놓고 가도 앞으로 가도 뒤로 가도 \n서 있어도 막아서도 가는 곳 몰라도 \n갈 곳은 한 곳뿐인데\n애 쓰고 기 쓰고\n\n---\n\n# 겨울의 입구를 들어서며\n\n겨울의 입구를 들어서며  /  도목 박의섭\n\n길가에 죽 늘어선\n나무들이 손 흔든다\n\n뼈만 남은 앙상한 손\n장갑마저 벗은 손\n\n힘든데\n자기도 견딘다고\n용기 잃지 말라고\n\n---\n\n# 공명\n\n공명  /  박의섭\n\n인적없는 호숫가에 벚꽃이 만발하다\n\n물에 비친 꽃 그림자 우두커니 바라본다\n\n수면 위\n\n떨어지는 꽃잎 하나\n\n마음에 파문이", "source": "sijo"}, {"id": "sijo_3_2576d67088", "text": "잃지 말라고\n\n---\n\n# 공명\n\n공명  /  박의섭\n\n인적없는 호숫가에 벚꽃이 만발하다\n\n물에 비친 꽃 그림자 우두커니 바라본다\n\n수면 위\n\n떨어지는 꽃잎 하나\n\n마음에 파문이 인다\n\n---\n\n# 구절초\n\n구절초  /  박의섭\n\n구비구비 굽이마다 구절초가 피었구나\n\n구구절절 그리움을 얼굴에 품었구나\n\n목 빼고 기다리시다 향만 남은 어머니\n\n\n\n\n---\n\n# 그림자\n\n그림자  /   도목 박의섭\n\n낙엽 쌓인 밤거리를 \n나 홀로 걸어간다\n\n달빛을 벗 삼아서\n정처 없이 걷다 보니\n\n주름진 그림자 하나 \n친구 하자 따라오네\n\n---\n\n#", "source": "sijo"}, {"id": "sijo_4_10034b4d99", "text": "# 그림자\n\n그림자  /   도목 박의섭\n\n낙엽 쌓인 밤거리를 \n나 홀로 걸어간다\n\n달빛을 벗 삼아서\n정처 없이 걷다 보니\n\n주름진 그림자 하나 \n친구 하자 따라오네\n\n---\n\n# 기다림\n\n기다림  /  도목 박의섭\n\n돌아오마 하신 말씀 \n되뇌어 보았습니다\n\n오시지 않아도 \n원망하진 않습니다\n\n이대로 돌이 되어도 \n좋다고 생각했습니다\n\n\n\n---\n\n# 까맣게 탄 농심\n\n작은 위로  / 이하정, 박의섭 각색\n\n태풍 비 생각보다 조용히 갔다만\n바람에 날아갈까 하우스 문 여닫는 새\n딸기 잎 까맣게 탔다 \n내리쬐는 햇살에\n\n미안함에 물과", "source": "sijo"}, {"id": "sijo_5_3ea6d4c3fd", "text": "게 탄 농심\n\n작은 위로  / 이하정, 박의섭 각색\n\n태풍 비 생각보다 조용히 갔다만\n바람에 날아갈까 하우스 문 여닫는 새\n딸기 잎 까맣게 탔다 \n내리쬐는 햇살에\n\n미안함에 물과 양분 듬뿍 주고 가는데\n작은 농부 위로하듯 농로 변 묵정밭에\n보라색 도라지꽃이 곰살맞게 피었다\n\n\n---\n\n# 까치밥\n\n까치밥 /   도목 박의섭\n\n설익은 연정 하나 \n가지 끝에 걸어둔다\n\n까치야 \n배고프면 \n따먹어도 괜찮은데\n\n행여나 누구를 만나더라도 \n입도 뻥긋 말아라\n\n---\n\n# 낙엽\n\n낙엽 /  도목 박의섭\n\n늦가을 찬바람이\n마른 가지 털어낸다", "source": "sijo"}, {"id": "sijo_6_075604cb2a", "text": "걸어둔다\n\n까치야 \n배고프면 \n따먹어도 괜찮은데\n\n행여나 누구를 만나더라도 \n입도 뻥긋 말아라\n\n---\n\n# 낙엽\n\n낙엽 /  도목 박의섭\n\n늦가을 찬바람이\n마른 가지 털어낸다\n\n묵은 인연 떨쳐내고 \n새 인연 기약인가\n\n마른잎 뚝 떨어진다 \n어리석은 가슴에\n\n\n끝 닿은 인연 뒤엔 의 끝자락에\n무슨 인연 기다릴까\n\n---\n\n# 눈꽃\n\n눈꽃  /  도목 박의섭\n\n들판의 하얀 꽃들 \n어디 갔나 했더니만\n\n뭉개뭉개 구름타고\n하늘로 올랐다가\n\n세상사\n온갖 시름 덮어 주려\n눈꽃 되어 내려오네\n\n\n\n\n---\n\n# 단풍\n\n단풍  /  도목  박의", "source": "sijo"}, {"id": "sijo_7_66bb0fd708", "text": "들판의 하얀 꽃들 \n어디 갔나 했더니만\n\n뭉개뭉개 구름타고\n하늘로 올랐다가\n\n세상사\n온갖 시름 덮어 주려\n눈꽃 되어 내려오네\n\n\n\n\n---\n\n# 단풍\n\n단풍  /  도목  박의섭\n\n말없이 떠나거라 \n바람 분다 가려거든\n\n올 때도 몰랐거늘 \n갈 때 그리 바쁘더냐\n\n홍엽에\n온 산이 불타는데\n왜 미련은 타지 않나\n\n만나고 헤어짐이 \n맘대로 안 되지만\n\n인연 참 야속하다 \n애달프게 가는구나\n\n오고 감 \n무상하다만\n타오른 정 어이하나\n\n산허리 붙잡고서 \n놓아주지 않으련만\n\n매정한 갈바람에 \n뿌리치고 가는구나\n\n아서라\n다음 생 기약한들\n너", "source": "sijo"}, {"id": "sijo_8_95fe54328e", "text": "참 야속하다 \n애달프게 가는구나\n\n오고 감 \n무상하다만\n타오른 정 어이하나\n\n산허리 붙잡고서 \n놓아주지 않으련만\n\n매정한 갈바람에 \n뿌리치고 가는구나\n\n아서라\n다음 생 기약한들\n너를 어이 알아볼꼬\n\n---\n\n# 달의 위로\n\n달의 위로  /  박의섭\n\n술 한잔 따라 놓고 달님을 청하니\n총총히 걸어 내려와 술잔에 앉는다\n한입에\n꿀꺽 마셨다\n저 멀리 웃고 있는 달\n\n모두가 잠든 세상 나와 달만 깨어있다\n저 달이 내 마음을 알리야 없겠지만\n달빛은 \n가슴을 적시고\n내 등을 두드리고\n\n---\n\n# 담\n\n담  /  도목 박의섭\n\n할 일은 태산인", "source": "sijo"}, {"id": "sijo_9_47ab739a0b", "text": "달\n\n모두가 잠든 세상 나와 달만 깨어있다\n저 달이 내 마음을 알리야 없겠지만\n달빛은 \n가슴을 적시고\n내 등을 두드리고\n\n---\n\n# 담\n\n담  /  도목 박의섭\n\n할 일은 태산인데 \n옆구리에 담이 웬 말\n\n마음의 담 허물면 \n담 결린 것 풀릴까\n\n인생사\n억지로 안 되는구나\n순응하며 살라 하네\n\n---\n\n# 도깨비 똥\n\n도깨비 똥  /  도목 박의섭\n\n깨비깨비 도깨비는 무슨 똥을 눌까\n금똥 나와라 뚝딱\n은똥 나와라 뚝딱\n방망이\n두드리면 나올 테니\n변비 없어 좋겠구나\n\n도깨비야 도깨비야 얼른 좀 똥을 눠라\n금똥이던 은똥이던 아무거나", "source": "sijo"}, {"id": "sijo_10_fc84ad37b3", "text": "깨비 도깨비는 무슨 똥을 눌까\n금똥 나와라 뚝딱\n은똥 나와라 뚝딱\n방망이\n두드리면 나올 테니\n변비 없어 좋겠구나\n\n도깨비야 도깨비야 얼른 좀 똥을 눠라\n금똥이던 은똥이던 아무거나 눠 주면\n똥 팔아\n맛난 것 사 먹고\n남으면 엄마도 드리게\n\n도깨비 뿔났다고 놀리지 않을 테니\n수세식에 누더라도 물 내리면 안 된단다\n아무리\n비싼 똥인들\n도로 아미타불이다\n\n\n/ 오늘 밤에 누우~~~런 황금똥 꿈꾸셔요~^^\n\n---\n\n# 독감\n\n독감  /  도목 박의섭\n\n고약한 뿔 달고서 우리 집에 오신 손님\n식구들 차례대로 열 받게 하더니만\n나까지\n방바닥", "source": "sijo"}, {"id": "sijo_11_424b1ccec7", "text": "늘 밤에 누우~~~런 황금똥 꿈꾸셔요~^^\n\n---\n\n# 독감\n\n독감  /  도목 박의섭\n\n고약한 뿔 달고서 우리 집에 오신 손님\n식구들 차례대로 열 받게 하더니만\n나까지\n방바닥 미장\n온몸으로 문질렀네\n\n살아생전 미장일로 힘드셨을 울 아버지\n주름진 삶 문지르며 오남매 키우셨네\n나 또한\n독감이었겠지\n아버지 당신께는\n\n남의 집 방바닥은 미끈하게 펴시더니\n당신의 이마 주름 못 펴고 가시었네\n먼 훗날\n내 자식들은\n어느 때 날 떠올릴까\n\n---\n\n# 돌아간다\n\n돌아간다  /  박의섭\n\n하늘엔 태풍에 구름이 돌아가고\n\n앞산엔 강풍에 나무가 돌", "source": "sijo"}, {"id": "sijo_12_cc540e4f15", "text": "이마 주름 못 펴고 가시었네\n먼 훗날\n내 자식들은\n어느 때 날 떠올릴까\n\n---\n\n# 돌아간다\n\n돌아간다  /  박의섭\n\n하늘엔 태풍에 구름이 돌아가고\n\n앞산엔 강풍에 나무가 돌아가고\n\n모처럼 \n\n한가해 졸고 있으니\n\n마누라 눈 \n\n돌아간다\n\n/ 태풍 피해가 없기를 바라는 저녁입니다()\n\n---\n\n# 딱 한잔\n\n딱 한잔  /  도목  박의섭\n\n부어라 마셔보마 \n이 밤이 다하도록\n\n딜님도 한잔 술에 \n갈지자로 걷는구나\n\n성이 난\n전봇대들이\n한대 맞자 따라오네\n\n\n\n\n---\n\n# 마당을 쓸어라\n\n마당을 쓸어라  /  도목 박의섭\n\n구", "source": "sijo"}, {"id": "sijo_13_39c6d6b311", "text": "보마 \n이 밤이 다하도록\n\n딜님도 한잔 술에 \n갈지자로 걷는구나\n\n성이 난\n전봇대들이\n한대 맞자 따라오네\n\n\n\n\n---\n\n# 마당을 쓸어라\n\n마당을 쓸어라  /  도목 박의섭\n\n구름은 길 몰라도  \n제 갈 길 잘도 가고\n\n수행 안 한 강물도 \n낮은 곳 잘 찾는데\n\n여보게\n봄이 온다 하니\n마당이나 쓸어봄세\n\n---\n\n# 마음꽃\n\n마음꽃 /   도목 박의섭\n\n저 산에 꽃이 핌은 \n호수 때문 아니요\n\n산꽃을  비추려고\n호수 있지 않지만\n\n제 맘이\n그린 줄 모르고 \n하염없이 바라보네\n\n천꽃 만잎 피고 져도\n세월은 무심한데\n\n돌아보면 꽃한송", "source": "sijo"}, {"id": "sijo_14_e80068a50e", "text": "저 산에 꽃이 핌은 \n호수 때문 아니요\n\n산꽃을  비추려고\n호수 있지 않지만\n\n제 맘이\n그린 줄 모르고 \n하염없이 바라보네\n\n천꽃 만잎 피고 져도\n세월은 무심한데\n\n돌아보면 꽃한송이\n피고 진 새 없건만\n\n지워도 \n또 피어나는\n눈앞의 허공꽃\n\n---\n\n# 목수의 허틈 소리\n\n목수의 허틈 소리  /  박의섭 \n\n나무를 깎다 보니 \n세월을 깎았구나\n\n나이를 먹다 보니 \n세월에 깎였구나\n\n눈 밝은 만월 웃는다\n속지도 \n속이지도 않고\n\n---\n\n# 물에 비친 꽃\n\n물에 비친 꽃  /  박의섭\n\n복사꽃 활짝 핀 호숫가를 거닐다\n\n문득 들리는", "source": "sijo"}, {"id": "sijo_15_42d66da1a2", "text": "보니 \n세월에 깎였구나\n\n눈 밝은 만월 웃는다\n속지도 \n속이지도 않고\n\n---\n\n# 물에 비친 꽃\n\n물에 비친 꽃  /  박의섭\n\n복사꽃 활짝 핀 호숫가를 거닐다\n\n문득 들리는 새소리에 물결이 일렁인다\n\n하늘도 \n\n나도 복사나무도 \n\n호수에 담겼다\n\n\n---\n\n# 방하착\n\n방하착  /  도목 박의섭\n\n앙상한 가지 끝에 흔들리는 나뭇잎아\n모진 바람 이겨냄이 장하긴 하다마는\n어차피 떨어질 인연이면 애써 잡아 무엇하리\n\n실낱같은 인연줄을 잡고 또 이어봐도\n향기를 모은다고 다시 꽃이 되더냐\n아서라 헛된 미련일랑 바람결에 날려라\n\n이생에서", "source": "sijo"}, {"id": "sijo_16_01e744a45e", "text": "장하긴 하다마는\n어차피 떨어질 인연이면 애써 잡아 무엇하리\n\n실낱같은 인연줄을 잡고 또 이어봐도\n향기를 모은다고 다시 꽃이 되더냐\n아서라 헛된 미련일랑 바람결에 날려라\n\n이생에서 인연 지음 누구의 뜻이었나\n돌로 만든 꽃 향기에 가슴 적셔지거든\n한바탕 꿈이려니 하고 부여쥔 맘 놓아라\n\n---\n\n# 배꽃 향기\n\n배꽃 향기  /  박의섭\n\n물에 비친 배꽃 향기 \n호수를 간지르고\n\n가지마다 내려앉은 \n팔만사천 하얀 법문\n\n배꽃불\n환한 미소에\n물결도 설레인다\n\n\n\n사진은 조재익 화백의 작품으로 아직 제작 중인 작품이라고 합니다.\n완성작은", "source": "sijo"}, {"id": "sijo_17_97bb3cc1f2", "text": "호수를 간지르고\n\n가지마다 내려앉은 \n팔만사천 하얀 법문\n\n배꽃불\n환한 미소에\n물결도 설레인다\n\n\n\n사진은 조재익 화백의 작품으로 아직 제작 중인 작품이라고 합니다.\n완성작은 7월 중에 있을 전시회에서 감상하시길 바랍니다.\n\n---\n\n# 백석과 밥상\n\n백석과 밥상  /  박의섭\n\n길상사에 얽힌 사연 읽어 보라는 아내\n\n천억 원이 그 사람 \n시 한 줄만 못해!\n\n자야의\n백석을 향한 \n그리움의 한마디\n\n비록 \n밥 한 그릇 \n찬 세 가지 나눌지언정\n그대와 마주 앉은 \n지금 이 순간이\n내게도\n천금보다 소중하오\n가난한 목수의 아내여\n\n-", "source": "sijo"}, {"id": "sijo_18_c454d27e88", "text": "못해!\n\n자야의\n백석을 향한 \n그리움의 한마디\n\n비록 \n밥 한 그릇 \n찬 세 가지 나눌지언정\n그대와 마주 앉은 \n지금 이 순간이\n내게도\n천금보다 소중하오\n가난한 목수의 아내여\n\n---\n\n# 벚꽃엔딩\n\n벚꽃엔딩  /  박의섭\n\n계절의 인연 따라 꽃은 피고 또 지는데\n\n무심히 서 있는 \n\n저 벚나무 애달프다\n\n벚꽃잎\n\n바람에 흩날린다\n\n한잎 한잎 \n\n가슴을 가른다\n\n---\n\n# 별의 탄생\n\n별의 탄생  /  박의섭\n\n깜깜한 밤하늘을 보고 또 보았다\n사무친 가슴 하나 \n하늘로 올라가서\n하늘길 \n가물가물한 곳에 \n반짝이는 점이 된다\n\n칠흑", "source": "sijo"}, {"id": "sijo_19_3f5c780e46", "text": "른다\n\n---\n\n# 별의 탄생\n\n별의 탄생  /  박의섭\n\n깜깜한 밤하늘을 보고 또 보았다\n사무친 가슴 하나 \n하늘로 올라가서\n하늘길 \n가물가물한 곳에 \n반짝이는 점이 된다\n\n칠흑 같은 어두움에 켜켜 쌓인 상념들\n눈물 젖은 사연들도 \n쉴 곳은 있어야지\n한 웅큼 \n허공을 파내어 \n점 하나 붙여 본다\n\n\n---\n\n# 봄 밭\n\n봄 밭  /  박의섭\n\n나에게 더도 말고\n봄 한 뙈기 주어지면\n\n봄씨를 살 뿌려서 \n봄싹을 틔우련다\n\n행여나\n마음 한 켠 휑하거든\n내가 가져간 줄 아시오\n\n---\n\n# 봄바람\n\n봄바람  /  도목 박의섭\n\n봄에는", "source": "sijo"}, {"id": "sijo_20_fcfd217d2d", "text": "말고\n봄 한 뙈기 주어지면\n\n봄씨를 살 뿌려서 \n봄싹을 틔우련다\n\n행여나\n마음 한 켠 휑하거든\n내가 가져간 줄 아시오\n\n---\n\n# 봄바람\n\n봄바람  /  도목 박의섭\n\n봄에는 처녀 총각 \n바람도 날만 하다\n\n산 중턱 넘어가는\n이 나이도 숭숭하니\n\n꽃들아\n그렇게 대놓고 피면\n어쩌란 말이냐\n\n---\n\n# 부평초\n\n부평초  /  도목 박의섭\n\n저 산만 넘어보자 \n편히쉴 수 있을게야\n\n산 하나 넘어가면 \n또 산이 가로막네\n\n부평초 \n떠도는 마음\n어느 곳에 매일까\n\n산이라면 넘겠고 \n물이라면 건너련만\n\n서로의 벌어진 틈 \n무었으로 메울까", "source": "sijo"}, {"id": "sijo_21_9d387009b9", "text": "자 \n편히쉴 수 있을게야\n\n산 하나 넘어가면 \n또 산이 가로막네\n\n부평초 \n떠도는 마음\n어느 곳에 매일까\n\n산이라면 넘겠고 \n물이라면 건너련만\n\n서로의 벌어진 틈 \n무었으로 메울까\n\n어미새\n홀로 남아서\n빈둥지만 쳐다보네\n\n이고 진 저 늙은이\n짐보따리 한짐인데\n\n등허리 펴지못할 \n근심은 어이하나\n\n빈손에\n마른잎 하나\n쥐었다가 폈다가\n\n\n\n---\n\n# 불경죄\n\n불경죄  /  도목 박의섭\n\n이른 아침 사락사락 우리 마님 비질하네\n어깨 아픈 머슴 위해 수고로움 마다않고\n세상에\n이런 불경이 있나\n안쫓겨남 다행일세\n\n아픈 어깨 나으면 장작 열", "source": "sijo"}, {"id": "sijo_22_713ac43901", "text": "불경죄  /  도목 박의섭\n\n이른 아침 사락사락 우리 마님 비질하네\n어깨 아픈 머슴 위해 수고로움 마다않고\n세상에\n이런 불경이 있나\n안쫓겨남 다행일세\n\n아픈 어깨 나으면 장작 열심 팰터이니\n마른 북어 패더라도 나는 패지 말아주오\n고달픈\n머슴살이이지만\n왜 이렇게 행복한~~~겨?\n\n\n---\n\n# 비에 젖은 귀가\n\n비를 맞고 집에 오다  /\n\n우산을 가져가서 걱정은 안 했는데\n흠뻑 젖은 아이는  팔 벌리며 웃는다\n우산은\n어디에다 두고\n비 맞으니 재밌단다\n\n춥지는 않았어? 입맞춤을 해주며\n따뜻하게 목욕해라, 나무라진 않았다\n비 맞고\n즐거", "source": "sijo"}, {"id": "sijo_23_2b15861ec0", "text": "걱정은 안 했는데\n흠뻑 젖은 아이는  팔 벌리며 웃는다\n우산은\n어디에다 두고\n비 맞으니 재밌단다\n\n춥지는 않았어? 입맞춤을 해주며\n따뜻하게 목욕해라, 나무라진 않았다\n비 맞고\n즐거우면 그뿐\n지금 마음 간직하렴\n\n광풍에 시국은 정신없이 돌아 가는데\n\n---\n\n# 비의 고해\n\n비의 고해  /  박의섭\n\n고개를 푹 숙인 하늘이 비를 떨군다\n\n구름은 무슨 연고로 저 땅을 적시고\n\n내 맘은 \n\n비도 맞지 않았건만\n\n어이하여 젖어 드는가\n\n---\n\n# 빈잔\n\n빈 잔  /  도목 박의섭\n\n인생을 길게 보면 \n좋고 나쁨 뭐가 있나\n\n뒤돌아 볼라치", "source": "sijo"}, {"id": "sijo_24_25d17eec64", "text": "저 땅을 적시고\n\n내 맘은 \n\n비도 맞지 않았건만\n\n어이하여 젖어 드는가\n\n---\n\n# 빈잔\n\n빈 잔  /  도목 박의섭\n\n인생을 길게 보면 \n좋고 나쁨 뭐가 있나\n\n뒤돌아 볼라치면 \n하나도 남음 없네\n\n빈 잔에 눈물 한방울 \n사는게 다 그런거지\n\n---\n\n# 사천왕문\n\n사천왕문  /  도목 박의섭\n\n아무리 부릅떠도 겁나지 않는다\n손에 쥔 창과 검이 무섭기도 하다만\n이 문만\n얼른 지나면\n쫏아오지 않더구나\n\n사천왕 성난 얼굴 나를 보고 화났을까\n서로들 얼굴 보면 화날만 하겠구나\n성내도\n자비로운 맘\n그 누가 모를까\n\n죄진 것 없냐고 이", "source": "sijo"}, {"id": "sijo_25_799d7b0c6c", "text": "도 하다만\n이 문만\n얼른 지나면\n쫏아오지 않더구나\n\n사천왕 성난 얼굴 나를 보고 화났을까\n서로들 얼굴 보면 화날만 하겠구나\n성내도\n자비로운 맘\n그 누가 모를까\n\n죄진 것 없냐고 이실직고 하라고\n뉘우치고 참회하면 다 받아 준다고\n한생각\n털어 주었더니\n문안 문밖 따로없구나\n\n---\n\n# 산에서 길을 묻다\n\n산에서 길을 묻다  /  박의섭\n\n봄꽃을 찾다가 산에서 길을 잃었다\n안개가 가부좌 틀고 앉아 앞을 막는다\n도대체\n여기가 어딘지\n분간이 안 되는구나\n\n어르신 마을로 가는 길이 어디인지요\n\n마을은 둘째치고 마음은 아시오\n\n아니요\n모릅니다", "source": "sijo"}, {"id": "sijo_26_e7992e2e33", "text": "길을 잃었다\n안개가 가부좌 틀고 앉아 앞을 막는다\n도대체\n여기가 어딘지\n분간이 안 되는구나\n\n어르신 마을로 가는 길이 어디인지요\n\n마을은 둘째치고 마음은 아시오\n\n아니요\n모릅니다만\n노사는 아십니까\n\n여기서 구름이 걷히기를 기다리다가\n저 아래 마을로 한발 한발 내려갈 때에\n마음을 \n밟지 않은 적 있다면\n돌아와 일러주시오\n\n---\n\n# 새순\n\n새순  /  도목 박의섭\n\n봄바람 살랑살랑 \n까르르 하하호호\n\n누가 내 겨드랑이  \n간질였나 궁금해라\n\n빼꼼히 \n얼굴 내민다\n와아~ \n새싹들의 함성\n\n---\n\n# 섬강\n\n섬강  /  박의섭\n\n둥", "source": "sijo"}, {"id": "sijo_27_732c7ca198", "text": "목 박의섭\n\n봄바람 살랑살랑 \n까르르 하하호호\n\n누가 내 겨드랑이  \n간질였나 궁금해라\n\n빼꼼히 \n얼굴 내민다\n와아~ \n새싹들의 함성\n\n---\n\n# 섬강\n\n섬강  /  박의섭\n\n둥그런 달 하나 섬강을 비추이고\n달빛에 취해서 강변을 거니노라\n강물 위 일렁이는 그림자는 무엇에 취했는가\n\n강물은 흘러가도 달빛은 그대로듯\n상념이 흘러가도 미련은 남는구나\n섬강이 소리 없이 흐른다 눈물 젖은 수건 같은\n\n섬강 변 굽이굽이 사연은 사무치고\n무심한 세월만이 발길을 떠미누나\n강물은 그저 흐르는데 산 하나가 쳐다보네\n\n---\n\n# 세례\n\n세례  /", "source": "sijo"}, {"id": "sijo_28_e4641adf55", "text": "리 없이 흐른다 눈물 젖은 수건 같은\n\n섬강 변 굽이굽이 사연은 사무치고\n무심한 세월만이 발길을 떠미누나\n강물은 그저 흐르는데 산 하나가 쳐다보네\n\n---\n\n# 세례\n\n세례  /  박의섭\n\n쌓인 먼지 씻어내려 수도꼭지를 틀었다\n쏴\n아\n아\n물보다 싼 물, 일보다 싼 피로가 쏟아진다\n줄\n줄\n줄\n돈과 바꾼 시간들이 \n손가락 사이로 새나간다\n\n오늘 하루도 분명 씻어야 할 것이 있을 것이다 \n미끈\n미끈\n오탁악세를 비누에게 의탁한 체\n\n아~ 왈칵 \n하수도로 빠져드는\n씻겨진 내 허물들\n\n\n---\n\n# 술잔과 마시다\n\n술잔과 마시다  /  도목", "source": "sijo"}, {"id": "sijo_29_39be265cb3", "text": "어야 할 것이 있을 것이다 \n미끈\n미끈\n오탁악세를 비누에게 의탁한 체\n\n아~ 왈칵 \n하수도로 빠져드는\n씻겨진 내 허물들\n\n\n---\n\n# 술잔과 마시다\n\n술잔과 마시다  /  도목 박의섭\n\n혼술은 아니리오 술잔님 한잔 받소\n당신 먼저 마시면 나도 일 배 하겠소\n긴긴밤\n정 주고받아도\n미련 없는 그대와 나\n\n무심한 그대는 비우려고 채우고\n허전한 이내 맘은 채우려고 비운다\n이상타\n둘이 같이 마셨는데\n나만 홀로 취하니\n\n\n\n정 줘도 준 새 없고 받아도 받음 없는\n권커니 받거니\n\n줄 것도 받을 것도 없는\n\n\n---\n\n# 슈퍼맨\n\n슈퍼맨  /", "source": "sijo"}, {"id": "sijo_30_bb90e51747", "text": "고 비운다\n이상타\n둘이 같이 마셨는데\n나만 홀로 취하니\n\n\n\n정 줘도 준 새 없고 받아도 받음 없는\n권커니 받거니\n\n줄 것도 받을 것도 없는\n\n\n---\n\n# 슈퍼맨\n\n슈퍼맨  /  도목 박의섭\n\n어깨엔 오십 먹은 \n개 한마리 짖어대고\n\n무쇠 팔 무쇠 다리\n로켓 주먹 아니지만\n\n슈퍼맨 너가 부럽지않다\n나에게는 일이 있다\n\n/ 담 시리즈 2탄입니다~^^;;\n건강한 새해 맞이하시길 기원합니다()\n\n\n\n\n\n---\n\n# 시어\n\n시어  /  도목 박의섭\n\n내 안에 시어라는\n물고기가 많나보다\n\n시도 때도 가리잖고 \n놀자고 나온다네\n\n이 중에\n얼", "source": "sijo"}, {"id": "sijo_31_de48d1973d", "text": "강한 새해 맞이하시길 기원합니다()\n\n\n\n\n\n---\n\n# 시어\n\n시어  /  도목 박의섭\n\n내 안에 시어라는\n물고기가 많나보다\n\n시도 때도 가리잖고 \n놀자고 나온다네\n\n이 중에\n얼마나 살아남아\n어느 맘에 알 낳을까\n\n\n\n---\n\n# 시조새\n\n시조새  /  도목 박의섭\n\n어느날 내 가슴에 \n둥지 튼 새 한마리\n\n꼭 다시 만나자는 \n태초 언약 지키려고\n\n오로지 \n시어만 잡아먹고 \n먼길 날아 왔다 하네\n\n\n\n---\n\n# 쌀밥\n\n쌀밥  /  박의섭\n\n아내가 \n따뜻한 밥상을 차려준다\n한 숟갈 뜨려다 본\n쌀밥의 하얀 맨살\n너처럼\n깨끗하지도\n순", "source": "sijo"}, {"id": "sijo_32_1d86a81da1", "text": "시어만 잡아먹고 \n먼길 날아 왔다 하네\n\n\n\n---\n\n# 쌀밥\n\n쌀밥  /  박의섭\n\n아내가 \n따뜻한 밥상을 차려준다\n한 숟갈 뜨려다 본\n쌀밥의 하얀 맨살\n너처럼\n깨끗하지도\n순수하지도 못했구나\n\n모락모락 김이 나는 쌀밥의 일침\n오늘 하루 얼마나 뜨겁게 살았는가\n먹다 만\n말라버린 밥풀 같은\n쌀밥보다 못한 나는\n\n\n\n\n아내가 밥상을 차려낸다\n갖지은 쌀밥이 윤기가 자르하다\n한숟갈 뜨려는데 \n쌀밥의 하얀 맨살에 눈이 간다\n나는 너처럼 깨끗하지도 \n순수하지도 못했구나\n\n\n\n\n\n\n\n---\n\n# 안개\n\n안개  /  도목 박의섭\n\n안개가 몽실", "source": "sijo"}, {"id": "sijo_33_5841d75a29", "text": "윤기가 자르하다\n한숟갈 뜨려는데 \n쌀밥의 하얀 맨살에 눈이 간다\n나는 너처럼 깨끗하지도 \n순수하지도 못했구나\n\n\n\n\n\n\n\n---\n\n# 안개\n\n안개  /  도목 박의섭\n\n안개가 몽실몽실\n한 치 앞 안 보이네\n\n어디로 가야 할지 \n분간이 안 되누나\n\n그리움 \n하나를 콕 집어서 \n훅 불었다 \n\n너 먼저 가\n\n\n---\n\n# 야상곡\n\n야상곡  /   박의섭\n\n그리움 물안개로 \n산허리 감아 들고\n\n빈 배만 떠도는데\n사공은 어디 갔나\n\n님 떠난\n나루터 언덕에\n찬바람만 부는 구나\n\n헛되고 부질없다 \n정이란 게 그런 거지\n\n줬으면 그만이지 \n무얼", "source": "sijo"}, {"id": "sijo_34_03759c106d", "text": "물안개로 \n산허리 감아 들고\n\n빈 배만 떠도는데\n사공은 어디 갔나\n\n님 떠난\n나루터 언덕에\n찬바람만 부는 구나\n\n헛되고 부질없다 \n정이란 게 그런 거지\n\n줬으면 그만이지 \n무얼 또 바라는가\n\n아서라 \n님 찾아 무엇하리오 \n흐르는 게 정인 것을\n\n\n---\n\n# 약속\n\n약속  /  박의섭\n\n안되면 무궁화호라도 타고 올 것이지\n도대체 뭘 타고 오는지 알 수가 있나\n답답다\n기다리다 눈 빠지면\n지가 어케 책임지려고\n\n요즘 같은 세상에 ktx도 있건만\n맘 먹으면 깜박새 날아오듯 오겠구먼\n오다가\n누구랑 눈이 맞았나\n오기만 해봐라\n\n온다고 했으", "source": "sijo"}, {"id": "sijo_35_b4fa1d8f3a", "text": "있나\n답답다\n기다리다 눈 빠지면\n지가 어케 책임지려고\n\n요즘 같은 세상에 ktx도 있건만\n맘 먹으면 깜박새 날아오듯 오겠구먼\n오다가\n누구랑 눈이 맞았나\n오기만 해봐라\n\n온다고 했으니 오기는 오겠지\n기왕지사 오면 용서는 해야겠지\n\n어이쿠\n저기 문 열고 오네\n\n어서 와요 \n\n내 사랑 \n\n봄!\n\n---\n\n# 어머니 기일에\n\n어머니 기일에  /  도목 박의섭\n\n나 죽으면 제사상에 거섭만 올리거라\n나물이 좋다 시며 생전에 하신 말씀\n어머니\n돌아가신 그곳에도\n나물이 나던가요\n\n생선 머리 좋아하니 몸통은 너 먹거라\n어머니는 정말로 생선 대갈 좋", "source": "sijo"}, {"id": "sijo_36_754b5a23de", "text": "죽으면 제사상에 거섭만 올리거라\n나물이 좋다 시며 생전에 하신 말씀\n어머니\n돌아가신 그곳에도\n나물이 나던가요\n\n생선 머리 좋아하니 몸통은 너 먹거라\n어머니는 정말로 생선 대갈 좋으셨나\n나 또한\n부모가 되어 보니\n대가리 좋다 하네\n\n봄이면 날 업고서 한 바구니 쑥 뜯어와\n주린 배 쑥국 먹고 허기진 젖 물리시던\n어머니\n말 잘 듣는 막내아들\n나물만 올립니다\n\n\n\n\n\n\n\n---\n\n# 운해\n\n운해  /  박의섭\n\n구름이 밀물처럼 몰려와 마을을 덮고\n\n뿌리를 잃어버린 산들이 둥둥 떠다닌다\n\n내 마음\n\n섬이 되었다\n\n빗소리 가슴을 친다\n\n--", "source": "sijo"}, {"id": "sijo_37_aac41bb88b", "text": "---\n\n# 운해\n\n운해  /  박의섭\n\n구름이 밀물처럼 몰려와 마을을 덮고\n\n뿌리를 잃어버린 산들이 둥둥 떠다닌다\n\n내 마음\n\n섬이 되었다\n\n빗소리 가슴을 친다\n\n---\n\n# 월하소요\n\n월하소요( 月下逍遙)  /  박의섭\n\n실오라기 선잠 깨어\n마당을 서성인다\n\n주인 잊은 그림자\n발자욱만 분분한데\n\n구절초 \n하얀 꽃잎마다\n내려앉은 달빛 회상\n\n---\n\n# 유리창 너머의 장마\n\n유리창 너머의 장마  /  박의섭\n\n송알송알 \n창문 밖에 매달린 빗방울이\n제 무게를 못 이기고 주르르 흘러내린다\n바닥에\n곤두박일 설움이 \n잠시 쉴", "source": "sijo"}, {"id": "sijo_38_ea3ebafc23", "text": "--\n\n# 유리창 너머의 장마\n\n유리창 너머의 장마  /  박의섭\n\n송알송알 \n창문 밖에 매달린 빗방울이\n제 무게를 못 이기고 주르르 흘러내린다\n바닥에\n곤두박일 설움이 \n잠시 쉴 유리창에서\n\n\n\n\n---\n\n# 인생길\n\n인생길  /  도목 박의섭\n\n수십 년 하루같이 한자리에 우뚝 서서\n속 깊은 나이테를 쌓고 또 쌓았다네\n나뭇결 고운 무늬가 어찌 그냥 생겼을까\n\n후회 없는 인생이길 기를 쓰고 살아봐도\n여기서 막아서고 저기서 잡는구나\n아서라 산다는 게 무엇이냐 하룻밤 꿈이로다\n\n내 가는 길 막아선다 한탄도 해보지만\n나도 또 누군가의 걸림", "source": "sijo"}, {"id": "sijo_39_6b49acf0e1", "text": "후회 없는 인생이길 기를 쓰고 살아봐도\n여기서 막아서고 저기서 잡는구나\n아서라 산다는 게 무엇이냐 하룻밤 꿈이로다\n\n내 가는 길 막아선다 한탄도 해보지만\n나도 또 누군가의 걸림돌 일 수 있네\n배움이 따로 있을까 장애물 곧 스승일세\n\n억지로 되겠는가 인연 따라 사는 거지\n깨지고 넘어져도 가야 할 길 가면 될 뿐\n오호라 무심한 세월을 너도 걷고 나도 걷네\n\n---\n\n# 인연\n\n인연  /  도목 박의섭\n           \n사람이 저 잘나서 \n사는 것 같지마는\n\n구름이 제 스스로 \n움직여 갈 수 있나\n\n바람의 인연 없이는\n한발짝도 못", "source": "sijo"}, {"id": "sijo_40_218092984c", "text": "---\n\n# 인연\n\n인연  /  도목 박의섭\n           \n사람이 저 잘나서 \n사는 것 같지마는\n\n구름이 제 스스로 \n움직여 갈 수 있나\n\n바람의 인연 없이는\n한발짝도 못가네\n\n바람이 저 혼자서\n부는 것 같지마는\n\n구름이 눈물 뚝뚝\n흘리지 아니하면\n\n혼자서 무슨 인연으로\n한숨 크게 쉬겠는가\n\n\n---\n\n# 지하철\n\n지하철/   도목 박의섭\n\n서울에 사는 분들 참으로 도인일세\n\n물처럼 자기 갈길 자알도 찾아가네\n\n어디서 질긴 인연줄 당기는가 보구나\n\n---\n\n# 첫눈\n\n첫눈  /  박의섭\n\n첫눈이 내리면 \n온다고 하더니만", "source": "sijo"}, {"id": "sijo_41_8001bc27fd", "text": "사는 분들 참으로 도인일세\n\n물처럼 자기 갈길 자알도 찾아가네\n\n어디서 질긴 인연줄 당기는가 보구나\n\n---\n\n# 첫눈\n\n첫눈  /  박의섭\n\n첫눈이 내리면 \n온다고 하더니만\n\n흰 눈 위 발자국 \n어디에도 없구나\n\n살포시\n마당을 쓸어 본다\n발 젖지 마시라고\n\n---\n\n# 카페에서 가을을 기다리다\n\n카페에서 가을을 기다리다 /  박의섭\n\n커피가 식어갈 즘\n창밖을 바라본다\n온몸을 내맡긴 채\n바람맞는 강아지풀\n누구를 \n애타게 기다리는지\n길게 목을 빼고서\n\n바람이 \n불어 가는 \n그쪽에서 오는 게지\n이리저리 흔들려도\n마음을 다잡고서\n기어이", "source": "sijo"}, {"id": "sijo_42_a38e3662f9", "text": "창밖을 바라본다\n온몸을 내맡긴 채\n바람맞는 강아지풀\n누구를 \n애타게 기다리는지\n길게 목을 빼고서\n\n바람이 \n불어 가는 \n그쪽에서 오는 게지\n이리저리 흔들려도\n마음을 다잡고서\n기어이\n오고야 말리라\n자리 한번 뜨지 않고\n\n\n\n\n---\n\n# 코스모스\n\n코스모스  /  도목 박의섭\n                 \n들판을 바람따라 \n달리고 또 달렸소\n\n내 비록 줏대없이 \n흔들흔들 한듯해도\n\n한여름 애써 밀어내고 \n파란 하늘 당긴다오\n\n---\n\n# 풀입처럼 굽어진\n\n\n풀잎처럼 굽어진  /  박의섭\n\n조금만 \n\n바람이 불어도 흔들리고\n\n가늘게", "source": "sijo"}, {"id": "sijo_43_c7525b2909", "text": "없이 \n흔들흔들 한듯해도\n\n한여름 애써 밀어내고 \n파란 하늘 당긴다오\n\n---\n\n# 풀입처럼 굽어진\n\n\n풀잎처럼 굽어진  /  박의섭\n\n조금만 \n\n바람이 불어도 흔들리고\n\n가늘게 이어가는 삶이 \n\n산등성이처럼 출렁인다\n\n풀과 나\n\n서로 기대었다\n\n굽어진 등과 등\n\n---\n\n# 풀잎\n\n풀잎  /  도목 박의섭\n\n어느 날 물끄러미 \n풀잎 하나 쳐다본다\n\n햇빛에 반짝이는\n이슬방울 똑 떨지고\n\n내 맘도 \n뚝 떨어졌다\n\n너만 알아 \n\n풀잎아\n\n---\n\n# 하얀 기억\n\n하얀 기억  /  도목 박의섭\n\n잊고 싶은 일들이 그렇게 많던가요\n배 아파", "source": "sijo"}, {"id": "sijo_44_11b67e7d21", "text": "반짝이는\n이슬방울 똑 떨지고\n\n내 맘도 \n뚝 떨어졌다\n\n너만 알아 \n\n풀잎아\n\n---\n\n# 하얀 기억\n\n하얀 기억  /  도목 박의섭\n\n잊고 싶은 일들이 그렇게 많던가요\n배 아파 낳은 자식 얼굴도 몰라보고\n벌어진 \n치아 사이로 \n새어버린 기억들\n\n요양원 담장처럼 굳어버린 지난 추억\n가슴에 쌓인 정한 인고의 세월들을\n어디에\n감추어두고서\n환하게 웃으시는지\n\n애지중지 키웠건만 온기 없는 빈 둥지\n잊혀질까 두려워 당신 먼저 놓아버리신\n장모님 \n박 서방 왔습니다\n딸 도둑도 잊으시고\n\n\n---\n\n# 허욕\n\n허욕  /  박의섭\n\n빈손으로 왔다", "source": "sijo"}, {"id": "sijo_45_8f031696fc", "text": "애지중지 키웠건만 온기 없는 빈 둥지\n잊혀질까 두려워 당신 먼저 놓아버리신\n장모님 \n박 서방 왔습니다\n딸 도둑도 잊으시고\n\n\n---\n\n# 허욕\n\n허욕  /  박의섭\n\n빈손으로 왔다가 빈손으로 가는 인생\n\n다른 하나 쥐려 하면 쥐었던 것 놓아야지\n\n결국엔\n\n손금 하나 쥘 뿐인데\n\n무엇을 더 쥐려 하나\n\n---\n\n# 혼술2\n\n혼술 2  /  도목  박의섭\n\n그림자 벗삼아서\n술잔을 기울인다\n\n술잔도 말이 없고\n나도 말이 없는데\n\n어디서\n부엉이 한마리\n졸립다고 부엉부엉\n\n---\n\n# 혼술\n\n혼술  /  도목 박의섭\n\n술 한잔 부어놓고 \n멍", "source": "sijo"}, {"id": "sijo_46_53b7a75c5f", "text": "림자 벗삼아서\n술잔을 기울인다\n\n술잔도 말이 없고\n나도 말이 없는데\n\n어디서\n부엉이 한마리\n졸립다고 부엉부엉\n\n---\n\n# 혼술\n\n혼술  /  도목 박의섭\n\n술 한잔 부어놓고 \n멍하니 쳐다본다\n\n잔 위에 거품 하나 \n상념은 뽀글뽀글\n\n발 달린\n안주 어디로 가고\n빈접시만 방긋방긋\n\n---\n\n# 회한\n\n회한  /  도목 박의섭\n\n난로는 나무 먹고 목수는 톱밥 먹는다\n눈물 콧물 버무려 먹는 고맙지만 맛없는 밥\n나무쌀 많이 나오면 \n목수네 집 배부른 날\n\n기계가 빙빙 돌면 톱밥들은 춤을 추고\n목수도 신이 나서 깎고 또 깎는구나\n톱밥이 고봉", "source": "sijo"}, {"id": "sijo_47_9a5b3a3b9d", "text": "먹는다\n눈물 콧물 버무려 먹는 고맙지만 맛없는 밥\n나무쌀 많이 나오면 \n목수네 집 배부른 날\n\n기계가 빙빙 돌면 톱밥들은 춤을 추고\n목수도 신이 나서 깎고 또 깎는구나\n톱밥이 고봉으로 쌓인다 \n흰 눈 덮인 봉분처럼\n\n살아생전 밥 한 끼도 못 사 드린 못난 놈이\n제 새끼 먹이자고 죽자 살자 깎는구나\n이제는 사 드릴 수 있는데\n톱밥도 쌓이는데\n\n---\n\n# 흰눈\n\n흰눈  /  도목 박의섭\n\n사랑은 이와 같이 \n해야 하나 보구나\n\n모나거나 둥글거나 \n더하고 뺌도 없이\n\n흰눈이\n점점이 내려 앉는다\n어느 곳도 서운않게\n\n\n---", "source": "sijo"}, {"id": "sijo_48_6b885b7b3f", "text": "눈\n\n흰눈  /  도목 박의섭\n\n사랑은 이와 같이 \n해야 하나 보구나\n\n모나거나 둥글거나 \n더하고 뺌도 없이\n\n흰눈이\n점점이 내려 앉는다\n어느 곳도 서운않게\n\n\n---", "source": "sijo"}, {"id": "coaching_0_5637654940", "text": "손톱서점 AI 서비스 — 코칭 질문 117개\n(2026-05-17 정리본 / 쇼츠 표현 수정 · 한국어 단독)\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n1.\n지금 당신의 손에 꽉 쥐고 있어서 오히려 당신을 아프게 하는 것은 무엇인가요?\n\n2.\n내 것이 아닌데 내 것이라고 착각하며 살아온 마음의 짐이 있나요?\n\n3.\n오늘 딱 하나만 내 삶에서 방생할 수 있다면, 무엇을 놓아주고 싶으신가요?\n\n4.\n비우면 비울수록 더 단단하게 채워지는 당신만의 가치는 무엇입니까?\n\n5.\n진짜 나로 살지 못하게 방해하", "source": "coaching"}, {"id": "coaching_1_16f3bede9f", "text": "딱 하나만 내 삶에서 방생할 수 있다면, 무엇을 놓아주고 싶으신가요?\n\n4.\n비우면 비울수록 더 단단하게 채워지는 당신만의 가치는 무엇입니까?\n\n5.\n진짜 나로 살지 못하게 방해하는 목소리는 무엇인가요?\n\n6.\n세상의 속도를 따라가느라 놓쳐버린 당신 내면의 작고 소중한 진심은 어디에 있나요?\n\n7.\n당신의 삶에서 가장 정성스럽게 깎아내고 싶은 마음의 옹이는 무엇인가요?\n\n8.\n당신의 삶이 더 자연스럽게 흐르려면, 지금 무엇이 필요한가요?\n\n9.\n오늘 당신이 세상에 놓아준 선한 마음 하나가 있다면 무엇인가요?\n\n10.\n모든 것을 내려", "source": "coaching"}, {"id": "coaching_2_0543f0d8e1", "text": "무엇인가요?\n\n8.\n당신의 삶이 더 자연스럽게 흐르려면, 지금 무엇이 필요한가요?\n\n9.\n오늘 당신이 세상에 놓아준 선한 마음 하나가 있다면 무엇인가요?\n\n10.\n모든 것을 내려놓았을 때, 마지막까지 남아있는 당신의 진짜 모습은 무엇인가요?\n\n11.\n지금 쥐고 있는 그것, 정말 당신의 것입니까?\n\n12.\n내려놓을 때 비로소 보이기 시작하는 당신의 전체는 어떤 모습인가요?\n\n13.\n지금 애쓰고 있는 당신, 이미 충분히 괜찮지 않나요?\n\n14.\n버리는 것이 아닙니다. 본래의 자리로 돌려보내는 것— 지금 당신이 돌려보낼 것은 무엇인가요", "source": "coaching"}, {"id": "coaching_3_32c5b7578d", "text": "어떤 모습인가요?\n\n13.\n지금 애쓰고 있는 당신, 이미 충분히 괜찮지 않나요?\n\n14.\n버리는 것이 아닙니다. 본래의 자리로 돌려보내는 것— 지금 당신이 돌려보낼 것은 무엇인가요?\n\n15.\n오늘 하루에서 가장 '나다웠던' 순간은 언제였나요?\n\n16.\n지금 당신의 마음이 머무는 그곳, 문은 안에서 열릴 수 있지 않을까요?\n\n17.\n무엇이 되려 하지 마세요. 당신 안에 이미 힌트가 있지 않나요?\n\n18.\n당신이 세상에 놓아준 그 마음, 언젠가 당신에게 돌아오지 않을까요?\n\n19.\n지금 이 순간, 당신의 마음은 자유롭습니까?\n\n20.", "source": "coaching"}, {"id": "coaching_4_b3df50cb7e", "text": "당신 안에 이미 힌트가 있지 않나요?\n\n18.\n당신이 세상에 놓아준 그 마음, 언젠가 당신에게 돌아오지 않을까요?\n\n19.\n지금 이 순간, 당신의 마음은 자유롭습니까?\n\n20.\n깎이고 깎여 남은 단 하나의 진실— 그것이 당신에게는 무엇인가요?\n\n21.\n단 하나, 지금 놓아주고 싶은 게 있다면?\n\n22.\n당신이 오래 붙잡고 있는 건 뭔가요?\n\n23.\n완성은 손에서 떠날 때입니다. 당신은 어떻게 생각하나요?\n\n24.\n108번 반복하고 싶은 게 있다면?\n\n25.\n작다는 이유로 포기한 적 있나요?\n\n26.\n지금 멈춘 건가요, 쉬는 건가요", "source": "coaching"}, {"id": "coaching_5_cb2db759a3", "text": "손에서 떠날 때입니다. 당신은 어떻게 생각하나요?\n\n24.\n108번 반복하고 싶은 게 있다면?\n\n25.\n작다는 이유로 포기한 적 있나요?\n\n26.\n지금 멈춘 건가요, 쉬는 건가요?\n\n27.\n당신이 세상에 돌려주고 싶은 게 있다면?\n\n28.\n자연이 당신에게 말을 건 적 있나요?\n\n29.\n지금 이것— 지금 이 순간 당신에게 진짜로 있는 것은 무엇인가요?\n\n30.\n지금 당신 손 안에 있는 것 중, 사실은 이미 떠날 준비가 된 게 있지 않나요?\n\n31.\n당신이 만들어온 것 중 가장 자랑스러운 건 무엇인가요?\n\n32.\n놓아준다는 건 포기가", "source": "coaching"}, {"id": "coaching_6_2aff33af83", "text": "0.\n지금 당신 손 안에 있는 것 중, 사실은 이미 떠날 준비가 된 게 있지 않나요?\n\n31.\n당신이 만들어온 것 중 가장 자랑스러운 건 무엇인가요?\n\n32.\n놓아준다는 건 포기가 아닙니다. 당신에게 '놓아줌'은 어떤 의미인가요?\n\n33.\n멈추지 않으면 실개천도 바다입니다. 지금 당신은 흐르고 있나요?\n\n34.\n작은 것이 세상을 바꾼 경험, 당신에게도 있지 않나요?\n\n35.\n지금 이 순간 자연에게 돌려주고 싶은 게 있다면?\n\n36.\n108번 반복할 만큼 당신 삶에서 소중한 게 뭔가요?\n\n37.\n나무 안에 이미 새가 있었습니다. 당신", "source": "coaching"}], [{"id": "coaching_7_594b8836f5", "text": "않나요?\n\n35.\n지금 이 순간 자연에게 돌려주고 싶은 게 있다면?\n\n36.\n108번 반복할 만큼 당신 삶에서 소중한 게 뭔가요?\n\n37.\n나무 안에 이미 새가 있었습니다. 당신 안에는 무엇이 있나요?\n\n38.\n오늘 하루, 당신은 무엇을 깎아냈나요?\n\n39.\n오래 붙잡고 있는 것 중에, 사실은 이미 떠나보낼 준비가 된 게 있나요?\n\n40.\n당신에게 '완성'은 어떤 순간인가요? 다 됐을 때인가요, 아니면 손에서 떠날 때인가요?\n\n41.\n마지막으로 아무것도 안 하고 그냥 심심했던 게 언제예요?\n\n42.\n당신이 받은 것 중에, 언젠가", "source": "coaching"}, {"id": "coaching_8_74184f0f6c", "text": "'은 어떤 순간인가요? 다 됐을 때인가요, 아니면 손에서 떠날 때인가요?\n\n41.\n마지막으로 아무것도 안 하고 그냥 심심했던 게 언제예요?\n\n42.\n당신이 받은 것 중에, 언젠가 세상에 돌려줘야겠다고 생각해온 게 있나요?\n\n43.\n지금 당신 삶에 이름을 붙인다면 뭐라고 부르고 싶나요?\n\n44.\n지금 이 글을 읽고 있는 당신, 이 순간 마음에 걸리는 게 뭔가요?\n\n45.\n지금 붙잡고 있는 것은 정말 당신의 것입니까?\n\n46.\n놓아주면 지나갈 것인데, 왜 아직 붙잡고 있습니까?\n\n47.\n지금의 불안, 사실 당신의 것입니까?\n\n48.\n당", "source": "coaching"}, {"id": "coaching_9_99d8bcc591", "text": "요?\n\n45.\n지금 붙잡고 있는 것은 정말 당신의 것입니까?\n\n46.\n놓아주면 지나갈 것인데, 왜 아직 붙잡고 있습니까?\n\n47.\n지금의 불안, 사실 당신의 것입니까?\n\n48.\n당신을 무겁게 하는 그 생각, 어디서 온 것입니까?\n\n49.\n지금 놓아주면 무엇이 가벼워집니까?\n\n50.\n붙잡고 있는 이유가 두려움입니까?\n\n51.\n놓아주면 당신은 무엇이 됩니까?\n\n52.\n지금 당신을 붙잡고 있는 것은 생각입니까, 사실입니까?\n\n53.\n이 감정은 지나가는 것 아닌가요?\n\n54.\n지금, 놓아볼 수 있을까요?\n\n55.\n지금 놓아주고 싶은 감정이", "source": "coaching"}, {"id": "coaching_10_50d3ec98f0", "text": "52.\n지금 당신을 붙잡고 있는 것은 생각입니까, 사실입니까?\n\n53.\n이 감정은 지나가는 것 아닌가요?\n\n54.\n지금, 놓아볼 수 있을까요?\n\n55.\n지금 놓아주고 싶은 감정이 하나 있다면 무엇인가요?\n\n56.\n요즘 당신을 가장 붙잡고 있는 생각은 무엇인가요?\n\n57.\n지금 마음속에 조용히 보내주고 싶은 감정이 있나요?\n\n58.\n오늘 당신이 놓아주고 싶은 단어 하나는 무엇인가요?\n\n59.\n지금 당신을 무겁게 만드는 것, 정말 당신의 것인가요?\n\n60.\n놓아주면 가벼워질 것 같은 생각 하나는 무엇인가요?\n\n61.\n오늘 당신이 자연", "source": "coaching"}, {"id": "coaching_11_3acaaa27cc", "text": "은 단어 하나는 무엇인가요?\n\n59.\n지금 당신을 무겁게 만드는 것, 정말 당신의 것인가요?\n\n60.\n놓아주면 가벼워질 것 같은 생각 하나는 무엇인가요?\n\n61.\n오늘 당신이 자연으로 돌려보내고 싶은 것은 무엇인가요?\n\n62.\n당신은 지금 무엇을 붙잡고 있나요?\n\n63.\n지금 이 순간 당신이 방생하고 싶은 것은 무엇인가요?\n\n64.\n당신은 그것을 쥐고 있습니다. 그런데 느껴지나요?\n\n65.\n느껴집니다. 하지만 꼭 붙잡아야 하나요?\n\n66.\n왔습니다. 이제 보내주시겠습니까?\n\n67.\n당신은 그것을 들고 있습니다. 왜인가요?\n\n68.", "source": "coaching"}, {"id": "coaching_12_442c6d1995", "text": "니다. 그런데 느껴지나요?\n\n65.\n느껴집니다. 하지만 꼭 붙잡아야 하나요?\n\n66.\n왔습니다. 이제 보내주시겠습니까?\n\n67.\n당신은 그것을 들고 있습니다. 왜인가요?\n\n68.\n지나갑니다. 허락하시겠습니까?\n\n69.\n붙잡고 있습니다. 놓아보면 어떨까요?\n\n70.\n지금 이것. 놓을 수 있습니까?\n\n71.\n지금 당신의 고통은 저항입니까, 아니면 신호입니까?\n\n72.\n당신이 가장 두려워하는 그것, 한 번도 마주한 적 없지 않나요?\n\n73.\n당신의 몸은 이미 알고 있습니다. 마음이 따라가고 있나요?\n\n74.\n숨을 내쉴 때, 당신은 무엇을", "source": "coaching"}, {"id": "coaching_13_838438eb50", "text": "72.\n당신이 가장 두려워하는 그것, 한 번도 마주한 적 없지 않나요?\n\n73.\n당신의 몸은 이미 알고 있습니다. 마음이 따라가고 있나요?\n\n74.\n숨을 내쉴 때, 당신은 무엇을 내보내고 있나요?\n\n75.\n만약 지금이 아주 소중한 순간이라면, 당신은 무엇을 놓아주겠습니까?\n\n76.\n당신이 반복하는 그 패턴, 어디서 배운 것입니까?\n\n77.\n지금 당신 안에서 부딪히고 있는 두 마음은 무엇인가요?\n\n78.\n비어있음이 두렵습니까? 아니면 채워진 후의 변화가 두렵습니까?\n\n79.\n지금 당신의 호흡은 얕습니까, 깊습니까?\n\n80.\n당신이", "source": "coaching"}, {"id": "coaching_14_7d18fd43b9", "text": "서 부딪히고 있는 두 마음은 무엇인가요?\n\n78.\n비어있음이 두렵습니까? 아니면 채워진 후의 변화가 두렵습니까?\n\n79.\n지금 당신의 호흡은 얕습니까, 깊습니까?\n\n80.\n당신이 자신을 보호하기 위해 자신에게 하는 말은 무엇입니까?\n\n81.\n지금 당신 삶에서 가장 많은 에너지를 빼앗아 가는 것은 무엇인가요?\n\n82.\n당신이 진짜 원하는 것, 말한 적 있습니까?\n\n83.\n지금 당신의 침묵은 평화입니까, 회피입니까?\n\n84.\n당신이 가장 온전히 살아있다고 느끼는 순간은 언제입니까?\n\n85.\n지금 당신이 서 있는 이 자리, 당신이 선택한", "source": "coaching"}, {"id": "coaching_15_3c13b83c5c", "text": "까?\n\n83.\n지금 당신의 침묵은 평화입니까, 회피입니까?\n\n84.\n당신이 가장 온전히 살아있다고 느끼는 순간은 언제입니까?\n\n85.\n지금 당신이 서 있는 이 자리, 당신이 선택한 자리입니까?\n\n86.\n당신의 삶에서 지금 가장 용기가 필요한 한 가지는 무엇인가요?\n\n87.\n이 글을 다 읽고 난 후 당신이 할 단 한 가지 행동은 무엇인가요?\n\n88.\n깎아내면 남는 것이 본질입니다. 당신의 본질은 무엇입니까?\n\n89.\n지금 당신을 붙잡고 있는 것은 기억입니까, 상상입니까?\n\n90.\n놓지 못하는 이유는 사라질까 두려워서인가요?\n\n91.", "source": "coaching"}, {"id": "coaching_16_613350b032", "text": "남는 것이 본질입니다. 당신의 본질은 무엇입니까?\n\n89.\n지금 당신을 붙잡고 있는 것은 기억입니까, 상상입니까?\n\n90.\n놓지 못하는 이유는 사라질까 두려워서인가요?\n\n91.\n지금 이 생각은 사실입니까, 해석입니까?\n\n92.\n지금 당신의 마음은 붙잡고 있습니까, 흐르고 있습니까?\n\n93.\n당신이 놓지 못하는 것, 정말 중요한 것입니까?\n\n94.\n지금의 긴장은 지켜야 해서입니까, 놓지 못해서입니까?\n\n95.\n이 생각이 없다면 당신은 더 자유로울까요?\n\n96.\n지금 이 감정은 머물고 싶어 합니까?\n\n97.\n놓아주면 무엇이 시작될까요", "source": "coaching"}, {"id": "coaching_17_8f084acd3e", "text": "긴장은 지켜야 해서입니까, 놓지 못해서입니까?\n\n95.\n이 생각이 없다면 당신은 더 자유로울까요?\n\n96.\n지금 이 감정은 머물고 싶어 합니까?\n\n97.\n놓아주면 무엇이 시작될까요?\n\n98.\n지금 당신은 익숙함에 있습니까, 새로운 시작 앞에 있습니까?\n\n99.\n지금 당신의 마음은 과거에 있습니까, 지금에 있습니까?\n\n100.\n당신이 붙잡고 있는 것, 당신에게 도움이 되고 있습니까?\n\n101.\n당신이 '나'라고 믿는 그 생각, 정말 당신입니까?\n\n102.\n비우는 것이 두렵습니까, 비워진 후의 자유가 두렵습니까?\n\n103.\n답을 찾으려", "source": "coaching"}, {"id": "coaching_18_92b8821188", "text": "게 도움이 되고 있습니까?\n\n101.\n당신이 '나'라고 믿는 그 생각, 정말 당신입니까?\n\n102.\n비우는 것이 두렵습니까, 비워진 후의 자유가 두렵습니까?\n\n103.\n답을 찾으려 애쓰는 그 마음, 잠시 내려놓을 수 있습니까?\n\n104.\n당신은 지금 존재하고 있습니까, 아니면 애쓰고 있습니까?\n\n105.\n마음의 문턱을 넘지 못한 채 서성이는 진심은 무엇인가요?\n\n106.\n오늘 당신이 만난 풍경 중 당신의 마음을 닮은 것은 무엇입니까?\n\n107.\n애쓰지 않아도 해는 뜨고 나무는 자랍니다. 당신은요?\n\n108.\n당신이 버리지 못한 그", "source": "coaching"}, {"id": "coaching_19_f890899d22", "text": "요?\n\n106.\n오늘 당신이 만난 풍경 중 당신의 마음을 닮은 것은 무엇입니까?\n\n107.\n애쓰지 않아도 해는 뜨고 나무는 자랍니다. 당신은요?\n\n108.\n당신이 버리지 못한 그 조각이 당신의 전체를 가리고 있지는 않나요?\n\n109.\n지금 이 고요함 속에서 당신은 무엇을 듣고 있습니까?\n\n110.\n지금 이 기억에서 한 발짝 물러서면, 무엇이 보이나요?\n\n111.\n가장 깊은 어둠 속에서만 보이는 당신의 빛은 무엇인가요?\n\n112.\n당신을 정의하는 모든 수식어를 떼어내면 무엇이 남습니까?\n\n113.\n세상의 기대를 방생할 때, 당신은 어", "source": "coaching"}, {"id": "coaching_20_5b736e6666", "text": "11.\n가장 깊은 어둠 속에서만 보이는 당신의 빛은 무엇인가요?\n\n112.\n당신을 정의하는 모든 수식어를 떼어내면 무엇이 남습니까?\n\n113.\n세상의 기대를 방생할 때, 당신은 어디로 흐르고 싶나요?\n\n114.\n당신이 지키려 하는 그 자존심이 정말 당신을 지켜주고 있습니까?\n\n115.\n완성되지 않아도 괜찮습니다. 지금 당신에게 완성되지 않아도 되는 것은 무엇인가요?\n\n116.\n과거의 당신에게 건네고 싶은 단 하나의 용서는 무엇인가요?\n\n117.\n방생된 나무 조각처럼, 당신도 자유로워질 권리가 있지 않을까요?\n\n━━━━━━━━━━━━", "source": "coaching"}, {"id": "coaching_21_eb99aca14e", "text": "엇인가요?\n\n116.\n과거의 당신에게 건네고 싶은 단 하나의 용서는 무엇인가요?\n\n117.\n방생된 나무 조각처럼, 당신도 자유로워질 권리가 있지 않을까요?\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n총 117개 | 손톱서점 AI 서비스 전용 정리본", "source": "coaching"}]];

function log(msg, type='') {
  const el = document.getElementById('log');
  const line = document.createElement('div');
  line.className = type;
  line.textContent = new Date().toLocaleTimeString() + ' ' + msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

async function startUpload() {
  const secret = document.getElementById('secret').value.trim();
  if (!secret) { alert('비밀키를 입력하세요'); return; }

  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  btn.textContent = '업로드 중...';

  log(`업로드 시작: 총 ${BATCHES.length}개 배치`);

  for (let i = 0; i < BATCHES.length; i++) {
    try {
      log(`배치 ${i+1}/${BATCHES.length} 업로드 중... (${BATCHES[i].length}개)`);
      const res = await fetch('/api/upload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ secret, records: BATCHES[i], batch: i+1 })
      });
      const data = await res.json();
      if (res.ok) {
        log(`✅ 배치 ${i+1} 완료: ${data.message}`, 'ok');
      } else {
        log(`❌ 배치 ${i+1} 오류: ${data.error}`, 'err');
      }
    } catch(e) {
      log(`❌ 네트워크 오류: ${e.message}`, 'err');
    }
    await new Promise(r => setTimeout(r, 800));
  }

  log('🎉 전체 업로드 완료!', 'ok');
  btn.textContent = '완료!';
}
</script>
</body>
</html>
