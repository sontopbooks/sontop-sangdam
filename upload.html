었기 때문에 그 메시지가 전 세계로 퍼져나갔다. **'나'를 어떤 위치에 놓느냐가 굉장히 중요하다.** 그 자리가 메신저의 자리여야 한다. 책이라는 가치 신념 위에 메신저로서의 정체성을 확립하는 것이다. 단순히 코치로서 1대1 만남에 머무는 것이 아니라, 자기 메시지를 생산하고 전달하는 사람으로 자리를 잡는 것이다.\n\n---\n\n#### **중심을 잡는다는 것**\n\n정체성이 없으면 오락가락한다. 이것저것 해보고, 번아웃이 오고, 다시 돌아오고를 반복한다. 그 지그재그가 반드시 나쁜 것은 아니다. 그 과정에서 자기 진폭을 알게 된다. '나는 이런 범위 안에서 가야 되겠구나'라는 것을 몸으로 익히는 것이다. 그러나 결국은 중심으로 돌아와야 한다. 나는 누구인가라는 메시지로 정체성을 세우는 것, 그것이 **코치로서, 창작자로서, 어떤 역할로서든 오래 지속하", "source": "essay"}, {"id": "essay_204_45c1c8c29c", "text": "것을 몸으로 익히는 것이다. 그러나 결국은 중심으로 돌아와야 한다. 나는 누구인가라는 메시지로 정체성을 세우는 것, 그것이 **코치로서, 창작자로서, 어떤 역할로서든 오래 지속하는 힘의 뿌리** 다. 메시지를 생산한다는 것은 자기 안을 들여다보는 일이기도 하다. 내가 진짜 무엇을 알고 있는지, 무엇을 말하고 싶은지, 그것을 세상에 내놓는 행위다. 그것이 쌓일 때 메신저가 된다. #메신저정체성 #메시지생산 #스피커 #포지셔닝 #코치\n\n--- (구분선)\n\n[파일명: 명사에서동사로_정체성전환_수필.md]\n\n### **명사에서동사로_정체성전환_수필**\n\n#### **나는 의사다 — 명사의 함정**\n\n\"장래 꿈이 뭐냐\"고 물으면 \"선생님이요\", \"의사요\"라고 답한다. 명사로 답한다. 그렇게 정체성이 명사로 고정된다. 그런데 명사로 고정된 정체성에 문제가 생기면 어떻게 되는가. \"당신 직업을 바꾸세요\"라고 하면 바꾸는가? 바꾸지 않는다. 저항이 생긴다. '나는 의사인데 의사가 아니면 나는 무엇인가'라는 공포가 온다. 명사로 된 정체성은 그것이 흔들릴 때 사람 전체가 흔들린다. '나는 루저다', '나는 찌질하다', '나는 못생겼다' — 이런 잘못된 정체성도 명사로 고정돼 있다. 명사를 명사로 바꾸려 하면 저항이 크다. 그래서 **명사에서 동사로 바꿔줘야 한다.**\n\n---\n\n#### **동사로 바꾸면 무슨 일이 일어나는가**\n\n\"왜 의사가 됐습", "source": "essay"}, {"id": "essay_205_6a219b5541", "text": "돼 있다. 명사를 명사로 바꾸려 하면 저항이 크다. 그래서 **명사에서 동사로 바꿔줘야 한다.**\n\n---\n\n#### **동사로 바꾸면 무슨 일이 일어나는가**\n\n\"왜 의사가 됐습니까? 의사로서 무엇을 하고 싶습니까?\" 이렇게 물으면 답이 달라진다. \"사람을 살리고 싶어서요.\" \"사람을 치유하는 일을 하고 싶어요.\" 이 순간 정체성이 동사가 된다. **사람을 살리는 사람.** 의사라는 명사가 아니라 살린다는 동사가 정체성의 핵심이 된다. 그러면 어떻게 되는가. 의사를 그만두더라도 타격을 안 받는다. 의사가 아닌 다른 방식으로도 사람을 살리는 일에 기여할 수 있다. 정체성이 흔들리지 않는다. 동사형 정체성은 가변적이다. 그때그때에 따라 새로운 형태로 나타날 수 있다. 퇴사를 하는 사람, 새로운 정체성으로 전환하고 싶은 사람 — 이들에게 필요한 것이 이것이다. 로버트 딜츠(Robert Dilts)의 신경 논리 수준과 이 동사형 정체성 전환이 결합되면 **굉장히 강력한 툴** 이 된다.\n\n---\n\n#### **온통 나에서 정체성을 세운다**\n\n그런데 이 동사형 정체성 전환에도 더 깊은 뿌리가 필요하다. 외부에서 조건 지어진 가치와 신념을 가지고 비전을 세우면, 그것은 조건 지어진 비전이다. 사회적 통념 안에서 만들어진 것이다. 거기서 나온 정체성은 여전히 불안하다. **온통 나** 에서 세워야 한다. 온통 나임을 깨달은 자리에서 정체성을", "source": "essay"}, {"id": "essay_206_6d2abbde16", "text": "것은 조건 지어진 비전이다. 사회적 통념 안에서 만들어진 것이다. 거기서 나온 정체성은 여전히 불안하다. **온통 나** 에서 세워야 한다. 온통 나임을 깨달은 자리에서 정체성을 세우고, 그 정체성에 맞는 가치와 신념을 세우고, 그에 맞는 능력을 장착하고, 그 능력으로 사회에 기여하는 행동을 한다. 그래야 환경에 선한 영향력을 미칠 수 있다. 온통 나가 참나보다 더 정확한 표현이다. **참나라고 하면 찾아야 할 것처럼 들린다.** 온통 나는 이미 전체인 것이다.\n\n---\n\n#### **영성 단계까지 가야 진정한 코칭이다**\n\n지금 많은 코치들이 능력, 행동, 환경 수준에서 머문다. \"성장하려면 능력을 키우세요\", \"행동을 고치세요\", \"환경을 바꾸세요.\" 여기서 더 나아가지 못한다. 가치와 신념, 정체성 수준을 건드리는 것을 겁낸다. MCC가 되어도 자신이 없다. **진정한 코칭은 이 저항을 뚫고 들어가야 한다.** 가치, 신념, 정체성을 건드릴 수 있어야 한다. 거기서 영성 단계로 가서 새로운 비전을 세우고, 새로운 정체성을 세우고, 가치와 신념을 다시 세워야 한다. 진정으로 변화가 되려면 영성 단계까지 가야 한다. 그래야 강력한 효과가 나온다. 그것이 **영성 코칭** 이다. #명사에서동사로 #정체성전환 #온통나 #영성코칭 #딜츠\n\n--- (구분선)\n\n[파일명: 모름과앎_가능성의공간_수필.md]\n\n### **모름과 앎, 가능성의", "source": "essay"}, {"id": "essay_207_06eac97e12", "text": "*영성 코칭** 이다. #명사에서동사로 #정체성전환 #온통나 #영성코칭 #딜츠\n\n--- (구분선)\n\n[파일명: 모름과앎_가능성의공간_수필.md]\n\n### **모름과 앎, 가능성의 공간**\n\n#### **모름은 알지 못함이 아니다**\n\n모른다는 것과 알지 못한다는 것은 다르다. 알지 못함은 앎에 종속되어 있다. 앎이라는 기준이 먼저 있고, 거기에 미치지 못하는 결여 상태다. 뭔가 문제가 있는 것이다. 그런데 **모름은 그런 결핍 상태가 아니다.** 특정한 앎에 종속되지 않은 것이다. 창조도 다 알아서 되는 것이 아니다. 계속 모르는 상태에서, 그러나 관심은 있는 상태에서 나온다. 알지 못함은 그것만 알면 해소되어버린다. 그런데 모름은 특정한 앎 이상이다. 새로운 앎이 생길 수 있는 공간이다. 그 앎과는 전혀 다른 새로운 앎이 나올 수 있는 열린 공간이다.\n\n---\n\n#### **비활성화된 가능성**\n\n모름은 비활성화된 상태다. 없는 것이 아니다. 부족함이나 결여가 아니다. **어떤 것으로도 활성화될 수 있는 가능성이 열려있는 상태** 다. 모니터를 생각해보면 안다. 빛이 켜지고 꺼지지만 거기서 1700만 가지의 색으로 활성화될 수 있다. 특정한 딱 하나의 앎을 주장하지 않고 있기 때문이다. 딱 이 색이다 하고 하나만 주장해버리면 그거 하나로 끝나버린다. 모름은 그것이 아니다. 어떤 색으로도 표현될 수 있는 가능성 그 자체다. 알지 못함", "source": "essay"}, {"id": "essay_208_506f6c3ff7", "text": "주장하지 않고 있기 때문이다. 딱 이 색이다 하고 하나만 주장해버리면 그거 하나로 끝나버린다. 모름은 그것이 아니다. 어떤 색으로도 표현될 수 있는 가능성 그 자체다. 알지 못함이 제한된 앎이라면, 모름은 **열려있는 앎** 이다. 진정한 앎이다. 그래서 모름이 창조성의 원천이 되는 것이다. 모름을 공성(空性)과도 연결할 수 있다. 비어있음에서 온갖 것들이 다 나오듯이.\n\n---\n\n#### **찻잔이 비어있는 이유**\n\n찻잔을 보면 안이 비어있다. 비어있기 때문에 무언가를 담을 수 있다. 커피도 담을 수 있고, 물도 담을 수 있고, 차도 담을 수 있다. 가능성이 열려있는 것이다. 그런데 왜 비어있는지 사실은 모를 수 있다. 그렇기 때문에 뭐든지 담을 수 있는 것이다. 목마른 사람에게 물을 떠다 주면 그것이 사랑이다. 표현되고 나면 다시 원래 비어있음으로 돌아간다. **채어있음으로만 고정되어버리면 가능성이 제한된다.** 그래서 삶에서 모름을 초대할 수 있어야 한다. 모름을 충분히 즐길 수 있어야 한다. 이것은 다른 면으로 보면 적극적인 쉼과도 연결된다. 명상에서의 비어있음도 아무것도 없는 무의 상태가 아니다. 앎을 전제로 한 알지 못함이 아니라, 앎에 종속되지 않은 **모름** 이다. 알지 못함은 채우면 되는 것이고, 모름은 그 자체로 충분한 것이다. #모름과앎 #가능성의공간 #공성 #창조성의원천 #그냥아는마음\n\n--- (구분선)", "source": "essay"}, {"id": "essay_209_76d33587a5", "text": "지 않은 **모름** 이다. 알지 못함은 채우면 되는 것이고, 모름은 그 자체로 충분한 것이다. #모름과앎 #가능성의공간 #공성 #창조성의원천 #그냥아는마음\n\n--- (구분선)\n\n[파일명: 모름과점_허구적자아의철학_수필.md]\n\n### **모름이앎의어머니_점과허구적자아_수필**\n\n#### **모른다는 것을 당당히 여기기로 했다**\n\n당최 무슨 말인지 모르겠다. 그런데 이 **모른다는 것이 어떻게 보면 앎의 어머니** 라는 생각이 든다. 모름의 상태를 우리는 어색해하고 불안해한다. 그러나 모름의 상태에 있는 것이 그렇게까지 할 일은 아니다. 모르는 것을 당당하게 여기기로 했다.\n\n---\n\n#### **점에는 크기가 없다**\n\n점(點)이라는 것 자체도 우리가 모른다. 점이 이어져 선이 되면 '아, 이것이 무언가구나' 하고 파악된다. 선이 넓어지면 면이 된다. 그런데 점 자체는 **크기가 없다.** 점이 크기가 있다고 하는 순간, 그것은 이미 면이 되어버린다. 점은 위치는 있는데 크기가 없다. 그러니까 **점은 관계 속에서만 파악된다.** 사실 이것이 허구다. 가장 최소 단위가 점이라고 볼 수 있는데, 그 최소 단위가 허구인 것이다. 우리가 보는 것도 **관점(觀點)**이다. 360도 전체를 보는 것이 아니라 하나의 관점만을 취한다. 그렇다면 나의 관점이라는 것이 얼마나 허구인가.\n\n---\n\n#### **모름이 앎의 어머니인 이유**\n\n'", "source": "essay"}, {"id": "essay_210_40b2aa8f44", "text": "點)**이다. 360도 전체를 보는 것이 아니라 하나의 관점만을 취한다. 그렇다면 나의 관점이라는 것이 얼마나 허구인가.\n\n---\n\n#### **모름이 앎의 어머니인 이유**\n\n'ㄱ'이라는 문자 하나에 무슨 의미가 있는가. 아무 의미가 없다. 그런데 'ㄱ'과 '아'와 'ㅁ'이 만나면 '감'이 된다. **아무 의미 없는 점과 같은 것들이 관계를 맺었을 때 비로소 의미가 생긴다.** 이것이 모름이 앎의 어머니인 이유다. 칸트가 물 자체(Ding an sich)를 모르겠다고 한 것도 이해가 된다. 그것은 파악할 수 없다. 1원이라는 화폐도 마찬가지다. 1원 하나에 무슨 의미가 있는가. 그런데 1원이 합쳐지고 빼지고 나눠지면서 관계를 맺고 논리를 확장하면, 누군가에게는 엄청난 돈이 되고, 빵이 되고, 삶이 되고, 목숨이 된다. 아무것도 아닌 것이 관계 속에서 파악되면 그렇게 된다. 수학도 그렇다. 1 더하기 1은 왜 2인가. 어차피 의미가 없는 것들에 우리가 논리를 입힌 것이다. 지금 우리가 생각하는 논리들이 다 **허구를 바탕으로 세워진 것** 이다.\n\n---\n\n#### **자아라는 것도 하나의 점이다**\n\n가장 근본적인 허구는 자아다. **자아라는 것도 하나의 점이다.** \"너 누구야?\" 하면 \"난 누군데\" 한다. 그런데 그것이 누구라고 파악하는 것은 전부 관계를 얘기하는 것이다. 나는 아버지다 — 딸과의 관계다. 나는 남편이다 — 아내", "source": "essay"}, {"id": "essay_211_43e5aee77f", "text": "점이다.** \"너 누구야?\" 하면 \"난 누군데\" 한다. 그런데 그것이 누구라고 파악하는 것은 전부 관계를 얘기하는 것이다. 나는 아버지다 — 딸과의 관계다. 나는 남편이다 — 아내와의 관계다. 나는 선생이다 — 학생들과의 관계다. 나라는 것을 특정 지을 수 없다. 나는 다른 하나의 점이기 때문에 크기를 갖지 않고 위치값만 있다. 그것도 공간에서의 위치가 아니라 **관계 속에서의 위치를 점유하고 있는 것뿐이다.** 그러니까 \"나는 누구인지\" 아무리 고민해도 알 수가 없다. 백날천날 수행을 하고 도를 닦아도 \"나는 누구지?\"는 모른다. **점이기 때문에, 점 자체가 모름이기 때문이다.** #모름 #점과관계 #허구적자아 #칸트 #관점\n\n--- (구분선)\n\n[파일명: 모름의확인_믿음이아니라확인_수필.md]\n\n### **모름의확인_믿음이아니라확인_수필**\n\n#### **철학은 모름의 영역을 넓혀가는 것이다**\n\n젊어서 수행 생활을 했다. 길지 않은 시간이었지만. 그 이후로도 살아오면서 줄곧 이 물음이 따라다녔다. **도대체 안다는 것이 무엇인가.** 이 물음이 깊어질수록 무기력해졌다. 앎이라고 생각했던 것들이 하나씩 허물어졌다. 철학을 공부하는 목적이 뭔지 스스로에게 물어보면, 솔직하게는 이것밖에 없다. **모름에 대한 확인.** 그것뿐이다.\n\n---\n\n#### **믿는다가 아니라 확인한다**\n\n신앙에 대해서도 같은 생각이 든다. 신이 세상의", "source": "essay"}, {"id": "essay_212_5a4174cfd7", "text": "물어보면, 솔직하게는 이것밖에 없다. **모름에 대한 확인.** 그것뿐이다.\n\n---\n\n#### **믿는다가 아니라 확인한다**\n\n신앙에 대해서도 같은 생각이 든다. 신이 세상의 본질이라면, 내가 알고 있던 모든 것을 다 털어냈을 때야 비로소 만날 수 있는 것이 아닐까. 나는 '믿는다'는 말보다 **'확인한다'**는 말이 더 와닿는다. '믿는다'는 것은 막연하다. 일방적이다. 그리고 믿는다는 것은 이미 믿지 않음을 전제한다. 그러니 그냥 확인할 뿐이다. 신이면 신, 불성이면 불성. 그때그때 확인하는 것뿐이다. 지식으로 달라붙고 앎으로 달라붙는 것이 아니다.\n\n---\n\n#### **안팎이 둘이 아니다**\n\n내 안의 신을 확인한다고 할 때, 그 안이 과연 어디인가. 내 육체 안인가. 육신 안은 오히려 볼 수도 없다. 따지고 보면 안을 더 모른다. **안팎이 둘이 아니다.** 보편적인 신앙도 그렇다. 어느 세력이 더 커졌느냐에 따라 보편이 되었을 뿐이다. 동방정교가 서양에서 주류가 됐다면 그것이 보편적인 신앙이 됐을 것이다. 보편이라는 것 자체가 힘의 문제였다.\n\n---\n\n#### **몸과 마음을 함께 수행해야 한다**\n\n동방정교 수도사들이 몸으로 수행하는 방식이 와닿는다. 서양철학은 몸과 마음을 분리해 이데아적인 것만이 온전하다고 보았다. 정신만을 앞세우는 그 방식에서 벗어나, **몸과 마음을 다 함께 수행해야 한다** 는 것. 물 뜨", "source": "essay"}, {"id": "essay_213_44e7cd5b24", "text": "이 와닿는다. 서양철학은 몸과 마음을 분리해 이데아적인 것만이 온전하다고 보았다. 정신만을 앞세우는 그 방식에서 벗어나, **몸과 마음을 다 함께 수행해야 한다** 는 것. 물 뜨는 정신이 따로 없다. 몸과 마음은 동전의 양면이다. 둘이 아니다. 수행에서 어느 것 하나도 배제할 수 없다. 모른다는 것을 확인하면서, 몸으로 살아가면서, 그렇게 하루하루를 수행으로 삼는다.\n\n**철학의 역설 - 모름의 확인과 신념 너머의 실재**\n\n**본문:** 철학을 하는 마음 자세는 모름의 영역을 넓혀가는 것이라고 봅니다. 저도 젊어서 수행 생활을 좀 해봤지만, 도대체 안다는 것이 뭔가에 대한 회의가 굉장히 많이 들거든요. 그래서 삶이 무기력해지기도 하죠. 사실 이런 철학 공부를 하는 목적은 그냥 '모름에 대한 확인'이라고밖에 볼 수 없어요. 그럼에도 불구하고 이렇게 주저리주저리 떠드는 거는, 아까도 말했지만 그냥 반갑고 심심해서 하는 거지 그 이상도 이하도 아닙니다.\n\n종교적으로 신을 배워서 알 수 있을까요? 신이 세상의 본질이라면, 내가 알고 있던 모든 지식을 다 털어냈을 때야 비로소 만날 수 있는 겁니다. 그래서 저는 '믿는다'는 말보다 '확인한다'는 말이 더 와닿아요. 믿는다는 건 일방적이고 막연하지만, 확인은 그냥 그렇게 볼 수밖에 없는 거니까요. 믿음은 이미 믿지 않음을 전제하고 있어요. 하지만 본질은 나에게 지식으로 달라붙는 게 아니라,", "source": "essay"}, {"id": "essay_214_31708cf2ba", "text": "믿는다는 건 일방적이고 막연하지만, 확인은 그냥 그렇게 볼 수밖에 없는 거니까요. 믿음은 이미 믿지 않음을 전제하고 있어요. 하지만 본질은 나에게 지식으로 달라붙는 게 아니라, 그때그때 확인되는 것뿐입니다.\n\n사실 우리가 익숙하지 않은 동방정교 같은 곳을 보면, 주류에서 벗어난 듯 보여도 그들은 몸으로 직접 부딪히며 확인하는 신앙을 얘기하거든요. 머리로 하는 이해가 아니라, 실오라기 하나 걸치지 않은 날것의 상태에서 본질을 마주하는 것, 그게 진짜 확인인 거죠.\n\n#모름 #확인 #믿음과확인 #몸과마음 #동방정교\n\n--- (구분선)\n\n[파일명: 모름의힘_잠재성_수필.md]\n\n### **모름의힘_잠재성_수필**\n\n#### **모른다는 것은 이미 안다는 것을 전제한다**\n\n뭘 해야 좋을지 모르겠다, 어떻게 해야 될지 모르겠다, 어디로 가야 될지 모르겠다. 우리는 이 말을 자주 한다. 그리고 그 모름을 두려워하거나 빨리 해소하려 한다. 그런데 모름을 조금 다른 각도에서 보면 이렇다. **모른다는 것은 이미 앎을 전제로 하고 있다.** 모름 자체를 모를 수는 없다. 뭘 모르냐고 물어보면 대답하기 어렵지만, 이것을 아느냐 물어보면 모른다고 대답할 수 있다. 그 대답 자체가 이미 앎의 구조 안에 있는 것이다. 아예 아무것도 모르는 사람, 모름하고 상관이 없는 사람은 앎하고도 상관이 없다. 그것은 모름이 아니라 무(無)다.\n\n---\n\n#### *", "source": "essay"}, {"id": "essay_215_fc0d725aac", "text": "자체가 이미 앎의 구조 안에 있는 것이다. 아예 아무것도 모르는 사람, 모름하고 상관이 없는 사람은 앎하고도 상관이 없다. 그것은 모름이 아니라 무(無)다.\n\n---\n\n#### **씨앗의 시간**\n\n씨앗은 땅에 던져질 때 자신이 무엇으로 성장할지 모른다. 껍질 속에서 깜깜하다. 그 모름의 시간을 견뎌야 한다. 그러나 그것을 견딜 수 있는 이유는, 그 단계를 지나면 이미 앎의 상태가 전제되어 있기 때문이다. 장미꽃인지, 참나무인지, 시간이 지나면 드러난다. **모름은 곧 잠재성이다.** 내가 몰라서 막막한 것이 아니라, 모름의 시간을 견디면 그만큼의 잠재력이 내포되어 있는 것이다. 모름 속에 성장과 성숙이 이미 다 들어 있다. 문제는 그 시간을 견디지 못하고 일찍 껍질을 벗고 나오는 것이다. 아직 땅속인데 나오면 썩어버린다. **모름 속에 충분히 머물러야 한다.** 모름을 회피하는 것이 아니라, 오히려 모름을 적극적으로 삶에 초대해야 한다. 내가 모르는 분야가 많을수록 알 수 있는 가능성이 더 많이 열린다.\n\n---\n\n#### **셀프 원이 떠들 때 셀프 투는 채널을 돌린다**\n\n모름 속에 있을 때 셀프 원은 불평불만을 쏟아낸다. '이 상태로 있으면 안 돼', '딴 거라도 해봐야 되는 거 아니냐.' 그런데 셀프 투는 그 말을 듣고 있으면서도 세상과 열려 있다. **셀프 투가 올셀프(All Self)이기 때문에 세상과 둘이 아니다.**", "source": "essay"}, {"id": "essay_216_1b6c68612f", "text": "'딴 거라도 해봐야 되는 거 아니냐.' 그런데 셀프 투는 그 말을 듣고 있으면서도 세상과 열려 있다. **셀프 투가 올셀프(All Self)이기 때문에 세상과 둘이 아니다.** 셀프 원이 볼 때 셀프 투는 아무것도 안 하는 것 같지만, 모름 속에 있는 동안 셀프 투는 계속 방법을 찾는다. 채널을 맞추기 위해 다이얼을 돌리고 있는 것이다. 채널이 맞으면 해답이, 영감이, 앎이 온다. 셀프 원의 말에 끌려서 타협하고 섣부른 답을 외워버리는 것은, 학교에서 정해진 답 하나만 받아쓰는 것과 같다. 그렇게 하면 엄청나게 많은 가능성을 스스로 잘라버리는 것이다. **잠재의식의 보고를 여는 마스터키가 모름이다.** 명상을 하는 것도 적극적으로 모름을 초대하는 것이다. 머리를 굴려서 알려고 하면 안 된다. 모름 속에 있다 보면 불현듯 영감이 온다.\n\n---\n\n#### **코치의 질문과 소크라테스**\n\n코칭 질문이 사람의 생각을 여는 열쇠인 것도 같은 이유다. 코치가 물어보면 생각을 해야 한다. 그 생각의 시간이 모름을 초대하는 시간이다. 섣불리 답을 내버리면 내가 낸 만큼만 본다. 깊이 숙고하고 깊이 있는 답을 내면, 그 답을 내가 다시 듣는다. 코치는 거울이다. 내가 모르던 나의 영역이 열리는 것이다. 소크라테스가 '나는 내가 모른다는 것을 안다'고 한 것이 바로 그것이다. **모름이 우리의 본연적이고 본질적인 상태다.** 플라톤과 아리스토텔레", "source": "essay"}, {"id": "essay_217_5a93f60824", "text": "모르던 나의 영역이 열리는 것이다. 소크라테스가 '나는 내가 모른다는 것을 안다'고 한 것이 바로 그것이다. **모름이 우리의 본연적이고 본질적인 상태다.** 플라톤과 아리스토텔레스로 이어지는 스승과 제자의 대화도, 스승이 제자를 계속 모름으로 초대한 것이었다.\n\n---\n\n#### **진공묘유(眞空묘有): 모름에서 묘한 것이 나온다**\n\n무극(無極)에서 태극(太極)이 나왔다. 공(空)에서 묘한 것이 나온다. **진공묘유(眞空妙有)** . 진공이 모르는 상태다. 아무것도 없는 것 같은데, 거기서 묘한 것이 드러난다. 모름을 성숙시키면 거기서 싹이 트고 뭔가가 발현된다. **모름은 개념이 없는 세계다.** 우리는 개념을 통해서만 알려고 한다. 그런데 개념은 실상이 아니다. 언어를 가지고 실상을 알려고 하니까 자꾸 몰라지는 것이다. 지도를 보고 가봤다고 하거나, '사과'라는 글자를 보고 사과를 먹었다고 하는 것과 같다. 비를 잡아놓고 보면 물이 된다. 삶도 마찬가지다. 삶은 동사인데, 딱 잡아서 개념화시켜 '삶은 이것이다'고 하는 순간 삶이 아닌 것이 된다. 모른다는 것은 신비롭다는 것이다. 모르기 때문에 삶이 신비롭다. 그 신비로움을 하나의 낱말로 고정시켜버리려 할 때, 삶의 신비가 사라진다. 모름을 소중하게 보살펴야 한다. 모름이 저절로 열릴 때까지. #모름의힘 #잠재성 #진공묘유 #올셀프 #명상\n\n--- (구분선)\n\n[파일명: 목적과", "source": "essay"}, {"id": "essay_218_45ee1cee8c", "text": "할 때, 삶의 신비가 사라진다. 모름을 소중하게 보살펴야 한다. 모름이 저절로 열릴 때까지. #모름의힘 #잠재성 #진공묘유 #올셀프 #명상\n\n--- (구분선)\n\n[파일명: 목적과목표_다가가라_수필.md]\n\n### **목적과목표_다가가라_수필**\n\n#### **끌어당기지 말고 다가가라**\n\n끌어당김의 법칙에 대해 이야기할 때 빠지기 쉬운 함정이 있다. 가만히 있으면서 목표를 나한테 끌어당기는 것이다. 그것은 내가 이루고자 하는 목적을 향해서 가는 것이 아니다. 먼저 목적과 목표를 구분해야 한다. **장기적인 목적** 은 '나는 왜 그것을 이루고 싶은가', '내가 그것을 추구하는 이유는 무엇인가'에 대한 답이다. 그것이 가치일 수도 있고 비전일 수도 있다. 목적은 멀기 때문에, 그 여정 중간중간에 이정표로서 **목표를 세운다** . 목표를 잊지 않기 위해 확언을 활용하는 것은 괜찮다. 그러나 목표를 끌어당기는 것과 목적을 향해 나아가는 것은 다른 것이다.\n\n---\n\n#### **방법을 찾는 것이 먼저다**\n\n목적을 향해 가기 위해서는 먼저 자기 자신을 파악해야 한다. **나의 강점이 무엇인가, 지금 이 상황에서 내가 할 수 있는 일이 무엇인가.** 그렇게 파악된 나를 바탕으로, 내가 세상에 어떤 이득을 줄 수 있는지를 본다. 그 방법을 찾는 것이 우선이다. 방법을 찾아서 **실행으로 옮기면 내가 목표에 다가가는 것** 이다. 목표를 끌", "source": "essay"}, {"id": "essay_219_e9e19fe8dc", "text": "된 나를 바탕으로, 내가 세상에 어떤 이득을 줄 수 있는지를 본다. 그 방법을 찾는 것이 우선이다. 방법을 찾아서 **실행으로 옮기면 내가 목표에 다가가는 것** 이다. 목표를 끌어당기는 것이 아니라. 그 과정이 중요한 이유는 그 안에서 내가 단단해지고 야물어지기 때문이다. 어떤 환경에 처하더라도 버텨낼 힘이 거기서 생긴다.\n\n---\n\n#### **끌어당기는 주체가 에고라면**\n\n단순하게 생각으로 세상을 조종한다는 방식으로 끌어당김의 법칙을 사용할 때, 그 끌어당기는 주체가 무엇인가를 물어야 한다. **그것은 에고가 아닌가.** 욕망이 끌어당기는 것이다. 에고가 커지고 욕망이 충족되는 방향으로 가는 것이다. 그것이 참나로 사는 여정일 수 없다. 그래서 **조심과 경계가 필요하다.** 끌어당기지 말고 다가가라. 그게 더 쉽고, 이치에 맞다.\n\n---\n\n#### **산을 오르는 것처럼**\n\n목표를 향해 걸어가다 보면 다리 근력이 생긴다. 내 페이스를 잃지 않고 조절하는 법을 알게 된다. 바위도 만나고, 개울도 만나고, 언덕도 만난다. 그것을 만날 때마다 헤쳐나가는 법을 몸으로 익힌다. 끌어당길 시간에 한 걸음을 내딛는 것이 더 빠르고, 더 실제적이다. #목적과목표 #끌어당김 #에고 #실행 #다가가라\n\n--- (구분선)\n\n[파일명: 목표크기_가치상승_수필.md]\n\n### **목표크기_가치상승_수필**\n\n#### **목표가 방법을 결정한다*", "source": "essay"}, {"id": "essay_220_7998107c92", "text": "표 #끌어당김 #에고 #실행 #다가가라\n\n--- (구분선)\n\n[파일명: 목표크기_가치상승_수필.md]\n\n### **목표크기_가치상승_수필**\n\n#### **목표가 방법을 결정한다**\n\n분필을 하나 팔아야 한다면 부모님이나 형제에게 팔면 된다. 열 개라면 친구들에게 팔 수 있다. 백 개라면 지인을 다 동원해야 한다. 천 개라면 시장을 돌아야 한다. 만 개라면 스마트 스토어를 배워야 한다. 천만 개라면 아마존을 배워야 한다. **목표의 크기가 방법을 결정한다.** 목표를 작게 잡으면 작은 방법만 쓴다. 목표를 크게 잡아야 더 큰 방법을 찾게 된다. 이 이야기를 들으면서 뒤통수를 맞은 느낌이 왔다. 나도 그동안 강의를 1년에 15명에게 팔려고 애를 썼다. 목표가 그만큼 작았던 것이다. 심지어 스스로 파는 것도 아니고 누군가 팔아주기를 기다렸다. 그게 미스였다. 전 국민을 상대로 팔겠다는 목표를 세우면, 전 국민이 지나다니는 길목을 찾게 된다. 목표가 행동을 만든다.\n\n---\n\n#### **가격을 내리지 말고 가치를 올려라**\n\n아이폰 하나를 80만 원에 사서 10억 원에 판 이야기가 있다. 그 아이폰에 수십 년간의 강의와 노하우, 세계 유명 인사들의 연락처와 접속 기회를 담아서 경매에 붙인 것이다. 처음에는 아무도 손을 들지 않았지만, 안에 담긴 가치를 하나씩 열어놓자 경매는 10억 원에서 끝났다. 여기서 배운 것이 하나 있다. **가격을", "source": "essay"}, {"id": "essay_221_0b97c28140", "text": "기회를 담아서 경매에 붙인 것이다. 처음에는 아무도 손을 들지 않았지만, 안에 담긴 가치를 하나씩 열어놓자 경매는 10억 원에서 끝났다. 여기서 배운 것이 하나 있다. **가격을 낮춰서 팔지 말고, 상품의 가치를 올려서 값을 받으라.** 코칭 서비스를 예로 들면, 네 시간에 25만 원짜리 강점 코칭에 전자책 두 권과 진단 도구를 더해서 가치를 열 배로 올렸더니 매출이 네 배 늘었다는 사례가 있다. 홈쇼핑에서 드릴을 사면 피스 100개를 끼워주는 것과 같다. 딱히 드릴이 필요 없어도 나머지를 꽁짜라고 느끼면서 구매를 결정하게 된다. **플러스 알파가 있다는 느낌** 이 선택을 만든다.\n\n---\n\n#### **강점을 조합한다**\n\n약점을 보완하려 하지 말고, 강점 몇 가지를 조합하라는 이야기가 있다. 내 경우를 생각해 보면 이렇다. 40년 명상·영적 수행을 한 사람과 코칭을 받을 수 있는 기회, 수십 년 목공을 해온 사람과 시간을 가질 수 있는 할인권. 이것을 코칭권에 함께 묶으면, 단독 서비스보다 훨씬 더 선택받을 이유가 생긴다. 그러면 힘 안 들이고 줄 수 있는 것이 있어야 한다. 목공은 품이 들지만, **전자책은 한 번 만들어두면 힘을 들이지 않고 계속 줄 수 있다.** 그것이 전자책을 만들어야 하는 이유다.\n\n---\n\n#### **감성보다 인사이트를**\n\n전자책을 만들 때 감성으로만 접근하는 것과, 실제로 적용할 수 있는 인사이", "source": "essay"}, {"id": "essay_222_8f38da3b8c", "text": "줄 수 있다.** 그것이 전자책을 만들어야 하는 이유다.\n\n---\n\n#### **감성보다 인사이트를**\n\n전자책을 만들 때 감성으로만 접근하는 것과, 실제로 적용할 수 있는 인사이트를 주는 것은 다르다. '이 책을 읽고 이걸 실행해보면 이런 것을 발견하게 될 것이다', '이것을 삶에 적용할 수 있다'는 것을 보여줘야 한다. 테니스를 가르칠 때처럼, 잘하고 못하고가 아니라 지금 어디에 집중해야 하는지를 알게 해주는 것이다. 그렇게 전자책으로 경험한 사람이 코칭을 요청하게 된다. AT&T 부사장도 테니스 세션 하나를 경험하고 나서 코칭을 결정했다. 작은 경험이 큰 결정을 만든다. #목표크기 #가치상승 #플러스알파 #강점조합 #전자책\n\n--- (구분선)\n\n[파일명: 무명_보리_수필.md]\n\n### **무명_보리_수필**\n\n#### **무명(無明)과 무지(無知)는 다르다**\n\n불교에서 말하는 **무명(無明)**을 흔히 무지(無知)와 같은 것으로 오해한다. 무지는 모르는 것이다. 삶에 대한 모름이다. 그런데 무명은 다르다. 무명의 명(明)은 밝을 명이다. **밝음이 없다는 것** 이다. 모르는 것이 아니라, **왜곡되게 아는 것** 이다. 예를 들어 고정된 나라는 것이 없는데, 고정된 나가 있다고 착각을 일으키는 것이다. 새로운 것을 몰라서가 아니다. 잘못 알고 있는 것이다.\n\n---\n\n#### **뱀인 줄 알았는데 밧줄이었다**\n\n저쪽에 뱀", "source": "essay"}, {"id": "essay_223_93710ba7b3", "text": "이 없는데, 고정된 나가 있다고 착각을 일으키는 것이다. 새로운 것을 몰라서가 아니다. 잘못 알고 있는 것이다.\n\n---\n\n#### **뱀인 줄 알았는데 밧줄이었다**\n\n저쪽에 뱀이 있는 것 같아서 두려웠다. 그런데 자세히 보니 밧줄이었다. 무명에서 벗어나는 것은 이와 같다. **착각이었구나 하고 여실히 아는 것** 이다. 새로운 앎을 깨달아서 더 높은 경지로 나아가는 것이 아니다. 착각인 줄 알면 되는 것이다. 착각을 했을 때에도 착각을 내가 알았다. **거기에도 이미 앎(知)이 있다.** 착각 속에서도 아는 것이 있었다. 그러니까 무명을 타파하고 깨달음의 세계로 가는 것이 아니라, **무명 자체가 이미 보리(菩提)**다.\n\n그래서 번뇌가 곧 보리라는 말이 여기서 나오는 거야. 뱀(번뇌)인 줄 알았는데 알고 보니 밧줄(보리)이었다는 걸 확인하는 순간, 뱀은 사라지고 밧줄만 남는 거지. 뱀을 죽여서 없애는 게 아니라, 그게 밧줄인 줄 '확인'하면 그게 바로 깨달음(보리)이야. 무명 자체가 따로 있고 보리가 따로 있는 게 아니라, 착각을 바로잡는 그 찰나가 바로 보리라는 거지.\n\n---\n\n#### **번뇌가 곧 보리다**\n\n무명인 줄 안다. 번뇌가 일어나는 줄 안다. 그 앎이 이미 깨달음이다. **번뇌를 없애야 깨달음의 세계로 돌아가는 것이 아니다.** 번뇌 자체가 보리다. 중생이 없으면 부처도 없다. 부처라는 것은 중생에 대한 부처다", "source": "essay"}, {"id": "essay_224_5339109fb9", "text": "안다. 그 앎이 이미 깨달음이다. **번뇌를 없애야 깨달음의 세계로 돌아가는 것이 아니다.** 번뇌 자체가 보리다. 중생이 없으면 부처도 없다. 부처라는 것은 중생에 대한 부처다. 무명에 대한 깨달음인 것이다. 참나도 마찬가지다. 참나를 얻으려고 애쓰는 것 자체가 실체가 없다. 어떻게 노력하고 애를 써서 참나가 되겠는가. **애초에 참나였다.** 다만 '내가 참나가 아니구나' 하고 생각했던 것이다. 그런데 그 착각 속에서도 이미 **참나의 앎(知)**이 있다. 착각하는 그것도 아는 것이기 때문이다. 덧붙일 것이 없다. 착각이었다는 것을 알면 되는 것이다.\n\n#무명 #보리 #번뇌즉보리 #참나 #올셀프\n\n--- (구분선)\n\n[파일명: 무아_관계적존재_수필.md]\n\n### **무아_관계적존재_수필**\n\n#### **고정된 나는 없다**\n\n우리는 흔히 내 안 어딘가에 고정된 '나'가 있어서, 그것이 보고 듣고 느끼고, 죽으면 업보에 따라 다음 생으로 이어진다고 생각한다. 몸 안에 영혼 같은 것이 있어서 눈과 귀를 통해 세상을 경험한다고 여긴다. 그런데 **무아(無我)**는 그 고정된 것이 없다는 것이다. 힌두교와 서양 철학에서는 아뜨만(Atman), 즉 불변하는 자아가 있다고 본다. 불교에서 말하는 안아뜨만(Anatman)은 그것이 아니라는 것이다. '나'가 없다는 말이 아니다. **고정된 나가 있는 게 아니라는 것이다.**\n\n---\n\n#", "source": "essay"}, {"id": "essay_225_1fd2953a9e", "text": "자아가 있다고 본다. 불교에서 말하는 안아뜨만(Anatman)은 그것이 아니라는 것이다. '나'가 없다는 말이 아니다. **고정된 나가 있는 게 아니라는 것이다.**\n\n---\n\n#### **느낌의 무더기가 나다**\n\n들을 때는 듣는 느낌이 발생한다. 볼 때는 보는 느낌이 발생한다. 배고플 때는 배고픈 느낌이 일어난다. 그 느낌들이 **찰나찰나 쉴 새 없이 일어난다.** 너무 빠르게 연속으로 일어나니까 뭔가 하나의 실체가 있어서 느끼는 것처럼 느껴진다. 그러나 그 실체가 따로 있어서 느끼는 것이 아니다. **경험되어지는 것들이 모인 곳을 '나'라고 하는 것이다.** 도둑이 있어서 도둑질을 하는 것이 아니라, 도둑질을 하면 그때 도둑이 되는 것처럼. 나라는 것이 있어서 경험을 하는 것이 아니라, 경험에서 나가 발생하는 것이다. 이것을 **오온(五蘊)**이라 한다. 색·수·상·행·식, 이 무더기가 나다. 고정되게 있는 것이 아니라, 그 무더기 속에서 그때그때 발생하는 느낌들이다.\n\n---\n\n#### **환경과 나는 불가분이다**\n\n**나는 환경을 떠나서 있을 수 없다.** 색이 없으면 보는 나가 없다. 소리가 없으면 듣는 나가 없다. 감각되어지는 것들이 없으면 감각하는 나가 없다. '나'는 외부와 나의 감각 기관이 만나는 **접점에서 발생하는 것이다.** 마치 영화의 주인공을 장면에서 떼어낼 수 없는 것처럼. 배경이 없으면 주인공도 없다.", "source": "essay"}, {"id": "essay_226_82433300a3", "text": "각하는 나가 없다. '나'는 외부와 나의 감각 기관이 만나는 **접점에서 발생하는 것이다.** 마치 영화의 주인공을 장면에서 떼어낼 수 없는 것처럼. 배경이 없으면 주인공도 없다. 배경이 주인공을 규정한다. 우리 삶도 그렇다. 배경과 따로 떨어진 고정된 나라는 것은 없다. **항시 세상과 통으로 나타난다.** 내가 어떤 환경에 처했느냐가 나를 규정짓는다. 그러니까 나만 잘 살아서는 안 된다. 내 주변을 개차반으로 만들어 놓고 나에게만 향기로운 느낌이 일어나기를 바랄 수 없다. **나를 둘러싼 환경을 좋게 만들어야지만 나의 행복도 거기서 찾아진다.** 그것이 통으로 나라고 할 수밖에 없는 이유다. 세상과 내가 불가분의 관계로 엮여 있으니까.\n\n---\n\n#### **물은 한 맛이다**\n\n당신에게 담긴 물과 나에게 담긴 물은 각자 다른 그릇에 담겼으니 서로 다른 경험을 한다. 하지만 물은 한 맛이다. **느낌을 '나'라고 여기는 방식은 누구에게나 같다.** 당신도 일어나는 느낌을 나라고 생각하고, 나도 일어나는 느낌을 나라고 생각한다. 고양이도, 강아지도, 곤충도 그렇다. 내용은 다르다. 각자가 형성된 것이 다르니까. 그러나 그것을 통해 앎이 있다는 것, 그 앎의 방식은 서로가 **둘이 아니다.** 이것이 이름하여 불성이고, 신성이고, 의식이고, 영(靈)이다. 물이 담겼던 그릇이 깨졌어도, 그 물이 다른 그릇에 담기면 또 나가 있다. 그", "source": "essay"}, {"id": "essay_227_08a0b6dfea", "text": "방식은 서로가 **둘이 아니다.** 이것이 이름하여 불성이고, 신성이고, 의식이고, 영(靈)이다. 물이 담겼던 그릇이 깨졌어도, 그 물이 다른 그릇에 담기면 또 나가 있다. 그 나나 이 나나 느낌으로 발생되는 나는 같다. 뭔가가 따로 있어서가 아니다.\n\n---\n\n#### **매 순간 윤회한다**\n\n오늘 내가 잘 살아놔야 내일 내가 잘 산다. 오늘 범죄를 저지르면 내일 그 업을 받는다. **매 순간순간 윤회가 일어나고 있다.** 먼 다음 생의 이야기가 아니다. 나를 위해 잘 살아야 하는 이유가 이것이다. 세상이 나를 규정짓고 있기 때문에, **나를 둘러싼 환경을 좋게 만들고 세상을 좋은 쪽으로 가게 하는 것이 곧 나의 행복을 만드는 것이다.** 나만의 깨달음을 위한 수행이 아니라, 이타가 곧 자리가 되는 것이다. 그것이 대승불교의 보살 정신이다. 구름이 모였다가 흩어지고, 강물이 흘러가듯, 나는 그런 **느낌의 흐름에 연속** 일 뿐이다. 그리고 그 흐름 전체가 통으로 나다. #무아 #오온 #관계적존재 #올셀프 #보살정신\n\n--- (구분선)\n\n[파일명: 무아_올셀프_수필.md]\n\n### **무아_올셀프_수필**\n\n#### **주인이 따로 없다**\n\n무아(無我)라고 할 때, 내가 없다는 말은 이런 뜻이다. 이 봄(seeing)의 주인이 따로 없다는 것이다. 우리는 어떤 딱 실체가 있어서 그것이 보고 듣고 냄새 맡고 생각한다고 여긴다.", "source": "essay"}, {"id": "essay_228_adb7c6da8b", "text": ")라고 할 때, 내가 없다는 말은 이런 뜻이다. 이 봄(seeing)의 주인이 따로 없다는 것이다. 우리는 어떤 딱 실체가 있어서 그것이 보고 듣고 냄새 맡고 생각한다고 여긴다. 그런데 그 주인이 따로 없다. 그냥 봄, 들림, 냄새 맡음, 생각을 앎, 감정이 일어남, 이런 것들이 연속적으로 일어나는 것이다. 불깡통을 빠르게 돌리면 원이 있는 것처럼 보인다. 없는 것은 아니지만 그 원의 주인이 따로 있는 것은 아니다. **없는 것은 아니지만, 그것의 주인이 따로 없다.** 자기라는 이벤트가 일어나고, 나라는 이벤트가 일어나는 것인데, 거기에 주인이 따로 없다. 그냥 다 이 바탕에서 일어난다.\n\n---\n\n#### **물방울의 착각**\n\n여기서 물방울이 생기고, 거기서 물방울이 생긴다. 물방울은 자기가 생긴 형태를 자기라고 생각한다. **착각을 하고 있는 것이다.** 여기서 뽀글뽀글 일어나고 거기서 뽀글뽀글 일어나는 것뿐인데, 그 물방울과 이 물방울이 무슨 차이가 있는가. 그냥 이 공간에서 물방울이 일어나는 것이다. **찰나찰나 일어나는 것을 연속적으로 생각해서 나라고 착각을 일으키고 있는 것이다.** 고정되어 있지 않은데, 없는 것은 아니다. 물방울은 있다. 그러나 그것이 고정된 주인 있는 물방울은 아니다.\n\n---\n\n#### **올셀프(All-Self)**\n\n자기는 여기서 일어나는 뭉치가 자기라고 생각하고, 나는 저기서 일어나는 뭉치가", "source": "essay"}, {"id": "essay_229_1cc6477486", "text": "러나 그것이 고정된 주인 있는 물방울은 아니다.\n\n---\n\n#### **올셀프(All-Self)**\n\n자기는 여기서 일어나는 뭉치가 자기라고 생각하고, 나는 저기서 일어나는 뭉치가 나라고 생각한다. **분리가 되어 있다고 보이는 것이다.** 주인이 따로 없다. 그냥 이것이 다 통으로 하나의 주인인 것이다. 그것이 **올셀프(All-Self)**다. 육신을 기준으로 서로 공유한다는 이야기는 아직 육신이 기준이다. 그것을 더 넘어선 이야기가 이것이다. 주인이 없으니, 서로 나뉘어져 있지 않은 것이다. 이것이 무아를 불교적으로 설명하는 방식이다.\n\n---\n\n#### **에고의 족쇄**\n\n그러면 왜 이 착각에서 풀려나야 하는가. 에고는 자기가 책임이 있다고 본다. 내가 한 행위에 책임져야 하는 주체가 있다고 본다. 그것을 너무 강력하게 믿으니까, 연속적으로 일어나는 것을 딱딱한 실체로 생각해서 다음 생까지 이어진다고 믿게 된다. 안식·비식, 안이비설신의 식(識)들이 회전하며 돌고 있는 것인데, 그 뭉치가 고정된 나라고 생각하면서 거기 갇히는 것이다. **고정된 것이 없는데도 불구하고, 고정됐다고 생각하면서 갇히는 것이다.** 그것은 그때그때 인연 따라 이루어지는 것뿐이다. '나'라는 족쇄에서 풀려난다는 것은, 에고가 고집하는 그 딱딱한 실체가 사실은 없다는 것을 아는 것이다. 물방울이 일어났다가 사라지듯, 나라는 것도 그렇게 일어나는 것임을", "source": "essay"}, {"id": "essay_230_ccf52bc175", "text": "뿐이다. '나'라는 족쇄에서 풀려난다는 것은, 에고가 고집하는 그 딱딱한 실체가 사실은 없다는 것을 아는 것이다. 물방울이 일어났다가 사라지듯, 나라는 것도 그렇게 일어나는 것임을 아는 것이다. #무아 #올셀프 #에고 #착각 #식\n\n--- (구분선)\n\n[파일명: 무의식통과_폭식과환대_수필.md]\n\n# 무의식통과_폭식과환대_수필\n\n---\n\n## 죄책감이 오히려 힘을 준다\n\n먹고 싶은 욕구가 올라올 때, 우리가 흔히 하는 일이 있다. 그걸 억누른다. 참아야지, 참아야지 하면서 식단을 유지하다가 어느 순간 폭발해버린다. 폭식을 한다. 그리고 또 죄책감이 밀려온다. 이게 반복된다.\n\n그런데 중요한 걸 하나 모르고 있다. **참는 것 자체가 오히려 그 욕구에 힘을 주고 있다는 것이다.**\n\n공을 벽에 세게 던지면 그만큼 튕겨 온다. 작용 반작용이다. 내가 어떤 욕구나 감정을 밀어내려고 힘을 쓰면, 그 힘만큼 걔가 더 강하게 되돌아오는 것이다. 억누르고 억누르다 나중에 한 번에 폭발하는 건 의지가 약해서가 아니다. 그건 당연한 귀결이다.\n\n폭식증을 다루는 쪽에서도 처음에 먹고 싶은 거 다 먹으라고 한다고 했다. 그렇게 해소를 시켜줘야 한다는 거다. 그런데 여기서 중요한 건 단순히 먹는 게 아니다. **죄책감이나 2차 꼬리표 없이 그냥 먹는 것이다.** 그 차이가 전부다.\n\n---\n\n## 잠재의식은 의지로 바꾸지 못한다\n\n욕구가 올라오는 건 생각", "source": "essay"}, {"id": "essay_231_79d768d22b", "text": "건 단순히 먹는 게 아니다. **죄책감이나 2차 꼬리표 없이 그냥 먹는 것이다.** 그 차이가 전부다.\n\n---\n\n## 잠재의식은 의지로 바꾸지 못한다\n\n욕구가 올라오는 건 생각의 문제가 아니다. 내분비, 신경 호르몬, 물리적인 게 작용하는 것이다. 생각은 어떤 에너지 형태가 아니고 그냥 생각인 것뿐인데, 욕구는 실질적으로 몸에서 일어나는 일이다. 그래서 의지로 이걸 단번에 바꾸는 건 불가능에 가깝다.\n\n이게 일종의 **무의식**이다. 우리가 몸을 경험할 수 없는 것처럼, 몸 안에서 쌓여온 것들은 의식으로 접근이 안 된다. 귀가 있다는 걸 소리로 아는 것처럼, 안에 있는 것들은 보이지 않는다. 사실 따지면 바깥에는 코도 보이고 손도 보이는데, 안에 있는 건 하나도 안 보이지 않은가.\n\n그렇게 의식이 닿지 않는 곳에 잠재의식으로 쌓이고 쌓인 것들이 있다. 20몇 년 살아오면서 누적된 게 이 결과로 나온 것이다. 외로울 때 먹었다, 또 외로울 때 먹었다, 또 먹었다. 이렇게 반복되면 이게 자동 프로세스가 된다. 외로워 → 먹어, 이 연결고리가 너무 강화돼서 나중엔 통제가 안 되는 것이다.\n\n책 한 줄 읽고, 유튜브 하나 듣고, 그래서 아 맞아 이러면서 한순간에 이게 바뀌기를 바라는 건 그동안 쌓여온 것들의 무게를 모르는 것이다. 당연히 안 바뀐다.\n\n---\n\n## 올라온 것을 알아주면 통과된다\n\n그렇다면 어떻게 하느냐.\n\n명상의 기본이", "source": "essay"}, {"id": "essay_232_85fa8c36f7", "text": "이게 바뀌기를 바라는 건 그동안 쌓여온 것들의 무게를 모르는 것이다. 당연히 안 바뀐다.\n\n---\n\n## 올라온 것을 알아주면 통과된다\n\n그렇다면 어떻게 하느냐.\n\n명상의 기본이 무의식을 의식화시키는 거라고 한다. 더 정확히는 **인식화**다. 그냥 아는 것이다. 올라온 것을 내가 선명하게 봐주는 것이다.\n\n아무 무념무상 상태로 그냥 있으면 뭔가 끊임없이 생각들이 올라오는 걸 볼 수 있다. 평상시에도 그렇게 엄청나게 올라오고 있었던 거다. 다만 우리가 다른 일들에 바빠서 몰랐을 뿐이다. 유튜브 보고, 음악 듣고, 자꾸 집어넣다 보니까 들어갔던 게 또 나오고, 거기다가 또 2차 생각을 입히고, 그게 다시 들어가고. 이게 반복되는 것이다.\n\n중요한 건 이거다. 무의식에서 올라온 것을 내가 선명하게 봐줬다는 건 **의식화시킨 거다.** 알아줬다는 거다. 그러면 얘는 이제 공기 중으로 휘발되듯이 통과해서 날아간다.\n\n반대로 거기다가 \"이러면 안 되는데, 나는 왜 이러지, 이 생각 싫어\" 하고 2차 생각을 입히면 어떻게 되냐. 나무에 연필로 한 번 쓴 건 지우개로 지워진다. 그런데 거기다 계속 덧쓰고 덧쓰면 나중엔 지우개로도 안 지워진다. 내가 없애려고 한 그 2차 생각이 오히려 그 자국을 더 깊게 낸 것이다.\n\n---\n\n## 마음은 원래 다 받아들이고 있다\n\n우리 마음의 본성은 **그냥 아는 마음**과 **온전히 받아들이는 마음**이다.", "source": "essay"}, {"id": "essay_233_60be998414", "text": "생각이 오히려 그 자국을 더 깊게 낸 것이다.\n\n---\n\n## 마음은 원래 다 받아들이고 있다\n\n우리 마음의 본성은 **그냥 아는 마음**과 **온전히 받아들이는 마음**이다. 이 두 가지가 24시간 작동하고 있다. 이게 있기 때문에 내가 나로서 존재할 수 있는 거다.\n\n컵이 보인다. 내가 컵을 온전히 받아들이겠다는 게 아니다. 컵을 아는 순간, 이미 그게 온전히 받아들여진 거다. 화가 올라왔다. 그걸 알아챘다면, 이미 그게 온전히 수용된 거다. 따로 받아주려고 액션을 취할 필요가 없다. 이미 그러하다.\n\n그런데 우리는 여기서 한 가지를 더 한다. \"이건 좋은 거, 이건 나쁜 거\" 하고 분별심을 작동시킨다. 나쁜 건 밀쳐내려 한다. 그러면 걔는 \"난데 왜 나를 밀쳐내?\" 하면서 더 강하게 알아달라고 올라온다.\n\n애기가 징징거리는 거랑 똑같다. 사실 봐달라는 거다. 그런데 \"그래 여기 있었구나\" 하고 안아주면 지가 알아서 또 논다. 루미의 시에 여인숙이 나온다. 찾아오는 손님들을 잘 대접해서 보내면 얘네들이 점점 자주 안 온다. 이 집에서 충분히 알아봐줬기 때문에 다시 올 이유가 없어진 것이다.\n\n**행복을 받고 불행은 안 받겠다고 할 수 없다.** 행복이라는 게 불행을 전제하기 때문이다. 행복이 아닌 게 불행이고, 불행이 아닌 게 행복이다. 둘은 쌍둥이 자매처럼 항상 같이 온다. 동전의 한 면만 잘라내는 건 불가능하다. 우리가 하나", "source": "essay"}, {"id": "essay_234_1334fcb19b", "text": "는 게 불행을 전제하기 때문이다. 행복이 아닌 게 불행이고, 불행이 아닌 게 행복이다. 둘은 쌍둥이 자매처럼 항상 같이 온다. 동전의 한 면만 잘라내는 건 불가능하다. 우리가 하나만 받으려 하기 때문에 괴로운 것이다.\n\n---\n\n## 셀프 코칭 — 칼 로저스를 불러라\n\n심리상담의 대가 **칼 로저스**는 다른 얘기를 별로 안 한다. 그냥 상대가 한 말을 그대로 한 번 더 말해줄 뿐이다. \"이렇게 이렇게 됐다는 거죠.\" 그것만 하는데, 그 사람이 갈 때는 문제가 다 해소돼서 간다. 왜냐하면 알아줬기 때문이다. 판단하지 않고, 평가하지 않고, 그냥 그렇다는 거죠 — 그것뿐이다.\n\n이걸 내가 나한테 해주면 된다. **셀프 코칭이다.** 대단한 기법이 있는 게 아니다. 내 안에서 올라오는 것들을 \"그렇구나\"로 읽어주는 것이다.\n\n그런데 자꾸 까먹는다. 그러면 로저스를 불러라. 먹고 싶은 욕구가 올라오거나, 불안한 생각이 올라오거나, 그럴 때 \"로저스\" 하고 딱 불러라. 그러면 로저스가 읽어준다. \"지금 굉장히 불안한 생각이 많이 드는군요.\" 구나만 붙이면 된다. 그대로 읽어주는 것이다.\n\n그거에 잘됐다 잘못됐다 칭찬도 자책도 하지 말라는 게 아니다. 그 판단 자체를 올라오지 않게 막을 수 없다. 그것도 또 올라온 거다. 그것도 \"아 2차 화살을 날렸네\" 하고 그대로 읽어주면 된다. 끝이다.\n\n---\n\n## 지혜는 패턴을 보는 것이다\n\n의지가", "source": "essay"}, {"id": "essay_235_fb362c3a4e", "text": "올라오지 않게 막을 수 없다. 그것도 또 올라온 거다. 그것도 \"아 2차 화살을 날렸네\" 하고 그대로 읽어주면 된다. 끝이다.\n\n---\n\n## 지혜는 패턴을 보는 것이다\n\n의지가 약해서 그런 게 아니다. **무지의 상태인 것이다.** 잘못된 게 아니라, 그 작용과 반작용의 인과 관계를 명확하게 보지 못하는 거다.\n\n쓰레기통에 쓰레기를 집어넣었는데 거기서 보석이 나오길 바라는 게 말이 안 되듯이, 그동안 쌓인 게 그렇게 나오는 건 당연한 거다. 쓰레기통을 패거나 야단치면 나중에 내가 쓰레기를 버릴 데가 없어진다.\n\n**지혜는 그 패턴을 보는 것이다.** 아, 내가 이런 패턴으로 이렇게 작용 반작용이 일어나는 것뿐이구나. 내가 잘못된 게 아니구나. 그걸 보는 것. 지식으로 무장해서 올라오는 것들을 막으려 하는 게 아니다. 지식은 글자인데, 안에서 올라오는 것들을 어떻게 감당하겠는가.\n\n그리고 이게 폭식증에만 해당하는 게 아니다. 불안, 앞으로 어떻게 살지 하는 걱정, 비교하는 마음, 무기력함 — 다 구조가 똑같다. 작용 반작용, 밀어내면 더 오래 버티고, 놔주면 자기가 알아서 사라진다. 그래서 **강력하게 괴롭히는 그 하나가 나를 해방시켜줄 수 있는 기회**다. 그게 선물인 거다.\n\n그걸 통해서 패턴을 배우면 나머지 모든 것에 다 적용할 수 있다. 구조가 같기 때문에.\n\n---\n\n## 지금 이대로가 문제가 아니다\n\n생각이 문제가 아니다", "source": "essay"}, {"id": "essay_236_9d2bceea8c", "text": ". 그게 선물인 거다.\n\n그걸 통해서 패턴을 배우면 나머지 모든 것에 다 적용할 수 있다. 구조가 같기 때문에.\n\n---\n\n## 지금 이대로가 문제가 아니다\n\n생각이 문제가 아니다. 생각을 문제라고 여기는 게 문제다.\n\n그냥 들어간 게 나오는 것뿐인데, 거기다가 \"이건 문제다, 이러면 안 된다\"는 꼬리표를 붙이니까 얘가 더 강화되는 것이다. 꼬리표 없이 그냥 있다면, 얘는 연기적으로 그냥 조건 따라 흘러가고 있는 것뿐이다.\n\n잠잘 때를 생각해보라. 그 괴롭다는 게 있는가. 없다. 생각이 없으니까. 좋은 얘기를 나눌 때도 없다. 그것 자체가 사라진 게 아니라, 생각이 없으니까 그게 문제가 안 되는 것이다.\n\n있는 그대로가 충만해지면, 그런 욕구로부터 자유로워진다. 그게 **현재, 지금 여기**다.\n\n따로 얻을 것도 없고, 따로 업그레이드할 필요도 없다. 생각만 치워지면, 지금 이 상태에 무슨 문제가 있는가.\n\n---\n\n## 지우는 방법들, 그리고 그 너머\n\n호오포노포노라는 곳에서는 이런 것들이 올라오면 \"미안합니다, 고맙습니다, 사랑합니다, 감사합니다\"를 반복하라고 한다. 이것도 일종의 지우는 작업이다. 올라오는 것들에 이 네 가지를 계속 갖다 붙이면 나중엔 그것만 남는다는 방식이다.\n\n그런데 더 깊은 차원에서 보면, 사실 따로 지울 필요도 없다. 본성에서는 이미 다 온전히 받아들여지고 있기 때문이다. 내가 무언가 올라왔다는 걸 안다면", "source": "essay"}, {"id": "essay_237_6f8fdb3554", "text": "그것만 남는다는 방식이다.\n\n그런데 더 깊은 차원에서 보면, 사실 따로 지울 필요도 없다. 본성에서는 이미 다 온전히 받아들여지고 있기 때문이다. 내가 무언가 올라왔다는 걸 안다면, 그게 이미 온전히 수용된 거다. \"이미 내가 이걸 온전히 받아주고 있네\"를 알아차리는 것이 중요한 거지, 따로 액션을 취할 필요가 없다.\n\n---\n\n## 몸도 위기의식이 있다\n\n먹는 것에 대해 한 가지 더. 다이어트를 극도로 하면 몸이 위기의식을 느낀다. 그러면 음식이 들어왔을 때 무조건 저장하는 코드가 켜진다. 그래서 10kg 뺐는데 15kg이 찌고, 10kg 뺐는데 20kg이 찌는 것이다. 많이 먹어서 찌는 게 아니다. 몸이 영양소 부족을 경험했기 때문에 들어오면 무조건 쌓아두는 것이다.\n\n아무리 먹어도 살이 안 찌는 사람은 몸이 그 위기의식 스위치가 켜지지 않은 것이다. 음식이 남으면 그냥 배출한다. 저장할 이유가 없으니까.\n\n그러니까 다이어트라는 말 자체가 몸한테는 위기 신호다. 좋은 음식을 먹어야 돼, 나쁜 음식은 절대 안 돼, 이런 집착도 마찬가지다. 밀가루 한 입도 먹으면 안 돼 하고 완전 차단을 해버리면 나중에 그것만 보면 눈이 돌아가는 것이다. 별로 좋아하지도 않던 것을 갑자기 폭발적으로 먹고 싶어진다.\n\n음식에 집착하지 않는 것. 그냥 몸을 건강하게 하는 것을 먹으면 된다. 건강한 것만 먹어야 한다는 집착도, 음식이라는 것에 대한 인생", "source": "essay"}, {"id": "essay_238_c222134281", "text": "던 것을 갑자기 폭발적으로 먹고 싶어진다.\n\n음식에 집착하지 않는 것. 그냥 몸을 건강하게 하는 것을 먹으면 된다. 건강한 것만 먹어야 한다는 집착도, 음식이라는 것에 대한 인생 전체의 초점도 내려놓는 것이다.\n\n---\n\n## 먹는 것에 수치심을 느낀다면\n\n사람들이 있을 때 일부러 많이 안 먹고, 혼자서 먹는다는 것. 그 모습에 수치심을 느끼는 거라면, 그것도 올라온 감정이다. 그것도 잘못된 게 아니다. 수치심을 느끼지 않아야 한다는 것도 아니다. 그것도 \"수치심이 올라오는구나\" 하고 그대로 읽어주면 된다.\n\n내가 이걸 드러내지 못했다면, 아무도 모른다. 얘기를 해줘야 같이 알 수 있다. 그리고 얘기를 했을 때 \"너 문제다, 왜 그러냐\"가 아니라 그냥 들어줄 수 있어야 또 얘기를 하게 된다. 이미 그렇게 오픈한 것 자체가 나아지는 것이다. 전에는 드러내지도 못했으니까.\n\n---\n\n내가 나랑 싸울 필요가 없다. 안에서 올라오는 것들은 다 나이고, 다 나를 도우러 온 거다.\n\n#무의식 #폭식 #작용반작용 #칼로저스 #환대\n\n--- (구분선)\n\n[파일명: 물질의몸_차이와평등_수필.md]\n\n### **물질의몸_차이와평등_수필**\n\n#### **왜 물질의 몸으로 오는가**\n\n우주는 물질로 되어 있다. 물질만이 아니라 허공도 있고 다 있지만, 물질성은 우주의 한 부분이다. 그런데 **물질성을 경험하는 누군가** 가 있어야 한다. 귀신처럼 육신이", "source": "essay"}, {"id": "essay_239_17031a580d", "text": "가**\n\n우주는 물질로 되어 있다. 물질만이 아니라 허공도 있고 다 있지만, 물질성은 우주의 한 부분이다. 그런데 **물질성을 경험하는 누군가** 가 있어야 한다. 귀신처럼 육신이 없다면 물질성을 경험하지 못한다. 물질의 몸으로 태어나야 이 물질성을 경험할 수 있고, 그래야 우주가 물질을 알 수 있다. 물질부터 감정, 느낌, 생각, 혼, 영까지, 이 모든 것이 다 온전하게 깨어있는 것이 완전한 우주의 성품이 발현되는 것이다. 물질을 하등 단계라 하여 제외하고 정신적인 것만 높다고 한다면, 굳이 몸을 받고 세상에 나올 이유가 없다. **육신의 동일시됨을 감수하고라도 이 몸을 받고 태어나는 것** 은, 물질도 다 의식화시키기 위해서다. 그것도 다 나라는 것을 알기 위해서다. 더욱이 육체를 갖고 있으면 오히려 깨닫기에 더 좋다고 한다. 천상의 존재들은 항시 행복하고 몸으로 갖는 어려움이 없으니 깨달을 인연이 없다. 우리는 **육체의 한계가 있기 때문에 그 한계를 극복하려는 것이 동기로 작용** 한다. 힘든 상황에 처한 사람이 오히려 더 빠르게 깨달음을 얻는 이유가 그것이다.\n\n---\n\n#### **차이가 차별이 되지 않도록**\n\n차이가 없으면 나라는 것을 느낄 수 없다. 차이 때문에 나가 드러난다. 그런데 **차이가 차별이 되지 않도록** 해야 한다. 내가 차별을 받고 있다고 생각할 때, 내 안에도 차별하는 무언가가 분명히 있다. 받는 차", "source": "essay"}, {"id": "essay_240_58aced1efd", "text": "없다. 차이 때문에 나가 드러난다. 그런데 **차이가 차별이 되지 않도록** 해야 한다. 내가 차별을 받고 있다고 생각할 때, 내 안에도 차별하는 무언가가 분명히 있다. 받는 차별을 통해서 내 안에 있는 차별성을 깨달아야 한다. 나보다 약한 존재들에게 알게 모르게 저지르는 차별성을, 그것을 **평등성** 으로 바꾸어야 한다. 물건이 됐건, 가족이 됐건, 주변의 미물이 됐건. 나보다 센 사람들에게 느끼는 차별의 고통을 **연민과 자비의 마음** 으로 내 안에서 바꾸는 것. 그것이 반면교사다. 그것이 우주의 본래 마음이다. 밀교에서 말하는 **평등성지(平等성智)**가 그것이다. 차이가 있는 자체가 이미 평등하다는 것이다. 우리가 볼 때는 차이가 차별로 느껴지지만, 우주적으로 보면 차이 없이는 우주가 알려질 수 없다. 부처나 중생이나 둘이 아니게 평등하다.\n\n---\n\n#### **고통의 한 부분만을 '나'라고 동일시할 때**\n\n가렵고 아프다. 그 느낌이 드러난다는 것은 그렇지 않은 **베이스** 가 있다는 뜻이다. 더 많이 아프고 더 많이 가려운 것이 있다면 그것이 드러났겠지만, 지금 드러나는 것이 그것이라면 나머지 전체는 그렇지 않다는 것이다. 그 부분을 제외하고 다른 건 다 괜찮다. 그런데 그 한 부분만을 강조해서 '나는 지금 이렇게 고통받고 있다'고 **동일시해버리면 삶이 무거워진다.** 내가 물론 선택하고 결정하는 부분도 있지만,", "source": "essay"}, {"id": "essay_241_f6a0d1efda", "text": "하고 다른 건 다 괜찮다. 그런데 그 한 부분만을 강조해서 '나는 지금 이렇게 고통받고 있다'고 **동일시해버리면 삶이 무거워진다.** 내가 물론 선택하고 결정하는 부분도 있지만, 전체적으로는 **연기적으로 맞물려 들어간다.** 배경인 우주 없이 하나의 존재가 단독으로 '이것이 나다'라고 할 수 없다. 전체성을 회복하면서 나아갈 때 고통에만 매여 사는 것에서 벗어날 수 있다.\n\n---\n\n#### **즐거움의 크기는 별 차이가 없다**\n\n한 달에 200만 원 버는 사람과 2000억을 버는 사람의 즐거움의 크기가 1000억 배 차이가 나야 할 것 같지만, 그렇지 않다. **즐거움이라는 것은 별 차이가 없다.** 그 차이가 실제로 난다면 도파민이 폭발해서 죽어버릴 것이다. 오히려 어마어마한 것을 가진 사람일수록 그것을 잃을까 봐 두려워하는 마음이 훨씬 크다. 이미 둔화가 되어서 소소한 것으로는 만족을 느끼지 못한다. 소소한 것에 행복을 느끼는 사람이 더 행복하다. **물질성에만 갇히면** , 집착과 두려움이 함께 커지고, 즐거움 자체는 점점 무뎌진다. 내가 하기 싫은 일을 남에게 시키는 것은 우주의 이치에 역행하는 것이다. 역지사지의 마음, 지혜와 자비, 평등성. 이것이 불성의 본 모습이다.\n\n권력의 정점에 선 사람이 가장 불안하다. 최고 권력자들은 비서실장과 경호실장을 서로 싸움 붙인다. 한 번은 경호실장에게 편애를 주고, 한 번은 비서", "source": "essay"}, {"id": "essay_242_ad450fbfb4", "text": "이것이 불성의 본 모습이다.\n\n권력의 정점에 선 사람이 가장 불안하다. 최고 권력자들은 비서실장과 경호실장을 서로 싸움 붙인다. 한 번은 경호실장에게 편애를 주고, 한 번은 비서실장에게 편애를 준다. 그러면 두 사람이 충성 경쟁을 벌이고, 권력자는 그 긴장 관계를 유지하면서 자리를 보전한다. 대기업 회장이라면 수십만 명의 생계가 자신의 결정 하나에 달려 있다. 나의 한 판단이 그 사람들 전부를 좌지우지한다. 대통령이라면 잘못된 결정 하나가 역사에 죄인으로 남는다. 우리가 상상하는 것보다 압박감이 훨씬 크다. 그것이 좋아서 그 자리에 있지만, **물질성에만 갇힌 사람은 그것을 내려놓지 못한다.** 좋으니까 남도 뺏으려 할 것 같고, 그래서 항상 불안하다. 발 뻗고 잘 것 같지만 지켜야 할 게 그만큼 많은 것이다. 연예인이나 재벌이 마약이나 프로포폴을 찾는 이유가 바로 그것이다. 소소한 것으로는 이미 만족을 느낄 수 없을 만큼 감각이 둔화되어 있고, 그 불안감을 잠재울 다른 방법을 모르는 것이다.\n\n---\n\n[보완 가능 단락 2 — 밀교 오지(五智)와 평등성지]\n\n밀교에는 다섯 가지 지혜가 있다. **성소작지(成所作智)**는 물질로 무언가를 만들면서 지혜롭게 쓰는 것이고, **대원경지(大圓鏡智)**는 두루 밝게 비추는 것, 왜곡 없이 있는 그대로 비추는 것이다. 그 가운데 **평등성지(平等性智)**가 있다. 차이가 있는 자체가 이미 평", "source": "essay"}, {"id": "essay_243_3c706fe757", "text": "쓰는 것이고, **대원경지(大圓鏡智)**는 두루 밝게 비추는 것, 왜곡 없이 있는 그대로 비추는 것이다. 그 가운데 **평등성지(平等性智)**가 있다. 차이가 있는 자체가 이미 평등하다는 것이다. 우리 눈에는 차이가 차별로 보이지만, 우주적으로 보면 차이가 없으면 우주 자체가 알려질 수 없다. 차이 없이는 존재가 드러나지 않으니, 차이 자체가 이미 평등의 다른 이름이다. 부처나 중생이나 둘이 아니게 평등하다. 이 다섯 가지 지혜를 육신을 가진 채 깨닫기가 어려운 것이지, 오히려 육체가 있기에 깨달을 수 있다. 천상의 존재들은 어려움이 없으니 깨달을 인연이 없다. **육체의 한계가 있기 때문에 그 한계를 극복하려는 것이 동기로 작용한다.** 그것이 이 몸을 받고 세상에 태어난 이유다.\n\n#물질의몸 #차이와평등 #평등성지 #전체성 #연기\n\n--- (구분선)\n\n[파일명: 밸런스_순간의목적_수필.md]\n\n### **밸런스_순간의목적_수필**\n\n#### **특정 영양소만 먹으면 건강이 무너진다**\n\n살아오면서 느끼는 것이 있다. **삶의 균형점을 찾는 것이 그만큼 중요하다.** 특정 영양소만 집중적으로 섭취하면 건강이 무너진다. 팔 운동 하나만 하면 몸의 균형이 깨진다. 사업도 재정 상태, 영업, 연구개발 어느 한쪽으로만 자원이 쏠리면 제대로 굴러가지 않는다. 마음공부도 마음만 공부하는 것이 아니라 몸도 돌보고 지성도 돌봐야 한다. 우리의 모", "source": "essay"}, {"id": "essay_244_38c02efbc8", "text": "다. 사업도 재정 상태, 영업, 연구개발 어느 한쪽으로만 자원이 쏠리면 제대로 굴러가지 않는다. 마음공부도 마음만 공부하는 것이 아니라 몸도 돌보고 지성도 돌봐야 한다. 우리의 모든 성품들이 다 구비되었을 때 온전하다. **성품들을 골고루 다 쓰면서 어느 한쪽으로 치우치지 않게 발현시키면서 살아야 한다.**\n\n---\n\n#### **지금 여기가 수단이자 목적이다**\n\n삶의 종착역은 어딘가에 있지 않는다. 깨달음을 향해 끝까지 가서 깨달았다, 죽었다 — 그게 아니라는 것이다. **깨달음 이후에도 삶은 계속된다.** **매 순간순간 살아가는 여정** 그 이후의 매 순간도, 그 이전의 매 순간도, 순간순간이 그냥 목적이자 목표다. 수단과 목표가 따로 분리되어 어딘가에 나중에 도착하는 것이 아니다. 내가 어느 정도까지 올라가야 사명을 펼치는 것이 아니다. **지금 여기에서 사명을 펼쳐나가는 것이다.**\n\n---\n\n#### **누리고 펼쳐야 한다**\n\n그 여정을 가는 데 있어서 무엇보다 중요한 것이 **밸런스** 다. 타이어 하나는 크고 하나는 작으면 차가 원활히 갈 수 없다. 하나는 바람이 없고 하나는 바람이 많아도 안 된다. 펼치는 것만 중요한 것이 아니다. **누리고 펼쳐야 한다.** 그리고 펼치는 자체가 또 누리는 것이다. 대상과 내가 둘이 아니기 때문이다. 그래서 끌어당기는 것보다 다가가는 것이 더 중요하다. #밸런스 #순간의목적 #지", "source": "essay"}, {"id": "essay_245_5e11ebbf33", "text": "리고 펼쳐야 한다.** 그리고 펼치는 자체가 또 누리는 것이다. 대상과 내가 둘이 아니기 때문이다. 그래서 끌어당기는 것보다 다가가는 것이 더 중요하다. #밸런스 #순간의목적 #지금여기 #누리고펼치기 #올셀프\n\n**--- (구분선)**\n\n[파일명: 벚나무여정_온전한수용_수필.md]\n\n### **벚나무여정_온전한수용_수필**\n\n#### **성숙 단계를 건너뛸 수 없다**\n\n씨앗이 싹을 틔우는데, 그 갑갑함을 못 이겨 빨리 탈출하려 한다. 외부의 도움을 얻거나 어떤 방법을 찾아서 성숙 단계를 다 거치지 않은 채로 확 나와버리면, **오히려 성장으로 봤을 때 더 안 좋다.** 겪어내야 할 일이라면 그것을 겪어내는 게 당연한 것이다. 답답한 마음에 빨리 어떻게 해보려고 방법을 찾고 막 몸부림을 치다 보면 오히려 더 힘들어질 수 있다. 그냥 수용해야 한다.\n\n---\n\n#### **꽃이 피었을 때만 벚나무의 삶이 아니다**\n\n나무가 성장하고, 꽃을 피우고, 열매를 맺는 그 과정의 어느 한 부분을 딱 잘라낼 수 없다. 그것을 자르면 여정이 성립되지 않는다. 그 전부가 내가 통과해야 하고 겪어내야 하는 것이다. 중요한 것은 **열매가 맺힌 것이 최종 목적지가 아니라는 것이다.** 그 과정 자체가 이미 최종 목적지다. 지금 답답해하고 갑갑해하고 성장이 더딘 것 같던 그 순간들이, 그 자체가 다 벚나무의 여정이다. 벚꽃이 폈을 때만 벚나무의 여정이 아", "source": "essay"}, {"id": "essay_246_a58f1030ec", "text": "다.** 그 과정 자체가 이미 최종 목적지다. 지금 답답해하고 갑갑해하고 성장이 더딘 것 같던 그 순간들이, 그 자체가 다 벚나무의 여정이다. 벚꽃이 폈을 때만 벚나무의 여정이 아니다. 열매가 열렸을 때만이 아니다. **매 순간이 목적이다.** 만약 싹이 올라왔는데 짓밟혀서 뽑혔다 해도, 그 씨앗은 벚나무로서의 삶을 완전히 온전하게 살다 간 것이다. 열매까지 다 맺고 베어져야만 온전한 벚나무의 삶을 마친 것이라고 볼 수 없다. **매 순간 온전한 벚나무로서 삶을 이어나가고 있다면, 그것으로 충분하다.**\n\n---\n\n#### **땅 깊이 묻힌 씨앗**\n\n새싹이 딱 올라가 봤는데 옆에 나무는 엄청 크다. 그러면 뭔가 잘못됐고 결여됐다고, 부족하다고 느낀다. 그것이 결핍감이다. 그러나 **나는 나의 여정을 가고 있는 것에 조금도 모자람이 없다.** 상대적인 비교로부터 자유로워지고, 나의 지금의 걸음, 나의 속도를 내가 온전히 수용한다면 에너지를 낭비하지 않고 나의 길을 성장하는 데 온전히 쓸 수 있다. 하필 내가 묻힌 땅이 조금 깊었다. 그래서 옆의 씨앗은 벌써 이파리를 트고 공중으로 올라오고 있는데, 나는 아직도 땅속이다. 그럴 수 있다. 그렇게 세팅이 된 것이다. 바꿀 수 없다. **그 과정이 성숙의 과정이 길든 짧든, 그것이 또 다른 식으로 더 좋게 발현될 수도 있는 것이다.** 빨리 올라왔다가 지나가던 새에게 잡혀버릴 수도 있다.", "source": "essay"}, {"id": "essay_247_6eb2d3ae43", "text": "다. 바꿀 수 없다. **그 과정이 성숙의 과정이 길든 짧든, 그것이 또 다른 식으로 더 좋게 발현될 수도 있는 것이다.** 빨리 올라왔다가 지나가던 새에게 잡혀버릴 수도 있다. 땅속에 있던 시절이 오히려 더 안전하게 보낸 시절일 수 있었다.\n\n---\n\n#### **좋고 나쁘고를 갖다 붙이니까 괴롭다**\n\n비도 오고 바람도 분다. 땅속에 있을 때는 갑갑하다. 그런 일이 없다는 것이 아니다. 그런데 거기에 좋고 나쁘고를 갖다 붙이니까 괴로워진다. **지금 삶을 온전하게 수용한다는 것은 이것이다.** 지금 내가 겪어야 할 것을 겪으면서, 나의 온전한 여정을 지금 걷고 있다는 것을 아는 것. 불평불만하면서 가느냐, 털썩 주저앉아 있느냐, 아니면 '이럴 수도 있지, 이런 상황도 있을 수 있지' 하는 마음으로 뚜벅뚜벅 가느냐. 어차피 가는 것인데. **'이것도 내가 지금 이 자체로 온전한 삶이구나'** 하는 것을 수용하면, 삶이 훨씬 가벼워진다. 나는 온전하게 지금 벚나무를 구현하고 있다. #벚나무여정 #온전한수용 #매순간목적 #결핍없음 #SSF\n\n**--- (구분선)**\n\n[파일명: 변화와전환_비전과미션_수필.md]\n\n### **변화와전환_비전과미션_수필**\n\n#### **배를 바꾸는 것과 방향을 바꾸는 것**\n\n변화와 전환은 다르다. 변화가 지금 타고 있는 배를 버리고 새로운 것을 취하는 것이라면, **전환은 지금 배의 방향성을 바꾸는 것", "source": "essay"}, {"id": "essay_248_ab3b38aeb1", "text": "## **배를 바꾸는 것과 방향을 바꾸는 것**\n\n변화와 전환은 다르다. 변화가 지금 타고 있는 배를 버리고 새로운 것을 취하는 것이라면, **전환은 지금 배의 방향성을 바꾸는 것** 이다. 변화는 '내가 지금 잘못됐으니까 바뀌어야 해'라는 감각에서 온다. 나를 싹 갈아치우는 것이다. 그런데 현실적으로 배를 바꿀 수 없는 경우가 얼마나 많은가. 내가 가진 것들, 내 직원들, 내 삶이 거기에 있다. 추가하고 빼고 할 수는 있지만,현실적으로 배를 바꿀 수 없는 경우가 얼마나 많은가. \"배를 바꾸려는데 어떻게 바꿔?\"라고 사람들은 말한다. 내가 가진 것들, 나의 직원들, 내 삶이 거기에 있다. 추가하고 빼고 할 수는 있지만, 배 자체를 통째로 바꾸는 것은 쉽지 않다. 그리고 사실 중요한 것은 배가 아니다. **방향성이다.**.\n\n---\n\n#### **우왕좌왕했던 이유**\n\n그동안 우왕좌왕했던 것은 방향성이 없었기 때문이다. 배가 나빠서가 아니었다. 방향이 없으니 어디로 가야 할지 몰랐던 것이다. 방향성을 잘 설정하고 그 길을 향해 계속 가고 있다면 안심이 된다. **방향이 비전이다.** 미션과 비전의 방향성을 가지고 여정을 가는 것이다.\n\n---\n\n#### **미션이 없으면 중간에 포기한다**\n\n비전은 목적지다. 그런데 비전만으로는 부족하다. 가는 중간에 시련도 겪는다. 그때 포기하지 않고 방향을 향해 계속 가게 하는 것, 그것이 **미션", "source": "essay"}, {"id": "essay_249_11bce43337", "text": "션이 없으면 중간에 포기한다**\n\n비전은 목적지다. 그런데 비전만으로는 부족하다. 가는 중간에 시련도 겪는다. 그때 포기하지 않고 방향을 향해 계속 가게 하는 것, 그것이 **미션** 이다. 비전을 향해 '왜 갈 것인가'라는 원동력. 미션을 장착하면 어떤 시련을 만나도 포기하지 않고 방향을 향해 계속 나아가게 된다. 미션이 없다면 방향은 잘 잡았어도 중간에 포기해버릴 것이다. 배를 바꾸는 것이 중요한 게 아니다. 지금 이 배로, 방향을 잡고, 포기하지 않고 가는 것이다. #변화와전환 #비전 #미션 #방향성 #포기하지않음\n\n**--- (구분선)**\n\n[파일명: 보편의정치성_소리에실린혼_수필.md]\n\n### **보편의정치성_소리에실린혼_수필**\n\n#### **보편은 세력의 확장이었다**\n\n중세 하면 암흑의 시대라는 이미지가 따라다닌다. 그런데 그 시대를 관통하는 두 개의 키워드가 눈에 들어온다. **초월** 과 **보편**. 초월을 신의 자리에 올려놓고 '너희는 감히 접근할 수 없다'고 했다. 그러면서 보편을 주장했다. 그런데 그 보편이 과연 진정한 보편인가. 일신교는 모두가 같은 신을 믿는다고 한다. 그러나 저마다 가슴속에 있는 신은 같지 않다. 볼 수도 없고 만질 수도 없는 신이라면, 그것은 결국 각자 안에서 상상되는 신이다. 같은 신을 믿는다고 하면서 사실은 저마다 다른 신을 믿고 있을 가능성이 농후하다. 이단이 끊임없이 나오는 이", "source": "essay"}, {"id": "essay_250_fddbfe8085", "text": "만질 수도 없는 신이라면, 그것은 결국 각자 안에서 상상되는 신이다. 같은 신을 믿는다고 하면서 사실은 저마다 다른 신을 믿고 있을 가능성이 농후하다. 이단이 끊임없이 나오는 이유가 거기 있다. **보편이라는 말은 한편으로 세계화이고 전체화다.** 유일신의 세력을 키우기 위해 보편성을 띠는 방향으로 나아간 것이다. 보편과 특수. 이것을 함께 생각해야 한다.\n\n---\n\n#### **소리에 혼이 있다**\n\n고객이 말을 한다. 코치는 그 말의 **의미** 에 집중한다. 그런데 그 의미가 코치에게 정확히 전달된다는 것은 사실 쉽지 않은 얘기다. 고객이 말한 의미는 고객만이 안다. 코치의 해석이 끼어들 수밖에 없다. 그렇다면 오히려 집중해야 할 것은 소리다. **음성, 소리의 표정, 고조, 장단, 억양, 톤.** 말하는 것과 관계없이, 이것들이 고객의 혼을 가장 직접적으로 드러낸다. 말하는 소리를 듣는 것 자체에 고객의 혼이 있다. 의미가 아니라 소리. 그 소리와 코치의 소리가 공명할 때, 떨림이 일어날 때, **그것이 코칭 프레즌스다.** #보편의정치성 #소리에실린혼 #코칭프레즌스 #공명 #초월과보편\n\n**--- (구분선)**\n\n[파일명: 본성의뜻_내려놓음_수필.md]\n\n### **본성의뜻_내려놓음_수필**\n\n#### **본성이 끌고 간다**\n\n내가 어딘지는 모르지만, 본성이 나를 계속 끌고 간다. 지금 이 순간에도 찰나찰나 끌고 가고 있", "source": "essay"}, {"id": "essay_251_8d478e13b9", "text": "md]\n\n### **본성의뜻_내려놓음_수필**\n\n#### **본성이 끌고 간다**\n\n내가 어딘지는 모르지만, 본성이 나를 계속 끌고 간다. 지금 이 순간에도 찰나찰나 끌고 가고 있다. 믿고 안 믿고 상관없이 끌고 간다. 내가 죽지 않는 한 끌고 간다. 그렇다면 왜 고통을 받으면서 끌고 갈 필요가 있는가. 어차피 내 생각과는 다르게 간다. 다행히 본성의 뜻과 내 뜻이 같으면 같이 가는 것이고, 다르면 그만큼 고통을 받으면서 가는 것이다. 그럴 바에는 **본성에 맡겨놓고 가라는 것이다.**\n\n---\n\n#### **삶의 신비**\n\n삶은 찰나찰나 우리를 끌고 간다. 어디로 갈지는 아무도 모른다. 그것이 삶의 신비다. 결과를 알면 드라마가 재미없다. 기승전결이 딱 정해져서 행복하게 살다 죽었다로 끝나면 삶이 재미없다. 온갖 우여곡절도 겪고, 드라마틱하게 눈물 콧물 다 들어가야 맛있는 삶의 요리가 이루어진다. 그 사람 자신이 주인공이다. 그것을 믿는 것이 **삶의 흐름을 타는 것이다.**\n\n---\n\n#### **내 뜻은 하나, 본성의 뜻은 사방팔방**\n\n내 뜻대로 살려고 하면 다행히 맞으면 괜찮지만, 안 맞을 가능성이 십중팔구다. 내 뜻은 하나이지만, **본성이 원하는 방향은 사방팔방** 이다. 두루 세상을 이롭게 하는 방향으로 가기를 바란다. 본성은 한 사람의 본성이 아니라 온 세상의 본성이기 때문이다. 온 세상의 본성에 맞는 삶을 살아가게", "source": "essay"}, {"id": "essay_252_0ea7a621a3", "text": "방향은 사방팔방** 이다. 두루 세상을 이롭게 하는 방향으로 가기를 바란다. 본성은 한 사람의 본성이 아니라 온 세상의 본성이기 때문이다. 온 세상의 본성에 맞는 삶을 살아가게 한다. 내 뜻과 본성의 뜻이 같으면 성큼성큼 나아간다. 내 뜻대로만 가면 역행하기 쉽다. 삶이 삐걱거린다. **내 뜻을 내려놓고 본성의 뜻에 맞춰서 살아가야 한다.** 그것이 오히려 시너지 효과를 만든다. #본성의뜻 #내려놓음 #삶의흐름 #올셀프 #쉬고\n\n**--- (구분선)**\n\n[파일명: 분별과존재론의한계_신과나와세상_수필.md]\n\n### **분별과존재론의한계_신과나와세상_수필**\n\n#### **나누고 쪼개다 보니 본질에서 멀어졌다**\n\n서양철학은 범주를 나누고 세분화해왔다. 그 덕분에 과학이 발전하고 추상적 사유가 깊어졌다. 역사가 발전하는 데 분명히 기여했다. 그런데 역설이 생겼다. 나누고 쪼개다 보니 본질과 멀어졌다. 너와 나를 나누고, 사람과 사람 아닌 것을 나누고, 인간과 자연을 나눴다. 인간이 자연 속에 존재하면서, 자연 없이는 존재할 수 없으면서도, 자연을 마음대로 이용하고 파괴해도 된다는 생각이 생겼다. 신도 분리해서 이해한다. 창조주가 있으면 피조물이 있어야 하고, 종속 관계가 생기고, 주인이 있으면 종이 있어야 한다. 분리하고 나누다 보니 차별이 만연해지고, 빈부격차가 심해지는 폐단이 나온다. **세상은 분별로 파악할 수밖에 없지만, 그", "source": "essay"}, {"id": "essay_253_3b246fd214", "text": ", 종속 관계가 생기고, 주인이 있으면 종이 있어야 한다. 분리하고 나누다 보니 차별이 만연해지고, 빈부격차가 심해지는 폐단이 나온다. **세상은 분별로 파악할 수밖에 없지만, 그것이 차별로까지 가서는 안 된다.**\n\n---\n\n#### **존재는 그것 아닌 것이 있어야 파악된다**\n\n'사람'을 우리가 파악하기 위해서는 사람 아닌 것들이 있어야 한다. 온 우주에 사람만 있다면 사람이라는 말을 붙일 필요도 없다. 사람이 사람으로 파악되는 것은 사람 자체가 따로 있어서가 아니라, **사람 아닌 것들이 있기 때문에** 사람으로 파악되는 것이다. 주먹도 마찬가지다. 보자기와 가위가 있으니까 이것을 주먹으로 파악한다. 주먹만 있다면 이것을 주먹이라 할 필요가 없다. 손이라는 실체가 따로 있는 것이 아니라, 손 아닌 것이 있으니 이것이 손으로 파악되는 것이다. **하나를 존재로 파악하려면 그것 아닌 것들이 있어야 한다.** 이것이 존재론의 핵심이자 한계다.\n\n---\n\n#### **신을 분별에 가두면 안 된다**\n\n신이 존재하기 위해서는 신이 아닌 것이 있어야 한다. 그래야 '이것은 신이다'라고 파악된다. 그런데 그렇게 되면 신을 분별에 가두는 결과가 된다. 절대신을 상대 차원으로 끌어내려 하나의 존재로 파악해버리면 오류가 된다. **신의 본질이 실체라면 부분으로 나눠 파악될 수 없다.** 자연도 마찬가지다. 자연은 통으로 우리에게 감각될 뿐이다.", "source": "essay"}, {"id": "essay_254_8c3181460c", "text": "차원으로 끌어내려 하나의 존재로 파악해버리면 오류가 된다. **신의 본질이 실체라면 부분으로 나눠 파악될 수 없다.** 자연도 마찬가지다. 자연은 통으로 우리에게 감각될 뿐이다. 우리는 그것을 자꾸 개별적으로, 부분적으로 나눠서 생각한다. 거기서 인식의 오류가 생긴다.\n\n---\n\n#### **'나'라는 실체도 따로 없다**\n\n'나'라는 실체가 따로 있는가. 아니다. 깊은 잠 속에서는 '나'가 없다. **객관 세상이 드러나면서 비로소 주관으로서의 '나'가 드러나는 것뿐이다.** 남에 대한 '나'인 것이지, '나'가 항구불변하게 딱 있는 것이 아니다. 만약 '나'가 고정된 실체로 있다면, 죽어서도 계속 있어야 하고, 천당도 가고 윤회도 해야 할 것이다. 그런데 잠잘 때 '나'가 없듯이, '나'는 개별적인 실체로 따로 존재할 수 없다.\n\n---\n\n#### **존재가 따로 있는 것이 아니다**\n\n서양철학이 존재론에 열광하는 이유가 있다. 신이라는 존재, 나라는 존재, 세상이라는 존재. 분리하고 나누는 서양철학의 근간이 존재를 다루기 때문이다. 그런데 **존재를 할 것이 따로 없다.** 인연의 화합에 의해서 그때 당시의 이벤트가 일어날 뿐이다. 편의상의 상태, 사태, 이벤트. 그것이 그때그때 일어나는 것이다. 실체가 있는 것이 아니라, 관계와 조건 속에서 그때그때 드러나는 것이다. 신도, 나도, 세상도. 분별로 파악할 수밖에 없지만, 분별", "source": "essay"}, {"id": "essay_255_08acb08d2e", "text": ", 이벤트. 그것이 그때그때 일어나는 것이다. 실체가 있는 것이 아니라, 관계와 조건 속에서 그때그때 드러나는 것이다. 신도, 나도, 세상도. 분별로 파악할 수밖에 없지만, 분별 너머에 있다. #분별과존재론 #서양철학의한계 #신과나 #인연화합 #불이\n\n**--- (구분선)**\n\n[파일명: 분별의딜레마_지도와이정표_수필.md]\n\n### **분별의딜레마_지도와이정표_수필**\n\n#### **분노는 에너지를 불어넣는다**\n\n불합리한 것에 분노하고 짜증을 내면, 오히려 그것에 힘을 불어넣어 주는 것이다. 나의 분노가 에너지로 쓰인다. 우리가 모르는 거대한 힘이 역사의 수레바퀴를 돌리고 있는데, 거기서 나도 모르게 그런 편에 서서 에너지가 반대편으로 쓰이고 이러는 경우가 흔하다.\". 그래서 **냉철한 판단** 이 필요하다. 지금 내 생각이 어딘가에 오염된 것은 아닌가. 매스컴이나 어떤 흐름에 끌려들어간 것은 아닌가. 그것조차 들여다볼 수 있는 **깨어있는 정신** 이 필요하다.\n\n---\n\n#### **분별을 해야 하는가, 말아야 하는가**\n\n분별(分別)에 대한 딜레마가 있다. **수행을 하기까지는 분별을 하면 안 된다.** 하지만 **세상을 살려면 분별을 잘 해야 한다.** 이 둘이 동시에 요청된다. 수행하는 사람들이 분별을 없애라고 하는 것은, 분별하는 마음이 너무 심하기 때문이다. 이정표를 목적지로 착각할까 봐 그러는 것이다.\n\n---\n\n#", "source": "essay"}, {"id": "essay_256_ac6cbb1cbe", "text": ".** 이 둘이 동시에 요청된다. 수행하는 사람들이 분별을 없애라고 하는 것은, 분별하는 마음이 너무 심하기 때문이다. 이정표를 목적지로 착각할까 봐 그러는 것이다.\n\n---\n\n#### **지도와 이정표**\n\n**지도가 영토는 아니다.** 지도를 봤다고 해서 거기를 간 것이 아니다. 하지만 지도가 없으면 그곳으로 바로 갈 수 없다. 지도는 필요하다. 다만 지도를 영토로 착각하면 안 된다. **이정표는 글자이지 내가 가고자 하는 장소가 아니다.** 그렇다고 이정표가 필요 없다고 발로 차버려도 안 된다. 이정표는 길을 알려준다. 그것을 **목적지로 착각하면 안 된다** 는 것이다. 분별도 이와 같다. 없애야 할 것이 아니라, 이정표로 삼되 목적지로 착각하지 않는 것이다. 분별이 나를 데려가는 것이 아니라, 내가 분별을 쓰는 것이다. #분별 #깨어있음 #지도와이정표 #수행 #냉철한판단\n\n**--- (구분선)**\n\n[파일명: 불신_삶의주도권_수필.md]\n\n### **불신_삶의주도권_수필**\n\n#### **안 목사의 고백**\n\n20년 목회를 한 안 목사가 고백을 했다. 내가 좀 더 잘했다면, 좀 더 성실했다면, 좀 더 열심히 기도했다면 지금보다 더 좋은 목사가 되었을 텐데. 그러지 못했다. 문제는 교인도, 교회도, 교단도 아니고 나 자신이다. 앞으로 어떻게 해야 될지 고민이 된다. 좀 더 신에게 솔직할 수 있다면, 좀 더 자신에게 솔직할 수", "source": "essay"}, {"id": "essay_257_a5c2f0f638", "text": "텐데. 그러지 못했다. 문제는 교인도, 교회도, 교단도 아니고 나 자신이다. 앞으로 어떻게 해야 될지 고민이 된다. 좀 더 신에게 솔직할 수 있다면, 좀 더 자신에게 솔직할 수 있다면 — 그런 고민이 담긴 고백이었다. 그 고백을 듣고 나는 해주고 싶은 말이 있었다.\n\n---\n\n#### **\"더 좋은 내가 있다\"는 생각이 믿음을 부정한다**\n\n지금 상태가 열심히 사는 것 아닌가. 그렇다면 그것이 부족한 것이 아니다. 그런데 안 목사의 마음 안에는 \"더 좋은 내가 있다\"는 생각이 있다. 더 좋은 목사가 될 수 있었는데 그러지 못했다는 것이다. 이 생각이 문제다. **예수님이 내 삶을 이끌고 간다는 것을 부정하는 것이기 때문이다.** 신이 항시 함께하고, 내 삶을 이끌고 간다는 것을 믿는다면, 지금 이 삶을 긍정해야 한다. \"나는 잘 살고 있구나. 부족한 면이 보이지만, 부족한 면이 있는 자체로 나는 지금 충분하다. 왜냐면 예수님이 내 삶을 이끌고 있으니까.\" 이렇게 생각해야 하는데, 예수보다 내가 먼저 앞장서서 나를 이끌려 하고 있다. 그래서 문제가 생기는 것이다. 열심히 산 것이 부족하다고 느끼는 것, 그것은 **믿음이 약한 것이다.** 신이 나를 이끌고 있다는 믿음이 빠져버린 것이다.\n\n---\n\n#### **불신이 나를 결핍으로 끌고 간다**\n\n더 심각한 문제는 미래의 결핍을 지금 현재로 끌어오는 것이다. \"1년 후에는 엄청 어려워", "source": "essay"}, {"id": "essay_258_7967e9a61b", "text": "다는 믿음이 빠져버린 것이다.\n\n---\n\n#### **불신이 나를 결핍으로 끌고 간다**\n\n더 심각한 문제는 미래의 결핍을 지금 현재로 끌어오는 것이다. \"1년 후에는 엄청 어려워질 것 같은데.\" 그러면서 1년 후의 어려움을 지금 여기로 당겨온다. 어려움 쪽으로 내 삶을 끌고 가려고 지금 스스로 작정하는 것이다. 아무도 그렇게 끌고 가라고 하지 않았다. **나의 불신이 나를 그쪽으로 끌고 가는 것이다.** 불신이 곧 지옥이다. 스스로 지옥을 만들고 있는 것이다. 우리 삶도 마찬가지다. 누구나 나름 열심히 한다. 외부 환경에 의해 안 될 때도 있고, 심리적·신체적 조건 안에서 각자 최선을 다하는 것이다. 사람이 심리적으로, 신체적으로 약해서 사회가 비교해서 열등하다고 볼지라도, 그 사람 스스로는 자신의 조건 안에서 최선을 다한 것이다.\n\n---\n\n#### **역풍을 타는 법**\n\n역풍이 불 때가 있다. 내가 앞으로 나아가려는데 맞바람이 치는 상황이다. 그럴 때 역풍에 맞서서 어떻게든 이겨내려 하는 것보다, **역풍을 타면서 에너지를 비축하는 것이 낫다.** 바람 방향이 바뀔 때 다시 나아가면 된다. 역풍에 실려서 포기하고 가라앉으면 안 된다. 그렇다고 역풍에 정면으로 맞서서 에너지를 다 소진할 필요도 없다. 맞서느냐, 옆으로 살짝 비키느냐, 그것은 내가 할 수 있는 것이다. 남들 눈에는 정체된 것처럼 보이겠지만, 그 시간에 힘을 비축하", "source": "essay"}, {"id": "essay_259_fe724943b9", "text": "정면으로 맞서서 에너지를 다 소진할 필요도 없다. 맞서느냐, 옆으로 살짝 비키느냐, 그것은 내가 할 수 있는 것이다. 남들 눈에는 정체된 것처럼 보이겠지만, 그 시간에 힘을 비축하고 있는 것이다. 순풍이 불었을 때 더 강하게 나아갈 수 있다.\n\n---\n\n#### **에고가 만들어낸 결핍**\n\n기독교인들의 잘못된 신앙 형태가 있다. \"이렇게 해주소서, 저렇게 해주소서.\" 말은 존댓말이지만 결과적으로는 요구다. 내 욕심대로 삶을 끌고 가는 것이다. 완전한 목사라는 허상의 나를 하나 세워놓고, \"왜 나는 이렇게 못하지?\" 하면서 자기를 계속 몰아세우는 것이다. 이것이 **에고다.** 완전하다고 생각하는 허상의 에고를 설정해놓고, 그쪽으로 자기 삶을 몰아가면서 결핍감을 느끼는 것이다. 그 결핍감은 내가 부족해서 오는 것이 아니다. **에고가 느끼는 결핍감이다.** 지금 이 순간 온전히 신의 이끄심으로 가는 진짜 나가 있다. 그런데 에고가 만들어낸 허상의 나와 비교하면서 스스로 결핍감을 만들어내는 것이다. 그 에고를 놓아버리면, 지금 이 순간 충분한 내가 거기 있다. **믿음이 빠지면 온전한 나도 없다.** 신이 나를 이끌고 있다는 믿음, 지금 이 삶이 충분하다는 믿음, 그것이 온전한 나의 바탕이다. #불신 #믿음 #에고 #결핍 #올셀프 #삶의주도권\n\n**--- (구분선)**\n\n[파일명: 비언어소통_멀티모달_수필.md]\n\n### **비언어소통", "source": "essay"}, {"id": "essay_260_bbc4027a5b", "text": "음, 그것이 온전한 나의 바탕이다. #불신 #믿음 #에고 #결핍 #올셀프 #삶의주도권\n\n**--- (구분선)**\n\n[파일명: 비언어소통_멀티모달_수필.md]\n\n### **비언어소통_멀티모달_수필**\n\n#### **눈빛만으로도 안다**\n\n팀 코칭이나 비즈니스 현장에서, 또 학급에서도 마찬가지로 서로 정서를 교류하고 언어의 뉘앙스를 조율하려는 노력이 필요하다. 그런데 눈빛만 봐도 서로 안다고 하는 사이가 있다. 손발이 잘 맞는다는 것이 그것이다. 언어를 통하지 않고도 정서 교류가 일어나고 있는 것이다. 오히려 언어로 소통하는 것보다 **비언어적인 소통이 될 때 정서적 상호작용이 더 활발하게 일어날 수 있다.** 팀 분위기가 좋아지고, 일하면서 서로 만족도도 높아진다.\n\n---\n\n#### **멀티모달**\n\nIT 기기를 쓸 때 여러 가지 인터페이스를 이용하는 것을 멀티모달이라고 한다. 타자기로만 쳤던 것이 마우스도 나오고, 음성 명령도 가능해졌다. 여러 형태의 인터페이스로 상호작용하는 것이다. 대인관계도 그렇다. **손발, 눈빛, 음성, 몸짓.** 내 전체 감각을 열어서 소통하는 멀티모달이 되어야 한다. 나도 그렇게 표현하고, 상대방도 그것을 받아들일 수 있도록 훈련이 필요하다. 이 사람은 이럴 때 이렇구나, 말은 저렇게 하지만 속뜻은 다르구나, 이런 것들이 서로 맞춰지도록 다양한 활동이 필요하다.\n\n---\n\n#### **이모지의 한계**", "source": "essay"}, {"id": "essay_261_7379d4e466", "text": "련이 필요하다. 이 사람은 이럴 때 이렇구나, 말은 저렇게 하지만 속뜻은 다르구나, 이런 것들이 서로 맞춰지도록 다양한 활동이 필요하다.\n\n---\n\n#### **이모지의 한계**\n\n젊은 세대는 카카오톡이나 문자로 소통하기를 좋아한다. 이모지나 이모티콘이 비언어적 요소를 대신하기도 한다. 그런데 한계가 있다. 내가 날리는 이모지와 상대방이 받아들이는 이모지의 뜻이 다를 수 있다. 오해가 생기는 이유다. 그래서 그것을 맞추려는 **팀 플레잉** 이 필요하다. 축구 선수들이 함께 훈련하는 것이 그것이다. 경기장이 시끄러워 말이 안 되어도, 몸짓과 눈짓을 보면 공을 어디로 찰지 안다. 손발이 잘 맞을 때 일에 흥이 나고, 능률도 오른다.\n\n---\n\n#### **삶은 비언어다**\n\n삶은 비언어적인 것으로 이루어져 있는데, 그것을 언어로만 소통하려다 보니 어려움이 생긴다. 말이 전혀 통하지 않는 외국인 목수와 함께 통나무집을 지으면서도, 아무 말 없이 손발을 맞춰가며 고도의 작업을 해낼 수 있었던 것은 비언어적인 소통이 있었기 때문이다. 비언어적 소통에서 무엇보다 중요한 것은 **열린 마음이다.** 상대방의 사인, 비언어적인 신호들을 내가 열린 마음으로 탐색하겠다는 전제가 있어야 한다. 그것이 먼저다. #비언어소통 #멀티모달 #팀워크 #열린마음 #정서교류\n\n**--- (구분선)**\n\n[파일명: 빔의공간_균형의철학_수필.md]\n\n### **빔의공", "source": "essay"}, {"id": "essay_262_4e2fefa20e", "text": "제가 있어야 한다. 그것이 먼저다. #비언어소통 #멀티모달 #팀워크 #열린마음 #정서교류\n\n**--- (구분선)**\n\n[파일명: 빔의공간_균형의철학_수필.md]\n\n### **빔의공간_균형의철학_수필**\n\n#### **빔은 창조의 원리다**\n\n비어 있다는 것은 빔을 만들었다는 것이다. 빔은 저절로 생긴 것이 아니다. **빔을 적극적으로 만드는 것** 이다. 비어 있음을 만든다는 것은 창조할 수 있는 공간을 확보한다는 것이다. 그 행위 자체에 창조성이 내포된다. 빔은 비활성화가 있는 상태다. 그것은 완전한 무(無)가 아니다. **언제든지 활성화되기를 기다리고 있는 상태다.** 그릇이 무언가 담기기를 기다리고 있는 것처럼. 어떤 기폭제에 의해 어떻게 활성화될지는 아무도 모른다. 그 모름 자체가 가능성이다. 우리는 빔을 두려워한다. 스케줄이 비어 있으면 뭔가 잘못된 것 같다고 느낀다. 빡빡하게 채워야 낙오되지 않는다고 생각한다. 그러나 **스케줄이 비어 있기 때문에 거기서 새로운 것이 탄생할 준비가 된다.** 빔 없이 계속 채우다 보면 번아웃이 온다. 비어 있음은 무기력한 상태가 아니라 굉장한 가능성을 내포한 비활성화 상태다.\n\n---\n\n#### **우리 삶의 베이스는 비어 있음이다**\n\n우리 삶 자체가 비어 있음의 기반에서 나온다. 비어 있는 곳에서 무언가가 활성화되어 삶이 전개된다. 비어 있음이 없으면 삶이 벌어질 수 없다. 어항이 있어", "source": "essay"}, {"id": "essay_263_ee345f3add", "text": "스는 비어 있음이다**\n\n우리 삶 자체가 비어 있음의 기반에서 나온다. 비어 있는 곳에서 무언가가 활성화되어 삶이 전개된다. 비어 있음이 없으면 삶이 벌어질 수 없다. 어항이 있어야 물이 차고 물고기가 뛰어노는 것처럼. 그런데 우리는 계속 거기에 뭔가를 채워 넣으려 한다. 그러니까 시달리고 바쁜 것이다. **우리 본질로부터 벗어나 있기 때문이다. 우리 본질이 비어 있음이다.** 그러니까 비어 있음을 적극적으로 초대해야 한다. 비어 있음과 하나가 되려고 오히려 그 안에 머물러야 한다. 심심함일 수도 있다. 그것을 없애려 애쓰지 말고, 적극적으로 즐겨야 한다. 빔은 심심함과도 연결되고, 음(陰)의 철학과도 연결되고, **사랑과도 연결된다.**\n\n---\n\n#### **모름과 빔은 같은 말이다**\n\n**모름은 빔과 같은 이야기다.** 모름은 앎을 전제로 한 모름이지, 알지 못하는 것과는 다르다. 알지 못하는 것은 앎에 종속된 것이다. 그런데 모름 자체로도 충분하다. 비어 있음이 있음의 결핍이 아닌 것처럼, 모름도 앎의 결핍이 아니다. **모름은 적극적이고 자발적인 앎이 될 수 있다.** 코칭에서 고수들이 여기서 충분히 모름을 즐기는 것도 그것이다. 거기서 여러 가지 가능성이 속에서 나온다. 똑딱이처럼 묻고 바로 답하고 또 묻고 하면 빔이 없다. 취약성을 메꾸려 애쓸 필요가 없다. 오히려 그것이 드러나게 해야 한다. 드러나지 않으면 잠복된 채", "source": "essay"}, {"id": "essay_264_e215dcfc63", "text": "가능성이 속에서 나온다. 똑딱이처럼 묻고 바로 답하고 또 묻고 하면 빔이 없다. 취약성을 메꾸려 애쓸 필요가 없다. 오히려 그것이 드러나게 해야 한다. 드러나지 않으면 잠복된 채로 남고, 본질적인 변화가 일어나지 않는다.\n\n---\n\n#### **취약성을 드러내야 변화가 일어난다**\n\n#### **코칭에서 코치가 강박적으로 공백을 메꾸려 하는 경우가 있다. 취약성이 생길까봐 계속 질문을 던지고 똑딱이처럼 바로 답변을 끌어낸다. 그런데 그렇게 하면 빔이 없다. 취약성을 메꾸려 애쓸 필요가 없다. 오히려 그것이 드러나게 해야 한다. 드러나지 않으면 잠복된 채로 남는다. 겉으로 계속 채우는 쪽으로의 코칭이 되면, 고객도 코치도 무작정 성장해야 한다는 강박에 시달린다. 고수들은 그럴 필요가 없다는 것을 안다. 충분히 모름을 즐기는 것, 그 안에서 여러 가지 가능성이 나온다.**\n\n---\n\n#### **공허함을 직면한다**\n\n공허함이 오면 우리는 피하려 한다. 친구를 만나거나, 유튜브를 보거나, 무언가로 채우려 한다. 그러나 **공허함을 한번 직면해볼 필요가 있다.** 직면한다는 것은 싸우라는 것이 아니다. 눈을 똑바로 뜨고 마주하는 것이다. 공허함 속에 머물러보는 것이다. 공허함을 온전히 느껴야 공허하지 않은 상태를 알 수 있다. 회피해 버리면 공허하지 않은 것도 온전히 누리며 살 수 없다. 명상이 그것이다. 비어 있음과 맞닥뜨리는 시간,", "source": "essay"}, {"id": "essay_265_c5887d67f7", "text": "것이다. 공허함을 온전히 느껴야 공허하지 않은 상태를 알 수 있다. 회피해 버리면 공허하지 않은 것도 온전히 누리며 살 수 없다. 명상이 그것이다. 비어 있음과 맞닥뜨리는 시간, 머무르는 시간이다. 공허함이나 외로움은 잘못된 상태가 아니다. **우리 삶의 베이스인 비어 있음이 그런 형태로 표현될 때가 있는 것이다.** 내가 외롭다는 것은 지금 외롭지 않은 상태에 너무 많이 치중하고 있었다는 신호다.\n\n---\n\n#### **한국의 행복지수가 낮은 이유 ← 보완 추가**\n\n우리나라의 행복지수가 낮은 데는 이유가 있다. 너무 채워야 되고, 성장해야 되고, 가져야 되고, 어느 위치에 가야 된다는 것이 너무 한쪽으로 치우쳐 있기 때문이다. 그러니 상대적으로 부족함, 외로움, 공허함, 뒤처짐을 느끼게 된다. 그 감정들이 잘못된 것이 아니다. **너무 앞으로 나가려는 추구심이 지나치게 기울어져 있었다는 신호다.** 삶의 밸런스가 깨졌을 때 오는 신호다. 그것을 피하거나 메꾸려 하지 말고, 적극적으로 맞이해서 수용해야 한다. 그러면 무너졌던 밸런스를 찾을 수 있다.\n\n---\n\n#### **밸런스가 사랑이다**\n\n물은 높은 곳에서 낮은 곳으로 흐른다. 바람은 기압이 높은 곳에서 낮은 곳으로 분다. 빈 찻잔에 찻물이 찬다. 이것이 **평등심** 이다. 하나는 꽉 차 있고 하나는 비어 있으면 평등하지 않다. 균형을 찾으려는 것, 그것이 사랑의 한 일면이", "source": "essay"}, {"id": "essay_266_d6d23b3b87", "text": "에서 낮은 곳으로 분다. 빈 찻잔에 찻물이 찬다. 이것이 **평등심** 이다. 하나는 꽉 차 있고 하나는 비어 있으면 평등하지 않다. 균형을 찾으려는 것, 그것이 사랑의 한 일면이다. 우리가 뒤처졌다고 느끼는 것은 너무 앞서 나가려는 추구심이 지나치게 기울어져 있었다는 뜻이다. 상대적으로 뒤처짐을 느끼게 되는 것이다. 공허함, 외로움, 부족함, 이 감정들이 삶의 밸런스가 깨졌을 때 오는 신호다. **잘못된 상태가 아니라, 균형을 잡으라는 신호다.** 그것을 적극적으로 맞이해서 수용하면, 무너졌던 밸런스를 찾을 수 있다. 거기서 에너지를 다시 얻어 새로운 방향으로 나아갈 수 있게 된다. 비우려고 애쓰지 않아도, 비어 있음을 초대해서 그 공간에 머물면 자동적으로 비워진다. #빔의공간 #창조성 #공허함직면 #밸런스 #평등심\n\n**--- (구분선)**\n\n[파일명: 빔의적극적의미_코칭의질문_수필.md]\n\n### **빔의적극적의미_코칭의질문_수필**\n\n#### **빔은 무(無)가 아니다**\n\n비어 있다는 것은 빔이 있다는 것이다. 빔은 없다는 것이 아니다. 의자에 사람이 앉아 있다가 자리를 떴다. 그 의자가 비었다. 그것은 무엇인가. 사람이 앉을 수 있는 공간이 빈 것이다. 그냥 아무것도 없는 것이 아니다. **앉음에 대한 빔** 이다. 집이 비었다. 그것은 집이 없어진 것이 아니다. 집에 삶이 비어 있는 것이다. 빔과 무(無)는 성격이 완전히", "source": "essay"}, {"id": "essay_267_e36daa7c8a", "text": "이다. 그냥 아무것도 없는 것이 아니다. **앉음에 대한 빔** 이다. 집이 비었다. 그것은 집이 없어진 것이 아니다. 집에 삶이 비어 있는 것이다. 빔과 무(無)는 성격이 완전히 다르다. 무는 그냥 없는 것이다. 그런데 **빔은 빔이 있는 것이다.** 쓰임에 대한 빔이다. 빔이 있음으로써 비로소 활용이 된다. 그릇은 빔이 있음으로써 그릇이 완성된다. 의자도 빔이 있음으로써 의자로서의 쓰임새가 생긴다. 공책도 빔이 있어야 공책이다. 연필은 그 빔을 전제로 한다. 빔으로 가서 무언가를 채울 것이기 때문이다.\n\n---\n\n#### **빔은 적극적이다**\n\n빔은 수동적인 것이 아니다. **적극적인 빔** 이다. 그릇을 만들 때는 빔을 적극적으로 만든 것이다. 가만히 있는데 저절로 생긴 형태가 아니다. 의자를 만들 때도 빔을 만들겠다고 적극적으로 한 것이다. **빔에는 적극성과 자발성이 있다.** 한편으로 빔은 **적극적 수용** 이다. 수동적으로 그냥 받아들이는 것이 아니라, 받아들일 수 있는 공간을 스스로 만들어내는 것이다. 비워야 담을 수 있다. 비움이 먼저다.\n\n---\n\n#### **질문은 빔을 만드는 일이다**\n\n코칭에서 질문을 하면 왜 답이 나오는가. 질문을 통해서 **빔을 만들어내기 때문이다.** 질문이 고객 안에 빔을 만들고, 그 빔에서 답변이 빠져나온다. 그릇이 비어 있어야 무언가를 담을 수 있듯, 질문은 고객 안에 비어 있는", "source": "essay"}, {"id": "essay_268_7f73898f01", "text": "을 통해서 **빔을 만들어내기 때문이다.** 질문이 고객 안에 빔을 만들고, 그 빔에서 답변이 빠져나온다. 그릇이 비어 있어야 무언가를 담을 수 있듯, 질문은 고객 안에 비어 있는 공간을 여는 일이다. 그것이 질문의 원리다. 무언가를 넣어주는 것이 아니라, 스스로 채울 수 있는 **빔을 만들어주는 것.** 그 빔이 적극적이고 자발적일수록 거기서 나오는 것도 살아 있다. #빔 #공성 #적극적수용 #코칭 #온나코칭\n\n**--- (구분선)**\n\n[파일명: 빨간신호등_안내자_수필.md]\n\n**빨간신호등_안내자_수필**\n\n##### **빨간불은 나쁜 것이 아니다**\n\n신호등을 보면 파란불은 좋고 빨간불은 나쁜 것 같다. 파란불이면 갈 수 있으니 좋은 거고, 빨간불이면 멈추라고 나를 제지하니 나쁜 것처럼 느껴진다. 내 마음은 빨리 가고 싶은데 빨간 신호등이 딱 켜지면 내 갈 길을 막는 것 같아 불편함을 느낀다. 그런데 빨간 신호등을 있는 그대로 받아들이면 달라진다. 갈 때와 멈출 때를 알려주는 **좋은 사인, 메시지**로 받아들일 수 있다. 그러면 빨간 신호가 나를 방해하는 것이 아니라, **옆에서 치고 들어올 수 있는 것을 막아주는 고마운 빨간색**이 된다.\n\n---\n\n##### **쉬어 갈 때, 돌아가야 될 때, 옆으로 가야 될 때**\n\n내 앞을 가로막는 것처럼 보이는 것들이 사실은 지표다. 지금은 **쉬어 갈 때**라든가, **돌아가야 될", "source": "essay"}, {"id": "essay_269_bc91dae7c3", "text": "##### **쉬어 갈 때, 돌아가야 될 때, 옆으로 가야 될 때**\n\n내 앞을 가로막는 것처럼 보이는 것들이 사실은 지표다. 지금은 **쉬어 갈 때**라든가, **돌아가야 될 때**라든가, **옆으로 가야 될 때**라든가를 알려주는 하나의 지표. 좋은 상황이건 나쁜 상황이건 다 내가 가야 할 방향성을 제시하고 있다. 그것을 올바르게 해석하는 것이 중요하다.\n\n---\n\n##### **해석의 방향을 바꿔야 한다**\n\n\"저 사람은 나한테 잘해주니까 좋은 것이다\", \"나를 나쁘게 대하니까 나쁜 것이다\" — 이렇게 단정해버리면 프레임에 갇힌다. **해석의 방향을 바꿔야 한다.** \"지금 이 상황이, 이 사람이 나한테 이렇게 대하는 것이, 나한테 어떻게 행동하라고 가르쳐주려는 것인가?\" 이런 방향으로 해석하는 것이다. 좋다 나쁘다의 이분법이 아니라, 이 상황이 나한테 무엇을 가리키고 있는가를 묻는 것이다.\n\n---\n\n##### **선택지는 두 개가 아니다**\n\n파란불이면 가고 빨간불이면 멈춘다. 선택지가 두 개뿐인 것 같다. 그런데 실제 교차로에서는 그렇지 않다. 우회전도 할 수 있고, 좌회전도 할 수 있고, 상황에 따라서는 유턴도 할 수 있다. 삶의 상황도 그렇다. 좋거나 나쁘거나, 가거나 멈추거나만 있는 것이 아니다. **상황이 나를 선택으로 몰아가는 것이 아니라, 내가 상황에 새로운 해석을 가져옴으로써 선택지를 넓히는 것이다.** 그", "source": "essay"}], [{"id": "essay_270_d98f830076", "text": "다. 좋거나 나쁘거나, 가거나 멈추거나만 있는 것이 아니다. **상황이 나를 선택으로 몰아가는 것이 아니라, 내가 상황에 새로운 해석을 가져옴으로써 선택지를 넓히는 것이다.** 그때 비로소 내가 상황의 주인이 된다.\n\n#신호등 #해석 #선택지 #프레임 #방향성\n\n--- (구분선)\n\n요청하신 규칙에 따라 35개의 소스 파일을 하나의 텍스트로 합본한 결과입니다.\n\n[파일명: 사랑의_평등성_자력_자전거_수필.md]\n\n### **사랑의_평등성_자력_자전거_수필**\n\n#### **공동체가 무너진 시대, 나를 일으키는 것은 나다**\n\n오늘날 가족이라고 해봤자 대부분 부부거나, 혼자 사는 경우가 많다. 부부라면 한 사람이 넘어졌을 때 다른 한 사람이 세워줄 수 있다. 그런데 혼자 사는 사람이 넘어졌다면 누가 일으켜 주겠는가. **내 스스로 일으켜 줄 수밖에 없다.** 물론 아주 다급한 상황에서는 외부 전문가의 도움을 받아야 한다. 하지만 그렇게 다급하지 않은 상황이라면, 일어섰을 때의 나, 희망적인 나가 지금 쓰러진 나를 일으켜 세워줄 수밖에 없다. 일으켜진 나를 상정하고, 그 나가 지금의 나를 일으켜 주는 것이다. 부모도 자기 살기 바쁘고, 형제들은 요즘 세상에 서로 경쟁으로 보고, 자기 자식 챙기기도 바쁘다. 공동체가 무너져 버렸기 때문이다. 같이 주저앉아 있으면 아무도 일으켜줄 사람이 없다.\n\n---\n\n#### **불안과 씨름하면 계속 넘어", "source": "essay"}, {"id": "essay_271_6d499396fe", "text": "경쟁으로 보고, 자기 자식 챙기기도 바쁘다. 공동체가 무너져 버렸기 때문이다. 같이 주저앉아 있으면 아무도 일으켜줄 사람이 없다.\n\n---\n\n#### **불안과 씨름하면 계속 넘어진 자리다**\n\n불안이 나를 일으켜 세워줄 것 같으면 계속 불안해도 된다. 그런데 불안은 이미 내가 넘어진 자리다. 불안을 상대하고 씨름하고 있으면 나는 계속 넘어진 위치밖에 가질 수 없다. **불안하지 않다는 것이 아니다.** 불안을 마주쳤을 때 그것과 씨름하면 안 된다는 것이다. 불안의 반대 방향을 보든가, 아니면 불안을 상대하지 말고 슬쩍 옆으로 피해야 한다. 그게 나를 일으켜 세울 수 있는 방향이라면 불안해도 괜찮다. 그러나 둘 다 넘어져 있으면 아무도 일으켜줄 사람이 없다. 어쨌든 조금이라도 움직여야 한다. 조금이라도 앞으로 전진해 나가는 것이 한편으로 보면 불안을 이길 수 있는 방법이다.\n\n---\n\n#### **자전거는 발을 저어야 쓰러지지 않는다**\n\n자전거를 타고 가면서 넘어질까 봐 불안해서 우왕좌왕하면 오히려 더 넘어진다. 불안해도 계속 발을 저어서 조금이라도 움직이면 거기에 속도가 붙고, 오히려 자전거가 안 쓰러지고 간다. **같이 발을 저어야 한다.** 핸들도 양쪽에 있다. 한 사람만 한쪽으로 틀면 제자리에서만 맴돈다. 한 사람은 발이 가만히 있고 한 사람만 페달을 밟으면 자전거가 앞으로 나갈 수 없다. 목적지까지 가려면 어쨌든 한쪽이 힘", "source": "essay"}, {"id": "essay_272_11b85c018f", "text": "쪽에 있다. 한 사람만 한쪽으로 틀면 제자리에서만 맴돈다. 한 사람은 발이 가만히 있고 한 사람만 페달을 밟으면 자전거가 앞으로 나갈 수 없다. 목적지까지 가려면 어쨌든 한쪽이 힘을 내주면 한쪽이 따라가 줄 것이고, 이 사람이 힘들면 반대쪽이 또 해주면 된다. 삶을 멈출 수 없다면, 멈추지 않는다면 그렇게 살아갈 수밖에 없다.\n\n---\n\n#### **사랑에는 이미 평등성이 내재돼 있다**\n\n사랑에는 이미 평등성이 내재돼 있다. 평등성 없는 사랑은 사랑이 아니다. \"나만 사랑받고 싶다\", \"나만 사랑해 달라\"고 기도하는 것 자체가 이미 평등성에 위배돼 있다. 우리가 그토록 바라고 꿈꾸는 천국이 사랑이 넘치는 곳이라면, 거기에는 평등해야 한다. 이 땅에서 어떤 천국을 실현하려면 이 땅에서의 평등이 실현돼야 한다. \"나만 잘 살겠다\", \"내 신만 커져야 한다\", \"남은 어떻게 되든 내 주식은 올라야 한다\" — 이렇게 불평등을 조장하는 것은 본인 스스로 이미 평등성을 위배하고 있는 것이다. 그러면서 \"나는 기부를 이렇게 하니까 사랑을 실천하고 있다\"고 생각하면 안 된다. **이미 많이 갖고 있다는 것 자체가, 의도했건 아니건 간에 누군가의 몫으로 갈 것을 내가 가진 것일 수 있기 때문이다.** 그렇기 때문에 끊임없이 더 덜어내려 하고, 나누려는 노력이 필요하다. 모든 것을 다 주라는 얘기가 아니라.\n\n---\n\n#### **혼자만 왕창 큰 벼", "source": "essay"}, {"id": "essay_273_763451696c", "text": "것일 수 있기 때문이다.** 그렇기 때문에 끊임없이 더 덜어내려 하고, 나누려는 노력이 필요하다. 모든 것을 다 주라는 얘기가 아니라.\n\n---\n\n#### **혼자만 왕창 큰 벼는 밭을 망친다**\n\n하늘의 태양은 고루고루 비춘다. 벼밭을 보면 자연 상태에서 어떤 특정한 벼가 혼자만 하늘 높은 줄 모르고 크는 경우는 없다. 만약에 특정 벼가 혼자만 왕창 커져버린다면 밭이 망가진다. 그늘이 지기 때문이다. 아무리 작은 풀이라도 그늘이 드리운다. 피해를 주고 있다는 것이다. 그런데 더군다나 특정 나무나 풀이 자기 혼자 커져버리면 옆이 황폐화될 수밖에 없다. 그리고 그것은 결국 자기 자신한테도 안 좋아질 수밖에 없다.\n\n---\n\n#### **AI 기술 발전과 평등성의 과제**\n\n지금 AI나 기술이 발전하면 발전할수록 오히려 불평등이 더 심화되고 있다. 그것을 어떻게 분배할 것인가, 평등성을 어떻게 회복할 것인가. **그것이 결과적으로는 사랑을 회복하는 힘이다.** 사랑은 감정이 아니다. 평등성이다. 그리고 평등성은 구조의 문제이기도 하다. #사랑 #평등성 #자력 #자전거 #공동체 #나눔 #AI\n\n--- (구분선)\n\n[파일명: 사랑의정의_결여와움직임_수필.md]\n\n### **사랑의정의_결여와움직임_수필**\n\n#### **사랑은 결여다**\n\n철학을 영어로 필로소피아(Philosophia)라 한다. 필로스(Philos)는 사랑, 소피아(Soph", "source": "essay"}, {"id": "essay_274_af44171ec8", "text": "### **사랑의정의_결여와움직임_수필**\n\n#### **사랑은 결여다**\n\n철학을 영어로 필로소피아(Philosophia)라 한다. 필로스(Philos)는 사랑, 소피아(Sophia)는 지혜다. 지혜를 사랑하는 것, 그것이 철학이다. 그런데 내가 오랫동안 이 말을 곱씹으면서 이런 생각이 왔다. **사랑이라는 말에는 결여가 내포되어 있다** 는 것. 내가 지혜를 사랑한다는 것은, 내가 아직 지혜롭지 못하다는 말이다. 모르니까 알려고 하는 거다. 앎으로 가고 싶기 때문에 사랑이 생기는 거다. 내가 이미 완전히 알았다면, 굳이 철학을 할 이유가 없다. 그런 면에서 **철학을 한다는 것은 무지 속으로 내가 걸어 들어가는 것이다. 무지를 초대하는 것이다.** 내가 모름 속에 있다는 것을 아는 것, 그게 철학을 하는 거다. 사랑은 채워진 상태가 아니다. 결여가 있는 곳에서 생겨나는 움직임이다.\n\n#### **신의 사랑은 자발적 결여다**\n\n그렇다면 질문이 생긴다. 완전한 존재인 신의 사랑은 무엇이냐? 신은 완전하다고 하는데, 완전한 존재에게 결여가 있을 수 있는가? 내가 생각하는 답은 이렇다. 완전한 신이 **스스로 자발적으로 결여를 선택** 하는 거다. 그래야 신의 사랑이 우리 인간에게 닿으니까. 이원적인 세계 안에서, 자발적으로 결여를 선택하는 것, 그것이 신의 사랑이다. 남녀 간의 사랑도 마찬가지다. 남성성이 있고 여성성이 있다. 남자는", "source": "essay"}, {"id": "essay_275_1a1614e27c", "text": "사랑이 우리 인간에게 닿으니까. 이원적인 세계 안에서, 자발적으로 결여를 선택하는 것, 그것이 신의 사랑이다. 남녀 간의 사랑도 마찬가지다. 남성성이 있고 여성성이 있다. 남자는 남성성이 크고 여성성은 작다. 여자는 반대다. 그 결여가 있기 때문에 서로를 메우려 한다. 만약 남자도 50 대 50, 여자도 50 대 50이라면, 서로 사랑할 이유가 없다. 남자인지 여자인지 구분도 안 된다. 차이가 있기 때문에 이끌림이 생긴다. 그 차이 자체가, 신이 설계한 방식이다. **이원성으로 벌어지는 것은 신의 사랑을 표현하기 위해서 그렇게 이원성으로 벌어진 것이다.**\n\n#### **사랑은 동사다, 바람처럼**\n\n**기압차** 가 생기면 바람이 분다. 바람이 불고 싶어서 부는 게 아니다. 기압이 낮은 곳으로 그냥 빨려 들어가는 거다. 높은 데 있는 것이 아래로 떨어지는 것도 마찬가지다. 떨어지고 싶어서가 아니라, 높이 있었기 때문에 떨어지는 것이다. **억지로 하는 게 사랑이 아니다.** 나도 모르게 그리로 **이끌려 들어가 버리는 것** 이 사랑이다. 그래서 사랑은 명사가 아니라 **동사, '사랑한다'**다. 사랑이 그냥 사랑으로만 있으면 멈춰져 있는 사랑이다. 죽은 사랑이다. **사랑이 흘러야** 사랑이 된다. 움직여야 한다. 우리 세상은 이원성으로 나뉘어 있다. 너가 있고 내가 있고, 남자가 있고 여자가 있고, 낮이 있고 밤이 있고, 긴", "source": "essay"}, {"id": "essay_276_f91121b4c0", "text": "사랑이다. **사랑이 흘러야** 사랑이 된다. 움직여야 한다. 우리 세상은 이원성으로 나뉘어 있다. 너가 있고 내가 있고, 남자가 있고 여자가 있고, 낮이 있고 밤이 있고, 긴 게 있고 짧은 게 있다. 그 **이원성으로 나뉜 나눔 자체가 사랑의 표현** 이다. 그 차이가 있어야 서로를 알아볼 수 있다. **다름에서 알아보는 지혜** 가 나온다. 태극기의 음양이 서로 교차하듯, 그 교차에서 세상 만물이 펼쳐진다. 남녀가 사랑해서 생명이 잉태되는 것처럼, 우주가 펼쳐진 것과 같다.\n\n#### **질문이 사랑이다**\n\n코칭에서 질문을 한다. 그 질문이 무엇을 하는지 생각해 본다. 코치의 질문은 고객 안에 **진공 상태** 를 만든다. 빈 공간을 만드는 거다. 그러면 답이 끌려 나온다. 코치가 고객에게 뭐가 부족하고 뭐가 남는지 아는 게 아니다. 질문을 통해 고객 안에 있는 것이 딱 끌려 나오면, 그때 고객 스스로 안다. '내가 부족한 것이 이거였구나, 나한테 필요한 것이 이거였구나.' 무의식에 있던 것이 의식화되어 나오는 거다. **끌려 나오는 거다.** 옛날 철학자들도 마찬가지였다. 가르쳐주려 한 게 아니었다. **질문을 해서 사람 안에 있는 것을 끄집어냈다.** 묻고 답하고, 묻고 답하고. 선문답도 그렇고. 그게 사랑의 행위였다. 그게 철학이었다. **질문 자체가 사랑** 이다. 코칭이 사랑이고, 질문이 코칭이고, 코칭이 사랑이고,", "source": "essay"}, {"id": "essay_277_28048ede0f", "text": "** 묻고 답하고, 묻고 답하고. 선문답도 그렇고. 그게 사랑의 행위였다. 그게 철학이었다. **질문 자체가 사랑** 이다. 코칭이 사랑이고, 질문이 코칭이고, 코칭이 사랑이고, 사랑이 질문이다. 이것들이 하나로 이어져 있다.\n\n#### **사랑하면 지혜롭고, 지혜로우면 사랑할 수밖에 없다**\n\n**사랑하는 것 자체가 지혜이고, 지혜로워지면 사랑할 수밖에 없다.** 지혜와 자비는 둘이 아니다. 동전의 양면처럼 떨어질 수 없다. 그래서 철학을 하는 것이 코칭을 하는 것이고, 코칭이 사랑을 하는 것이다. 결여를 인정하는 것, 차이를 허용하는 것, 그 빈 공간을 만들어 주는 것. 그것이 지혜이고 사랑이다. 결여가 있는 곳에 흐름이 생기고, 흐름이 있는 곳에 사랑이 있다. #사랑 #결여 #필로소피아 #코칭질문 #이원성\n\n--- (구분선)\n\n[파일명: 사명과신념_이치의법칙_수필.md]\n\n### **사명과신념_이치의법칙_수필**\n\n#### **신념에는 이원성이 있다**\n\n신념이라는 거는 내가 '이것이 옳다 저것이 옳다' 생각하는 거다. 내가 옳다고 생각하면 그르다가 반드시 있다. 거기에는 이원성이 있다. 돈 버는 게 최고의 가치야 하면서 살다 보면 가족과 소홀해지고, 남에게 욕을 먹고, 더 불행해질 수도 있다. 20억을 끌어당겼어도 그것을 제대로 활용하지 못하면 방탕하게 생활해서 안 좋은 길로 갈 수 있다. **제한된 신념을 자기 자신이라고 동", "source": "essay"}, {"id": "essay_278_95e2a8e77e", "text": "남에게 욕을 먹고, 더 불행해질 수도 있다. 20억을 끌어당겼어도 그것을 제대로 활용하지 못하면 방탕하게 생활해서 안 좋은 길로 갈 수 있다. **제한된 신념을 자기 자신이라고 동일시해서 정체성이 그걸 추구하게 된다.** 그러면 잘못된 길로 들어설 수 있다.\n\n#### **사명의 기준은 나와 남에게 가치 있는가이다**\n\n사명은 제한된 신념을 벗어난 것이다. 상대적 개념을 벗어난 것이다. 그걸 확인하는 방법은 하나다. **'이 사명이 나와 남에게 가치 있는가?'** 파시스트도 나치도 자기 민족을 위한 사명을 받았다고 생각했다. 그런데 그건 나와 남을 함께 행복하게 하지 않는다. 그러니까 **그건 사명이 아니고 신념이다.** 정말 가치 있는 사명이어야 진정한 사명이 된다. 왜 나와 남이 함께 행복해야 되는가. **나와 남이 둘이 아니기 때문이다.** 내가 속한 환경이 깨끗해야 내 자신이 깨끗하게 살 수 있다. 세상과 나는 분리할 수 없다. 홍익인간 정신도, 모든 인류에 전해 내려오는 공통된 법칙도 그것이다.\n\n#### **사명을 실천하는 자체가 목적이다**\n\n사명이라는 것은 끊임없이 목적을 향해서 가야 되는 게 아니다. **그 사명을 실천하는 자체가 이미 그게 목적이다.** 지금 내가 선 자리에서 바로 실천하는 것 — 그것이 수단이자 목적이 된다. '지금 열심히 노력해서 돈 벌어 갖고 나중에 내 사명을 실천해야지' — 이건 아니다. 사명", "source": "essay"}, {"id": "essay_279_fcc9547efb", "text": "목적이다.** 지금 내가 선 자리에서 바로 실천하는 것 — 그것이 수단이자 목적이 된다. '지금 열심히 노력해서 돈 벌어 갖고 나중에 내 사명을 실천해야지' — 이건 아니다. 사명을 가지고 살아갈 때 우리가 길을 잃지 않고 살아간다.\n\n#### **우주는 친절해서 반대급부를 준다**\n\n욕망의 투사로 끌어당김을 해서 재물을 끌어당겼다면 — 거기에 반드시 반대급부가 온다. 그건 우주가 너무 친절해서다. 그걸 안 준다고 보면 이 사람이 계속 잘못된 길로 갈 거 아닌가. 그래서 시련을 준다. 그 사람으로 하여금 다시 온전한 삶으로 살게끔 계속 밀어붙이는 거다. 신성이라고 표현했지만 사실 그건 **이치** 다. 신성이 세상의 이치다. 내가 세상을 위하지 않고 나의 욕심을 세상에 투사하면 세상이 어렵게 되고, 그러면 나 자신도 어렵게 된다. 둘이 아니니까. 엔트로피 법칙일 수도 있다.\n\n#### **이치를 신념으로 삼아야 한다**\n\n신념은 이정표와 같다. 그런데 잘못된 신념이 아니라 **이치를 신념으로 삼아야** 내가 잘못된 길로 가지 않는다. 홍익인간 — 세상을 널리 이롭게 해야 된다는 것. 남을 이롭게 해야 나도 잘 된다는 것. 이건 이치다. 법이다. 진리다. **진리를 신념으로 삼으면** 사명에 맞는 가치를 쫓아가게 된다. 그걸 이정표로 삼아서 가야 한다. #사명 #신념 #이치 #올셀프 #홍익인간 #이원성\n\n--- (구분선)\n\n[파일명:", "source": "essay"}, {"id": "essay_280_4762583566", "text": "진리를 신념으로 삼으면** 사명에 맞는 가치를 쫓아가게 된다. 그걸 이정표로 삼아서 가야 한다. #사명 #신념 #이치 #올셀프 #홍익인간 #이원성\n\n--- (구분선)\n\n[파일명: 삶의드라마_빛과배역_수필.md]\n\n### **삶의드라마_빛과배역_수필**\n\n#### **우주적 드라마에서 나의 배역**\n\n왜 나는 이런 삶을 살까. 돈도 잘 벌고 건강하고 행복하게 사는 사람들이 많은데, 왜 하필 나는 이렇게 살까. 이 질문을 우주적으로 보면 이렇다. 삶이라는 연극이 펼쳐지려면 **배역** 이 있어야 한다. 악인도 있어야 하고, 조연도 있어야 하고, 단역도 있어야 한다. 왜 이렇게 차이가 나는가. 그것은 **랜덤** 이다. 신의 입장에서는 너와 내가 따로 없다. 차에 나사 하나가 빠지면 차가 굴러가지 않는다. 아무리 작은 역할이라도 그 역할이 있어야 삶이 굴러간다. 나는 지금 이 우주적 드라마에서 나의 역할을 하고 있는 것이다. 신이 부여한 역할이다.\n\n#### **배역을 진짜라고 믿는 것**\n\n문제는 배우가 그 역할을 자기와 **동일시** 해버리는 것이다. 연극으로 가난하게 사는 건데, 연극으로 힘든 건데, 그게 진짜로 자기가 그렇게 힘든 것으로 생각해서 괴롭다고 배우가 생각한다. 삶이 영원하지 않다는 것, 왔다 간다는 것이 그 증거다. 진짜라면 멈추든가, 지나간 것이 고대로 있어야 한다. 그러나 지나간 것은 없다. 50 평생이 어디 있는가", "source": "essay"}, {"id": "essay_281_143cd9b5ee", "text": "배우가 생각한다. 삶이 영원하지 않다는 것, 왔다 간다는 것이 그 증거다. 진짜라면 멈추든가, 지나간 것이 고대로 있어야 한다. 그러나 지나간 것은 없다. 50 평생이 어디 있는가. **지금만 있다.** 기억 속에만 있는 것이다. 그것이 기억의 재생이다. 그래서 삶이 연극이다. 그 배역으로 그냥 하는 건데, 이걸 진짜라고 믿는 것이다. 너무 거기에 몰입하다 보니까. 배우가 비련의 주인공 역할을 하다가 \"나 이 삶이 너무 싫어, 때려치울 거야\" 이러면 어떻게 되는가. 그것은 연극을 하고 있는 것이 아니라 **때려치우고 싶은 삶** 을 사는 것이다. 그 배역을. **연극이라고 생각하면 가벼워진다.** 불만스럽게 내 삶이라고 생각하면 무거운 내 삶이 된다. 삶을 온전히 끌어안는다는 것은 주어진 배역을 충실히 사는 것이다. 훌륭한 배우는 주인공이든 게스트든 어떤 역할이든 훌륭하게 해낸다.\n\n#### **각본을 내가 쓴다**\n\n**드라마를 쓴 사람도 나이고, 배우도 나이고, 관객도 나다.** 배우이면서 관객이면서 감독이면서 작가다. 삶은 기억의 재생이고 드라마 각본의 재생이다. 그런데 **그 스토리를 내가 결정하고 살면 각본이 바뀔 수 있다.** 내가 결론을 정해놓고 그렇게 생각하고 살면 거기 가 있다. 삶을 어떻게 볼 것인가는 내가 선택하기 나름이다. 세트장에 저 배우가 안 나왔으면 좋겠다고 하면 드라마가 뒤죽박죽이 된다. 그냥 세트장이 없", "source": "essay"}, {"id": "essay_282_7b08358c48", "text": "그렇게 생각하고 살면 거기 가 있다. 삶을 어떻게 볼 것인가는 내가 선택하기 나름이다. 세트장에 저 배우가 안 나왔으면 좋겠다고 하면 드라마가 뒤죽박죽이 된다. 그냥 세트장이 없어지는 것이다. 주어진 세트 안에서 내가 어떤 스토리를 써나가느냐가 내 몫이다.\n\n#### **삶은 빛이다**\n\n어렸을 때 모습부터 화면이 쭉 지나간다. 어렸을 때 그것은 어디 갔는가. **화면이었고 빛이었다.** 화면에 호랑이도 있고 사자도 있고 사람도 있지만, 거기 빛은 다 다르지 않다. 통으로 하나의 장면이다. 70억 인구가 있다면 **70억 개의 구슬** 이 있는 것이다. 70억 개의 우주가 있는 것이다. 그 구슬이 자기가 빛을 내는 것이 아니다. **본성의 태양이 빛을 뿌려주고 있는 것이다.** 본성의 빛이 구슬에 비춰지고, 그 빛이 다른 구슬에도 비춰진다. 누구의 빛이 밝고 약하고가 아니다. 본성에서 비추는 것을 자기라고 생각하는 것이다. 삶이 **선물** 이라는 것은 이 때문이다. 내 앞에 드러나는 모든 것이 빛으로 온 선물이다. 악인도 성인도, 도움을 주는 사람도 방해하는 사람도, 전부 이 드라마의 세트다. 나를 위해 360도 조명을 비추며 마련된 세트장이다. 이 얼마나 훌륭한 세트장인가.\n\n#### **수도꼭지와 생각**\n\n왜 나는 못 깨닫고, 저 사람은 잘 사는가. 횡성댐에서 수압을 때리기 때문에 수압은 모두 똑같다. **의식은 다 천이다.", "source": "essay"}, {"id": "essay_283_9d445d6d58", "text": "나 훌륭한 세트장인가.\n\n#### **수도꼭지와 생각**\n\n왜 나는 못 깨닫고, 저 사람은 잘 사는가. 횡성댐에서 수압을 때리기 때문에 수압은 모두 똑같다. **의식은 다 천이다.** 수도꼭지를 얼마나 열었느냐의 차이다. 내가 틀지 않고 저 사람은 더 많이 나온다고 생각하는 것이다. 물 호스를 나무토막으로 막아놨는가, 그걸 뺐는가. 그것이 **생각** 이다. 생각이라는 나무토막이 수도꼭지를 막고 있는 것이다. 잘하려고 하면 안 된다. 완벽하게 하려 해도 안 된다. 그냥 수도꼭지를 확 틀어버리는 것이다. 유튜브에서 성과를 내는 사람들은 생각이라는 것을 접어버리고 그냥 하는 사람들이다. 자기 기준을 다 열어버린 것이다. 깨달음이 아니었던 재능이 확 열리는 것이다. 나를 막고 있는 것은 옆에 누가 있는 것이 아니다. **나 자신의 생각이다.**\n\n#### **생각 이전 자리**\n\n생각을 빼내려면 생각 이전 자리를 알아야 한다. 생각이 올라왔을 때 '이 생각이 올라왔네'라고 하면, 그 알아챔도 생각이 되어 또 생각에 빠진다. 그래서 못 벗어나는 것이다. 지금 소리가 들린다. 이것은 생각하기 전에도 들렸다. 지금 보이는 것도 생각하기 전에도 보였다. **거기가 생각 이전 자리다.** 생각 이전의 자리, 그게 주인공 자리다. 지혜를 떠올리기 전에도 뭔가 보고 있었다. 음악 소리도 들리고 있었다. 생각이 일어나기 전에 이미 보고 듣고 있다. 너무", "source": "essay"}, {"id": "essay_284_4a00586f8a", "text": "이전 자리다.** 생각 이전의 자리, 그게 주인공 자리다. 지혜를 떠올리기 전에도 뭔가 보고 있었다. 음악 소리도 들리고 있었다. 생각이 일어나기 전에 이미 보고 듣고 있다. 너무 가깝다. 이 자리에 그냥 자꾸 머물러야 한다. 이 자리에서 법문을 들으면, 삶이 읽히면, **삶이 엄청 가벼워진다.** 이것이 열쇠다. 따로 찾을 필요가 없다. 24시간을 깨어 있으면서 못 깨달았다고 착각을 한다. 깨달으려고 애쓰고 수행을 한다고 하면서. 바로 여기에 있는데, 그걸 찾겠다고 인도로 가고 고행을 한다. 너무나 아이러니다. 하느님이라는 소리나 부처님이라는 소리나 똥막대기라는 소리나 **똑같은 소리** 다. 뜰 앞의 잣나무도 같은 말이다. 그게 지금 여기에 있다. #삶의드라마 #빛과배역 #생각이전자리 #수도꼭지 #올셀프\n\n--- (구분선)\n\n[파일명: 삶의역동성과새로운관점의창조_수필.md]\n\n### **삶의_역동성과_새로운_관점의_창조_수필**\n\n#### **지금 통과하는 구간이 전부가 아니다**\n\n삶이 안 나가고 뭔가 정체된 것 같을 때가 있다. 그럴 때 우리는 그 하나를 가지고 삶 전체를 재단하기 시작한다. 지금 이 구간이 내 삶의 전부인 것처럼. 그러면서 다 의미 없는 것 같고, 다 그렇다는 결론으로 내려간다. 그런데 멀리서, 제3자의 눈으로 강물을 바라본다고 상상해보자. 어떤 지점에는 잔잔하게 흘러가는 사람이 있다. 어떤 지점에는 폭포처럼", "source": "essay"}, {"id": "essay_285_e37a5c180f", "text": "없는 것 같고, 다 그렇다는 결론으로 내려간다. 그런데 멀리서, 제3자의 눈으로 강물을 바라본다고 상상해보자. 어떤 지점에는 잔잔하게 흘러가는 사람이 있다. 어떤 지점에는 폭포처럼 낭떠러지로 떨어지는 구간도 있다. 지금 정체된 구간에서 앞서 가는 사람을 부러워하지만, 폭포 앞에 선 사람은 오히려 이쪽을 부러워할 수도 있다. 인생을 길게 보면 **다 그런 흐름이 있다** . 빨리 통과하는 구간과 느리고 정체된 구간. 그게 다 있는 것이다.\n\n#### **역동성은 낭떠러지에서 온다**\n\n강물이 흐른다는 것은 어딘가에 낭떠러지 폭포가 있다는 뜻이다. 처음부터 끝까지 완전히 평평하다면 흐름이 어디 있겠는가. 내 인생이 처음부터 끝까지 별 탈 없이 평평했으면 좋겠다고 바란다면, 그렇다면 **내 삶의 흐름이라는 게 안 생긴다** . 내가 겪었던 낭떠러지 구간들, 지루했던 공간들, 그런 것들이 **삶의 역동성을 앞으로 나아가게 하는 힘** 이다. 정체됐을 때는 그동안 못 봤던 것들을 보면 된다. 낭떠러지처럼 빠르게 떨어질 때는 '삶이 이렇게 빨리 지나가는구나' 하고 그 스릴을 느끼면 된다. 그런데 매번 그럴 때마다 '힘들어 죽겠다', '지루해 죽겠다' 이렇게 해석해버리면, 어떤 상황에서도 그런 식으로만 삶을 읽게 된다. **자기 삶을 어떻게 스스로 해석하느냐** , 그게 굉장히 중요하다.\n\n#### **내가 그은 선이다**\n\n삶은 통으로 우리에게", "source": "essay"}, {"id": "essay_286_17a783d00c", "text": ", 어떤 상황에서도 그런 식으로만 삶을 읽게 된다. **자기 삶을 어떻게 스스로 해석하느냐** , 그게 굉장히 중요하다.\n\n#### **내가 그은 선이다**\n\n삶은 통으로 우리에게 주어진 것이다. 그 통으로 주어진 것에서 부분을 떼어내 '내 삶이 이렇다 저렇다' 말할 수 없다. 지금 통과하는 구간만 가지고 **모든 나의 삶을 일반화시키면 안 된다** . 그것은 내가 그은 선이다. 특정한 상황들과 그 상황 속에 처해 있는 나를 엮어서 선을 만들어 **'내 삶이 이렇다'고 재단하는 것** 이다. 그리고 내가 계속 불안함 쪽으로 선을 긋고 있다는 것은, 그 인연 지은 대로 그 근처에서 다음 선도 찾아진다는 뜻이다. **인연 지은 대로 오는 것** 이다. 내가 씨를 계속 그쪽으로 뿌리고 있으니 그런 씨들이 주위에 많이 생기는 것은 당연하다. 그러니까 내가 계속 그 방향으로 관점을 두고 있다는 것은, 그 상황을 내가 계속 **창조하게 된다** 는 것이다.\n\n#### **새롭게 선을 그어야 한다**\n\n그래서 **새롭게 선을 그어야 한다** . 통으로 돼 있는 의식에서 다른 방식으로 선을 그을 수 있는 방법은 360도로 열려 있다. 그런데 우리는 **특정 부분에만 포커스를 맞춰** '난 이렇다 저렇다' 하면서 비슷한 것들을 계속 불러온다. 싫어하면 그것으로부터 달아날 것 같지만, 사실 그게 아니다. 싫어하는 것에도 내가 **관심을 갖고 있으니까*", "source": "essay"}, {"id": "essay_287_9617b0d1c5", "text": "를 맞춰** '난 이렇다 저렇다' 하면서 비슷한 것들을 계속 불러온다. 싫어하면 그것으로부터 달아날 것 같지만, 사실 그게 아니다. 싫어하는 것에도 내가 **관심을 갖고 있으니까** , 거기다 힘을 계속 주고 있는 거다. 좋아하는 것도 선택이고 싫어하는 것도 결국 선택이다. 누굴 탓할 게 없다. 내 앞에 놓이는 상황들을 내가 계속 선택하고 있는 것이다. 매번, 다른 선택을 할 수 있다.\n\n#삶의해석 #역동성 #관점창조 #일반화의오류 #선긋기\n\n--- (구분선)\n\n[파일명: 삶의온전함_매순간거듭남_수필.md]\n\n### **삶의온전함_매순간거듭남_수필**\n\n#### **숙취 속에서도 온전하다**\n\n술을 마신 다음 날 아침, 머리는 아프고 몸은 찌뿌둥한데, 문득 이런 생각이 들었다. **삶이 그냥 자체로 온전하구나.** 머리 아프면 아픈 대로, 다 온전히. 지금 이 순간에 완벽하다. 겨울에 잎이 다 떨어진 나무를 본다. 우리는 거기서 쓸쓸함을 느낀다. 새싹이 파릇파릇한 것만이 완전한 나무라고 생각한다. 그런데 그렇지 않다. **잎이 다 떨어진 나무도 자체로 그냥 온전하다.** 우리 자체도 마찬가지다. 내 안에서 올라오는 외로움, 쓸쓸함. 사실 그것들은 부차적인 감정이다. **내가 그것에 이름을 외로움이라고 지은 것이다.** 내 안에서 뭔가가 올라오는 것일 뿐, 내가 지금 잘못돼서가 아니다. 그냥 자체로 온전한 것이다.\n\n#### **허용이", "source": "essay"}, {"id": "essay_288_eee02abb2e", "text": "정이다. **내가 그것에 이름을 외로움이라고 지은 것이다.** 내 안에서 뭔가가 올라오는 것일 뿐, 내가 지금 잘못돼서가 아니다. 그냥 자체로 온전한 것이다.\n\n#### **허용이 아니라 수용이다**\n\n좋은 감정은 많이 느끼고 싶고, 안 좋은 감정은 회피하고 싶다. 아주 순결한 의식만 유지하겠다는 것. 그것은 신이 준 선물을 **발로 걷어차는 것이나 마찬가지다.** 다 같은 자리에서 올라오는 것이기 때문이다. 여기서 중요한 구분이 있다. **허용** 은 선택적이다. 이건 허용하고 저건 허용하지 않는다. 초대와 같다. 이 사람은 초대하고 저 사람은 초대하지 않는다. **수용은 다르다.** 있는 그대로 다 온전히 받아들이는 것이다. 맞이하는 것이다. 감정이 올라오면 올라온 것을 그냥 맞이하는 것이다. 슬프면 슬픈가 보다. 기쁘면 기쁜가 보다. **생생하게 맞이하는 것이다.** 생각이 문제가 되는 것이 아니다. **생각을 실체화하는 것이 문제다.** 그림자가 비치는 것은 당연하다. 그림자를 보고 저것이 실제라고 착각을 일으키니까 문제가 되는 것이다. 그림자는 잘못이 없다. 생각도 잘못이 없다. 내 안에서 올라오는 감정들도 다 잘못이 없다.\n\n#### **무소부재(無所不在): 없는 데가 없다**\n\n하느님이 온 우주에 충만하고 무소부재하다는 것은, 없는 데가 없다는 것이다. 나뭇잎파리에도 있고, 화장실 변기통 속에도 있다. 그러니 내 눈 속에", "source": "essay"}, {"id": "essay_289_58d4adaf1b", "text": "無所不在): 없는 데가 없다**\n\n하느님이 온 우주에 충만하고 무소부재하다는 것은, 없는 데가 없다는 것이다. 나뭇잎파리에도 있고, 화장실 변기통 속에도 있다. 그러니 내 눈 속에도 있고, 내 몸 안에도 있다. **보는 그것이 하느님이다.** 내 안에서 올라오는 화, 불안, 우울, 이런 것들도 다 **그 자리에서 나오고 있는 것이다.** 이미 올라왔다는 것은 보는 것이다. 그 자리에서 올라오니까, 그 자리에서 있는 그대로 본다. 그런데 하느님한테 '이거 해주소서, 저거 해주소서' 하는 것은 하느님한테 명령을 내리는 것이다. 모든 것을 다 아는 존재에게 마치 모르는 것처럼. 귀가 먹은 사람처럼. 목소리를 높여야만 들릴 것 같다고. 그것은 욕심에 찌든 욕망의 분출 이상 이하도 아니다. 엄마 손 잡고 가는 아이가 '엄마 뜻대로 하소서' 이러고 쫓아다니지 않는다. **그냥 간다.** 믿으면 아무 말 없이 그냥 손잡고 가는 것이다. 아이에게 약이 쓰더라도 엄마가 먹이는 것은 잘 키우기 위해서다. 사탕만 달라고 하는 것은 하느님을 선택적 조건 안에 가둬버리는 것이다. 수행과 명상과 기도도 마찬가지다. 그것이 목적이 되면 주객이 전도된 것이다. **이 삶을 생생하게 살아내기 위해서 하는 것이다.** 신이 준 선물을 온전히 맞이하기 위해서 하는 것이다.\n\n#### **매 순간 거듭나야 한다**\n\n나무는 해마다 묵은 이파리를 다 떼내고 새 이파리를", "source": "essay"}, {"id": "essay_290_0355d5865a", "text": "내기 위해서 하는 것이다.** 신이 준 선물을 온전히 맞이하기 위해서 하는 것이다.\n\n#### **매 순간 거듭나야 한다**\n\n나무는 해마다 묵은 이파리를 다 떼내고 새 이파리를 낸다. 날씨도 거듭난다. 구름은 순간순간 모양이 바뀐다. 바람도 매 순간 거듭난다. 삼라만상이 다 거듭나고 있다. **하늘나라 자체가 매 순간 거듭나고 있다.** 고정되어 있으면 그것은 하늘나라가 아니다. 그런데 종교인들은 거듭나지 않는다. 예전에 그래왔던 것처럼 똑같이 요구하고 목소리를 높인다. 고정된 신념과 관념을 붙잡고 돌처럼 굳어있다. 새로운 것이 제시되면 배격한다. 점점 더 무거워진다. **돌처럼 굳어있는 관념이 죄다.** 다른 것이 죄가 아니다. 그 굳어있는 관성과 관념들을 붙잡고 있는 것 자체가 죄다. 그것을 다 버려야 한다. 해체하고 새털처럼, 구름처럼, 바람처럼 가벼워지고 매 순간 거듭나는 것. **그것이 진정한 죄사함이다.** #삶의온전함 #수용 #매순간거듭남 #무소부재 #가벼워짐\n\n--- (구분선)\n\n[파일명: 삶의태도_차별성과전체성_수필.md]\n\n### **삶의태도_차별성과전체성_수필**\n\n#### **나는 지금 부분을 통과하고 있는 거다**\n\n'왜 나는 이렇게 살까?', '왜 나만 이렇게 힘들까?' — 이게 삶의 굉장히 큰 화두다. 힘들지 않다는 게 아니다. **나는 지금 부분을 통과하고 있는 거다.** 씨앗이 땅에 떨어져서 위에 흙이", "source": "essay"}, {"id": "essay_291_30a3ce362e", "text": "살까?', '왜 나만 이렇게 힘들까?' — 이게 삶의 굉장히 큰 화두다. 힘들지 않다는 게 아니다. **나는 지금 부분을 통과하고 있는 거다.** 씨앗이 땅에 떨어져서 위에 흙이 덮이면 깜깜하다. 앞이 안 보인다. '왜 나는 이렇게 깜깜한 데 던져졌을까?' 그런데 시간이 지나면 깜깜함을 통과하고 있는 거다. 또 시간이 지나면 다시 밝은 부분이 보이고 새싹이 나온다. 햇빛이 쨍쨍 쬐어 수분이 날아가면 '나는 왜 이렇게 마르지?' 밤이 되어 이슬이 내리면 다시 수분을 먹고 살아난다. 바람이 확 불어서 이리 휩쓸리고 저리 휩쓸리고. 이런 것들을 다 경험하면서 성장한다. **삶의 여정을 통과하는 단계인데, 그 부분 하나를 붙잡고 고통스럽다고 하는 거다.**\n\n#### **차별성은 다양성이다**\n\n육신의 차원에서는 차별이 있지만 **영적인 차원에서는 차별이 없다.** 촛불이 작은 것도 있고 큰 것도 있고, 노란 것도 있고 빨간 것도 있듯이 — 그거는 하나로 보면 **다양성** 이다. 나는 돌밭에 태어났고 저 사람은 기름진 땅에 태어났다. 그래서 그 사람은 발육이 좋게 잘 컸고 나는 비리비리한 거다. 그걸 서로 알게 되면 역지사지의 이치를 깨닫게 된다. **우리가 둘이 아니구나.** 그거를 서로 알면서. 그 사람이 나보다 잘 살고 부자고 권력을 휘두르는 것 같지만, 그 사람도 육신으로 갖는 한계성이 분명히 있다. 우리가 서로 모르니까 그런 거", "source": "essay"}, {"id": "essay_292_d60599294a", "text": "이 아니구나.** 그거를 서로 알면서. 그 사람이 나보다 잘 살고 부자고 권력을 휘두르는 것 같지만, 그 사람도 육신으로 갖는 한계성이 분명히 있다. 우리가 서로 모르니까 그런 거다. **전체성을 회복해야 한다.**\n\n#### **어려운 자가 더 빨리 깨어난다**\n\n**깨달은 면으로 봐서는 오히려 우리가 더 빨리 깨달을 수 있다.** 어려운 환경에 처했을 때 **영적으로 더 빨리 깨어날 수 있다.** 핍박을 받으면 더 각성이 된다. 성자들도 그렇다. '이 육신이 나만이 아니고 나의 전부가 아니구나' 하는 것을 오히려 어려움을 통해서 더 빨리 깨닫는다. 그러면 육신의 한계를 넘어서려 한다. 육신에 제한적으로 갇혀서 살다 보니까 차별을 견딜 수가 없게 되면, 빨리 육신을 넘어서 **온전한 나를 회복** 하게 된다. 전체성을 회복한다. 우주의 이치를 아는 거는 꼭 큰 꽃만이 아니다. **아무리 작은 꽃이래도 꽃이라는 성품이 다 있기 때문에** 다 감동시킬 수 있다.\n\n#### **깨어 있어야 한다**\n\n강자들이 함부로 못 하게 하는 **거울의 역할** — 말이나 이정표나 신호등처럼, '스톱해야 돼', '가도 돼' 이렇게 할 수 있는 그런 역할을 해줘야 한다. **사람들이 깨어 있어야 한다는 게 그런 거다.** 영적으로 깨어 있어야 한다. 적대적으로만 생각해서 투쟁을 일으키면 오히려 그들에게 더 힘을 불어 넣어준다. 이 땅에 온 소명이 없어", "source": "essay"}, {"id": "essay_293_a39eb1cc29", "text": "사람들이 깨어 있어야 한다는 게 그런 거다.** 영적으로 깨어 있어야 한다. 적대적으로만 생각해서 투쟁을 일으키면 오히려 그들에게 더 힘을 불어 넣어준다. 이 땅에 온 소명이 없어지는 거다. 내가 그것을 어떻게 할 수 있는 부분이 아닐 수도 있다. 단 **내가 그것을 어떤 식으로 받아내느냐의 문제다.** 있지도 않은 고통을 더 확대시키고, 과거의 고통을 현재로 끌어오거나 미래의 불안으로 연결시키는 그런 건 받으면 안 된다. #삶의태도 #차별성 #전체성 #씨앗비유 #소명 #올셀프\n\n--- (구분선)\n\n[파일명: 삶의파고_꽃의여정_수필.md]\n\n### **삶의파고_꽃의여정_수필**\n\n#### **통과하고 있다는 것**\n\n삶에는 파고가 있다. 지금 참 좋다는 때도 있고, 지금 막 죽겠다는 때도 있다. 그런데 지금 안 좋다고 생각하는 것도, 정체되어 있다고 생각하는 것도, 다 **지금 이 부분을 통과하고 있는 것이다.** 잘못된 것이 아니다. 오르막길이 있으면 내리막길도 있다. 그런데 우리는 내리막에서 '이거는 잘못된 삶이야', '이렇게 되면 안 돼' 하면서 헛힘을 쓴다. 나만의 기준을 가지고 삶에 들이대서 기준이 안 맞으면 무언가 잘못되어 가고 있다고 생각한다. 그러기보다 이렇게 생각하면 된다. '아, 내가 지금 이 부분을 통과하고 있구나.' 경험한다고 하면 언제 끝날지 기약이 없다. 그런데 통과하고 있다고 생각하면 어차피 지나가는 과정이", "source": "essay"}, {"id": "essay_294_abbf56d358", "text": "그러기보다 이렇게 생각하면 된다. '아, 내가 지금 이 부분을 통과하고 있구나.' 경험한다고 하면 언제 끝날지 기약이 없다. 그런데 통과하고 있다고 생각하면 어차피 지나가는 과정이 된다. 삶의 힘은 지금 같은 형태를 유지하려 해도 다른 방식으로 밀어낸다. 삶은 계속 전개된다.\n\n#### **꽃의 여정**\n\n씨앗이 땅속에 있다. 새싹이 조금씩 솟아오른다. 땅을 뚫고 나오는 부분을 통과하고 있는 것이다. 땅 위로 나와서 햇빛을 본다. 그 부분을 통과하고 있는 것이다. 꽃이 피면 꽃 부분을 통과하고 있는 것이다. 열매가 맺히고, 꽃도 떨어지고, 이파리도 떨어진다. 그 부분을 통과하고 있는 것이다. 어느 한 부분도 빠지면 안 된다. 땅속에 있을 때는 잘못된 것이고, 새싹이 올라왔을 때는 잘된 것이라고 할 수 없다. 꽃이 피었을 때는 잘된 것이고, 낙엽이 떨어질 때는 잘못된 것이라고 할 수 없다. **다 꽃의 여정을 겪기 위해 필요한 부분이다.** '땅속 부분을 건너뛰고 바로 꽃을 필래' 할 수 없다. 우리는 계속 꽃만 피고 싶다. 그런데 그렇게 될 수 없다. 중요한 것은 이것이다. **매 순간순간이 어느 것 하나 버릴 게 없는 꽃의 여정이다.**\n\n#### **삶은 음악이다**\n\n계속 고음만 있기를 바란다. 그런데 고음 상태만 나는 것은 소음이다. 높낮이가 있어야 아름다운 음악이 된다. **삶의 파고가 삶의 음악이고 창조성이다.** 부족함이", "source": "essay"}, {"id": "essay_295_92cbb56df7", "text": "음악이다**\n\n계속 고음만 있기를 바란다. 그런데 고음 상태만 나는 것은 소음이다. 높낮이가 있어야 아름다운 음악이 된다. **삶의 파고가 삶의 음악이고 창조성이다.** 부족함이 없는 상태에만 계속 머물면 역동력이 없다. 역동력이 있다는 것은 높낮이가 있기 때문이다. 계속 높은 상태로만 올라오면 그것은 쓰나미다. 낮은 단계를 견딜 수 있어야 삶을 통과해 나갈 수 있다. **있는 그대로 높이 있을 때도, 낮은 단계도, 중간 단계도, 다 온전하다.** 낮은 단계에 있을 때 그것을 온전히 수용하면 위로 올라갈 힘이 생긴다. 나락으로 떨어지는 것 같다. 그 떨어지는 것도 에너지다. 그것을 수용하면, **'지금 에너지가 쌓이는 중이다'** 고 생각하면, 떨어지는 에너지에 의해서 다시 올라가게 된다. 떨어지지 않으려고 발버둥을 치면 오히려 삶의 역동성을 받지 못한다. **떨어짐을 허용해야 한다. 떨어짐에 푹 쉬어야 한다.** 삶과 맞서면 맞설 수 없는 것에 생각으로 맞서는 것이다. 맞서는 자체에 에너지를 다 써버린다. 삶의 여정에 올라타야 한다. 그때 비로소 수용이 되고, 쉴 수 있게 된다.\n\n#삶의파고 #꽃의여정 #통과하고있다 #창조성 #수용\n\n--- (구분선)\n\n[파일명: 삶이나_동사로사는존재_수필.md]\n\n### **삶이나_동사로사는존재_수필**\n\n#### **시 쓰기가 무의식을 의식으로 꺼내는 작업이다**\n\n치유의 시 쓰기를 생각한다.", "source": "essay"}, {"id": "essay_296_8f2bb5094e", "text": "[파일명: 삶이나_동사로사는존재_수필.md]\n\n### **삶이나_동사로사는존재_수필**\n\n#### **시 쓰기가 무의식을 의식으로 꺼내는 작업이다**\n\n치유의 시 쓰기를 생각한다. 갱년기나 삶의 어려운 고비를 시를 쓰면서 넘겼던 경험들. 내면 아이라는 말을 심리학에서 많이 쓰는데, 내면 아이의 과거 생각이 느낌과 감정으로 뭉쳐져서 지금 현재의 나를 어렵게 한다는 거다. 그 내면 아이를 현재로 불러내는 과정을 **시 쓰기** 로 하는 것이다. 쓰면서 알게 된다. '그때의 느낌과 감정과 생각이 이렇게 버무려져서 나의 삶의 패턴을 만들어내고 있구나.' 그것이 내가 이 렌즈를 가지고 계속 세상을 바라보게 하는 거다. 쭈그러진 안경을 가지고 세상을 바라보는 거다. 그것을 객관화시켜서 **무의식의 의식화** 를 시켜보는 작업이다. 여기서 중요한 게 있다. 과거를 회상할 때 떠오르는 그때의 느낌도 물론 있다. 그런데 **글을 쓰면서 지금 일어나는 느낌과 감정** 이 사실은 더 중요하다. 지금 일어나는 것이 옛날부터 형성된 것들이기 때문이다. 단 한 개의 사건으로 형성된 게 아니다. 수많은 것들이 섞여서 지금의 내가 형성됐으니까, 옛날 내면 아이 한 명의 사건만 해소된다고 되는 게 아니다. 지금의 내가 옛날 상황을 떠올렸을 때 지금 일어나는 느낌, 그것이 중요하다.\n\n그 작업을 통해 지금 나의 패턴이 어떻게 형성됐는지를 이해하게 된다. 대상과 관계", "source": "essay"}, {"id": "essay_297_1ea147a186", "text": "되는 게 아니다. 지금의 내가 옛날 상황을 떠올렸을 때 지금 일어나는 느낌, 그것이 중요하다.\n\n그 작업을 통해 지금 나의 패턴이 어떻게 형성됐는지를 이해하게 된다. 대상과 관계 맺음의 왜곡됨, 사람들과 상호작용하는 데 있어서의 굴절 곡률, 이런 것들을 내가 이해하게 된다.\n\n---\n\n#### **치유로 끝나면 안 된다, 코칭적 시 쓰기가 있어야 한다**\n\n그런데 거기서 끝나면 안 된다. 과거를 이해하는 것에서 멈추면, 치유는 됐지만 앞으로 나아갈 수가 없다. 새롭게 내가 이루고 싶고 바라는 미래의 나의 모습, 새로운 관계 맺음을 거기서 맺어야 한다. 그것이 코칭으로 들어가는 거다. 과거의 것을 다루는 게 심리 치료적인 거라면, 미래와 관계를 맺는 것은 코칭적인 것이다. **시 쓰기를 통해서 두 가지를 다 할 수 있다.** 지금까지 치유의 시 쓰기라는 것은 있다. 외국에서도 한다. 과거의 응어리진 것을 풀어 헤치는 작업이다. 하지만 그것으로는 앞으로 나갈 수 없다. 치유는 됐지만, 이제 현재의 시력에 맞는 새 안경을 써야 한다. 왜곡된 옛날 안경을 벗어버리고, 지금 나에게 잘 보이는, 왜곡되지 않는 새로운 안경을 쓰고 세상을 바라보는 시각이 필요하다. 그것이 **코칭적 시 쓰기** 다.\n\n실제로 이렇게 해볼 수 있다. 시 제목 하나를 두고 시를 썼다면, 그 시는 내면에 있는 것을 표현한 것이다. 그렇게 내면의 것을 끄집어냈다면, 이", "source": "essay"}, {"id": "essay_298_0b4af6e4bc", "text": "이 **코칭적 시 쓰기** 다.\n\n실제로 이렇게 해볼 수 있다. 시 제목 하나를 두고 시를 썼다면, 그 시는 내면에 있는 것을 표현한 것이다. 그렇게 내면의 것을 끄집어냈다면, 이번에는 같은 제목으로 네가 되고 싶은 것, 원하는 방향으로 다시 한번 시를 써보는 거다. 치유의 시와 성장의 시, 두 편이 모인다. 여러 편을 쓰다 보면 나의 왜곡이 점차 걷힌다. 그러면 새롭게 성숙된 나의 관점에서 미래를 바라보게 되고, 성장의 관점에서 미래를 바라보게 된다. 과거의 것을 밀어내면서 앞으로 나아가는 동력이 되기도 하고, 미래에서 나를 끌어가는 그것이 지금 나를 움직이는 동력이 되기도 한다.\n\n---\n\n#### **삶은 명사가 아니고 동사다**\n\n고정된 '나'라는 것이 있다는 생각. 그 생각이 사실 많은 고통을 만든다. 우리가 외로움을 느끼고, 우울함을 느끼는 건 **삶이 명사가 되기 때문이다.** 고정되기 때문이다. 자꾸 이것을 고정시키고, 뭔가 단단해지고, 안정이 됐으면 좋겠다는 거다. 그런데 그렇게 되지 않으니까 불안하고 흔들린다.\n\n사실 **삶이 동사라는 것을 받아들이면** 오히려 달라진다. 말랑말랑하고, 흔들리고, 흘러가는 것 같은 이것을 오히려 즐길 수가 있다. 흐름을 탈 수가 있다. 무수히 많은 변화 속에서 **변화 자체가 나** 라는 것을 받아들이게 되는 거다. 딱 고정된 나가 있는 것이 아니고, 수많은 감정들이 올라오고, 느낌", "source": "essay"}, {"id": "essay_299_8f5682d6c3", "text": "있다. 흐름을 탈 수가 있다. 무수히 많은 변화 속에서 **변화 자체가 나** 라는 것을 받아들이게 되는 거다. 딱 고정된 나가 있는 것이 아니고, 수많은 감정들이 올라오고, 느낌들이 올라오고, 온갖 풍상을 다 겪는 자체가 나다. 나의 삶이, 내가 있어서 어떤 삶을 사는 것이 아니라, **삶 자체가 바로 나** 라는 관점의 전환이 일어나는 거다. '나는 왜 이렇게 힘들게 살지?'라고 할 때 거기에 '나'가 있다. 힘들게 산다는 '나'가 있다. 삶과 나를 분리시켜서 인식하는 거다. 떨어졌다고 보는 것이다. 그런데 사실은 **삶 통째로가 그냥 그게 다 '나'**다. 그것을 받아들일 때, 그야말로 흐르는 물은 흐르는 물이고 산은 산이고 물은 물이 된다. 지금 우리는 이 흐름 속에서 나의 존재감을 확보하려고 계속 거슬린다. 물살이 다 나를 향해서 오는 것 같고, 앞길을 막는 것 같다. 그런데 그 물살 속에서 헤엄치는 것이나, 그 물살 자체 모든 것이 다 사실은 '나'라는 거다. **'삶이 나'라는 것, '내가 삶이 아니고 삶이 나'라는 관점의 전환이 굉장히 필요한 것이다.**\n\n---\n\n#### **이 땅에 온 이유가 그것일지도 모른다**\n\n시뿐만이 아니다. 영상을 하든, 코칭을 하든, 철학을 하든 이 관점을 알아야 한다는 것이 핵심이다. 사실은 그것을 받아들이기 위해서 우리가 이 땅에 왔는지도 모른다. 이 삶 통째가 있는 그대로 그냥 나라", "source": "essay"}, {"id": "essay_300_136709ddcf", "text": "하든, 코칭을 하든, 철학을 하든 이 관점을 알아야 한다는 것이 핵심이다. 사실은 그것을 받아들이기 위해서 우리가 이 땅에 왔는지도 모른다. 이 삶 통째가 있는 그대로 그냥 나라는 것을 수긍하기 위해서 여기 온 것이다. 이 삶 속에서 완전한 나를 이루기 위해서 온 게 아니다. 모든 것들이 다 통으로 나라는 거다. 그런데 그것은 고정돼 있지 않다. 삶은 역동적이다. **동사** 다. 딱 픽스된 고정된 '나'가 없다. 여기에 고정돼 있으면 알 수가 없다. 잠잘 때 아무런 '나'가 없는 것 같은 것처럼, 정지돼 있으면 모르는 거다. 나를 거스르는 것들, 나한테 부딪쳤던 물살들, 바람들, 거슬림이 있으니까 내가 거슬렸다는 것을 알고 느끼는 것이다. 그렇기 때문에 그것이 다 나라는 거다. 거슬림도 다 나고, 순풍을 타든 역풍을 타든 그것이 전부 다 온통 나였다는 것이다.\n\n**그래야 진정한 쉼이 된다.** 내가 어떤 상태에 있든, 어떤 것을 경험하든 온전히 '나'이면 더 이상 애쓰고 말고 할 게 없다. 다 통째로 나인데, 어디 도망갈 수도 없고 피할 수도 없다. 그래야 완전히 놔버리게 된다. 발버둥 치지 않게 된다. 발버둥 친다 해서 따로 피할 데가 없다는 것을 알기 때문이다. #동사로사는존재 #삶이나 #관점의전환 #치유와코칭 #시쓰기\n\n--- (구분선)\n\n[파일명: 새로운언어_소셜벤처_수필.md]\n\n### **새로운언어_소셜벤처_수필**", "source": "essay"}, {"id": "essay_301_85ca81b962", "text": "기 때문이다. #동사로사는존재 #삶이나 #관점의전환 #치유와코칭 #시쓰기\n\n--- (구분선)\n\n[파일명: 새로운언어_소셜벤처_수필.md]\n\n### **새로운언어_소셜벤처_수필**\n\n#### **스토리와 언어는 다르다**\n\n소셜 벤처라는 말이 있다. 돈을 쫓아가는 일반 벤처가 아니라, **사회 문제를 해결하는 쪽에 집중하는 혁신 기업** 이다. 이 사람들이 하는 일을 들여다보면 공통점이 있다. 사회 곳곳에 숨어 있는 이야기를 발굴한다는 것이다. 그런데 그것은 단순한 이야기가 아니다. **소통할 수 있는 새로운 언어다.** 스토리는 스토리 하나에 멈춘다. 그런데 그것이 언어가 되면 달라진다. 언어는 게임에도 입혀질 수 있고, SF 영화에도, 소설에도 입혀질 수 있다. **언어이기 때문에 파급력이 엄청나다.** 언어로는 무한히 많은 것이 쓰일 수 있다.\n\n#### **몰랐던 것을 언어화한다**\n\n요괴를 소재로 한 프로젝트가 있다. 디딜방아에 있던 디딜방아 요괴, 이런 식으로 우리가 몰랐던 것들을 발굴한다. 그것이 하나의 언어가 된다. 새로 만들어낸 것이 아니라 **숨겨 있던 언어를 끌어올린 것** 이다. 우리한테 생소했을 뿐, 있던 것이다. 소방관의 낡은 옷을 가방과 필통으로 만드는 작업도 있다. 그 옷에는 숨겨진 스토리가 있다. 불에 그을린 자국, 수많은 현장의 기억. 그것을 **소방관의 옷이라는 언어로 만들어내면** , 거기서 또 새로", "source": "essay"}, {"id": "essay_302_fcace8bd1c", "text": "방과 필통으로 만드는 작업도 있다. 그 옷에는 숨겨진 스토리가 있다. 불에 그을린 자국, 수많은 현장의 기억. 그것을 **소방관의 옷이라는 언어로 만들어내면** , 거기서 또 새로운 스토리들이 창출된다. 몰랐던 것을 알게 되는 것이다.\n\n#### **공감대가 연대가 된다**\n\n지금 네트워크가 활발해지면서 개인화가 빠르게 진행되고 언어가 단절되고 있다. 그런 시대에 **사회가 공통으로 통용할 수 있는 새로운 언어를 찾는 작업** 이 필요하다. 소방관의 옷이라는 언어를 가지고 젊은 사람들이 공감대를 형성한다. 소방관의 아픔을 서로 나누고, 그 공감대가 점점 넓어진다. 그것이 **연대** 다. 새로운 언어가 벽을 허물고, 큰 울타리로 공감대를 확장시켜 나가는 것이다. 지금 하고 있는 이 작업, 손톱시도 그것이다. 숨겨 있던 언어를 찾아서 서로가 공감할 수 있는 새로운 언어를 만드는 작업이다.\n\n#새로운언어 #소셜벤처 #연대 #공감대 #스토리\n\n--- (구분선)\n\n[파일명: 색즉시공_흐름의나_수필.md]\n\n### **색즉시공_흐름의나_수필**\n\n#### **보이는 대상이 보는 주체다**\n\n우리는 뭔가가 따로 있어서 대상을 본다고 생각한다. 소리가 있고, 그것을 듣는 주체가 별도로 있다고 생각한다. 그런데 그렇지 않다. **보이는 대상이 보는 주체다.** 소리가 듣는 것이고, 색(色)이 보는 것이다. 색즉시공(色卽是空)이 그것이다. '봄'이라", "source": "essay"}, {"id": "essay_303_a50118a980", "text": "주체가 별도로 있다고 생각한다. 그런데 그렇지 않다. **보이는 대상이 보는 주체다.** 소리가 듣는 것이고, 색(色)이 보는 것이다. 색즉시공(色卽是空)이 그것이다. '봄'이라는 것이 발생하려면 세 가지가 같이 붙어야 한다. 보이는 대상, 보는 눈, 그것을 아는 식(識). 이 셋이 하나라도 떨어지면 봄이 발생하지 않는다. 들음도 마찬가지다. 소리와 귀와 그것을 아는 것, 이 셋이 **쌍으로** 붙어야만 들음이 발생한다. 그러니까 떨어질 수가 없다. **탁 하나로 붙은 것이다.**\n\n#### **하나라도 없으면 나도 없다**\n\n몸의 신경이 마비되어 오직 보는 것만 남았다고 해보자. 그러면 나라는 것은 '봄'밖에 없다. 귀만 열려 있다면 나라는 것은 '들음'밖에 없다. 생각만 있다면 나는 생각과 생각을 아는 그것뿐이다. 소리가 없어지면 듣는 나도 없어진다. 대상이 없으면 보는 나도 없다. 소리가 있어야 하고, 귀가 있어야 하고, 그것을 아는 것이 있어야 한다. 이 셋이 같이 발생해야 '듣는 나'가 발생한다. **나는 고정되어 있는 것이 아니다.** 없는 것은 아니지만, 고정되어 있지 않다. 볼 때는 보는 나가 있고, 들을 때는 듣는 나가 있고, 냄새 맡을 때는 냄새 맡는 나가 있다. 그것들이 연속적으로 일어나니까 뭔가 주체적인 하나가 있구나 싶지만, 소리가 없으면 듣는 나도 없다.\n\n#### **나는 흐름이다**\n\n아까 빵 가게에서", "source": "essay"}, {"id": "essay_304_075a3852aa", "text": "는 냄새 맡는 나가 있다. 그것들이 연속적으로 일어나니까 뭔가 주체적인 하나가 있구나 싶지만, 소리가 없으면 듣는 나도 없다.\n\n#### **나는 흐름이다**\n\n아까 빵 가게에서 빵을 먹었던 그 나는 지금 없다. '나'라는 것은 어떤 실체가 고정되어 있는 것이 아니라 **흐름** 으로 존재한다. 볼 때 봄이 일어났다가, 들을 때 들음이 일어났다가. 소리가 계속 발생되면 듣는 것이 계속 발생됐다가, 소리가 끊기면 듣는 나도 없어진다. 하루 종일 생각에 휩싸여 살면 생각하는 나만 있는 것이다. 다른 나는 없다. 엉덩이에 닿는 느낌이 분명히 있는데도, 듣는 것에 온 신경을 쓰면 그 느낌을 못 느낀다. 그때는 들음만 온통인 것이다. **역동적인 들음이 발생했다가 봄이 발생했다가.** 찰나찰나 매 순간 일어났다 사라지고 일어났다 사라진다. 파도가 일어났다 사라지듯.\n\n#### **세상과 나는 둘이 아니다**\n\n꿈에서 깰 때 눈을 떠보면, 대상과 내가 같이 느껴진다. 대상은 없는데 나만 보이는 것은 불가능하다. **항시 세상과 나는 같이 나타난다.** 세상을 따로 떼놓고 내가 단독으로 존재할 수 없다. 보는 놈과 보이는 놈이 둘이 아니다. '봄'이 나다. 보는 나가 따로 있는 것이 아니라, 봄이 나다. 들음이 나다. 그런데 우리는 이것들이 모여져서 뭔가 주체적인 하나가 있다고, 세상과 동떨어진 내가 하나 있다고 생각한다. '내가 있고 너가 있다", "source": "essay"}, {"id": "essay_305_1e47ccbf5a", "text": "로 있는 것이 아니라, 봄이 나다. 들음이 나다. 그런데 우리는 이것들이 모여져서 뭔가 주체적인 하나가 있다고, 세상과 동떨어진 내가 하나 있다고 생각한다. '내가 있고 너가 있다'는 **분리의식** . 그것이 에고다. 다른 것이 에고가 아니다. 그 분리의식이 모든 스토리를 쓴다. **무아(無我)**가 내가 없다는 말이 아니다. **고정되어 있는 나가 없다** 는 것이다. 역동적으로 삶이 전개된다. 고정된 것이 있다면 흔적이 있어야 하는데, 과거가 없어진다. 파도 하나의 실체가 딱 있는 것이 아니듯, 나라는 것도 그렇게 일어났다 사라진다. 너무 빠르게 돌아가니까 내가 있다고 착각을 일으키는 것이다. 삶의 비밀이 여기 있다. 감춰져 있는 것이 아니라 드러난 비밀이다. 이미 환하게 드러나 있다. #색즉시공 #무아 #흐름의나 #분리의식 #올셀프\n\n--- (구분선)\n\n[파일명: 생각감정분리_해결책_수필.md]\n\n### **생각감정분리_해결책_수필**\n\n#### **기억과 감정은 같은 것이 아니다**\n\n해결 방법이 없는데도 끙끙 앓고 있으면 내가 손해고 나한테 미안한 일이다. 그렇다면 해결책을 찾아야 한다. 그런데 해결책을 찾는 것 자체도, 생각과 감정을 분리한 상태에서 해야 한다. 감정을 그대로 가져가서 해결하려 하면 싸움이 되고 복수가 된다. 감정에 몰입한 채 해결을 시도하면 그것은 해결이 아니라 감정의 충돌이다. **과거의 기억과 감정을", "source": "essay"}, {"id": "essay_306_fc91998e17", "text": "에서 해야 한다. 감정을 그대로 가져가서 해결하려 하면 싸움이 되고 복수가 된다. 감정에 몰입한 채 해결을 시도하면 그것은 해결이 아니라 감정의 충돌이다. **과거의 기억과 감정을 분리된 상태에서, 경험 그 자체만 보고 해결책을 찾아야 한다.** 일본의 침략을 당했던 역사를 생각해보자. 정신대 할머니들에게 \"이제 잊을 때도 되지 않았냐\"고 말하는 것은 있었던 사실을 없애라는 것이다. 있었던 것은 인정을 해야 한다. 기억하는 것은 인정해줘야 한다. 그것을 잊으라 하면 안 된다. 그런데 만약에 새로운 관계를 정립하고 싶다면, 있었던 팩트를 인정하고 팩트에 준해서 해결 방법을 찾아야 한다. **억울한 감정을
